body:
  text: 古今紀要卷十一宋黄震撰唐三元宗相姚崇元年相四年罷勵精為治毎事訪之制選京官及都督刺史有才識政迹者更迭出入永為定式汰僧尼萬三千人罷員外檢校官罷兩京織錦坊修常平法尊禮師傅召試縣令帝濟第一焚錦繡珠玉出宮人相宋璟四年相八年罷務得人百官稱職刑賞無私犯顔敢諫曲意從之非祕宻皆令對仗編校羣書奏死罪止二十四人十八年分天下十五道置採訪使六條括察懐州樂工衣繡立以刺史為散官右開元以前好處開元元年髙力士為監門將異時林甫祿山之見用乃力士為之階開元元年觀燈大酺二年置左右教坊棃園弟子異時楊妃之進燕安驕侈即此心為之兆二年薛訥黄門三品將共擊契丹異時邉功之興即此念為之先姚崇諫不聽開元九年宇文融為括田使異時韋堅楊慎矜王鉷楊國忠之聚歛皆祖宇文者也右末年之亂基於開元髙力士用宦官始盛四方表奏先呈力士小者即决之勢傾中外時楊思勗亦用事張説募壯士宿衛兵農始分十一年選府及白丁十二萬名長宿衛十二年更名勁騎分六番至天寳八年府兵壊無可交勁騎亦變矣應募者皆市井無頼子弟精兵聚西北置十節度藩鎮始成天寳元年統初唐邉帥不乆任兼至開元中始久任兼統至天寳六載邉帥盡用胡人勢始偏重裴光庭用循資格而官人之法壞無問賢愚限年躡級王君㚟大破吐蕃而邉功之念熾以符瑞取媚為相開元二十五年也初王璵以祠祭為御史時姚崇開元二年表賀太陽不食事已兆矣罷九齡相林甫而人主之徳衰林甫以仗馬諭諌官而諫諍之路絶居相位十九年養成天下之亂而上不知殺太子瑛光王琚鄂王瑶祿忌儒臣為節鎮入相擢用蕃將安山等專兵柄楊國忠激禄山速反上幸蜀禄山䧟京師上發馬嵬父老説太子興復右末年亂天下事太子即位于靈武是為肅宗相姚宋相繼為相恊崇善應變成務璟善守法持正志操不同而心輔佐使賦役寛平刑罰清省百姓富庶與房杜並稱崇毎進見上輙為起去則臨軒送之胡管見謂説善迎合故罷而復用璟頲介然守正故斥而不復姚非宋比必張九齡乃可與璟同日語上將幸東都太廟屋壊璟謂天戒崇謂符堅故殿木蠧壊與行㑹宜遷神主於太極殿行幸以免輸餉之勞胡氏謂其逢君姚崇字元之與元宗獵新豐宻詔咨天下事欲相之以十事帝約政先仁恕不倖邉功行法自近以宦竪與政言絶貢獻道戚屬任臺省戚接大臣禮容直絶佛營造謹外帝曰朕能行之翌日相帝張説忌其入屢間之帝知之遂召崇序郎吏不顧曰崇不能而煩我耶由是進賢退不肖而天下治四裁决專任病痁移告事必令乾曜就咨又使寓方館以自近乾曜稱㫖上必曰此必崇謀不稱㫖則曰與崇謀未此皆其得君之專上勵精為治每訪之應答如響狎請抑權倖愛爵賞納諫諍却貢獻不與羣臣褻吏事明敏三為宰相皆兼兵部屯戍士馬無不嘿記力尤長吏道處决無淹思李汰僧尼萬三千人請捕蝗十四萬石擢偽以哭興王新此皆其輔治之才張相武氏以不從易之私請黜與柬之謀誅二后遷上陽獨流涕曰違舊主而泣人臣終節此五王被害獨免相睿宗與璟貶太平公主皆其素履之正無居第寓居罔極寺後遺戒厚葬戒造經像追福皆其好處懲逺官争競先折貨産營减趙誨受夷人賕罪帝不恱遂引宋璟自代此過小而功大賀日不食賀武后鼎銘䜟語曵踵出張説流揣上意言二子于魏知古卒罷之其忌劉幽求之崔沔將劾其子薦為著作奪權此皆其失處少尚氣能文盧懐慎陳時政乞乆任省官勿用贓廢璟東都掌選奉身具止一布囊疾亟薦宋李傑李朝隠盧從愿執别璟從愿謂上享國乆稍倦勤將有憸人乗間自以才不及姚宋政事權而不專嘗以事積不决以謝上曰天下事委崇以卿雅鎮浮俗耳史稱伴食宰相温公取其不􅎱嫉同心濟太平無清簡惟祿賜隨散妻子飢寒事既薨家餘蓄老蒼頭自鬻請辦䘮宋璟姚崇薦自代自廣州都督召上使内侍楊思勗迎之不與交言上嗟嘆犯顔正諌上甚敬憚不合意亦曲從之直上在蜀時言崇在賊不足滅至論璟則曰彼賣以取名耳林甫傳無負罪者妄訴不已付御史臺治優人作魃戲譖之上以為然蕭隠之括江淮惡錢急上并罷璟頲而弛錢禁八年官是得君不如崇授為相務清刑政人皆稱職吏務擇人隨才任百官稱職刑賞無私綱目恐好事者生心徼倖抑郝靈荃禽突厥寜黙啜功墨勅與王仁琛五品官乞下吏部王憲奏與薛嗣先官亦乞下吏部皎幸東都諌以道不治罪李朝隠諌后父王仁墳過制日食布素服錄囚賑䘏璟曰止女謁放䜛夫此為修徳囹圄不擾兵甲不瀆此為修刑不為皇子别擇美名佳色皆張嘉貞閲堂案見其危言切議失聲嘆息此其輔治之忠勸張説辨證易之獄吾為御史中丞固請下張昌宗獄武后釋之璟曰悔不先碎豎子首卿呼易之斥鄭善果君非具家奴何郎之云三易之等常欲出之又欲刺之中宗復辟叱武思就第韋月將告三思亂宫掖幾死力争之守杭相二州清毅刺貝州不為三思歛封殖承鄭愔後為吏部銓總平允堵與姚崇白出公主諸王貶二教廣人陶瓦竹廣人立遺愛碑乞停之十年請致仕賜全祿退居身此是立身事君終無玷處蘇頲瓌子若覆來俊臣寃獄給元宗平内難詔書填委思湧泉知制誥政事食自頲始再諌親征吐蕃二與宋璟同相頲能推其長璟有未及輙助成之人相得甚歡璟嘗謂獻可替否事至即斷盡公不私則頲又過其父頲㢘儉也俸散親戚文章與張說號燕許大手許公帝愛其文詔令自此錄副張說諌武后乆留三陽宫避暑忠諫發寒胡戯此戱遂絶易之使同誣魏元說辨其誣中宗時不肯起復時以奪服為榮宗睿宗時决譙王重福獄一日而罪人得此元以前素履好處因術家謀動東宫獨請以太子監國元既即位知太平懐逆以佩刀獻帝二事有功於宗㝡大王晙誅河曲降虜九姓疑懼犯其帳慰安之胡破黨頃置麟州安𦍑衆朔方大使徙河曲殘於唐鄧衛置鎮兵二十萬舊六十萬萬右方面之功以兵弱旬日募勇强士十三後為彍騎兵農之分始此士以倡封禪議上改麗正書院為集賢而以為學東封引所厚為執事官使超階為上欲相姚崇使趙彦昭彈之又使姜皎言其可河東總管上曰此張説之意即召相崇沮宇文融括田議雖正亦出忌心甫又薄崔隠甫無文沮融銓法融遂與隠甫李林劾其過惡髙力士往觀為解於上得善罷相帝欲事吐蕃説請講息右為相時事破初王君㚟計用吐蕃青海西説又料必敗後𤓰州失守君㚟死而復相以此知其才於方面尤長敦氣節推薦後進王於君臣朋友大義甚篤佑化粉澤典章成一王法引天下知名士佐尊經開館修太宗之政皆説倡之禮右好處政以貞觀顯慶禮不同請討論刪改五雖罷亦兼文史之任大事訪之其手齊藳軍中論譔國史文朝廷大述作多出帝為文使視草為屬思精壯長於碑誌賄與蘇頲號燕許大手之右文章忌有才智而好好面折人姚崇出候蘇瓌日獻詩於頲獲遷功與帝東宫時袐謀甚衆下東封刻頌泰山夸成改政事堂為中書門列五房其後祿子汙山敗源乾曜治京師寛簡外詔捕仗内白鷹因自劾外為相出二子補由是公卿子弟皆出補堂封之始寛清謹悔相十年未嘗廷議可否唯唯聯署以平鮮吝贊宇文融括户不欲封禪與張説不合薛訥仁貴子粟沈勇錢臨大事益壯召與來俊臣争以義倉償息元宗講武之軍門不可入擊奏復置營州上亦欲討契丹因相之使將兵徃當暑出師大敗削官白衣攝羽林吐蕃冦臨洮大破之武街者凉州總管討突厥張開元中大臣自節度為相訥元振嘉貞王晙説蕭嵩杜暹李適之郭元振將復鎮朔方未行元年冬以講武軍容不整將斬之張説劉幽求諌有大功流新州詳見睿宗張嘉貞御史張循憲使河東見其條析洗然請以官讓武后召見因請上簾兵部功狀盈几不閲旬廷無稽牒言或告其弟反不實元宗將坐之嘉貞辭以恐塞路上許為相曰乞及臣未衰相宋璟罷欲用之忘其名夜半閲表疏得之即拜敏於裁遣然彊躁不裕王鈞為治第以贓閫斃之以滅言之希權幸意杖姜皎至死臣又欲杖裴伷張說責曰宰相時來則為若貴盡杖正恐及吾輩不以弟贓出銜張說曰中書令幸二員何相廹立田園性簡疏子延賞王晙多邉功二魏元忠朔方失利劾副將晙在朝争之後張誣元忠獨辨之桂州開屯田省漕運之破吐蕃於洮水叛諌徙突厥降者于河曲乞遷淮右未幾虜果因敕晙討之􅎤趺等部弓突厥内擾敗之人蘭池胡反陷六州與郭知運平之元宗以宫賜獨不受曰事君猶事父詎有常近闈掖而臣子敢當者乎人代張説鎮朔方節義有古人風吏畏愛李元紘本姓丙髙祖賜姓山太平公主與民争碾磑元紘判與民曰南可移毁三輔渠磑决以溉田當請勒張説就館脩史元以清儉著故相國不治宅第相開務抑奔競父道廣相武后再世清節杜暹五世同居暹尤孝謹遺弟婺州參軍贐紙萬畨受其百使突厥埋金於其帳下守邉四年撫練勤勵夷夏所樂當公清勤約失終身不通朋友饋遺所少學術時議論時淺薄與元紘議事異同互相奏列貶蕭嵩姚崇知其逺到中王君㚟敗河隴邉患代鎮河西大破吐蕃進書令亦遥領在公謹宻莫見其際得薦韓休並相牛休峭正不相假力求退曰未厭以乞身薦仙客林甫忌之請老一紫壽考冨貴優游自恰帉包賜黄柑裴光庭行儉子議靜嘿寡交以職業稱議者方推之東封守邉勸張説召諸蕃赴行在突厥果朝禳續春秋經傳不就來為相不禳星變曰使禍可而去則福可祝而為循資格庸愚者謂之聖書宋璟争之之任主事閻麟之光庭首覈宇文融明辨長吏治縣開元初户版刓隠詭脫繇賦豪弱相并州莫能制建議收匿户羡田上以覆田勸農為使縣奏慕容琦等二十九人為判官假御史分按州括沒户八千萬田稱之嵗羡錢數百萬惟楊瑒以為籍外取税坐左遷權馳傳行天下事無巨細先上勸農使常平倉發歛可張說惡融毎建明必争之張九齡謂其卞給不忽説又沮其分十銓事融劾罷説上疾其黨亦出融魏州宋懇九河故地為田工役紛然而無成為相薦璟裴耀卿許景先時稱知人性卞急罷神用警敏應對如響相諷御史劾信安王帝怒相錢穀曰此不治凡百日國用不足帝讓裴光廷等恐光廷等忌之用再被貶死此侈上心百姓愁有司失職皆始融自言利得幸者相接以時韋堅楊慎矜王鉷楊國忠皆聚歛貴盛裴耀卿東封守濟州上書云重擾則不可告成隂科歛均省為東州最為相領轉運置河集津三門倉引天下租三年積七百萬石省運費三千萬緡言刺史縣令不當杖辱見葢嘉運驕夸知經畧吐蕃必無功韓休為相直方不務進趨天下翕然蕭帝將放萬年尉休請先治金吾程伯獻祊嵩以休柔易故薦代光廷休臨事或折正嵩休峭鯁至時政得失言之必盡帝獵張樂稍過疏已帝引鑑謂吾瘠天下肥思蕭嵩毎順㫖或退思不安寢休訐直退天下寢必安子滉張九齡言元宗五年未郊後重守令之吏部資格之弊張説通譜謂出詞人冠說文人故惟以文知之其諌說引兩省吏胥及所親為東封執事又諌沮宇文融建議代説集賢學士為相二十年遣乞廢循資格復十道採訪守諌廢三子斥武恵妃通意㫖諌以宰相賞張珪斬突厥功相上千秋金鏡錄甫諌牛仙客為尚書勸諌林甫仙客林相而九齡罷周子諌劾仙客坐舉非其人貶荆州長史卒諤有大臣節帝稍怠政議論必極言得失諤所引皆正人張祿山以范陽編校入奏知必反及討奚契丹敗守珪執如京師又力請誅之帝毎用人必言風度能如九齡乎是帝亦未嘗不知之在蜀思其言遣祭韶州天下稱曲江公請不禁鑄錢事為耀卿所非正起復為相一事㝡失孫仲方事穆敬宗確有風節劾吉甫不實斥直挾怨駁吉甫諡世不其言卒不顯自帝即位姚崇尚通宋璟尚法嘉貞尚吏張說尚文元紘杜暹尚儉韓休九齡尚直各其所長也九齡得罪朝廷之士容身保位無復直言林甫善養君欲深居燕適沈蠱衽席而主徳衰矣牛仙客本鶉觚縣小吏以蕭嵩在河西委以軍政用清勤接士大夫信嵩相薦之河西嗇倉庫鉅萬器械犀鋭帝悅欲以為尚書張九齡持不可林甫稱之故仙客用而九齡罷為相與時浮沈錫與緘封不敢用相百司諮决無處可髙力士謂其胥吏非宰器帝怒卒於位李林甫宗室放奸臣傳謁宇文融為中丞引同列䕶吏部寜王私十人繼其一示公願夀王為萬嵗計以結武恵妃結又與髙力士共謀繼光廷相而上自用韓休因休而休薦有宰相才所帝還東都耀卿以農塲未畢林甫謂若妨農赦過租可也九齡諌以仙客為尚書謂天子用人何不可罷九齡争廢太子謂天子家事何與外人未幾九齡耀卿相之而卒用其言殺三子意徐嶠賀刑措遂封晋國公恩媚事左右迎合上以固寵如餉遺左右寵莫比杜絶言路掩蔽聰明以成其奸絶如斥杜暹下邽令而戒其餘以立仗馬言路遂賀野無遺言妬賢嫉能排逐勝己以保其位在如上愛盧絢醖藉紿使請老上問嚴挺之安紿使稱疾上重裴寛紿裴敦復奏貶之之屢起大獄誅逐貴臣以張其勢如逐九齡適誅楊慎矜張瑄盧幼臨栁升王偃月堂思中傷王口蜜腹劒太揣上意贊立夀而上意不在夀計絀數䜛子亦不行是奸計亦有時而窮將忌儒臣積邉勞入相擢祿山仙芝哥舒翰為大而祿山得專三道勁兵十四年不徙國國忠為御史林甫薄其材孱又以貴妃故善之忠貴盛交惡憂懣死為相十九年天寳十二載卒於位國忠諷祿山暴其短斵棺籍家所謂禍生所忽子岫泣言禍至曰勢已然可奈何甃憂刺客先驅百歩金吾清道必所居複壁石一夕再徙是亦自知其及禍陳希烈奸臣傳中博學尤深黄老神繼褚無量元行冲講禁助帝譔述降謂老子告錫靈符因講南華真經希帝旨隂林甫以其柔佞引為相寵與林甫侔林甫詭亦所左右失職忽忽不樂奚安祿山盗京師與達珣相之李適之宗室喜河南尹不苛細不作月陂免穀洛水患賔客飲酒斗餘亂夜宴晝决事案無留辭華代仙客相紿使言山金可採林甫與争權卒為所搆唐宗室為相者九人適之相元宗峴相肅代勉相肅徳夷簡相憲宗石相文宗福相宣僖回相武宗皆稱職號賢相惟程相敬文無所發明林甫姦諛幾亂天下按李麟相肅宗亦宗室則不止九人楊國忠太真從祖兄其張易之甥虢國夫人裒資一日盡飲博無檢仲通蜀豪鮮于通資給之薦之節度章兼瓊恱得蜀貨百萬至長安以摴蒱進專主蒲簿計帝謂度支才可危太子者先林甫意陷之請虢國居中帝好惡必知丁一年領十五餘使出積變輕齎又悉義倉租地課易布帛禁藏如山匿鮮于仲通南詔之敗以吉温謀奪林甫政林甫死遂相唱注一日畢以夸神明自是資格紛謬下就第唱補令希烈給事中隅坐在旁曰已過門矣領四十餘使度支吏部署一字亦不能盡故吏得輕重劾大雨敗稼擇善禾以進扶風太守房琯以言灾遂無敢以水旱聞南達奚珣擢其子髙第更使劒南李宓以十萬擊詔閤羅鳯大敗河西以捷間祿一再興師凡失驍卒二十萬天下寃之忠暴發山反狀祿山上書自陳條大罪二十國又激怒使反以自信其説故祿山反以國忠為名皆上幸蜀次馬嵬陳元禮殺之争噉其肉四子死韋見素銓叙平允以國忠以易制薦代陳希烈為相禄山請蕃將易漢將因與國忠言其必反減元宗使歸輔肅宗肅宗以由國忠進禮遇獨星犯昴知祿山死日月兩京平使迎上皇交子諤勸誅楊妃勸幸蜀著諤子顗裴垍等五舊為相朝廷典章多咨之易緼解顗子維内江令民刻頌為户部善裁剖與宋之問善詩稱二妙䋲長文辭撫宗屬舉孝廉以母老不仕維子虚心大理据正不撓守洪魏有治名號虚舟官家崔圎房琯崔渙皆幸蜀道中相之詳見肅宗諸臣楊瑒麟游令拒竇懐貞曰所論者民寃位髙下何取韋后表民二十二為下及敗諌有司追其課口奏崔日知先劾李傑儒抗議宇文融撿脫户餘不便祭酒表用諸皆有名言明經不質大義乃取年頭月尾孤經絶句因詔三傳儀禮出身者不任散官言考功嵗限明經進士百人而流外諸色仕者嵗二千徒莭古禮作冠昏䘮祭禮止立碑曰作後人矴石崔隠甫洛陽令請禁中出梨園子弟胡雛殺之諮為御史大夫使自監察御史而下事皆承多得劾正威名赫然暴校外官嵗考一日訖客張說輕其不文與林甫其過罷之不謟仙不得相李尚隠方嚴百劾催鄭典選附勢斥之奸雪李師旦獄二餘家元宗時治王旭贓治浮屠妖妄名治司農吏隠錢穀宻三為御史不以殘摯失處事分明不苛以循吏終始崔沔覆試第一發性舒遲進止雍如所當官不屈為御史請太倉及范囿鳥獸給賑貧乏將劾姚崇子招賄盧懐謹姻家弄法崇等薦為著作以奪其權中書侍郎雖貳宰相舊惟充位沔謂當上下相維毎事多異同張說出之祿議宗廟籩豆姨舅服紀朝廷疑議皆咨之廩散宗族裴寛漼從祖弟判瘞餉鹿刺史韋詵妻之曰為宇文江東覆田官議忌日享廟用樂廟尊忌卑則作樂不附權貴蒲州乆旱入境即雨年河南大治鎮范陽夷夏感附三祿山代之林甫恐其相以計貶之飯兄弟八人皆擢明經治第八院相對擊鼓㑹政清簡人冀其相崔琳與髙仲舒同為中書舍人與宋璟親禮之嘗曰古事問仲舒今事問琳弟珪瑶俱列棨㦸號三㦸崔家不敢用為相元宗金瓶覆名積以族大一床置笏猶重其上韓琬舉茂才刺史行鄉飲餞之非上疏言政尚法不尚徳之弊則天中賦絹時移檄罷督乃奏聞韋陟禮部取人許自通所工先就其能試之然吏部銓綜公平任威嚴簡貴傲視同僚道誼合者雖布衣與均以林甫出之怏怏毁廉隅餉權俸以自結國忠其有文雅名恐入相發其饋遺事貶之刑國忠脅死之共説其遁去陟曰命當爾其敢逃肅宗使招諭永王重其名欲相之以後至疑不用縱新進者望風憚之言其驕倨不得志卒多毎食庖中所棄猶不減萬錢人襲封郇公雲自謂書陟字若五朶雲號郇公五體家法嚴整縚議籩豆議服紀盧從愿事睿宗典選六年以平允聞朝髙宗時吏部稱職者裴行儉馬載至是李隠與從愿開元中豫州課第一號不肯以括田户功為上考宇文白其殖産多田翁以此不得相李朝隠諫誅五王忤㫖貶不執罷斜封官千四百伏成安公主奪民田酬直杖其奴權豪歛裴元宗擢尹河南政嚴清之杖太子舅之奴景先裴寂之後争丐賍死開元典銓以及為御史大夫所引惟細務天下失望王邱童子才獨屬文百修潔錄入仕嵗數百邱考功覈實登科纔采精明無比挺之席豫亦出其下休守懐州清嚴史蕭嵩引當國固辭而盛推韓休秉政薦為御大夫訥言奏白帝多不喜饋清約不通遺嚴挺之名浚之諌觀燈大酺州貢舉平允丞宻啟王毛仲奸濮汴二威嚴左知吏部選謂蕭炅伏獵侍郎凡三年非公事不造九齡欲引輔政使謁林甫上欲用之林甫紿使稱疾去之其溺佛子衰服送浮屠䘮亦自塟於塔武貪暴詳見代宗席豫太平公主將表為諌官恥之遁去畏考功進絀清明典選六年號知人清直謹與子弟屬吏亦不草書曰細不謹况大事耶屬和㝡工許景先宋璟蘇頲擇為御史為文得中和之氣帝自擇刺史潘好禮卧馬下諌邠王獵不清廉械苛細之博學脩整試子通經而徇齊澣請抑諸武迎太子稱蒲州司法争父子俱論死為姚崇給事中解事舍人大政必咨之諷崇年老宜退管勸舉宋璟自代相荅崇不如璟又謂崇不如晏可謂救時之汴州浩繁惟倪若水與澣以清敏聞澣為長棚帟幕聮亘上食東封車騎彌數十里請去王毛仲而自不宻貶為潤州避𤓰步洲徙漕渠達楊子貨倚髙力士得兩道採訪興利以中天子意裒財遺貴倖平林甫惡其行擠之治守陽以黄老清淨為倪若水御史課第一鵁汴州政清浄興學教化大行諌農時捕鶄謂班景倩入為大理卿若登仙恨不得為騶僕苗晉卿林甫專政委以銓事宗厚元載相肅代詳見肅相類崔光逺元宗西狩留尹京兆其懼祿山奔靈武復回京兆賊避鋒見肅宗于休烈志寜曽孫烈善文章偽諫以文籍與吐蕃裴光廷曰休但見情變詐於是生不知忠信節義亦於是在遂與之后肅宗時修史先購求國史諫元日冬至賀皇不治産恭儉仁愛衆推轂士甚年老篤學賈曽睿宗時言伐遼將士制上為太子諫采女樂與蘇晉掌誥號蘇賈至父曽撰則天誥命至又撰元宗傳位冊庠請廣學校争保桑梓者鄉里舉焉在流寓者序推焉王去榮殺富平令罪不可貸王踞謀刺武三思事泄亡命為傭太上為太子時游獵踞常延待於家詭計見子說圖太平公主或率鐡騎誅蕭至忠等共眷委特異號内宰相言其詭譎縱横不可安樂見踈歴九刺史六州二郡其受饋遺數百萬贓豪侈樗博林甫恨恃功使氣發其仰藥死劉知幾字子元授史才妄赦妄之弊介直自守時上書譏武后思慎賦刺中宗時領國史陳五不可而去揚不得改正武后實錄作史通譏評今古自比雄者四壯不喜詩雄老悔雕蟲史通大元釋蒙解嘲談史減價覆醬瓿備委國史於吳競領國史三十年論作史當三長才學識孝劉氏家史人髙其傳夏論衣冠不當乗馬論經當從古文易無子傳老子無河上公註然請存王弼學宋璟不之子貺貺讀説苑廣劉向所遺而刋落恠妄子兹相徳宗吳競史才二貫經史論方直寡諧惟善魏元忠宋敬則後人薦堪譔辨相王之慮慮元宗果而不精上疏乞從諫三諫東封道中馳射實大風上疏任史事以武思等監臨事多不私撰唐書唐春秋曰叙事簡核號良史使書張説欲誣元忠事謂説此競實書之說屢改卒不從還屢貶年老猶願史職林甫不用韋述史才唐兒時誦家書二千卷畧遍詳宋之問以述撰春秋擢上第好譜學百氏源沠更撰開元譜紀脩六典事令狐徳棻吳競撰唐史不能成述分傳文約詳典掌圖書四十年任史官二十年山澹泊純厚史接士無貴賤與均蓄書二萬祿亂獨抱國藏南山汙為官餓貶死楊慎矜聚歛之臣宰父隆禮為開元太府廿年嵗省數百萬相薦三子清白上擢慎矜知太府出納慎餘長安倉慎名含嘉倉發慎矜始議輸物有汙傷責州縣償所直自是調始煩以進不由林甫不敢為御史中丞殺林甫以不文致韋堅之獄且忌其寵與王鉷誣之兄弟皆縊死得宇文融既敗言利者稍息慎矜幸于是堅鉷之徒競以利進韋堅聚歛之臣運慕宇文融聚歛進乃運租賦佐國用鑿廣潭帝升望春樓望之以山東舟三百各陳所産鼓吹鮮衣相銜而進之林甫害其寵授刑部尚書奪其諸使以慎矜代而誣堅貶死王鉷聚歛之臣禁為林甫興大獄撼東宫帝嵗進錢鉅億萬儲中供御按求玉版上號領二十餘使事權勢亞林甫而謹事之日弟銲召術士謀不軌覺並賜死籍第舍數不能徧初附慎矜以貴而佐林甫覆其家凡五年而鉷亦滅王璵以禱祠見幸詳用帋錢後相肅宗見後王毛仲明悟將軍知東宫馬駝鷹狗等坊不旬嵗至大帝暫不見惘惘若有失初見飾擢頗持法東牧監二十四萬後至四十三萬牛羊皆倍數封色各為隊加開府驕滿髙力士等銜之譛於上後以移書索甲仗遂貶死將宋慶禮習識邉事築諭嶺南蠻營治栁城制奚契丹元宗時漁陽城州開屯田八十餘所收在邉三十年罷毎運嵗儲送享晏然郭䖍瓘突厥黙啜子同圍北廷斬之因請募闗中兵擊餘黨韋湊駮之河西節度奏家奴戰功獻副安西都䕶與阿史交訴元宗詔平之郭知運從䖍瓘破突厥與隴右屢破吐蕃號屯西方戎夷畏憚王君㚟功名等王郭王君㚟初事知運後代為河右隴西節度其㣲時與回紇四部君長狎至是不相得言叛遂為所攻殺張守珪君㚟死後守𤓰州完城虜至置酒其上虜疑因擊敗之詔為都督鎮隴右鎮河北契丹奚連年梗邉大敗之帝以告九廟其酋懼詐降又盡滅之詔立碑紀功匿烏知義之敗賂牛仙童貶卒獻誠喜功名政寛裕有機略簡廉不逮其父獻恭有軍功杞諫徙盧王忠嗣九嵗父海濵戰死見帝號泣養之宫中與肅宗游及長雄毅寡言論兵應對蜂起代州别駕大猾閉門自歛數恐其年少復讎不得特將請精鋭數百斬虜千為河西杜希望單馬馳破吐蕃不討奚桑乾三遇三克為上平戎十八䇿突厥敢盗邉本負勇敢將乃持重安遂不生事常曰平世為將撫衆而已不欲竭中國幸功名訓練士馬而弢弓示無用時出竒兵所向必克西朔方自張仁愿後四十年忠嗣繼其功佩河隴右朔方河東四將印控制萬里不狥帝取石堡城林甫又短之㑹董延光取石堡不克訴忠嗣沮軍又言祿山且亂林甫因誣告下獄貶死免髙價市蕃馬以攻石堡時李光弼請立賞進取禍曰吾不忍數萬人命易一官哥舒翰王忠嗣使討吐蕃副將踞見殺之吐持半段鎗擊吐蕃所向輙靡馬驚陷河蕃三將欲刺之翰大呼皆不敢動五追賊常擬鎗于肩叱使回顧因刺其喉騰之髙尺忠嗣得罪入見帝叩頭泣言其枉下為隴右節度弟應龍滅吐蕃不敢近青海時天富庶無如隴右攻石堡城不下欲斬將期三日而下京與祿山不恊統國忠厚結之嗜酒色疾廢還祿山反代仙芝舊卒為元帥號二十萬守潼闗擊走慶緒然病不能治事與安思順不恊疏七罪請誅之或勸其誅君側國忠懼廹帝趣翰出闗復陜洛子儀光弼極言不可國忠廹之行翰働而出遇賊靈武大敗降祿山兵存者八千潼闗失守上奔蜀衣後為慶緒所殺嚴而少恩不恤士帝勞師士訴穿帝製袍十萬賜之鐍藏不散髙仙芝夫䝉靈詧表副安西都䕶天寳六年以萬騎討西北二十餘國因深入降七十二國遂代靈詧為四鎮節度討石國王降俘獻闕下斬之西域由是不服東祿山封常清敗因急趣守潼闗粮監軍邉令誠數千以事不從因誣以棄陜地減賜招就軍中斬之軍中呼枉其聲振地貪家貲鉅萬然與人亦不惜封常清苦求為仙芝傔常從擊達奚宻作露布遂知名仙芝征討知後務杖殺其乳母子反憚其闕上才果無疑事市勤儉耐勞苦守祿山大言於自任平賊募井庸保六萬河陽橋大敗祿山遂陷東京奔陜勸仙芝守潼關凡三表陳賊形勢皆不達與仙芝俱見殺忠義李憕張說因相者言其貴妻以甥引置幕府于宇文括田表為御史分道撿覆給事中力治有任事稱明簿㝡下無敢紿干林甫出之河南裁抑蕭炅不聽道士孫甑生政守清河興美政山遷廣陵民立祠去尹京國忠惡之使守東都祿兵薄城官校皆與盧奕相約死之十餘子唯源彭得脱不源彭以父死於賊不仕娶絶葷酒盧弈持重寡欲官鄠令治最皆居中丞清節相似自父懐慎兄奐三人留臺東都城陷朝服坐臺被執數祿山罪諭賊以逆順臨刑西向拜辭罵賊不空口賊黨變色子杞杞子元輔端翰介正能紹其祖三少以清行聞杭常絳州皆㝡張介然謹愿長計畫署守河隴支郡貴王忠嗣哥舒翰鎮河隴皆用之以富不為鄉人知求列㦸故里本鄉得列㦸始此陷祿山反使守陳留全郡未三日賊至城死之卓行元徳秀負母入京舉進士貧以親亡不娶曰兄有子兄子襁褓䘮親無資得乳母自乳之苦貧求為魯山令蔿縱繫賊盗格虎言大酺召聲樂獨使樂工歌于于帝嘆賢人之俸衣食孤遺嵗滿餘一縑嗜爱陸渾山水定居者無僕妾嵗饑或日不㸑酒陶然以酒肴從不問賢鄙士房琯嘆紫芝眉宇平李華兄事徳秀而友蕭穎劉迅作三賢論生未嘗識女色視錦繡茍辭佚色未嘗有十畆之地十尺之舍十嵗之僮未嘗完布帛而衣具五味而食卒諡為文行先生權臯祿山籍其名署幕府臯知其必反度喑直視而瞑使所親唅歛之而宻逃南奔江永王舉兵詭姓名免今病客洪州南昌令欲按中人過州未取臯泣曰何由致天子使而遽欲治之真卿表為司馬召拜起居舍人固辭曰吾潔身亂世以全吾志欲持是受名耶李季卿列其髙行以著作郎召不就韓李華桞識韓洄王定皆仰其節與友善泗等為制服子徳輿甄濟居青岩山環山不敢漁畋之祿山强署之置羊血偽嘔血歸祿山封刀召濟引頸待肅宗使汙賊官羅拜饑節用給親里子逢讀書自力不謁州縣請嵗出家貲周朋友緩急欲載父名國史袁滋表濟行與臯同科元稹移書史館韓愈愈謂逢與其父俱當得書孝友張琇復讎琇父審在雋州以被誣謀反見殺于御史楊汪年十一與兄瑝徙嶺乆之逃還祖殺汪而以狀繫于斧卒九齡以為宜貸耀卿等殺之陸南金匿盧崇道自逃逃嶺南侍御史王旭按之弟趙璧争匿崇道者我兄又言弟自誣元宗皆宥之隠逸王希夷牧羊取傭葬父母問隠嵩山師黄頥學養生餌松柏刺史政曰己所不欲勿施於人政東封詔州縣敦勸見行在年九十帝令張說訪宦官扶入宫與語甚恱敕州縣致酒肉帛盧鴻愽學善書謁廬嵩山禮開元初再徵不至以五年下詔至不拜曰者忠信所薄臣敢忠信見堂嵗給米百斛絹五十徒歸為營草到山中廣學廬聚五百吳筠舉進士不中居南陽入嵩山從潘師正天寳召至願𨽻道士籍待詔翰林答帝深於道無如老子㣲答治鍊非人主所冝留意力開陳皆名教世務言諷天子沙門嫉之髙士事佛共短之剡求還嵩山詔立道館詩祿山亂入茅山又入文章詆釋氏歌李白祖甲乙司馬子㣲事潘師正傳道引辟穀術師正謂我得陶隠居正法建而四世矣徧游名山廬阜天台術武后召之即歸之睿宗使其兄承偉召之問其曰為道曰損損又損以至於無問治國曰國猶身三體書老子開元召至王屋山置壇室以居按玉貞公主光祿卿韋縚至所居金籙設祠厚賜賀知章陸象先謂季貞清談風流一日不見鄙吝生擢道士超㧞羣類科張說表撰六典等書累年無功兩遷禮部侍郎兼集賢學士一日併謝源乾曜謂命之榮元宗自為贊賜之申王薨選挽郎不平䕃子喧訴知章梯墻出首以决事晩節尤誕放遨嬉里巷自號四明狂客祕書外監寳草𨽻十數字世傳為寳士醉屬辭不停筆天初夣游帝居乃請為道還鄉以宅為千秩觀而居湖剡川一曲求周宫湖為放生池賜鏡帝賜詩皇太子百官餞送儒學馬懐素晝樵夜燃以讀崔中文學優贍科相監察御史不為武后按慎貞反劾宰李逈秀藉易之勢歛賄才為十道使黜陟江西處决平恕考功覆取實不阿權貴請謁手未嘗釋卷元宗詔禇無量更日侍讀帝日送迎以師臣禮詔舉校袐書文籍然不善著述無所叙别禇無量龍出若不聞預祭天解官尤精禮史記翼争韋后不當侍讀東宫進善記號訴犯墓柏鹿鹿為馴擾崇以耆老許腰輿入殿因頻上書陳得失鄙姚太廟符堅故殿之言上疏請出後宫舉賢撙奢輕賦謹刑納諫詧諛繼絶幸東都請致祭古帝王賢臣序功臣絶世從之學請檢校求遺書四庫完治是太子及四王未就以孝經論語五通獻帝於各為選侍讀太子齒胄于學詔無量升是上謂無量朕師後康子元侯行果亦踐選而禮遇衰康子元㑹稽人說開元詔舉治易老莊者元侯行果薦之張遂侍讀東封説引子行果徐堅韋縚商裁封禪儀神子元請先祭後燔行果趙冬曦謂祭已而燔則無由降說稱康子獨出蒙輪當一隊邪議侯行果上謂更求善易者無賢行果殷踐猷通氏族歴數醫方五善知章陸象先韋述知章號五總龜千年聚問無不知舉文儒異宰吏叔父䘮哀慟嘔血卒不子寅舉宏辭指殺侮慢貶寅且死以母老忍决子亮斷剪髮置棺中誓事祖母祖母疾不脫衣者數年白燕巢楣元行冲名詹仁少孤養於外祖韋機魏博學尤通故訓傑謂吾藥籠中物典事詳文約學者尚之辟得銅器似琵琶知名阮咸謙以書生非彈治才闗内按察奏彭王子志株蔓獄量不樂法家謝大理官孝繼懐素撰晉書因繼無校四庫書元宗注經詔為疏帝魏光乗請命與諸儒疏魏徵類禮列于經立之學張說以戴禮不可罷止之行冲疑諸儒間已著釋疑言小戴行於漢末其書紛雜魏氏正之陳貞節議隠章懐懿徳節愍四太子陵廟禮不當與列帝侔裴子餘駁之止减吏卒之半議昭成皇后配睿宗肅明皇后不當並升男議奉中宗别廟升睿宗繼髙宗為七室伊缺子孫平子上書非之援經辨數愽士不能屈然蘇頲右前議卒不復中宗於廟惡武后明堂瓌侈請以明堂復為乾元殿盧履􅖅言古禮父在為母朞徹虚而心䘮武后始同父三年非是又陳父在為立几筵者一朞心䘮者再朞父必三年而後娶以達子之志古行冲亦謂妻䘮杖朞者逺嫌疑尊乾道也請據詔服紀一用古制自是或朞而禫禫釋心䘮或朞而禫三年或齊衰三年施敬本講求封禪儀鬱舊制盥手洗爵侍中主之敬本謂大宗伯人掌祼事漢用侍中皆褻臣今侍中位宰相非鬱人比為舊制祀天神太祀主之敬本謂古二君相見卿賔况天人之際今太祝乃下士王仲邱請合顯慶貞觀二禮大祀並用趙冬曦中宗時請定科條直書其事以凖加减隋律曰律無正條自是憎愛為輕重開元時集賢院修撰禪與康子元議封儀尹愔父思貞春秋擢髙第夢釋奠講辨三教卒撰諸經義樞續史記未就天官麟臺交辟愔博學尤通老子為道士史元宗尚元言召對甚喜辭集賢兼脩國詔以道士服視事鄭欽說解梁太常任昉所得鐘山壙銘李林甫惡之貶卒文藝李邕父善淹貫不能屬辭號書簏邕注文選益諸生四逺至傳其業號文選學少為補之附事見義兩書並行了見李嶠求假直祕書讀書未幾謝去奥篇隠軼辨如響嶠與張廷珪薦文髙氣方直才任諫諍拜拾遺昌宗奏諫中宗用鄭普思大言請聴宋璟劾僐張柬之貶韋氏敗拜侍御史彈劾任職東元宗時廷珪授為中丞姚崇疾其隂操黜之封召見獻賦矜肆自謂且宰相從與張說相惡㑹坐贓孔璋上書請代得減死中人楊思勗討嶺南賊起守括州喜興利除害復坐誣得罪填入朝眉目瓌異阡陌聚觀後生望風内謁門巷隘中人臨問索所為文章於以䜛出守汲郡北海鉅林甫就郡杖殺之長碑頌金帛請文者萬文名天下號李北海八盧藏用謂如干將莫邪但虞傷缺畋杜甫為作哀詩資豪不治細行在所賄謝游自肆以敗吕向一筆環冩百字若縈髮號連錦書諷賣藥即市閱書上美人賦諷花鳥使詩校獵帝自為文西岳詔向鐫勒父東封諌以番酋入仗内朝回道見老人乃其以李善釋文選繁醸與吕延濟劉良張銑李周翰更為詁解時號五臣註王翰豪徤恃才類張嘉貞偉其人張說禮之益加鼓舉起㧞羣聲技視王侯豪俠游畋伐窮歡貶卒孫逖崔日用令賦士火爐與定交年十五麗舉手筆俊㧞哲人竒士隠淪屠釣及文藻宏等科及賢良方正外考功取真卿李華穎士等齊八十猶為令求降官増父秩開元間蘇頲澣蘇晉賈曽韓休許景先典詔誥為最而逖尤精宻九齡視其草不能易一字子成李白宗室謂夢長庚生少客隠岷山舉有道不應縱蘇頲天木英特益以學可比相如喜横居任侠輕財飲與孔巢父韓凖裴政張叔明陶沔徂徠山沈號竹溪六逸賀知章見其文稱謫仙言於元宗召見金鑾論當世事奏頌面賜食親調羮沈香亭召之已醉於市以水頮援筆成文不醉使髙力士脫靴故帝欲與官楊妃沮之知為親近益驁放不自修與知章李適之汝陽王璡崔宗之蘇晉張旭焦遂飲中八仙依求還山浮游四方祿山反徃宿松康廬間永王璘流璘起兵逃彭澤塗璘敗郭子儀請解官以贖得夜郎歸依當令李陽冰代宗以拾遺召已卒恱姑孰謝家青山欲塟之二後裔惟二孫女為民妻告之范傳正為改塟女有風範不肯改嫁張旭吳人張顛大醉呼呌狂走乃下筆或以頭濡墨盡尉常熟老人陳牒求判因見其所藏其法孫始見公主擔夫争道又聞鼓吹得筆法意觀公舞劒器得其神後人於歐虞禇陸書皆有異論至旭無非短者裴惟顔真卿崔邈傳其法文宗詔以白詩旭草旻劒舞為三絶裴旻為奚所圍舞刀立馬上矢四集皆迎刀而斷且守北平日射虎三十一父老曰彪也遇真虎敗小虎出叢大吼弓矢皆墮自是不復射王維九嵗屬辭之弟縉齊名陽孝友為九齡擢拾遺祿山獲以藥下利瘖廹給事中賊合梨園樂作詩悼痛故得免罪為自表五短縉五長乞免右丞而使縉還京師時蜀州作書别縉及親故停筆而化思草𨽻畫名盛開元天寳間貴人虚左以迎畫入神别墅輞川圖觀案樂圖事沈存中辨其妄樂兄弟奉佛不食葷衣綵代宗問維章縉上之鄭䖍或告其私撰國史蒼黄焚之坐謫十年而元宗愛其才置左右以不事事為置廣文館以為愽士䖍聞命不知廣文曹司所在訴於宰相壊廊不修寓治國子監館遂廢善圖山水雨好書無紙取慈恩寺柿葉𨽻書病冩詩并畫以獻帝稱鄭䖍三絶祿山刼之稱求攝市令潜以宻章達靈武兵為崔圖繪齋壁得免死錄䖍長地理山川物産戍無不詳天寳軍防諸儒服其善著書天在官貧約汙杜甫贈詩附鄭相如預知寳事戒無偽官故不賊蕭穎士四歳屬文父十歳補大學佳一覽即誦裴進士第一旻抵罪以有皃得宥耀卿等先進與均禮故名播天下子奉使括遺書淹乆被劾客濮陽授業號蕭夫以父䘮不肯見林甫林甫怒不下已頴士作櫻桃賦譏之史依春秋為編年書司馬昭弑帝書陳霸先反官韋述薦自代不屈林甫免官大倭國願得蕭夫子為師知祿山必反托疾薦室山祿山反見河南郭納謀守禦納忽不用請見山南源洧諌毋退保江陵不受永王召宰相崔圎扞江淮劉展果反門圓以為揚州功曹人後客死汝南逆旅人諡文元樂聞善推引後進皆名士天下推知人李兄事元徳秀而友殷寅真卿等與李華稱蕭與陸據李華讀龍門路傍碑穎士即誦華再閱據三乃記冨奴事之十年笞楚不去云愛其才惟許子昻嘉謨盧蔵用之文董南事孔述眷之愽學李華慕汲黯誅守䇿劾國忠支婭州縣肅然輦母逃賊見獲署偽官祿山反上自以隳節危親肅宗召之不拜家客山陽勒子弟力農帛晚事浮屠不甚著書惟傳墓版州縣碑頌金强之乃應書大歴初卒頴含元殿賦君弔古戰場文汙為故置梵書度士讀之謂加思慮便能至觀宗子翰從子見肅宗孟浩然襄陽人維好節義署振人患難問九齡王維稱道邀入内元宗偶至詩對不才明主棄赴採訪使韓朝宗約偕至京薦之㑹劇飲歡甚不背疽卒王維過郢州畫像刺史亭名浩然亭鄭減改孟亭王昌齡崔顥與浩然同名開元間皆位不顯不顧細行顥好飲愽娶美妻方枝張果善息氣能累日不食仙自謂生堯丙子嵗位侍中召問神事未幾卒姜撫韋縚言其數百嵗召之飲自言服春藤上采賜中朝老臣民間以酒漬多暴死乃止遂慚逃外戚王仁皎元宗廢后父名避職不事委逺譽楊國忠太真從兄為相見前宦官握兵故禍慘始於明皇盛於肅代成於徳宗極於昭宗楊思朂姓蘇蠻元宗討四難為爪牙萬開元初大敗安南平五溪亂斬首三平邕州封陵僚梁大海坑其黨六萬平龍州蠻騺忍敢殺髙力士馮盎曽孫累嶺南李千里獻二閹曰金剛力士武后逐之中人髙廷福養之元宗在藩傾心附結方以誅蕭岑等功為右監門衛將軍知内侍省四奏請先省後進小事傳决宇文融林甫國忠祿山仙芝等皆厚結之得將相右牛仙童邉令誠等寵雖與力士等亦藉力士左㸙肅宗在東宫以兄事它王公主呼翁戚里尊曰諫以天下事付林甫帝不恱由是還内宅不復事人以隂巧得譽有素思藝者亦帝愛幸驕位見惡士天寳初置力侍省與力士同爲之上幸蜀藝臣賊而力士從幸誣在蜀諫何憂之語帝從上皇西内十日李輔國流之赦還見二遺詔慟哭嘔血死悍南䘮師北兵强因贊立肅宗為太子所言雲大雨言權假宰相致天下事庸可復安下親昵覆敗不為救相宇文以來權利相賊階天之禍雖有補益弗除云酷吏王旭珪孫道斬易之兄昌儀三斬韋后黨周仁軌絓盧崇嶺外逃歸殺其子凡海内名士皆染流徙虬與李嵩李全嚴酷號三豹之製獄械紀希使奴事之得其罪數千上遂貶死吉温頊從子罷薛嶷引見元宗上目之曰是一不良我不用之京兆尹蕭炅使為林甫訊李適之張垍偽選十六人日中獄具使自謂若遇知己白額虎不足縛炅薦之林甫除不附己者錢塘羅希奭為奔走椎鍜敦殺栁績積尸大理垣下并遣希奭杖殺李邕裴復及皇甫惟月韋堅殺楊慎矜連數十族薦號羅紺吉網右媚國忠祿山謂祿山曰君若我為宰相則相可擠右相即林甫廷祿山大恱鎮河東表自副上國忠引為中丞朝動靜不淹宿即報祿山欲使代希烈相國忠以附祿山用韋見素代之見祿山國忠争寵温昵祿山遂貶既而與希奭皆殺上聞其斥曰温本酷吏子朕過用之故屢搆大獄今斥公屬安矣祿山反授其七嵗子河南參軍以報之奸臣李林甫見前相類安祿山營州栁城胡隨生有祥張仁愿搜其帳盡殺之匿而免母嫁虜將安延偃遂姓安張守珪使與史思明俱為捉至因為養子中丞張利貞採訪河北祿山百計媚之入朝盛言其能天寳初為平盧節度禁林甫請專用蕃將故帝寵益堅帝使出入宫為貴妃養兒起第京師服御擬乗輿燕太子九齡言其反不信李天寳十三載反僣號肅宗立其子慶緒使猪兒殺之詳見肅宗肅宗顔真卿因蠟丸頒赦河南北江淮而諸道徇國之心始堅郭子儀將兵五萬至靈武而人始有興復之望張廵許逺死守睢陽以全江淮而東南賦入得濟中興之需廣平王俶即代宗與郭子儀復西京東京史思明囚安慶緒使者降張鎬請勿假以威權上不從而思明復陷東京其亂終帝之世右復兩京及再亂事請兵回紇賣官濟軍興又專以官賞諸將大將軍告身纔易一醉而名器之濫極子儀光弼討安慶緒以宦官魚朝恩為觀軍容使而忠臣義士自此不得盡其力平盧節度王元忠死令察軍中所欲者立之而節度使之廢置自此一出軍士王璵專依鬼神求媚為中書侍郎置道塲禁中李輔國專掌禁兵制敕必經輔國押署然後行上皇居興慶宫輔國矯上語迎居西内上欲誅之畏其握兵不敢元載為租庸使按籍舉八年租調逋負籍所有中分之甚或十取八九名白着李輔國初與張后表裏專權遷上皇後交惡后謀誅之謀泄見殺輔國繼為盗所殺右紀綱大壊矣郭子儀守靈武以朔方軍討祿山收雲中馬邑開東陘光弼已拔常山與合兵攻趙郡敗思明于嘉山河北徃徃斬賊迎王師方與光弼率五萬赴靈武國威大振帝惟倚朔軍為根本賊將誘河曲胡廹行在子儀以回紇平之俶敗崔乾祐於潼闗闗陜始通與元帥廣平王復長安東追敗賊于潼闗克華隂宏農郡都進取河陽河内執安守忠追敗慶緒復與九節度進討慶緒於相州而魚朝恩監之王師無統以及于敗朝恩因譖罷之以光弼代領朔方兵思明再窺河洛西戎逼擾以為鄜坊節度重京師言天下未平不宜置散地出鎮邠州黨項遁或以為諸道都統率兵趋范陽定河北朝恩沮之帥光弼敗邙山失河陽河中太原亂遂以為副元封汾陽王屯絳誅首惡諸鎮皆奉法與代宗立為朝恩元振所譖遂表解元帥節度光弼齊名而寛厚得人過之吐身為天下安危二十年却回紇蕃事並詳見代宗李光弼王忠嗣遇之厚於諸將曰他日得我兵義祿山反子儀薦持節河東救常山獲安思不殺問計敗思明于九門之又追敗之趙郡㧞趙進圍愽陵又與子儀敗嘉山降河北十餘郡欲竟趋范陽㑹潼闗失守乃赴靈武明入太原斬侍御史崔衆威震三軍兵不滿萬思以十萬攻之敗走留蔡希徳攻之亦敗走思九節度敗慶緒鄴西光弼請逼之魚朝恩不許明來援諸將驚潰獨光弼整衆還太原精代子儀為朔方無所更易號令之壁壘旗幟皆明天下兵馬副元帥思明窺洛光弼馳入東都進軍河陽大敗賊於中澤再戰就軍中擇郝廷玉論惟貞督戰大敗之禽周擊等渡安太清走據懐縣進圍之而留雍希顥守野水使勿戰與賊將髙暉李日越同來禽太清復懐州弼又破思明於河陽朝魚朝恩言賊易滅詔促光戰僕固懐恩隂佐恩違光弼命陣于原官軍大敗于邙山懐州復陷上召光弼入朝史朝義乗邙山之捷進略申光等十三州光弼輿疾破平之人朝恩征相州北邙之敗忌之程元振亦忌之二用事日謀中傷吐蕃犯京師代宗詔入援遂畏禍不敢行敢幸陜猶倚以為重卒不至軍中指顧諸將不仰視李郭齊名而戰功為中興第一相常見素詳見元宗寳與崔渙房琯奉冊至靈武崔渙喜其占奏即拜相淡肅宗立與見素赴行在以選補不精出簡自處慨論元載奸貶死李麟宗室非好學善文為河東有清政以祿山反以儒者禦侮材還祭酒為相宗子獨留繼百司取苗晉卿崔圓等皆附輔國安獨守正不阿順崔圓銳功名及元宗西幸至河他供帳皆備盛陳蜀土豐稔甲兵之盛即日相之肅宗召赴行在為製遺愛碑于蜀汾留守東都值相州之敗委東都奔襄陽守懐以治行稱鎮淮南六年吏民乞留裴冕明鋭歛塟嘗為王鉷判官鉷得罪辨其誣鉷死為副肅宗為帥募驍勇十餘萬與杜鴻漸勸進遂相程請賣官鬻僧道濟軍之子儀言其有社稷功為元振所構代宗遂相入拜不能興元載舊為其所甄引代之贊謝而不知宰相大體豪侈僕射中忠勤自將見俸簿月二千緡喜見顔色相李輔國諷使薦己為房琯父融相武后㝡作封禪書說張說得用岩為縣主徳化為治為華清宫驪山疏剔藪傾幸蜀追及拜相機奉冊至靈武肅宗以有重名意待之參決務諫以第五琦為租庸使是又一國忠上曰六軍方急無財不能對離賀蘭進明言琯大言無當因以永豐王統兵事間之上疎之卿自請平賊用春秋車戰大敗於陳濤斜顔真劾之多言其請包文武可復用上怒之出為邠州人以便安政聲流聞為好老子浮屠髙談有餘天下多故不以職事意而欲從容鎮静以輔治言又知人不明故功名隳損不史贊稱唐名儒多琯徳器有王佐才若承平失為名宰苗晉卿林甫委銓事曵以中丞帳倚子奭為書判壺魁元宗覆實白河北政化大行望闗縣門輙步自郡太守迎犒立飲白釂宰以老辭致仕肅宗扶風召相大漸攝冡代宗立固辭始老蹇甚間日入政事堂召對小延英對小延英此寛厚所至稱惠化再秉政出入七年小心謹畏不甚斥是非得失故保寵名而練達事體百官簿最一省無遺人比胡廣諌用李輔國為常侍其諌論陳希烈死所陸贄請進其子官因言謙柔敦厚三朝推厚元載張鎬好王伯大略二年至宰相嗜酒中國忠薦為已重彌布衣諫禁道塲曰當修徳亂未聞飯僧可致太平許叔冀狡獪必變察思明以范陽獻順之偽及鎬不結宦官皆盛言思明叔冀之忠遂罷相後果叛雖後為撫州洪川平諸冦廉簡在位淺天下推舊徳王璵少為禮家肅承元宗意專事禱祠為初效俚俗用紙錢宗立亦以禱祠見寵中書門下平章事中外大駭史左道紛進下山川至黄州刺左震斬之分遣女巫禱天作天華上宫露臺昭應令梁鎮上書停之李峴宗室人京兆尹幸温湯獨無所獻李出守零陵政得心京師謡曰欲粟賤追峴相肅宗經綸為己任事多獨决上待之恩意亦厚處李輔國制敕不出中書峴極言其惡始停口敕分各歸有司御毛若虚希輔國㫖變亂謝夷甫獄峴謂示無史臺帝出峴相代宗事見後李揆諫上皇翊聖號人取士陳書中庭約使盡言决既相帝嘆門第物文學三絶善奏對事明當鼠銳進近名六忌吕諲入相搆之死謂元載麞頭目流落十年丐食取給載獨用盧杞惡之為入蕃使輔酋長問唐第一人李揆是公否本傳稱格李國羽林騎激栯京師之議而輔國傳謂當國以子姓事之號五父吕諲勤謹人事哥舒翰諸僚出遊獨據案鉤視簿最由中進於肅宗所陳無不納為使按羣臣之汙贓者人憚其持法為上憂九節度敗相之請釋衰拜賜㦸引妻父卿妻舅為郎從中人與人以官遂罷史鎮荆州請置南都而改為江陵府伏甲為長斬陳希昻暴李輔國所擢妖人申泰芝悪其威惠兩行復用使人刺失上逐揆李揆恐其以善治聞在朝不稱職荆州號令明賦役均治尚威信境無盗賊民歌詠之至徳以來方面數十人為最薦杜鴻漸元載嚴郢請諡二名獨孤及議美惡不在多名第五琦勸賀蘭進明出賊不意收所陷郡出遣奏事肅宗陳令急在兵兵强弱在賦賦江淮為淵請假臣一職悉東南寳貲飛餉函洛上恱拜江淮租庸使塩鐵鑄錢使鹽鐡名始此當軍興隨事趣辦人不益賦而用饒十鑄乾元錢以一代十為相又鑄重規一代五㑹物價騰踴饑饉相望議者非之貶忠州具或告其納金曰位宰相可自持金耶有司以為服流之起為朗州有異政度復領鹽鐡等使子峯婦鄭皆以孝著表門為支患豪將求取無節始以左藏財賦進大盈庫事見楊炎傳蕭華謹重方雅國陷於祿山間道奉表欲以魏為内應李輔求宰相拒之輔國矯詔罷之元載輔國請罷華而相之見代宗裴遵慶外晦内明不干當世之役夫怨蕭克濟有醜言有司論大逆争全救數十族吏事第一忠知選强敏詳視簿牒宗以厚大臣使宣慰懐恩蕭華薦之相選代復以僕射知事優其老聽就第注官削性惇正老而彌謹賢薦賢恥謝諫從益畏藁史稱中人之子向以學行特户門曽孫樞相昭宗諸臣顔真卿字清臣使師古五世從孫雨少孤母教察御史河隴辨寃獄而號御史雨監使河東劾朔方令鄭延祚三十年不葬母終身不齒殿中侍御史時吉温以私危宋渾曰奈何以一時忿危宋璟後舟楊國忠出為平原守山知祿山反宻為偹而泛飲酒以紓其疑祿反河朔二十四郡惟真卿守兵募兵大饗慷慨感厲十七郡同日自推為盟主二十萬清河太守使李蕚乞師從之斬賊萬級河軍費困竭㧞景城鹽自助思明尹子竒復陷北惟平原愽平清江固守百度不可抗納赴行在拜御史大夫䋲治如平日官肅然京復告宗廟祝署嗣皇帝真卿曰上皇在蜀可乎乞築壇東向哭備宰相出之事唐旻誣之貶饒州鎮浙西以預劉展為生召為刑部侍郎宗上皇遷西内率百官問起居李輔國貶之代自陜還請先謁陵廟而即宫斥元載朝廷豈堪公再壊遂載請羣臣奏事先白長官長官白宰相詳可否疏極論載奸載貶之陜州使為撫湖刺史烈載既誅楊綰薦之陷之諭希烈希使李元平說斥之盧杞朱滔等使者謂求相孰先太師又斥之而希烈屢脅之終不屈遂見害逮事四朝剛有禮天下稱曰魯公穆寧以息屬母弟從真卿於平原用勸真卿固守上真卿亡過河見肅宗自言不寧言至此欲以為諫議㑹真卿以直忤亦罷臣光弼檄取粮不予曰命寧主粮者敕也李忠與夾淮為治刼掠遂衰漕賈得通數或以和州天寳舊版校户劾之御史覆視則増倍然不事權右毅然寡合執政惡之雖直亦置散位贊從奉天回曰可行吾志矣即罷寧之老四子為御史中丞質右補闕員侍御史賞監察御史皆守道以行誼顯法家令訓諸子先是韓休家訓子姪至嚴稱家者尚韓穆二門李嗣業善陌刀從為髙仙芝陌刀將破吐蕃十萬於娑勒平石國及突騎施跳盪先登號神通大將城仙芝敗於石國嗣業救之得還恭表鎮疏勒築屢壊禱之白龍見城成禱耿故井泉復出相足蹶葱嶺大石元宗時犯與諸將赴鳯翔割臂盟所過州縣秋毫不可帝喜其至曰卿至賢於數萬衆相統前軍復長安復東都戰功居多九節度圍州獨披堅執銳為諸軍冠中流矢病聞戰大呼卒於軍不及于潰賞賜皆上于官助軍九節度者朔方郭子儀庭淮西魯炅鄭興平李奐滑濮許叔冀鎮西北李嗣業蔡李廣琛河南崔光逺而河東李光弼澤路王思禮將所部助之王思禮從哥舒翰敗數勸翰誅國忠相州之與光弼軍獨完從復東西京善守短攻拜司空不為宰相而拜三公始此魯炅顔真卿問哥舒翰得人乎翰指示之曰當為節度鎮山南賊圍之南陽一年晝夜戰力竭奔襄陽然賊欲侵江漢賴炅扼其衝南夏得全相州敗中流矢奔潰兵剽掠炅軍尤甚辛雲京世將家州有膽决四禽生斬馘常冠軍原思明屯相以鋭兵千追襲破之太軍亂上以其性沈毅使尹太原賞罰絲毫不貸軍中畏信回紇入朝所在暴鈔過太原以戎狄待之虜畏不敢惕息来太原大治為徳宗時第至徳以將相雲京次馬璘讀馬援傳馬革褁尸慨然鳯挾冊從安西府累立竒功率補甲三千赴翔初戰衛南以百騎破賊五千三從光弼攻洛陽以邙山之戰先率五百騎出入反光弼謂未見少擊衆雄捷如馬將軍者士龍而雨破吐蕃與不赦元日犯盗之卒術徹大歴間琿咸破吐蕃少學武幹絶倫者治第侈甚徳宗毁其中寢而禁第舍踰制亭館入官為羣臣賜宴之地李光弼將荔非元禮中潬破周摯代李嗣業卒於相州之郝廷玉善格鬬善布陣李國臣栢良器年二十四更六十四戰伏弩解李希烈寜陵之圍李抱玉從光弼戰河陽差功第一詳見代宗崔光逺元宗西狩留為京兆尹奔斬乗火亂入宫闕者斬賊將懼祿山靈武上使復為京兆州回至渭北斬賊二千自是賊常避其鋒飲鎮魏潰圍走誤斬良將李處崟鎮荆襄沈賊郭恒約黨項入㓂卒成都平李奐而不能禁士之剽掠李泌見肅宗靈武議國事姊辤官諫勸幸彭原俟西北兵賦諌與張良愽賜張良姊七寳鞍命諫良姊正位中宫宜待上皇請迎上皇相徳宗詳見後杜鴻漸肅宗按兵平凉未知所適為定計至靈武力勸即位相代宗詳見後李勉靈武劾大將管崇嗣背闕坐笑帝嘆有勉乃知朝廷之尊諫殺闗東俘後歸者自至詳見徳宗王栖曜一矢殞祿山將邢超遂救曹州見徳宗來瑱尚名節潁有大志甚張鎬薦能斷大事有禦侮才守川破賊衆人目為來嚼鐡鎮山南兩破思明餘黨襄漢士宜其政詔朝廷易鎮諷衆留已裴荗表其恐難制代宗代鎮而圖之荗大敗被禽死程元振譖之流田神功嘗戰不勝降思明河禽劉展光鎮淄青屬鎮兖鄆解宋圍鎮南見弼待官均禮始折節謙損路嗣恭神烏臧姑二縣考績為天下㝡儲渭南令主杜化東陽二驛當闗畿用兵具有素子儀以靈武初復百姓凋弊戎落未安請以嗣恭鎮朔方披荆棘立軍府威令大行江西觀察善治財賦角嶺南將哥舒晃殺莭度大擾平之明因晃事誅賈沒其財數百萬為元載䕶賈觀出竟功代宗時賂楊炎錄前三事貪而無識李適中有道科人哥舒翰敗于潼闗請竭禁藏募死士言中監軍之弊因言臣數言之不聽故陛下有今日行國負氣敢言權近側目宗言諸生不可分鎮輔惡其才毁之諫肅分劒南為東西川兩鎮百姓弊于調度名鎮西川失松維二州語王覇衮衮不厭功自許言浮其術為政寛簡所涖人便時五十詩即工毎一篇即傳布令狐彰自思明處籍士馬州縣獻欵遂鎮滑亳魏博田疇大闢貢賦如期遣兵防秋所過不受供儗財將死赦子歸私第李悉上軍府兵仗用簿㝡表劉晏勉自代烏承玼與族兄承思號轅門二龍丹飭史思明束身本朝敗奚契子重𦙍僕固懐恩鐡勒側人鬬識戎情自正觀世為金徽都督下善從郭子儀討祿山雲中馬邑武㑹光弼于常山趙郡走思明殊與子儀赴靈子玢敗降虜㧞歸斬之將士死戰破其衆紇奉詔乞師回紇從從子儀下馮迎河東衛統回兵從復兩京子儀破安太清下懐州攻相州為先鋒常然剛决犯上子儀能優容之光弼代子儀懐恩悒悒不樂印山之戰不用令故敗叛代宗立遂叛引吐蕃回紇入冦卒為臣以後詳見代宗叛臣類李忠臣即董秦平從劉正臣赴難屢立戰功褒與田神功下原樂安破慶緒將下詔諭從子儀圍相州平陷思明挈五百人冐圍歸光弼詔賜姓氏與東都至徳宗時遂為叛臣詳見代宗徳宗臣類李懐玉即李正己希從侯希逸淄討史朝義為代宗初軍士逐逸而代為青節度遂藩鎮宗詳見代藩鎮類劉昌史朝義圍宋州說李岑屑麯堅守見徳宗韓滉聚歛鉤軍興賦稅無藝滉深文録詳見代徳宗崔羣乞上勿問子儀家與嬖人争財之訟人謂識大體誥吳少誠擅决洧水溉田竦然聽命韋陟招諭永王璘翔與髙適來瑱盟辭旨慷慨王永王敗趣赴鳯陟馳徃慰諭李廣琛從永亂者帝疑顧望不用詳見元宗于休烈修史后諫冬至元日賀皇詳見元宗栁芳史臣取繼韋述成史起髙宗訖肅宗乾元質天寳棄不倫後與髙力士俱貶黔中因開元天寳事本末為唐歴然無褒貶冕與父芳並居集賢議攷禮詳明徳宗嘉異以論勁切執政出之牧以乆踈斥上表乞歸朝覲闗中置區調民牛馬民間怨苦徐浩四方詔令多出其手絶遣辭贍速而書法至精參太上皇誥册寵一時為右丞言自林甫國忠有司就宰相府斷事尚書以下未省郎署請如故事有司斷獄必刑部審覆詳斷復始此李輔國譛貶之萬代宗召拜㑹稽縣公出鎮嶺南以環貨數十餉元載李栖筠傳與薛邕分典選托邕擬妾弟畏安尉李栖筠劾為明州别駕晚節治廣領選頗嗜財惑於所嬖以敗父嶠之授書法狀書四十二幅屏八體皆備泉草𨽻尤工世其法曰怒猊抉石渇驥奔元結元魏之後子十七折節向學事元徳秀薦陽俊謂一第恩肅宗問天下士蘇源明之上時議三篇設問答備言得失戰士降劇賊五千瘞戰死者為山南參謀募諌親征思明發宛葉兵守泌陽險全十五城子水部員外郎參山南東道來瑱府勸給父母隨在軍者衣食曰渠有責其義勇而不勸孝慈耶侍親歸樊上益著書作自釋代宗立固辭丐道州常蠻亂後户裁四千結為守不忍加賦乞免租稅及租庸使和市物十三萬給為民營舍給田免徭役流亡歸者萬餘容管經畧身諭蠻豪綏定八州民樂其徳立石頌徳忠義顔杲卿真卿同五世祖表剛正明濟豫推伏祿山假守常山書判超等席祿山反與長史袁履謙謀起兵北言王師二十萬真卿以平原相掎角傳檄河入土門遣郭仲邕曵柴揚塵賊棄圍走傳鉅鹿廣平河間並斬偽刺史傳首常山樂安首上谷文安信都魏鄴皆自固兄弟兵大振賊祿山大懼使思明攻之斷粮矢盡城陷不降罵至死不絶履謙為賊手足臠之孥泉明有孝莭奴以徃太原約王承業免於難贍父故將妻三百餘人轉徙不自存悉力給人求父與履謙屍歛塟從郫令教化清明誅宿盗情翕然貧而廉相百口飦粥不給無愠嘆賈循蘇頲謂今頗牧招之以傾賊巢祿山使守幽州杲卿謀泄祿山殺以狥張廵鄧人開愽通羣書士氣志髙邁所交必大人長者元末擢進清河令有治績困阨歸者傾貲振護猾以楊國忠為國恠朝官不可為調真源令誅吏華南金政簡民安譙郡守楊萬石遣迎祿山廵遂舉兵人令狐潮圍之六旬大小數百戰潮走大將六勸降廵設天子像朝拜而引六人斬之箭粮盡取潮鹽米千斛不矢盡縛藁人千餘得賊數十萬復遣之賊備因斫潮潮大亂朝圍四月賊常數萬巡才千餘戰輙克賊將楊宗謀趋寧陵絶巡粮路巡㧞衆至睢陽與太守許逺姚誾等合霽雲戰寧陵北殺萬餘人朝宗走遣雷萬春南拜河南副節度逺安慶緒遣尹子琦等十餘萬攻之日中二十戰譲巡治兵而已居下子琦敗去拜廵御史中丞五子琦聞廵欲攻陳留復圍之巡親督戰賊漬月剡蒿矢試子琦霽雲一發中其左目賊退羅七月復圍之食盡救不至巡殺愛妾奴逺殺僮雀鼠煑鎧弩以食說賊將李懐忠等降皆得其死力應霽雲冐萬衆出請救於許叔冀賀蘭進明皆不賊益急衆議東奔廵逺以睢陽江淮保障不可誾十月士病不能戰被執罵賊不降不與霽雲姚萬春等三十六人遇害巡讀書過三為文不藁賊睢陽士卒居人一見皆識其姓字四百戰斬將三百卒十餘萬用兵未嘗依古法以少擊衆未嘗敗四凡食三萬口人知將死而無畔者城破遺民百而已亡三日而救至十日而賊亡食李翰謂天下不亡皆其功賦史贊謂賊下得愽東南牽制首尾全江淮財濟中興今雙廟至許逺敬宗曽孫長巡呼兄寛厚長者明吏治師與巡同年而巡死逺被送至偃亦不屈死巡子去疾訟其獨全者李翰為巡𫝊缺逺事昌黎非之曰逺非畏死史贊逺後死不為屈南霽雲幼為人操舟事髙衡擊賊汴州以為先鋒築遣至張巡計留事巡不肯歸巡受圍臺募萬死一生獨喑嗚而來射賊無不應弦而斃雷萬春令狐潮圍雍邱六矢着面不動畧不及霽雲而强毅用命則同方姚闓崇從孫城豪蕩飲睢素善巡為父令同守陽程千里祿山反募兵河東因鎮之而守上黨戰功多禽賊將蔡希徳幾得而救至橋壊見執敕諸騎還報可失將不可失城慶緒囚之為嚴莊所害龐堅祿山反與薛原同守潁川十阿史那承慶悉鋭攻之晝夜戰自正月盡一月城陷二人不降賊縛之至死張興一飯斗米肉十斤十為饒陽禆將祿山攻之嬰城彌年城陷持五斤刀擊賊賊為氣懾思明縳馬前勸之降問曰大丈夫不能為國掃除反為其下何哉鋸解死且罵曰吾能裒疆死兵敗賊衆卓行甄濟肅宗使汙賊官羅拜之權臯皆不汙於祿山並詳見元宗孝友侯知道程俱羅穿壙作冡身執其勞有助者輓哭而却之李華作二孝贊廬墓哭無莭羅知道七年俱三年何澄粹池州人股親病俗尚鬼不進藥澄剔以進號青陽孝子隠逸秦系避亂剡溪刺結廬泉州南安九日山穴石為研注老子史徃見而系未嘗至城門姜公輔之謫築室與相近忘流落之苦書塟公輔山下張建封聞其不可致請就加校郎善劉長卿年長卿自以為五言長城系用偏師攻之八十南安人立亭其山號髙士峯張志和金華人既䇿干肅宗見賞重待詔翰林徒貶還以親死不仕居江湖稱烟波釣著元真子亦自名州著太易以生草世不還築室越東郭茨兄鶴齡恐遁釣不設餌志不在魚留縣令使浚渠無忤色其觀察陳少游徃為終日表其居曰元真坊闢門回回軒巷為搆梁人號大夫橋羽帝賜奴婢各一志和配之號漁童樵青對陸太虚為室明月為燭與四海諸公共處圖湖州謁真卿願為浮家泛宅徃來苕霅間善山水酒酣或擊鼓大笛䑛筆輙成憲宗圖其真求其漁歌不能致李徳裕比嚴光陸羽字鴻漸姓或言僧得之水濵長自筮得鴻漸于陸因為名其師教旁行書言無兄弟絶後嗣非孝師怒之使執糞除又使牧牛遂亡去為優人署伶師太守李齊物異之授書居火山門貌陋雪吃而辨避聞善若已更見過規切桑與人期雨虎狼不上元初隠苕溪稱苧翁謂闔門著書或獨行野中誦詩不得意慟而歸人接輿拜太子文學徙太祝不就徳宗貞元時卒茶神嗜茶著經天下益知飲茶召鬻茶者祀為常白熊廣其論李季卿烹茶不禮之羽愧因著毁茶論其後尚茶成風回紇入朝始驅馬市茶儒學啖助丹陽簿秩滿屏居甘足疏糗其攷春秋三家短長號集傳十年乃成又攝綱為例統謂邱明孔子前時人春愛公穀以左氏解多誤歴髙弟趙匡陸質錄助秋集註號纂例時大間施士匄以易强䝉以論語皆自名其學士匄子陵最卓異施士匄吳人秩兼善左氏春秋留二經教授年愽士滿諸生上疏乞之凡十九仲子陵舍峨眉家好古學通后蒼大小戴禮酒乗傳過黔中選補家惟圖書及文藝蘇源明守東平請廢濟陽以𨽻東平治不受祿山偽官兩京平知制誥數陳政得失思明陷洛諫親征十不可遂罷東幸李翰華子傳天寳末房琯韋陟薦為史官宰相不肯擬張巡功狀上之帝感悟巡大節始白於世義士多之樂文精宻而思遲逸常從令皇甫曽求音思涸則奏之神乃屬文宦官魚朝恩至徳初監李光廷軍軍九節度圍相州為觀軍容宣慰處置使觀容使始此以神䇿兵屯陕思明陷洛長駈至硖石詔益兵十萬使神䇿將衛伯玉敗賊洛平還屯陜詳見代宗李輔國貌儜陋畧通書計禾事髙力士耗使主廐中簿最王鉷使典豆能檢擿欺馬肥與謀誅國忠宻靈武勸即位而四方章奏軍符委之齪齪謹取人主親信内深賊不啖葷為浮屠詭行人以為柔良十宰相羣臣欲見天子皆因以請察事聽兒數捕逮流降未始上聞貴詔書下輔國署已乃行言李揆父事之號五父幸呼五郎李峴叩頭且亂國詔勑不由中書者必審覆遷譛太上皇交通外人自以兵刼遷之西内以功兵部尚書諷宰相裴冕聮表薦為相上宻使蕭華止冕圖之不從輔國伏兵殺后帝寢疾張后召代宗代宗即位尊為尚父事皆闗白輔國自安使俠者刺之投首溷中酷吏崔器汙祿山偽官丞義兵至更募衆應之陳走靈武吕諲以為中深文詆從賊王官希烈達奚尹等數百人死李峴執奏以六等定罪病亟叩頭若謝罪曰達奚尹訴於我毛若虛上還京請掊天下財資國用屏覆囚先取家貲定賊權震朝廷羣臣息貶死逆臣安祿山天寳十二載冬反殺肅宗至徳二年正月子慶緒之自立慶緒廣平王率嗣業子儀討之復東都慶緒大敗走鄴乾元元年詔子儀以九節度兵討之於鄴慶緒又大敗節求救於史思明且請以位讓之而思明兵至九度師潰思明因入鄴斬慶緒留其子朝義守之父子共三年滅史思明突厥種奏與祿山共里先一日生故相善山天寳入帝賜坐竒之曰爾貴在晚祿反留守范陽取執杲卿陷九郡進圍饒陽闗光弼收常山子儀趙郡合攻之敗走屬潼潰召光弼等還思明軍復張都攻土門大敗相再陷常山攻平原遂進圍信慶緒敗於州遂殺慶緒稱大燕等乗勝陷洛陽敗光弼于北邙朝義使駱悦殺其父思明嗣王師討之敗走李僕固場圍之莫州田承使之走幽州懐仙斬之歸長安年父子凡四田承嗣李懐仙李寳臣並祿山思明將宗史朝義敗歸朝代即位因懐恩請皆以為節度遂為藩鎮詳見代宗藩鎮類古今紀要卷十一
