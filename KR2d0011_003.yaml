body:
  text: 古今紀要卷三宋黄震撰後漢光武中興髙祖九世孫出自景帝初劉𤣥在平禁兵中立為更始而光武為偏將軍建武元年即位光武大度馬深幾答明謨書雄㫁外不灌赤眉臣行銅營竇融抑戚退功昆陽之戰尋邑兵號百萬秀光武諱奔之莽兵大潰於是四方豪傑響應秀持節鎮慰河北除莽虐政復漢官名吏民喜恱更始元年北至薊㑹王郎據邯鄲秀欲發還用邳彤說進攻邯鄲㧞之擊銅馬降之南徇河北亦降命冦恂守河内以拒洛陽朱鮪遣鄧禹西入闗自引兵北徇燕趙二年圍朱鮪降之入都洛陽建武元年赤眉入長安鄧禹兵敗遣馮異代之勑曰征伐非必畧地攻城要在平定安集之耳馮異大破赤眉餘衆東向宜陽帝親率六軍待之赤眉降以盆子為趙王郎中二年耿弇伐張步降之降五校餘黨齊地平五年來歙襲攻隗囂據隴為其所圍上親征十餘萬衆皆降囂奔西域死子純自立後降八年岑彭大破蜀兵見刺呉漢八戰八克刺殺公孫述其將延岑以城降十一年摹右取天下規事召伏湛為尚書典定舊制卓茂為太傅建武元年封諸將使馮勤典封事莫不厭服元年召侯霸拜尚書令明習故事奏行前世善政法度四年起太學稽式古典修明禮樂五年立五經博士禮嚴光五年并省四百餘縣吏職减損十置其一田租三十稅一如舊制元年罷郡國車騎士材官樓船及軍假吏令還民伍七年既平蜀表李業之閭徴處士費貽任永馮信西土歸心十二年非警急未嘗言軍耿弇等亦上大將軍印綬文書簡寡十存一焉十三年梁統奏死刑太輕請定律令不報十四年治天下亦欲以柔道十七年第五倫每讀詔書曰真聖主也二十一年初建三雍中元元年節右偃武修文及約事西域十八國遣子入侍請都護弗許二十二年日逐王遣使稱臣臧宫願得五千騎立功不從二十四年匈奴求和親臧宫馬武請擊報非其時不如息民自是諸將莫敢言兵事者二十七年事右不事邊功朱浮言守宰數易自是代易頗簡六年鄭興願留言柔克之政帝頗傷嚴急故及之七年命司𨽻督察三公陳元請以王莽罔宻為戒七年韓歆直言帝不能容宣詔責之歆自殺十五年歐陽歙張級及郡守十餘人皆坐度田不實下獄死十五年廢郭后太子强避位立太子莊十九年大司徒戴涉坐入奚涉罪下獄死帝以三公連職策免大司徒竇融二十年上以赤伏符即位由是信䜟桓譚諫帝以為非聖無法出為郡丞道死中元元年右督察嚴急等事將一鄧禹杖策追及於業業救萬民之命說帝延攬英雄廟立髙祖之西入闗謁祠髙收十一帝神主緩二十四為司徒命任用多誘之薦賈冦呉究欲取赤眉迫於君屢失利入闗功雖不然能為漢得人心張披圖對在徳厚薄過大度淵謨君臣同德比良智勇不及學行之逺權勢後家法傳世子訓罷石臼河平撫烏丸卑鮮諸羌孫隲外戚孝兄弟忠不免將五冦恂守河内比蕭何偽屈賈復類藺相如峻不從王郎從光武識真殺皇甫文降髙亦兵家刳腸滌胃之法足有大臣之徳取上谷印綬經明行修文武備光武不任功臣如鄧冦皆用不盡其才穎鄧禹薦守河内川借㓂將七馮異敗赤眉定闗中功最大定謹遜行恩徳光武敇異平安集異說光武施君臣契合處用心同如鄧禹薦姚期知人不及鄧禹隂初間去就不勸光武結曹竟父子條二千石長吏同心與不附者說李軌三事皆權術用兵智計亦髙將六岑彭以誠信降朱鮪讓以智計破秦豐出移檄江南班行詔命鄧等遣使入蜀繞延岑軍後述大驚公持軍秋毫無犯因荆門事一由征南彭見刺呉漢之平蜀將三賈復勇數破青犢五校解自請擊郾十征伐未嘗敗與諸將潰圍急身被二創以其輕敵希令逺征為每論功復未嘗言復剽甲兵敦儒學以功臣不祖參議大事惟與鄧禹李通將二呉漢質厚少文常為先鋒鄧禹薦其勇智有謀從北擊郡賊初說彭寵以幽州兵光武北發十郡兵斬幽州牧苖曾而發其衆述收其守長而鬲縣五姓降八戰八克斬公孫而蜀平北擊匃奴分意氣自若隠若敵國入朝受詔夕引道田宅昆弟願無赦初蜀請罷三郡棹卒帝不聴而勝勝帝欲罷諸郡甲卒漢不遣而劉尚分營葢延與呉漢同謀歸光武封勇而兵精永所將亦幽州與㧞敖倉酸棗丘破劉勝董憲授勇而寡謀以兩以違指敗帝數書戒之陳俊從光武河北齊鎮撫齊地以堅壁困五校百佐耿弇平撫貧弱表有義姓歌之臧宫以下江兵從光武得佐呉漢岑彭平蜀請擊匃奴願五千騎亦失之輕將四耿弇以上谷兵從光武稱北道主人而說光武無從更始罷兵北發幽州十郡兵引南因請北收上谷兵未發者以定彭寵於漁陽竟取張豐於涿郡東攻張步平齊地有志成功比韓信名凡平郡四十六屠城三百未嘗摧折邑累葉功擊祝阿潰錄城修攻具致費㧞幽菑走西安無激怒張步戰臨淄料敵制勝筭遺策二十八將最優耿國弇弟北立呼韓邪為單于由是烏桓鮮卑保塞自守虜逺遁中國少事然害見於兩晉之世耿秉國子功上書顯宗言兵事戰成度遼將軍七年與竇固北伐不匃奴懷其威信耿䕫秉弟自伐匈奴出塞五千里漢出師未嘗至耿恭國弟廣之子氏守疏勒衰比蘇武耿與漢盛姚期從河北李呼䟆出薊掠守魏郡三盜清犯信義不殺熊不虜服喪年顔諫争王霸有信義斬從光武不去箭疾風知勁草永合王郎蘇茂及酒樽不動度河不戰屈人兵北守上谷二十餘歳與匃奴烏桓大小數十百戰邊無事言冝和親臧宫不見大敵故請五千騎立功將九祭遵從平河北殺孝義恭儉兒亷潔儒雅豐諸將中最賢格光武舍中椎破張肘石軍旅不忘爼豆私克己奉公賞賜盡與士卒家無財征蜀卒祭彤幼至孝獨在冢側盜賊哀之北治縣無盜賊守邊能以夷狄攻夷狄威聲揚方胡夷皆來附野無風塵能在遼東三十年衣無兼副京孝能感盜賊故信感夷狄烏桓鮮卑每朝常過冢號泣邊遼東立祠奉祭弟東漢吏第一遵從任光李忠萬脩王郎起光武自薊狼狽還獨光為漢守信都與忠脩迎謁光武藉以起兵妻係漢興亡功最大丹光定計發兵忠不顧母殺馬寵之弟守陽課第一任隗光子與賢宰相心和帝初竇憲秉權隗清浄寡欲袁安同持重處正諫竇北伐邳彤王郎時以和成郡為漢守迎光武㑹信都決䇿不容光武西還長安最係漢成敗之機不顧家與李忠同劉植王郎起㨿昌城迎光武大說降劉楊皆於平王郎有功耿純見官屬兵將法度自結納破王郎起燒廬舍舉族從光武從平邯鄲又銅馬治郡見思將八朱祐質直儒學不得虜掠將兵多受降克定為本禁士卒請改諸王為公三公去大名將十景丹將上谷突騎從光武丹羣臣推大司馬惟呉漢及丹帝以為驃騎將軍王梁與呉漢葢延同從光武别助㓂恂守河内尹以䜟為大司徒降赤眉校破五校河南穿渠不流杜茂歸光武於河北田擊五校於魏郡清河東郡三郡清静屯晉陽盧芳遁匃奴稍降馬成追從光武河北北平李憲代杜茂屯北邊方無事劉隆追從光武河北懇助馮異拒朱鮪李軼交討李憲守南郡以田下獄副馬援伐趾代呉漢大司馬傅俊從河北彭從破王尋助岑平秦豐堅鐔從河北拒董訢反宛城取之年鄧奉反新野鐔南奉北當訢勞苦一卒全之馬武從昆陽自平羣盜尉戰為鋒意敗為殿對降射犬言可守不諭帝鄧禹所謙右二十八將顯宗永平中圖形雲臺按東漢精華云髙祖功臣皆跅跎之士光武功臣皆信義儒學之士又論二十八將次第鄧冦賈復才德兼優最髙次馮異岑彭呉漢耿弇勲髙次姚期王霸祭遵朱祐之屬皆賢餘亦忠義勇敢智略之士全無姦雄厠其間惟馬武人物不及亦無過皆起河北樊崇號赤眉異攻之立劉盆子自入㨿長安之光武使馮崇出闗帝將盛兵降待以不死王郎本傅名昌據卜相以河北有天子氣詐稱成帝子入邯鄲漢兵㧞邯鄲斬之劉永梁孝王八世孫呉更始令紹封斬更始敗亦自稱天子漢圍之永將永降龎萌更始以牧兾州屬謝躬敗降延帝以其遜順可托孤擊董憲詔獨下蓋萌疑乃反張步以瑯琊反㧞劉永立為齊王據郡十二耿弇之而降後逃奔斬之李憲據廬江自立馬成㧞之彭寵王郎死寵恃功過望封反稱燕王寵蒼頭領寵降不義侯盧芳詐稱武帝曾孫結匈奴自立匈建武十六年降封代王後復反死奴中隗囂起兵應漢士大夫皆歸之入待用王元計欲專方面擊馮愔有功述子後稱臣公孫漢平之武囂最無識說就更始不就公孫述叛光馬援初從光武聴而援去公孫述據蜀自立為天子呉漢平之右一時僭竊者又銅馬左距鹿青犢五校尤來大搶五幡劉伯升名縯社稷光武長兄稷破家厚士謀復敇部將劉更始并誅之李通以䜟結帝權常居守京師謝娶帝女弟謙恭避勢為宰相病上印王常以下江兵屬光武擊知義識真蘓恭儉遵法共破尋邑鄧奉董訢茂龎萌鄧晨以䜟結知州光武自薊走晨請從銅馬於兾給軍不絶以常山主帝追北道來歙使隗囂不辱命囂傾廩賑飢襲畧陽囂驚其神堅守以弊被刺自書表薦叚襄骨鯁而絶有􅀈纓氣象厯歙曾孫太事安帝事子竇融河西翕然歸之恭因班彪說決意歸漢大司空卑已甚數辭爵邑子固明習兵事羌胡服其恩信事明章曾孫憲外戚專權不勒功燕然和帝誅惡至弑逆𤣥孫章順帝朝校好學有文章下入東觀為書郎謙虛士馬援不能守章句就推財散施似論公孫述光武智將識過人識去論光武髙祖說降隗囂守聚米為山谷零來歙奏隴西非馬援不能定邊隴西撃破先置金城邊邑耕牧樂業為守最得大體姓務用恩信以待下拒任吏以職但總大體大侵小民黠羌飲旅乃太守事平交趾怯又平五溪蠻苡馬革裹尸上馬矍鑠皆勇不能之過載薏鑄五銖錢銅馬式戒兄子當學伯髙子廖勸馬后節儉顯不訓諸子事宗防事肅宗樂破羌迎氣驕侈兄子嚴學問有行義清守陳留盜賊族孫稜行義水利賑貸守賢太卓茂専務德化言初拜丞相府吏與誤認者焉受遷宻令人有亭長受米肉者茂曰遺之而何故言耶數年教化大行道不拾遺情視人如子法莽居攝病免律設大夫禮順人二語足盡律之說十二人光武訪之為太傅封褒德侯常雲臺三二十八將起河北封李通王佐南陽附竇憲以河西獨茂以德選伏湛伏生九世孫原世傳經學寵清浄無競異飢歳食麄保全平諫征彭時賊徐卿等據富平唯子隆奉願降司徒伏公死節張步殺之侯覇全臨淮前百姓乞留奏明習故事察收拾遺文世善政皆行之明守正宋宏止繁聲覇戒淫色寛風易妻人與伏湛之造次卿射侯之奏行大此三皆中興明相韓歆好直言歐嘗證歳將飢免歸復詔責之自殺後陽歙戴涉相代為司徒下獄死蔡茂不仕莽朝徒守廣漢有政績位司清儉匪懈郭賀曉習故事賜荆州刺史有殊政章後顯宗到南陽三公服去襜帷以有徳馮勤吏事精勤差次封爵趙熹少有節儉之戰功舞隂大姓李氏願降守青州中封禪宣秉不仕王氏無少修髙節以遷司𨽻務舉大綱牧養親族擔石儲下四人皆行義士張湛好禮諫遇妻子若嚴君太下公門盡禮父母之國光武惰容為子太傅郭后廢稱疾王丹居家載酒勸農人皆兼功自厲擇不交陳遵不許子奔同門生交王良為大司徒恢恭儉以妻子不入官舍不妻布裙曵柴鮑拜之友人不肯見後應召杜林不屈隗囂更始妻子義感刺客功曹薦代發更始䘮司求謁永平中為徒桓譚博學好古論數與劉歆揚雄所為相類仕莽朝黙然時政輔佐抑末非䜟新論馮衍光武即位衍為更始不時至帝怨之歸後交隂興帝懲西京外戚賔客得罪西申屠剛𤣥直不慕直鰌汲黯武對策刺王莽罷歸說隗囂報漢諫光出㳺諫帝自選舉法理嚴宻言言太子宜簡賢保免時羣臣莫敢正剛切諫並不内病歸鮑永叱狗去妻孝富知更始亡方罷兵詣河内云不忍以其衆幸貴忠守魯郡撃破董憲禆將恢牧揚州緩其衘轡司隷刻趙王良與鮑為二鮑哭更始冢争韓歆子昱平盜為司𨽻守正有父風守汝南有水利為司徒言楚獄事章帝孫德南陽神父興學事章帝郅惲上東門候拒帝不内善舉孝子古初諫光武說太子引退處父子之際蘇竟說降鄧仲況劉龔不伐其功劉平孝感賊賦拜全椒長人増貲就減年就役郭伋守漁陽穎川易亂為治盜賊銷散匃奴逺迹牧并州竹馬交迎言不當專用南陽人杜詩安集洛陽殺蕭廣心南陽杜母臨水利農器復虎符身在外在朝廷事獻納孔奮姑臧長身不自潤守武都清平張堪先守蜀一毫無取岐漁陽撃匃奴麥兩樊宏光武之舅甫謙柔畏謹仲山後子鯈不交賔客好以大儒為師隂興施接賔而門無俠客二者皆賢族曾孫凖勵志行儒修儒術安鄧太后朝上學疏流民隂興光武后弟為辭封謂將帥有功者多竈不肯代呉漢大司馬祀管仲祀朱浮幽州牧以漁陽守彭寵不從宻奏之激成其變言不任三府守宰數易廣博士選梁統與竇融同事以河西歸光武復剛毅好法以王嘉減死刑太輕欲盡舊制子松議禮竦徙九真悼騷序内二女州郡徒勞宗七事顯宗肅商竦孫秉政外戚進賢辟巨覽陳龜李固周舉要無大臣之道帝交宦寺載租救饑婦人之仁事順冀商之子事冲帝質帝諸質帝言其䟦扈見弑十恒帝與中常侍謀誅之梁皆棄市收財三餘萬萬減天下半租張純安世之後帝明習故事制位司空慕曹參無為光武非惠時比禮多出純議禘祫昭穆合禮禪最非按七經䜟立明堂辟雍非國奏封傳奮甫吉自安世凡傳八世鄭興勸隗囂不稱王不為䜟幾得罪日食疏用郭伋言春秋之學子衆奉使不拜事明帝范升言左氏不祖孔子而丘明師徒相傳又無其人名奏左氏失十四事不可錄三十一事并及史記戾五經陳元與范升辯難卒立左氏諫司察三公馮魴與郟賊延褒力戰降皆赦之仁勇司空桓榮為利之學得大陳車馬非光武時賢極多而榮獨以傅太子知人之明子郁尚書學授肅宗和帝經時納忠言正論郁子焉授安帝順帝經至三公焉孫典驄馬御史與何進同謀誅宦官焉弟子鸞陳五事牾内官鸞子曄不舍宿楊氏焉兄子彬蔡邕齊方不與曹節壻馮共酒食彬父麟侍講以直道牾左右張宗勇鬬與鄧禹表為偏將軍眉馮異破關中營堡為禹後拒拒赤定潁川青兾盗班彪沉重好古薦王命論儆隗囂論為竇融畫策歸漢以融見召良史才遷史得失最詳固之所以贊遷者皆其説請為東宮置賢傅子固史能繼父業有餘於文章不足於志操引著漢書衆兩都賦死賔􅯻典寛和容坐竇憲獄中明帝議定南北郊冠冕車服制度宗祀光武登靈臺辟雍大射養老觀聽者億萬畫雲臺諸王子弟外戚四姓至期門羽林悉令通經匈奴亦遣子入學奉建武制度無變后妃家不封侯與政儒學文物盛處祭彤破赤山烏桓塞外震讋班超斬鄯善於寘西域復通天下太平人無徭役歳比豐稔百姓殷富白狼槃木百餘國前世所不至皆稱臣奉貢白狼王作詩頌徳逺近畏服事褊察大臣數被詆毁尚書以下至提拽朝廷争為嚴切惟鍾離意諫請緩刑上亦不時用之天竺求佛得其書及沙門來楚王英首奉之以逆誅楚獄死徙者以千數賴馬后及寒朗言始悟其濫右苛察好佛等事過横經自講撞郎皆失文物文景之世寛厚恭儉之化不及施剛於燮友之世鍾離意光武時解罪徒桎梏尅期皆至北以張恢贓物不受珠璣之賜大旱諫起宫而雨解衣憂格免郎過誤之罪侯忠厚亷直初以直諫出相魯以愛利為化本霸所辟為督剰不按亭長謂宜先請所内後徳陽殿成明帝謂意在不得立宋均立學禁淫祀辰陽長山娶皆取巫家守九江去檻穽虎渡河蝗不入境遷河内政化大行法為尚書令不畏威失正苛寛和不喜而文吏能寛離未害察者雖廉毒寒朗以死争楚獄理出千餘人鄧訓見禹傳祭彤北伐逗遛下獄餘見前東平王蒼議定禮樂還諫獵為以至親輔政不自安國善最樂竇固擊匃奴通西域牟融為司𨽻百僚憚之方經明才髙善議論帝以為司空舉動重甚得大臣節郭丹司徒范遷在公輔有田一頃與兄子四子無立錐之地呉良為郡吏斥王望忠正争徐正自係承宫拾薪虜朝廷憚其節使求見亷范收薛漢守守雲中執炬斬虜蜀五袴歌虞延伏臘遣囚徒徒誅隂茂客司劉般宗室有節行諫止常平倉章帝除楚獄禁錮詔勸農桑有司選舉進柔良理寃獄陳寵請滌煩苛第五倫戒嚴酷皆深納之白虎觀議五經稱制臨決詔及秋冬治獄朱暉稱疾不署均輸之法帝遣問起居賜錢物衣服孔僖崔駰為人告訐帝詔弗問詔三公曰俗吏矯飾朕甚厭之安静之吏月計有餘幸魯祠孔子作六代樂褒寵鄭均毛義之行義報囚止用十月郭躬為廷尉條可輕者四十一事行之曹褒定禮制帝厭明帝苛察事從寛厚又體以忠恕文以禮樂魏文稱章帝長者右長厚處竇憲驕横奪沁水公主田園帝切責之不能繩其罪信竇后廢太子慶立肇為太子異日女主臨朝外戚用事皆此基之右帝失處第五倫守㑹稽㫁滛祀守西門豹第五倫宋均狄仁傑皆是一理蜀選孤貧章帝擢為司空長論貴戚馬竇最切時能雖峭直然疾俗吏嗇帝者褒稱以勸在家弭盜保鄉里為夫平徭賦理寃結祀為市椽市無阿枉風移俗易㑹稽淫絶蜀郡賕賂絶為太守為三公奉公盡節斬比貢禹過之用不盡其才中史論其在㑹稽自芻妻執㸑為矯激然雖非道惟無欲故能無私傅毅廸志詩賢七激詩諷肅宗不好作顯宗頌韋彪孝苛議論多忠厚之論選舉二千石妄論吏治刻宜謹尚書選二千石勿遷鮑昱請除楚獄禁錮餘見鮑永傳鄭均諫兄受遺帝召遷尚書數納忠言幸其舍賜祿鄭宏所陳有益皆著之南宫辟後為太尉見倫曲躬初第五倫所帝置雲母屏賈逵入講左氏春秋謂證劉氏為堯後者獨左氏左氏自劉歆陳元之争未得立今始立丁鴻讓國因白虎殿無雙卒後和帝朝日食言竇憲誅之朱暉年十三遇賊㧞刀況在太學閉門不見隂就不從太守阮況市牛卒厚贈之奪隂就主簿璧與東平王蒼堪守臨淮强直林散家賑飢均以知己之言恤張妻子争張鑄錢鬻鹽輸之議不署不開口帝悟寢其事樂恢隨焦永之官皦然不汚憲為功曹選舉不阿為僕射舉刺無避不附上疏諫不聴憲脅殺之郭躬守法平恕命為廷尉輕刑條四十一文不及亡奏讞法科多所生全論赦昌盛陳寵通法律兼經術刑辭訟比益勸章帝滌蕩煩論三微月㫁條法於甫刑者除之禮刑相表裏温為廣漢顯用良吏為廷尉寛為司空奏議粹號任職祖不献遺竇憲所謂寛而栗子忠事安帝班超彪少子任投筆十開西域五十餘國不費中國兵財事三一年蕩佚簡易寛小過舉大綱擊子勇復西域帝又發諸國匃奴當安時李恂督使賈胡不受西域遺物楊終在明帝朝論廣陵楚淮陽濟南獄論徙者數萬帝從詔還徙者白虎殿經王充市肆書一閱輒誦其論衡漢蔡邕得而秘之王朗得而方進書謂太平過前代崔駰博治文學踈與班固齊名正直過之識客竇氏以正諫然客於竇亦不得為逺子瑗字子玉喬繫獄問椽禮按文字似駰兼有政迹而清杜為八使以贓之非其罪事安順帝子寔事桓帝寔政論多未當别漢政寛於權戚急於忠賢欲加嚴而不白無道之世當勸之明别忠邪不當教之嚴刑五謂文帝嚴謂孝宣優於文未當守原秦彭循吏恥辱萬石秦氏麟遷山陽以禮訓人不加守潁川感鳯等瑞肅宗親行之和帝竇太后臨朝竇憲用事破北單于勒功燕然又破之金微山既立大功兄弟專權日甚外戚始此帝乃與鄭衆謀誅憲自是衆常預政宦官用權始此太后崩帝始知梁所出乃封梁竦十三人為侯梁氏自此又用權袁安和帝朝最賢相東漢亦未易比郡明帝時自為縣功曹不為從事持書守楚出楚獄四百人人章帝朝尹河南十年京師肅然虜不以贓罪為九卿議事不阿三公還北生口事為司徒和帝立立諫竇憲為三公隗劾竇景擅發邊兵争竇憲北單于與任貶免竇憲黨二千石四十人竇天子及大臣皆恃賴之任以安之公忠不能制氏嗚咽流涕光武不大臣之弊無最得待夷狄之道還北虜生口西竇憲北伐諫勞師憲立北單于諫以失信單于陳寵不遺竇憲少為廷尉寛厚刻弊之風衰餘見前魏霸守鉅鹿簡恕不及人之短賈逵為侍中甚信用餘見前汝郁為魯相以德化丁鴻日食言竇氏何敞守汝南以春秋㫁獄立禮官徐防司空試五經章句士袁安子孫子京經學湯京子彭清潔信彭弟湯諸儒稱其節子逢寛厚篤為三公逢弟隗奢以墜子安子敞為三公亷勤不阿失鄧氏㫖殺身敞盱不附梁兾彭孫閎以兄弟驕陽狂避難變宏弟中清亮與范滂友賢中弟洪恥賔族貴勢石門師中子秋七同死太守之難張酺侍講有史魚節徒拒竇景害鄭據觀全竇瓌不殺盜為太尉無可韓稜議欲伏拜竇憲稱萬歳稜正色斥之母竇氏敗典案之守南陽嚴平司空孝推財與從昆弟與劾王就上竇憲牛酒章諫憲北伐平生憲立敵薦應順吕周紆周榮與袁安奏論竇氏夫不懼刺客之脅大丈子興文學之士掌詔令興子景公忠有榮風十為司空奏姦猾將軍牧守以下五餘人黜侯覽等薦士李法言宦官椒房史不實坐免八年迹拜諫議正言如舊守汝南有聲王渙令洛陽寛猛得宜民祠之許荆守桂陽以禮化十二年人立廟殤帝立數月崩鄧后與鄧隲立安帝年十三安帝以日食策免三公徐防尹勤等中常侍鄭衆蔡倫等預政令民入錢穀拜爵鄧騭擊涼部叛羌推進何熈李郃楊震陳禪等天下稱之鄧騭欲棄梁州虞詡言不可出為朝歌長鄧太后崩上始親政以譖廢鄧氏五侯為庶人宦官樊豐周廣謝惲用事楊震連諫不用遂無顧忌詐為詔發司農錢穀震所言轉切豐譖自殺豐等與閻后讒廢太子保帝崩立北鄉侯數月薨宦官孫程等迎立所廢太子保鄧騭立安帝楊求還第天封上蔡侯惟葉侯辭至五六薦震朱寵下復安宫人誣告不合死楊震年五十始仕子孫蔬食鄧騭辟之賂畏四知却王宻金論伯榮姦帝舅耿寳薦中常侍后兄閻顯亦薦所親震皆不受等上書攻中常侍樊豐周廣等救趙騰死得豐詐詔上之大竟以譖去烏集䘮前夕陽亭飲醉卒秉賜彪魯恭父卒年十二弟丕七歳禮過成人人間事中牟三異虫不犯境居太學絶嘉禾生庭中初為光祿勲選舉清平安帝為司徒請冬月㫁獄陳忠寵之子依世典刑法務在寛詳未初寵言為人議法當於輕請除溢於甫刑行忠依之上二十三條為決事比錮狂易殺人减重除蠶室刑相解贓吏三世母子兄弟代死聴赦所代者容薦隠逸直道之士馬良杜根周燮聖預上疏請直言搢紳先生論風封阿母王勿㫁人臣行三年喪司言伯榮之威重於陛下請重三府拜𨽻近侍憚之出守九江法雄為青州刺史撃破海賊不奉法者解印綬去守南郡毁壞檻穽而虎害息劉愷讓爵與弟行三年喪為司徒拜請二千石陳忠薦為太尉周磐感汝墳就祿授母喪終不仕不可為教門徒常千人時蔡順至孝皆和帝時班勇撃匈奴安城郭皆梁慬委以西方事河西復安陳禪守漢中夷賊即降匃奴退還數百里諫設夷狄之樂不加兵但遣諭守遼車於學說道義龎参督三輔軍屯奏記鄧騭欲徙邊郡不能自存者守漢陽謁任常有薤水抱兒孫之事馬融明其失期帝虞詡薦有宰相器順時為太尉周燮醜帝不讀非聖之書修舉孝亷賢良特徴皆辭安以𤣥纁聘之云道者待時而動竟歸順帝封宦官孫程等十九人為列侯虞詡為司𨽻劾三公阿附及宦官張防張防欲害詡尋敗封乳母宋娥為山陽君安帝以王聖為野王君又封梁兾為襄邑侯左雄諫不聴李固對策請抑外戚宦官固棄官歸以梁兾為大將軍弟不疑為河南尹遣八使杜喬周舉張綱周栩馮羨欒巴郭遵劉班分行天下張皓六世祖良當辨疑獄十順帝時為司空多薦達上書死者八餘人諫免之皓子張綱埋輪以劾梁兾兄單廣陵賊張嬰殺二千石兾綱守廣陵車入嬰壘尉安之虞詡說無棄涼州破定朝歌之盜以二科募士順遷武都以増竈羌開漕道省四千萬帝永延初為司𨽻奏三公馬石劉喜阿附議又劾宦官張防弄賣遷尚書僕射乞除義錢好刺舉九見譴考三遭刑罰年自悔殺朝歌賊數百人二十餘不增口張衡二京賦諷踰替十年乃成問安帝召為太史著靈憲篇順帝初作應篇造侯風地儀左雄虞詡所薦錮之終身上疏請守相有顯效者久任否者崇經術諫封宋娥梁美奏舉孝廉限四十惟公直能劾真偽折徐淑選舉多得人諫撲罸周舉短陋黄弔子推革太原之寒食書與瓊同心輔政左右憚之左雄纔為尚為入使劾奏貪猾表薦公清雄初左雄舉之枉子合為直而直坐贓舉以此劾以韓厥戮趙宣之僕比之黄瓊奏行籍田不奏孝弟及從政為四科首議覆試不可改阿梁氏梁兾既誅瓊居公位奏素行貪汚死徙者十餘人稱既而五侯左倌徐璜等擅權瓊遂疾李固郃之子尚對當世之弊聲求寛博戚擇書中常侍振天下阿母其外帝見對即時出阿母常侍請罪朝廷肅然始奏議梁商令退辭髙滿為荆州刺史與賊更六百餘人皆縛歸守令徴用諸賢與八使所劾急加罰蒜詔劾奏漢名臣梁兾争立清河王兾欲立桓帝為兾誣殺此在桓帝朝杜喬李固謂其學深行直當世良臣見狥察兖州太山守李固第一桓帝初李固廢羣臣側足而立惟喬正色無撓及清河王事起為兾誣死與李固同暴骨云蘇章兾州刺史按故人清河守王龔刺青州劾貪極守汝南禮賢拜太尉言宦官王符無外家侈力學耿介不得進述潛夫論掖貴忠浮實貢愛日赦縫霍諝奏記梁商出其舅俗長皆所居成市五門徒守金城恩信化殊弓木常百人里霧翟酺安帝時諌外戚歳守酒泉斬叛羌諫順帝時遷將作監省經用四五十萬多正起太學郎顗占候明經臺災異上疏瓊封尚書十事對誥薦黄李固楊厚推步求雨龍川論曰在和帝時外戚則竇憲兄弟而宦官則鄭衆為之首在安帝時外戚則鄧騭兄弟而宦官則樊豐周廣為之最在順帝時外戚則梁冀兄弟而孫程張防又宦官之尤横者也然猶有骨鯁之臣忘身狥國袁安之正色折姦楊震之慨嘆自殺虞詡以尸諫自陳張綱以埋輪自見以至左雄之封事李固周舉之對策八使之所奏劾此漢所以雖衰而未墜歟冲帝元年崩質帝太后與梁兾立梁兾弑之立一年桓帝太后又與梁兾立之初質帝之立也李固所言多從梁兾疾之固策免帝目冀䟦扈遂遇弑立桓帝年十五太后猶聴政以杜喬為太尉正色無撓朝野倚重尋以災異免兾誣殺李固杜喬並桓帝建和元年和平元年太后歸政張陵劾兾帯劔入省詔以一歳俸贖罪冀威行内外天子拱手帝召宦官單超左悺等五人誅之封五人為侯延熹二年黄瓊為太尉奏貪汚者海内翕然二年而權歸五侯尤貪縱李雲上書諫受誅嬖寵愈横二年是時封賞踰制陳藜上疏諫時宦官方熾周景楊秉上言請罷斥貪殘於是條奏五十人免死天下肅然六年初令郡國有田者畝斂稅錢李膺為司𨽻宦官屏氣八年周福房植二家賔客各植朋黨由是甘陵有南北部黨議始此九年太學生郭泰賈彪等與李膺陳蕃更相褒重中外承風以臧否相尚九年成瑨劉瓆翟超黄浮皆以太守誅姦得罪陳蕃諫不納九年帝篤好黄老浮屠宫中立祠張牢修上書告李膺等交結生徒為部黨誹訕乃逮捕黨人下膺等獄陳蕃極諫䇿免之並九年竇式申理黨人乃赦歸田里禁錮永康元年李固杜喬黄瓊並見前崔寔見崔駰傳下荀淑棄官閑居八荀卿十一世龍李膺為青州刺史守令多望風棄官先荀爽得御為喜為度遼將軍聲振逺域是免歸教授常千人出拜司𨽻破張讓之柱殺其弟朔黄門休休不敢官省龍門遭黨事頗引宦官子弟得赦桓陳蕃免太尉朝野屬意荀爽貽書勉其逺害帝崩陳蕃竇武得政膺復為長樂少府陳竇敗收黨人膺詣獄考死陳蕃為太尉劉宦官蘇康管霸排䧟忠良蕃請理􅈾等理瓆成瑨又上疏訟李膺范滂之罪帝諱其言策免之望靈帝即位竇后委用蕃與竇武同心用賢天下太平而帝乳母趙嬈與曹節侯覽共亂天下謀殺之事泄見殺鍾皓九辟不就陳寔坐黨人請囚人靈帝初竇武辟為掾鄉獨弟張讓後復誅黨讓感寔多所全宥閭求判正之梁上君子車及黨禁解何進袁隗欲表以不次位閉門懸不復起中平四年卒海内赴者三萬人三子紀諶共號君延篤徙京兆寛仁經遭黨錮卒解傳史弼平原相獨鉤黨平原無皇甫規持節闗西絶諸羌降服惡宦官杜宻居家多陳託亦與李膺名行相次號李杜劉祐練故事朝政為三河表杜拜司𨽻威行廷後乞歸門夏馥不交富人為黨魁鬚聞張儉亡命嘆其空訐善良乃截隠為冶家傭范滂攬轡澄清埋首陽山劾權豪因投劾去千不祭臯陶願事釋南歸迎者數萬不謝諝以羊舌不謝祈奚為比靈帝建寧二年誅黨人自詣死岑晊窮誅張汎以彫巧得官者李杜誅逃竄賈彪按母殺子武賈子賈女說竇解黨人郭太始見李膺為名震京師應辟不危言激論夜觀晝察遂不宦官不能傷茅容避雨危坐殺雞供其母林宗勸之成徳孟敏甑墮不顧不太勸之學知名應辟庾乗太㧞之游學宫不應辟魏朗九真破賊黨遷尚書陳便宜以徴自殺賈淑太受其來弔終成善士左原郡學生見斥言太慰之愧負前符融林宗始入京師時人莫識融一見嘆服介之李膺察晉文經黄子文非真不應辟劉寵一錢仇覽一名香化陳元蔡衍決鄉訟弟鼎臧按曹騰之不見梁氏應奉五行蠻四十二縣錄囚姓名無遺其叛興學司𨽻不避豪貴守武陵降諫立田貴人退黨事起慨然以疾自著感騐子豫爰延對桓帝漢中主黄門豫政則亂封客星經帝座對以鄧萬龍潛之舊侯黄憲年十四荀淑竦然異之謂顔子生載良罔若有失陳蕃周舉相謂不見鄙吝林宗謂若千頃波到勸之仕亦不拒暫京師而還徐稺非其力不食謝下陳蕃榻束桓帝安車聘不至林宗芻弔林宗姜肱與弟季江更欲死賣桓帝使畫工圖之不得卜給食申屠蟠字子龍坑范滂等非朝政蟠云處士横議卒有焚乃絶迹梁碭間超然獨存楊秉震之子官計月受俸餘宦官方熾秉條奏牧守以下宦所任五十人天下肅然諫計吏留拜公諌止詔除三無所不統劾奏侯覽兄弟言三不惑酒色財王暢天下俊才王叔茂諌陳蕃薦為尚書行守南陽奮威納功曹張敞更寛大教化遂布衣羸馬矯郡中之奢靡种暠順帝時宦官單車迎太子手劔斥之遼守益州涼州漢陽羌戎感服烏桓反轉守東望風服然桓帝擢為度遼將軍邊方晏遷司徒薦橋𤣥皇甫規欒巴西守桂陽立學興禮竇遷豫章以道袪除淫祠後理陳冤得罪自殺劉陶上書譏切梁兾乞還朱穆李膺言諫鑄大錢順陽募勇力言張角不聴宦官見誅李雲露布上書言小人死獄中劉瑜言宦官女寵竇武敗被誅尹勲誅梁兾職部分衆周勰梁兾三辟不出黄琬瓊之孫用志士與陳蕃共典選舉顯為權勢郎所譖禁錮襄楷言災異瓆之罪理瑨被刑張陵梁不疑所舉公叱梁兾帶劔入省申憲報私恩朱穆暉之子貴專愚失然後仁義作崇厚論矯時兾中云徳性又絶交論為州刺史印去者四十餘人千按宦者趙忠之僭太學生劉陶等數人救蔬食布衣刁韙在朝鯁直容相魯東郡陳稱神錮家人不見惰救黄琬蕃見靈帝竇太后臨朝委政陳蕃與竇武同心輔政時宦官曹節王甫等謟事太后蕃武疾之謀誅宦官事泄節等收蕃武等殺之士大夫皆䘮氣建寧元年初李膺等廢錮有三君八俊八及八厨八顧之名宦者疾之黨獄再興李膺范滂等死者百餘人二年立三互法婚姻及兩州人不得任為官蔡邕諫不聴熹平四年再詔禁錮黨人門生故吏及五屬五年諸生文賦者待制鴻都門下宋松江覽等圖形立贊六年西邸賣官西園立庫貯之光和元年黄巾張角起始赦黨人中和元年靈臺災張讓說帝斂天下田畝千錢修宫室刺史二千石等官遷除皆責助軍修宫錢之官先至西園議價二年帝崩子辯立何太后臨朝袁紹說何進誅宦官進召董卓召兵詣京卓將至而進不決宦官張讓等斬進袁紹何苗聞進被害引兵盡誅宦官二千餘人董卓乃廢少帝立獻帝中平元年竇武陳蕃李膺范滂並見前李燮固之子邵姊託孤王成帝奏劉續不當復王笞甄父不肯立子不肯立王房植事馬融未嘗轉盻垂守九江蠻夷賔服罪日食陳八事征黄巾㧞之不賂黄門得止何進召董卓三卓廢立植獨抗議作尚書章句禮觧東觀校書張奐遷定安屬國都尉休屠各守武威破左薁鞬軍不受金馬斬遷度遼將幽并清節節奐去鮮卑烏桓入塞封奐至相率降曹矯令圍竇武因不受以黨錮禁錮熲遼東都尉斬獲鮮卑斬遷護羌都尉羌出塞二千餘里然西羌弭定先零八千東悉平百八十戰曲意宦官劉淑五經講授占對䇿第一拜議郎議又陳時政災異之皆效遷尚書建多禆益巴肅與陳竇謀誅宦官坐黨不敢逃刑羊陟兾州肅然惮薦舉京師之劉儒林宗謂口拙心辯武桓帝朝極言得失㑹竇事死何顒陳蕃敗匿汝南為董卓所係死袁紹為奔走反知曹操安天下許邵稱許郭曹謂陳寔道廣陳蕃性峻皆不造之操姦雄旦評去陶謙張儉黨難逃避徳所經歴誅者十數後見曹氏世巳萌闔門懸車竇武融之元孫獄女桓帝后謀清直諫内官専寵出李膺杜宻與陳蕃誅宦官見殺蛇同生何進元舅輔政琳與袁紹謀誅宦官以陳之言狐疑見殺郭太養士誅諌何進召卓不聴去之諫卓不遂歸袁術而死皇甫嵩破黄巾梁却閻忠而破王國涼賊州董卓忌之却衍之說就召諫益五百餘事朱雋討黄巾斬趙宏嵩以功歸之止董卓西都陸康諫鑄銅人免子續董卓何進召之安廢少帝吕白波郭太起遷獻帝長王允布謀斬之羊續守南陽震懾三懸魚與縕袍不登公賈琮交趾歌賈父來晚兾州刺史褰帷楊璇囊灰陽火馬破桂賊趙􅢻孝感賊勿計日受俸敇厚𦵏楊賜秉之孫忤曹節蛇為女妖靈諫微行三論虹蜺諫造畢圭琨苑葉相楊彪賜之子為誅王甫忌争董卓西遷太子修以雞肋曹操所見殺四世尉謝弼對青蛇所為曹節家殺蓋勲羌戎不敢害争守漢陽與卓立傅燮討黄巾懃以疏論宦官趙忠故不封辱後司使弟致殷正色崔烈欲棄涼州廷徒漢范津舉燮後燮代津守陽開屯田懐羗人蔡邕孝卓三世不分財允七事之十意用琴卓死而嘆王并殺諫鴻文董學五不親郊漢書經著書韓韶太山賊不入境入開賑流入者云含笑地服䖍左傳解何休樸訥守註公羊十七年不窺門疾公羊墨左氏膏肓榖梁廢三君竇武修劉淑言陳蕃興黨獄始於牢之一再於曹節八俊李膺劉祐荀昱魏朗杜宻趙典王暢朱禹八顧郭林宗宗慈范滂尹勲巴肅蔡衍夏馥羊陟八及張儉孔昱岑晊范康劉表檀敷陳翔翟超八厨度尚母班張邀秦周王考嚮劉儒章胡蕃􅀈王張儉鄉人朱並承侯覽意上書告儉及檀彬鳯張肅薛蘭馮禧魏𤣥徐乾為八俊田林張隠劉表薛郁王訪劉祇宣靖公緒姓也恭為八顧宋楷槃疎耽薛敦宋布唐龍嬴􅢻宣褒為八及獻帝袁術等起兵推袁紹為盟主共討董卓初闕元卓帝遷長安時卓未至朝政皆委王允外相彌縫内謀王室天子倚之元年王允使吕布誅董卓三年曹操迎帝都許建安元年時政在曹氏荀恱志在獻替而謀無所用作申鑒五篇奏之曹操進爵為王操死子丕襲爵帝禪位為魏二十五年荀恱奏屏四惡俗偽章私養生正化放威奢統崇五政書秉法著漢趙岐中常侍唐衡兄法尹京以岐輕議已殺其家岐逃難賣餅北海孫嵩戰藏複壁諸唐滅拜刺史并州坐黨事免磾守墩煌為賊所執詭辭免獻帝西都副馬日撫天下所至皆喜貽書公孫瓚紹等各引兵去州說劉表衛朝廷死荆王允拜司徒與何進諫誅宦官傕西遷收圖書秘要内外倚賴焉卓部將李郭汜等攻䧟長安允謂朝廷恃我獨不去傕殺之孔融孔子二十世孫卓十歳造膺門正十六舍張儉欲代襄死董廢立融有匡之言出相北海於立學舉鄭元等備黄巾賊來融使太史慈求助平原相劉備表融領青州刺史為袁譚所攻而奔封諌復肉刑枉多侮慢曹操言王畿不諸侯路粹奏操殺之荀彧去紹從操錫操謂子房器勸操迎帝都許止九操饋空彧飲藥卒劉虞牧幽州民夷感化徐平漁陽斬張純者罷省屯兵寛政勸農青士庻避黄巾歸百餘萬約韓馥袁紹遣張岐等上尊號虞厲色叱之糧節陳公孫瓚討烏桓侵擾瓚亦奏虞廩不周竟為瓚所斬公孫瓚烏桓逺竄之然侵害百姓害名士袁紹攻自焚元據幽州袁紹好交立據河北州勸何進召董卓卓誅宦臣卓議廢紹奔兾起兵勃海討者以為盟主賊逐韓馥自領冀州牧引沮授為别駕擊破諸授勸迎駕至鄴挾天子以令諸侯不從曹操迎天子都許下詔責之上書自陳北平公孫瓚定幽士紹進軍攻許言操罪狀曺操敗之官渡以憂死子譚尚相攻曹操取之劉焉建議立州牧因據蜀益魯恭王後竹董挾謂益州有天子氣請為州治綿與馬騰通謀騰敗徙成都子璋襲位張殺張魯母不曹操定漢中勸璋使松詣之操接禮松松通劉豫州璋璋令法正送兵助先主先主進圍之遷於公安後孫權使駐秭歸袁術起兵攻董卓奢為操所破自領揚州敗攻劉備以争徐州淫重斂為操所資實空虛自燒宫室奔部曲陳簡不納嘔血死吕布據兖州攻初事丁原殺原紹繼事董卓殺卓卓將李傕長安布敗投袁擊破張燕為袁術敗劉備以備為豫州刺史自稱徐州牧術求婚術攻備救之絶術婚使陳登詣操求徐州牧之操云養鷹得操攻殺云縛虎不不急劉表據荆州平為黨人之八顧土黨禁解為荆州刺史悉江南冦賊開南接五嶺表據漢川相地方千里欲養士愛民變從容自保曹操袁紹持於官渡觀天下之韓嵩蒯越勸之歸操不從卒子琮舉州降張魯據漢中府五斗米山建安二年三年操征之封庫奔南操慰之封閬中侯張燕本姓禇號歸張角角之死衆奉之故改姓衆至百萬黒山靈帝操定兾州燕求助王師拜平北將軍張繡與劉表合賈降操復復襲操破操拒袁紹於官渡繍從詡諫降遷羌將軍從破袁譚增二千户陶謙徐州牧十餘城掩襲曹嵩殺之嵩子曹操擊謙攻㧞遣精兵三千助留雋討董卓謙疾篤謂别駕麋竺曰非劉備不能安此州劉備兼領徐州牧張邈與曹操袁紹友善同起兵操為紹擊已叛操迎吕布責紹有驕色下畏操圍之為其所殺公孫度據遼東軍𫝊子康為康死子淵立懿魏朝拜揚烈將自立燕王司馬擊斬之應卲奉之子定守太山擊黄巾袁紹律令漢官儀畏操奔風俗通鄭𤣥發墨守公鍼膏肓左起廢疾穀古學遂明有孔融為𤣥特立鄭公一鄉曰昔齊置士鄉越君子軍賔黄巾皆拜袁紹客皆嗟服徐璆奏張忠贓汙術袁術却殺以上公之位印以龔鮑自況破猶存漢汝南柬海仲長統知髙幹必敗益昌言誡理亂篇損法臧洪說張超誅董卓絶袁紹不救張超與紹見殺王烈字彦方父盜牛者恐王彦方知其盜後為老守遺劍不就公孫度禰衡馬融薦與劉表輕曹操復侮表操召為鼓吏表送之黄祖大罵操送復不遜見殺古今紀要卷三
