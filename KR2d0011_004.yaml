body:
  text: 古今紀要卷四宋黃震撰三國唐虞禪夏后殷周繼漢則因天下已亂而定之世變雖有不齊君德雖或不類要皆明白洞達無愧辭者也王莽欺偽始以賊奪而盜名唐虞之禪識者已為之痛哭矣曹操本有過人之材適當艱難之會不能扶顛持危反挾天子以令諸侯隂行篡弒之逆而陽亦託名曰禪焉賊莽之欺於是遂成故實莽固不足責操則深可責者也然曹氏方用此於漢而司馬氏即用此於曹螳螂捕蟬不知黃雀之在後三國六朝之禍於此乎始而亂臣賊子接踵於後世矣是皆操有以啓之也豈不悲夫方獻帝之厄於操也以衣帶密詔授昭烈誅之大權既移謀不果行昭烈始不得已起兵於外大義未伸曹已篡漢昭烈始又不得已即位於蜀昭烈漢氏子孫信義聞於天下諸葛武侯又以伊吕之佐而歸漢漢業雖未盡復漢氏之社稷則藉是未泯昭然甚明志士仁人所當惻然興念幸漢氏四百年之餘澤尚有存焉者可也陳夀何人敢謂賊為帝而謂漢為賊且忍於一旦滅漢之號而私以蜀為稱習熟既久甚至通鑑亦仍其舊且不能不以族屬疏逺為疑嗚呼晉元帝以司馬氏支裔纍纍渡江僅僅自保尚得續晉之稱曾謂昭烈風雲慶會三代之後邈焉寡儔鋭志興復而反不許其稱漢耶使昭烈果非漢子孫曹操蓋世姦豪豈不能聲其罪而誅其偽當時荆楚之士從者數萬人無一疑其為偽今反去之千百載下而創疑其譜牒耶世次之不詳此正陳夀之罪而不當以疑昭烈也故作史者以編年之法論則獻帝之漢既滅當以昭烈之漢繼之昭烈之漢既滅始當不得已而屬之吳魏以南北分繫特其間尚有當斟酌者昭烈雖有志興復而未遂吳魏乃一時角立非素相統攝如戰國於東周之世襲子孫耳此集姑欲紀事以便檢閲且退惟庸晚何敢輒預諸儒之議故仍分國以記庶一覽各得其始末惟改昔之誤以為蜀者為漢而吳魏則附其後云漢昭烈皇帝備字元德景帝子中山靖王之後信義聞天下討黃巾有功公孫瓚表為平原相獻帝初平二年徐州牧陶謙疾命麋竺迎領徐州興平元年與袁術相持經月吕布乘虛襲下邳妻子見虜降布布以為豫州刺史建安元年又為布所攻歸操操益其兵使東歸圖布元年又為布所敗復歸操三年操令邀袁術因據徐州郡縣多叛操為之遣使與袁紹連兵四年操攻之禽關羽乃歸袁紹五年操既破紹乃歸劉表遂有髀肉復生之嘆六年未右皆遇孔明以前困辱事在荆州三顧草廬諸葛亮陳取荆益與吳為援之策十二年操伐劉表子琮降昭烈時屯樊棄妻子南走十二年遣諸葛亮結孫權遂與周瑜破操赤壁取荆州表劉琦為刺史表之子十三年劉琦卒孫權以昭烈領荆州牧周瑜分南岸地以給之十四年詣權求都督荆州權因瑜言不從後魯肅代瑜始勸以荆州借之十五年劉璋因張松言結之法正乃勸取益州十六年襲取益州擢用人才盡其器能益民大和十九年因法正言進兵漢中張魯所據時已降操取之稱漢中王二十四年明年魏篡漢又明年傳聞漢帝遇害遂即帝位改元章武當魏黃初二年事右遇孔明後規恢已得益州孫權來求荆州不許遂相攻既聞操攻漢中乃請和分荆州建安二十四年吕蒙襲斬關羽全有荆州遂大舉伐吳自五峽至夷陵兵立數十屯為陸遜火攻所敗乃遁入白帝城右吳交惡事後主即位年十七政事咸決於亮亮約官職修法制常躬自校簿書亮討雍闓得孟獲七縱七禽自是南人終亮之世不復反建興元年亮率諸軍北駐漢中上出師表亮攻祁山天水南安安定皆應亮關中響震馬謖為前鋒違亮節度為張郃敗於街亭於是引咎責躬厲兵講武為後圖民忘其敗矣亮上言以討賊自任引兵出散關圍陳倉以糧盡歸亮以蔣琬為長史琬常足食兵以相給亮作木牛流馬運米入斜谷口治斜谷邸閣息民三年而後用亮約吳大舉軍渭口屯田久駐與司馬懿相守百餘日懿不敢出亮卒於軍中建興十二年當魏青龍二年右委任孔明規恢事延熙元年蔣琬屯漢中九年卒十一年費褘出屯漢中為益州刺史董允守尚書令為之副明年允卒褘以陳祗代祗與黃皓表裏專政後主數遊觀廣聲樂譙周諫不聽薑維數出軍為鄧艾所破司馬昭使鍾會鄧艾來伐薑維請分護陽安關口及隂平以防之黃皓信巫鬼啓寢其事初昭烈鎮漢中皆實兵諸圍以禦外敵薑維乃以為不若使敵至諸圍皆斂兵聚穀退處漢樂二城伺其疲乏以縛之及鍾會來伐諸圍退保會遂直入漢中薑維守劔閣拒會鄧艾乃自隂平鑿山而進由江油抵成都後主降右孔明死後至亡國事諸葛武侯躬耕隆中謂自比管樂烈司馬德操謂伏龍徐庶卧龍昭三顧論孫權可與為援跨有荆益漢室可興督説孫權共破曹操於赤壁昭烈遂收江南使零陵桂陽長沙賦稅以充軍曰成都平常鎮守足食足兵事昭烈病屬以後事君才十倍曹丕必能定大嗣子可輔輔之不可君自取之敕後主曰事之如父舉聘吳結好南征孟獲國以富饒講武俟大允建興五年出師表言宫府一體郭攸之費褘董宫中咨之向寵營中咨之親賢逺小人先漢所以興隆今南方已定兵甲已足願托臣以討賊興復之效六年揚聲由斜谷道取郿使趙雲鄧芝為疑軍身攻祁山戎陳整齊關中響震馬謖違節制敗冬圍陳倉斬王雙七年平武都隂平二郡二九年復出祁山以木牛運糧運射殺張郃丈十年悉大衆由斜谷出以流馬據武功五原分屯久駐雜耕渭濱百姓安堵處司馬懿不敢出百餘日卒於軍懿按行其曰天下竒才也行八陳圖人專權而不失禮其行君事而國不疑法嚴而恱服用民盡力而下不怨撫百姓示儀軌約官職從權制開誠心布公道出處與伊尹同有王佐之心有儒者氣象庶幾禮樂力子贍斬鄧艾使戰死關羽與昭烈恩若兄弟勸嘗禽於操為操斬顔良而歸漢初在許嘗昭烈殺操督荆州攻曹仁於樊避降于禁懿斬龎德操威震華夏曹操議徙都以司馬蔣濟勸約孫權襲據江陵斬羽及子平於臨沮張飛兄事羽禦昭烈之奔江南使飛拒後據水斷橋嗔目橫敵無敢近者遂得免釋嚴顔破張郃待巴土獲安士魏謀臣皆稱羽飛萬人敵恤羽善卒伍而驕大夫飛愛敬君子而不小人達後當伐吳為其下張范疆所殺而奔吳馬超與韓遂起事上操用賈詡謀離間之軍大敗走保諸戎擊隴郡縣殺韋康據兾城康故吏楊阜等合擊之奔張魯將魯不足與計歸昭烈為左軍黃忠自葭萌受任還攻劉璋斬先登陷陳勇冠三軍一戰夏侯淵趙雲當陽長坂雲身抱後主保護甘夫人十辭趙範嫂樊氏婚以鄉人活夏侯蘭數騎值操揚兵大出曹一身都是膽與鄧芝拒真兵弱失利龎統司馬徽謂南州冠冕勸崇邁世教州守萊陽令魯肅謂非百里才昭烈取益伐人之國以為歡非仁者之兵進圍雒縣中流矢卒法正為劉璋使昭烈勸昭烈取益漢請加敬許靖外統都畿內為謀主勸取中智術許靖踰城出降不果倦為太傳為誘納後進清談不武侯之拜麋竺世貨殖竺陶謙遺令迎昭烈未吕布虜先主妻子進妹助軍資嘗統御簡雍談客禁説劉璋諷釀具伊籍使吳機捷嚴與諸葛法正劉巴李造蜀料秦宓對張溫論天論辨五帝同族不然養龍霍峻昭烈入蜀守葭萌有功董和劉璋時令成都變其侈俗二守益州南士愛信昭烈定蜀與諸葛並署十年家無擔石劉巴武侯薦之曰運籌吾不如子初物價代法正尚書令清儉鑄直百錢平初飛嘗就巴宿巴不與語武侯戒之先主亦怒馬良白眉敗招五溪蠻皆受印會昭烈夷陵良遇害弟謖先主謂言過其實武侯不用魏延故有街亭之敗董允武侯北征任以宫省恢専獻納祗不容增後宫責黃皓解驂禮董後陳代之二國吕乂守巴西漢中廣漢蜀郡董善募兵令武侯卒後勸導出者萬餘代允尚書號清能彭羕武侯以其心大出之後誅廖立懷怏怏武侯廢之為民徙汝山郡武侯卒泣曰吾終為左祍矣李嚴糧不進呼武侯退軍軍退更言糧足武侯廢為民徙梓橦郡武侯卒發病死魏延昭烈遷成都擢鎮漢川萬餘會潼關武侯不許破郭淮水每郤請兵與楊儀火武侯臨死遺令延斷後武侯死延率所部徑先南歸楊追殺之楊儀軍戎節度武侯取辨為與魏延水火武侯不忍偏廢既以不得尚書令怨望廢自殺王連初令梓潼不降昭烈侯校鹽利簡用吕義等諫武南征向朗年踰八十手自校書張裔守益州雍闓縳致之吳諸後武侯以為恭軍領留府長史立楊恭孤門戶行義甚至楊洪謂漢中蜀咽喉急發兵洪忠清何至孝超洪始為李嚴功曹而起為蜀郡書佐祗又守廣漢矣費詩關羽恥與黃忠同列詩以韓信後至居上喻之乃拜諌稱尊號更始猶存而光武舉號比諌未然杜微稱聾之武侯曰曹丕篡位猶土龍芻狗有名也君當以德輔時孟光責費禕行赦尹默益部不崇章句受逺遊荆楚從司馬德操古學李撰該賢著書譙周精六經不遍覽諸子文章非心所存諫聲樂勸降魏郤正與黃皓比屋不為喜憎侍後主降黃權初諫劉璋迎昭烈吳據漢中權本謀也諫伐降魏李恢平南土功居多吕凱王伉執忠絶域十年不與雍闓通馬忠牂牱威惠廟祁山經營戎事外平南土蠻夷立初名狐馬養家王平諫馬謖馬所領千人獨自持中一戰敗魏延鄧艾在東忠在南平在北漢咸著名識不過十字張嶷斬山賊張慕嶷南平四郡蠻夷年越嶲殺太守龔祿焦璜往復之留十五夷為立廟蔣琬廣都不治武侯薦社稷之器代常足兵食楊以後事付欲由漢沔襲魏其武侯相漢戲不應答楊戲非毁皆能容之費褘武侯命同載書使吳不能屈功諫喻魏延楊儀代蔣琬尚令其速數倍名略與琬比延熙中禦魏寇對來敏間暇圍棊為身雖在外路斷乃行家不積財兒子布素魏降人郭修所刺本傳評曰蔣琬方整有威重費褘寬濟博愛承諸葛之成規是以邦家和一薑維武侯稱薑伯約心存漢室而才兼於人十年與費褘共録尚書事討定汝山夷延熹又與魏大將郭淮夏侯霸戰洮西西明舉部降欲誘羌胡斷有隴西每欲大舉費褘裁制所與不過萬人禕卒將數萬進圍襄武拔河間狄道臨洮三縣又破魏王經於洮西後為鄧艾所破衆庶怨讟而隴西亦不寧張疑黃皓欲授兵閻宇不敢還橋景耀元年表遣翼廖化分護陽安關口隂平頭以防鍾會為皓所寢繼被後主敕詣曹降將士拔刀斫石鍾厚待維以叛魏將士憤發并殺之膽大如斗清約鄧芝説吳絶魏罰督江州討定涪陵産位大將軍二十年賞明恤士無私器異薑維張翼不以退黜廢公務蜀諫薑維以國小民勞不宜黷武破亂兵殺之宗預對孫權以東益巴丘之戍西增西帝之守皆不足問廖化以果烈稱官位與張翼齊楊戲典獄號平維守建寧梓橦皆清約言不應蔣琬笑傲薑免為庶人未嘗甘加人書不盈紙篤親衛繼繼張君復姓衛忠篤信厚楊顒為武侯主簿書諫武侯躬較簿吳孫堅孫武後初斬會稽妖人稱帝者許生大破黃巾勸張溫斬董卓溫不忍發後卓殺溫守長沙破賊區星越零桂討周朝郭石三郡肅然起兵討卓斬南陽太守張咨入雒修諸陵卓所廢為袁術擊劉表戰死策堅長子與周瑜友見術求領父兵渡江轉鬬無敢當士民樂致死威震江東袁術僭號以書絶之曹操袁紹相拒官渡策欲襲許迎漢帝為故吳郡太守許貢客所殺謂弟權曰決幾兩陳之間與天下爭衡卿不如我舉賢任能以保江東我不如卿以印綬與之卒年二十六權立後諡太帝大帝權待張昭以師傅而周瑜程普吕範為將率魯肅諸葛瑾為賔客時曹操表守會稽梟黃祖其軍士射殺堅用周瑜議與漢昭烈合兵大破曹操於赤壁取荆州漢建安十二年徙治秣陵改曰建業防操作濡須塢十六年周瑜既死從魯肅議以荆州借漢昭烈十五年操攻濡須權禦之謂曰春水方生公宜速去操乃還十八年初操令民內徙民相驚自廬江九江蘄春廣陵户十餘萬皆東渡江西遂虛有皖城十九年權征皖城克之右始結蜀漢拒魏事二十年權以漢昭烈已得益州使諸葛瑾從求荆州昭烈許以涼州定乃還權乃遣吕蒙魯肅拒關羽於益陽操入漢中昭烈乃求和分荆州二十一年操攻濡須二十二年權令徐詳詣操求降二十四年權乞討漢關羽自效時羽圍曹仁於樊遣吕蒙襲公安據江陵釋于禁擒關羽遂定荆州操表領荆州牧昭烈來伐權遂稱臣於魏陸遜大敗漢於夷陵魏徴侍子不受右背漢從魏事魏伐之權卑辭上書魏文詔止權即王位即元黃武臨江拒守復與漢通魏無功而還魏大舉伐之臨江嘆而還曰雖有武騎千群無所用之五年初三年時魏文帝出廣陵望大江曰彼有人焉未可圖也乃還魏主以舟師自譙循渦入淮臨江又嘆曰固天所以限南北也遂歸權稱尊號改元黃武魏明太和三年盟曰漢吳既盟同討魏賊云云漢約同時大舉吳主聞大軍遂遁太元二年薨年七十一諡大帝亮立諸葛恪為輔孫峻因民之多怨與王謀誅之亮既親政以孫綝專恣欲誅之見廢為會稽王年十六休立自殺休立誅綝鋭意典籍任張布不敢以韋曜盛沖侍講卒諡景帝皓立權孫和子誅濮陽興張布酷淫晉遣王濬王渾伐之降於濬太史慈為郡毁州章繇為孔北海突圍吉劉元德為孫策收劉餘衆尉建昌却劉磐士燮守交址四十餘歲下士不廢職貢弟一守合浦陀寬厚震服百蠻尉之類孫皎為吕蒙後繼定荆州奐降髙城數本姓俞青為邊將人軍整留十年徐屯要馬將帥盡識之桓與陸遜追昭烈右孫氏屬籍張昭子布事孫策文武事一以委之匡以權托昭曰不任君自取之攻黃巾琦周鳯自此希出常為謀臣以性剛不用為相斥魏使邢正下車諫醉飲勸迎曹操在里著書諫遣長彌許晏內使遼東公孫淵使稱疾不朝慰權土塞其門昭以土封之兩見殺權謝昭不出燒門恐之昭更閉户諸子扶起權載以還宫一邦憚之顧雍不飲酒寡言者相十九年二選用隨能守辭色雖順而所執正子卲十七起家豫章諸葛瑾其先琅琊諸縣人時人因别號諸葛後徙陽都亮先有葛氏使漢與弟無私面善諫瑜族死生不易於𢎞雅一瑾為大將軍孔明漢丞相弟誕顯名魏門三方冠蓋子恪名盛當世瑾常嫌之孫恪受詔輔孫亮數侵魏人怨之為峻所誅步騭與衛旌種瓜謁焦征羌以貧賤遇之解斬蒼梧守吳匡南士之賔自此始薦逹救代陸遜為丞相猶誨門生手不釋書外在西陵二十年鄰敵敬其威信寬厚得衆內肅然張綋諫孫策輕敵陵止權輕騎置諫復出皇鎮守挹捐勸都秣楚武王金陵始掘斷連岡改今名嚴畯質直純厚武侯善之辭督兵之使漢有賜散親舊程秉通五經傳太子闞澤著乾象厯數大議輒咨訪儒學勤勞宜封都鄉侯欲增科謂依禮律薛綜嘲蜀周瑜推道南大宅以舍策立迎策東渡其起兵所向皆拔年二十四權與張昭共掌衆事詣權母議莫遣質於操昭請精兵三萬破曹操百萬於赤壁請築宫置烈徙關張各置一方挾與攻戰大事可定卒請取劉璋并張魯北方可定許之還江陵年三十六事權先執臣節權恢廓説程普數侮瑜瑜不較普自敬服遊幹不敢發言還歎其雅量髙致操遣蔣幹權與昭烈留語嘆其文武籌略萬人之英顧其器大不久為人臣爾操與權書曰赤壁有疾燒營自還使周瑜虛獲此名瑜威聲逺著故曹操毁譖之何及卒權流涕曰公瑾有王佐之才今忽短命孤賴後權稱尊號曰孤非公瑾不帝矣雄略膽略藐焉寡儔魯肅子敬渡賑窮薦指囷與周瑜足不就袁術迫就瑜東瑜於權勸鼎首勸禦操瑜共成赤壁之功周瑜薦自代勸借昭烈荆州儉操聞之落茟從破皖城節手不釋卷吕蒙子明代當十六隨姊丈鄧當討山越就張昭薦蒙禽黃祖破曹仁權勸學魯肅嘆其學識英博賊從拒濡須數進竒計郡破朱光於皖討廬陵西取長沙零桂三破曹仁於濡須璋守漢昌與關羽分土接境憂謂征虜守南郡潘住白帝蔣欽循江上下何操何賴羽詐疾還建康羽既徹備乘虛南郡獲羽父子遂定荆州容舊怨薦蔡遺籌略竒至可次公瑾但言議英發不及之收三郡時用鄧玄之説下郝普程普從孫堅討黃巾董卓劉從策破廬江秣陵張英突祖郎出策討勳黃祖輔權代太史慈備海昏為周瑜左右督破曹公走曹操守江夏黃蓋隨孫氏三世攻討赤守九縣所在平定蠻尉丹陽山越懷附壁火攻平武陵韓當從三世攻討與與周瑜破曹公蜀吕蒙襲南郡宜都復陸遜朱然共破漢破丹蔣欽從策平定三郡秦狼合肥力戰守三縣讐壁吕合徐盛有而舉之周泰宣城提身衛權被十二創從討黃祖從赤壁戰陳武征討有功所向無前二母得施明之情合肥戰死萬子耒感悟尉新安降餘人家尉盡於卷土董襲從策討劉勳於尋陽夏謂太妃江東無憂代黃祖於江斷紲威黃祖甘寧周瑜吕蒙共薦財勸先取黃祖陵足敵張遼開爽有計略輕敬士從攻夷濡須合肥凌統年十五攝父兵合殺督陳勤孫身破山賊愛從擊黃祖曹公肥陷陳出權親賢士有輕財重義國士風徐盛戰功木邢正之來泣涕橫流望魏文之來盛植衣葦為疑城假樓魏見即遁潘璋合肥之役璋獨馳進好擒關羽斬馮習粗猛功丁奉潰魏兵至謀斬孫綝共立孫皓之漸驕自周瑜此評曰凡皆江表虎臣朱治從孫堅攻討勤扶策依袁術子勸策還平江東守九江憂王事養姊為朱然本姓施朱然餘姚長陸守臨川平盜陵與遜并力破漢吕蒙薦然自代鎮江魏曹真攻之六月不克欽修潔在終日欽如常戰場吕範劉氏云吕子衡寧久貧與張昭留守計密請留昭烈牧揚州民陸遜等皆修敬主不從權私求功曹周谷傳著簿書使無譴問權後任範而不用谷朱桓督濡須捋虎鬚以五千破魏數萬一面數十年不忘李膺不敢出子部曲户口妻盡識之虞翻年十二客不過之曰琥珀不取腐芥磁石不受曲針不就操辟示孔融易注犯顔孫權狂坐徙涇縣直嗜酒陸績六歲懷橘注斥張昭論用武天以直見憚日出守鬱林易釋玄作渾圖知亡六十年同文軌張溫以使漢而美之為少以俊才有盛名顧雍以當今無輩駱統八歲時飢荒為之食少曰士大夫糟粳不足我何心獨飽姊以私粟與之分施勸尊賢重民多上書云陸瑁陳融濮陽逸等不就之遊處孤瑁割少分甘與之豐約徐原識遺書託為之起墳收養伐戒暨艷揚人失厚諌公孫淵論皆寬朱據諫暨艷以功覆過艷不從故敗士權以為才兼文武可繼吕蒙張溫輕財好以爭太子賜死陸遜破賊潘臨尤突費棧所過肅清西吕蒙薦遜意思深長才堪負重代蒙首尼方斬獲招納凡數萬諸乞招延茂異忍督朱然潘璋破漢昭烈不啓將之違節度辱濟事權以印付遜與蜀漢書自行之闕鳴攔髠射聲假黃鉞破曹休去建昌侯慮校尉諫峻法諫取夷州朱崖鄱諫討公孫淵興攻襄陽護所得生口丞議勿募陽民議勿利改作代顧雍為相責以論太子見卒家無餘財陸抗遜子時與諸葛恪換屯柴桑更繕葺位上宜十七條與晉羊祜對壘孫皓即西陵督步闡叛歸晉抗躡之羊祜還言抗遺祜酒祜饋抗藥諫黷武牧荆州上疏西陵國之西門云云晉伐吳終如抗慮機雲皆其子賀齊賀本姓慶震齊之伯父純避安帝父諱故改威山越討賊所至蕩平全琮振贍空船而還招圖關羽破分三郡險地為東安郡以琮領郡山賊魏舟師諫圍朱崖吕岱平諸冦親用賊錢博在交州厯家不餉家過年八十王事哭徐原益友云復於何聞周魴平冦陽誘曹體斬獲萬計守鄱十三年恩威並行鍾離牧以稻與認者不永興縣長謂其慕承宫欲罪認者牧請之得出裝長止之顯名平五溪如救炎居永興宫種蒙隂山潘濬事昭烈威關羽敗事吳姦討五溪蠻吕一弄福濬陳其隂後遂誅陸凱遜之族子定諫孫皓淫樂斥勸還建業胤勸取士責何佞臨終薦賢不肖弟字敬宗平交趾任州十年身潔事濟是儀本姓氏飯孔融嘲以民無上遂改今姓數典機密蔬進逹未嘗言人之短十年無過徐詳胡綜皆典機密劉惇字子仁明知水旱盜賊太乙趙逵九宫射覆吳範占候占劉表死黃祖擒備昭烈得益關羽走而不免魏雖和當漢雖戰必和滕承嗣名胤恪郡治萬諸葛恪同受遺詔峻諫恪用兵二十圍新城無成孫誣害之孫峻誣害諸葛恪事驕慕祖夢恪擊之死後付同弟綝夷滕胤禮斬朱異無孫休夷之濮陽興議作丹陽湖田皓百姓怨譖與張布廢休適子迎立皓立萬彧之夷三族王蕃事孫休皓時論清之之不能承順因其醉斬樓玄字承先址切直皓貶交殺之賀卲言王蕃見誅遂何定小人見寵誅韋曜論博奕之非紀不為孫皓父和作被誅華核諫孫皓營新宫免言農桑書百餘上見卒魏曹參後曹騰為桓帝中常侍有養子嵩實夏侯惇之叔父也生操至子丕即位為魏曹操為洛陽比部尉東歸起兵謀誅卓袁紹為盟主鮑信迎領兖州刺史破黃巾得戎兵三十萬漢獻初平三年迎天子荀彧計都計董昭計操為司空用棗祗韓浩議興屯田建安元年於是州郡例置田官操征行無運糧之勞起於棗祗而成於任峻誅吕布降張繡邀袁術術南走而死敗袁紹於官渡糧盡欲還用荀彧計遂攻潰紹軍並四年紹死子談尚相攻操擊之遂并河東十年伐劉表表死子琮降十三年破馬超於潼關十六年十八年策曰袁術殞潰橋蕤授首吕布就戮張楊殂斃烏丸三種一征而滅鮮卑丁零重譯而至封魏公征張魯二十年二十一年封王設天子旌旗右操用兵規取天下事操既克江陵順流東下吳周瑜敗之赤壁再失荆州十三年再進軍濡須口攻吳權上箋有春水方生君宜速去之語遂還十八年取吳宜緩而急破張魯取南郡司馬懿勸乘勢取蜀不從十八年劉備進兵漢中操自擊之斜谷口不克再失漢中二十四年取蜀宜急而緩右三分處過吕伯奢聞食器聲手殺八人曰寧我負人諸將計畫勝己者隨法誅之如楊修亦見誅枕幸姬卧覺而殺之小斛足廩穀斬主者以厭之酷虐詐偽皆此類荀彧去紹從操操謂吾子房迎説定河濟以髙祖關中光武河內為比勸漢帝都許以髙帝為義帝縞素為比皆論紹操勝敗以劉項為比諫平生教操為漢賊以爭天下言之至九錫以死彧意豈以天下未一操未免受之遽歟表薦郭嘉荀攸鍾繇計攻袁紹計取劉荀攸彧從子謀説緩攻張繡子説竟攻吕布凡破袁紹多其先攻紹二後取劉表畫策十二道從征孫權卒賈詡説李催等為董卓報仇西攻長安説張繡追操詡知其先敗後勝説繡降操操緩下江東因楚之饒以饗吏士撫百姓江東不勞而定魏以計破韓遂馬超言劉景升父子定太子文問吳蜀何先詡言劉備雄才諸葛亮善治國孫權識虛實陸遜見兵勢皆難卒謀不從江陵失利郭嘉謂袁紹未知用人去之攸謂操真吾主料此袁本初十勝十敗與荀説攻吕布孫策必死匹夫之手爭料袁紹性遲必不救備備料袁紹二子必料三郡烏丸必不設鮑信袁紹等初起兵謂操曰能撥亂反正者君也迎領兖州夏侯惇曹操本其兄弟軍有辱其師者殺之儉都督十六軍在常迎師受業清夏侯淵督軍糧山擊黃巾收其糧州擊雷緒氐太原賊南賊韓遂涼宋建羌死於蜀矢曹仁破袁術張陶謙定吕布功破繡河北黃巾關都許樊皆有拒潼屯潰圍曹洪以馬授操劉聚糧繼軍征表曹休破吳蘭而張飛走擊文帝以為征東將軍吳曹真拔靈丘帝文帝時破張進郡征吳陳受詔輔明破馬謖平三備倉袁渙初拒吕布不罵蜀先主請請訓民以義田順民意崇教訓明先聖之教屯清張範恬靜邴答袁術在德不在強資曹操常令範與原居守謂文帝必此二人涼茂守泰山賊襁負而至公孫度欲取鄴拒止之國淵典屯田散首級實數祿賜田疇哭劉虞曹北邊服其威信從公辭爵王修輟社肉刑赴孔融難曹收葬袁談銅諫操嚴才反赴操之難於雀臺邴原與管寧俱以操尚稱事門徒數百歸曹操非公不出管寧華歆薦其獨行不屢聘不至見金顧張􅀈胡昭皆屢辟不出崔琰諫曹操計甲兵諫世子獵毛玠勸操宜奉天子選布衣蔬食清琰為丞相西掾玠為東掾並典舉所舉皆正之士天下莫不以亷節自勵徐奕馬超既破留守西京反以為中尉太嚴魏諷謀選舉何夔不就袁術新誓死不辱安守長廣平賊諌科守樂諸城平邢顒德行堂堂言行唐令風化行植有寵顒以庶代宗之戒鍾繇説李傕天子得出長安欲督關中諸軍操無西顧之憂復肉刑華歆歆為龍頭邴原為腹管寧為尾共一龍貧守豫章清操孫策待以上賔歸操清厯文帝明帝位三公程昱張邈叛與荀彧留守郢城東河三城以待操殺説勿與紹和請殺蜀先主料孫權必不先主門自兖歸闔不出董昭説都許魏降張楊餘黨征料先主創文帝時論吳危劉煜勸操以劉備得蜀日淺急攻之不從小定曰今未可擊文帝時料蜀必為關羽報吳吳稱臣獨勸襲之不聼孫吳禮敬廢諫勿伐不聽伺明帝時請誅遼東公淵伐蜀密其謀善意迎合所卒以此見疏發狂死謂巧詐不如拙誠蔣濟説間吳以圖關羽帝曹仁曹休伐吳皆預計其敗明時戒權臣太重劉馥操表為揚州刺史靖恩化訓立學屯田守備子陳儒之本司馬朗十二試經欲欲復五等之制郡國搜狩習攻戰承士業無主宜復井田任峻為典農中郎將棗祇建屯田起數年所在積粟軍國饒於祗而成於峻杜畿以荀彧薦守河東十六年比關中蕭何河內冦恂冨而教之西征軍食一仰河東張遼本聶一後不屬吕布降操數有戰功氣屯長社軍亂動合肥之戰吳人奪樂進短小眭固膽烈劉備擊吕布關張超張橋蕤多張繡袁紹羽飛等升登于禁與張遼樂進張郃徐晃俱名將有功伐關羽降吳後還見龎德畫像卒張郃應募討黃巾死屬韓馥之敗歸紹漢中夏侯淵以郃代破馬謖紹敗歸操諸葛殺之徐晃降易陽以示諸城賊山羌破關道平鄜及陽全樊襄陽朱靈名亞晃李典官渡供軍吳合肥不以私害公與張遼破好學敬賢李通必曹公定天下冠官渡之戰斬紹使勇三軍吕虔守泰山平盜十數年威惠討東萊郡賊李條等駕泰山遷徐州刺史一委别王祥許褚一手逆曵牛破操謂樊噲癡宿衛衛覺始徐他殺之韓遂虎武之典韋勇力敢陷陳破吕布之持大斧張繡不仰視張繡戰死焉龎德馬超敗而降操殺關羽破樊不降見閻溫偽許馬超告下邽以大軍至見殺王粲蔡雍倒屣操博物短小貌寢典造制度勸劉琮歸誦道邊碑徐幹字偉長云王昶戒子曰偉長淡然自守願師之文帝偉長恬淡寡欲彬彬君子著中論二十篇陳琳諫何進召外兵阮瑀學蔡雍琳操之國書檄皆瑀作應瑒字德璉作常斐然有述意劉楨字公幹自逸氣淳治聞路不耽世榮修與曹植友善邯鄲繁欽粹丁􅘙楊荀偉等亦有文采不在七人之列七人自王粲以下衛覬請𣙜鹽典置律為出著作宜量入魏官儀劉廙諫伐蜀桓階説張美以郡歸操陳羣紀之子帝知人伐議復肉刑置九品明時諫蜀諫治宫室杜襲侍中關中督漢中攸駐諫伐許裴潛守代郡姓歸心單于稽顙反百料單于復文帝曹丕操之子立九品官人之法州郡置中正日食歸過股肱非罪己之義勿復劾黃初元年詔婦人不得預政後世有背違天下共誅之詔郡國選士勿拘年儒通五經吏達文法並試用三年處右好孫權為蜀所攻遣使稱臣劉煜請襲之不從二年徴侍子吳遂臨江拒守三年伐吳賈詡諫不從師竟無攻四年吳蜀復進大舉伐吳臨江嘆息而歸五年事右伐吳時諸侯王皆寄地空名而無實王國老兵百人以為守衛三年失處鮑勛勸寬惠百姓寮諫獵之為宫正百肅然斥劉曄佞帝怒出諫伐吳殺之亷司馬芝守甘陵沛陽平河南皆有績神尹河南者莫及之厯明帝絶無澗専農桑王朗字景興蜀伐吳勸育民省刑營諌獵厯明帝諫宫室諫伐子肅張既操時為京兆尹懷流民衡文帝時破盧水胡定涼州破酒泉蘇斬西平麯光賈逵豫州刺史為天下法休賈侯渠夾石之戰微逵曹幾殆蘇則與臨淄侯植聞魏代漢發服悲哭見推董昭云非佞人枕諫以獵殺人憚鄭渾事操文重去子之法沛多以鄭為字盜帝時守陽平等郡鄭陂尹京止妻子飢寒辛毗引裾諫徙兾州十萬户持射雉甚苦六諫伐吳明帝時諫營造節制渭南軍髙柔除妖謗賞告法士言三公不知政法明帝時請重博諫宫室獵賈詡論吳蜀陳羣大可前並見司馬懿帝伐吳鎮許昌晉受遺詔輔政餘見卷首滿寵操時敗袁紹賔客帝時破吳於江陵助曹仁屯樊力戰有功文預知吳來燒軍明帝時知孫權偽退表不罷兵退料孫權上岸財耀兵伏擊之明年火燒之家無餘田豫持節北邊胡人破膽動明帝時討遼東公孫淵拒吳軍夜驚不領并州老而退明帝置律博士衛覬之謀詔陳羣劉邵刪漢法合百八十篇太和三年詔退浮華於是免諸葛誕鄧揚等官從董昭請四年劉劭都官考課法七十二條竟不行景初元年作許昌宫洛陽宫昭陽太極殿總章觀青龍三年婦官秩擬百官之數女子知書者六人為尚書典省外奏事是時王朗陳羣髙柔辛毗楊阜蔣濟王基孫禮等諫上不能用而優容之三年性嚴急其督修宫室稽限者帝召問言猶在口身首已分王肅諫三年以馬易珠翠玳瑁於吳徙長安鍾簴槖駝銅人承露盤於洛陽又鑄龍鳳起土山公卿皆負土景初元年自黃初來諸侯王法不相通問太和五年帝疾劉放孫資以久典機密恐為夏侯獻曹肇所害因薦曹爽可大任宜召司馬懿相參帝從之右皆失處諸葛武侯攻祁山天水南安安定皆應之馬謖違武侯節度為張郃所敗太和元年武侯再從斜谷入約吳三道進兵帝敕司馬懿勿戰遂自東征吳遁而武侯卒薑維等亦引去陳羣髙柔衛覬辛毗並見前楊阜論袁曹勝敗不討馬超平隴右於辭封云為政舉大綱下忍欺劉曄等薦文帝有公輔器族義明帝不法服不見侈諫宫室美女下陳九遇雨諌伐蜀諌宫室以天為任未乞遜位許卒劉劭守陳留崇教化課作許都洛都賦以諷考法説略王肅陳政本云官寡而祿厚詩乞除宫室烏獸論遷史注易春秋禮國語爾雅鍾育繇之子正諫親征祁山曹諫宫室勞役始中諫齊王爽伐蜀蒼慈守燉煌立民夷稱德祠陳矯車駕卒至尚書門欲省文書曰此臣職分非陛下所宜臨徐宣僕射諫陳威刑太過作宫室衛臻僕射職切諫宫室戒越戒馳騁盧育作考課法行選舉先朴和洽勸省費務農素初毛玠典舉治諫儉過中常林帶經耕懿守郡有綪司馬見必拜崔林言考課在任人而已以忠直為司空孫禮諫修宮室七郡五州皆有威信州以為曹爽長史爽不便出之揚髙堂隆諫取長安鍾將火災星變鷹諫土木諫用法深死上疏防揚之臣郭淮諸葛攻西圍知其必攻楊遂王基諫修宫室出料孫權必不徐邈守涼州風化行可以老病忝之辭三公云無其人則缺豈當操時通明帝時介卲陵厲公本志稱齊王鄧艾請屯兩淮司馬懿善之始開廣漕渠自是東南有事大興軍旅資食有儲而無水害元始元年曹冏論魏輕宗室非強本弱枝之道曹爽不能用四年初曹爽輔政引用何晏鄧揚丁謐等晏等欲爽專權乃以司馬懿為太傅至是專權屢改制度懿遂與爽有隙稱疾不與政八年懿誅爽等嘉平元年懿卒子師秉政三年師遣王昶毌丘儉諸葛誕三道擊吳兵敗師引過歸已五年師殺李豐帝不平師遂廢帝立髙貴鄉公髙貴鄉公毌丘儉以師廢立專權起兵討師不克被誅正元二年師卒弟昭秉政二年諸葛誕在夀春為自固計昭討克之帝見威權日去不勝其忿率宿衛官僮出討之賈充逆戰成濟遂刺弒帝元皇帝一稱陳留王昭進爵晉公昭命鍾會鄧艾大舉伐蜀艾自隂平鑿山通道克之鍾會譖收艾艾遂謀反為將士所殺艾為衛瓘所斬昭進爵為王昭卒子炎嗣遂篡魏劉放孫資掌機密帝見寵任進放善書檄懿資決策寢疾贊曹爽司馬杜恕畿之子法議牧守勿領兵專務本業帝考課在任人非所急亢直厯事明齊王傅嘏介之後弟難劉劭考課法伐告曹義以何晏必惑子兄諫遣王昶等吳事明帝齊王陳泰羣之子却薑維代郭淮征西將軍與督雍涼諸軍為鎮軍却吳孫峻司馬氏親友王昶著治論兵書儉議考課及懿薦之師令其伐吳毌丘諸葛誕王昶皆有功王凌勝吳全琮欲廢齊王與甥令狐遇並興兵司馬懿討之飲藥死諸葛誕以夏侯玄等四人為四聰衛誕備八人為八達劉放子熙孫資子密臻子烈為三豫丘明帝惡之皆廢錮夷齊王立復用昭見王陵毌儉等以討司馬師滅遂保淮南討殺之麾下不降見斬者數百人至於盡鄧艾屯田水利三淮北二萬人萬淮南三萬人鑿六七年可積千萬斛十衆五年食山攻蜀徴欲竟攻吳衛鍾會白其悖逆檻車其父子瓘斬之綿竹西鍾會繇少子既破諸葛誕謀居多安伐蜀有功譖鄧艾禽遂自反至長亂兵榖之王弼逸辨書注易老子年為尚郎二十餘夏侯尚事文帝上破上庸平三郡蠻破吳諸葛瑾自庸西行七百里夷服從夏侯玄尚之子與尚淵之從子谷都督雍涼曹爽共興駱之役李豐結后父張緝欲以夏侯輔政而誅司馬師師聞之豐玄緝皆族曹爽明帝使與司馬懿受遺詔復進何晏鄧揚李勝丁謐畢敇揚勸伐蜀從駱谷入楊偉陳其不可而還爽驕奢作窟室與晏等縱酒其中收司馬揚懿俟其車隨駕朝髙平陵勒兵先據武庫爽晏等皆族何晏尚主侯粉白不去手為行步顧影六好老莊言與夏玄荀粲王弼清談謂經糟粕古今紀要卷四
