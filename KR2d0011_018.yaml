body:
  text: 古今紀要卷十八宋黄震撰宋朝仁宗初立章獻明肅皇太后劉氏聴政十一年意向堯舜三代賈昌朝以經開説慨然思正百廢修太平增四諫官首用歐蔡開天章閣給仲淹筆札使書所欲慶厯慶厯人才之盛晏殊相范仲淹參政杜衍樞宻韓琦冨弼副之歐蔡等諫官文冨並相士大夫相慶於朝蔡襄歐陽修等相繼言官冨弼歐陽修余靖王素蔡襄范鎮張方平趙非唐介包拯吳奎吕誨司馬光除越職言事之禁以杜衍封還内降告求恩澤者宰相兼樞宻冨弼請中書樞宻三司通判國用慶厯李師錫薦章三十餘止與循資章得象在太后時無依附故大用王堯臣權三司使知欽若真奸邪右致太平處節事神浮費毁龍舟籍後宫所備金帛二十餘萬賜三司罷温廣貢果出延福宫金帛及内庫綾羅禁中珠玉助三司藉田十二歩旱蝗求言禁奢侈立為定制宫中以下不得銷金露禱放宫女讞獄歳活人數不復玉清宫念和糴之弊右恭己愛民事韓范平西元昊求稱臣寳元慶厯元年張方平乞赦之而降冨公使北契丹平慶厯狄青平廣儂賊平皇祐四杜杞平歐希範又治西邉平西京盗文彦愽平貝州王則平慶厯七王堯臣體量西事寳元世乞復用韓范偹奏种衡治狀右禦事晏殊言張耆出天聖元年廢郭后吕夷簡出范仲淹争廢后歐陽修余靖尹洙皆坐朋黨黜唐介論張堯佐貶春州范冨歐杜終為小人所間右君子小人進退處仁宗三子昉楊王昕雍王曦荆王皆早亡廢后郭氏崇之孫仲與尚氏楊氏忿争夷簡請廢之孔道輔淹等力争宻召不入暴崩慈聖光獻皇后曹氏彬之孫中張燈親蠶士好書平衞之變諫禁謙待張貴妃神立英宗法立宣仁后出英宗疾垂簾即歸政告宗以新之弊何不王安石戒取幽薊云免蘇軾於死此十月二十日崩只此日去蓋日太祖忌温成皇后張氏多智數勢動中外以貴妃追冊顯伯父堯佐初不收恤後僥倖通年號天聖卜八明道二六景祐五三寳元三八康定二慶厯皇祐至和嘉祐閣寳文樂羙成陵永昭配享沂國王文正公曾簡許國吕文靖公夷䇿士宋郊寘王堯臣楊賈黯王拱辰馮京張唐鄭獬章吕臻劉衡煇民王俊許將相丁謂二月即位七月貶馮拯次年天聖元年十月貶力與謂同相謂不死拯有王曾孝先五害青州人邢三元劵不志温飽附列昭應使鄰折洋鐡之説不祥瑞罷見真宗定知應天捕飛蝗訛言移使錢惟演阻章獻臨朝同殿垂簾儀以擅山陵貶丁謂崖州而相折請用孫奭陳元勸講軌事欽若欽奉宫觀之言辨曹利用無不謂尹師魯自待何為在錢延年等例於斥張耆赤脚徤兒宫力制章獻請託改受冊文徳殿止修昭應遂罷知青州天聖七年景初相薦吕夷簡可當政柄再相與夷簡不協罷祐二年拜四年免前後輔政十年處事審而中開陳可否辨慱有餘勲進止如有尺寸清修莫敢干以私劾楊崇昵鞹登堦曰奏舉者柄臣所以振紀綱寛釋人主所以示恩徳荅希文不顯㧞一人曰恩若已出怨将誰歸謗諌以民訟觧㓂凖秦州取陳堯咨以不得大用之守洛歳饑饑民脅困指者笞而釋之非禁怪物食小兒訛言事代陳堯咨大名悉掩其大名軍民畵像以敵使沐浴而後過其境人楊億稱其揚休山立獨不敢戱第四㕔舎胡文定稱儼然不動寡言品題者以為榮旌㢘約送簡子截下紙此御篆賢碑額御篆碑始王欽若上稱為真奸邪一天聖元年拜二年十月薨張知白重名器無毫髪私三年拜六年薨張士遜曹利用薦月六年拜七年免復明道元年十月拜卜二免二年四月拜十月免寳元元年拜康定元年免並見真宗吕夷簡進士制科蝗免筭農器小王旦告王曽知其當相旱請去賡吟技加竄訟萊公永興奸民順奏緩祥符運木材之役官劾偽以嶺南賊為李者請納天書陵中而司仗衞悉罷建與沂公奏曹利用非不軌同玉清宫災請不復且去使名乞押班保舉罪以罷監軍諌真廟器服過厚作荅仁宗疑獄從輕建郊恩辭遷官保全晏殊宸妃誌言無子議立郡學伐建睦親宅置太宗正以謀殿外靣折敵使契丹壓境請建北京諌以節度使募元昊記不用杜衍所薦雷簡夫平勃不去所以安漢録太后宣諭入時政請荆王子毋留宫中楊宫中火災上御樓乞捲簾太妃垂簾遺詔出陳州鎻章獻大車太后郊見禮刋請塟李宸妃如禮曰不欲保全劉氏乎皆防㣲杜漸有功社稷處料王耿為福建漕必墮陳絳訃上體不安促召緩行范不肯多進准白平以韓范帥西冨公使北譽冨王佐可致太開天章閣日獻二事洙罵希文燒元昊書以賣宋庠曽易上語以紿王臨終薦韓范文龎籍梁適公亮入選納曹氏益每先候上意及未厭而去故能三相而上眷厚請廢郭后貶仲淹道輔募市井人為萬勝軍費創南班七遺契丹歳繒金二十萬皆為後來大天聖年拜至明道二年二月免三月復拜至景祐四年薨康定元年復拜至慶厯三年病上剪髭上書懐忠碑子公綽夷簡作相事多干渉公弼見神宗公著見神宗公孺清簡寡合李廸諌立章獻獻周懐政之誅全仁宗踈丁謂矯詔逐之章崩復相夷簡出之直真宗明道二年相至景祐二年王隨子正休河南人以知秦州許逃卒自歸援喜佛慕裴仁宗為相與陳堯佐不合災異罷至景祐四年相寳元二年陳堯佐希元韓閬州人壽言事貶倅潮州下捕鰐魚作公祠州出米食饑薪實土錢塘減滑州木龍塞河名陳公堤東漕河北除石炭税官冶鐡課歳數卜萬河鑿澤州路徙河北鑿懐州路而太行之險通為知開封以誠信元夕盡縱惡少十典大州六轉運方嚴肅下而未嘗按黜一下吏居不試知制誥唯公與楊億太常丞十三年起郎七年丁謂敗始進用遂吕申公臨終薦其能鎮撫百度周知天下艱苦相與王隨同拜免初相進劉蕡䇿戒殺器服壊者補之弟臨卒自誌墓堯咨嘉謨狀元金魚墜地善射母擊之並見晦翁言行録目事畧載其侈泰佩凌樂黄換觀察特命魚章得象希言免泉州寓浦城仕高祖仔事閩其妻練氏救二將二將後南唐攻建練曰不願獨生一城頼以免屠簡重翰林卜三年母夢玊象及象笏故名為相仁宗八年然不能有至寶元元年相慶厯五年晏殊同叔虛父撫州手力節級三七歳善文正知滁州李已竒而妻之年十真宗除字龍圖閣讀書幾試神童不欺君垂荅上以貧故不能燕㳺訪密議章獻當簾論張耆不當為樞宻出守南京興學延仲淹教授天下興學自南京始康定元年相而元昊反請罷監軍陣圖司制財出入法賢出宫中財佐邉施財賦悉歸右臺閣多時方共條天下事行而權倖不便諌官孫甫蔡襄論其役官兵治邸舎罷言行録載仁宗怒其誌宸妃言無子頼夷簡全之既而八大王言殊名在圖䜟上又重怒頼宋祁為學士争之遂以役兵規利行詞罷之慶厯四年韓范等相繼去出其門剛峻益待人以誠壻仲淹道輔歐公皆為相務進賢冨弼楊察篤學能文杜衍世昌析越人而㓜孤十五六往河陽依母改簿書推毫髪施於民則簡易自乾州鳳翔民争境上權要不敢干永興為民省調發輸送費典銓吏不得升堂與銓事開封積内降十數連封而還驗與韓琦争不可擊夏與仲淹争契丹必不來皆言諌官蔡孫不可無故出由此罷相年公與韓范冨同革弊事而衍尤絶僥倖慶厯四拜五年免每事問諌議㸔未韓公也事范公出門下與争事上前衍無愠色一善决大兖州以公租給州縣官未嘗壊同官戒門生為縣令無露圭角用戒求人知事退居憂國戒浙人柔懦易動􅀢器謝十年壽八十時無居第既退方葺舎南都㓜二兄遇之無狀及貴恩待賈昌朝子明愽真定人論崇政説書天章侍講皆始焉學善議及為相結賈夫人為姑正人少之七慶厯五年拜至年免陳執中昭譽相恕之子相傾杜衍并蔡襄孫甫罷之而拜凡再人不敢干以私問遺無及門公治張貴妃䘮厚時論不與祐妻張殺婢趙抃歐論罷之慶厯五年拜皇元年八月免五年復拜至和二年六月免歸子世儒不樂為太湖縣弑母張以處死文彦慱寛夫將汾州人治吕許公歎大有福人不十年為相言軍當峻法繼父為河東漕通銀城戰禽王則元昊叛知秦州敵不敢犯慶叅政督並用文冨朝士相賀初相暦八至皇祐三並相時在至和二年論薦用安石韓維張環與龎籍同汰兵唐介之亦罷再相首薦介斬上疾責内侍軍令狀増捐必白設醮宿殿廡告變卒破賈昌朝結内侍武繼隆止開河乞皇后聼政之奸不言新法及浚河事不聼從卒折馬廐為薪定用鐡錢之擾獨與妖尼書韓曽皆有之西不肯如曹利用以樞使位宰相陳升之上判京先就第見監司唐介子義問為漕甚至和首議立英宗口不言功異年九十侍英宗恭耶律永昌拱手稱天下位將相五十餘年两以太師致仕英特威重名聞四夷彦入元祐黨壽九十二耆英㑹冨弼文慱楚席汝言王王尚恭張趙丙張劉几王馮行已建中慎言問燾拱辰司馬光未七十宋庠公序觀開封人異開寺祈福三魁閣争廢郭后白乞罷災天章不對利害不當下同諸生對策願至中書條上臣請大祀後絶内降恩以新聖政作科條均武所入官奏事不顧墜地文書至治告税僕執為相當承平尤務清静皇祐元年三年初政多分别是非故斥再用遂浮沉故初名郊李淑譛其不祥改今名龎籍醇之右單州人自焚垂簾儀制阻章惠臨朝天恐左以竒巧媚進儉約之戒孔道輔稱子御史遵奏尚羙人稱教㫖上杖宦者築劾范諷放曠不禮法五龍川敗後守延州城募耕遂為樂土用使元昊稱臣杜元昊求割三州十六縣之請兵數年無一事煩民刈馬芻還直為樞宻與彦慱省兵六萬至王徳用盡復諭為相請專委狄青平儂賊不使為平章不肯程戡歸為两府弼執不與都知王守忠節度轉辨彦慱無私若冨一以公處事則譽者立將為謗以擅議築堡罷節度察知定州二十䟽請老和治民明法治軍嚴而其勞苦遇僚屬謙服善皇祐元年相至三年梁適仲賢門顥之子相論妖詛殺人者以死皇野鳥翔端非瑞仁宗諌以張貴妃斂儀殿又不肯為園陵使遂罷慈皇祐五年至至和元年間两知秦州人祠之聖飯僧薦之孫子羙漕河北獻徽宗北珠書縱侈有幹才之開封吏不得逞委文於路子羙焚劉沆冲之臺吉州夢曽祖景洪名所居為後隆山築聰明母牛僧孺而生沆論西事執政不悦沆曰宰相豈有常時來則為之園潭州開一路榜曰賊由此路出降為張貴妃陵使遂相至和元年至嘉祐元年事裁抑言者言官二歳予郡縁貴妃進主䘮又侈大論者疾之冨弼彦國事河南晏賢良方正壻范文正為晏殊擇為壻畧載見其文故之郭后事言朝廷一舉獲二過乞還仲淹昊使夏守贇不可樞宻軍州通判陳事斬元諌院乞正旦日食罷燕恐北敵萬一行之平因請除越職言事之禁罷下中貴黄徳和誣劉降元昊卒斬徳和乞中貴王守忠都鈐轄與監軍無異中争以宰相兼樞宻繳劉從愿妻封遂國詞頭書舎人繳詞頭始此書使契丹析割地求昏之請乃夷簡䧟之易國王拱辰譛之不行使還辭遷官納樞宻告願毋施邉備章得象諭以非因使敵乃受天章閣上當世務十條河北安邉十三䇿大畧進賢退不肖止僥倖去宿弊易監司以汰所部北契丹受禮雲中保其不來避夏竦出宣撫河因石介聖徳詩國介之死又讒其走契丹而公以兵應之歸及門即使鎮鄆徙青州活流民五十萬平王則拜禮部侍郎不受二就遣中貴張從訓與彦慱並相至和年至嘉祐六年仁宗疾留宿殿内起遣使裁減賦役立天下無事號賢相母憂五復不從同賛英宗而未嘗言餘見英宗韓琦稚圭雲父國華諌議處㓜孤自立推唱名第二五色見監左藏之自若官理事不倦府尹稱真宰相器簡司諌奏輔弼非人乞用范杜道輔宋郊王曽夷蔡齊宋綬上為罷宰臣王隨陳堯佐韓億石中立鍾諌大慶殿設道場之諌内降詳定阮逸胡瑗律曰不若窮作樂源樞言戚里占軍為僕咸費自宫掖始内諌垣藁百宻比舊文書為録令驛令請出降糴米萬手實邉蘇請城豐州用例自閲吏不得高下其諌捕子羙等飲酒言張方平論列王益柔之非活諌以冨公守鄆冨方自河北回安右立朝事益利饑民百九十萬元昊叛撫陜西辯劉平不叛從乞起仲淹代范雍塞副夏竦䕶西師乞出戰不秦州賊不敢窺以籠竿城為順徳軍蔽蕭関取以鄜慶渭三州土兵抗元昊張元遣人來刺金帯公宣撫陜西仲淹宣撫河東與仲淹争不必益兵罪鎮定治驕卒教方員鋭陣鄆州獲盗者除京師戍卒踰月就律田并州罷不急役逐怗勢宦者復契丹地墾塞下募弓弩手西邉警遂經畧陜西不肯棄綏州夏拓秦州塞不欲取横山忌者沮之詩两納師魯竦之言進太宗真宗獵大名刻章三判相州一請聽契丹通好按右方面事財天條八事選將帥二明察三豐利食四遏僥倖小五進能吏與六退不才一七謹入官右八事人側目諸公同力徳完補八去冗天下事正與希文彦愽争事上前下殿不失和氣汲引直薦用蘇頌韓絳立柴氏為崇羙公表弛茶禁集料夏使所言十事㕔料諒祚必奉政令問賢王曽典故問東趙槩文學問西㕔歐大事自决辰慶厯中杜冨范同心輔政張方平張明逸王拱繼為中丞佑三人為黨逐之拱辰勸公躍出黨中公曰惟義之從不知有黨亦求去右相業嘉祐三年至神宗初輔立兩朝以後事並見英宗曾公亮明仲條泉州六㑹稽置曹蛾斗門三居母憂應詔時政事所至舉職班院吏束手鄭州外户不閉號鄭開門省盗皆竄他境使年客失物樞府修紀綱除弊事冗兵嘉祐六相與韓公戮力一心尤精法令典故韓公毎問之共立英宗神宗急於民故罷茶禁收絶戸田為廣惠倉趙熟朝政尤謹折獄强取産金銀者得減死使滋禁契丹漁界河折賀正使不赴宴進夏人犯順絶其歳賜貨料嵬名山來歸非詐王安石持禄殖李復圭議以池邉老鳳孝寛公綽孟都承㫖用文臣之始公鄆州請子封爵西府迎飬亮參政任中正沉厚以孝稱營救丁謂罷魯宗道貫之諌亳州令天書海塩令魯公浦君請選試守酒肆飲酒不欺為正言數諌直宗厭之乞罷上悦其忠魯直政荅章獻武后唐罪人諌立劉氏七廟為執不使其子舘閣讀書僥折曹利用器立朝剛正嫉惡魚政府七年裁抑倖不以名假人貴戚目為頭參政以與張知白當垂簾時清節直道為名臣夏竦子喬時江州論應制舉及教仁宗書清當争言符瑞抗䟽不可大臣領玊宫使遂附㑹神恠取進樞章獻聼政㣲服干欽若起復邪不使契丹拜宻諌官御史十八䟽言其奸在陜西怯於用兵罷知亳州遂召為相言者又論其與陳執中不叶不可共事以樞宻封英國公變是日京師無雲而震者五仁宗以其奸邪致天罷之商販離間僚屬待家人亦不以誠家襄州活饑民數萬保洪州索部中巫千九百毁滛祀所至立伍閭里恬然無書不通薛奎宿藝使絳州太詩謁馮魏公千林如有喜惠折契丹求見后開封肅清至蜀則以愛稱比張詠而不苛政以俸錢與不孝者飬母如叱告戍卒反者參欲䋲天下一入規矩不意則歸臥媿歎曰吾慚不及古人而懼後世之譏籍上章獻衮冕剛不茍合敢言期仲淹龎明鎬以公輔王曙晦叔曙王績之後政守蜀前張後王易劉燁答真宗值歉慮盗以法治與凌䇿地皆然復張詠一家犯法丁戸皆不得糴之法以婦翁㓂相得罪諌罪昭應守衞者且止復建代錢惟演守河南永叔言萊公禍不在杯酒推御史如束濕以時尚奢侈躬自節儉天下皆其賢入拜平章逾月薨益柔抗直善論事獻元昊叛言備邉選將與杜衍合崇儉制田均税三䇿宋綬公垂愛之隨州召父臯直集賢院館外祖楊徽之十五試父子同入閣建言赦令愆期脱械係三千二百為除逋負數百萬臣僚只對前殿忤章獻端明學士復置對奏恩止大臣不孝謹筆清介寡言政通貫楊億自謂及札參敏求次道王安石改其罷中丞吕公著制行詞頭遂請罷力學被遇又封還李定除裏繼世掌史朝廷典故士大夫疑議皆就决蔡齊子思之意洛陽偉㓜依外舅法置器賦有安天下衣冠然進對有天子擢狀元特給騶從之獄賈同作詩戒嗜酒誥治獄濟以寛寛偽税不謁丁謂許以制不記景徳寺許以參政欵止楊太妃稱制果諌窮治飛語安石者決請納附蠻人不從後亂諌立陳氏河横隴請止提駟州伐契丹祭天料其不動倚臨事無牽畏而謙退不天下推正人縉紳為朝廷重府請磨逆凖題名中兩居憲臺方嚴不動泣在政浩然示至公於外潁人見故吏為忠孝子知人嗣精專寛大沉嘿以從延慶後有子延嗣延慶有學進士舉簡嘿既遇事能别白宗所至有惠政齊得子自陳歸籍所有付之盛度公量請餘杭科事真宗上西域圖河西隴右圖建四仁宗參政獨留詬拜者韓億宗魏送開封社貧與李若谷更為僕負箱赴長為御史權勢畏之為若谷益州十萬石賑饑法中丞諌再召楊尚二羙人度樞府薦武臣纂兵諌加唃斯羅獻夏㨗節洋州引乳毉證李甲誣嫂姪之寃家參政惡諸路捃拾官吏小過方正有守治嚴次子西京倅回不記獄事欲撻之緬八子綱綜絳繹維縝緯程琳天球其大慱野制争契丹使坐次曰許其小必啟治益變於未形為火備元宵救火笑遣告變卒空誅祀灌口神者獄决事神速開封一歳獄四五寛禁中火災誣縫人諌移閠月當正旦日蝕不仲淹之貶皆指為黨公獨為上開説三司使肯合税目為一曰合而没其名一時之便參諌商賈都下入中佐延州察夏人偽降誘我政剛厲與王隨堯不叶俱罷守大名前後十年人愛之與宦者皇甫繼明争行宫事諌伐元昊三將節度嚴深嗇財自奉劉請章獻立氏七廟石中立見真宗好景祐參政客晁宗慤見真宗王鬷緫之馬趙州交館王化基之門宋湜見而妻之争季良引務之請知益州卒亂令不亂者斂手皆出如知樞宻院以元昊叛措置失宜罷曹瑋之先見云李若谷子淵州徐州藥荆南䋲王蒙正夀全芍陂并州建學潭州治盗夀八十仁宗參政言朋黨於宫觀置提舉自若谷始質厚長治民子淑獻臣文十三獻上時政十議典聰悟過人至博學强記詳練故累官戸侍王舉正陳堯佐壻為康定參政堯友壻李徽之訟其悍妻罷中丞奪張佐兩使争狄青為樞使不得請觧言職范仲淹唐相履氷後為吴縣以㓜從母嫁朱氏感泣苦學割粟粥四朱説名登第終䘮歸宗辨姜遵竒之待如骨肉論之語于屏粥馬歩歸廣徳司理記與太守監西溪倉請築通泰海三州捍海堤數百里晏晏殊使掌南京府學四方從者輻凑王曽使殊改薦公除館職諌冬至百官獻章獻夀正色荅晏殊為太后安撫東南所至絶滛祀諌楊太妃代進烏昧草貧民所食獻争郭后貶睦州交知開封閒暇知列内侍罪百官圖夷簡怒論上前落職饒州歸元昊反經畧陜西知延州城清澗興營田屬𦍑數萬戸以擅復元昊書知慶州城大順耕賊地歳遂築細腰胡蘆諸寨邉二士勇邉實恩信大合大族皆為用取居與韓琦叶謀横山靈武元昊懼南臣求和而以召歸夏人戒小范胷中數萬甲兵韓公使尹洙約公五路進兵討夏公不從果大敗於好水川責一韓一范謡條鄉兵但刺其手參政上每見太平天章時事田明黜陟厚農桑抑僥倖修武備精貢舉推恩信擇長官重命令均公减徭役上不便者騰口十一歳罷有司盡罷公所行遺荅朋黨曰在辨其邪正免高郵晁仲約厚刼賊之罪不可導人主誅戮手滑茶不才監司一筆勾去不用石介諌官諌施塩禁减商税謂杭州歳饑競度興土木不省青社輿賦之苦己吕申公天下有人相公知辟客湏可為師物夜寢必思自奉與所為相稱謂諸子曰忍令若曹享冨貴羅綺豈帷幔患位高難退不患退無居黄不肯買緑野堂加媿獨享冨貴置義田宅焚散絹三千疋恩贈朱氏以報之薦問堯夫何不贈曼卿麥舟冨弼張方平為晏殊作壻邠州徹宴賙䘮不啓黄白方鄱陽化之風義成俗純子純祐有行義以疾廢純仁禮純粹吳育春卿建安官甲科高制科三等國朝惟育先入省㑹議請小職者異席治開封豪猾國去其為害者而已界元昊初叛諌用兵請封為主諌龎籍争麟州棄白草夏果犯邉罷賈昌朝等編修資善堂書封在政府執行仲淹河東奉請范在政府育以開白事相忤與昌朝争議故高若訥因旱罷之臣論中使言杜冨山東得人心可憂是小人傾大陳執中舉自代以侍宴醉呼出正晩節心疾政簡嚴謚肅弟充丁度公雅諷開封鳳論章獻祖顗盡貲置書邉度作王諌止徙陵議議馬明鎬化基為宻州奎奏判官薛奎辟為益州知録程琳代副彦博平貝州端重安静高若訥敏之不肖并州育尹商河棄圭田不耕書擠吴代為樞副喜申韓程戡勝之畧許州宦分師邉閫號習邉事然無它智交者不許敵使小幘見王堯臣伯庸著應天减死為令狀元死光州饑民發倉者乞郭后乞按宦者閻文應元昊反體量陜西奏以涇原為急薦韓范天下選种放有將才以争韓范不當罪遂并他議皆不行韓明年賊大入所議悉得行因使安撫涇原年乞范不從中御招叛將姚貴為三司朞不加賦而用足明年以其餘償内藏數百萬又明年積者數千萬不肯收房錢不肯増塩井課樞宻勵抑濫倖小人益怨為飛書狄上信公篤公益内感在位六年廢職修舉折青以禍福典外制十年叔父洙均税廢謂大臣薦賢而避嫌是疑大臣而賢才洙子欵臣元祐吏侍張昇杲卿誣韓城劉論張堯佐楊懐敏死之罷沆謂仁宗孤寒辨石介未使敵言弟先靣兄受位西府與韓琦叶心建儲十忠信謹險不干謁分禄九族退居餘年孫抃夢得下眉州書樓孫氏自甲科以袝章懿文仁宗泣為中丞上䟽陳今求事為精神訐人為風采㨗給為有議論深刻為有政事老争張貴妃追冊罷陳執中多薦士參政可笑罷廟議七歐陽脩家貧不母鄭守節教之貶省元甲科朋責高若訥辨仲淹非辜亦夷陵著黨論乞范公起帥環慶辟之不就成増諌員被首選木行杜冨韓范言請抑温后諌宣示瑞太平字麟請却淮南羡出視州言不可廢言杜冨韓范不當罷遂乞募民耕並邉禁地乞罷河東重歛置御河催綱司漕河北止冨公殺保州降卒公置磁相都作院小人偽為書汰宦官宦官中公出同州上知留修唐書陳乞削傳䟽所引䜟緯之書翰林八年多聼罷執中體請出狄青開請建儲易知貢舉黜險怪號大學代包拯封尚簡曰强其所短必不逮謂治民如治病愈為良醫故公治卲寛簡不擾官府如僧舎河決商湖請順水所趨隄防兵府以兵數地理為爵籍與公亮蒐補天下兵皇政府官兵民財為總目因嘉祐水災再䟽立太子五彌縫英宗母子間僧再辭樞宻義請二府各舉人執奏内臣以慶輔為鑒此干政之漸不主濮議蒋之竒彭思永攻之致青州乞青苗錢收利聼民願請亳州力求仕篤友誼恤師魯聖俞明復之家吕賞識之下率為聞人平心無怨惡潁川識公著草陳執中制不念舊惡以唐書五行志不書事應文五代史身與尹師魯古文相尚多談吏事章止潤夷陵閲陳年公按書折妖尼二牛前世事之説計用章謂其諭性貽誚後世龜山言其性分全無見處棐舉進士以修卒始仕為入元祐籍罷居潁修道徳文章三朝所知天下學士大夫皆師尊之而棐能以文章世其家趙槩叔平父老應天劾㓜孤篤學為倅海州歸徒歩見洪州鄭陶飛語奸利青州未入中限不催科遷母老乞以任子官先封母詐稱皇子而江南者致仕後進諌林乞誅歐陽公素薄之躐之知制誥及修因從子事坐蘇獨抗章争無罪後又欲以翰林讓修言捕舜欽等非朝廷福使張浩贓敗坐敗六年而憐浩不衰馮浩益公錢以己俸償之掩惡揚善恢然偉人謚康靖樞使曹利用見真宗錢惟演以章獻姻家出河陽常恨不得黄紙後署名見太祖張耆楊崇勲並見真宗王貽永狄青漢臣漢汾州西𨽻軍籍選為散直十六代兄擒鐡羅陜用兵補延州指使數歳間大小二十五戰捕敵萬餘其破金湯城收二千三百帳築要害上命圖形以進虎翼窠破黨項無遺類悔再鉦聲止大呼勝敵青不令士追虜於險曰寕不擊龎籍乞獨任擊儂智高貴近求從行者崑斬奪菜者騎萬餘人行未嘗聞聲風雨夜度崙關以兵突標牌辭交趾助兵故功成籍執不與平章真范文正授以左氏春秋晩節益喜書史徙定過故鄉下車趨謁縣令罵征南懼貽母憂但稱奉使江表田造謝劉易易青黥卒不肯祖梁公曰青出家少為兵光不肯去面間字乞拜翰公廟庭下洙以夜然火事見誣不自安陳州薨賙尹家王徳用元輔為鄭州以父超邢十七孤軍破繼遷甲勇士婦人誘捕洛盗章獻賜坐酒徳用所轄獨不飲輔不奉后㫖補軍吏道不為太后䘮坐甲孔道以宅枕乾岡罷公輔卒公惜朝廷亡一直臣見黒王相公殺敵呼其名以驚小兒吏者喜得澶州不契丹覘者定州訴過都不願進見使定州屯兵六萬無譁者人杖黒米卒契丹稱公樞宻冨公相為得金契丹閲馬雲朔乞兵二十萬當之不許則請予帛以全舊好善射再發再中乞勿賜諸將陣圖文軍政明而士心附禄詣韓忠獻宋景召試文誠空踈施諸族田况元均徳京兆録進士制科計治蜀比張詠敏總景會計為皇祐㑹録寛厚明副使范雍伯純應宫祖龜從孟昶歸朝家於河陽言止修昭知延州不用通判計用章之石元孫劉平没於元昊顯匿詔全永興城池仲子宗傑孫竒曽孫坦三世計用章竄雷州淹奏起之姜遵見真宗趙􅍬宣州入章獻臨朝􅍬結劉羙出之婢以至樞使李諮仲詢付臨江新喻罷減經費十三象折商人以怨變茶法不以茶犀泣求還母稱樞府職鄭戬天休陜蘇州昊知開封流馮士元水知杭浚湖廵西元畏之主劉滬城洛有聲場屋弟制誥淶雅外强毅必行惕衣冠子豪縱者法黥配餘皆息任師中中正弟書守鄉郡御閣任布應之臣河南父唐任圜四世孫堂子遜上書力詆大亦以為不才五知恩道命足幸陳升之陽叔附建州石為樞副言者論其交結宦官會安先拜相時為小異本名旭包拯希仁牛合肥察割舌盗觧官侍飬十年不仕謁宰天長端州不持一硯不呂夷簡注知縣出夷簡益竒之擢用始此閻京尹吏不敢欺天下呼包待制關節不到有羅包老盡毁惠民河上勢家園第舅開門使訟者直造庭下笑比河清鄉郡撻從立朝剛嚴貴戚歛手子諌院斥大臣權倖罷内降近恩非邀後福議罷按察使之名中丞乞建太罷斜谷務造舡材木十萬張堯佐二使罷七州河橋竹索數十萬使諌奪放河北一路所負回易公庫錢十餘萬偽辭色峭直而惡苛刻嫉惡而恕不及攻未嘗儉約為劉筠奏立族子連張方平宋祁罷之而代為三司歐公有蹊田奪牛之䟽親黨亦絶之胡宿武平興常州簿因夢平反殺夫獄懐折不肯書滕公湖學書者還再用楊敏詞頭内剛外和清儉謹重發則不可回用乞當致仕者待其自言言朝會用新樂郊廟舊樂皆不可於乞復三歳貢士制置涇卒以折支不給亂公言上逹包拯三司吏獄上命為青詞祈嗣因請選立祖宗法翰林多所補益小樞宻六年争不可變乞謹邊備上争㓜生事乞許夏使以蒲撾入都門之西事重章郇公争楊定以獻取横山䇿委不受浮屠黄白術士當修身俟時無為造物所嗤萊兼通隂陽災異州宫災乞祀大火於商邱登地震知王則曠之叛古郊祀明年大旱言並配非言并洮建節鎮非國之利吳奎長文禁濰州右晝治事夜讀書皆十年不寐肅諌官切左僥倖已得官者究奪朝廷然劾再劾楊懐敏釋諌御史言事非實詰從誰受開封以内降賂禁中之罪劾内臣大水乞建儲孫奪郭承祐宣徽出張堯佐河陽震尹京徙豪民氏聲聞赫然賛立英宗地荅英宗小人黨盛用知王安石心强性狠而可大餘見神宗知院夏守贇子羙謀并人附父死王事仕至西府仁性怯寡士不子随知元昊間李彬同知王博文仲明西曹州十母適韓氏以恩封之又持服位府二六日卒子疇不為閹人指使五西府五十日卒張觀恩正幕絳州已長者書犯夜者問有人見否丞父為職而為秘請回授其父為中薦彦愽為御史曰知鄆州弛塩禁行平生未嘗草書為詩保心如止水為見真書諸臣趙抃論宰相陳執中章二十上見論樞副陳升之章二十餘上詳神宗范鎮見神宗孔道輔原魯天下孔子四十五代孫政剛毅直諒名聞知諌院請太后歸廷奏曹利用上御藥簡奏崇勲罪狀多中丞大呼拊門入諌廢郭后夷黜之詩雖不如道輔一言宰相説以猶折節對以不能蛇使敵優人以孔子為戯赩然徑出寕州擊妖張士遜因馮士元獄賣之出知鄆州忿卒中路子宗翰孝厚公衍聖余靖安道號韶州酒税四賢慱學强記擢争仲淹亦貶筠州増諌官親正言諌開宗寺塔舎利助諌與張堯佐提㸃開封縣鎮事昊使契丹折其中國討元昊之説遂得冊封元而北邉亦無事賊三至敵中為戎語詩貶而起復經畧二廣討儂宻結交趾諸豪賊無擾狄青至賊遂走海上遂留逾年嶺海肅然税交趾㓂邕召其臣詰責之獻首惡罷商舶歸不載海南一物契二廣十年恩信被于異域皆可頥指氣使少使丹入辭每事書一字于笏茹孝標發其年犯刑詐舉事以将軍分司王素仲儀答文正子官四諌之一姓起少年遇事感發上唯宦宫妾不知名者乃可相上憮然曰唯冨弼苛請親出禱雨去請出王徳用女口為漕獨不貪史自投劾知成都約厨傳以輕酒息蜀罷鑄錢十年以平物公異價廩賑利路人録公所行為正斷敵冦發静邉寨以公如渭州至則敵去者屢帥涇原民其它路莫及力却邉民驚入城太原水來至樂堤宜活饑民十餘萬稱朋黨説方盛公獨言范韓富召用所至能風憲尤勁論事必得㫖乃退上稱真御史時號獨擊鶻兩豪侈賄怨富弼不汲引更毁之晚節益頽靡州以聞開封弛慢罷蔡襄興化襄作四賢一不肖詩亦永叔安道王素除諌官以詩賀三人薦之除諌官乞罷夷親封唐介之貶獨言其忠得御史坐論梁適得罪公還詞頭奏兩府母見賔客與孫甫言陳執中剛愎不才不可執政襄出福州而執中相教閩人以經術禮遇陳烈陳襄鄭穆禁䘮葬豊侈及蠱毒不治京師無留事破奸發隠聞三司量力制用書温成碑不談政事朋友䘮為位而哭歐公為辨於上初仁宗之立或傳襄異議曽韓忮刻殘酷械係晋江令怒其作樂唐介子方邱荆南驛平江令直李氏用人祠鬼之獄任令坐門給國信使築場得水判徳州不奉運司以軍帛配民籠殿中侍御奪張堯佐宣徽使極言文彦慱以燈錦媚貴妃致宰相貶英州而名聞天下書潭州分珠獄發上稱介必不肯買被謫無私至京言事無避如前乞延訪羣下後宫求恩澤乞不以貴賤為賞罰重輕劾京兆奉㫖放獻金弁人乞裁屢䟽罷陳升之與内侍通姻増經畧河東戒邉将宗事敵擾邉移文論之諌官屋僦直餘見神王質子野蔡文正姪濟倅蘇州言以術鉤盗鑄之非州撤元祠建狄公李太尉祠廬州争盗殺其徒而不首者不當原婚當西兵急用時漕湖北獨不進羨荆南與訟者錢與盗衣者衣病流内銓稱職不更法曰選法具備如權衡明扶率子弟餞仲淹曰得為黨人公賜厚矣年小人起大獄賢者皆貶廢質聞悲憤卒介貧而㢘刻乞米帖館殿二十年同舎皆顯官然不動心為邵清思治孫甫之翰言許州修永興争蜀交不可以偽造廢議右正言張媛寵恣城水洛事主劉滬故尹洙罷洙公所厚也永言保州兵變樞副當罪時杜衍為使衍初辟公興録事非他吏不能者不以煩之後又薦為祕挍襄張海刼京西大臣益議増兵公詆其非與蔡劾晏殊而薦富弼上怒而相執中又極言執中不可用因與襄力求去滕宗諒用慶州公使錢杜欲重法范欲薄其罪冨公兩難之甫問石介知之歎諸公如此復何望月餘不寐不以追臣夜開晋州門鄧州二賢堂韓綘仲淹甫相繼為守息教弓手成精兵大敗張海郭貌山之擾盗賊為陜州減厨傳過客畏其清陟江東兩浙漕視州縣事之修廢民之樂否為黜而不納毁譽監司自處而䋲范文正以法守杭善澹泊不受呵水硯性勁果談論著唐史記彭思永季長州南海分寕令相戒無犯至於無訟攝台救水災潮州修堤均役省費御史極論内降官守明堂百官遷秩公帥同列先言此為張堯佐王忠之故漕湖北出守令一人八州知勸官不肯獻羡曰不忍裒民取賞罪權成都府治盗錢吏治取腰間交子奸民二而人知畏法戢省中貴祠峩眉例需三之二力鎮髙陽驕兵大不以桑麻為産税髙下争濮園之議拾金釵與蒋之竒發歐公隂私出黄州為㓜不失釵不尋牢籠之事吾所不數歳時處被中則思天下之寒暑种世衡仲平圖書放兄子追推資産與昆弟惟取季父宰武功人以片紙示縣門澠池葺傳舎而以手摶誘人舉廟梁取請城寛州改名清澗城公守之鑿地過石泉遂為法貸商錢使致粟其以銀為的教射亦以免罪澗軍士病不愈者笞子待部落如家人清遂成冨强鎮以侍姬與敵酋蘇慕恩得其死力屬范仲淹使環州冐雪造牛奴訛卧其帳中羌悦服意沿邉惟環不増兵而力自振夏人獨不以環為結青澗僧王嵩反間元昊良将野利王及為祝板反間天都王元昊由此求和而元帥蔽其功杖一蕃将使奔西夏盡得其事機以銀鼓誘擒明珠首領羗聚哭八子城細要月招三種羗得疾卒屬詁諤誼知名孫師中有傳古太質破羗推䕃與諸弟官上世衡反間之功田樂善乞納贖諤罪辭張問諤子正繼擅納嵬名山城綏州得罪山韓絳使築囉兀城得罪收洮州欲取横而為徐禧沈括所外諤守延觀望永樂遂䧟好殺敗戰首開邉事誼夀翁唐舉進士行使青語鬼章便道十萬俘鬼章及青宜結涖軍嚴先去惡再知蘭州還强兵二所至興學禮儒任子恩先及兄弟之子李及王旦薦代曹瑋秦州斬掣釵卒觀書如故楊億稱之旦笑用及非為此以重厚可守瑋規模也談杭州薄待中使江徳明集冐雪謁林逋清終日死為之䘮市白一部為終身恨尹洙師魯夏河南永仲淹貶饒亦乞同貶貶郢州酒税竦鎮興洙為判官奏攻守二䇿詣闕戬賊㓂鎮戎便道敕之竦以其專降倅濠州徙鄭命劉滬築水洛城洙奏罷之戬奏洙沮功慶州湜董士㢘又誣以贓按驗毋有又貶均州酒税劉按之均州疾革言不及私温濯隠几怡然而逝在喜論兵叙燕息戍二篇以西方用兵五六歳嘗其間欲訓土兵代戎卒減邉用未施行而元昊臣洙亦罪去每臨大事鼎鑊不變修為郡邑謙下好善之心過於嫉惡與穆以古文矯時尚通深春秋推故文謹嚴記錢惟演守西都謝希深判歐陽官師魯書梅聖俞主簿洙希文謂身安而後國家可保謂臨國事不當顧身兄源俱有名有洙好辨果於為源剛簡不矜細行薦諌葛懐敏救定堡川罪上書救劉辛事希文其可居館希文等得悲憤卒石揚休言温成廟降香誤書名自乞增諌官等五事飬猿鶴收畵圖適工詩燕肅請疑獄皆聼奏天建議考雅樂漏以創物大智聞下蓮花刻胥偃有田數十頃既貴送與族人臣限争田月日試中書吏焚大屬書段少連章獻朝論戚里恩濫范公既逐又三上書郭后廢力争决遣如流蔣堂禁中火乞毋歸罪宫人修争郭后廢進奏復鑑湖益州學潔延後彭乗重厚純孝此不事生産林蜀人赴蜀官始仕至翰學士趙師民經行淳懿其既第不仕孫奭薦麗耀州民犯鐡禁曰鄣利又罪之文清舉止野彦若以父任十登制科親年九減死刑通判淄州以入元祐黨藉張亢舉進士丹擊西夏勝之築五砦而麟府之路通禦契城瀛州東南関因妓行首白事敵中動息必知藩輕財好施之軍政嚴整漢圖像祀劉滬兄渙請章獻還政諌廢郭后滬深沉有智城水洛郭承祐妻華王元稱女任至宣徽使官驕侈狡獪所至煩擾武諌許懐徳陜西戰一二仕至節度宿衛十四年張孜副富公建使仕至節度謝絳謂宋土徳又請真宗配感生帝言災異進聖治箴蘇紳進士制科毉陳八事仁宗嘉之卒再入翰林見彈誤用藥力疾狀之子頌葉清臣地震言余范被黜編浙漕䟽太湖盤龍匯滬瀆港為三司使詔勅吏不能欺簿帳冗者去之敢御厨呼索為合同爽邁言集百五十卷楊察轉運江東一路悚栗能止罷糊名晏殊壻七歳言弟寘狀元以母憂卒孫沔言官有直名治郡有能名杭慶州優戯特支佑髙命斬之後知貪縱不法王拱辰十九舉第一為名拱夀仁宗賜今名無知劉六符輕峭樂夸荅真宗北伐非名敵遂繼好育使敵自誇趙漢惟我富方平附賈昌朝以譛吴拱辰黨吕夷簡以撼弼然方平宏毅絶人不可同年語所見神宗言未知陛下向何郯論兩府陳執中丁度夏竦是辨言賊起中宫者欲傾皇后由名重梅摯純厚不矯厲州為諌官言事有體滑州以兵代民偹河許元請髙塞粟之價而下南鹽以償之東南去滯而西北粟盈擢江淮荆浙發運不數月京師足食談在職十三年笑治之吳中復孫抃未識薦中復為御史曰昔人耻呈身御史今豈薦識靣臺官邪彈梁適樂易簡儉好周人之急陳希亮知長沙縣置海印于法交通章獻家勒為雩都禁緋衣老人之訛毁滛祠數百區巫為農七十餘家不開封録争趙宇言元昊叛貴冨公薦知房州盗入境清勁寡欲王公人皆嚴憚之其嚴而不殘終師宋輔卒妻子恤其母身司馬池推家財數十萬與諸父令光山竹木為諸邑先殿試心動即歸退仁宗謂池獨耆劉知鳳翔誅執岐陽廵檢者公知平誤事不報江鈞子温吕溱狀元不論陳執中開尹京精敏對客過數語然敏善議論簡倨賈黯狀元諌棄官就飬太吕誨言黯黯為中丞奏留誨封皇子為傅請濮王稱皇伯言大雨大臣阿諛所致公有學修潔以晚軰偶得科第拜范不欺之言沈遘狀元以己仕為第二遂為故事留治杭尹京皆以嚴見憚日中廷無人賈逵為狄青先鋒平儂賊括公私無所犯謂种諤僥倖宜安邉息民楊遂平王則儂賊思功至節度尚氣節撫劉順妻奴盧政平西夏儂賊有功年官武泰軍節度導謂种諤僥倖宜典禁衞七十餘踴躍前安邉息民忠義劉平士衡而薦開封州父䘮還遇賊射殺三人萊公竒知瀘夷人畏服為御史論事為丁謂所惡使換武備邉罵元昊反上䟽不報轉戰三日兵力不敵見執賊見殺子季孫賢篤學能詩薦東坡之任福祐之戰開封敗决死之攻元昊白豹城英好水川之時桑懌王珪武皆䧟焉王珪開封再鎮戎軍乗暮以少擊衆奪賊二鎗州好水川拜以死報國子光祖邉功知定卒武英太原武父宻契丹戰死好水戰死桑懌開封州棄粟救弱譏自請補耆長殺盗殆盡不殺宜蠻讓功或其好名曰若欲避名皆可為好水戰死耿傅公弼文祖昭化為蜀州司戸罵賊死闕山外之戰以吏奮前死或譏之尹洙作辨誣馬遂開封擊自請招王則手賊見殺孔宗旦雍州司戸勸陳珙備智髙不聼後見執罵賊死曹覲建州所守封州力不足為儂賊執罵賊見殺趙師旦守康州罵儂見殺蘇緘宣父李二泉州州南海簿杖舶啇知英聞儂賊冦廣州武陽尉斬黒募壯勇數千赴難以功換武合守邕州力拒交趾之攻城䧟猶力戰門三十六口死之循吏趙尚寛安仁子陂時議廢唐州為縣尚寛求召信臣故迹復渠四方民雲集増戸萬餘朝廷増秩唐民畵像事之渠王安石作新田詩蘇軾作新詩羙之高賦中山人萬衢州捕蠱蠱遂絶作繼趙尚寛守唐増戸餘榛莾盡為良田陂堰四十四請如唐制端門外列大第處執政祠又請憲司置檢法官二郡皆立生儒學周堯卿長於詩春秋可不惑傳註及孝友卒范仲淹舉經為師表不用而胡瑗翼之湖泰州授景祐定樂范文正薦白衣對崇政州教殿中丞致仕再召議樂侍講仍治大學不復致仕没與孫明復石守道同讀書太山十年歸家書澗中明道以來三人皆學者師容湖學為太學法治事齋經義齋拓歩軍居以學者明體用侍講不習儀升講不顧謗議强力自立臣為師言行而身化之事畧請興武學薦梅堯孫復教之作院法女丹州議邉事素治家嚴商嫁必勝吾家問與富子孫復明復之晋州文居泰山來著尊王發㣲以石介師事范正因其謁補學職授春秋經丞相李廸妻之妃孔道輔就見使惡胡瑗瑗治不及拒張貴致禮韓公人録其書藏秘閣直事畧又載范富薦道徳經術講與孔温往來貶趙槩薦復召侍石介守道師説兖州復固窮苦學葬不受王瀆盤餐太師孫耕徂徠五世七十䘮入學以師道自居太學之興自此復魯人稱徂徠先生恠説慶厯聖徳詩孫明謂禍始此韓范非之吕為直講歳餘卒於濮州夏竦欲發其棺頼居簡得全張安道目之為奸邪蘇洵舉進士茂才皆不中遂閉戸讀書能歐公目為荀子為上其文韓公以賈誼不過復薦之成召試辭奸除覇州文安簿與姚闢修建隆禮書卒辨論譏王安石不近人情者鮮不為天下患天初與二子至京師文章擅下請仁宗山陵李泰伯旴江冨文章知名子國强兵學從學數百赴不喜孟海門簿召太學卒王回福州南造次必孔孟粹不為小亷曲謹友以薦宰頓卒經術深安石曽鞏深之顔復顔子四十八世孫彛嘉祐中以有道之士薦教言禮樂不立請降制乞考正祀典言官無旌别非嚴師之道文藝石延年豪氣俗不治章句酒慕古人竒節偉行請不屑世乃一混於耻推恩奉職章獻還政視請為二邉偹西方果用兵施請籍陜西民兵世事蔑若不足為及其設雖積思慮者不能過八文章徤勁稱其意氣年四十與劉潜皆能飲蘇舜欽易簡孫上倜儻事長古文歌詩行草世為墨寳數書言范仲淹薦其才坐賔客累除名才廢居蘇州得湖州長史卒年四十字杜衍愛其而妻之衍亦因舜欽罷兄舜元才翁仕至轉運使梅堯臣世以詩名國王晦叔嘆二百年無此作外趙槩薦為子監直講官至都官員江休復鄰幾一與尹洙蘇舜欽逰罪與時知名士皆見逐以祠神會飲得作神告言皇嗣事雅外若簡曠而内行修飾而文章淳尤長於詩與人交久益篤章望之表民相好學扼從父得象䕃為校書郎歐得象為以嫌之不仕艱苦不悔陽公等薦其才終不肯仕王令逢原中荆公銘其墓曰始予愛其文章予愛其節行年二十八卓行陳烈福州言孝友規從學數百部父兄訓子第者必舉烈行以之薦禮見屈遂不復試仁宗屢詔不起薦者交至木路提刑奏其遣病妻歸家貪詐人也司馬公乞覆寔然世頗以矯偽譏之歐陽修復薦之起為郡教授不受廪禄隠逸徐復復之更建州知衍卦氣知禍福號曉律吕笑胡瑗知器不求聲辭官賜冲晦處士髙潔復好言兵居仲淹薦召後杭高懌築室依种放與張嶤許勃號南山三友法薦召皆辭賜號安素處士賜田宅文有詩清淡精氏族張俞不中第上攻取十䇿王賜官乞與父簡乞檡守宰及仲淹徳用禦西邉上書夷六詔不起隠青城山外戚張堯佐温成后從父堂舉進士辨三司使諸路困於誅求祀明經費已除節度宣徽景靈等使之包拯王舉正吴登等劾家法不修曹佾慈聖光獻兄夀生除中書令惟佾一人可神宗召與同至慶宫后驚外戚入禁掖不自我開端過慈聖崩請郡太端謹寡哲宗朝加保宦者雷允恭發周懐政天書事擅丁謂結之通宫禁勢横中外移山陵賜死閻文應夷簡結之疾出楊尚二羙人出挾醫視郭后后暴崩諌官劾之任守忠章獻時與江徳明等交通權寵盛宗仁宗出之未幾西方用兵用為都監英不豫交亂兩宫司馬公劾貶之英宗韓琦以勇知不世出可與有為竭忱輔立哀毁致疾慈聖光獻太后同聼政次年疾愈還政慈聖事見仁宗諌闇中禱雨王晦叔請大雨自責去詔中大臣思天變之語韓琦調䕶兩宫司馬光為諌官分别賢否范鎭給事中趙抃都運河北治蜀召張方平立太子英宗即位纔四年初三年一科舉英宗四子神宗顥英王顔潤王頵益王宣仁聖烈皇后高氏瓊曽孫宗弟士林當遷告母以妾故亂祖法神宗不豫立哲宗召司馬光吕公著相之去新法之不便於民者文賜邉砦贖亡民以和西戎而天下復安不肯御徳殿云天子正位也哲裁外家恩四之一八賣装封曹氏䘮數百調䕶宗者懇惻周盡年而崩天下遂為紹聖年號治平四甲辰閣寳文樂治隆陵永厚配享魏國忠獻王韓琦亮魯國宣靖公曽公䇿士彭汝礪相韓琦司諌言輔弼非人乞用范杜等立安撫陜西弼天章條九事並詳見仁宗輔英宗叱允强空頭勅安置任守忠傳上疾作抱上入簾内太上服藥鎖宦官相禁中語勸英宗奉后勸太后照管官家英宗疾輔立神宗啟英宗出祈雨相賛還政山陵回辭位判州未㡬經畧陜西方凡四判相州塑像慶厯中杜冨范同心輔政張平張明逸王拱辰繼為中丞指三人為黨逐之而琦亦去正右輔立及進退事士陜西入覲荅治本在辨邪荅安石翰林學則有餘以其荅楊忱書只為一身虎相州四䟽乞罷青苗趙抃乞俟安石議安石圖行右斥新法不晩節事事尤力以遇大事即以死自處處倉猝亂謂大臣當李固杜喬為本所恃者公道與神明於右自處宰聞更法度紀綱則法公論飬兵亦利民於相推許裴晋公王沂不以小人而不待以誠㓂以小人處小人不與較言丁㓂立朝善皆歸言歐范尹終不受申公籠絡議與范公論石守道慶厯聖徳詩之非恠鬼右論不造李都尉人不中理者未嘗峻折歐晚與歐公相得然不言及係辭文中子請試用公用孫沔李師中李參皆舊怨不罪碎玉盞吏不易燒鬚卒否韓侍中境無多需索敵使問韓侍中安曼卿獨不敢戯侮曾公亮與韓公戮力一心詳精法令典故韓公每咨之見仁宗參政歐陽修彌縫兩宫宗冨公言其濮議之舉忘仁累主上欺韓公趙槩並見仁宗樞使張昇與韓琦恊心建儲見仁宗冨弼同賛立英宗而不言之恠魏公不關報徹簾事怨魏公有致弼族滅語并怨歐公終身不忘之勸上當念太后賛立恩辭非魏公迂䇿立宦者官二十章辭位五章使相判河陽上震怒徹除曰若臣有大過何不斬臣詳見仁宗神宗文彦慱仁宗之疾䕶宿殿中責宦者軍令狀報病増損英宗起復相之不可折武繼隆皇后得聼政之説詳見仁宗樞副胡宿見仁宗吴奎見仁宗神宗王疇陳升之見仁宗吕公弼上疾宻白魏公當鎮以静奉奉詔與司馬光同定學制不果行乞上母極子道不以造次廢禮與因講子之所慎齋戰疾開尤精講讀語約義明司馬光同侍經筵二月筵至九月神詳見宗簽書郭逵吕誨劾公主奸劾陳升之不得為請禱雨上書調䕶兩宫任守忠竄守忠争濮議見神宗鄭獬毅夫官安州子狀元乞乞儉塟仁宗逸諌龍飛郡國弟減進士舉遺祖無擇擇之石蔡州士甲科上定議衍聖之封王取王安留學院梁物為公用後遣子韶按治士大夫寃之郝質汾州熈挽强第一後邉功仕至節度義與董指腹為昏不負之篤信古今紀要卷十八
