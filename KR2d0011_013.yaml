body:
  text: 古今紀要卷十三宋黃震撰唐五憲宗與杜黃裳論藩鎮請制以法度李吉甫繼相亦主其説擒劉闢而蜀平誅李錡浙西平擒吳元濟淮蔡平斬李師道淄青平魏博田興賜名𢎞正請吏於朝遣二子及獻德棣二州幽州劉總專意歸朝廷自廣德垂六十年兩河二十餘州自除官吏不供賦至是盡遵約束右削平藩鎮事元稹論賞諫輔太子上嘉納謂事有違宜卿宜博論相裴垍推心委任戒鄭敬賑南山飢朕不計費勿效潘孟陽飲酒逰山李絳白居易論諫必從絳或無所言輒詰所以盛夏上汗浹衣亦不許絳出曰與卿論天下事乃樂減租出宫人絶進奉禁掠買李絳居易曳倒安國碑樓因絳言絳論吐突承璀上稱忠臣李吉甫于頔請嚴刑上曰欲朕失人心嘉崔羣讜言討淮西無功獨用裴度言平之用烏重胤言諸道所統支郡兵馬並刺史自領伊慎以賂中尉求河中貶劉希光以受孫璹求方鎮錢賜死却升平公主獻女口却荆南毛龜罷延齡别庫右從諫明斷處嘉牛僧孺李宗閔對䇿切直而以李吉甫言貶考官以吐突承璀討王承宗李絳諫不聽卒無功而赦承宗欲還承璀先罷絳相皇甫鏄程異獻羡供侈用為平章事而裴度崔羣見黜以李絳居易言付裴均所進銀器度支而密諭諸道進奉無申御史臺事在四年是年三月以絳居易言絶進奉而四月有是命是驕侈之心不待晚年始見至淮西用兵四方進奉始有助軍賀禮助賞之名合長生藥栁泌迎佛骨浚龍首池起承暉殿土木寖興右失處上為陳𢎞志所弒中尉梁守謙等立太子相杜黃裳子儀留主朔方懷光矯詔欲亂責之伏罪十易置諸將不敢亂為侍御史延齡惡之年不遷拂未嘗過叔文監使壻韋執誼請太子監國不從衣去憲宗國即相之罷韓全義退力主計劉闢皆黃裳指授罷中人監軍專委高崇文兵進勸上法度制藩鎮修已任賢執綱領治其大者以至威行兩河赫然號中興皆黃裳啓之平蜀平夏翦齊滅蔡達權變有王佐大略除相僅踰年惜未久不究其才二年出鎮河東年吏不甚别流品通饋謝無潔白名卒後數御史劾其納高崇文四萬五千緡袁滋依元結讀書不處士授校書郎罪失平奏憚循撫西南夷不署大理覆華州清簡給地流民時慈惠不設教條使耆老遮道不得去敢上監國相之適劉闢反鎮蜀以兄在闢不進料鎮義成七年嚴備推成李師道田李安畏服元濟未易討既三年無功揣上意欲言罷兵聞蕭俯錢徽沮議然更言必勝通使鎮彰義偵賊元濟為修墓署用其族滋遂與好上貶之遺令處後事三年愠與接者謂見肺肝而家人不得見喜薄居處飲食篆𨽻杜佑父希望隴西留後吐蕃懼求和文獨不結牛仙童其後畀金者皆得罪愛重學佑以蔭補得為潤州韋元甫辨處疑獄弊德宗命軍興餽漕剸決户部判度支謂救莫若省用省用則省官乃上議朱盧杞出鎮嶺南開大衢疏析㕓閈以息火災平崖黎民鎮淮南討張愔而出師應變非所長固境不敢進三決雷陂灌溉斥海地為田積米五十萬列營十士馬整飭四鄰畏之宗寬假僚佐爭權亂政副德宗末同平章事順初兼鹽鐵度支叔文之而專其權不助叔文動搖東宫叔文敗舉李巽自副至憲宗初盡讓於巽二年求致仕度支繁而不綱佑還他事所屬者職務簡明將黨項亂上疏以為無良邊臣而然請無興師釋禁誅求示信誠懷柔之屢乞致仕朝朔望二雖貴亦夜分讀書遜廣劉秩政典三十五篇為百號通典平易順與物不忤比胡廣而練達文采不及子弟皆奉朝請貴盛為一時冠治亭館會賔客精吏治不皎察幹計財賦相民利病而上下之年以妾為夫人子悰孫牧治行無缺惟晚為相行輩待主書滑渙鄭餘慶傳鄭餘慶德宗末相之奏對多傅經義以漏賑禁衛議貶憲宗復相以叱堂後主書滑渙罷元年五月醫工自小將除司馬執奏開徼幸路朱泚亂後都輦數驚太常肄樂禁鼓奏復之承詔革品服之濫引遷僕射以宿德進公論浩然歸重祭詳定典制韓愈李程自副增損儀矩號詳衷酒請率文吏月俸百之二葺學府行已完潔謂祿悉賙親濟急自奉粗狹至官乃開廣祿不及親友而修僕妾者吾鄙之內每除方鎮憲宗必誡使曰是家貧不可妄求時史持幢莭就第必數百萬緡奏議用古語人訾不適時與從父絪第同坊號南北鄭相鄭絪餘慶從父立諫德宗白麻拜竇文場中尉宗不為順宗草太子詔曰立嫡當以長憲相之李吉甫譛其漏言於盧從史李絳為解杜黃裳削節度強王室建議裁可不關決默默居位四年為以儒術進守道寡欲所居不烜赫事以篤寶稱世稱耆德武元衡武后族孫平一之孫器順宗時拒叔文德宗目送曰真宰相禹錫求判官不與憲宗二年與吉甫同相稱素知其堅正有守禮信異它相破李錡求覲疾之姦蜀新定代高崇文鎮儉已寬民比三年上下完實蠻夷懷歸卒再相吉甫李絳爭事不叶持正無違附吉甫淮蔡用兵上悉委機政斥承宗乞赦元濟之請為盜所害李吉甫栖筠子吉陸贄出為明州長史人贄貶忠州宰相使甫為刺史置怨結歡服其量郴饒州視事牙城絶物怪之疑專請絶劉闢朝貢不許李錡兼鹽鐵及宣歙委高崇文平劉闢渙贊討吳元濟其却吐蕃盟及獻地請中書史得滑與中人通簿家得數千萬緡刺史不擅見本道使縣罷諸道嵗終巡勾以絶苛斂墨命有司舉才堪令者軍國大事以璽書易敕三代杜黃裳相欲以進賢報德咨裴垍用其所疏十餘人病藩鎮強咨請以刺史自為政則風化可行於是出郎吏十餘為刺史官自王叔文選任猥冒吉甫始薄其員人得敘進旡留才度李錡必反起徐州兵平之大嵗除易三十六鎮惡殿最分明元和國計簿率二户資一兵牛僧孺等對䇿言直泣訴之貶病留醫夜宿竇羣劾其交通術士訊之無狀羣吉甫固乞免舉裴垍自代塘出鎮淮南淮南蠲逋租數百萬築富人固本二溉田萬頃平津堰泄有餘防不足乞賑江淮兩浙旱冗朝廷得失輒以聞八垍病免復召秉政極言食為生人害宿兵十餘萬商販佛老者十五六勞苦之人三待衣食之人七遂詔省吏員併州縣減仕塗均俸給凡省官八百吏千四百宅收都畿佛祠田磑租入寬貧民壁擇門閥嫁十諸王女河北險要圖帝張於知回紇入冦之妄德復宥州以格回紇撫黨項徙受降城於天軍增太原兵馬武備完輯䇿固請自招元濟不許會暴卒修當國經綜政事衆職咸治薦賢褒忠再相梢怨六年正月譖罷李藩左遷裴垍罷李正辭翰林絳帝知其專權杜黃裳進李絳欲爭殿上帝多直由是有隙言天下已太平當為樂絳爭之威言人臣不當強諫君悅臣安絳又爭之言刑未振絳又爭之擢元義方京尹自托於承璀絳出之答上同年有情之問請討田懷諫絳以為不必當自歸畏謹奉法著不忮害德顧大體論甚多子裕裴垍賢良第一實藩府交辟不就部判辟皆才疏三十人鄭瑜珣委校吏李吉甫籍以薦於朝天下翕然稱得人繩代吉甫相三年上勵精臣致治機管多參預請不軌不以中人罪藩監軍誣楊於陵稅上憚垍戒承璀勿言屬奏斂民用省估觀察先所在州不足然後稅州江淮稍蘇之與李絳言未可討王承宗承璀欲間垍自將討及無功又請流斥承璀劾嚴綬政一出於監軍曰器局峻整雖宿貴不敢干以私盡故人求休京兆公才不稱此官奬勵諫官使言讓嚴復不及獨孤郁李正辭孜孜獻納選任精明元和之治百廢修舉朝無幸人學士時引李絳崔羣同列為相時擢韋貫之裴度知制誥時闕御史中丞誥引李夷簡之由李吉甫薦進怒及居中多更其約束吉甫䘖卒無贈給上先見裴武賴李絳得免與李絳奏以李錡家財代浙西賦五年冬闕以風疾免李藩家饒財務施與數年略盡妻子追咎晏如圖杜亞掠令狐運為盜爭不從去之斥杜兼代建封兼誣其撼建封軍德宗詔杜佑殺之色不變佑遣見帝望狀貌曰是豈作亂人拜祕書郎王紹得君邀相見當即用終不詣時王仲舒置酒為俳説廋語一見謝不往憲宗給事中制有不便敕尾批却謹裴垍稱有宰相器遂繼鄭絪相四年三月忠好答人言答祈禱之非答財足用曰答神仙長年妄誕相塗王鍔兼宰相詔正署其左不可沮李吉甫吉甫譖罷之六年月才能不及裴垍貫之人物清整是其流亞矣權德輿事德宗事已見前從請許王承宗請而擇人代昭義盧從史不及王師無功又請赦承宗而徙從史皆如所料溪裴垍病遂相半諫以王鍔兼宰相上悔流董法輕使中使道殺之諫以須有司論罪主對治以仁厚為先察善辨論開陳古今覺悟人輔相寬和不為察名相在五年九月孟李絳吉甫爭論不敢有所輕重遂罷考定許容蔣乂刋彚格式三嵗知四聲四嵗能詩侯經術貫綜至老無一日去書儀文雅瞻公卿王皆所銘紀風流醖藉搢紳羽嘗論西漢亡以張禹東漢以胡廣傾子璩元和監察御史有美名與髙元裕劾李訓覆不宜出入禁中李絳與裴垍諫取李錡資因以賜六州代貧民租支奏以度支急遞代中人持赦賜諸道裒饋餉答上欲庶幾太宗元宗之問屏不為承璀作安國寺碑次君臣成敗為連裴垍獻銀壺請歸之度支諫出諫官王諫以承璀討王承宗又諫以開府賞其敗諫分承宗所鎮不從果反數論宦者肆橫方鎮進獻蔡諫就以烏重倩為昭義留後乞赦承宗趣立功江淮大旱乞貸流亡出宫女禁嶺南鬻子月餘不賜對謂飽食不言聖治如何絳或無所論上輒詰所以然諫上怒居易不遜帝言承璀專橫户上獵苑中池絳嘗諫即返與論任賢遷部獨不獻羡曰臣所掌皆陛下府庫之物絳上出承璀而相之六年冬上李吉甫贊帝威德曰文帝時尚云厝火積薪謂骨鯁真宰相感諫討魏博已而田興果聽命請以興為節度興泣請出禁錢百五十萬犒其軍歡聲如雷成德使者嘆倔強果何益諫對朋黨之問諫疑鄭絪與盧從史通諫疑官謗訕絳諫公主妻于頔子乞請以王播月進付有司訖在位獻不入禁按言江淮水旱不為害者答不當避嫌不用親故子盛夏上汗浹衣不許絳出曰宫中惟對宦官女與卿論天下事乃樂與帝言開元天寶治亂𨽻置振武天德營田四千八百頃乞以神䇿兵各所鎮中人沮之諫教坊使密詔閲良家子內禁中不足疾求免絳罷而召承璀九年春雖去位猶懷能已言北虜五可憂華州繫承璀奴大帝戒五坊使至華宜自戢獵表罷貢鷹御史夫率其屬叩延英諫穆宗軍直道進退望冠一時收文宗詔募兵赴南蠻監楊叔元説其軍以將募直還為民士怒遇害張𢎞靖乞悉力平淮西乃治河朔不從求罷帝後思其言使伐承宗承宗欵附徙宣武承韓𢎞虐政代以寬簡龍簡貴自尊召為相簡穆無規拂鎮盧朱克融之亂見穆宗韋貫之名純地父肇言得失見惡元載之載謂過我當善處之不往代宗欲相卒貫之為伊缺渭南尉河中澤潞厚幣召皆不應薦居貧豆糜自給京兆李實與同里願識之而於上不往為監察御史舉弟纁自代及為補缺纁又代為御史人不謂私與崔羣執宰相杜佑子不可為補缺拾遺奏劾罷金忠義不宜汙朝籍權幸側目裴垍三事不從啓以進退決請取士抑浮華先行實流競為息奏禮部侍郎重於宰相為陛下擇宰相者請釋鎮州專力淮西不從蔡平如其䇿宜罷段文昌張仲素翰林學士曰學士備顧問不專取辭義責裴度為張宿請銀緋曰姦佞吾等縱不能斥奈何假以寵宿怨構之又與度論兵議頗駮遂罷相性高簡好别流品數請罷淮西兵處拾遺郭求申理出貫之湖南大韋顗李正辭韋厚等皆清正並以黨貶中外惡宿寡湖南不忍橫斂所獻不中程異意後左遷重厚言不為偽辭恱人為相嚴身律下正議裁物裴均子持萬縑求作銘曰吾寧餓死生平未嘗通饋遺裴度御史論權嬖梗切蔡田𢎞正效順憲宗遣宣諭魏人歡服視討諸軍知李光顔成功當國十年夏討賊益急涕始延士大大相見出兵久無功爭乞罷師度流誓不與賊皆存親督戰入蔡除苛政民始知有生之樂同以蔡牙卒侍帳下皇甫鎛程異相恥與小人列極論其姦不聽上印求去亦不聽柏上以為朋黨遂不敢秉筆知印故得免禍遣耆説王承宗獻德棣州詔田𢎞正討擒李師道東請殺五坊使楊朝汶京師澄肅用兵事不過山答上樹黨曰君子之徒同德湊異鎛構之出鎮河東十四年夏守穆宗詔討廷克融元稹與魏𢎞蕳沮之罷東都諫官交章極論遂召相逢移書二叛罷兵將鎮淮南又交請相度又留相吉出之山南詳見穆宗厚廷湊屠牛元黨家敬宗羞惋宰相非人用韋處言相之逢吉為非衣小兒謡諫幸東都禁亳州聖水亡克融執賜衣使邀賜絹遣工助治東都料其將諫晏朝定䇿迎立文宗辭度支歸有司南討平李同捷求襲滄景田牛李共損短罷鎮山納臨漢監馬於校以還襄人請老不許徙東都因治第集賢里作别墅午橋號緑野堂與居易禹錫相歡不問人間事開成二年強起鎮河東曰為朕卧護北門名諭張元益束身歸朝三年病歸神觀與邁震四夷外國問年幾狀貌用否始威譽德業比子儀而用不用常為天下重輕終全德史謂晚節頗浮沉為自安子計識經目不忘悅鎮涇原開屯田立戌限使得代人人感靈武斥鹵無井誓神得泉歷六鎮皆可述李逢吉為相十一年春沮裴度淮西功上覺出之劍南詳見相穆宗王涯以循默罷餘見相穆宗時崔羣未冠陸贄擢甲科署中書舍人數讜言直憲宗詔學士奏議必羣乃上辭以後有惡者則學士不得上言矣十請却田季安助營寺五千縑為相啓奏平恕二年秋請釋李師古沒入妻子資産請以母老免權長孺死積獻羡錢七百萬舒其州下户賦請還處州苗諫相皇甫鏄謂相林甫則治亂已分孝答元宗先理後亂由用相爭尊號有睿聖則德在其中鏄誣買直歸怨罷求鎮武寧以王智興得士心為節度不報智興逐之李鄘陷於懷光刺虛實白之朝復張建封軍亂囚監軍持節往諭禍福出之使位不受張愔自稱留後謝表上鎮鳯翔不謁神䇿行營詔去其營兵興乏財諷諸道助軍鄘留淮南一嵗儲餘皆納之朝諸道由是悉索以獻疾監軍承璀薦拜相十三年冬恥由宦幸進引固辭強直無私當官峭法操下所至稱治佐淮南七年委軍吏不任參李夷簡宗室平鎮山南去襄陽無實戍于西川逐王顒諭蠻落去韋臯奉聖樂頔順聖樂謂禮樂非諸侯可擅作相十三年春當師道叛以才不及遜裴度求鎮淮西以直自間有終始皇甫鎛伐蔡急用度哀會濟師蔡平明年與程異相十三年秋內聚斂句剝為相朝野駭愕裴度恥之極論鏄異姦邪苛刻求去揣上意欲自娛數貢羡財隂佐所欲賂承璀為援帝排衆論決任之反謂度朋黨欲損內外官廩佐國用崔植還詔貴售內帑繒綵給邊兵裴度以聞與李逄吉令狐楚擠度太原薦以崔羣重望徑正敢言逐之湖南與李道古方士栁泌浮屠大通為長年藥帝以躁怒遇弒寵穆宗聽政即貶崖州死弟鏞見權盛極言避之程異居鄉稱孝子精吏治為鹽鐵揚院留後叔文引進由監察御史叔文敗貶李巽兩稅使厲已竭節革征利舊弊貢為鹽鐵轉運使討蔡時調財江表諭諸帥以羡故不加斂而用饒由錢穀至宰相自以非人望久不敢當印秉筆資西北軍政不治議置巡邊使自請行會卒無留世重其廉令狐楚德棻之後所五嵗能辭章刃德宗省太原奏必能辨楚為軍亂挺使草遺奏秉筆輒就色不變士皆感泣名益重善箋奏制令每一篇人皆傳諷憲宗知制誥尢皇甫鎛薦為翰材思裴度伐蔡草制不助之罷胤他學士不稱旨上之鎛相使鎮河陽降烏重潰卒鏄薦為相十四年秋又嘗共逐裴度天下疾之怨穆宗路時營景陵不償傭錢以十五萬緡獻羡訴盈貶諫官論不置宣逢吉為相力起楚李紳沮之不敬宗逐紳使鎮武以仁惠治汴遂為善俗循例取到州錢二百萬毁李師古僣制園檻繫為䇿吏部不循例從檢校官班李訓亂將相皆神軍建言內仗非宰相繫所為鄭注奏建榷茶使王涯又議官自治園植茶楚鹽鐡使廢之鎮帥初拜戎服屬仗在開成宴曲江以大臣新誅辭疾且請棺斂時政宦官屢疏辭位出鎮山南外嚴重內寬厚績禮士李星步鬼神進者一不接事善撫御治有召商隱助成遺表謂甘露誅譴者衆請霽威昭洗戒請諡星隕坐獄諸臣白居易憲宗初與元稹中制科樂府諷時事遂入翰林久旱與李絳乞免江淮兩賦出宫人絶進奉禁掠買徵諫勿受于頔歌舞人以論不當使李師道贖魏孫故第論楊於陵取牛僧孺直言遭斥盧坦以揖退裴均黜銀諫以獻羡加王鍔平章事與李絳乞却裴均器孫璹以禁衛勞擢節度張奉國以定徐州平李錡功遷金吾乞罷璹進奉國竦天下忠臣乞免度支久繫囚乞諫以承璀討王承宗嫌諫赦吳少陽為留後井亟捕武元衡賊宰相之或言居易母墮而賦新井篇浮華無實行出為州刺史王涯追言之貶江州司馬托浮屠生死説自適續虞人針諫言穆宗畋遊進忠不見聽貶外刺杭州用無事不言多見聽當路忌之故多擯斥復又皆幼君高醉吟先生人香山居士與胡杲吉旻等九人年不仕者集繪為九老圖雞林賈以其文售其相國閔初與元稹號元白離後與劉禹錫號劉白宗權勢震赫終不附弟敏中宣相懿元稹母賢而文親授書傳伾九嵗屬文上十五擢明經諫以王叔文王輔太子即位制科第一為拾遺事以職諫不得數召見上疏請開諫諍宗路因條上十教太子出宫人封諸王嫁女事召宰相講政許方幅糾彈對羣臣廣聰明畋復正衙諫奏禁貢獻省遊諫詔令毋數易嚴陳西北邉事史當路者惡出之東監察御史劾礪過賦七刺皆奪俸分司都論奏十餘事以敷水馹夜遇仇士良不讓中人擊敗其面宰相年少輕立威貶江陵士曹李絳崔羣居易皆論其枉守稹論事忠直剴切一由中人獲譴遂不能固所至與君子為敵監軍崔潭峻以其歌詞奏穆宗太悅擢知制誥變詔作務純厚明切盛傳一時然進非公議士類訾薄稹因戒風俗詔歷詆羣有司以逞其憾幾入翰林結中人魏𢎞蕳共沮裴度度劾之未相朝野輕笑思立竒節厭人心將使于方言反間廷湊救牛元翼李逢吉誣其刺裴度罷之然帝憐之以為浙東觀察尤奏罷明州貢蚶無召為左丞振紀綱出郎官之無狀者七人然檢望輕公議不右王播沒求輔政不遂詩詩與居易號元和體傳在越辟竇鞏天下至工鏡湖秦望之竒益號蘭亭絶唱附始言事峭直中廢十年遂喪所守宦貴得相才三月晚彌沮喪劉禹錫栁宗元衛次公並見順宗武儒衡元衡弟有風節與人交終始一節疏皇甫鎛剝下論議徑正官元稹倚宦知制誥扇揮青蠅譏之引疾惡太明終不大任將大用令狐楚草制武后革命事沮之孔戣孔子三十八世孫劾李涉投匭救承璀宦寵側目京尹翻異李少和坐贓獄崔易蕳殺從兄况獄戣慷慨論正以韋嶽告信州刺史李位反監軍上變鞫禁中戣刺史不容係仗內請付有司中人愈怒出之之奏罷明州貢淡菜蚶蛤役人四十二萬上思使鎮嶺南免屬州逋十八萬緡米八萬士時給刺史俸且倍之約不得貪至禁鬻口存恤之斥南不得歸者免蕃舶始閲貨之費召不籍海商死者諫討洞蠻果無功穆宗乞老韓愈勸留又上書留孔戡盧從史與承宗田緒相結隂爭不勝則肆言折之以疾歸李吉甫置揚州幕從史三奏誣之吕元膺爭之矣憲宗諭曰非不知戡行用之未幾卒戢徐玫助從史跋扈移書繫之乃列上其狀京彭偃為朱泚中書舍人或薦其子戢啓兆逐之為京兆禱旱曲江溫業戢子吾文宗時求外遷白敏中謂同列等可少警孔吏部不樂居朝矣李遜濠州軍剽劫諭之釋鎧自歸屯衡州政最擢浙東觀察停防福建亂軍之諫畸日聽政鎮忠武當元濟始平嚴約束明賞罰上下感畏抑強植弱貧富均一所至可紀弟建德宗薛存誠奏罷中人館馹使下瓊林庫藉工徒神策軍誣咸陽尉皆執不給事中時劾浮屠鑒虛倚宦竪姦贓論死詔釋之曰先殺臣江西監軍告信州刺史李位反一日三表請付御史臺果無實中丞缺帝謂持憲無易存誠者和易於人無所不容當官毅然不可奪薛戎四十不仕揔李衡辟署三返乃應既復歸為劉冕使按馬罪曰以是侍我耶不願仕正此璀冕囚之得解自放江湖府藩府交奏尹河南承過境無所治迓縳留犯令置獄浙東弛犯酒及橘未貢先鬻死罪之禁灼不尚約束詭名譽有善歸之所部居官無灼可稱已則懷之濟親弟放吕元膺蘄州縱囚嵗旦省親如期至自是羣盜感愧避境同州入對詳明上謂直氣讜言宜留左右得給事左右交鄂州拜不許夜登城者為大將潘孟陽王遂惡官除請語辭明枉直請觀察使奏部刺史須御史按閲竊留守東都不賜旗甲始此師道邸兵與山棚發指縱部分意氣間舒人賴以安募山棚為山河子弟衛宫城山棚者射獵為業趫悍善鬪鎮河中中人嚴憚正色立朝有宰輔望處事裁官人服有體居官終始無訾闕執奏帥鎮劾寮不驗輒斥孔戡傳錢徽憲宗獨召言他學士皆高選宜預聞機密土諫受旡名獻帝戒後獻無入右銀臺門取不取宰相段文昌李紳所諉而自取所厚白居易覆試黜者過半逐貶江州不肯出紳文昌私書自直而敕子弟焚其書百縱劫貢船惡少數日舒州得真盜以牛田錢萬代租宣斂旱孔戣請徙領之戣嘆相君江虢之治不及知况其他耶宣麻寒不去位而仆却韓公武遺錢二十萬在義不在官裴潾諫伐蔡以中人領使時諫服栁泌丹貶者續文選號太和通選當之文惟取與遊薛蘋吏最拜長安令舍虢州奏最擢湖南觀察袍治行遷浙西所守法度務在安人緑十年至緋乃易居三鎮家不聞聲樂祿賜散親故尤長於詩崔從融曽孫縱卭州疑獄俄得真盜給止劉闢反不從募兵自守卭州吏部一限選者牒他時以賕先後丐退代裴度中丞彈治不避權幸數薦引取質重廉三劾京尹李翛童騎十諭承宗泣下歸命神不與用事者不果相互文宗時鎮鄜坊時法繩䇿驕軍不受黨項市之遺盡留守東都復宫城列衙見留守之禮終鎮淮南除贏利嚴偉稜稜有風望當立戟不請無聲妓崔戎裴度署參謀薑承宗叛諭之泣下聽命繒劒南宣撫罷稅外芋錢以賦錢三之一凖布優估與民去綏招流亡華州不受刺史故事私用錢萬緍及以享軍民擁不得行休傳舍民拘持取其鞾夜單騎亡大兖州鎮滅姦吏民喜楊慿兄弟有名踵擢進士號三楊績重交逰尚氣節簡傲多怨之治京兆有治第役繁又幽妓妾謗議頗歡李李夷簡與有隙因劾江西贓及他不法籍其家絳奏不當同逆人法乃貶臨賀遽所善惟徐晦餞之謂權德輿曰臨賀知我今忍棄如公為姦邪譛斥又可爾乎夷簡薦為監察御史閻濟美浙西簡易所未嘗增賦在罷浙西時違詔貢獻為盧坦劾上以其道見詔物無所還為言之坦栁晟從奉天玄請入京師説賊黨以攜沮之誅上書言吳通無辜得免死討劉闢以闢後鎮山南諭梓州軍皆免胄拜不敢變敏因違詔貢獻為盧坦所劾下土樂施辨李渤憲宗聘之少室以屠羊説為辭然政有得失輒附奏白昌黎遺書勸之始出家東都每言朝政缺失上討淮西三術又上禦戎新録起為著作郎以直忤旨分司雖處外表疏凡四十五獻言均責逃人之賦於未逃人之患俯執政惡之謝病歸穆宗召拜考功自宰相蕭以下皆升黜之元頴劾其賣直售名出為虔州奏還信州移稅錢二百萬免賦米二萬石廢冗役六千百人遷江州爭度支張平叔及天下逋租言為諫議諫敬宗晏朝理匭使章封無閲日以宦人黜浚灕水孤操自將不少哀守節者多尚之竇羣兄弟擢進士獨以處士隱毗陵劉韋夏卿薦之德宗使副張薦使吐蕃辭奏禹錫挾邪亂政如謂叔文曰君今處李實之勢豈不思路傍復有君者乎引吕溫羊諤為御史吉甫以躁險持不下遂怨誣吉甫憲宗欲誅羣吉甫救之怨出湖南調溪洞築作蠻亂貶很自用果於復將大任召之衆皆懼聞其死乃安兄常牟弟庠鞏皆為郎工詞章為聨珠集義取五星王播孤貧刻苦令居官強濟府侍御史時京尹李實表為三原將折之趣禮謝豪強犯法不貸嵗終課最實更薦之此全無氣莭為御史知雜刺舉不阿關中飢諸鎮閉糴播以言三輔不乏屯李巽領鹽鐵奏為副走京尹禁勳戚馳獵及禁佩劍盜賊不能隱皆議讞叢繁剖決如流稍淮西饋餉引程異自副兵得無乏異禮部尚書賄結宦要薦皇甫鏄鏄黜播以代穆宗逐鏄由權幸得相專務將迎無裨益北衆望不厭鎮淮南旱歉掊斂民怨復失河敬宗立以十萬緡謝王守澄復領鹽鐵使諫官交言其姦公議益不與文宗立入朝享獻復相不與事四年卒還再領鹽鐵嗜權利以正額月進為羡餘領淮南獻玉帶十三銀碗數千帛四十萬薄紛積反以為樂百稅蔡始貞元至播增十之五李珏傳穆宗造尺樓亟斂以中帝欲同上盧坦杜黃裳使察子弟破産者不行知據理拒監軍干政笑不與善笛者重職監軍與姚南仲不相安避為夀安令美寬賦限曰不過令罰俸爾劾栁晟山南閻濟浙西違詔進奉諫毁李錡祖墓幸者遂罷揖退裴均答以姚南仲守正不交權宣歙觀察奏劉闢之親蘇𢎞為判官曰遇飢不抑江淮穀價官中人驗薛謇不獻異馬事付有司而又遣官有司不足信乎三奏乃止萬表韓重華為代北水運使開廢田收粟二十列壁二十益兵三千上從李絳請以坦開振武天德營田四千八百頃收粟四千餘萬吉甫欲遷受降城爭以磧口制狄之要吉甫出之東川盡李絳為相藉為已助半嵗而絳亦出朔治東川蠲山澤鹽井𣙜卒之藉屯兵安州望使人存問其家故士感慰不逃人惟收軍吏閏月糧助行營一事為所非韓愈初署宣武忌董晉幕晉死依張建封御操行堅正鯁言無自四門博士遷監察史極論宫市德宗怒貶陽山令史有曖在民民以其姓字子因栁澗事上疏言刺相黨復下遷才高數黜作進學解執政竒其才改比部裴奏憲宗平蔡在斷與不斷執政不喜或詆與均厚左遷為裴度平蔡行軍司馬表諫迎佛骨賴裴度崔羣免死貶潮州至潮上哀謝自言上欲用之皇甫鎛沮之改袁州刺史餘潮州驅鰐魚酒袁州贖男女為隸沒入者七百人召拜祭穆宗使宣慰王庭湊劾李逢吉薦為京尹特詔不臺參以陷丞相李紳之臺府由此不協皆罷終吏部侍郎夀五十七章經指授者皆稱韓門弟子道為嫂鄭服期文深探本原卓成一家原篇表襄軻雄佐佑六經泰山北斗孟郊武康人溧少諧合愈一見為忘形交廢五十第進士陽尉坐投金灘賦詩曹務令以假尉代之分其半俸署鄭餘慶守東都署水陸判官鎮興元又參謀詩有理致李翺字習之平請史官於行狀諡牒惟取大節數條興復太大略赦淄青生口賊衆懷德一蠲賦十萬石二却韓𢎞女樂出李宗奭妻三邪若遂復高祖太宗舊制用忠正而不疑屏羣而不邊改稅法不督錢而納布帛六絶進貢寬賦兵引待制官問時事此者政之根本厚峭鯁議論無屈免仕不顯怫鬱無所發面斥逢吉移病有司白官逢吉表為廬州州旱疫窶户賣田屋而仍輸賦翺使豪室無得隱貧弱以安諡稱柏耆才左遷從昌黎為文章辭致渾厚亦文性書歐公只説韓李不説韓栁復説理去佛齋文闢佛張籍和州人賢重之愈薦為博士愈名士皆與逰而愈尤性狷直責博簺及為駁雜説義樂府多警句終國子司業皇甫湜新安人署為工部郎中辨急使酒數忤同省裴度判官度修福先寺求碑白居易怒其舍近飲斗酒援筆立就贈車馬綵繒甚厚又怒碑字三千字三縑何遇我薄誤字齒兒臂盧同愈愛其詩厚禮之黨王川子月蝕詩訊元和逆愈稱之賈島初為浮屠名無本洛陽禁僧午後出為詩自傷愈憐之教為文纍舉進士不第跨驢苦吟不避京尹遷文宗時坐飛謗貶武宗時司户未受命卒劉義亦節士俯放肆為俠行因酒殺人亡命愈折節讀書不仰貴人作冰柱雪車詩歸面道人短長服義則又彌縫若親屬劉持愈金數斤曰此諛墓中人得耳不若為君夀李漢與鄭注王璠共譖李德裕見德裕傳瓊敬宗時波斯獻沉香亭謂此何異瑶臺室吕溫與執誼厚因善叔文麗副張薦使吐蕃故不與叔文之敗藻翰富流輩推目險躁譎詭而好利吉與竇羣羊士諤昵羣為御史薦溫上諤宰相事甫持之遂謀逐吉甫誣以隂事怒貶道州徙衡州治有善狀孟簡不附叔文璀為招討為諌議固爭韓泰韓曅復刺史承以幸出為常州𨗳孟瀆溉田四千頃李遜為浙東觀察抑士族右編人至橫恣簡代遜一反之農估皆受其弊時謂兩失代崔羣為户部自意柄任及出鎮山南不樂之簡殺翰其家發簡姦贓嘗遺承璀資七百萬工詩尚義與交者雖殁視恤其孤不衰晚路躁急佞佛過甚栁公綽不讀非聖書方再登賢良科乎嵗歉每飯不過一器曰四病飢獨能飽裴度尤引重語太醫針諌逰畋上賞其氣行無間隙不在大之李吉甫出之詔發鄂嶽卒討元濟即自請行省問其家軍中感服鄂軍每戰必克楊於陵韓滉剛嚴少許可稱為佳壻遺滉居宰相避親不調文書自娛宣德宗詔於太原獻遺無所受減浙東請出米三十萬賑飢政聲流聞尹京請三丁者不得著軍籍由是編民不得竄北軍橫閭里其豪右大震南憲宗時擢僧孺賢良第一宰相惡直出鎮嶺辟置李翺訪得失尚陶瓦易蒲屋肯監軍笞吏求其贓吏呼曰楊公拒他方賂遺私官錢耶謂吏部程判别詔官參考與有司不相謀不知限員於是始詔三考官止較科目選至常調悉還吏部請修甲歷南曹置别簿相檢實居四年凡調三千人始奏選者納直給符告親判度支當討淮西用所為供軍使餉道乏師敗貶失器量方峻人進止有常度節操堅明終始不其正時尊仰許孟容剛正之士不尹京捕神䇿軍李昱使償富人錢詔付軍從豪右大震武元衡死請起裴中丞輔政詳見德宗假平仲為諫議力爭承璀不可討鎮州及無功還又乞斬之尚書右丞朝廷得失未嘗不論奏世推敢直詳見德宗溫造剛正詳見敬宗盧景亮上起廢召之有詳見德宗酒時以直諌知名者又王源中嗜失上意潘孟陽劉晏甥度公卿多父行及外家賔客故被慰薦杜佑支奏以自副使江淮視財賦并察諸使治否孟陽豪倨從數百人所至會客流連招金錢譽望大喪後鄭敬宣慰江淮帝以為戒與武元衡舊復為户部盛葺第舍用度過侈人指怒之柏耆有縱橫學謁裴度父良器名將獻志健急名成䇿杖説下承宗二州諭德軍信悅以賚錢未至譁議祐奪李祐降李同捷功諸將忌之貶李因之驚疾賜死李巽杜佑薦代領鹽鐵之劉晏後莫能繼巽涖職一年所入如晏最多年明年過之又明年增百八十萬緍案薦引程異自助計較又精於巽革治家亦句檢牘簿書如公府秋毫無縱疾亦與省候者商較功利而忌刻所憎輒殺使人致絹於竇參劾之至死鎮將馬揔安南都護清亷不撓儒術教其俗夷獠安之西建二銅柱於漢故處元濟平為留後淮獷戾有夷貊風設教令明賞罰風俗一變篤學吏事倥偬書不去前嚴綬楊惠琳劉闢反言初即位不可失威蠻扶風九年寬惠吏事有方略荆南降羣討元濟閉屯彌年報歷三鎮奏辟位將相者九人德鋭進趨并州閺鄉尉李達不召飯之怨宗時以判官進奉召為刑部員外郎官綱目云綬無他才但能傾府庫以賚士卒賂宦以結聲援胡證膂力絶人未顯時救裴度人謂其俠虜為和親使請縣官儉受省費絶鬻官之濫使易胡服又令便道疾驅皆以唐儀自將不辱命鎮嶺南殖財自奉養奴數百營第彌亘號京師高資田𢎞正父廷玠承嗣從昆弟尚儒不樂軍旅承嗣盜磁相無所回染責悅何苦為叛臣杜門不納憤卒季承嗣愛𢎞正名興衆從容規切軍中賴之諫安殺罰懷諫立怒迎𢎞正主軍約舉六州請吏惸憲宗就使鎮魏博奉裴度慰勞軍民存問高年獨𢎞正不覺自失上益謹上賜名獻遣子布討蔡朝破承宗曰討師道取十二州以加平章來乞留帝魏人樂卿之政四鄰畏卿之威為朕長城遂還鎮鎮欲變承襲舊風悉遣子姓仕朝榮冠當時在七年穆宗使鎮成德以魏兵自衛度支吝其廪魏兵歸卷成德軍亂家屬將吏死者三百餘人書樓萬餘劉茂復判官以議事盡忠亂軍皆相戒切犯田布平蔡十八戰將𢎞正徙成德布鎮河陽同日受命所至省冗募戰卒寬賦勸穡穆宗起復鎮魏博與妻子賔客決而赴鎮士未至二十里跣足披髮哭入居琧室兄事將老者月俸百萬不入私門發家錢十萬緍賜軍肉度支饋餉不繼以六州租賦軍軍中謂刮六州與鎮冀角死生怨之歸憲誠牙將史憲誠蓄異志而魏軍驕憚戰潰諸將皆欲行河朔事遂刺心謝君父而死李訴晟子功討元濟為唐鄧節度丁承髙霞寓敗袁滋無之後示弱半嵗禽士良不殺禽陳光洽而吳秀林降又不殺用其䇿禽李祐又不殺而襲蔡之謀定夜半禽元濟不戮一人裴度至櫜鞬以見曰此方廢上下分久矣請因示之度以宰相禮受謁蔡人聳觀經略隴右使鎮鳯翔李師道反代其兄鎮武寧旬日踐父兄兩鎮博淄青平進平章事徙鎮昭義代田𢎞正鎮魏𢎞正遇害訴素服令軍衆皆哭下令勒兵而病甚還朝卒又遺牛元翼寶劍方儉約所處惟父時故院未晟克京師訴平蔡皆市不易肆人子竒功近世有晚雖忽於取士與鄭注善議者不以掩其賢高崇文七世同居州朴重寡言三不通書黃不曉朝廷儀寧大破吐蕃萬杜裳薦討劉闢詔出皆大驚卯漏受命辰巳出師先是選兵五千常若冦至禽闢送京入成都珍貨如山無秋毫犯厭案牘咨判且以蜀優富無事請扞邊效死以使相鎮邠寧舉蜀帑百工自隨居邠三年戎備整修承簡崇文子葺從平蔡時郾城屯田列防庸賊築武宫儒宮嵗行禮邢刺代輸楊元卿慷慨有術略客江湖時時高論人謂狂生説吳少陽以君臣大義謬説元濟厚賜將士困其財刺求持表見天子因條虛實請討平家被殺求為史及假度支錢裴度不與蔡請取怪珍寶帶出為汾州六穆宗使鎮涇原屯田築高垣冦至耕者保垣居年涇人德之請齎三月糧討何進滔聚獻文宗粟二十萬憸巧斂結權近張茂昭孝忠子父子皆賢朝鎮義武事武俊來襲掠厚謝以止之入言河朔德宗竦聽恨見晚方倚之經北方而帝崩臣順宗加平章事遣之鎮辭女樂曰天子女樂非下所宜見况後日立功之臣何以加之承賜第亦辭請憲宗時五請入朝為前鋒討王宗數表舉宗還朝北鎮間説皆不納汙奉兩州符節圖籍歸代者曰庶後世不為俗所染後復振河中李光顔馬燧贈劍鎮從高崇文平劍南搴旗陷軍出入若神忠武早準獨先諸鎮敗賊矢集身如蝟敗之小溵河又敗之郾城又大敗之五溝賊悉鋭當之故李訴得乘虛入蔡敗李師道於濮陽命復鹽州城皆忠武兵自隨𢎞李㝏亂汴州朝聞暮即戎平之討蔡時韓不願淮西速平贈名妓撓之光顔返妓嗚咽泣下誓不與賊俱生將卒數萬感泣與兄光進呼大小大夫賜姓本何曲諸部烏重胤承玭子角以縳盧從史鎮河陽海討蔡與光顔相掎大小百餘戰鎮橫建言河朔能拒命由刺史失權鎮將領兵能作威福遂還所管三州刺史職各主其兵詔行之諸道討庭湊救深州見朝廷號令乖違不敢進出行伍善撫士二待官屬有禮名士如溫造石洪皆在幕既殁十餘人刲股祭之石洪隱居十餘年公卿數薦皆不答重胤書幣邀辟欣然戒行韓𢎞宣武全諒死軍中請為節度三汴自劉士寧軍益驕𢎞一日殺其素恣橫者百人訖去無一敢肆李師古治道𢎞得其情而去詔遷淮西使扞兩河隂為逗撓聞捷不怡不禮使元濟平師道誅懼始請入朝得以名位終始天幸始自汴入朝獻馬三千絹五十萬錦綵三萬而汴軍所藏錢百萬絹百餘萬馬七千糧三百萬斛兵械不可計莊重寡言殺人必問法故師道少誠皆憚之王智興驍鋭宗敗李師道將王朝晏至穆時逐崔羣作亂見後郤士美年十二誦五經史記漢書悉鎮昭義私厨月費米六千石羊千頭士美去之以廪錢自給衙自盧從史日具三百人膳餉牙兵士美曰卒衛固職罷之討承宗威震兩河時諸軍互相觀望獨士美以軍進矣曹華重胤討蔡請自副拔凌雲柵人繼王遂鎮兖海合門饗士誅殺遂者千二百以沂地褊徙治兖以鄒魯禮義鄉立學講誦人乃知教成就諸生仕諸朝雖出戎伍而動必以禮愛重士大夫不貴倨人進厮豎亦待以誠信命鎮人害田𢎞正請討李㝏叛不待破之朱忠亮涇原四鎮節度沒本名士明吏核軍籍得竄名三千人收乾十萬緍白罷不任戰耄卒曰老馬不棄况戰士裨涇俗賣子為贖免築潘原城為昭義將時開田峙糧于頔謹七世孫澮暴橫苛峻南湖州修湖陂升蘇州罷淫祠修路鎮山屢勝吳少誠襄州為大都督府有専漢南意擅取鄧州憲宗立稍懼公斂私輸急下慢上乞上三入朝拜平章事請如杜佑月三朝露敗績順聖樂舞子敏賂宦者求頔出鎮事女伎為孫吳順聖樂諡厲李訴請更諡王彥威持之曰勢迫而朝非宿心全腰領已幸盧從史姦儈大使為澤潞督將王善附迎中人即為副父喪獻計誅承宗即領澤潞而能交承宗賊高芻粟直售度支璀求兼宰相聚軍與通不進兵上使承同禽之李錡鎮浙西不受代欲據江左其下禽送京師斬之見德宗劉闢擢進士宏詞就佐韋臯府又臯死徼旄節兵憲宗召之不至使鎮西川欲統三川舉取梓州以五福太一舍蜀作大樓祈祥䇿杜黃裳薦高崇文李元奕禽之檻送京師神兵曳首以入曰何至是耶自韋臯侈橫務蓋藏故闢得因其資以叛王鍔賂左右加平章李藩權德輿諫宰相非序進官有吏才工完聚河東繼范希朝後驟至充實加納錢二千萬上欲平章李絳止之忠義賈直言代父飲鴆毒潰足而出有提刀負棺諫師道見囚劉悟入釋之過必爭故悟得以臣節光明於朝劉穆宗召為諫議羣情灑然稱允悟固留之責從諫不哭悟表求襲位曰父死不哭何面目見山東義士耶父提十一州歸朝為功臣今欲速死耳從諫拜服軍中遂安孝友余常安衢人謀八嵗時父叔為里人謝全所殺已能復讐至十七嵗殺全卒抵死梁悅父為秦果所殺悅殺仇詣縣愈詔以禮父讐不同天法殺人必死下議之議流循州李興刲股門子厚作孝銘隱逸崔覲老無子以田宅財貨分奴婢而隱終南約奴婢給酒食鄭餘慶辟置之不曉吏事稱長者文宗以遺逸召不至矣循吏韋丹使新羅不受私覿官曰不足于資宜請安有貨官受錢凡使外國者賜州縣十官賣以取資諫議有直名種諫釋劉闢大容州教耕織興學校城州屯田教茶麥仁化洽江西觀察計口受俸罷八州冗食官陶瓦教瓦屋免火災為陂塘五百九十八其後宣宗問宰相元和時治民孰第一周墀言丹有大功德被八州殁四十年老幼思之因拜其子宙侍御史儒學林藴切諫劉闢磨刃其頸不為變弊貽書時相吉甫李絳言其所以事皆當時極嗜酒忤物宰相不用陳滄景程權上四州版籍而軍中挾權拒命藴為君臣大義人人釋然守邠州杖殺其客而藉其妻為倡坐贓流死折姓崔者矜氏族韋公肅論再娶當並袝故事宦官王守澄弒憲宗立穆宗詳見敬宗吐突承璀閩人置察察有才等揣上意請討王承宗擢處使白居易諌古無中人位大帥更為招討使上御通化門遣之孔踰年無功段平仲乞斬之罷為軍器莊宅使戣表其姦李絳苦論逐之峽州上為罷絳而復承璀閩藏詔室地生毛穆宗殺之時諸道貢閹兒嶺最多後皆任事時謂閩為中官之區藪劉貞亮見順宗藩鎮魏博田季安母死始自恣城承璀討承宗季安與承宗約取其一以獻忍酷幼子懷諌立懷諫幼不能事政決於私奴蔣士則軍中推田𢎞正留後𢎞正以懷諫歸京師自承嗣至此四世四十九年臣𢎞正本名興詳見前諸類鎮冀王士真息兵嵗貢其元和四年死軍中推子承宗承宗求揔留事上不報欲伺其變更建節度李絳請遣使諭之遂請上德棣二州詔拜節度而以德棣别立節度承宗拒命詔承璀討之李絳請併力吳少誠不從無師久無功承宗上書謝罪詔盡還故地官爵遂復忌憚上元濟叛因縱火漕院遣盜處處竊發欲反洛陽遂合諸鎮兵討之皆觀望不進惟郤士美兵溥之復元濟平始懼因𢎞正求歸德棣二州賦之又詔官爵以德棣滄景等州置節度鄭權領李師道平益奉法表所領州皆丐王官既死弟承元不敢世為留後詔鎮義成而以田𢎞正領之盧龍劉濟遊學京師舉進士忠繼劉怦為節度承窮追奚用裨將談謀先諸鎮討宗而朝廷赦承宗次子劉總弒之劉總夢父兄為祟因削髮為浮屠禳之屠談忠又説之歸朝遂乞割所治為三詔賜浮服榜其第為佛祠唯分灜莫置觀察穆宗初卒淄青李師道師古弟憲宗初師古卒家奴立之來上未暇討以為副大使自正己以雖外奉命而內引亡命人徉助王師而援蔡燒河南積聚遣兵襲東都使殺武元衡聞蔡軍敗大懼遣使歸順京既而悔之詔諸鎮進討其大將劉悟斬之獻首師初師古知師道必敗劉悟後必貴敗我家而滅凡傳五世橫海程權詔繼鎮固入朝寵禮遣歸鎮宗淮西平懼丐入朝辭軍政詔鎮邠寧族奉朝請宿衛而以王承宗所尚幾德棣益橫海為四州以鄭權鎮未為李全略所得彰義吳少誠元和四年死吳少陽少誠邀養為弟為少誠死殺少誠子自留後憲宗方討承宗因授之九年死吳元濟匿喪自表主兵董重質勸之結李師道橫行天下訴既不得請乃悉兵四出多帝命裴度討之李禽之獻京師韓愈碑歸度功訴妻訴愈文不實詔斫其文更命段文昌為之凡三世滅穆宗荒昵不恤國事在位四年貶錢徽李宗閔德裕以宗閔僧儒嘗對䇿譏其父吉甫恨之各為朋黨相傾軋垂四十年元稹結魏𢎞簡求為相從中沮壞裴度軍事時討王庭湊朱克融囚張𢎞靖自為盧龍留後王庭湊殺田𢎞正自為成德留後史憲誠殺田布自為魏博留後朝廷不得已皆以為節度使上之即位河朔三鎮略定劉總獻幽薊七州懼諸將搆亂先籍豪鋭不檢者送京師克融亦在籍中在京羈困日訴願得官自效崔植杜元頴謂藩鎮且平不復料天下安危皆抑不與及𢎞靖赴鎮縱克融等北還元年不數月而克融作亂先是蕭俯段文昌請銷兵嵗百人限八人逃死故克融得悉召烏合之衆又諸道節度有監軍偏師亦置監陳主將不得專雖以諸道十五萬之衆裴度之元臣烏重胤李光顔之名將卒無成功再失河朔迄唐亡不能取相蕭俯瑀之後賄及第不簡潔疾邪措官職文為相劾王播納求相從辭位求分司宗召終不至自放山野少辭王承宗先銘至優遊窮年除吏憂不稱職簡拔勸削兵失河朔段文昌任節義表還政召入顧問至夕乃出餘相踰年王播求相左右之見文宗崔植祐甫子蔚與鄭覃同為補缺朝廷得失更疏論執譽望然皇甫鏄請減百官俸封還詔書相又請追償舊鹽酒利如增估新數亦奏絶之答穆宗答正觀開元治道請以無逸為元龜漢文太儉曰帝王示儉而天下足罷縱克融兆還失河朔天下尤之內慙相崔倰介潔湖南矜已之清疾贓貪者若讐度支蘇州課第一不閉鄰部糴資物益饒執不與田𢎞正隨行魏軍糧故𢎞正遇害杜元頴如晦五世孫渤穆宗以其多識朝章不閲嵗相之劾李鎮西川以文雅自高務蓄積減衣糧南詔冦成都詳見如晦類王播由權幸相專務將迎加復失河北衆望不厭為鹽鐵使𣙜茶每百錢稅五十詳見憲宗元稹自江陵貶所由宦者召知制誥裏結宦者魏𢎞簡求相恐裴度入用與𢎞簡表沮之勸上雪王庭湊罷守東都拜相朝野雜然輕笑詳見憲宗裴度在河中奉詔討庭湊克融元稹梗之度恐亂上書暴稹過惡稹相而度留守東都諫官交章極論中人自幽還言人人失望遂召相怡卓然當天子意勇將貴臣聞之出涕辭切氣移書叛皆願罷兵智請出監軍劉承偕昭義遂安請將鎮淮南會王興逐崔羣諸軍進退未一交相度出權幸召逢吉搆罷之鎮山南餘見憲宗李逄吉結近幸逐裴度元稹而相免八關十六子通權賄至敬宗末方詳見敬宗牛僧孺獨不納韓𢎞餉中朝錢上見𢎞家簿知之遂相執李直臣坐贓死罪謂法正所以束縛有才鎮中丞時見敬宗荒淫求出武昌詳見文宗諸臣李絳直道進退望冠一時白居易進忠不見聽求刺杭州栁公綽剛正李渤為考功升黜蕭俯以下詳元頴劾其賣直虔州江州政績見憲宗薛放穆宗為大子拜侍讀及即位欲相之辭以朝廷自有賢能上問學經史何先曰六經聖人之言孔子所以發明天人之極史記道成敗得失亦足以鑒然謬於是非問其要曰論語六經之菁華孝經人倫之本丁公著以孝旌表禁穆宗為太子著太子諸王訓未聽政召居中條詢治理答外間人多宴樂非佳事丐知欲相之辭病求外一尹河南以清靜聞病歸清約守道每進官憂見顔色及卒天下惜之栁公權筆諫館兄公綽言之宰相得為𢎞文學士詳見文宗鄭覃諫荒昵是上謂後當見卿延英時閣中久廢至士相慶詳見相文宗時韓愈鎮州殺田𢎞正立王庭湊上使宣慰其軍諭以逆順庭湊解梁州圍牛元翼得出尹京兆六軍相戒是尚欲燒佛骨見逢吉陷之使與李紳交惡詳憲宗李紳與李德裕元稹號三俊不逢吉欲引僧孺而忌紳乃陷之使與韓愈協而罷之上後知之與韓愈俱召為侍郎矣李珏諫九日召李光顔李訴大宴諫增茶稅詳見相文宗楊於陵節操堅明穀自定兩稅錢重物輕於陵請稅謂皆用帛則錢自流通詳見憲宗錢徽德裕怨宗閔對䇿至是穆宗并貶其掌貢舉錢徽等漢之黨錮起於甘陵二部相譏成於太學諸生相譽唐之朋黨始於僧孺宗閔對䇿而成於錢徽之貶楊盧卿諫肆赦陳倡優雜戲餘見文宗趙知微諫逰畋韋綬喪父鑱臂血寫浮屠書字佐于頔府譏其恣橫侍讀穆宗東宫書依輒去人曰上以此理天下事烏得全書耶中俚語悅太子黜請穆宗召為集賢學士出入禁怙寵帝誕日百官賀皇太后後上皇帝夀宰相以古無生日稱賀者議格大臣論啓居中助可否九日曲江宴請集賢别會因答振災邀福曰失德却災媚人求助神有知且以譴鎮山南入辭求戟十二錢二百萬子太常丞帝以舊許之謬耄貪軍政亂弛諡通醜改醜王起播弟職諌遊畋相詔覆錢徽貢請先送宰相人謂失播為避選曹以邠寧曠土營田省餽挽置河中粟貴令家儲三十斛餘以市神䇿士不從於法修復濵漢塘堰與民約為水令遂無凶年李訓欲引共政訓敗以長厚免象文宗好學鄭覃以經術起以敦博訪時政畫便殿號當世仲尼有積雨願寬逐臣錢祿賜為童婢盜有貧不自存詔月益仙韶院三十萬議者恥之無四典貢舉士皆知名使相子書不讀一目弗忘嗜學龜以賔客多更住林木窮僻處構半隱亭自適高簡知書韋𢎞景嗣立孫十還擢駙馬劉士涇詔修左丞駁正吏銓六餘官郎吏肅然望風整持正有守風教倚賴長慶名卿韋處厚六經法言叔鬻鹽難張平相文宗王仲舒召知制誥西多善政求外補江詳見德宗馮宿説王武俊為張愔表求赦罪使束身歸朝不樂佐愔去之洛苑使姚文夀縱部曲奪民田自軍中掩取搒殺之法鎮東川一方便賴疾革不肯宥重刑曰吾不撓以求佑以平生書納墓中取不敢劉蕡定與宿齊名方漢二馮樂不受吏錢植書讓于頔文宗時部工端凝若詔上所著記爭神策軍衛殿訓注敗後仇士良請請左右史延英語新羅傳其黑水碑畫鶴記西蕃寫其商山記令狐楚營景陵不償傭錢而獻羡楊元卿涇原政績並見憲宗王彥威上元和新禮議儒學該邃十亦善吏事葬財用非所長憲宗不當二月而後又爭不當稱祖和爭上官興殺人自首不當減死四言至德至元天下觀察十節度二十九防禦經略三長慶籍户三百五十萬兵九十九萬今舉天下之入嵗三千五百萬上共者三之二賜仰給留州留使外餘四十萬衆皆仰度支稟上占額圖供軍圖雖楗柅而無益利害神策縑於度支私自厚價取值經用益耗文宗嘗禁止彥威欲媚士良復與直效王播貢羡求速進而邊兵訴給不時縑弊惡貶性鎮忠武毁山房三千餘所盜無所容強敏著書頗行張平叔請官自糶鹽議糴多少為刺史縣令殿最計口給鹽韓愈之遂不行奏徵逺年逋李渤言之亦不行鎮將韓充以兄𢎞久不入朝單騎走朝廷斬擢金吾斥虛名軍士七百汴亂二旬破之李㝏縱其脅為兵者三萬節一朝逐為惡者千人軍政大治世內外安堵儉歷三鎮居服如儒乘機決䇿推善將為李元初署為牙將元沒嫁二女周其家李質初𢎞去汴監軍選二千直閣下日秩酒殽力幾屈質揔軍曰韓公至而頓去則失人心不去則不可繼可以弊事遺吾帥乎悉罷之而後迓充王承元兄承宗鎮成德死諸將強之嗣不稱留後密請帥於朝北鎮以兩河事脅之不從朝廷使鎮義成詣將悔哭仁去鎮不以器幣自隨歷鳯翔平盧裕所至愛利牛元翼果而謀冠諸將王承宗倚為強雄與傅良弼二人擢鎮深兾討庭湊庭湊與朱克融圍之深州冒圍朝京師庭湊盡殺其親將夷其家憤卒田布𢎞正子自鎮魏博不肯行河朔事刺心明而死詳見憲宗史孝章父憲誠以戰力奮弟退讓如書生稱道皆詩書李訴閲大將子願以文署職泣諫父竭節上勸討李同捷自明憲誠書求覲皆孝章悟之張𢎞靖相憲宗事見的事盧龍劉總舉自代驕貴自尊涉旬一出決賔客將吏情不通所用多輕薄又謂挽兩石弓不若識丁字軍亂囚之而推朱克融王智興驍鋭告急善駛步道李納攻徐州不數日至京敗李師將王朝晏又使子晏平晏宰為先鋒壞河橋敗之羣穆宗赦王庭湊班師斬關入武寧殺異己逐崔掠貢物商旅逐濠州刺史朝廷不能討更使鎮之太交權幸三破李㝏降李同捷鋭士三千拜傅郡王節度卒烏重胤詳見憲宗以討庭湊量事勢不敢進朝廷杜叔良代之大敗李聽晟子鑄錢斬承宗將憲宗詔圖其狀中蔚州開爐討蔡典柳公綽軍聲振賊討師道刺楚州敗賊下數城與鎮靈夏屯田省餉在東宫求其駿馬不至思之以鎮河東穆宗敬宗改鎮義成繫斬魏博將丌志沼新代史憲誠鎮魏博不即進魏亂敗走鎮邠寧垣舍相傳不利治垣舍不鎮鳯翔又徙陳許鄭注罷之付之兵疑退處散地不怨惟聽為可文宗嘆賂權幸盛飾車馬服玩揫好方書治苛細急斂藩鎮魏博史憲誠為𢎞正先鋒破師道穆田布自殺諷軍中以河朔事揔軍事宗因授之私交李㝏㝏敗始偽加敬詔文宗時潛餉李同捷殺滄景平不自安請納地李聽代魏軍怒攻憲誠推何進滔子孝章鎮冀王承宗承宗死軍中推其弟承元承元不敢當歸命于朝朝廷以𢎞正代鎮王庭湊因犒軍錢不至激其衆害𢎞正自稱留後拒上以田布合諸鎮討之與朱克融合從王師圍牛元翼於深州以會史憲誠叛田布敗朝廷不得已赦之韓愈慰其軍盧龍劉總讓節以浮屠服歸朝廷至定州卒朝廷以張𢎞靖代之朱克融滔孫遣劉總薦之朝而囚之不得調𢎞靖赴鎮得還軍亂囚𢎞靖而推之幽州再亂還與庭湊圍深州萬裴度諭之乃獻馬萬羊十請直賞軍橫海李全略王武俊裨將遂𢎞正遇害對帝請效死力授德州鎮橫海貢錢千萬使子同捷入朝隂為傳久計選才結士忌棣州刺史王稷殺之凡有州四澤潞劉悟殺人貸死李師古厚幣迎之節既斬師道即鎮義成郡宗所置滑衛度代宗改滑亳來朝憲宗劉穆宗徙鎮昭義有澤潞邢三州治邢州囚監軍承偕裴度為流之自是專肆敬收亡命宗初卒敬宗李逢吉用事所親厚張又新李仲言等號八關十六子皆任要劇共為姦利上遊戲狎昵為宦者劉克明蘇佐明所弒在位三年管見稱敬宗有善十餘節其失在狎羣小好遊戲賜豫而已韋處厚諫宴逰賜錦綵銀器信見裴度銜無平章事問而召用之奉逢吉間度用益篤劉栖楚庭爭擢諌議禁進罷泗州戒壇皆好處相李逢吉險譎幸相憲宗沮裴度淮西功而穆宗立隂結近誣元稹欲刺度皆罷之已相使從子訓賂鄭注結王守澄為奧援勢傾朝野黨惟李紳排之遂陷紳罷之肆志無憚求其八關十六子以達逢吉無不得所欲寖敬宗立使張權輿為讖言沮度入朝上知度忠疏之八關張又新李續張權輿劉栖楚李虞程昔範薑洽李訓附會者又八人號十六子李程宗室諌賦日五色敬宗宫室田獵在翰林號八磚學士和相請置侍講學士太詔僕射不答四品以下拜程不自安文宗不許辨給多智簡悅無儀竇易直汴州軍邀賞亂登樓令誅亂者一級賞千萬衆縳為亂者為相辭度支公潔自喜執政未嘗引用親黨李絳諫幸湯泉刺史不從乞别授從諫一逄吉出之東都裴度多論其不直棄之藩鎮言逢吉黨為緋衣小兒謡毁之又使張權輿宅占岡原上信度益篤復知政事朱失中書印不驚乞飲崔咸罰觴度諫備東都克融乞春衣又將兵修宫闕知其久當自困遣使破其姦詳見憲宗諸臣崔咸侍御史處正特立風采動一時虢裴度聽劉栖楚附耳自解咸上度罰爵陜觀察日與賔僚痛飲未嘗醒夜分決事無一毫差吏稱為神有高世志造詣蘄逺間遊終南乘月吟嘯感慨泣下韋表微授御史裏行曰吾年五十拭鏡剪白眉遊少年間取一班一級不見其味將為松菊主人五學士缺人獨薦韋處厚病文宗時料李聽不十日破志詔所居隘陋不能具藥篤故舊庸下亦携手笑語聲病春秋諸儒執一為三傳揔例病學者不如樂賤工能尊其師授著九經師授譜崔郾諫穆宗逰畋高謂敬宗曰使臣侍講半嵗不一問經義與重上六經要言虢州嵗奪吏俸八十萬助上供郾以府費代之里旁河置敖受輸兵鄂平盜江湖窮躡上下千在虢以土瘠民貧撫以寬經月不笞一人怡在鄂以土沃民剽且雜夷俗嚴法峻誅居家然子自化室處卑陋無步廡周親舊昏喪高元裕奪方士趙歸真驛馬為諫敬宗西鎮勢重南衙樞密權過宰相人危之換侍御史士始相賀李宗閔髙其節官入翰林為鄭注書命言以史醫術侍為中丞罷屬不稱者請以監院御𨽻本臺舊三司監院官帶御史者號外臺岩鎮山南五年蠲逋賦甚衆通經術為吏岩有風采舉兄逸少代為侍講薛廷老父存誠事憲宗司讜正有父風甚與舒元褒奏除拜不由宰宫中興作太帝厲聲色益懇言之吉按嶺南鄭權盜公庫貨輸鄭注中人切齒論逢黨張權輿程昔範不宜居諫諍逢吉出之公文宗召之日酣飲不持檢操罷在卿間不干虛譽推為正人沈傳師才行有餘學工書辭穆宗士院權德輿門人推為顔子明吏治吏不敢罔夷粹無競姻二鎮十年無書賄入權家初拜官拒宰相托私治家不威閨門自化帑無儲錢李渤諫晏朝孤以言宦人黜操自持栁公綽並見憲宗高釴諌憲宗以中人為和糴使窶從敬宗夜駐左軍勸帝躬聽覽示憂勤孤介然無黨援以致宦達諸弟皆友愛為搢紳重銖率諌官伏閣言李訓憸邪故事徙太常卿罰禮生博士以禮院不關太常為隳舊典嘆老不能退為小兒所辱鍇知貢舉文宗自畀題帝謂近年文章卑弱今所尚差勝益禮部三嵗頗得實才始嵗取四十才少詔減十人猶不能滿溫造大雅五世孫之隱王屋人號所居為處士墅府張建封禮致妻以兄子烏重胤奏置幕宣使劉濟濟聽命李使劉總總聽命曰𢎞正遇害慰之敬宗時劾祐違詔進馬祐吾今日膽落於溫御史文性剛急與補缺爭道捕其從者宗時誅殺李絳亂軍李虞仲言古將葬請諡今至數十年風績湮歇不可考信請前葬一月諡簡儉時望歸重劉寬夫陳岵以注浮屠書得除濠州寬夫劾之宫以王府官攝祠位輕非嚴恭請以尚書省東三品官若左右丞侍郎通攝令狐楚見憲宗韋處厚誎宴遊曰皇子才一嵗安敢畏死不諫可為李紳一人使流貶者皆不得量移諫不言李逢吉排沮裴度乞相度詳見文宗李聽見穆宗王播見憲宗羡賂王守澄以淮南兼領鹽鐵進絹百萬奉詔造競渡船李德裕浙西觀察百不奉詔上脂盝粧具用銀二萬三千兩金三十兩奏詔索盤條繚綾千匹之非乞禁王智興泗州度僧謂不禁則失六十萬御丁上丹扆六針宵衣諷視朝希晚正服諷服非法用罷獻諷斂求珍怪遊納誨諷侮棄忠言聖辨微諷任羣小防邪諷偽輕出乞塞亳州水排諫迎方士周息元文逢吉之乞外往餘見宗李紳逢吉使玉守澄誣以立太子時異議貶之惟韋處厚言其枉後上得其情立上三疏事始明文詳見宗李虞紳姪李以紳密論逢吉語告逢吉與仲言張又新等伺紳過李仲言逢吉之姪劉栖楚寒鄙為鎮州小吏姦王承宗薦之逢吉罷裴度逐李紳皆嗾為諫敬宗晏朝遊畋額叩龍墀辭疾歸逢吉喜其助已不次任之宣授刑部侍郎數月改京兆峻誅罰不避權豪治惡少竄名北軍者干詭激敢為怪行若無顧藉內實怙寵宰相厲色韋處厚出之張又新薦之子與傾邪楚逢吉求凶果敢言者以危中李紳劉栖搏吠逄吉所憎李訓用復進敗善文辭以諂附喪家聲宦官馬存亮元和典兵料柬尤精亮敬宗初染工張韶卜者蘇元明之變賴存定之倉卒功最高委權勢求監淮南軍者逮事德宗六朝端畏美唐世中人以忠謹稱存亮西門季玄嚴遵王守澄弒憲宗宗立穆宗李討劉克明而立文宗文因其黨訓脅就第賜死劉克明上與毬工狎而又責辱之守上夜獵回與克明毬工酣飲因弒帝王澄討之而立文宗藩鎮魏博史憲誠同穆宗鎮冀王庭湊同穆宗深與克融憲誠相結盧龍朱克融囚賜時服之使欲率丁匠五千助修宫迎乘輿請帛三十萬帝用裴度謀忍不問軍亂殺之廷嗣次子叛命而殘用其人大將李載義因衆怒殺之族其家而暴之朝李載義敬宗因使代鎮橫海李同捷賂鄰藩求領父節敬宗不與文宗使鎮兖海計窮稱軍中留已澤潞劉從諫匿死求節李絳不可逢吉守澄納其賂使鎮寬厚得下古今紀要卷十三
