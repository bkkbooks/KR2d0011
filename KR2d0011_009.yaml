body:
  text: 古今紀要卷九宋黄震撰唐高祖李淵祖虎西魏柱國周閔帝追封唐公父昞世襲高祖又領太原留守晉陽宫監子世民與裴寂隂以宫人侍淵脅之起兵使劉文靖詐為詔發太原西河等民兵連和突厥擊西河斬高徳儒入長安立代王時煬帝留江都約法十二條大業十三年明年隋遜位降薛仁杲武德元年破宋金剛走劉武周三年擒竇建徳王世充四年責突厥負約突厥請和七年並世民降蕭銑孝恭孝靖右平定天下事賞孫伏伽諌李素立諌定均田租庸調法定官制汰寺觀右好處以舞胡安叱奴為散騎侍郎李綱諌不從建成為太子譛世民上亦猜嫌右失處太宗世民知房杜明良相遇元齡謁見引為謀主王魏用讎徴勸建成殺太宗馬周起踈逺周代何常陳便宜召為御史長孫無忌不以外戚廢尉遲敬徳即使掌軍高祖欲斬李靖召置幕府聰明能知人處為拒封徳彞用魏證最聰明起太原較起豐沛者則易比因附漢之思者難定關中破武周平薛舉擒建徳降世充破黒闥突厥深入滅平之四夷無不討除略定用兵未嘗少挫右神武漢高敵最强太宗所遇與光武畧等而高光不免勝負請討武周乗勝降仁杲霍邑不還師突厥入冦諌徙都信尉遲習射殿庭不納諌者右英果行師秋毫不犯决刑奏覆觀銅人罷鞭背因魏證言仁義不殺降右仁恕毁隋宫室不忍營一閣右儉約定天資有餘學道不足十八起兵二十四天下未三十即大位涵養漸摩之功淺故所成就不免較兩漢之君相上下房杜輔政王魏諌諍英衛將帥世南等學士頴達等正五經録刺史姓名於屏風一時皆循吏用人之盛張藴古進大寶箴除大理丞裴矩諌殺受賂吏以賂試之戴胄前後犯顔執法孫伏伽諌騎射擢諌議張元素諌修洛陽劉洎諌機辯王魏馬周諌尤多右納諫事漢髙以明逹能聽文帝以寛恭能聽武帝以英果能聽太宗兼之然豁達不及漢髙寛裕不及文帝故漸不克終太宗誤聽少論止盗謂輕徭薄賦自不為盗有上書去佞臣請方以至誠治天下論周秦脩短謂周仁義秦詐力謂元齡為治莫若至公卿等執法賢相謂朕不數赦謂法令不欲數變論創守元齡謂創難徴謂守難謂人主一心攻者甚衆右講明治道處傳王魏議論見本謂侍臣上畏皇天之鑒臨下憚羣臣之瞻仰頡利入朝且喜且懼謂治國如治病日謹一日惟恐不終論煬帝頡利覆士朕與公等勿矜强盛謂朕思煬之亡二喜一懼治安則驕侈易生驕侈則危亡易至右居安慮危處中書詔勑有差門下當行駁正謂王珪中書門下一品入閤諌官隨之徴名儒為學官増學舎千二百間畵功臣於凌煙閣六條廵察守令作帝範十二篇制度紀綱好處口分世業授田近井田租庸調斂民役財近什一府衛寓兵常貟任官規模好處漢所不及然亦是求詳於法度不如文帝篤於躬行故致治與文帝同而安静之福不及頡利突厥俱來帝馳詣責之遂和突厥入冦高陵上自出𤣥武責之斬白馬盟頡利頡利浸弱多請擊無忌謂棄信勞民遂止鄭元濤請伐突厥上以新與盟不擊突利入朝上謂中國乂安四夷自服非上䇿乎李靖襲突厥擒頡利用温彦博議處突厥於幽靈等處其酋長拜中郎將軍布列朝廷康國求内附不受右符夷狄處米斗三錢外戸不閉道不拾遺右治效一則時之久近漢髙僅十年光武太宗皆三十年一則法有興廢漢髙承秦光武遭王莾隋雖亂良法相因未改故治效最速謂祖孝孫治隆替不由樂故唐世多淫聲殺盧尚祖辭交州都督殺張藴古以奏李好徳不當罪怒魏徵欲殺田舎翁仆停昏碑以皇甫徳參誹謗諫修營厚斂以高昌為州縣絶薛延陀婚禇遂良諌伐高麗至無功始悔以䜟誅李君羡託孤於禇遂良無忌而敬宗義府參之明不如漢高遼海之役擾及巴蜀黷武不如光武務安中國不事四夷自誇兼行將相不如漢高讓三傑營玉華九成儉約不如漢文矜學校之盛止為太平美觀故後世人才不由此出飛騎授經諸蕃入學亦止是欲誇武功之盛未嘗招隱逸故㢘恥不及漢不能定儲貳故後世嫡庶多横禍結突厥遺後患償與之共功則責無已受天可汗號喜功國既為之主則叛服必勞中故後世多夷狄之擾用蕃將終唐世用蕃將後有禄山之禍立晉王以其仁柔可全諸弟不知不能自保其身右失處畏文帝天資謙恭光武天資謹故二君過失較少太祖八子江夏王道宗有將帥才李十七歳料劉武周與太宗意合與勣前鋒伐遼清道迎乗輿最有識吐守靈州破突厥斥地千里執頡利可汗深入破谷渾以百騎觀髙麗形勢為先鋒以四十騎破十倍衆晚好學禮士最賢坐貪贓失部分是其兩失無忌遂良誣道宗貶死最可罪以若握兵鎮外可制武氏淮陽壯王道元有將帥之勇世年十五從擊宋金剛先登討王充戰多與建徳戰所發命中諫擊黒闥深入取敗温六世孫漢為昌黎壻敬宗沉香亭表孔為刺史河間元王孝恭將帥才檄威畧之衆騰輙下天資髙蜀縱朱粲收用巴收領子弟州縱戰艦破蕭銑水遣使綏輯嶺表降附四十九討輔公祐杯變血以為賊授首之祥最有識帥賊攻營堅卧不動子太宗不倚孝恭為邊而以譛召就閑晦治有異績襄武王琛有吏績簡隰州政寛漢陽王環兩使頡利不屈子守荆州清静國貞剛鯁清直世稱辯吏淮安靖王神通有戰功原起兵應太襄邑王神符有戰功兩破頡利高祖二十二子高祖兄澄湛洪皆不學建成王魏勸討黒闥結妃御元吉太宗射殺建成尉遲敬徳射殺元吉故二王於太宗有聖愚之異高祖無知子之明至此若建成得志秦叔寳等並起而攻之天下豈唐有哉霍王元軌與元名皆太宗兄弟之最賢者不得封建為屏蕃而為武后所害惜哉備徳全才宗室之冠平魏證稱孝行曽閔不能過經學文學漢河間東毁瘠甚菜食布衣終身忌日輙累晝不食運淹練故事運從獵筈不虚發羣豕為盡李嘉結賊殺嘉不窮支黨刺定州開門偃旗待突厥未歴六州所至閉閤讀書以吏事委長史謙謹嘗忤物毎朝上疏諫得失多所禆正自有大事常宻繹咨逮為魏證與言未嘗不失與處士劉元平布衣交舒王元名識度亦髙家才徳未及元軌辭不拜尚宫未嘗問業善訓子大州數遊山林有髙尚志百姓為治廉威刺鄭州革諸王貴戚家人暴歴五州不治生産嘗謂臣屬籍豈以州郡為仕進之資韓王元嘉藏書萬卷終日如布衣喪閨門修整當世稱之母病不食居毁甚孝友徐康王元禮有吏能善絳州有治名騎射鄭惠王元懿經術平數斷大獄務寛有吏能道孝王元慶有吏能孝行聞滑州以治績魯王靈䕫好學善草𨽻通音律賢者五人亦高祖諸子之江夏王元祥與滕蔣虢三王皆好財太宗十四子常山王承乾臨朝言忠孝卒退即循度為太宗選教之升不至以悖逆廢庶人鬱林王恪有文武材戮太宗謂英果類我偉惡於無忌䧟大母煬帝女孫亦顯濮恭王泰置文學館得得引學士雖美事乃太宗故事藩王為之承乾其得安乎月廩過皇太子遂良諫以勑入居武徳殿魏證諫事三事皆太宗誤之計傾承乾以言結晉王罪在泰越王貞善騎射不渉文史武有吏幹與為宗室才王監水見首后之難子冲死社稷長孫皇后天助興運必有賢妃下儉約類葛覃木不對天下事類卷耳懷其仁類樛三事有古賢妃之美太遺言勿置𤣥齡疾辭兄預政抑外戚不許子増叶器輿從帝討叛論不許大赦度道人祓災佐請薄葬著斥高后太宗謂之良信然長孫無忌外戚之有才能功勞者厥后兄兵定計誅建成與蕭瑀論討突勸戢以待懼貴亢解僕射力賜威鳳賦明建成之功吳辭世襲刺史奪帝定立晉王帝又欲立王恪争止之卒誣殺恪恪臨刑呼曰社稷有靈激太宗評無忌等可否蓋人才不及其初所以示勸受遺詔隋諌立武氏事許敬宗引宇文亡漢殺薄昭䧟之貶死敝從父鹿諌隋帝逐坐賕免歳太宗以后族給廩操從父弟征學術智謀政事三長從晉王伐常侍聞祕謀陜州無并釃河入城最齊楊益三州刺史皆房杜明良相遇爽房謀杜㫁同心恊濟厚房寛容故善謀杜英故能㫁蕭曹以質與髙祖合房杜以才髙與太宗契易地則不相投度漢寛大長者蕭曹為之故終漢世質勝文唐制紀綱房杜為之故後世有所憑藉文王魏善諫房杜遜其直英衛善兵房杜濟以帝定禍亂房杜不言功定太宗英果二人濟以寛詳為益最大太天下新臺閣制度憲物容典率二人討裁宗欲復行周禮好文之心亦篤若房杜有伊周之學足濟太宗所好必不快心於髙麗元齡諫表乃及字畫詩篇之末而欲以文濟武可見其學之淺房知隋文無功徳其亡跬歩可待有渭北杖䇿上謁一見如舊中原方亂慨然憂天下之志相征伐未嘗不從獨收人物置幕府忌與諸將宻申結人人願盡死力當國無媢聞人善若已有能不以己長望人取人不求備雖卑賤皆得盡所新進更用事不吝權薦留如晦以為王佐才守皆其為人主得人處責太宗比為鄧簡討遼居男子上變上斬男子元齡不自信謂宰相所以助朕廣耳目訪賢才戒閱細務乃勑細務屬左右丞大事闗僕射皆其得君之專夙夜强勤任公竭節不欲一物失所如議法處令務為寛平諫伐髙麗陳事千里面對貫穿典籍善屬文緣軍符府檄駐馬即辦文約理盡明逹吏治而飾以文雅或以事被責必稽首請罪畏惕若無所容衣相十五年以權寵隆累辭位父病十旬不解居䘮五日勺水不入口候女為王妃男尚主居晚病肩輿入殿功尚醫臨尚食供膳奏起狀幸其第皆報之厚杜少英爽喜書機風流自命内負大節㫁常參帷幄祕方多事裁處無留臨機輒引士賢不肖元皆得職政太宗折淮安王以蕭何先諸將與齡共朝典選咸得職陳師合上㧞士諭陰諷如晦等以離間斥嶺表第醫候道相屬輟𤓰致奠辭職給常俸就勒碑言痛悼意皆因夢徃祭報之厚淹叔父論才辯多聞名節無取參封倫以元齡遂白之秦王為軍慮其往事隠太子則為太宗患政賦詩上賜銀鍾裁定東宫儀典簿參預朝所薦嬴四十人皆知名為因蘇威以隠召故入太白山隋文謫戍江表煬帝中丞幸江都不諫用事王世充於典二職貴重朝清白名楚客如晦弟譖尚竒節一語盡之杜淹殺其兄囚楚客順死淹當誅楚客請於如晦釋之仗建成難作遁蒿山為中郎將入直盡夕不釋守蒲州有能名威攝府事以肅聞元頴如晦五世孫至穆宗以其多識朝章不閱蔑相為西川索珍異獻敬宗南詔請誅之以謝蜀人魏徴與王珪為諫諍之臣然不同舜王激濁揚清意好善疾惡魏恥君不及堯有責難陳善可見三代遺直之風王王魏太宗所憚馬馬褚太宗所親皆諫諍臣魏言人所難言褚譏切闕失而己三以堯舜為凖民為說者論諌綱領仁義為本勸行仁義修已安謂道徳未傳仁義未厚由未盡誠信最中太宗之病言至公形迹良臣忠臣兼聴偏聴面從後同心朋黨諫告訏至公功彊直擅權諫忠讜誹謗此皆規綱目最有於貞觀停鄭仁基聘女為充華感以人情以諫按吏以靖蛙改館宫御諫層觀望昭陵感孝心三者皆言人所難言漸三諫謂初道諫中恱而從諌末勉强受諌十一駿馬珍怪二勞民三樂身四暱小人五貴異物六讒佞行七田獵八詰臣下九恃功興兵逺裔十徭役諌置突厥塞内惟此事不從諌迎髙昌及西域諸國貢諫諫遣使西域市馬為昭仁宫供奉不精多譴責刑賞由喜怒以隋監諫㸃中男為兵厚諫伐嶺南酋長馮盎仙諫封禪諫公主資過諫疑大臣諫飛宫諫黜不切之言我俛首破陣樂諦觀慶善道賦兩漢詩太宗知約以禮與封徳彜論治最有識威有志膽犯顔進諫逢甚怒神色不徙天子亦霽賁育不能過二百餘奏無不剴切當帝心毎諌不從發言輒不應失右諫諍事儒有大志通貫書術典故參議得奏引諸校禮書作類禮以決尚書省滯訟諭傅太子傳勸建成縱釋降者散黒闥之衆安河北貸送人李志安李思行䧟勸建成殺太宗計若行生民之禍未巳黎陽仕建徳近臨難茍免然亦管仲不死之意於建成亦然不薦杜正倫侯君集宰相才既死人以為阿黨知及元齡安集山東說李勣知天命歸唐然不歸太宗未為知天命尉遲敬徳勇毅强直之士本與秦瓊段志元程知節皆太宗戰將劉武周降將太宗釋囚賜金使去得駕馭之道終身收敬徳之用出刺單雄信救秦王擒王琬馳黒闥陣秦王得開門待刺客之輕騎敗突厥以奪槊不皆勇毅處動得財必散士卒太子金招從非利能勸太宗先發支射殺元吉厥請髙祖詔諸軍聴秦王不濫及黨敗突擊道宗目幾眇諫討髙麗以誅巢隠功䝉太宗保全晚年致仕謝客李靖與李勣皆開基大將將有専征方面之功施二人靖為優然亦止為帥將帥全才無不可可平蕭銑自平輔公祐漠三千騎喋血定襄襲破汗斥地隂山至大平吐谷渾決䇿深入四事皆大功擒頓利功尤大江平江漢用舟師討突厥吐谷渾用騎兵以淮兵屯大谷諸將多敗靖以全歸兵率以神速為主其才無施不可似韓信拒用入江陵號令静嚴不籍戰者家資宣率兵南廵得郡九十六所過問疾苦延見長吏布天子恩意此二事得弔伐之義非諸將所及王與舅韓禽虎論兵嘆其可論孫呉此牛洪許以佐才楊素拊其床曰卿終當坐髙祖將斬之大呼則圖蕭銑逗留詔許紹斬之紹為請既斬冉肇帝謂使功不如使過以沈厚稱稱富貴知止武通史書不屑作章句儒麗王珪其才兼文賜靈夀杖願征髙客師靖弟不衷屢戰封公致仕鳥馳獵孫令問元宗闕從翔人謂賊舊知奉養蕭瑀勤幹耿介命識量不洪委性鯁急鄙浮華務非劉孝標辯論髙祖以樞筦内外百悉闗決皇抑過糾違無所憚以詔必審覆守太宗謂太上有廢立議瑀不可利怵死懼道耿介古無以過僕房杜得君事任稍分乗罅切譏辭㫖疏躁右射時請封建與陳叔達忿争御前不恭免通右再相時意或不而向法深議論明辨然不能容人短房魏温彦博頗截正之其言多黜齡元齡等小過瑀即痛劾御史大夫中狹毎言元輩朋黨盜權帝諭解曉謂帝偏信右同中書時成賜疾風勁草詩葢為上皇欲廢立發謀諭義公主解突厥圍因突厥圍鴈門說下詔赦髙麗於右煬帝時謂拜太子太保太子迎拜佞佛溺家風非所豪傑太宗諡為貞褊宗從子鈞相髙宗孫孫嵩相元宗孫嵩子華相肅復相徳宗復置相懿宗華俛相穆宗倣相宣宗溝相僖宗八葉宰相段志元敗桑顯和屈突通驍勇充勒兵章武門軍門夜不開持重為王世所擒奪馬馳歸似李廣子夜不開門納使者似亞夫平不納隠太金帛識去就破建徳東都文昌劍南西川節度羣蠻畏服出帥荆南成旱不苦禱而雨雨不愁公遊子式劉洪基與商開山劉政㑹柴紹任瓌丘行恭丘師利皆佐命之有軍功者執王威斬宋老生昇下馮翊破徇扶風京師平功第一堅壁宋金剛築障遮突厥先勝衛文戰駐驆山有功歸薛舉拘之不屈財䧟武周脫臨難不屈散親黨屈突通節誼清正之士人為隋文覆出隠馬二萬請免監牧千五百之死忠正近厚為煬帝召漢王諒占對無屈害守河東力盡被禽義討王世充不以二子之私義三者皆見節從平仁果不取珍用可見其清太宗别賜亦得旌别之道破賊劉迦論十萬破楊元感分秦王麾下之半以圍洛卒平世充享寧食葱清白死不變諡忠配太宗殷開山招下羣盜副劉洪基平敗於薛舉除名本工尺牘將畧非所長從仁果征黒闥道卒配享髙祖柴紹夫婦同佐命宋劉洪基之儔絳其妻平陽公主起司竹破老生下臨汾敗桑顯和遂平京師平彈琵琶破黨項梁師都長孫順徳無忌族叔臨有佐命功追募土兵數萬賜從平霍邑汾絳郡執突厥帝帛視之與魏張武同所以保全勲戚自此為澤州折節為政以嚴明稱太宗閲功臣圖見像憐之張亮小人之資好擿隱伏以是進身終亦自敗破為刑部直韋挺奏免張仲文死其事近厚髙麗副將之力所功非君集比而罪與之均有元齡以沉果引之至有績養假子五百人怪謀遣元齡斬之侯君集在諸將功最髙後討吐谷渾為李靖决計子專征平髙昌貴好書典選有譽太承乾引問計事覺斬之臣帝命靖教以兵法奏靖欲反靖曰求盡術此君集欲反張公謹謀畧勇敢之士突投龜决巢隱之䇿言代州屯田省運條厥六可取狀數時政得失辰襄州惠政太宗日哭之程知節秦叔寳之流驍勇識見相似金與叔寳同舎世充皆自李宻來降破剛建徳世充秦王左右手死不捨去虞世南徳行䧟忠直應文學飯父荔卒毁不勝喪世繼叔陳寳布衣蔬沉静寡欲基貴盛世南貧約一不改煬宇文化及殺世基抱持號訴請代右徳行帝愛其才疾其峭正不用送外若不勝衣而中抗烈議論持正益諫獻陵厚終禮不和宫體詩自㧞流俗所甚大諫數出畋獵闕孛見願勿矜功忠太宗謂於我猶一體拾遺補無日忘之右直學于呉十年情思不懈名文章婉縟慕徐陵傳世基辭章倩勁世南博贍二虞暗疏列女無一字誤直書為世祕愛翰右文學壤太宗稱五絶徳行忠博學文詞書言山蛇見大水恐有寃獄請慮囚而不知乃女禍之兆没後帝梦進讜言劉政㑹告王威反執之賊守太原輯戎政祖為武周所執宻表形勢配享髙竒政㑹子史薦張篤御不受謝崇望政㑹七世孫兄弟四人同幕論王重榮止禁卒掠唐儉談說之士是識成敗說秦王建大計孤知頡利不可取身幽辱能發獨懷恩反謀是知君臣大義封投馬摶豕以諷太宗是識事體輕重禽武周府庫以待奏正使頡利李靖伐之脫身還說說士多反覆儉亦士之賢者次儉之後立為辨謗畧憲宗召之李勣英公李本姓徐主粗有氣節自質厚而識不足從宻不利之敗啓宻上土地將畧亦靖之流亞充靖未嘗敗勣嘗敗於建徳公從太宗平建徳世黑闥元明受靖節制破祐破薛延陀再戰北磧定合平髙麗應二事是其方面功破突厥意與靖料敵變皆契事聞人善嗟嘆龎戰勝功歸于下正得金帛散士卒遣將必竒福艾者引杜倫髙季輔禮戴胄是知人收姊病為粥燎鬚鬚請𦵏李宻割肉啖單雄信而其子太宗剪為之和藥留宴託孤頓首嚙指流血立出之疊州使髙宗授以僕射冀其死力至訪昭儀則答以家事託孤亦太宗過用其量房付弟弼以子孫謂毋令後人笑吾猶吾笑杜孫敬業以反誅秦瓊畧與敬徳同而不見其失王來䕶兒弔其母喪可謂知人與程知節舎世充來降是有識與羅士信襲明月營討海曲先登黒捍衛李宻䇿馬來降破尉遲世充建徳闥常先鋒事取敵驍將説士於萬衆中皆是其驍勇太宗立石人馬旌戰功預誅巢隱高儉字士廉計三世僕射長孫定討隱太子為丘和破寗長真之與守蜀變惡疾畏鬼俗人興復學校地無不當厮引汶江廣溉道吏部用焚藳因賣婚為氏族志以上二十三人并河間元王孝恭為凌煙功臣而孝恭居無忌之次髙儉名秦瓊傳不載見吕温功臣賛許柴紹許紹皆贈荆州都督封譙國公吕温以為舊史㑹要皆以為柴今從史永徽致祭者七人徴士廉瑀志元洪基世南瓊新史謂始終著名者止此然二十四人惟亮君集凶終于志寧有諌諍之益然猶有畏避盖其剛毅不足復議七廟以凉非王業所因止封建起教太子苦諌㡬見刺然髙宗時馮翊石隕對以無災而戒樂引後進畏嫌不能薦達分賜田争定本草不武后立蘇世長機辨之士唐諫諍有益管十歳上書周武帝世充歸答髙祖以仲雍齒及竇融事作諫涇陽獵不滿十旬使陽言披香殿隋煬帝所諌獵武功不聽突厥不屈節却其賂遺守嗜酒簡率巴溺死薛收文學謀䇿之士不太宗待以公輔仕人才不在房杜王魏下幸短命不肯隋而歸唐宫書檄露布馬上占辭諫䇿收世充建徳室以奢儉諷太宗畋獵父道衡觀隋十三年三元超收子事髙宗挾見省中磐石流涕以祖所草制諫蕃酋弓諫太子獵武氏用事陽喑卒禇亮文學知謀服圖史經目輙誌在十八賦詩江總諸人皆秦王征伐嘗軍中預秘謀姚思廉節義學問皆仕隋厲聲却唐兵業髙祖義之太宗遺之當傳父察漢書與魏徴卒父梁陳二書業諫幸九成宫陸徳明經行兼修不降其志與始冠與名儒承光殿屢奪祭酒徐孝克説魯逹孔褒相酬難莫能詘浮善明理言以易為當時冠徐文逺傳方徐文達屠慧乗道士劉進喜各講經徳明隨立義徧折其要多恥為王世充子師服巴豆遺利而去論誤甚傳於世太宗嘉其博辨賜其家經書釋文傳中不載孔頴達經學文章忠直之士穎八歳闇記三禮義宗煬帝召儒生議論達為冠又年最少老師遣客刺之匿楊元感家免不獨才髙見忌諸儒集議亦易啓争端如石渠白虎皆是劉焯質疑大畏服義善屬文上釋奠頌五經正春秋詩書禮記易受詔與顔師古撰歴術難精明堂難定諸儒多從其説可見精博不皇太子令撰孝經正義因文以盡箴諷太子稍法争不已乳夫人謂太子長不宜面折對以蒙國恩死不恨剴切愈至給事中數以忠言進太宗之失正在矜伐穎達問對箴其膏肓以三世司業馬人才比師古而操修過之王恭同撰正義嘉運以駁正義皆附傳治恭講三禮别為義證甚精博服弟子百人嘉運儒學長議論捃摭正義人其精授業千人李𤣥道為王世充所執寢甚安其以義裁君廓雖只二事可見為人李守素通姓氏學號肉譜則世南欲以人物志目之論人物至北地笑而不答當時惟杜淹能抗之蔡允恭工詩俾恥為煬帝諷誦教宫人稱疾授内史舎人入宫固辭斥經事化及建徳後梁春秋顔相時師古弟臣風通儒髙行死以學聞而諫議有争師古不勝哀卒許敬宗名在奸臣傳子不觀其行故為其所惑敬貞觀之治衆君扶之不足武氏之惡一宗濟之有餘薛元敬邁之子族大畧類收謹畏過之未見謀䇿為與收及兄徳音號河東三鳳元敬最少鵷雛申文翰稱職為收附結房杜元敬未嘗欵曲房杜小記室不可親踈稷道衡曽孫蓋文達竇抗集諸生講論劉焯劉執思孔頴達皆至文達依經辨舉皆諸儒意所未叩毎講徧舉先儒義而必暢王恭所説蘇朂以上十五人并房杜世南為十八學士房居首杜居三虞居十二太宗為天䇿將軍時作文學館於宫之西收聘賢才並以本官為學士命閻立本圖像禇亮為贊在選中者天下慕之號登瀛洲薛收死以劉孝孫補劉孝孫少知名孫事王世充弟辯辯降獨孝攀援弓劎送之褚遂良太宗晩節諌諍之臣以受遺託孤能守其節由魏徴見太宗本書而能繼其諌諍諫封襌雕諌觀史諸諫太子諸王宜有定分王諌造漆器俎諌王年幼為刺史論魏泰嫡庶不明定立晉王其請絶薛延陀婚歳諫伐髙麗帝已可之李勣詆計平髙昌諌調兵屯駐合請還太子東宫迎師傅詔諌勿受莫离支金適太宗怒之之意受遺諌立武氏叩頭還笏貶死計譛殺劉洎欲無忌殺吳王皆為晉王計然於唐則踈洎初立濮王識義帖飛雉集宫中答以寳雞王珪論諌與魏齊稱譴諌廬江王姫止諌祖孝孫授宫中音樂數被史載納諌此二事確論謂元齡孜孜奉國靖兼資文武彦博敷奏詳明胄濟繁治劇徴恥君不及堯舜自處以激濁揚清見教魏王泰忠孝為善之正公主見舅姑禮孤不喜愠報平時餽遺人奉寡嫂撫姪期周宗族喜帝為立家廟母其必貴其與房杜游馬周才識敏達杜為何常條二十餘事即拜御史贊得君過房王魏廢浚儀令䧟韋挺是輔不如房杜雉論事切時多持其次之説謂論大安宫但欲營堞門觀論幸九成宫則詔已下業不中止願示還期宜論樂工輿皂鳴玉曵履則謂朝命若不可追不列士大夫諌營不急之務民勞而怨然言役而不及兵宗是諌諍不及王魏言太上皇不親享宗廟室功臣襲封寵諸王過厚上授調馬人官爵賜但得州良刺史消渇焚所章給直賣宅奴婢什器奉使稱職賜何常帛六賜飛白書青定九品服色三品以上紫四五朱七緑八九為人曠達鄉人薄之逆旅主人不顧何刺史奚達怒數召責趙為浚儀令崔賢所辱常薦其忠孝宻州文本髙其才載周子時與裴行儉典選稱裴馬劉文静與裴寂同為佐命文文静智勇才畧之士寂佞諛恩幸之臣静以才髙見忌故誅寂以恩幸私昵故免建髙祖殺文静而寵寂是不能以公滅私即欲以成為太子一等見識文静妾兄告變髙祖謂反明甚公韋雲起告寂反髙祖謂所以訊吏欲天下人信不反文静只是才智之士突以宫女侍突脅裴寂桑矯殺王威髙君雅和厥敗屈通之將顯和而見敗於薛舉已以裴寂軋怨望裴寂太宗與李靖定謀因寂以刼髙祖稱髙祖謂使我至此者公也貴震當世勲不位寂論破河東而後趍京師秦王欲速入關若從寂言即楊元感攻東都李宻持王世充同見庸人無智謀請討劉武周遂失太原㡬喪興王根本以妖言免許世緒謀畧之士兵首説唐起許紹與㐀和皆以地附唐而有功者數以夷陵歸唐助破蕭銑守夷陵全流人十萬義感二邦殺掠為止幼髙祖同學圉師紹子遂子獵犯人田有辭怒而射之免相髙宗守䖍州相州人刋石頌美有受賂者賜清白箴任環劉洪基之儔拒兼有智勇願請收左輔取永豐倉守榖州王世充為一介使入關歴任有功虞以計殺質子徐圓明不能㧞城親故多受賕丘和本非賢知夤縁功名之㑹故迹同許紹人物不及逺甚然以寛惠得吏士能自安於擾攘饋煬帝精腆事全是小人發元胄罪二以交趾歸唐丘行恭驍勇亦叔寳知節之流亞誅斬奴賊降其衆聚萬人迎謁渭北與巢隱隨秦王嘗世充虚實㧞箭以己馬衛太宗破賊功最髙軍功外無足稱史臣取其能以禮法自全温大雅佐命文臣圖足弟同事改主文檄祖定儀典鎮洛隱太子葬其先利弟彦博以人才論之去房杜逺甚太起義之初人才未衆三人事隋素有聞望宗不得不收用逺臣髙麗煩請置降匈奴五原塞此二事是識不吏部碎是才不逮為中書耗思殫神藴畜之薄陳被執突厥不對國虚實進見必政事利害二事是所長大有同大雅掌機宻參軍下西河見大雅四世孫造穆宗皇甫無逸忠孝知世充篡棄母妻斬關歸唐卒聞漢王反父死承母疾問憂悸而廵撫蜀黜貪用廉善治所須市他境燈盡斷帶為炷嚴明㢘介李襲志以地歸唐餘斬説據嶺表者是有識荒誘至嶺南六十州守桂二十八年南便之是有才襲譽才識不減其兄廵説商世師據永豐倉斬突厥使江南引水築塘民多歸下餘禄賜散親糧寫書姜謩佐命有武功吏事者外以晉陽長識髙祖吏部勒一夕濟河撫隴敗薛舉秦刺勑撫以恩信人喜見太平官府確工匠技巧器械之才而討髙昌造攻械磨班超紀功碑自刻朝之營繕咨而後行太諫征髙麗從行中流矢卒魏徴恐啟宗侈心嘗勸斥之敀確子元宗以藩邸舊恩卧内陪燕洩禁中語流死崔為善才幹清察下定傅仁筠李淳風二家歴捕勸髙祖圖天諌奪服太宗聞謡言謗之者封曲如鉤例侯李嗣真善音律武鐸振空地得黄鐘衆樂遂和對后以程嬰杵臼中宗乃安杜伏威與張士貴李子和范君璋羅藝王君廓皆盗賊歸唐者伏威地最廣盡有江東淮南南屬嶺東至海將與輔公祐為盗脅下苗海潮位以婦人服辱隋陳稜敗之太宗招降賜姓元吉上母好仙餌雲卒薛萬均專以武勇力戰成功騎為藝破建徳十萬與羅藝歸款死以百與弟萬徹率士百破建徳二十萬靖與萬徹副柴紹走突厥平梁師都與萬徹從討吐谷渾勇蓋三軍副君集平髙昌獄清宫不謹下死萬徹萬均之儔名副勣破薛延陀徹伐髙麗再勝太宗謂將惟道宗勣萬而已帝謂非大勝即大敗宗與房遺愛謀輔荆王髙誅之盛彦師智勇忠義之士書料李宻伏熊耳山斬之以見執於徐元明作令弟堅守既還髙祖罪誅之及以待其家不禮誅陳寶遇平生所惡數十家盧尚祖有牧御才文隋末募士補盗所向有功惠堅守不屈宇化及從討公祐破馮亮陳正通有能名據光州歸唐而歴蔣夀瀛州命督交州許復辭斬之劉世遜忠義有謀之士守以湋州歸唐彦平唐弼餘黨沒薛舉告者自固事與師同然元明壯彦師而置之薛舉重世遜而不害乃皆為髙祖所誅逃還言獨孤懐恩反狀脱髙祖於頃刻之間降責鄭元璹為夷狄作説客尤見其忠䇿取馬邑髙蒲政見其智突厥患之反間見誅李君羡有功無罪以䜟濫誅黑破宋金剛登破世充子元應轉軍糧從破闥建徳先摧鋒與尉遲破突厥於渭橋武小名五娘子官邑皆武應謠言女王遂誅竇威文學淹通隋諸竇喜武威獨尚文學諸兄詆為書癡為秘書郎十年不調故益博髙祖入關典禮湮缺威裁定制度唐論政必陳古今在隋諸兄以軍功位通顯至世威乃最達軌為將以勇敢立功春罪在多殺功不足掩罪千募衆千餘迎謁長宫下永豐倉收兵五襲黄欽山斬將破稽胡谷渾党項從討世充討薛舉降餘黨蜀走吐悉平蜀盗在未嘗解甲不用命即誅明以甥為腹心夜呼不至斬之遣奴取漿借頭法入蜀盡殺驅騎後者擅殺韋雲起民洛州下諸縣按㳺末皆趍本琮追獲桑顯和孤説降羅士信迎獨武逗留除名亦才之窮抗軌兄子之最賢在家孝行不為守寛惠竇氏父疾五旬弛帶居喪哀癯過常平母卒數號絶為岐州幽州以寛惠聞戚與髙極生歡宫中稱舅未嘗干事得外體一從平薛舉功第平東都冊勲静抗子之知識之士牧御之才竇氏最能者并州屯田寂不能難歳收數十萬斛頼請斷石嶺為障塞制突厥之入寂不能難後世之為司農面折趙元楷聚斂意在諷太宗為諫處頡利河南諸將征突厥陳虛實韋挺奏禁辰日不哭婚嫁燕樂主馬周以其狠非宰相器不用謂可粗使令遼東餉苦寒未進見廢薦王珪數嘗之李綱風節强直之士子慕張綱故名則仕周不詣齊王憲事隋太勇請正唐令罪事髙祖論竇誕養成元吉過惡請諌舞工安叱奴為㪚騎常侍頻諌建成不從解尚書太子承乾為立碑所綱所處父子兄弟之際皆人難惟其一心故皆著節安静綱孫來武氏革命俊臣殺之義自綱五世同居安静復以烈聞世稱李氏不衰李大亮才畧忠節之士擊為土門令賣所乗馬資葉貧瘠招撫亡散盗輙平單馬説行胡賊豪帥言為使禽張安善土上停招慰省勞役走輔公祐俘安撫西北討吐谷渾其名王都督凉州宻表臺使求名鷹烈宿衛嘗假寐義性忠謹外若不能言而内剛不可干非其對天子争是非無回撓居妻子未嘗見惰容舎事兄嫂以禮聞位通顯狹陋寫書留官破公祐以功賜奴婢百悉縱之者破吐谷渾復賜百五十遺親戚𦵏宗族無後三十報張弼米臨終請罷遼東役以關中為意稱死之日家惟五斛諌置降詞河南元齡其有王陵周勃節可倚大事子道裕議張亮反形未具太宗不暇省歳餘以為刑部逈秀大亮族孫媚張易之論減宗妻詈婢母不樂去妻中旌表門閭戴胄堅正剛强罪以君臣大義諫世充簒死大理執免詭䕃死及監門失覺無忌帶力罪犯顔諫正至事之機切無不聞幹局明强善簿最㕘處法意析秋毫隨類指擿言若湧泉為僕射明敏長於操决無宿疑諫為談論與魏徴更日供奉奏已削藁所存僅修洛陽宫䟽典選好抑文雅奬法吏時訾其寡學以兄子志徳後志徳父子相繼還以不解事僕射笑嫗牒歸善於君劉洎剛直果敢面言太子宜尊賢重道因直東宫丞獨言太宗詰上書者之過請精選左右遼諫止太宗機辯謂君臣往復議論自有體誣征輔皇太子監國欲按法誅大臣褚遂良以欲行伊霍事賜死此以剛果輕發取禍宗再拜尚書右丞復治如徴時後世以其諫太有卓識崔仁師仁恕重厚王按獄以情罪止魁惡仁仁恕囚無異辭元度請廢侍書舊學師條奏罪之上有司以反逆兄弟縁坐法為輕仁師議不改清暑賦諷翠㣲宫口陳移用費數千各無一謬亦强敏一事連知機務遂良忌之流州陳叔達明辨文雅與所為近厚尚在君子之科誥陳宣帝子温大雅同筦機宻書冊詔皆其筆安明辨善為容毎占奏搢紳屬目建薦江左落長士以母病渴賜蒲萄不舉成間䦧極意救辯太宗宗以閨簿汙漫為有司所劾太為掩䕶之楊仁恭才能足以立功名苛廉正冲厚亦善類楊隋子孫守甘州不細徼人安之破元感倍為凉州葱嶺以東奉貢述應機設距走突厥道克𤓰州蘓威宇文等惡其廉正出之方為洛州都督性冲厚以禮自閑衛人以石慶諡孝取立身揚名之意師道仁恭弟文揚周謹語禁省事清警有才思其善草𨽻工詩訪未嘗讀孔光傳想遺風太宗羣臣才術師道有推進而無甄品抑為吏部四海人物非所練悉以貴胄典選專貴勢親黨以逺嫌是怯懦處怯太宗視遇隆渥而謂其資性純淑實懦不更事可謂愛知其惡封倫字徳彞夀小人以奸邪逄君者刑揣隋文用婦言營仁宫揣煬帝愎諌嚴吝賞隂為虞世基裁畫謟承主意宗以秘䇿干髙祖悦之亟隱刺之亂數進忠䇿太以為誠宻請髙祖圖秦王意復白太子以乞羮䇿髙祖議廢立又固諫止倫實主隱刺數進忠正欲探太宗意間成太宗之罪而與蕭瑀論事初堅定至帝前輙變易外陋秦賄贈狼籍莫探其膺肺議討世充必克此以强弱之形論治計突厥入寇擊之便是探秦王意與魏徴論道一事乃國家存亡所係賴太宗明於用舎唐臨追劾之裴矩以小才長君之惡綏好學有文藻智數畧多識故事廵撫嶺南集二十餘州經西域塞破吐谷渾麗煬帝勤逺畧進西域圖悉太宗廵北奏脅髙伐遼始此斬史蜀胡始畢不朝矩諫太宗以縑試吏而殺之官年八十精明多識傳言宇文述虞世基用事以賄遷惟矩挺節無穢聲而楊仁恭傳乃言矩㕘掌選事受賕不法二説不同宇文士及謟佞竊位無才可稱罪徒以外戚夤縁富貴欵結髙祖以贖以女弟為昭儀見親禮其本末可知拭不對妻問遽召事洎美歎嘉木帝斥為佞㗖肉餅自奉侈劉改恭諡縱鄭善果中人之質可上可下責母賢能曉政治善果處决當理則悦不則愧之故所至有績事類雋不疑母有歸唐奉法持正充九歳以死事襲爵受詔號慟孝之質惜不能為宇文化及督戰非移忠於孝揚母亡而名衰非所謂名鄭元璹不以孝稱而奉使著節非所謂知本者琛傳稱五使絶域所書止四事與襄武王使突厥年劉武周與突厥掎角汾晉詔諭使可汗兵留數不辱突厥數十萬攻太原持節往勞口伐可汗頡利引還年貞觀後使突厥知其三必亡權萬紀利口之覆邦家者亦足殺身徴漢江充息夫躬之流劾元齡珪不平非力言房王㡬遭踈間還復為御史奏宣饒可冶銀數百萬斥第帝使輔齊王祐見殺懐恩族孫更五州威名赫然懐寧飲三斗塵無逄權恩閻立徳工匠技巧之才澤製衮冕御物築征遼時洪州造大航遼二百里淖為橋置道無留行不營襄城宫以可居免立本文學為工藝所掩中太宗泛春苑池以主爵郎俯伏圖畵恪羞畫師之名馳髙宗時使與姜並相有右相譽丹青之嘲蔣儼使髙麗不屈責蒲州禁奸諫數諫中宗於東宫田㳺巖不太子韋宏機使西突厥裂裾為西征詔宗修檀州學為司農積三十萬助太修隋宫室姜師度河北鑿運渠紛陜州依髙為廥注米舟中所至徭役紛然所就必為後世利强循雍州參軍人多渴死循教渠水一方利之號强公渠張知謇兄弟五人皆明經擢第謇門皆列㦸孫經不明不得舉知歴十一州勑子知泰知黙附武氏岑文本忠孝文才母亦有器識撫為父詣司𨽻理寃得直事以孝顯弟姪篤恩義帝欲出其弟文昭以母所鐘念泣下中太宗稱其忠謹不願兼攝東宫官希恩為書令有憂色合不營産業奏口未嘗言家事致十四作蓮花賦臺嗟賞獲田三元頌文華贍䇿令叢遽口占無遺意遼從伐遼東事一委任所凡此皆其文才從伐神用頓衰卒是才有窮亦太宗用過其量止太宗自舉專典機務以代師古節取輔公祏諫侵掠魏王泰有寵上疏勸崇儉陳嫡庶分孫羲事中宗李百藥孝義文學俸侍父母喪還鄉徒跣數千里琅好奬後進禄與親黨共之七歳知刈邪稻事春秋鄅子藉稻鬱帝京篇帝歎其身老才壯齒宿意新翰藻沉詩尤所長止封建杜伏威飲以石灰酒宿疾皆愈子安期父子皆七歳能文制自其祖徳林三世掌誥令狐徳棻史學唐秘書丞振職無請求遺書數年畧備承南北五代正史建議成書為益甚大大髙宗問冠髻髙大謂君象也晉將亡衣小而裳又對王伯之問曰王任徳伯任刑又對薄賦斂省征役㣲又對禹湯桀紂興亡謂桀紂惑嬖戮賢可謂見五世孫峘撰元宗實録克以良史稱李延夀史學不追終父太師南北史時人以其年少位下堪稱過七史本書而無志進太宗政典髙宗答美直筆李仁實史學通著格論歴韋雲起剛直强幹握事迹多在隋舉面奏栁述豪傑縁主壻私兵權述後雲起亦慕祁奚之意寵言山東人自作門户為朋黨充劾世基裴藴怙方命有變不以聞諫討世須關中安士氣餘飽風將突厥兵平契丹以竒用師事為人有行行之故不得其死竇軌以其弟隱太子殺之孫伏迦諌諍之臣二武徳初言三事請一受獻鷂琵琶弓矢百戲㪚樂三選太子諸王僚友馳射諫赦後責賊支黨市表置諌官皆諫太宗為大理卿言司農木橦倍直切中時病迦髙祖以其最先諫不次見㧞太宗亦悦其言伏諫諍正蘓世長即有縱横之風除御史無喜色人服其量張元素亦諌諍之臣力論隋亡由君自尊惡諫治洛陽宫回天之苦諫太子承乾之遣户奴撾擊刺客伺之泣景城户曹建徳欲殺之邑人千餘請代曰清吏高馮文武正直之才宗御史彈治不避權要書言得失太賜鍾乳辨藥石之言數上為吏部善銓叙人物上賜金背鏡光清鑒而列上五事天下大定而刑未措身率節儉營繕未息貸畿内數州士徠役多卑勲戚家息加懲革外官品未得禄張行成方正之士廊為御史紏劾嚴正事劉炫許其體局方正廟才此論盡之太宗三事事一論山東關中人意有同異從二論兼行將相與臣下争功三諌皇太子幸宜留監國髙祖求才用特達者張鋭薦之太宗謂朕自舉無先容是掠美對髙宗地震謂女謁用事大臣隂謀逺過世南志寧久旱乞去流涕易之行成子杜正倫鯁亮才能識量未足宻隋世一門三秀皆髙第出入兩宫典機以辨治稱董思恭與論文謂覺頓進無為左史言一言之失且筆之太子稍失顯諫所避諌之不從輙道帝宻語督切不當如此處求與城南杜同譜不得既貴鑿杜固南杜不振宗族不當如此以洩太宗語怖太子貶誣摭李義府釁缺為所髙宗出之崔敦禮節義功名之士志太宗朝奉使稱職者亦慕蘓武為人見其之所存以終考之非徒慕破廬江王執問朝廷事不言有使之節之與李勣薛延陀綏定回鶻立嗣而還有使功有通知四夷情偽屢使突厥前後建明允㑹事機使之才及為髙宗執政傳遂無可録之事楊洪禮將帥之才之楊素弟子有伐遼出賊背袍仗精整上壯曰越公兒家風副丘道巖硋處宻殺焉耆王降駁支獲龜兹于闐王征遼與遂良敬宗三人掌機務盧承慶才學宗稱職辨美儀矩博學而才三入奏軍事太傳其稱參軍職典選加漕凢溺者考能著人善稱考功職侍帝問歴代户版引據該詳稱民部職以兵部郎知五品選辭以選事盍以尚書臣掌之為出位中為髙宗執政無可書臨終戒子得制劉徳威有幹畧酋為將有軍功周從劉仁基討淮賊手劒賊䧟於劉武自㧞歸盡上虚實從平洛陽太刺綿州政廉平臣論寛猛視主之好最當答宗刑網踈宻在不在君閨門友睦俸祿分宗親寛平子審禮孝義二百口同居易從周興誣殺之孝義劉家傅奕術數通博而不失其正但量不足軌答漢王諒熒惑入東井為黄道所由沮其不之心以承亂當變更乞改正朔服色制禮作樂文論官貴簡約律失於煩張道源乞減官曹簿繁總奕獨是之瑀辨髙識奕上書極詆浮圖張道源佐之與蕭夀八十三自誌羚羊角碎佛齒胡僧呪奕而自仆吕才術數通博而不拘泥數與祖孝孫參論樂律一日即解三局象經筭太宗命刪隂陽書百篇十造方城圖地理由造教飛騎戰陣圖兵法辨宅五姓禄命積善葬止欲人不見郭孝恪才畧之士西謁秦王䇿平建徳進論軍謀軍食得安歡心虜焉耆王破龜兹不設備中流矢卒張儉邊將有操守謀畧者州拒頡利稱詔求取吐不禁新附民往來營都督破髙麗率蕃兵征遼旱免饑朔州營田歳收數十萬水單騎召酋帥三㦸張家程務挺父振厥對太宗辨對不屈號名將禦突坐裴炎事斬虜為立祠史大柰有軍功王攻桑顯和充從平長安從秦平薛舉世等功殊等以下蕃將馮盎將帥才羅識天命優平竇洞獠善治民諸諸將中才畧最隋亡破賊有蕃猓蒼梧朱崖地心不肯僣王唐為治善閲簿最發奸擿伏得民懽以地歸或譛其反魏徴勸懐以徳子智戴將帥才克肖其父帥勇而有謀衆得士死力酋皆樂屬之能撫太宗指雲問賊阿史那社尒智勇厥忠孝仁廉雖中國亦難其人死本突次子貞觀入朝尚主父哀毁典志平延陀不忘先可汗心磧諫頡利用兵入朝衛屯兵四十年建牙北治衆十年無課斂孝平髙昌受賞皆取老弱陳弊禽討龜兹不受郭恪金玉飾器用下七十城其王年十一以智勇聞問説于闐入朝使生中國稍渉學當逺過英衛阿史那忠忠孝清謹特異夷狄金宿衛四十八年無纎隙人比日磾執失思力智勇鯁亮之士降渾斛薩部落再諫太宗逐兔鹿陀諭從江夏王討薛延示敗之與與平吐谷渾徙尚主坐房遺愛交流契苾何力忠義智勇撃正觀内屬欲征髙麗不殺刺己者奮吐谷渾帝與以薛萬均官對曰恐四夷聞之重夷輕漢宗薛延陀欲屈之云我大唐烈士割耳自誓太以尚主贖之諫延陀婚知甚憂疑而死不戰而禽騎勸帝令延陀親迎討死處月朱邪孤注輕安撫鐡勒九姓麗副李勣伐髙虜其王黒齒常之髙宗朝李多祚中宗朝並係蕃忠義夏侯端髙祖使招慰河南受王世充以吏部印綬相之不間道走卒史所傳卅三人劉感髙祖使城涇州仁杲執之令約賊降感至城下令堅守仁杲射殺之罵益甚常達敗仁杲終薛舉紿刼之不屈羅士信十四先登擊賊䧟黒闥不屈死敬君𢎞馮立並事隱太子殊死戰橋太宗義立舎之誓以死報敗突厥於渭守廣州不飲貪泉吕子臧守隋南陽煬帝亡發喪方送欵鄧州危赴朱粲死王行敏見執於黒闥不屈死李元通定州為黒闥所破使為將不肯自潰腹死李育徳與兄厚徳及三弟皆陳州力戰死於世充張道源䧟建徳宻請乘虚擣心脅孝友張士巖父病獺銜鯁至吮母癰焦懐肅母病嘗唾張進昭母墮左手終截左腕張公藝北齊至唐九世同居李知本與弟知隱子孫百餘貲用無聞賊戒不入張志寛母疾輙病劉君良四世同居去妻易雛令鬭妻王少𤣥遺腹生十歳以血漬野骨滲得父骨任敬臣五歳母喪哀毁刻七歳聞立身揚名之訓志從學沈季詮母溺江投江少頃還持母臂出隱逸王績王通弟他大業中丞太史嗜酒還鄉學易老莊置牀頭書罕讀斗酒學士太焦革家善醸求為其丞誌作酒譜醉立杜康祠心醉鄉記五斗先生自墓以失職無子自託孫思邈隋文召不拜職云五十年聖人生畏答盧照鄰問疾心小膽大仁方智圓為本魏徴修史屢咨所遺夀百餘歳循吏韋仁夀髙祖使治越置七州十五縣酋豪悦服張允濟婦家還壻牛境不拾遺李素立諫髙祖殺人䕶三尺法天下共瀚海都受酒一杯薛大鼎滄州水利有與瀛州鄭徳冀州賈敦頤皆治名河北稱鐺脚儒學徐曠謂沈重紙上語事左氏為一時冠李宻得而師之孫有功陸徳明見前曹憲古文復興文譔桂林叢珠始以選授諸生孔頴達蓋文達見前顔師古太宗詔釐正五經正為太子承乾注漢書時稱孟堅忠臣刋古篇竒字雜引商賈富室子素議薄之被帝謂學可稱事親居官無聞好傲然負才及頻譴罔然喪沮謝客蕭散圖書儀定封襌歐陽詢潭人遣博貫經史碑倣羲之書險勁過之侵髙麗求宿索三日不擇紙筆貌鋭附子通相武后不武氏見中宗朱子奢持節平髙麗百齊新羅之憾夷人尊畏為發春秋祠然納其美女因髙祖祔主請建七廟諌諌帝觀起居録加上書者罪張嗣宗授太宗經官戲謂功過先聖太宗即位問所欲得願得國子祭酒因與之谷那律褚遂良稱為九經庫漏對太宗瓦為油衣當不敬播初置太子司議郎播為之人榮其清近時與令狐徳棻撰晉書撰漢書注四十篇漢書學大興劉伯莊秦景通劉訥言皆名家景通弟暐號大小秦君治漢書者非其傳為無法徐齊駙八歳召試太宗賜佩刀宗諌毁無忌廟子堅事武氏孫嶠事元皆中書舎人文藝袁朗陳後主使為月賦二芝草嘉蓮三頌在唐事齊王十世祖滂漢司徒事隋淑其間覬察皆死宋難昻著節齊梁從弟承序父憲立後主旁白刃不避賀徳仁學行可師伯兄弟八人比漢荀氏太守王仁改其里曰髙陽里謝偃塵影賦牒張藴古上大寳箴偃亦上惟皇誠徳賦玉真記勸封禪時李百藥工詩時稱李詩謝賦劉延祐尉渭南治第一李勣戒其自抑崔信明端午日中生有異雀集占曰當文顯而位不髙鄭世翼因楓落吳江冷之句求見其全投之水張昌齡以文浮靡為考功郎王師旦所絀貞觀末獻翠㣲宫頌方技李淳風父播棄官為道士議通羣書淳明歩天歴筭與傅仁均争歴法者多附風直太史局制渾儀可太宗因女武代王之䜟欲求殺之對以天命不去徒刑戮無辜恐復生壯者占候吉凶若符契徳與筭博士正五曹孫子等書麟歴代戊寅歴最宻袁天綱善相謂杜淹蘭臺學堂全以文顯武王珪天地相臨官五品韋挺面如虎以出官竇軌伏犀貫輔角完起立功梁益瑩武后龍瞳鳳頸若女當作天子岑文本學堂夷眉過目文振天下夀馬周伏犀貫腦背若有負然面色赤耳無根不張行成晩得官卒於火山令自知四月死子客師亦傳其術還髙宗令射鼠入一出四渡江復見婁師徳至舟復渡張憬藏技與天綱同庭劉仁軌魏元忠姚崇裴光等皆常問之甄權針庫狄嶔肩立能射三撰金針方明堂圖百歳許𦙍宗陳太后病風煑藥床下熏之擢義興太守不武徳時為散騎常侍療關中骨蒸傳染著方書曰醫特意耳思慮精則得之脉候難明吾意所解口莫能宣也樂與病值惟一物攻之氣純而愈速餘文仲論風與氣尤精治武后使著書惟風狀百二十四氣狀八十不以時則死頭風足氣上氣藥可常御時病風之人春秋末月可針刺餘皆以消息著四時輕重術奸臣許敬宗交善心立太宗署文學館來駐蹕山革詔殺勸髙宗武后逐韓瑗濟褚遂良長孫無忌梁王上官儀對帝立改實録唐初起兵割據者附見李宻亂世奸雄粗有智勇不足言英傑用能為楊𤣥感畫三䇿元感不用而敗不能柴孝和䇿為唐所先無不能用徐鴻客挾煬帝䇿官謂唐公見推天下可慮墮唐計受越王侗追宇文化及墮世充計傳兵計在食得興洛倉洛口倉不能守讀項羽其志可知不能用李世勣等不明似羽羽殺翟讓不義似羽所用兵與世充更勝負則去逺甚既為世充敗歸唐自比竇融懼詔經畧東都復召之而反盛彦師斬之王世充奸詐亂賊毎其能與李宻相持所謂以詐遇詐世充㨗必歸功於下虜獲盡與士卒宻則不恤士戰勝無所賜予此二人勝負以宻無根本不可持久世充有洛陽為根本此所勝宻本非智勇足以勝為簒隋三年國號鄭太宗禽之徙蜀旋獨孤脩徳殺之竇建徳盗亦有道如隗囂之流官起髙雞泊止是盗賊而文以奸詐恩遇隋及士人任王琮不殺河間守民世討化及不留願徃關中及東都者赦麴稜絶充待淮安王同安公主以客禮裴斬殺王軌奴反軌首志昻陳君實張道源釋世勣以用凌敬䇿釋凡皆所收衆得地故黒闥再起唐再用大師而後克知信讒殺王伏寳最失救世充為太宗所禽不天命不用凌敬䇿不知兵自立為夏王薛舉盗賊之强悍者久與子仁杲據隴西㡬兵强馬壯太宗本以持破之劉文静輕出敗唐事仁杲賊悍知稱萬人敵而殘忍之薛氏無天命舉亦自其敗糧乏降太宗斬之太宗取之所謂迅雷不及掩耳號西秦五年滅李軌寅縁竊據初無智勇凉以䜟李氏當興曹珍等降拜之起州三年滅蕭銑李軌之流靖後梁宣帝曽孫故得衆易降李髙祖斬之五年滅劉武周盗賊之强悍者非髙祖以裴寂元吉當武周輕失根本之地太宗神武唐祚㡬危據馬邑仁太宗破金剛武周聞之走突厥其太宗禽建徳杲武周黒闥皆一道先堅壁剉鋭乗勝追奔使不得再為計宋金剛與武周相表裏太宗破之髙開道盗賊之反覆者自初依賊格謙謙敗亡海曲漸掠州縣䧟漁陽稱燕王浮圖髙曇晟招之既而殺曇晟之因羅藝謂降既又連突厥入宼又降藝請兵擊破勢窮疑得罪不敢降其愛將張金樹攻之自殺凡八年劉黒闥盗賊之强悍者民建徳既禽其妻不闘其民以金帛㪚遣將士亦懐之唐起河東澤未能施於河北故黒闥再亂無不響應徐圓明亦寅縁竊據者中隋末争天下在關中齊魯去關逺故得後亡輔公祐據丹陽易自謂江南非取天下者所必争故為盗非河北羣盗比李靖禽之沈法興滅於李子通李子通降未伏滅朱粲盗最酷虐殺降唐復反見林士𢎞據䖍州趙郡王孝恭平之張善安據豫章李大亮執之皆江洋羣盗自相屠戮初無智勇梁師都兵雖非稱地占要害徳據朔方引突厥臨關中為唐害最深叚操有功於唐不少師都欲説處羅三道入宼其害尤深處羅之死天祐唐多矣劉季真盗之反覆者餘离石胡人東晉亂華之無足録者苑君璋勸武周與唐合縱不從與武周歸突厥髙祖召之不從突厥亂遂歸唐羅藝自為幽州總管不受化及建徳招為煬帝發喪奉地歸唐謀反死王君廓為盗歸李宻不禮歸唐瑗為亂斬之以為己功結廬江王奔突厥死古今紀要卷九
