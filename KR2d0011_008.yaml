body:
  text: 古今紀要卷八宋黃震撰隋文帝姓普六茹本楊震後姓周太祖賜諱堅周宣帝后父嘗從武帝破齊靜帝幼入總朝政矯宣帝之苛酷鄭譯劉昉矯詔引入周氏諸王在藩悉召至長安尉遲逈起兵韋孝寬討平之又廣陵杜喬生起元義討之平司馬消難起王誼討之荆郢兵起賀若誼之王謙以巴蜀起梁睿平之五王畢王賢等謀變被誅竟代周以長安城小徙龍首山廢後梁七年滅陳用賀若弼韓禽晉王廣楊素等滅之突厥請盟初來冦命衛王爽擊平之竇榮走又使史萬嵗斬阿波可汗遂請盟右統一天下事用蘇威髙頴同參朝政天下稱平嵗減賦役裴政修律令後世遵用去梟轅及鞭法定死流徒杖笞褒賞守令州縣多稱職梁彥光樊叔略房恭懿等減役每嵗十二畨為二十役減調二匹為二丈周末𣙜酒鹽悉罷之池井求遺書牛𢎞請以斷獄猶多命蘇威牛𢎞除律千餘條置義倉長孫平請輸籍法遍下諸州髙熲議龐晃短髙熲帝禮之愈密府藏充減河北東租盧賁閉糴除名本佐命臣關中大旱流涕不御酒肉者一期又帥民就食洛陽仁夀宫成壯麗而怒豆盧通貢綾之布焚之死刑三奏赦王伽所縱流囚李參等用為雍令右節用愛民事從何妥議樂用黃鍾一宫萬寶常祖孝孫定雅樂並不用聽民出家營造經像煩碎臨朝至日仄栁彧楊尚希諌不聽明察臨下左右有過輒加重罪以錢帛遺之得犯立斬牛𢎞等議明堂不決而罷盜邊糧一升以上斬晚節法峻不復依律詔諸司論屬官罪於律外斟酌決杖又以盜多一錢以上者棄市或三人共盜一瓜事發即死信獨孤后及楊素言廢太子勇立晉王廢學校劉炫諌不聽王通上太平十二䇿不能用晚年尤信佛道鬼神信讒功臣故舊無終始保全者懲周室微弱諸子分據大鎮迭相猜忌皆不以夀終秦王俊以奢侈免官死以蜀王秀以巫蠱死漢王諒反死帝疾楊素輔太子為變令張衡侍疾俄而上崩中外頗異議右帝失處髙熲事主專破文帝得政即願受驅馳益尉遲逈起兵先進之獻取陳之䇿陳人弊伐陳三軍咨稟迥得君專隆未得天下時帝已委心膂之破尉遲委任益前後短之者帝皆疏黜文諌晉王納張麗華推諌廢立進諌伐髙麗天有武大略明逹世務誠體國取忠良以下為己任韓執政二十年朝野推服賀若弼禽等皆所薦餘不勝紀削藁於楊素有功隋最多全以諌廢太子勇為獨孤后所間樂帝終不能之為煬帝太常諌收召周齊工見殺蘇威宇文護將妻以女逃之拜雖為所逼亦居山寺諷讀為娛授官並不髙熲薦之隋文聞禪代之議遁歸田里同然其後為宇文化及光祿大夫化及敗歸越王太宗平王世充以老病坐閭闔求謁太宗數之而不見又求謁髙祖亦不納亷耻掃地與髙熲同心輔政天下稱平然煬帝時與宇文述裴矩裴藴虞世基同掌朝政時號五貴卒為其所陷除名煩碎自是加五教以煩碎之辭百姓嗟怨江南多叛簡久之法凡公議惡人異已定律令格式非子夔論樂與何妥分黨妥奏以朋黨威坐免連坐百餘家此亦威之過帝謂威非詐清但狼戾不切求名太甚父綽在魏作征稅法自謂如張弓誰能弛者威至是奏減賦役因宫中銀幔鈎盛陳節儉帝將殺人當前遮之恐諌築長城獨盜賊起無敢言者威因玄感反言成厲階又隱殿柱言盜賊漸近又乞赦羣盜討髙麗清儉亷謹皆好處楊素代蘇威與髙熲掌朝政功識度不如熲亷謹亦不如威惟有戰伐之伐陳引舟師趍三峽巴陵以東無敢守者兩破突厥漢南無虜庭江南羣盜所在平破御為煬帝平漢王諒軍甚嚴然微功必録故士亦願從陵為僕射時營仁夀宫頴言其侈麗營獻皇后詔書褒美貴盛貪侈近古未聞時人鄙之力栁述梁毗言之漸見疏煬帝得為太子皆其文帝疾為煬帝防擬帝善屬文貴好陵轢周武但恐冨來逼臣謂賀若弼與韓擒皆平江南功臣史喜功名尉量小作帝終始疑之夀州刺帝疑與遲逈亂召之徐髙熲薦平江南欣然以為己任平伐陳先襲南恨不得叔寶平陳後撰御授陳七䇿飯貴盛望怨不得為相忿髙熲楊素謂惟能啖以怨幾死與突厥比射殿前自明赤心嵗嘗謂楊素猛將非謀將韓擒鬪將非領將史萬騎將非大將意以大將自許煬帝尤疏忌之卒見殺韓擒北史作禽任守和州屢挫陳人江廬州總管委以平陳之伐陳為先鋒濟入朱雀門擒叔寶視與若弼爭功上前迎上指示突厥突厥不敢仰將死鄰母見王者又或驚謁閻羅王史萬嵗良將警髙熲謂古名良無以過無不修營伍無夜而虜不敢犯應變方年十五從戰斬命射羣鴈弟三者突厥馳其所撰挑戰壯士自請於竇榮定擊髙智慧亂江南深入千里十旬轉鬪七百餘戰冦破南寧夷倒諸葛紀功碑深入降之突厥入聞其為將引去以取南寧時受賂事覺除名之楊素害其功死之日天下寃劉方亦良將邑平李佛子有威惠日經略林南過馬援銅柱八元胄周趙王招謀害帝瞋目叩刀入衛急扶帝走事類樊噲坐事除名煬帝殺之李德林幼聰敏就宅觀者車馬月餘不絶朔該博孝美容儀善談吐江總謂河之英舉秀才擢甲科山與顔之推判文林館之周武平齊得之詔誥及東人物一以委之謂天上人假隋文受顧命曰願以死奉公􅀈勸竟為大丞相黃鉞羽檄頓至機速競發代詔䇿璽書皆其辭益諌滅宇文氏由是品位不加命後以請買市店疏貶死以江南抗衡作天論霸朝雜集盧思道不解劉松所作碑銘閉户讀書後松又不解思道所作借魏收異書才學兼著文宣挽歌惟思道之善者八首大聽蟬篇庾信歎美畜勞生論指切當時謂省理而留太僕為重産賤刑名不言殿庭非杖罰之所朝臣笞罪當贖持操行恃才陵轢宦塗淪滯昌衡與從弟思道齊名死獨不言功不按對周使值徐州有能名牛觸其所乘馬受牛主價吏部蘇威考之曰德為人表行為士則薛道衡與盧思道李德林齊名用聘陳蘇答髙妙陳有四必克以在吏部人黨威除名晉王召之不從晉王由是銜之顯空齋作文户外有人便怒久當樞要才名益爭相與交襄州清簡人懷其惠賔上文帝頌煬帝惡之殺房謙彥勸之絶客道衡不以為意見李文博讀書至治亂得失忠臣烈士未嘗不反覆吟玩吏部薛道衡令在帷中察已行事守道居貧衣食乏絶清操邁厲源混亂雖日免十貪守何益謂房元齡曰今治責虞世基子盛容節曰賈誼當比年議論何事於秦孝王生男頒賜曰賞罰為功過設王妃生男群官何事古人得失如指諸掌調無吏幹為縣丞得下考數嵗不惟道衡愍之假文振膽智從明逹世務嘉坎齊晉州先登遣破突厥伐陳破州獠請煬帝突厥出塞外文在鄴遇逈起兵棄母妻子而歸帝遺言遼東役貴速元岩剛正不樂運輿襯陳周宣帝八失岩力救之曰樂運免吾將與俱將誅烏丸軌不肯署詔脫巾頓顙鎮在隋面折庭爭無所回避輔蜀王秀蜀法令明肅王不敢為非劉行本諌殿前笞郎福為左庶子責唐令則與太子昵狎責夏侯戲笑自謂非殿下弄臣為大興令權貴憚其方直梁毗開皇初置御史官以鯁直拜治書侍御史奏大興令無所回避西寧州蠻夷不相攻擊楊素擅權上大怒又極言之素自此恩寵漸衰當時不畏素者惟毗與栁彧李綱栁彧當朝正色百寮所憚熲平齊後留京者不預賞彧奏行之不許髙子請戟諌刺史用武將詰劾唐君明母喪娶十諌親細務持立楊素於庭其罪請禁正月五角抵節河北免贓汙二百餘人州縣肅然楊素譛黜之長孫平請民間秋家出栗麥儲之閭里以備凶年名曰義倉或告邴紹誹謗因諌絶此法突厥相攻持節宣諭姓歷州所在稱善上相州有能名正月望百衣盡矛甲為戲怒免韋世康尉逈之亂守絳闔境肅清慨然有止足之志恬素不以得喪干懷吏部選用平允請托不行訟侍宴求退以為荆州總管為政簡靜合境無弟不仕盡以父時田宅與之栁機周臣皆勸禪讓機獨義形於色無所陳請損寬簡有雅望作牧俱稱寬惠近侍無所益子述尚主豪怙寵驕蹇之機從子祝風神爽亮進止可觀讀音韻清雅善談謔散常接對梁陳使者長前後奉使所得皆之宗族為齊王史不能正救昻機族兄乞勸學行禮自是州縣置博士習禮牛𢎞乞開獻書之路言歷代書聚散正議明堂請議樂論京房六十律不可行定新樂改期練之禮訥吏部選舉先德行而後文才帝卑儉寬厚簡終始信任惟𢎞一人煬引入皇后對食殺不答妻告叔牛蘇孝慈請給職田免百寮利置廨收息與民爭盧愷諌用染工王神歡每諌簡老牛享士色聘陳依本國禮有敷奏侃然正宇文弼吏部擢八縣令皆稱職色進伐齊策將三戰三克當官正百寮所憚與陳與髙熲議煬帝好聲色死令狐熙孝使滄州吏民恐其遷易為汴州令行禁止上相州取以為法考績天下最鎮嶺南開設學校華夷感敬稱為大化免乞改嶺南同名州名或譛受李佛子賂子德棻薛胄兖州旬日部囚數百為察偽郡守之之官者堰淮泗水西流陂澤盡良田上封禪圖以納漢王將除名裴政蕭察鎖送荆州城下使誘梁元帝政許而告城中以援兵大至在周與盧辨建六官撰朝儀令司憲剖決如流用法寬平面折人短而退無後言在隋與蘇威定律諌太子寵雲定興禁襄州令行止稱神明李諤乞禁公卿死嫁賣妻妾禁極論文體之弊謂貴賤賢愚惟務吟詠乞當官矜伐蘇威欲罷臨道店舍諤謂行旅之所依令依舊劉昉小人前與鄭譯謀引帝輔政驕文帝心膂遲劉昉牽鄭譯推後恃此自辭征尉逈漸見疏謀反誅鄭譯桞裘皇甫績外祖韋孝寬鞠養幼自尅厲盧賁受禪清宫請改周代旗幟機言宫懸七八不同數人同引文帝入總萬帝嘗謂微昉等我不至此然此等皆反覆子也實行詐顧命於我李穆周太祖芒山之敗墮馬穆突圍入授以從馬獲全撫慰關中所向克定賜鐵劵奉十三環金帶於文帝密表勸進百乞移都莫拜太師贊拜不名象笏者人貴盛比渾許宇文述國賦之半得為穆孫之嗣既而不豫述因李氏當為天子之讖搆之族誅李圓通為帝監厨不許世子乳母干請遂得托心腹梁睿使代王謙為益州王謙反因討之劍南遂平衡威振西川夷獠歸附乞討南寧夷薛道令其勸進䇿上平陳䇿金上鎮守突厥十求退受自汙干義守武安專崇德教不尚威刑教爭財相訟者自取家財與之各懷愧耻風大治鄭譯劉昉譛之謙髙熲以有經略可討王昉上之幼子宣敏使蜀乞分王戚屬於是蜀王秀鎮蜀隂夀監韋孝寬討尉逈三軍紀綱皆取決於夀髙寶寧連結契丹討平之骨儀清苦獨時天下士大夫莫不變節濁貨儀厲志守常介然獨立竇榮定少與文帝相厚娶帝姊請尉迥平後鎮洛州突厥盟豆盧績刺渭州鎮燒當羌服鳥鼠山涌泉有惠政華夷悅益州破王謙梁士彥晉州禦後齊怨破尉逈入鄴城文帝忌之望謀反誅宇文欣年十二能左右馳射者諌周武帝旋師拔齊晉陽擊鄴城觀戰遂大敗尉逈有善事雖非欣所建亦相謂此必英公法誅解兵法有威名與梁士彥謀逆虞慶則突厥將內附為使招之帝以髙頴平慶則降突厥並稱平嶺南李世賢南誅趙孝城從宇文泰攻洛陽留鎮撫旨為周克陳十九以習故事相隋又尋怍出與斛斯徴不協救其死而不言姦刺冀州有疾盜民爭祈禱置斗尺免詐載蒿賜趙芬明習故事斷所居之職皆有聲績文凡有疑議輒為評度尉逈之謀隋甚親信楊尚希尉逈發喪哭不哀視不安知其有他計先逃之州郡過多請罷諸郡諌親細務元褒泣諌諸兄别居服啇人訟其受金縱賊輒自誣曰恐纍善良髙勵齊親王官剛直有才幹斛律明月每征伐引為副宦放縱欲斬之乞收五品以上家纍置三臺脅其死戰不從遂遁入隋絶子胥廟牛酒之祭為周所獲上取陳策周亡洮州豪猾屏迹路不拾遺侯莫陳頴教豆盧績撫慰稽胡羣胡悅服一瀛州免官百姓流涕鎮邢州山東第桂州大崇恩信民夷恱服嶺南閩越不附拜南海太守魏憺具魏史杜臺卿采月令為玉燭寶典患聾請修國史崔仲方與髙熲議正朔服色平上書論取陳之䇿會州諸羌于仲文九嵗謂讀書忠孝而已郡不從尉逈之誘擒其將擅讓盡平河南諸獄中上書自陳中屯白狼大破胡浪以吏多姦令勘録省事征遼出樂道宇文述先退遂敗趙綽刑部稱職爭重盜賊法坐爭辛亶衣緋禈賜死爭蕭摩訶子作亂從上每謂朕於卿無所惜但卿骨相不當貴耳賀婁子幹有邊功非再破突厥州再破吐谷渾為議西營田便守營鎮榆林寨甚虜所惲杜彥繼子幹守靈州胡馬不敢至塞桞莊啓後梁保境息民以觀變能蘇威稱其兼世務學業與陳茂同官不降意為其所譖郎茂見文帝非周武作象經因自結納品為衛國令辭訟不詣州省蘇威責人間五不遜曰管內無五品之家宇又奏罷餘糧簿河乞沒王事者子不退田劾文愷于文仲競東銀窟撰州郡圖經忌無蹇諤之節見帝刻切歎髙構前後典選莫及必牛𢎞典選擢用常問之薛道衡為文先呈草舉房杜等伊婁謙贊周武伐齊因聘齊觀釁不澤州清約得人攀戀數百里絶龐晃帝令射雉為冨貴之驗擊突厥剛悍李安叔父璋與周趙王謀殺文帝安告之觀德王椎文帝族子慶寬容下士四野朝傾矚其得與髙熲虞則蘇威稱貴文帝惡衆忌弟之逹平陳後差品天下牧逹為第一唯楊素言有君子之貌兼君子之心逹蔡王智積文帝族子暇同州修謹門在州未嘗逰戲聽政之端坐讀書無私謁時延儒士所設惟餅果酒才三酌曰女妓惟年節嘉慶奏於太妃答勸治産業者昔平原露朽才帛苦其多也吾幸無可露守𢎞農清靜破玄感太子勇文帝長子因好學寬和不初為太子百諫徙民實塞飾馬鐙帝恱冬至官朝之恩寵始衰楊煬帝因譛之文獻皇后始為奪宗之計素復譛之卒煆成其獄廢之秦孝王俊第三子有令問好佛奢伐陳山南道元帥後漸免官妻妬毒之蜀王秀鎮蜀令有膽氣廢煬帝忌之楊素譛之漢王諒并州有管黃河以北皆𨽻之反見諸兄以讒廢隂異圖帝崩徴之遂裴文安勸直趨霸上不從降楊素擊之敗煬帝晉王廣營仁顯宫發天下竒材異石實園苑自長安所江都四十餘府築西苑緣渠作十六院清夜逰曲幸江都挽船八萬人皆衣錦括天下樂家子弟為樂户築長城發丁男百餘萬造輿服近世莫及鶴自投􅌁營汾陽宫誅髙熲賀若弼等巡河右通西域自京師入西北諸郡轉輸塞外西方先困自江東幸涿郡敕四方於前船選補詔討髙麗四右兵會於涿共一百一十三萬三千八百人議復伐所在盜起詔伐髙麗百道俱進髙麗乞降帝在江都以禮餉豐薄除官四方剝利以充貢獻大業十三年唐公起義師於太原入京師以代王侑為帝遙尊帝為太上皇明年義熙二年宇文化及犯宫闈上崩子溫室恭帝侑德煬帝長子元太子之子義兵入長安立之以唐公為大丞相封王明年遜位楊素煬帝之立皆其力詳見文帝張衡幼有骨鯁風為同輩所推扣馬諌周武居憂出獵為太學煬帝奪宗之計多其所帝幸其宅留宴三日幸驕貴怒諌廣汾陽宫出守榆林帝汾陽其不瘦損郭衍勸隋文殺周宗室禪代取晉王腹心撫奪宗之謀欣然為之勸帝樂然有御才王韶與元岩同以剛直稱晉晉王鎮并蜀王鎮益妙選重望為僚佐故佐王鎮并王甚憚之每事咨詢金自鎖諌王穿池起山克陵留鎮求退榮毗楊素薦為華州長史繩素左右無所寬貸許善心陳人聘隋隋留之至陳亡始悲泣而臣之不言宇文述私役宿衛之罪化及弒逆獨謁朝堂有兒矣母死不哭曰能死國難我續父成梁書神雀頌房彥謙孝不齊州主簿州境肅然禪齊主之奔欲匡救果齊亡歸家隋受無仕心韋藝強仕之父書諭賊賊慚懼一勉髙熲考課號長葛令稱慈為天下長吏第去之日百姓哭薛道衡深交謙責張衡不正救清棄官隱居薦置司𨽻官起彥為之慨然有澄天下之志舉皆表式彈射無怨守常介然孤立謂隋政漸亂靡不變節獨直道子玄齡曰人皆因祿富我獨為官貧遺子孫在清白尺牘為人所寶髙構前後典選莫及衡作文必呈草牛𢎞典選擢用必詢辨道舉薦房杜等滑稽給衛玄資州山僚解兵歸附者十餘萬去之日攀戀數百里不絶征遼與代王侑留守玄感圍東都玄率步騎七萬授之卒與宇文述破之其後撫關中不能救百姓而貨賂公行楊汪少凶疏善驅擊奏長折節勤學一王逹欲求良田薦為左丞汪之為大理夜究二百餘囚曲盡事情屢祭酒百寮就學天下通儒皆萃焉梁郡挫李密為王世充用被誅宇文述從伐陳平吳會通奪宗之計皆述教之賫金寶入京見楊約於楊素謀廢立因吐谷渾離散逐之雪山空其故地巧與蘇威同參朝政容止便僻宿衛取則有思竒物異服進獻宫掖千征髙麗大敗三十五萬五千人還者僅二七百人破斬楊玄感子化及雲定興女為太子勇妃以竒巧媚述虞世基初以雅淡文華著名其後專事逢君貪黷重陳主校獵作講武賦傭書養親煬帝其才使典機密所與宇文述等號五貴乞承旨為敕日且百紙無遺謬帝鴈門被圍重賞格及停征遼既而不行由是稱詐足見帝不可諌由是唯務取容謂鼠竊雖多不慮楊義臣破賊乞散其兵之淫侈納賄之弟世南清貧未嘗贍化及殺裴藴逄君之惡貌為太常益淫聲異技至三萬人感為户部以閲人無得免丁賦承旨戮玄之黨萬餘家譛殺蘇威譛殺道衡作亂被誅裴矩撰西域圖記迎帝意帝誘西域朝貢中國之盛誇夷狄謂大識朕心勸大陳以髙麗遣使於突厥始建征遼之䇿女議分始畢可汗之衆召鴈門之圍召江都婦配驍果以安其心制迎拜化及常為建德朝儀居亦廉勤桞辨晉王引文學之士百餘人充學士辨為冠文為文必令潤色帝為文初效庾信及見辨體遂變退顧問應答如響言雜俳諧彌見親愛帝朝常終日言宴諷誦至於同榻共席來護兒幼讀詩擊鼓而慨然滅賊取功名窮斬世父仇陶武子大破髙智慧於浙江其餘黨為帝圖其像以進又瀛州善政帝謂國步未康卿名將天下無事為良二千石從幸江都賜牛酒謁墓宴父老征征遼斬髙麗王弟建乘勝追至平壤城下再遼聞玄感反因亟回師與宇述斬平之海三征遼髙元請降三次皆出道請幸江都周羅㬋仕陳從吳明徹伐齊躍馬突進莫不披靡獨全衆而歸豫章內史獄訟廷決不關吏手如吳世興讃之或勸其反拒絶之隋執筆製詩還上馬入陳不在人後陳亡降陳主卒衰絰送葬肯平晉王諒餘黨中流矢卒以冦未平柩不行靈坐弓劍自動是日絳州陷樊子蓋帝問其清曰臣安敢清止小心不敢納賄耳朝江都賜米麥使謁墓謁故老征遼守東都禦玄感坑平絳賊盡焚村塢百姓大駭歸首者皆之死見斷頭鬼前後重沓楊義臣破突厥逹頭斬破漢王諒將李景名平向海公破髙士逹張全稱帝惡其威召之賊由是復盛麥鐵杖日行五百里多為盜沒官執御傘每夜至南徐州為盜從楊素每戰先登征髙麗先登死之復子孟子江都之難慨然讎化及殺之沈光戲馬為天下最征貧升俠五升十丈竿透空而下號肉飛仙遼十丈竿墜地遇組復上下帝遇害與孟才錢傑復讎麾數百人皆鬪死無一降者萬俱羅言聲聞數百步飛大呼陷陳出入如周法尚敗陳將樊猛請平桂州盜陳平遂州獠帝幸榆林行宫為方四面外拒史祥伐陳出九江道王帝東宫遺書甚念之破漢諒於黎陽宇文愷有巧思營仁夀宫觀營東都皆極侈麗巡作千人大帳風行殿推移如神北無非長君之惡明堂圖議閻毗性巧遼善書畫諭增修輦輅發論屬車大駕東城下賊弓弩亂辭氣自若何稠博識舊物而性巧夜為鹵簿儀仗明遼水造橋二日成中作八里城遲而畢王劭博學文專以詭怪符讖阿媚志言河清漢瑞石龜符命皇隋靈感乞改王諒姓袁充亦劭之流十言隋日景長上言上命與隂陽律吕合者六條萃天變事為破突厥之祥楊玄感少時人謂其癡來郢州莫敢隱欺至征遼督運黎陽詐稱討護兒發兵反東都宇文述等敗之誠節劉𢎞泉州禦髙智慧至剝樹皮為食皇甫誕謀楊諒反諒與豆盧育閉城拒而死遊元正色拒玄感馮慈明李密獲而誘之答曰直道事人有死而已不義之言非所敢對賊帥翟讓誚之勃然曰天子正使除汝輩不幸見獲豈從汝活遂死張須陀賑飢先開倉而後上狀長破王薄秦號名將帝令人圖形破裴才破君𢎞破左孝友死與李密戰楊善會破斬張金稱敗時山東能抗賊者唯善會七百餘戰未嘗負罵竇建德死獨狐盛化及兵入宿衛皆走盛獨罵之而死堯君素守河東不從屈突通之招招木鵝浮表逹東都唐使其妻至城下之射殺其妻張季珣父祥楊諒兵燒城下拜乞驟雨死季珣拒李密力竭為所得不屈孝義薛濬母老賜輿服几杖四時珍味帝隆冬五百餘里跣護歸葬不勝喪而死遣文祭之王頒父生辨為陳武帝所殺焚伐陳請行因發武帝冡而之循吏樊叔略相州攻為天下第一評司農種植皆出人意表朝廷疑滯輒為理無學術與理暗合必豪侈食方丈趙軌拾桑甚還鄰家馬父老酌水奉餞夀州復芍陂踐禾酬禾主直辛公義輿役病者自療之遂變岷州之俗獄事未終不還閣魏德深貴薌館陶爭其為令所去悲哭所至鼓舞酷吏庫狄士文居官清苦絶子噉官餅杖之於僮𨽻無敢出門親舊迹賈鹽菜必外境升粟之贓無所貸哭聲遍州境聞而捕之哭者彌甚死家無餘財三子朝夕不繼無納之者田式盛氣待下贓壻登官所樓笞之姦必置之死燕勞流血盈前飲噉自若趙仲卿崔𢎞度元𢎞嗣王文同恆山誅豪滑之沙門為佛會者皆斬之帝怒斬仇人噉其肉咸盡儒林元善使陳使者拜朗為人所歸通博在何妥下以醖藉音韻清妥因講春秋難之謂髙熲可付社稷後併得罪辛彥之掌周議制獨與議稱為金城陽池貢供祭物何妥折蘇威正讀孝經之説威上八事奏與蘇威相詆論樂與音與蘇子論樂其朋黨刺史針指斥當世房暉逺牛𢎞稱為五經庫飾試經生四五百人無敢非劉焯古今滯義窮其祕奧妬論難蜂起皆不能屈然考石經磨滅諸儒之為飛章所謗除名不行束修者不教劉炫與劉焯閉户讀書十年不出三左圓右方口誦目數耳聽五事同舉遍直省不得官縣責賦役自陳求試不偽造連山易魯史記等取賞稟撫夷論風遼東可伐諸郡置學反流外給皆發於炫官自辟今論往者州唯守丞縣唯今具僚則長大悉由吏部芥皆屬考功牛𢎞不用賊盜起教授不行自是以業不傳後為恨二從賊破投縣不納凍餓死炫名亜於焯稱劉數百年無比都炫河間人焯信人王孝藉通五經役助王劭修史劭不之禮不省七年課不免奏記牛𢎞亦知而調文學劉臻精兩漢書稱漢聖虞綽與族人世南等居禁中以文學待詔異鳥銘坐與玄感交變姓名亡匿崔儦大書門曰不讀五千卷書不得入此室孫萬夀有不得志詩當時傳誦好事者書壁而玩之杜正玄應對如響下筆成章真楊素恃才傲物倉卒使作鸚鵡賦歎曰此秀才髙麗百齊亦傳其文稱杜家新書隱逸李士謙嘗毋吐不固辭不仕應貸粟遇歉焚其契豐而償之受論報論治盜冝從肉刑張文詡通經孝諸儒延為博士及州郡舉皆不就與事母鄉人化其德刈其麥者避而之受鄰家墻不直毁舊堵以應之貧不賑恤時人比之閔子騫原憲徐則天台辭榖隱尸解此不當入逸傳崔廓里佐屈辱感激入山讀書與李士謙交善時號李崔藝術庾季才梁滅入周贖俘𨽻觀因災異戒宇文護歸政言隋當受命象知遷都言袁兖日長之謬遂得罪楊伯醜前知辭與何妥論易義皆異張胄玄議厯三事與古不同度其一祖沖之於嵗終創分四十六年差一至梁虞􅒠以百八十六年移一度胄玄折中為八十三年合堯時與漢歷其二周馬顯造景寅元歷加減章分進退蝕餘乃推定日胄玄乃因二十四氣列其盈縮日行遲則月遂日易及行速則月逐日少遲合朔加時以為損益秋分後日行百八十度春分後日行百七十六度其三自古歷朔望交逢不問內外便蝕張賔創有外限但應蝕不蝕未明胄玄以月道行黃道內十二日有竒而出又行道外十三日竒而入經黃道謂之交朔望去交前後各十五度以下即當蝕若月行內道則在黃道北蝕多驗行外道則在南無由掩映度又超右獨異者七事係推五星行及日月掩蝕許智藏秦王俊疾召之醫夢亡妃泣明夜又夢入靈府避之智藏至曰病已入心萬寶常妙逹鍾律譯因論聲調以箸叩食器宫商畢諧論鄭所定樂亡國之音請以木尺為律以調樂器率下譯調二律之撰樂譜論旋宫之法旋宫自漢以來無通者試應手成曲雅淡不為時人所好將蘇威排之事竟寢聞大常樂淫厲而哀知天下相殺時皆習鄭聲惟寶常歸之於雅著貧餓死焚所書古今紀要卷八
