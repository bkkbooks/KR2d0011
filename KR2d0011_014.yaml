body:
  text: 古今紀要卷十四宋黃震撰唐六文宗初立去奢從儉禁獻竒巧纎麗布帛出宫人放鷹犬省教坊翰林冗食千二百員復舊制竒日視朝其輟朝放朝並用偶日大歷以來節度使多出禁軍帝始以太僕卿高瑀為忠武軍節度中外相賀自今債帥鮮矣謂狄兼謨後或事有不可勿以還詔為憚右好處自元和末宦官益橫建置天子在其掌握劉蕡對䇿極言考官不敢取時王守澄典禁兵尤橫上與宋申錫謀誅之事泄申錫貶死李訓鄭注復以為己任先誅陳𢎞志及王守澄元和之黨盡矣甘露之變訓注反為仇士良所殺公卿駢首就戮天下事皆決於北司宰相行文書而已帝忽忽不樂自謂不如赧獻上急於治故訓等得授鑏售其姦妄右宦官事楊志誠逐盧龍監軍李載義牛僧孺請因撫之志誠為留後李牧憤三鎮之桀驁作罪言又傷府兵之壞作原十六衛作戰論守論右藩鎮事虛懷聽納不能堅決牛李朋黨不可平釋此朝廷所以不振相韋處厚與路隋數上疏憲宗其言切中有以穆宗沖怠不向學與路隋上六經法言發十難誚張平叔官鬻鹽之議嘆敬宗時逢吉逐李紳力爭得不死庭湊亂帝宰相不才謂陛下有一裴度不能用者禁中內變為文宗頒號令及他儀矩無違舊章為相斥堂吏之招權賄者相府肅然置自齊抗罷州别駕反引處之朝授受不綱處厚六雄十望十緊等州補别駕由是流品澄别久上驟信輕改奏可中變即首乞罷又言裴度可任自是無復橫議姑從執政用高瑀為節度中外賀自今無債帥家戒史憲誠遂不敢與李同捷通姿狀甚懦居循易至廷爭嶷不可回百僚謁事畏惕不敢及私相二十年裴度宗閔為相怨其薦德裕出之山南竇易直見敬宗山次年出鎮南王播獻銀器千萬綾絹子萬得相專以錢穀進不與事見憲宗路隋父陷虜日夜號泣坐必西向不食肉事德宗末三上書乞從吐蕃和李錡以知市辱之欣然坐肆以元和吐蕃欵塞五疏請修好冀父得歸補缺鯁亮稱翰林除制不受金幣之謝曰公事當私貺耶宗言宰相不當兼金穀於是裴度辭度支相文詔改韓愈順宗實録隨摘改貞元永貞間數事而止無不署貶德裕奏譛輔政十年歷牛李訓注相事所將迎李漢李德裕隋爭之德裕傳李宗閔宗室為與僧孺對䇿詆吉甫流落不偶徽穆宗進中書舍人父子同拜錢典舉宗閔托所親德裕與李紳元稹白貶之自是朋黨相軋典舉得人世謂玉筍文宗欲召相德裕宗閔中助多先進引僧孺同政盡去德裕所善德裕入宗閔出爭揚虞卿訓注出德裕召之己營解楊虞卿訓注復效貶之秉訓注指凡不附者為二人黨逐之楊嗣復政欲復用之鄭覃爭不勝擢杭州初坐交劉稹流封州德性機警始有當世今名為裴度引拔度薦裕可相遂怨度一以方正愈敢言進當國反奮私黨昵韓作猛虎行牛僧孺元和初與宗閔皇甫湜賢良第一丞對䇿不避宰相楊於陵坐者非宜責中按治不法內外澄肅之執李直言賕罪出不納韓公武餉錢穆宗喜相敬宗時以政近幸表去位上於鄂州置武昌軍使鎮閔陶甓為城免嵗築城費廢沔州省冗官宗引復相文宗范陽揚志義逐李載義謂自安史後不係國休戚劉總歸國適耗財力請因撫之維州降德裕請搗虜之虛僧孺謂修好使者未至遽反其言失信夷狄恐召侮遂返降者晦翁謂此事牛論正而心私李計譎而心正因上問太平何道以致答以太平無象今乃小康固辭出鎮淮南溫公謂其欺君誣世倫治第自娛復召會莊恪太子薨陳君臣父子人大經帝泫然復以足疾辭坐交劉稹貶子蔚叢事宣宗皆賢孫徽宋申錫當朋黨時孤直少與議者謂璠激浮競璠文宗相之倚誅宦官申錫用王尹京兆以其謀告王守澄申錫貶死見殺者數十百人然以清節進疾要位納賄餉四方賄謝一不受在宰府無他謀議李德裕吉甫子河怨僧孺宗閔對䇿斥其父宗吉甫謀討兩李逢吉沮之逢吉相穆出德裕引僧孺樹黨而牛李之憾結之浙西觀察承亂後府庫復充變癘疾不相養俗毁淫祠千餘乞不奉敬宗詔上脂畫粧具扆諫索盤條繚綾禁度僧諫方士上丹六針詳見敬宗宰逢吉排之迄不涉僧文宗召之浙西度裴度以相薦宗閔先相引孺共出德裕罷盡逐其所善子承杜元頴敗後鎮西川瘴建籌邊樓者創雄邊弟十月漕黎雋免災定鬻女三嵗或五嵗歸父母是毁浮屠私廬五斗以地豫農蜀風大變於南詔還俘掠四千人吐蕃維州將悉怛謀以州降德裕陳出師之利僧孺沮之晦菴謂僧孺固大言以恐文宗然吐蕃卒不能因維州為唐患則德裕計不行亦不足恨監軍歸言維州事上悔遂召代宗閔相罷上朝衛丘言邪正二途其辭皆若可聽諫罷二省符江淮大賈使主堂食諫以李訓為官訓注怨復召宗閔出之進王璠鄭注李漢共讒貶之浙訓注敗上謂宗閔注而德裕欲殺注者起為西觀察上指爭鄭注處相代僧儒鎮淮南發其殺留鎮錢之半武宗首之信任甚專略平叛亂威令赫然復張詳見武宗狐宣宗立謂每顧我髮為竦翼日罷白敏中令綯崔鉉仇之貶死崖州綯連夢求歸葬懼精爽可畏白於上還其喪得孤峭明辨以經綸自任不使監軍干軍政將有功裁決午漏即還第舊或繼火沛若無事時威機急代作詔以忠義丁寧三鎮使者河朔畏諫信方士趙歸真善起草亭精思大事書不飲酒無聲色文章至大位不去王涯梁肅薦之陸贄宗再入翰林訓誥溫厲益相憲宗循默罷文時代王播揔鹽鐵政刻急相收李師道時十二州銅鐵賦𨽻天子鹽鐵錢為合度支鹽鐵為一使領之罷京師榷酒以悅衆妾變茶法為榷茶使民怨自舉動詳悉府不畜妓惡卜祝方技書史娛書侔祕條上衣服室宇使略如古冀革侈靡資嗜權偷合訓等不能潔去就故族滅十一族貨皆為兵掠惟涯者取之彌日不盡之獨女以病免夢涯提首告賈餗進士高革聲稱籍甚七文辭開敏名褊急大三典貢舉得士十五人多卿相矜為相以險持見指為宗閔黨罷不與馮宿畏中人不取劉蕡亦罹禍本以中立肯犯顔排姦以及誅與王涯實不知謀李固言王堪修太廟不謹改太子賔客諫以斥調護地非所宜領選按籍自擬先收寒素宗閔得罪李訓使為相俟其坐黨出即自代之蒲訓敗復相鎮西川武備雄完武宗復召津梁壞使因以舟邀丐行人固言鎮河中因除之前諫伐回鶻詔方鎮獻財助軍口吃而議論上更詳辨舒元輿婺州人苛地寒不與士齒士元和舉進士有司鉤交切上書言古貢未有輕於此又言取士不宜限數時多三十少二十史裴度興元書記文檄豪健一時推許監察御按劾深害人負才鋭進獻文不報上書自言馬周張嘉貞代作奏為名臣主父偃徐樂嚴安朝奏暮召臣所上八萬言躁拔犀之角擢象之齒豈主父可比宗閔以浮誕肆出之附鄭注為繩逐所惡遂相禮詭謀謬算日與訓比敗天下事二人為之舊臣鉤譽還裴度等高秋牡丹賦李訓宰相揆族孫善敏辨論付大言自標置結從父逢吉以隂險謀昵之金幣百萬使鄭注書介注謁守澄得見上詭辨激昻可聽逆給事中鄭肅等共劾其憸人與注誅元和黨幾盡一嵗至相中外震畏等出注鳯翔甘露之變將盡誅宦官士良捕斬之死幾千人鄭覃諫穆宗荒昵上為開延英士相慶與經術該深淳篤守正文宗尤重之侍講德裕厚宗閔罷遂相世不喜人辭病進士浮夸欲廢其科與上論救直責實今慕王夷甫皆治平安逸致然馬諌論詩工否帝帝言韓愈順宗事不詳實以司遷武帝事啓終究盛德以宰相領祭酒請罷五經博士狎武宗時德裕欲引之辭疾侍清正退約不串第不加飾無妾媵講每以厚風俗黜朋比再三言之疾惡太過正經文刻太學李石宗室而文宗惡宗閔等相排故李訓等以孤晚得相石繼拆官寺搢紳賴以為強帝自嘆即位十年不得治因與帝論治赦中人馬還相驚兵至賴石鎮靜得安乞內置令無自違之室上切於資治石常輔之盜以身徇國王而士良等疾之將朝使徂擊傷馬欲強辭位出司嶺南陳夷行與楊嗣復李玨相次輔政議論每相短行嗣復以王彥威鎮忠武史孝章鎮邠寧夷請無倒持太阿諫竇洵直當衙論樂工尉遲璋授王府率夷行謂官當當衙論宰相得失上與珏論姚宋嗣復謂宜戒以權屬人論宋祁論郭逺不可刺史果敗上欲賞祁夷行謂事是諫官職上亦厭其太過品相武宗定僕射答四官拜楊嗣復韓滉妻其父於陵謂有子必相禮僧孺宗閔引進之不欲越父當國故權知部侍郎二幕得士六十人多顯官欲宗閔出亦出和宗閔復相即與李珏相嗣復官陸誇珏趣之鄭覃爭指為朋黨互詆上前求去上為遂免覃時武宗立非宰相意欲誅之德裕救免領貢舉率門生迎於陵置酒與門生坐兩序對為相答問符讖曰治亂宜推人事請録延英宰相語付史館損不與宰相路岩廄曰先人舊資安可奉權臣李珏事母孝更舉明經李絳竒之謂目角珠廷非庸人相勸舉進士諫穆宗九日大宴諫增茶稅謂以數諫出為下邽令處厚清廟之器豈擊摶才為殿中侍御史韋文宗謂知鄭注乎曰姦回人中申辨宗閔貶陳嗣復引同相與李固言三人居秉權與鄭覃夷行更持異議朋黨益熾為帝謂承平珏曰當無事思所闕曰帝欲以杜宗尚書夷行乞豫奪陛下自斷珏焉用彼相篇言貞元初政弊於進奉納武帝立數稱道無逸請却劉從諫大馬劉白鷹以嘗議立陳王貶庫宣宗時鎮河陽罷橫賦宿逋百餘萬去之日府十倍於初鎮淮南發倉賑流民以軍儲之羡半價與人避正寢亦卒揚州淮南三節度皆死於鎮珏不死不及家事門無饋餉淮南立碑崔鄲嘗副杜元頴鎮西川法傳無官業可紀人宣宗嘆一門孝友為士族題為德星堂後名其里為德星禮兄弟六人至三品邠偃鄲又五為部再為吏部唐興所無諸臣栁公權公綽弟家十二工賦學對穆宗筆諫頗公綽謂宰相第本志儒以侍書見用類工祝乃得𢎞文館學士繼文宗復召侍書題夜召對燭盡宫人蠟液濡紙之與聫句使之壁邊戍仲春給衣上令賦詩應聲成文議不賀浣衣小節上謂有諍臣風自舍人下遷諌言郭􅀈獻二女得鎮邠寧上還二女武宗時稍耄占奏謬被劾奪俸至懿宗始致仕議者恨其不歸事博貫經術書法徑媚通音律而小喜奏樂曰令人驕怠彈志非其華為不孝外夷皆别署貨具購栁書笑西明寺金剛經最得意圖貺遺巨萬主藏盜之曰銀杯羽化矣惟筆研籍自鐍祕之栁子華公綽諸父令代宗以為還華清惡其剛直沮之為昭應設棘圍令民還華清宫瓦石材用不終奴日已如山墓杖殺元載自為志子公度攝生不以氣海暖冷物八十有強力段文昌任節義不為小行表憲宗欲用之韋貫之沮之相穆宗踰年還政治蜀寬靜而間以威斷羣蠻震服而旱禱必雨雨久出逰必霽民為語曰旱不苦禱雨雨不愁公出逰蠻夷變叛開曉即定侈時人非之墓祭用音樂鎮少窶貴而子史所載者惟撫之才成式博學書儷畋獵自放復雉兔遍遺幕府人為前世事無用者酉陽雜爼李紳母授之學注短小精悍書工詩號短李乃不為李錡作疏以刀亦不被囚至錡死免或欲以聞曰本激于義非市名陷穆宗時與德裕元稹號三俊逢吉欲引僧孺之與韓愈不叶罷之明敬宗立逢吉誣貶之窂後得其請立上疏事始詳見敬宗􅀈夀去虎不為害宗閔復以為分司官不鄭覃使司河南剛年惡少望風遁鎮宣武蝗入境武宗相之四年以文藝節操見用而屢為怨仇所排卒能自伸其才以名位終所至或過為刻暴宗閔故黨誣其威殺吳相追削官子孫不得仕韋溫綬子高七嵗日誦數千言廷十一舉兩經及第拔萃等父疑之而試諸監察御史以省養不便不拜人親疾草年不弛帶號伏閣爭宋申錫諫以中代修太廟諫尊日非崇飾虛名時乎德裕用之或言牛所厚曰是子堅正可以私廢不為鄭注鳯翔副以父戒辭翰林綬以此職積憂畏病廢子得罪言訓之不早諫太子晏起辭侍讀及太王晏平賂貴近改撫州司馬樂工尉遲璋授光州皆封還詔獄執郎官清選不可賞能吏以職方賞姚朂按大楊嗣復謂此衰晉風出溫陜號賦麥未熟吏督租口使民貨田中穗可乎緩期而辦德裕欲引同列若言李漢可釋在為宣歙觀察池民訟刺史劾搒殺之方疾賦室愧屋漏詩曰今不負斯戒矣闕少時惟女續曹大家女訓與蕭祐為山林友李敏中剛峭斬喜枉枚李草文辭氣槩相上下匭大旱請鄭注以其誣逐宋申錫為理使言有司不當責其副得為給事中不許仇士良蔭子曰內謁者安有子由是棄官去李甘或謂欲相鄭注甘昌言白麻出我必壞之坐貶封州李欵亦敏中所善閣注之自邠寧入朝伏劾崔玄亮鄭注搆宋申錫率諫宫叩延英置笏苦陳名重朝廷移疾歸歙州焚馬牛生駒犢籍山民輸租者使輸錢久每遷官讓形於色士晚好黃老清淨故居官未輒去遺言山東人便近皆葬兩都今歸葬􅀈州王質通五世孫救宋申錫姻友勸仕乃舉進士黨為諫官善德裕而中立不為清白鄭浣補缺敢言無缺直臣可更相賀憲宗謂餘慶曰卿令子而朕請杜刺史之迫下紀功者為文宗侍講粹經史要録問之酬柝無留行鎮山南為餘慶嗣宗興元學廬養生徒風化大四子處晦從讜尤知名從處晦文辭秀拔損明皇雜録讜相禧宗庾敬休祖不臣祿山送父不臣朱泚以請視朝次對可傳後者季史官如故事機密不可文宗選傅太子略劍川山南茶征舊賈人入錢京師太和初崔元責本道主之而嵗上度支四萬緍故多逗留敬休置院姊歸收度之錢乃無逋役蜀米貴請以本道缺官職田賑民不飲酒食肉劉蕡明春秋稷浩然有救世意四對䇿文宗言宫闈將變社將危天下將傾海將亂馮宿謂過古朝董而畏中官不敢取河讀之有感慨流涕者諫官御史交章論其直南府參軍李部曰蕡逐我留吾顔其厚上疏爭之宦士年而有甘露之難令狐楚牛僧孺表幕府人誣之貶死史謂譏切宦言太疏直戒帝漏言而身誦迂廷魏謨徵五世孫汝士薦之挺挺有祖風女文宗思鄭公後楊諫取李孝本入宫諫用樂工楊州司馬居諌授董昌齡刺史以其誣殺監軍諫上崇起注仇士良軍中治妖民乞付有司故笏今甘棠建為宣宗中丞權戚縮氣兼平章乞儲却獻象從李業辭户部殺告主奴綯讜切之宣宗謂有祖風令狐讒出詳見相宣宗時狄兼謨仁傑族孫赦剛正史歷三州賑飢後蘇州治嚴封還左藏盜縑詔帝謂有事勿以還詔為憚遷中丞帝勸嗣家聲劾江西吳士矩加給其軍郭承子儀曾孫極通五經及第為太和為諫議言政事得失論鄭注不當太僕爭宰相不當領度支家儒素無貴驕氣無餘資高瑀裴度韋處厚使鎮陳蔡士賀韋裴作相天下無債帥州苦外旱築隄百八十里寬利崔珙父頲生八子世擬荀氏八龍理威重精吏治將鎮嶺南文宗見其對精亮有趣又知其治泗得人心謂鎮武寧無易珙才遂鎮徐王智興亂後徐人戢畏尹京遇旱奏禁中滻水溉民田不能捕撀李石盜望少衰鹽相一年兄喪被疾求解崔鉉代之奏其妄費鐵錢九十萬緡又劾其與劉從諌厚貶之琯尉撫興元軍皆按堵殺李絳後之宦官治宋申錫固請付外與衆治天下重其賢世以為榮為左丞時弟珙任亦尹並據顯劇方介有器藴人屬為相而不至璪璵尤顯飣璵孫逺相昭宗風致整峻世慕其為目曰座梨言坐所珍也栁粲忌衣冠有望者貶白州殺之之諸崔自咸通後臺閣藩鎮數十人天下推七族冠曾王母年高無齒祖母唐每旦乳之姑病曰無以報婦願後子孫皆若爾孝世謂崔氏昌大有所本鄭朗覃弟上字有融見為起居郎文宗求觀起居注不與謂得一以自改遂上之既相中人李敬實排騶導馳去文宗斥敬實貴以鄭朗為諫官不爭得失徙之初相者言當而不以科第進俄擢第一而覆實被放後果相崔從鄜坊繩驕軍稜不受黨項互市之遺憲淮南除贏利稜有風望詳見宗歸融登子昌效湖南觀察盧周仁進羡錢億萬會後儒臣少朝廷典禮多本融議栁公綽鎮河東回紇互市不敢侵擾力知宋邪宗執宜福祿人原禮之得其死詳見憲溫造鎮山南盡殺害李絳之軍管宗見惜其不誅楊叔元詳見敬高銖伏閣言李訓憸邪鍇貢舉得實才並詳見敬宗韋表微料李聽破志詔三傳揔例李程並見敬宗馮定見穆宗王起畫像便殿號當世仲尼訪時政王彥威本儒學媚士良獻羡求進並見穆宗楊敬之馮孫喜祭酒兼太常是日二子登科時號楊家三韓愈稱其華山賦一時傳布愛士得文章孜孜諷玩人以為癖所至稱項斯詩斯由是擢上第殷侑憲宗使回紇不屈四諭王承宗聽命所諌議論治亂得失凡八十通以語切出至稱廉潔疾勸文宗舍庭湊專攻李同捷流同捷平鎮義昌荒之餘單身之官仁惠為治户來歸户口滋饒廥儲盈腐官天下賦入務安反側盡為軍資侑以餉餘上送溫造劾之既而以造奏不直復鎮院鹽鐵度支屬官悉得私繫人所在獄或私置牢嵗千百侑請州縣糾列所係申觀察薄朱叔夜罪遂見疏稍以經術進臨事鋭敏有強直名晚節兾台輔務交結素望稍衰孫盈孫僖宗在蜀聞有禮樂擢太常楊虞卿悉婚幣助陳商葬免諌穆宗遊荒用親吏私奴受鬻為告入贓官宗閔引佞柔善諧麗權幸依為姦利語舉選者走門下無不得所欲升沈在牙頰間時欲趍舉埸問蘇張蘇張猶可三楊殺我輊事機皆人所奔向注黨中最能倡和以口語軒號黨魁鄭因訛言誣之子貶死漢公辟李絳幕公荆南貪贓無擢同州鄭裔綽鄭輿奏冒猥廉槩三還制書漢公素結左右帝出裔綽汝士楊嗣復族昆弟對擁旄節盧簡辭習知法令臺閣舊事簡能附鄭注𢎞正使司空輿條上兩鹽池新法自是課入嵗倍簡求攻張權變信居邊善綬御人安之虜憚恩皆有文第進士鄭注方技遊江湖訴為李訴煮黃金餌之挾邪市權舉軍患之薦之王守澄陷宋申錫搢紳側目守澄復薦為御史大夫涯積資巨萬權震天下上問富人得請𣙜茶王遂為使出鎮鳳翔欲護葬守澄因羣宦集盡誅之李訓恐其専功先五日發訓敗亦誅夷善治痿故訴薦之中人昵愛王璠李吉甫驟擢中丞以告注故注傾心宋申錫與謀誅鄭注反儀宇整峻京兆政修儒學許康佐進士宏詞連中不家貧母老求為知院官母喪已除辟命皆答人始知仕為親屈不答帝閽人之問遂知上與李訓謀剪宦官辭疾罷文藝李商隱字義山行令狐綯力薦之舉進士振牛李黨皆以無排之屢依幕府皆不綯以忘恩偷合憾之奏客榮陽卒庭為文瑰邁竒古是令狐楚授之章學時溫筠段成式俱以相夸號三十六體段成式見前段文昌下溫庭筠彥博後行與商隱號溫李薄側辭豔曲廷皓不作龎勛求節度表宦官仇士良與元稹爭驛卿五坊使所至暴甚冦盜上甘露之變殺公半空制李石劉從諫書言王涯等寃欲清君側文宗差以自強拔文宗泣謂受制家奴不及赧獻自此不復朝立武宗武宗內實嫌之觀以減謙糧事搖兩軍四戒其徒勿使天子間暇書凡殺二王一妃宰相貪酷二十餘年家藏兵數千死籍之敢初士良夜召崔慎由作詔廢文宗慎由以死不承而止故慎由子胤終討除宦官藩鎮魏博史憲誠詳見穆宗滔懼請納地魏人攻殺之推何進憲誠起凡七年何進滔與衆約斬殺前使及監軍者襲居魏十年民安之子重順鎮冀王庭湊為李同捷求襲上不許天遂與同捷逆命同捷平稍畏謝罪子赦之凶悖肆毒甘亂不仁夷狄不若元逵次子職識禮法貢獻如照尚主盧龍李載義獲張𢎞靖妻子歸京師兵同捷要封載義乞討之自效有功馬使楊志誠逐之奔易州者上使命為留後鎮河東回紇使不敢犯為下所逐史元忠自為留後因授之橫海李同捷奉表請命討詔以烏重胤代同捷不受又不肯史憲誠詔諸鎮進討李祐入滄州斬之凡傳三世澤潞劉從諫自邢還治潞公寬厚下益附又入朝待遇加等見卿多托以私見事柄不一始輕朝廷窺因甘露事上書譏切中人士良等言其伺始與朝廷二貪侈武宗文宗子用仇士良謀殺皇太子自立相李德裕終始任之河朔三鎮悚息聽命鎮冀王元達張魏博何𢎞敬盧龍仲武討平澤潞劉稹亦用三鎮之師論兵敗三弊請監軍不得預軍政故破回紇平澤潞所向有功三鎮使至當激以忠義故三鎮不敢有異志減州縣冗官千二百十四員毁佛寺四百餘僧尼歸俗二十六萬五百效皆委任德裕之因太后言遂省畋獵絶橫賜賞高少逸鄭朗諫獵以杜悰不肯選娼女相之受趙歸真籙王哲諫坐貶方士丹得疾相崔珙見文宗之武宗之德裕任他相無始終皆書之功李德裕相文宗事見前任武宗立自淮西召相之首觀辨邪正專委力爭楊嗣復李珏死許詔言事者無得乞留中諫請推誠項諫遊獵主回紇易粟以待其變回紇掠黨䇿奪公敗回紇自諫從黠戛斯求安西北庭未料盧龍陳行忝必生變求去上曰大事皆就豈得求去相助王討劉稹澤潞平軍論敗兵三弊詔下軍宰多不聞監軍指揮事將帥不得專進退從每軍宦者為監使選勇為牙隊時置備邉庫兵容裁決午漏下還第沛若無事日元和用宰相或不休沐繼火不決䇿制勝威名獨重二謂省事不如省官省官如省吏罷郡縣吏千百多怨者深答孔子三千徒亦黨之問歐公朋黨論本之疾朋黨感憤切言當國六年天下已平乞骸自沮白居易相柳公權以崔琪薦為翰林惡恩非己出左遷之襄陽水溢廢僧孺為太子太師尊劉稹平後貶僧孺流宗閔以其為患人五表上號胡氏謂其矜滿秉政久徇憎愛多怨上亦不悅怒領錢榖衆愈貶韋𢎞質言事相不應宣宗立罷之餘見宣宗陳夷行李紳相四年能以名位終並見文宗李讓夷廉介不妄交位雖顯劇儉約自將為世咨美上擇諫議謂夷讓可德裕引相之崔鉉陳蹴踘角抵拜荆南賔佐入朝三嵗至相上夜召韋悰草制之外皆不知與德裕不協罷餘見宣宗杜悰佑孫疾父方移方當佑相為昭應令惟悰尚主式大臣子尚主皆稱疾悰以選五鎮淮南不為武宗取倡女及良家女帝遂相之淮南旱荒百姓漉漕渠遺米呼聖米食茭蒲實皆盡悰表為祥宗囚獄數百千人劾荒湎不能事宣宗罷之懿立乃授中人命大臣鎮荆南詔斬秦匡謀討賊蠻害駭卒自大議論往往有合然才不周用出將入相厚奉養未嘗薦引幽隱佑之素風衰焉號秃角犀詔為公主杖期舊制衰三年不恤杜牧禦始弟陷泗州龎勛見懿宗李回宗室裕強幹宣所涖無不辨氣上慮河朔相締結德薦回慰明辨有膽三鎮無不奉詔槖鞬郊迎兵興以來未有歸説張仲武與劉沔釋憾平澤潞拜相鄭肅學有根柢太博士疑議據經條答不文宗擇輔東宫保護子朝廷謂肅臨義奪有大臣節武宗相之政與孫李德裕同輔仁規仁表皆豪爽有文文仁表以門閥章自高曰天瑞有五色雲人瑞有鄭仁表死放縱陵籍人畏薄之鄙劉鄴文鄴相貶諸臣杜牧佑孫不牧追咎長慶措置無術復失山東作罪言以當位而言罪也上䇿莫如自治中䇿莫如取魏出東取重下䇿浪戰宗遂取之劉稹平略如其䇿回鶻潰入請武歷三州常廉史職論中書知制誥利剛直有竒節不為齪齪小謹列大事指陳病尤切疏真無右援者從兄悰歷將相而牧困躓怏怏不平卒年五十夢書白駒又甑裂乃自志墓焚所為文章詩情致豪邁號小杜善與李甘李敏中朱敏善而通古今成敗甘等不及顗屬文與兄牧相上下裕幼病目母禁其學謫賈餗謂足敵數百人顗德貴盛數諫之後袁州嘆門下愛我如吾無今日陽常言訓注必敗文宗召為成尉聞難作辭疾歸栁仲郢公綽子四母韓臯女和熊膽丸以助勤人尚書二十針韓愈咨賞爭禁卒射殺免死置吏部時為德裕條減冗官殺諫望仙臺政尹京權量北司吏入粟違約而尸之號嚴明者不徇德裕折進士科時進士無受惡官者當調持缺簿自閲擬宣宗時尹河南尚寬曰輦轂之下先彈壓郡邑之治本惠養授鎮劍南殺大吏之貪肆莫制者官下肅然敕醫工劉習鹽鐵場官曰自有本色官無每遷必烏集其第庭樹戟架皆滿者五日德裕家祿不振以其子為推官正服色用簡素不父子更九鎮五為京兆再為非慶河南皆不奏瑞度浮屠急於摘貪吏濟單弱弔不詣宰相手嫁衣冠孤女不能自歸者藏書必三本仲郢抄書皆楷小精真四子璞學不營仕編著春秋三氏異同義著自漢武紀元為年以大政大祥異隨之圭與璧繼擢進士皆秀整而文郢晚在杜悰幕不受積俸簫佐謂其不能事父仲爭其誣人皆愧悵璧規正李瓉不法不聽拂衣去之玭見昭宗盧鈞嘗署李絳裴度幕給事中駮奏無私御史爭宋申錫獄知名嶺華州三嵗一易馹書南不取海船珍流以清淨治稟不許蕃華通婚闔郡肅一周恤放喪婚奉南方服其德不懲而化使華蠻殺干走闕請立祠昭武宗時漢水害襄陽鎮築堤障漢繼劉稹義石雄兵先入鈞堂治堂上左右皆雄親卒自居甚安之發卒戍代北反攻城鈞諭之悔服逢明皆追斬繼劉鈞鎮宣武思亂者安然遨以宿齒數外遷罷宣宗召之不得相失望移病逰林墅令狐綯之以年八十元旦升降如儀音吐洪暢舉朝咎綯綯為使相居官有績根仁恕至誠而施於事沒位將相無贏財封敖德裕召為翰林居屬辭敏贍不為竒澀語切理勝慰邊將曰傷爾體痛在朕躬鎮興元修斜谷道第平蓬果賊才為太常卿廷設九部樂宴私上高其少行檢故不至宰相劉沔李栻巡邊稱其威略遂鎮河東劉大破吐蕃迎大和公主歸共討稹李珏數稱無逸篇議諫受劉從諫大馬劉納白鷹以嘗陳王貶餘見前文宗循吏薛元賞極言當受維州降怙京兆杖殺惡少文身者三十餘禁屯勢不少縱軍暴折戢何易于為益昌令方春代民挽刺史船囚焚𣙜茶詔訟就廷遣三年獄無藩鎮魏博何重順武宗諭之入朝或割地不從因使副鎮賜名𢎞敬趣討劉稹不進師王宰收􅀈州始懼進戰鎮冀王元逵識禮法貢獻如職拔武宗詔討劉稹即日就道印州盧龍史元忠陳行泰殺之次符張絳又殺行泰鎮張仲武求繫回鶻自效德裕以代張仲武光朝子此屢破回鶻諸部紀回鶻不敢犯五原塞自遂衰求勒石聖功德裕為作銘碑北宣宗初又破奚部及山奚澤潞劉從諫奢侈行善貿易暴賈人獻金幣即署牙將使賈所在橫獻馬上不納疑士良所沮憂被病死以從子稹嗣劉稹拒命斬之德裕發諸鎮兵討自悟至稹凡三世二十六年宣宗憲宗子官幼時宫中以為不惠故宦密謀定䇿立之即位罷德裕相敏中變會昌之政增置八寺復復度僧尼增七年孫樵上書言之禁私度州縣官受三洞法籙獨此不變會昌之政元年旱減膳徹樂出宫女縱鷹隼止營繕理京城獄書正觀政要於屏風正色拱手讀之焚香盥手讀大臣章疏遣刺史必一一訪問詔州縣據貧富作差役簿有役據簿輪差令韋澳纂諸州風土利害號處分語補缺趙璘請罷元會御宣政宰相以天下無事大禮不可罷上曰近華州有賊關中少雪皆朕之憂何謂無事惜章服賜睦州守牛叢紫遽曰且賜緋時以緋紫為榮與宰相論元和循吏擢韋丹子寅為御史謂頗牧近在禁廷以畢誠鎮邠寧抑宦官敕使以餅黑鞭驛吏責配之䇿問韋澳近日內侍權勢與澳令狐綯謀處之之戍臣失律坐監軍李敬實犯鄭明騶導配南牙帖李行言名殿柱擢海州因獵問樵夫稱其性執擢李君奭懷州因獵見醴泉百姓祈佛願留之不補醫工劉集梁新官定笞法杖脊一折十杖凥一折笞五右治道安史之亂河湟陷吐蕃至是李琳復清水康季榮復原州張義又定瓜伊西甘蘭鄯等十一州而河湟盡入於唐右武功上明察沈斷用法無私從諫如流重惜官賞恭謹節儉重愛民物大中之政訖於唐亡人人思詠號小太宗令狐綯每奏事未嘗不汗沾衣范氏惜其以察為明抉摘微細以驚服羣下白敏中武宗欲相居易德裕惡之言其老而薦敏中為翰林既相排德裕甚力一反會昌之政崔自員外五年十三遷破薦令狐綯餘黨項久擾鉉議遣敏中鎮撫黨項九千帳遂鎮邠寧退徙劍南五年鄴相懿宗病不求且逐諫臣曹定諡醜盧商窶困以學自奮之蘇州以鹽法求贏民困商令計口售鹽人便資反增以勞為觀察判度支伐潞與杜悰同贍兵為相誤縱死罪罷崔元式鉉之叔尚鎮義成病拜相兼户部書以罷韋宗侍御史以部獄不得實改遷為相以無功罷馬植文宗時安南都護文惟飾政清淨不煩公洞夷請賦租約束武宗召自以譽望在諸右德裕抑不與要官學相宣宗以交中尉馬元贄貶三館士不避行臺始植周墀長史學最屬文髙古矚訓注以黨汙名士獨不能誣為天子欽武宗立為江西觀察劾舉部刺史暴剪捕據盜大戍彭蠡禁剽劫裕鎮義成鞭宿將笞者一軍治為相言德重定元和實録以廣父功請削新書諫王宰賂權幸求使相駙馬韋讓求京兆不與妄進者少衰諫開邊罷河湟事悟鄭皓言其以直言相直言免帝加檢校官崔鉉相武宗與德裕不協罷刺宣宗召用之滅遣劉潼諭降雞山盜而果州史王贄𢎞討之善鄭魯楊紹復段瓌薛蒙參議論時語鄭楊段薛炙手可熱上題於扆引魯為相上以尹河南曰魯去矣事由卿否汝出鎮淮南平宣州軍亂居九年教條一下無復民以順賴鎮荆南龎勛避之自淮而北崔龜從三中賢良方正拔萃宗廟室不當稱孝弟明禮家沿革當言敬九宫列星不為大祠非輟朝不當在訃至數日後嵗二品以上經將相不宜輟朝相再無可紀令狐綯父椘為憲宗山陵使風雨獨奉梓宫白敏中因宣宗問薦宰相器知制誥上問民間疾苦對金鏡書乞任賢官夜對燭盡金蓮炬送補輔政十年上問除宦曰有罪勿捨有缺勿由是南北司如成火能僖宗時鎮淮南李湘詩虜龎勛儒緩不用卒為所敗弟緒汝州佳政汝人刻石以紀當國固讓子滈招權賄號白衣宰相護納李􅀈賂綯用為安南都致南詔之亂劉妄言已解試進士及第二綯去後張雲興􅀈交疏劾之綯為訟寃人皆貶魏謨為中丞發杜中立姦賊權戚縮氣為辭户部兼平章謂不宜雜錢穀乞專治户部相首乞建儲自敬宗無敢言後朝議歸重告請却詹毗國象奏徙河東節度李業奏殺主奴議事上前讜切無回畏所宣宗謂有祖風然卒以剛正為令狐綯讒出鎮西川又見文宗裴休操守嚴正繼兒時講讀終年不出時不食饋鹿曰後何以為相請宰相各為政記今所在令長兼董漕至渭倉者百二十萬初漕四十萬而至者止十三萬立稅茶十二法收山澤寶治悉歸鹽鐵察乞建太子罷信秉政五年後歷四鎮不為皎行吏下畏能文章書楷遒媚數醖藉歌嗜浮屠不御酒肉之演繹萬言吹為樂當世嘲薄鄭明為相以鄭言為諫官不與輔相爭得失徙之詳見文宗崔慎由字敬止隙從之子丹端厚有父風名為相與蕭鄴有上餌渴躁欲赦無慎由請立太子上怒鄴乘是譛去之而引劉瑑終初仇士良使作廢文宗詔以死不敢承故子胤除宦官劉瑑仁宗五世孫書諫武宗罷力士成宣宗始復關龍裁處叢繁詔數十捉筆遽作大中刑律統類行鎮宣武大饗却倡舞以壯士習擊刺流不止夜上令擇日相之非崔慎由甄别品之説曰不循名責實使各稱職此王夷甫相晉病篤猶手疏陳政事名節自將議論處事於當乃止貴未嘗以言色借近夏侯孜與瑑同政蠻堂吏署制仆孜懷中死數日孜亦罷犯蜀追責其無素備􅀈相懿蔣伸宣宗雅愛每見必咨天下得失唐言爵賞易則人有覬心亂由是生弟楷補歷撰太宗實録號三世修國史蔣氏日歷韋澳貫之子元擢宏詞無方靜寡欲十年不肯調曰不謁高裕曰恐呈身御史周墀入相願公無權舅草詔事有不安遷延須見開陳可否尹京帝鄭光不輸賦逮繫之曰安可使畫一法獨行於貧下其太后為輸乃免豪右斂迹去宦官曰就擇有才智者與謀上謂下䇿答上欲以為户部判使不肯曰不為宰相所知恐人謂他岐而得上出之鎮河陽曰非我逺卿詔飾裝欲相之會帝崩之十道四方志為處分語王宰鎮河東破吐蕃王式有才略蠻晉州賑飢懿在安南南引去詳見宗石雄自陳黑山烏嶺之功求一鎮終老怏執政以李德裕所薦與神武統軍怏卒孔溫裕幾之子切討黨項連年無功諫坐貶孔溫業幾弟子點求補外白敏中曰我輩須自檢孔吏部不居朝廷矣盧鈞繼李業鎮河東以韋寅副雜虜遂安杖妄訴牙將張潛諫以審府羡餘為課績徐商有功五世孫備鎮河中綏定突厥殘種徙之山東凡千帳置征庫紙鎧矢不能洞鎮山南取材卒别為捕盜營捕山棚相懿宗鄭裔綽覃子不峭直有父風宗為諫議爭劉潼被責未久宜付廉察宣為追詔罷之給事中與鄭公輿封還楊漢公拜同州制書財不從賜宴又共白之漢公本以荆南貪李景讓王播以淮南錢十萬市朝廷權求鹽鐵極論不可遂知名母鄭不取墻陷錢浙西軍謀變母欲杖景讓遂定威進御史大夫劾侍御史孫玉女監察御史盧栯肅當朝上納羣臣名器中射取宰相景讓不得愧艴求去世謂除大夫百日而他官相者為辱臺或諫廉潔無素儲曰兒曹詎餓死者號和樂清素門無雜賔因世稱清德李公􅓯騙石李孫兒李珏鎮河陽罷橫賦見鎮淮南賑流民詳文宗栁仲郢尹河南尚寬德劍南尚嚴見執不與醫工官恤裕後詳武宗牛蔚僧孺子慰人意屢條切政失權幸意宣宗謂牛氏有子遁差嘗鎮山南黃巢亂山南吏民爭迎叢宰相請廣諫官宣宗曰張符趙璘牛叢使朕聞所未聞三人足矣為睦州上問怨宰相乎曰比詔不由刺史縣令不任近臣宰相以是擢臣非嫌也賜金紫曰刺史假緋即賜紫越等假素懦怯欲許南詔道見天子徽僧孺孫過典選杜請謁扶父病蜀盜稱孝子張濬伐太原引之不起濬果敗勿請聽辛茂貞討楊恭復果有功茂貞偃蹇勸討果敗崔胤忌其政致仕歸樊川李福宗室其兄石嘗思薦之儒上知黨項擾邊由邊帥利羊馬殺奪之擇臣治邊遂鎮銀夏以善政聞王拜相擊蜀蠻敗貶還僖宗時上鎮山南團鄉兵仙芝不敢入召相卒與周墀言其父母四方饋不入門終始完潔王鐸見僖宗劉鄴少依德裕幸至令狐綯去位申德裕寃世高其義附權人疑其鴆劉瞻相懿宗追僖宗不及不臣黃巢見殺趙隱父科約侍李絳不去同遇害兄隱廬墓十年闔門讀書不應辟召布衣與同耕不干姻宗以財他宦寖顯還家楊衣侍左右猶布衣時宴既輔政宰相及百官升堂慶母懿宗誕日慈恩侍母以安輿臨觀百官拜恩於廷回班候夫人起居後崔彥昭張濬當國皆踵其禮鎮浙西不與王郢衣糧至作亂掠二浙福建華子光逢光裔光胤皆第進士歷臺省劇諸臣王式起子畢因鄭注交守澄千宣宗時晉州飾郵傳器用給大歉活數人飢冦不敢入境以善最稱在安南罷嵗賦鎮復容管嵗貢外蕃亦入獻禽仇甫徐州盡殺亂軍劉凡章為禮部請諸生登第並青襟介幘謁先師五國子祭酒請羣臣輸光學錢治庠序宰相萬節度四萬刺史萬悔守東都汙巢賊偽官李溪不與尚書印更愧移檄起兵捍賊康承訓天德軍罷冗費市馬禦虜詔黨項還俘破與韋宙分鎮嶺南西道討南不利以大賊告受賞韋宙白宰相罷之劾龐勛亂淮南討之之二嵗乃平路南韋保衡其逗撓貪虜獲貶杜慆悰弟吾龎勛圍泗州處士辛讜勸出家屬以身守曰出百口求生衆心搖矣讜悅與之共難賊將李圎遣百人封府庫殺之圎攻城戰退之晝夜於催口援兵皆為圎所敗勢窮圎入城約降慆又斬之朱泚解圍去諭勛以祿山餘見辛讜鄭薰端徑蔭宣歙清力自將驕將逐之中却官人用階請子杜悰擬判度支辭擬丞又固辭沮愛友糾族百口廩不充求外遷幸侍之既老號所居隱岩稱七松處士忠義辛讜雲京孫時學詩書重然諾慆五十不肯仕慨然常有濟意龎勛攻杜泗州歸廣陵别妻子冒白刃從慆宋城危甚夜踰進馳二千里求救於郭厚又求淮南求兵浙西冒圍出入史凡十二年卒全泗州牛慆表授御癯短少耕待鬪折其角文藝薛逢持論鯁切以謀略自標與與劉瑑交忌瑑親近與相惡瑑當國出之楊收王鐸同牒署第忌收輔政訕之復見斥傲鐸為相又訾之故卒不見齒中外亦鄙其褊子廷圭不仕全忠事憲宗之政擢御史邊三部六蕃信恱太原盧鈞表為副史付行永州遇歉斥供刺用得錢九十萬市糧餉書判律并種樹治生法户給之州負險難轉建常平倉備飢罷冗員闕會錢使民自輸賦免吏督立罷貢零陵香探名先得者市牛學約婚禮置社禁擊鼓行盜高江西簡易南僖宗時南詔亂與駢分鎮嶺撫兵積備藩鎮魏博何𢎞敬同武宗鎮冀王元逵恭順襲子紹鼎紹鼎淫湎元貪暴子未幾死上以逵次襲紹懿政簡易慮龍張直方仲武子而舉動不法畏變起以張允伸總留事奔京師性暴多殺好弋獵洛陽飛鳥皆識之劫纍以罪貶貧不能自存迎黃巢既而謀巢報天子為巢所屠張允伸繼鎮二上書乞討龎勛不許時上米五十萬斛鹽萬斛佐用度懿宗以疾上節印懿宗事佛怠政逰宴賜豫所費不可勝計以樂工李可及為左威將軍淫刑南詔冦安南幾十年高駢平之邊帥相繼為虐復入冦龎勛之亂起於桂林之戍黃巢之冦本於徐方之餘中國首尾疲於奔命唐室之亡宦者蠧於內南詔擾於外裘甫亂浙東王式平之龎勛反破徐宿州康承訓討之以朱邪赤心帥衆自隨勛敗以赤心為節度賜姓名李國昌克用之父迎佛骨崩相杜審權元頴弟元絳子鎮清重有久居翰林不漏禁中一語在方祖事常處若對大賔稱小杜白敏中病不求退逐諫臣諡醜見相宣宗時畢誠失官為鹽估燃薪讀書母奪火為駕部沛然如處美官時謂倉駕曹為辱當黨項擾邊在翰旅答邊事宣宗喜頗牧在禁署遂鎮邠寧諭降黨項屯田省餉嵗收三十萬鎮河東冦不敢入為相以同列徇私不法稱病去位本傳稱獻姝麗結令狐綯求相後姝麗入後宫宣宗寵之尤長吏術俸養族杜悰中人楊公慶付官者請上監國奏請治當時大臣悰還之厚奉養詳見相武宗夏侯孜嘗相宣宗高薦王式平裘甫薦駢鎮嶺南楊收素之後士神童肉里人觀詩至壓敗其墻論母約第進乃食識涔陽古鐘與安涗琴論玉五聲旋宫為均均言韻也古無韻字兄以兄未仕不舉進士以兄外遷不肯內內補弟監寧御史史以詳禮舉段太常博士而弟嚴亦召為監察御論旗常當藏於寺藏太僕非是度支之懿宗袒之滿南蠻數侵擾募士三萬教射拒既貴稍盛女嫁裴坦子侈與中尉楊玄價敘宗族得相觀玄價干請不能盡從更短之凡五年罷宣歙察惟受刺史俸韋保衡劾其受贓帝再貶端州不敢乘大舟趍官子詔賜死作書謝丐嚴死奉先人祀嚴子涉凝式曹雄遂儒術器識方重動循法度俱相六年諫用優人李可及與畢誠有雅望蕭置復之孫史無傳路岩父羣性志純潔遇之循循謙飾親歿終身不食肉奢文宗優岩為相八年賂遺肆號先親何旁與韋保衡同當國勢動天下出共劾康承訓助逐劉瞻既而爭權復相惡鎮西川都人懷瓦礫擲之吏邉戌卒坐貶死控扼拊循八國來不出任親自崔鉉幕為御史長安十年至退韋保衡尚主最有寵路再期拜相浮淺恃恩于斥蕭遘逐楊牧傾岩人益畏之貶琮王鐸其僖宗時怨家發隂罪貶死高璩元裕子省交遊醜賊進取多蹊璩相僅閲月學生超郎者惟鄭皓以尚主以寵升徐商宣宗時討平湖南亂軍中鎮山南以盜多置捕盜將鎮河定突厥于琮落魄黃尚宣宗主不保衡貶之巢脅為相從遇害劉瞻為相時帝以同昌公主死殺醫士二十餘人繫其親族諫官無肯言獨與京尹溫璋力諫再貶歡州莫不痛惜卒其還人率錢為兒戲以迎瞻避之再相三月謙約俸餘濟親舊窮窶無第舍李頻睦州人女與里人方干善䇿以詩求品於姚合後妻以武功令殺神庫士有六門堰者廞廢百五十年方嵗飢發官廩庸民浚渠溉治遂大稔懿宗擢侍御史守法不阿建州以禮法治下時盜賊相效建得頻獨安隱逸陸龜蒙字魯望明春秋元方七世孫中高放州通六經尤一舉進士不從湖刺安張摶拂嘗至饒州三日無所詣刺史蔡京率官屬就見衣去居松江甫里多所論撰憂貧不少輟得書熟讀讎比朱墨不去手所藏雖小皆精可傳借書必為輯褫刋正樂講學田數百􅒪多苦雨潦故常苦飢其身畚鍤里嗜茶置園顧渚山下自判品第助好者百致水張受新為水説馬病酒不復飲茶不交流俗雖造門不見升舟束書竈鈞具時謂江湖散人不乘天隨子甫里先生鬱以高士召不至為召拜拾遺已卒逺祖績自林歸舟輕取石重召當龜門隱逸魏博何𢎞敬子全皥平龎勛加平章殺母喪願納節不許年少好衆叛推韓君雄留後高殺全皥年自進滔凡三世四十二韓君雄鎮冀王景崇紹意病篤屬以禮鄰藩奉朝廷則家業不墜助五師平龎勛居喪哀親屬不得與政相斬巢賊使檄諸道發兵入關貢翰踵語及宗廟流涕盧龍張允伸勸儉下所安賴推未嘗有邊鄙虞茂病上節印軍中張公素留後李勳襲之李茂勳本回鶻降張仲武病表子可舉代古今紀要卷十四
