body:
  text: 古今紀要卷十九宋黄震撰宋朝神宗司馬光為御史元年趙抃入諌院二年冨弼繼韓琦為相三年久旱罷上夀六年不受尊號温公請試士以䇿廣親親以睦九族尊經術以作人才㢮力役以便民通貨財以阜國時歛散以補助修保伍以防患興水利以厚農分南北以侑祖考酌六典以正百辟制九軍以攘四夷然王安石負之天下由此多事初曽公亮欲用安石張方平極論不可元年温公亦斥安石理財之説二年三年而安石為相創制置三司條例司為青苗助役水利均輸之法温公以力争出趙抃以力争出范鎭以力辨出吕公著以力争出孔文仲對䇿以言新法黜韓琦相州四䟽辨新法冨弼亳州不行新法罷嵬名山欲以横山攻諒祚司馬公諌不從西方用兵始此王韶開洮河章惇開梅山廖恩叛于南劒乞弟反瀘州李乾徳亂交趾皇子佾成王僅惠王俊唐王伸褒王僴冀王哲宗价豫王倜徐王佖吴王偉燕王似楚王徽宗偲越王欽聖憲肅皇后向氏敏中孫通哲宗立尊為皇太后向閲實録知故事不以恩遷氏官哲宗選后及諸王擇婦戒其族勿以女言而宣仁太皇太后請后居慶夀宫曰豈有婦居東姑處西故哲宗崩章惇有異議后決䇿立徽宗臨制凡事御正殿避家諱立誕節皆不用每聞褒賢省賦息兵愛民之事則喜見顔色是歳手書還政夀五十六欽成皇后朱氏本姓崔太生哲宗哲宗即位尊為皇太妃皇太后令依皇議制追尊太皇后欽慈皇后陳氏生徽宗追尊閣顯謨樂大明陵永裕配享韓國文忠公冨弼䇿士許安世時葉祖治初試䇿余中徐鐸彦黄裳焦蹈相韓琦為英宗山陵使即辭位判相州至和八年在未㡬經畧陜西復知相州詣闕宣言治本辨邪正法荅上安石翰林有餘詳四䟽辨青苗熈寕八年薨見英宗曾公亮與韓公恊心輔政薨精法令典故進安石三年詳見仁宗冨弼英宗時不滿於韓琦以疾辭位判河陽令與入坐語願二十年不言兵遂拜相神宗上數千言辨灾異天數之説章久旱乞罷上夀以示敵使即日雨安石用十求去上問誰可代薦文彦慱上嘿然上問安石如何弼亦嘿然知亳州不行青苗被劾歸洛飬疾朝廷大利害無不言良封時政之失付子以待上問辨君子小人言温寛厚及臨大節慷慨莫屈疑憂者一二裁處衣薦王質余靖石介孫復陳襄杜杞等年㣲官布皆與抗禮守口如瓶致仕十餘深居謝客佛俸劵還府府受之為老學吕大臨訾之治家嚴整魏善潞公善段希元升平立排恩法簾怨韓琦魏公言不當起復書恠魏公不關報徹事力求去終身不荅魏公絶歐公死亦不弔天素善王安石至亂下方知紹庭守家法為時所稱中以父子争青苗靖國辭提舉直柔陳升之安石變法引與共事言同領條例司陽為不與天下稱賢相亦嘗事持論不堅餘見仁宗韓絳子華則甲科法請誅冷清偽皇子塔安撫江南為五衙前劾李仲昌開六竄之仁宗遣祈嗣請出宫女定宦者飬子法論劾孫沔吕溱犯法發宫人伶人笑語事極前後所言事冨公所抑者三論冨公用張茂實主兵之非遂見黜知成都年一易塩米劵奏禁約奉使内臣貿易三奏改三司吏求恩澤之詔弊請賜予有例者付司以格合同慿由支取之並英宗役對神宗求遺利莫若盡地力因䟽害農莫甚差三司時議官戸出免役錢後荆公推為衙前之法宣請以樞副授司馬光為相又薦之大入撫陜西河東有功召相熈寕二年夏羌又繼荆公相始置藉稽天下財用出入七年事以言不盡行一年三求去争市易官罪曰小弗伸况大事患卒稱疾辭位八年中河南救水災又築堤備後裕陵時不擾日一出六條駁温公用熈寕役法絳元議止募衛前其後求嬴餘王嚴重好禮陜西薦吕大防范純仁為判官舉安國辭章程頥經行王安石小官不急仕進召深結韓吕司馬官文彦􅀶薦恬退至和試辭郡牧判辭就職求外補常州故名重天下於嘉祐除館職三司判官命修起居注避勅厠自除制誥不復辭然仁宗惡其詐不用知立英宗有異議不敢求用名益盛曽公亮其怨韓琦力薦於神宗强起之參荅唐太宗不足道諸葛魏徴有道所羞未㡬遂大政三年相荅上經術正以經世務乞以先王正道變流俗足恤遂作新法青苗謂天變不足畏人言不市易保甲保馬導洛增免役額設制置三司條例司用増價買坊場茶塩毁斥韓冨諸賢王韶䇿取熈河開邉而天下騷然矣擢上不肯深罪不附新法者即托疾歸强起之遂章惇趙子㡬上欲罷陜西折二錢又托疾遂薦吕恵卿而力求去位七年惠卿一反其所為上再召用公八年惠卿之徒既逐於是門下無與共圖事者位起華亭詔獄惠卿中公子雱雱憤死而公再失九年右出處大槩石上問何不用朱柬之監左藏事上以外事問安安石問上所從得安石以宻問上上亦問所從得此因戶馬事嘆朕愧文彦􅀶又曰安石相誤不獨一事選河之㨗詔王韶今後只招降其後永樂之敗當朝慟哭自此致疾圖右神宗察奸與悔悟處不飲包拯酒虎行毁魏公在揚州時怨之鄞不詣殿謝放罪貸盡食釣餌不取漢文帝縣二日一治事糓嚴保伍是孫華老李公擇乞如唐諌官隨宰相入閣公曰益兩參政敵使蕭禧求代北捐五百里與之官喫魚􅅅飯除人不得下殿便去相時學時文時新經字説與温公平生善至議新法方不合論劉元城八字斷之曰虚名實行强辨堅志又其罪在啓僥倖路温公稱其執拗言計新法終始不可行者温公言可行者曽布科永樂事之非者内惟吕公著外惟趙卨改舉自嘆不料變秀才為學究可聞朝廷變其法不以為意惟役法則自以為不罷賜金進蒋山寺之雇役温公改為章子厚復為雇麗皆蔡京賛開邉王韶取熈河結高圖大遼章惇取湖北䕫峽蠻靈劉彛虎起郭逵趙卨窺交趾瘴死十五路取武夏大决黄河死者數十萬餘餘吕惠卿薦徐僖築永樂夏人破之死者十萬後蔡京童貫等用兵皆自此而始安國平甫為正直有文授惡吕惠卿請逺佞人論常非兄所西京教歸上問其兄秉政物如何曰聚歛太急知人不明刻荅三代後無如文帝加有才一等王猛教主薄力諌其兄不聼哭影堂曰吾家滅門矣合責曽布誤丞相變法毁勁直寡合與兄議論不異時言事者以為非其兄亦見逐好聲色作序言子斿安禮和甫言嘗為右丞氣豪玩物不可殺蘇軾彗出言射利致變謹尹京稱治事至輙斷潤常以經綸自任而濶畧細元豊時以在湖與娼共飲罷貪又以罷雱元澤勸險惡誅荆公不近人情事皆所教安石不用命大臣梟韓冨首啇惠卿奴事之發宰租子為從官無謂君豪傑疽卒年三十三子王珪禹玉並成都改進士第二祠郊以太祖專配諌三后配温成廟為置祝敔去節鼓稱草立英宗詔寕請以仁宗配明堂禮議濮王當皇伯賛熈元年郊祀從王制九年拜相大三薦張璪不行求去比諌以内侍李憲主兵畧隨時俯仰與蔡確而沮温公確教之收復靈武以固位死者十餘萬吳充中卿作淮闕六育之弟陽為吴王宫教獨以嚴見憚宗室箴歐修以私胡宿子見出乞與同貶岷止張貴妃隆禮圭瓉安請使王韶招木征自守洮在西府數言王石政事非是乞為相務静九年拜蘇隂欲更新法之不便者常還司馬光吕公著頌韓維又薦孫覺李程頥等王珪忌之祐三年内行修飭惡諌院蔡確以疾辭位元確每羅織其官屬親戚蔡確持正䑓泉州鞠為開封廵官不庭參石神宗以此擢官王韶盗貸官錢希安㫖罪奏之者期附攘熊本制誥丞言沈括見吴充論免役為攘鄧潤甫中攘元絳參政皆以起獄奪之元冨弼嘗上言確小人不宜大用獄豊五年相遷邢恕著作遂為黨既相屢興恕勸廢廷安正哲宗獨與京惇謀會王珪上前奏立哲宗遂不果坐弟􅂍出吴處厚奏其安州詩譏訕臺諌傅堯俞朱光庭梁燾祖禹安世論確惇履恕奸惡確貶死新州惇相復其官黄履為中丞盡追復恩數宣蔡京以配享哲宗以其子懋為和樞宻貴震當世參政歐陽修趙槩並見仁宗吳奎詳見仁宗知為參政争王陶劾韓琦䟦扈為摧辱大臣出青州温公為之留行又言安石自用䕶前所為用之必亂紀綱曽公亮熒惑聖聼遂復知青州卒少貧晩貴我莊周親家無餘財宅子無居張方平安道院宋城昊擢茂才又中賢良而仁宗召知諫元求釁獨公勸姑忍修備與吴育議合不行赦既用兵上平戎十䇿不行刺後用兵無功卒請書開諭而元昊降力争弓箭手為宣毅軍西言夏竦總帥長安而諸路失律乞責竦而使陜四路各任其事契丹乞討元昊公請荅元昊詔嫌隙朝除則封冊暮行奏鎮益州察儂賊在南詔之妄歸弓手止築城罷蜀賦四十萬減鑄鐡錢十萬公使吴育日致餽而勿問敵使蕭禧偃蹇不行言宋與契丹八十一戰惟張齊賢太原一勝和戰孰便用知舉檄出安石言安石言偽而辨行偽而堅必亂天下諌鬻祠廟辭諌罷銅禁新諌征安南執諌易汴渠陳州陛亦極論法止陳中尊異張貴妃夏竦倡此議以衛士入官為變妃有功諌王拱辰河北再榷塩諌厚塟諌錫賚過厚尹京黙記數百人無遺忘太上漕運十四䇿京師遂有五年蓄陳州毁張尉廟立趙犫祠召草制立神宗科書一覧終身不忘竒慷慨有氣節而論自設六上始議國政漸為論動揺朝廷私説盛朝廷輕為墓誌載叱昌朝約公代吴育參政日録載方平中丞專附昌朝又載秦州偹祚亮或議其輕舉温公有狀論其姦險貪畏秦州貴倨不通下情無素備又載辭代吴奎參政温公奏其奸貪吕公著亦言之温公由此罷臺職東一見蘇氏父子待國士薦東坡為諌官坡為作墓誌樂全集趙抃閲道曽衢州未免偽造印者死赦前不用史廬墓公亮識之薦為臺官鐡靣御劾劉沆為相董温成葬外劾宰相陳執中不學無術留歐陽修賈黯乞一時名臣頼以安出知陸州免杭州市羊蠲茶税劾移漕蜀變州郡饋餉厨傳之俗仁宗召司諌樞宻宋庠選武臣不如法又與唐介吕誨范師道劾陳升之交宦官章二十上二人去位而公與言者亦罷知處州簡易令諸縣自任事獄屢空府造百舟載廣中歸䘮漕河北按賈昌朝大名庫督河北招募寛官吏當免者八百餘人知知成都匹馬入蜀琴鶴自隨並仁宗神宗召諌院薦吕誨傳堯俞范純仁吕大防馬黙骨鯁乞復召不參政折安石臯䕫讀何書不肯短范鎮荅安石敢以私害公去臺諌侍從多以安石去公亦言財利事小即求知杭青二州杭州治為惡者以嚴青州因其俗治以清浄帯蝗退飛青州以戍卒難制再知成都并琴鶴不止坐李忠孝私造符牒之罪以安逆黨修又知越賑饑修城任增米價遷杭州賑饑不肯城曰民未可勞政豈弟不嚴而肅謹有告老六年産凡四入朝皆為臺諌治成都嚴聲不治嫁孤葬䘮清謹晚年學飬氣術四韓琦稱世人標表長焚香告日間所為事年十九號知非子厚誠實不見喜愠子汎亦篤行君子御史論事知治體唐介仁宗時劾張堯佐文彦􅀶被貶進奏韓絳中傷冨公叅政於法度更改近臣退尤謹言安石今古議論迂濶為政必擾天下疽安石既參政諸賢皆引去介與争論不勝憤病卒時趙抃力不能勝安石惟自聲苦時稱生介甫老明仲病彦國死介若抃斥安石馮道屈身要入之説語諸子不栽桃李荆棘甚多屬以修身持門戸幸初孫抃薦介曰吾豈求識靣臺官居政府不遇安石聲名減於諌官御史時馮京當世軍鄂州父三元一父式顯將作監承通判荆南府事没十年而驗冨弼其婦翁誣尹京三月不詣韓琦都與王安石争新法言者其交鄭俠罷知成夷人願世為漢藩致仕卒七十四謚文簡子辭張堯佐昬士薦种諤官南宫成之嫁同年進妻吕惠卿吉甫䧟泉州者新法皆惠卿發之再既執政凡可安石無不為之安石相鄧綰論惠卿罷之惠卿訟安石極詆其罪莊發安石私書蘇轍當哲宗時論罷之子觧元絳厚之軍食杭州祖論塩非群販止笞石給廣東定僖為始祖謟事安無特操章惇子厚條例泰州門顯仙遊潭璧南山官熈寕編修元豊下封印元祐諌蘇軾䟽罷之肆哲宗親政召拜左僕射兼門下侍郎引蔡卞大羅織竄元祐諸賢結中官郝隨為助欲追廢宣仁太后所立勸廢之復開邉關中大困門以孟后宣仁大惇小惇入地無小惇安惇也異欽聖立徽宗惇又議雷州無所居張璪遂明鄭洎之孫仁附王吕成弊法劾俠宣臨朝蘇軾劾之左丞蒲宗孟傳正黨閬州才學士佩魚之始滛謂温公以朋壊人治鄆慘酷侈無度王安禮見安石類右丞李清臣見哲宗樞使文彦􅀶時年九十見仁宗吕公弼夷簡子許成都營卒杖而後斬從英宗任藩易馬不諌止神宗肉刑孫好問竊奏藁示安石遂自西府罷副使邵亢興宗易潤州者英宗自翊善除為諌官已為人樂有長之譽然在西府充位而蔡挺子正議應天慟兄抗子直甲科諌濮上崩卒挺亦進士英宗故人切冨公以從北使簡久范公辟使通判涇州乃語其機事泄於夷留邉有應念玉關人老之句神宗召用王韶子純五江州西上神宗平戎䇿殺開熈河州東千里好兵喜孫固和父法鄭州出論安石少容四問四以此對無議新不合元豊位西府力諌西征果功位言李憲失期當斬引疾去夀七十五謚温靖吕公著晦叔仕夷簡子敞歐公薦作諌官介甫同被薦頴時劉王回與相從故歐公知之五辭試館職不奉詔進所業稱辭知制誥妃為郡鼓閲案不為漕司賣乳香疾辭張貴䘮引輴英與温公同定學制不行二精講説與温公同待宗經筵乞復仁宗開講月至重午八月至重陽學祭酒薦舉學官博士請程頥為大學正史以直士闕輅諌稱濮王皇伯祖力争御吕誨六人之升亦出蔡州以神宗首召公與温公為學士朝論翕然温公言事罷公封還其詔貴經筵講尚書戒黷武號開封争覆奏龍鳯首飾近憚之御史諌尊諌開邉薦張載知舉乞廷試用䇿居辨青苗出頴州徃彗出言用人賢否無定論洛與康節温公來康節責引薦介甫公與君實朝安石既敗復起知河陽寛下戸役錢河陽入士民相慶乞叙用正人用止韓絳王珪肉刑之議中辨李定劾程頥曹佾中書令因諷用王正宋用臣之失諌諌西方用兵確永樂之敗上謂惟公著言之經改官制王珪蔡為僕射遂力求知定州當武事時請罷胄戰獨折陸中市絲築倉事囚築州城三靣改楊州勤聼覧諭理官係重置酒召還付以哲宗哲宗即位侍經筵上十議餘見相哲宗知院韓縝玉汝持進士薛仁宗時請武臣持服永言孫抃保身禄言向不當賜章服言劉年不當以外戚除防禦言内侍史志聰私役皇城宗元豊八年相與蔡確同政惡確等誣罔於哲簾前具陳奸狀相諌用高遵惠張進韓宗文是君臣各私其親未朞年諌官孫覺劉摯等論其心險才鄙望輕奉使棄地七百里章十上遂出蕭禧求代北地時為報聘外莊重所至稱嚴秦州語寕逹乳虎而出將入相無功烈厚自奉飬同知薛向師正采弊京兆精鋭鄜州永安擅還之軍財河北陜西八年課最商無遺安燾見哲宗平心行新法簽書曾孝寛公綽孟都承㫖用文臣之始公知鄆州請子封爵西府迎飬亮范鎭景仁唱成都出薛奎守蜀得偉人霓禮部第一廷獨不自陳召試以彩字校勘四年不遷為龎籍薦直秘閣賦十七經制而儲其三請約官吏兵中制定乞中書樞宻通知兵財三司同制國用相請詰温成稱園陵及罷焚錦綉珠玊文冨入請罷郊迎而除謁禁議減任子相乞宗室踈者補外官嘗論陳執中無學術非宰器及御史劾其答殺婢則言閨門之私非所責宰相嘗首乞仁宗擇賢宗室章十九上鬚髮為白而未語人後雖能言亦無歳不論儲嗣事星變上言於享獻賦歳率禮官言濮議之非卿陳州出粟貸饑不及奏大稔論青苗與惠争争封還駮争新法之詔仕孔文仲以論新法罷公之不得卒五䟽乞致蘇軾賀身退名重荅曰天下受其害而吾享其名詔退閑游適七乞遷禧祖上太祖東向位元祐起之辭曰十九而復來豈云中禮求家居造樂以獻下李照一律逾年樂成而薨兄遺腹子奏之官清明坦夷端决大議色和語壯欲繼以死豊口不道申韓異五入翰林四知貢舉熈間論賢者必君實景仁子君實稱吾與景仁兄弟平契丹稱長嘯公猶百禄制科刑部兩反從孫祖禹劉敞原父棄臨江州甲科夏諌以中貴人參議大樂請占渭駮竦諡文正諌立温成忌生不附陳升之諌上自用公知制誥禮事出吴充馮京以言事奪職諌因罰勸上覧威權詞諌許蔡襄等補外道封還宦者石全彬觀察使頭使契丹知徑問松亭至柳河甚近之言駮之形聲雷請出樞宻狄青後青出而彗没揚州寛簡判塘還民耕種鄆州不數日淹訟皆盡境内正清盗賊屏息路不拾遺再入境得雨蝗遂出境請依舊典讓官者止時讓官不失利而名益高諌尊號忤冨弼拜官未嘗讓惟辭侍讀諌議請毁龍昌期著書板本追奪恩賞傳經著書毁周公雜佛説家長安窮治大姓范偉冐范祚黄勅横行賙族無餘資􅀶學俊偉一揮九制自無所不通觀填星知生公主前觀歳星知英宗齊州入繼大統收古器得代制度俞平生不為人書惟書程丞相墓碑以賻梅聖書江隣幾碑晦翁載之言行録攽戅父州兄同登息止坐講争小畜字非嫌名被劾曹以寛平盗慱學守道以故困躓不修威儀喜諧謔自比劉向奉世仲馮元敞子籍位至僉書入祐黨坐貶吕誨獻可劾端之孫開㓜孤力學英侍御史彈劾無避公主夜禁門許見宗十七章論新除樞使陳升之卒與俱罷州争濮議章十四上乞罪執政納𠡠告力求出蘄以强直再知諌以力言王安石叅政十罪必誤天下温公止之不可出鄧州前後三為御史三逐皆忤大臣不去不已與奏藁二百八十九事鄧州乞致仕歸洛病卧常温公康節言天下既死復張目勉温公天下事尚可為屬温公銘墓家貧分俸司馬光君實守陜州皆父任通七歳通春秋大義五龎籍鄆并辟為判畫麟州河西䇿籍以此去公終身報之知修起居注麥諌賀日食不見請還交趾麟諌院諌允言鹵簿公諌夏竦謚文正繼胡宿以蘇轍䇿直言不敢取言於上取之范鎮後乞建儲諌召公主出李瑋妃給鹵簿辭制誥至八九仍知諌院諌封妃三代右仁宗時諌謚董上英宗立疏分别在朝賢否待覆奏諌濮議調䕶兩宫賜乞太后取用不辭仁宗遺金珠直百萬諌曹佾使相勇因任守忠遷官論其奸貶之結辨韓琦陜西義民兵論王廣淵仁宗時私陛下非忠臣宗諌選將代李中祐因論趙滋生事之非右英時神宗首擢翰林學士以不能四六力辭路除御史待宰相押班就職内争貶王陶恐絶言陶論宰相不押班乞竄臣高居簡班乞出王中正參論中官張茂則未五十不可押論張方平政奸貪修心三要仁明武治國二要官賞罰山資治通鍳請閤門祗候不可用厮役諫嵬名取諒祚之後費六十萬西方用兵始此䇿引漢文帝諌尊號升薦吕誨諌官不用宋昌言偹二股河言陳之有才智恐能臨大節不可奪遂論冨弼老成人望可借其去論韓琦所短在非河南留司引蔡天申立本班顥永興上章言先見不如吕誨公直不如純仁程敢言不如蘇軾文仲勇决不如范鎮右神宗時宗與安石争不加賦用足之説法進講曹叅言祖法不可變辨惠卿象魏布非變法事辨條例司胥吏足矣陛辨青苗與言安石不曉而愎又信任惠卿下豈能安石惠卿韓絳三人共天下不言吕公著罪在舉條例人為臺官不罷青苗受樞副韓琦勸之曰官爵壊了名節許料惠卿覆主興言王安石誣蘇軾役忤安石乞州出知永乞免一路青苗助又免一路修城募兵言移許州不赴絶口不言事甲熈寕七年旱蝗求陳青苗免役市易邉事保水利六事又以責宰相吴充以居洛十五年相上欲用之王珪蔡確用兵西邉間之宣仁之盡除新法詳見哲宗惡右争新法主孝友恭儉正直出天性􅀶學釋老平事無不可對人言者危記録客語坐自謂己如人參甘草又念天下安即朝服起康節稱脚蹈實地稱九分人曰程頥薦常在人主左右自可無過不善者君實得無知之京師刻像印鬻有畵工致冨物契丹問司馬中丞今為何官國敵中伶人戱玃者為司馬端明遼人謂中相司馬數百姓巷哭徳會葬萬右實感動范純仁堯夫答文正次子編校冨貴有命文正卒始仕桑辭秘閣令襄城課農新祠宇學校濮放縱馬民田衛士久旱藉客舟運米言侍御史議主王珪如期親故事諌開邉變法人心不寕出指切荆公詞氣甚厲新却執政起知制誥之諭河中漕城都論奏法約州郡不得遽行無慶州賑饑發常平粟不待報至朝廷疑貸粟實民争輸官詔使以藂塜誣之种古訟公公徃就對郡人數萬遮道宋齊州盡釋囚犯法者减半舊皆囚之使斃直儋年鱉䏑中毒之事餘與温公為真率㑹見哲宗劉摯莘老歸渤海毋元絳薦之安石論除御史欣然就職趣裝為安居計首亳州獄傾冨弼程昉開漳河人不堪命趙子㡬等急役錢希賞答上不識安石勸農之意變為煩擾均役之意倚為聚歛言助役十害安石以十難詰之公復極言新法遂罷御史將竄之嶺外上不聼貶衡州監倉平見賣閼伯廟㣲子廟啓張方上書言之餘見哲宗陳襄述古與福州周有學行穆喜薦逹鳴政多慕古陳烈希孟鄭獨以道號四先生弟浦城簿吏民畏愛圖像事之教民於庠教以孝不為大臣而䘮調民丁模鍾辨盗宰仙居正歳讀勸學篇化民就學償宰河陽治齋教邑子學雖被謗講説不懈已俸官櫝失錢教種糯以免酒材破家之苦州判祠部不度僧道不行權貴乞寺院名額常建學講授盛於二浙以積錢代償官逋以浚運渠削望亭古堰而震澤水得入江神宗知諌院薦常秩陳烈管師常程頥經行諌新辭超知制誥誥亦以法不行不就論新法院召試知制直舎人侍講修起居注皆以言事不職辭祠乞罷青苗斥安石惠卿謝天下以赦文有奉紫宫有俗忌罷之杭州修相國六井人陳州修八字溝渫城中水以官舎廣學講中庸知務學奏犀瓦水文得體生平講求萬民利害無不精宻曲盡聖先師四字寛厚而臨事不可犯臨終書先冨丞相當國為上客其以道徳教育英才為任出門者無慮千人曾鞏子固錢南豊萬通判越諭冨人自實粟數捄荒出粟五貸種粮齊州初屬民為保伍盗發輒得葛友自首公尊顯之以携貳其徒渡推行新法有方民用不擾浚河寛役夫省錢而為橋徙傳舎軍洪州遇疫所在儲藥及飲食衣衾為安南過萬人備兵過而市里不知福州使僧自推舉籍其名以次補主首强廢二寺罷鬻蔬曰無與民争利為州急奸寛貧弱嚴期限所至省文移數卜倍聼縣自言限而責以應期不遣人至縣庭無留事十餘年歴六州素不附權貴然善防患莫能中傷義典五朝史事更官制告詞日至數十詞約盡言安石吝聖改過場宰山隂賤市民田陵及第時鄉人作感恩道依漕陵縣依州縣或云不奔䘮肈禮院釐正禮文五議祀地祗北郊明堂配食編帝詳見哲宗蘇軾歐陽公知貢舉寘公第二大制䇿三等授召試復三等韓魏公期以逺器不肯便制誥以累之論吕惠卿忌其才間之介甫議又廷試䇿萬言書事甚危介甫愈不悦因科舉言上求治太急聼言太廣進人太驟益介甫遂使攝開封推官困之公决斷精敏聲聞逺諌市燈䇿問譏專任介甫弟轍又辭條例司皆不得試館職范景仁薦為諌官謝景温為謗語力排之温公亦薦軾與文仲能犯安石虎狼之怒臣所不如出倅杭值行新法因法以便民易高麗書宻州駮司農寺手實法率不視告悍卒欲亂狀誣河决徐州城將敗徒歩禁軍築長堤李定以訕上自湖州逮赴御史獄慈聖救之得謫黄州築室東坡上思之欲命之成國史蔡確王珪止之遂移汝州駕願就常州上方報可會晏餘見哲宗轍十九進士宰二十三舉直言相寘之下第成為條例司屬官諌介甫青苗非便後王廣㢘賛之見陳晹叔言遣八使求四方利害介甫出為河南府推官哲宗除司諫見哲宗韓維持國退以父忠獻任執政不就廷試以静薦召試不赴諌温成廟樂文彦愽駮陳執中謚恭諌弓靴以名儒厚徳選事神宗潜邸諌拜急罪論人主不可有功名心争因濮議吕誨等公又争誨等降出不由門下封駮旨有旨舉臺官舉吕誨純仁諌因批答不稱出范鎮事神宗立陳三事從權聼政䟦禮執政士行有司失體中丞王陶論韓琦扈遷學乞明别是非汝争吴奎以還王陶詞頭罷知青州以亦力求出州論禧祖廟不當與稷契等元絳兼條例司辭御史中丞賢遂知開封分置八廂輦轂肅清争孔文仲以良方正罷亦求外知襄州求久旱極言青苗上悟令權住方田保甲使草詔言是夕大雨上又命與孫永吕嘉問同體問諸行利害以上信任不專力求去入相求知河陽議免役錢不合落職㑹兄絳曽鞏草制稱公純明亮直上送中書改其辭鞏贖銅而公宫觀哲宗立太后手詔勞問對以治道乞審人情馬應詔言六事青苗西免役兵功場夏市易保錢幣出関諌方用還西故地進讀真宗不忍死罪及殺羔事因諌用兵簾前抗議臣僚不得言先朝事之詔言經義當與先儒説並行踰力争梁惟簡押班元四朝舊臣身任天下相不年天下惜之坐祐黨安置八十三傅堯俞欽之不鄆州仁未冠登第登第後石介見之未嘗在宗時御史諌官四年百六十餘章風節凛然殺諌出駙馬李瑋請請出皇城司卒鞠鄆告冨人人請建儲厚皇子供饋即英宗劾英宗㝡眷遇頴劾内侍朱士頴以内降監汳口都水監薦士劾趙繼寵勾當天章閣蔡天寕取内藏珠權倖憚之非言不當以乏用求冨國水災言審刑大理之請太后還政劾任守忠蔡請神宗出館親諸務愚勸上總覧四不奉旨劾襄諌以内侍李若等為陜西路鈐轄安與吕誨等争濮議誨等罷亦五䟽求出利州石許以諌議公言但與新法相妨遂權發遣塩鐵使陽再歳易五部未㡬落職奪官處之自如監黎倉草場治事不少懈哲宗除中丞擿自任拾遺補缺明善正失舉直錯枉若窺人私細故非臣志與王岩叟七章争張舜民以語及大臣見罷遂力求陳州大復為中丞乞寛蔡確餘黨中書侍郎論事由公薦引多吉人太后稱清直一節終始不見兩宫皆幸其第哭之温公康節皆稱其清直勇奉養薄孝友任子恩與兄弟錢為守令豈弟而能擊奸時徐州代償前守侵用斥居外不言及御史事元祐黨彭汝礪器質其鄱陽善進士第一史在選十年論安石得詩義之除御非唐虞不上十䇿及青苗事出妻拜王中正言吕嘉問市易聚歛姻劾俞充因宗室賣壻乞著婿法論陜西用兵不當付王中正李憲士今日不患無將順之臣元祐初答執政更取差役法未見其可執因論吕嘉問與蔡確異趣及治嘉問獄則不阿政擠之至蔡確貶新州又力争其不當與執政争貸命獄夫方修熈豊之政人争獻所聞公獨不言曰今則人能言矣遺表言土地已有餘財用非不饒急為監司務大體與議獄多全宥所至惠愛尤興學官兄子其弟寡合劉恕道原節筠州官父渙字凝之有髙志為頴上令不屈事上棄官家廬山歐陽公為賦廬山髙試恕書過目成誦一四歳對孔子有兄弟使十八經義説書皆第熟前世史温公同修通鍳温不肯為三司條例司靣陳新法不便與安石絶公知永興亦乞南康酒税歸嗜學不知飲食之讀道旁碑記列將行事司見宋次道抄書目為翳以直困窮不受馬公衣襪不信佛賜聞談新經必怒曰此人口出妖言監通監已卒其子羲仲官年四十七官至秘李常公擇薦南康論楊佐薦以改秩常推其友劉琦佐并之青苗罷知齊州得黠盗刺為兵使在麾下詢知冨家為囊槖於是發屋破柱而奸無所匿少讀書廬山五老峯白石菴僧舎後藏書萬卷山中時目為李氏藏書山房孫覺莘老知高郵苗出廣徳諌官無降秩充位湖州築松江石堤不體量青知福州制䘮葬不得過百緡秋入元祐黨文集奏議春傳弟覧𫝊師叛知尉氏縣喻將之卒治邉數有功良精吏事所至善得職鮮于侁子駿東閬州子定利路役錢止二十萬得温公謂坡曰駿福星也且救京東安百子駿布之天下乎坡元祐為諌官黨長於楚詞作九誦東謂近古入籍馬黙處厚島單州溢歐陽濮議郭遵僉書皆論列黙沙門舊制額則投之海中歳投七百人知登州改定法二十條年深無過徙登州自是全活者衆論新法不便出元祐為農卿議河決小吴聼其北流便八十一孔文仲舉賢良極論新法朱光庭止再舉安南師吕陶舉制科論新法出張舜民邠縣論新法豊稷監察御史論王安禮並見哲宗李師中誠之門應天先知洛州民有罪者農時遣歸于租賦期至徙戎人極邉知發政改保安軍牒節與王韶争議秦州遂務在安静有氣乞召温公東坡貶劉庠希道又彭城士父顔講授著書官蔡齊妻庠奏補之舉進英宗以為諌多直言乞罷新法惜知太原料敵張形示强宣仁其死云帥臣難得楊繪元素之漢州乞曾公亮以曾鞏為史官繒乞正招權罪罷青苗復春秋三傳止孔子帝號之議文吏事敏給為立就劉述孝叔聴吴興人後論安石為政謀殺首律貶知江州卒争劉琦公玊宣州錢顗安道公常州監皆以力攻安石并劾亮貶當顗罵孫昌齡陳薦彦升言邢州論請正薛首開横山之罪淡論以言逐官李定不持所生䘮簡質直韓司馬皆服之孫永曼叔引歸趙郡役繫趙丹而喻敵議免錢罷主差役趙瞻大觀府鳳州河争濮議出棄對青苗出者位西止還乞廢渠陽西鄙長祐滕元發逹道西夏初名甫位東陽争進士第三分諌掠秉常失諸將權使經營裂之神宗竒其䇿不果用若論事如家人上乞罷新法言者不已談笑自曰天知吾直知吾忠且自訟曰樂羊無功謗書滿篋即墨何罪毁言日聞治太原威行西北流民至召冨民一夕為屋二千五百間盖活五萬人謚章敏夀七十一熊本伯通梓饒州夷知建徳縣去弃圭田與貧民貟察訪䕫諸風靡省熈河官百四十歳無浮費數十萬洞降木斗建南平軍集宜州賜宿桑八嶺表遂安有文奏議沈起興宗用鄞縣縣父疾委官年叙立令考課法建議情可矜者限設河渠司付子弟宿衛選賢良給事宫省慶漕湖南計實取財貨省十六七而民不擾平州亂使契丹不與西夏班之不從蘇緘保甲通互市議制交人入冦劉彛執中例福州官令朐山惠民書號法範㝡為條司屬言更法非便浙運課沈括存中神吴興籍無書不通永以太平車之説説宗免民車城樂貶著述王陶愽學能文初彈狄青甚英宗既知宗正請速立為皇子事韓琦謹後彈其䟦扈揣上意孫洙巨源感動廣陵謂包拯歐陽以賢良薦言治令人韓琦今之賈誼也乞留諌官廣言路當青苗時不能有所言蹇周輔磻翁塩成都運廣搔擾特奏又舉進士看深刻理子亭辰與安惇詳訢王廣淵才叔結魏郡時私英宗類祖宗御筆奸仁宗司馬公論其邪徐禧徳占法洪州䇿附安石經城永樂賊至没之士行新上治惠卿義局檢討脱李寕獄鄧潤甫温伯條例建昌確安石以為編修草蔡制謂有定䇿功鄧綰文約為成都手禮部第一附上書頌新法好官須我諌實法初安石安石罷附惠卿安石再相復主安石洵神宗出知虢州子洵仁武洵仁徽廟右丞洵武子常勸徽宗繼述非用蔡京不可别又進愛莫助之之圖左曰元豊以温益為首而書一姓名於宰相掩之則京也右曰元祐舉朝皆在焉温益欣然奉行而籍記異論之人位西府止蔡京取燕雲後王黼復議而洵武没矣李定資深制揚州所受學安石明除御史三舎人不草匿生服知州鞠東坡獄舒亶信道河慈溪承臨海尉斬醉民劾安石用之役定熈界口夷人刀頭肉東坡乞法不均責提舉官追又尚書省互奏欺罔州直院違法請厨錢獄具兩官勒停崇寕辰蠻叛除知荆南府選飛山福純坡建新城扼以功除龍圖待制邢恕和叔安鄭州謝從伊川學七勸王雱言新法於安石石怒病不仕者年為蔡確畫䇿妄作䇿立功以謗宣仁以紹聖為中丞章惇疑之出其上宣仁自辨書宣訓事誣司馬㓙悖誣劉摯等幾至復族子倞靖康為趙倫所紿始禍勒停黄履安中附邵武定神宗郊廟禮文多所詳定初蔡確䇿謀後附章惇排元祐趙卨公木勝卭州趾西夏前後議存綏州黨平交以與議棄地入籍吕大忠進伯府大防兄用言弓箭手近漢屯田義勇近唐兵擇一焉兵屯可省知代州折敵使夏言三路足以當人哲宗時游師雄景升行京兆雄吐蕃鬼章結夏人為亂以師雄邉師以姚兕仲种誼分道攻之章楶質夫四建州州世父得象䕃復舉甲科紹在涇原年置一城砦九夏不能復軍勝燕逹降木征度降劉應紀對成五陣法愛仕至節手不釋卷用兵莫如苗授受之十上黨千為王韶先鋒取河湟千降附吐蕃萬八餘帳討西夏轉戰里劉昌祚子京歩真定磨擊西夏功多忌氣質雄深射百外唎隘高遵裕之而潰劉舜卿希元禽開封一鼓鬼章知雄州易西域門鎻將知書曉吏事為時名姚兕武之州龍千諭慶叛卒射西賊三百餘發皆應弦斃之破河州禦交趾絶青唐援而鬼章就禽未嘗敗樂施年六十七老不廢書孝顔力學兵法戰慕真卿書弟麟君瑞樂不妄笑語沉毅多竒䇿有功不伐紀律明下為用戰嘗為先鋒涇原之役出為前入為殿遂戰嘗為㝡而同将劉昌祚與高遵裕有隙功不乃對上首至靈武昌祚之功城不能取皆臣之罪折可適遵正又代北著姓西郭逹用以守邉章楶用之襲夏帥涇原卒郭成徳順軍人坦靈武斬蕃酋施駐平夏砦禽大酋襟度然養孤好名振西鄙循吏許遵泗州興長興賑水災水利用還崇寕廣施巣谷元修存眉州銀舉進士見武藝者好而學之為韓寳賫授其子徒歩嶺海見兩蘇遇盗病死新州徐積仲車調楚州兒事母孝不婚不仕幞頭晨省餽手自為戱既冠從安定學安定食不受後頭容直如泣諌二叔析居惟取餘書弊屋其事叔母母遇石不踐父諱賣衣償金葉獨以正治心以直養氣戒天下事可學者甚多何天文籩豆自滌殺不出戸知天下滌慕諸葛武侯吊未嘗一日絶禄而家徒四壁鑍貯酒拜遣祭誦檀弓卒神宗時數召不至州教授哲宗時以為楚徽宗時乞致仕隠逸邵雍少學於共城令李之才三年不設榻士年三十自共城來居洛冨弼欲與先生處號辭嘉祐中舉遺逸王拱辰薦授将作簿官熈寕求逸士吕誨薦補穎州推官皆三辭不之不服深衣堂新法固嚴寛一分受一分賜多止冨公聼僧開説法天津聞杜鵑知天下事本朝自唐虞而下未有者五事市肆不易服天下在即位後不殺一無罪百年四葉百年無心腹患知安石惠卿必離二邢恕欲傳其學曰徒長奸雄章惇亦欲傳之程訪之明道稱振古豪傑惜無用於世又曰内聖外王之道居安樂窩年温公宅契冨公園契王郎中荘契洛四十六十七皆無為不善恐司馬端明邵先生知良兒童奴𨽻知尊奉冨公築室與相邇温好樂曰康能固所守曰節常秩夷甫論頴州歸居陋巷三十年聲歐陽荆公稱之士翕然重授官不赴名愈高安石變法獨以為是被召即起為諌官後至待制侍讀病歸外戚高士林宣仁弟史英宗以謹守法律誨之賢官至徳州刺卒子公繪公紀皆有稱宦者李憲從王韶取河州卨大殺木征董亶鬼章之兵邉副趙卨討交州言而罷之使計議秦鳳事彭汝礪等言鬼章之患小用憲之患大裕為大將收復蘭州詔趍靈武而憲不前高遵獨往而敗貪哲宗時劉墊劾其功罔上罷之王中正從王韶入熈州靈觧茂州圍期討西夏詔五路時會州中正失降秩宋用臣精思強力築神宗務補廢弊經畫為多東西府京城建尚書省太學創原廟然導洛通汴皆董其事監朝士徃徃謟附權勢赫哲宗初言者降為税天子念之欲謚為公豊稷止之哲宗宣仁聖烈太后高氏臨朝相司馬光盡除王安石新法天下稱太平元祐八年太后崩明年為紹聖李清臣用而君子空矣宣仁聖徳見神宗詔中外臣庶直言十科舉士棄四砦於夏人㳺師雄擒鬼章罷方田青苗太后不御正殿罷冊禮以旱親戚恩澤減四之一元祐事復免役保甲貶元祐臣僚廢孟后元祐七年所立夏人犯邉紹聖以後事哲宗一子茂劉后生一年亡昭慈聖憲皇后孟氏父元劉太皇太后以六禮聘華既立而媫妤寵幸遂廢居瑶宫盖章惇迎合於外而赧隨擠排於内詔下之日天為隂翳人為流涕哲宗崩欽聖后復之號元祐皇后氏徽宗復以蔡京議廢之故獨不北狩以欽宗有趙注孟子之嘱張邦昌請后垂簾后授康王為高宗昭懐皇后劉氏父孟后廢年號元祐九丙寅紹聖五元符閣徽猷樂重光陵永泰配享温國文正公司馬光䇿士李常寕何昌言馬涓李金畢漸相蔡確韓縝元年三月免之而相司馬公司馬光争新法見神宗欲神宗論辭樞宻一節即位以來惟此一人建儲以司馬公著為師保歸赴闕衛士手加額曰此司馬相公民遮道呼無洛留相天子太后問所當先請開言路遂盡除新法乃太后封求言詔草問公公以詔中有六事曰此拒諌也辨三年無改父道或疑章吕為朋黨曰天祚宋必無此事追四月相九月薨御篆忠清粹徳碑章惇相貶珠崖司戸蔡京相除名入籍靖康復謚配享康不妄言災十孝實通監檢閲勸捐數萬倉廪使民足食積謂孟子書最醇正年百姓日促李醫之積未全而卒四十一吕公著神宗事見前身上即位為侍讀上十議畏天愛民修講學任賢納諌薄歛正省刑新去奢乞無逸事太后問所欲言乞求中士救法三省同執政進呈日聚都堂青苗元年四月與司馬公同相復以常平法改以差役改募役罷保馬以監牧損保甲以便農作與除市易寛茶塩與贖亡民和西戎温公病邉數人救其弊温公同薦程頥直乞積穀偹邉閑更㕔募役民情大悦種復三館官省尚書曹士九員奏寛賈民罪舊嘗誣公太甚者或咎公除惡不盡為異日患曰治道去諌因言事出傅堯俞等張舜民彈劉奉世事言諌罷韓絳以奏范百禄無章䟽事黨慮人主厭故力争不當罪賈易易乞逐頥軾靖朝廷其争不可以熈豊所得地還夏人但嚴守偹待之後破洮州擒鬼章而乾徳亦入貢争不可與鬼章官仲論語尚書要語偹揮染與冩詩篇不同辨孔文劾朱光庭之非議捄災事最詳自後遇災必遣官賑恤賦乞薄何洵直失印罪當定進士初塲試經義次詩論䇿論王覿不因論胡宗愈責降人元祐三年懇辭遂平章事賜第三公平章者四公父子居其二歴事四朝無年不引去草簡重清静未不附火用扇不凝塵滿案未嘗書聞謗嘗辨好衣近節士體事言簡意足龜山稱真人臣性喜佛書生俸周九族壻范祖禹酷似公不問申公謚正獻七十三希哲見後希績紀常運有堅操黨淮南副坐希純子進英初白著商英欲呵佛罵祖之言商為公所黜故商英攻之甚力文彦慱為平章恭六日一朝一月兩赴經筵侍上甚終日侍立見英宗吕大防㣲仲人京兆其歴事英神功元祐二年相哲宗用各盡能不事邉歴事祖宗家法黨專愎起任省吏任永夀甫引楊畏為言官而朋之論又引用鄧潤主調停范祖禹奏其粗踈果敢立崖岸卒簡物士大夫不親附紹聖元年貶弟大臨范純仁攻安石罷諌院詳見神宗職為給事中謂温公役法當熟講後行宰相在求人變法非所先法諌温公進士召朝官保任應舉於又諌更貢舉又諌輕孟子侍講其説歸人君可用而後止章為樞宻請罷兵棄地使歸所掠漢人請誅鬼塞上後又諌與鬼章官務以愽大開上意忠篤革土風無罪韓維盡心國家救觧章惇鄧綰為相元祐三年言蘇軾與李清臣不合黨諌王覿因論朋黨貶河救蔡確因論不當分辨人遂出頴昌諌復故道河上科夫輸錢免役公憂民力自此愈竭敢再相簾中諭不敢先引用王覿彭汝礪曰臣不保位蔽賢上親政勸擇執政諌官又蘇轍引漢昭變漢武法度事哲宗大怒鄧潤甫言先帝法度為温公蘇轍壊盡公獨力争時李清臣建紹述之議御史臺論蘇軾行吕惠卿告詞訕先帝公又獨力争諌官當用正人楊畏不可用正為相薦人必以天下公議但願朝廷進用不失人何須使知出我門下出乞赦還吕大防等章惇反以公為同罪未録遂隨州四年六月朝七月免䘮明乞致仕又貶永州章避好名之嫌則無為善之路矣論舟覆曰此豈惇為之哉貶所怡然自得惟聖賢修身行已撰徽宗即位召用之力辭薨類蔡京誣其子正平遺表流之象州天下善視公用舎為消長明寛大才平生所學忠恕二字人雖至愚貴人則人為己任六經聖人事知一字行一字奏答邉帥欲威敵斥境者曰雖勝亦非成都不中使之過鞭傷傳言之人復薦种詁先人與种氏世契純仁不肖為其子孫所訟寕論曲直哉御位上帶左右字龜山謂沮人為善冨國强兵後待做甚正叔非之子厚言其方拙劉安世論其為樞宻日因司馬光病乞依舊散青苗光力疾入見以死争吕元城言行録又載大臣多首䑕兩端為自全計范二相尤畏而用其黨謂之調停為又載宣仁晏駕范丞相乞除執政即用李清臣中書鄧伯温為右丞又載范内翰論純仁居大位顧失人望純禮彛叟書議論亦務寛平徐仕至尚右丞崇寕初州安置純粹下不能欺坐為帥端重邉人畏服元祐黨遷謫劉摯熈寕以言新法去凡十六年宣仁擢御史元祐六年乞擇人勸講進讀奏蔡確十罪章惇凶悍罷之公論學制煩宻乞増損人王覿以論胡宗愈獲罪力諌隂陽拘忌聖不取上論本朝畏庚辛相正色彈劾中外肅然特比包希仁吕獻可為總大體守法度用人先器識奏事言直事核年三省事經公裁定莫能改畏吕大防忌之六十一月相十二月鄭雍楊誣公交邢恕章惇自求罷守鄆無朱光庭駮奏亦罷知亳州相府奉與謫居異章惇相謫死新州郡邢恕言摯廢立起同文館獄力家屬又再徙他剛明重厚逹治體精絶人尤精三禮號文雅勁無教子孫先行實若為文人足觀矣謚忠肅蘇頌子容南泉州官紳之子委知江寕於治訟盗戸籍京推歐陽公府政日請以獲立縣令殿㝡是伴送敵使夜火堅卧敏因張仲宣事請神宗自命官不加刑與宋求李大臨相繼封還李定詞頭天下謂之三舎人定以秀州推官擢御史與定俱罷杭州縱運司所係欠市易錢者國使敵答冬至差日開歸對上夷狄叛服不係中强弱亳頴卧治封尚嚴杭州欲免匿名告訐之奸喜以陳世儒婢殺母事罷掌脩契丹通好書成帝賜名魯衛信録前後天官四選五年士無留滯故修勑令務大體僥元祐七年宣仁相之務奉行事量能授任絶倖戒生事惟奏宣仁畢必再奏哲宗免不取諸公紛紛奏對義理之言八年三月紹聖致仕獨巋然不為讒邪所汙通務大體仁厚恢廓燕居無惰容權無書不孝睦儉素為相避故無恩怨廟與韓公㢘製渾儀分議家廟貢議祔郭后於后議學校欲慱士經議舉考行去封彌謄録答議移審官歸吏部三班歸兵部審刑歸刑部宗子主祭承重之義諌乗阿里骨死擁趙純忠入其國惟吕吉甫謂若從吾言執政可得平生薦舉人孟安序歳以䨇井一物為餉不勤則匱章惇見神宗門下侍郎韓維乞審人情罷新法棄西夏地坐元祐黨安置見神宗孫固見神宗蘇轍元祐元年自河南推官除司諌請劾蔡確韓縝章惇安置惠卿天下韙之以漸變役法經義主請還五寨而夏人服安見吕公著水回河之議回河者潞公吕大防燾請都軍器將作歸戸部驟議以勿補減六曹吏額吕大防任省吏任永夀減之而中外洶洶廷和靣争調停之説而參用邪正之説衰元祐五年時吕大防劉摯尤畏元豊舊黨欲引用之以平舊怨謂之調停前又言四事回河與熈河築堡宜平心無生事衙與雇役宜因弊修法諌除李清臣吏部蒲宗孟兵部因論今見缺四尚書若與王珪蔡確並進進勢一合非獨臣等耐不得哲宗親政李清臣復言熈豊事帝轍力陳元祐未嘗不行先帝法且引漢昭改武事又謂輕變九年已行之事擢任累歳不用之人則大事去遂得罪出汝州分司筠州貶循雷州移岳州崇寕致仕居穎昌入黨籍政終日黙坐者幾十年不與人相見和末年八十薨謚文定安燾厚卿間開封章行新法平心為議還西夏砦而又行與惇同朝而隂開釋元祐之臣言徽宗立居西府將去紹述之非淡泊中書張璪蘇軾劾之傅堯俞乞寛蔡確餘黨祐在中書論率由大公入元黨並見神宗范百禄子功士鎮猶子刑父錯衛尉丞進制科部多平反李清臣首變元祐政與覬取相位須去蘇軾而章惇來不得相遂為敵恊謀建中又見神宗許將仲元將福州言狀元顧北使見惇卞欲發温公墓獨無左右視利則回左遂王存正仲合潤州往為小官修潔自重因與安石論事不謝不累上書言時事及大臣在館十年不少貶以干澤史修起居注乞如唐正觀執筆隨宰相入殿左右許直前始此在政府遇事必争韓維罷門下杜純罷侍御王覿罷諌官皆力諌諌太僕馬事不屬駕部諌廢保甲科諌大辟有司欲生者朝廷不可殺不諌廢經義諌回河熈寕時論事與范純仁相得及元祐同執政趍多合同救蔡確俱罷天下稱之不召為吏部請察朋黨是非復不合求出平居為詭激而所守確不可奪一温公稱並馳萬馬中駐足者歴事五世所持心篤故交官其師之姪上喜賔客里守揚州歸冡給閭燕父老韓忠彦師朴之哲宗時在西府以棄湟州罷之徽宗首相蠲逋債還流人收忠諌知名士曽布排去之謫磁州卒七十二治知相州疾丐祠蕭胄代治知相州梁燾見神宗鄧潤甫見神宗黨吕相引為翰林元城極論其出入兩紹聖初范相引為右丞蔡卞元度左與兄京同舉進士交安石妻之以紹聖尚書丞與大惇小惇締起史禍中范祖禹趙彦若黄庭堅興同文館獄以䧟劉摯梁燾王岩叟劉安世斥元祐臣禁其子孫號二蔡二惇云復徽宗立羣賢劾罷之置兄京為相尋拜樞宻勸鄯湟諌以童貫制陜西罷子修攸皆侍從靖康初皆竄湖南謚文正右丞胡宗愈宿弟之子哲甲科論修内卒盗乗輿寳器乞罪都知宗時募役便入元祐黨籍是除右丞臺諌更䟽論列王覿孫覺楊康國皆以去劉安世又力論其附惇確十二事章十上卒去之鄭雍黄履並見神宗樞宻曾布子宣哲南豊政學於兄鞏請與吕惠卿建議新法宗親位西府詭羅致名士陳瓘張庭堅等之相徽宗以邪正雜用改元建中攻進紹述説又改元崇寕引蔡京為所同知趙瞻見神宗林希子中斥福州為黜元祐諸賢書命皆希為之至宣仁老姦當國嘗擲筆於地簽書王巖叟彦霖三元大名代十八舉明經時仁宗初置之韓絳守北京留之對曰某魏公客不願出他人門日不肯為呈身御史得哲宗登極除監察御史次言事時六察尚未言事劾蔡確以定䇿自居及執政才輕行薄者章十上元年為左司諌論新除執政不恊士望者章八上缺論三省吏厚禄計賞湖論左右正言不當久請免河北𣙜茶以北諸蠻專委荆南唐義問使勿徼功因開封以推判官分左右㕔分治舊共治一事積欠定五年十科之令京城無盗奸吏畏栗累拜樞宻靣陳參用君子小人之非侍講勸上積專勤四字夏人入貢約日多不至公請一不至則勿復應得蘇轍議棄蘭州界質孤勝如兩堡公曰棄後堡後來不更要否二堡充國留屯之所據夏人入㓂至鄜府公争不可棄地而請築定逺要害儲祥宫成諫它日勿復為又諌宫成而赦以因選后上中宫懿範庶出不可為后當每事節儉為意外剛内和志大畧細自温公言吾寒心栗齒而公處之如學無所不窺劉奉世入元祐黨見神宗諸臣劉安世器之語大名言從學温公不就進士不妄始悔不知洛州司法賍汙誠自温公居政府以其獨無書薦充館職公温公薨宣仁問之吕申公擢正言奏執政彦慱著大防純仁孫固王存宗愈堂除子弟親戚而劉摯依違不紏正王覿等劾胡宗愈罷安世又論之而宗愈罷執政豈試人地又極論章惇罪惡因隂市崑山民田惇坐罰安世極論吴處厚上蔡確安州詩公與諌議梁燾極言確禍心而彭汝礪學肇等皆為營救不肯草貶確制又與燾吴安詩力争䟽十餘上始竄確新州而李常盛陶趙挺之王彭年同日出臺中一空汝礪肇亦斥純仁王存宻為確申理亦并劾之司論確惇履恕妄稱定䇿功證有四罷言純仁在馬病日乞依舊散青苗錢純仁遂范因宫中求乳母力諌溺愛後劉后果專寵力吕為調停之説每差除公與梁燾朱光庭必争吕引鄧温伯欲以逐公公又屢䟽論温伯傾險公遂罷純仁再相吕大防擬公真定宣仁曰如此正人宜留朝廷起紹聖言惠卿用則確用而惇之徒起矣黨禍屢貶英州巨蛇相迎斷酒蔡渭受蔡京㫖引文及甫訟劉摯等遂置獄同文館安世以諌乳母事貶梅州秦循梅新高竇雷化凡歴其七車惇遣運使殺之安世談笑自若見又遣孫槖檻收之會徽宗赦知真定曽布其謝表不許入朝吴知潞州部使者求其過無毫髪過梁師成遣可以書致公答曰吾欲為元祐全人不可破戒公編管陜州復直龍圖貴宣和七年謝客及卒哭者日數千人香價踴殿上虎急喜讀孟子緩自知死所母勸其為諌官之不肯避盗曰論金陵三不足説謂人主勢無與敵必有大於此者已攬之庶可回劉言安石有素行故人毁之不入過南京必見待制東坡稱真鐵漢議北郊當分祭蘇轍恐勝其兄奏罷議彭汝礪見神宗極元城言行録載其與曽肇在中書力營救蔡確安州詩事范祖禹淳甫公成都天鎮從孫不夢鄧禹生温叔祖忠文許以下士謁安石公専屬以修書局䘮富公疾篤以宻䟽新法事與上之論神宗三年及厚葬除正言温公謂淳夫見光有過不言乎可伊川謂經筵若得范淳夫來尤好色温氣和尤開陳導主乞太后儉朴輔養君徳以取珠六十斤金三千六百兩服温公申公既相詔起蜀公祖禹勸不必出請除不作宴御請四院增屋處貧民東西南北福曰院帝因賜書唐詩進三經要語書語孝經又進學諌權住進講韓乞寛蔡確餘黨邪正乞免忠彦執政尚主乞大臣用人分論純仁失人望陛下専任大防而劉摯與大防恊同非相參之義諌修河因覔乳母上䟽言陛下今年十四而生於十二月其實十三歳諌議選后四事道封還懲責申水旱州郡指揮以陳景元校書王韶時有安撫大師曰東坡薦講官第一前中貴陳衍至園不敢高聲范諌議一言到上吾軰不知死所治公求梓州太后論且為兒孫留之堪宣仁崩言亂離合之機紹聖奏天下事豈小人再壊東坡見其䟽止附名同奏在諌初政召内臣凡召十餘人李憲王中正之子焉夜講學時勸辨邪正興上有相惇之意獨公論奏不已繼述論已公力諌求去上欲大用之亦不果坐蔡卞修國史以實録無據貶公永州黄庭堅同處之怡然死於化州天下稱唐監公獨不立黨范十三知東坡每戯必曰無令受恩多則難立朝曾肈韓維以奏范百禄黜公不草制政王覿忤執政黜公還詞頭議太后受册崇殿又諌上夀會慶殿人春旱請罷春宴頴約彭汝礪按察確會除給事以為賣友出州浚清河而但開八丈溝之議求應天府不飭厨傳興學校忤議南郊守前説力出徐州紹聖請親正人貴近不得留對不受史局轉官即日治道在廣言路欽聖召還除中書舎人會日食命草求言詔投書者千數得盡聞天下事掌乞還元祐已死臣恩數又乞赦後置看詳司流錮之人乞置正觀政要陸贄奏議於坐右皇奏兩官救陳瓘小議哲宗禮不當增室言建極當先分君子人謂為兄布草拜相制建内侍閻守懃主更茶法公不可與民争利中日食陳諌懇激涕下元祐諌臣再貶請與俱貶和州民追咎草求言詔安置江州更十一州皆得心貧終身端嚴有大臣風鄒浩諌立劉氏除名并州覊管見徽宗陳瓘諌紹述之非見徽宗吕希哲原明李公著子從與程頥從胡瑗又從孫復石介覿又安石棄科舉専意涵養直氣勁節稱静重有至行矣章楶知縣時闕矯不動横渠蠻貊之邦行少豪縱痛自揉十不謁臺諌二浸與荆公不合固辭侍講諌筦庫年説書年導人主修身正心除官欲以楊畏為首自在邇英未嘗起觀東坡字畵生豊稷除禮部舉代為郡待客以乾物免殺與劉安世鄰郡為守不通書致勤懇静居真間十餘年衣食不給日讀一爻晚年習驚恐顛沛未嘗少動晚楚州橋壊墜水猶覺心動今次疾病全不動年名益重逺近師尊危坐堂上陳瓘拜堂下須為官不干薦舉和事親須事事躬親後生且理㑹氣象政中卒七十八子好問吕大臨叔通冨通六經尤深於禮奏記公責其事佛孔文仲經文論臨江軍石范鎮自台州司戸舉賢良極新法安出之為元祐諌官極論之武仲常父之弊禮部第一州元祐初進用論科舉歴洪州宣坐黨居池卒著詩書論語説平仲毅夫有元祐八館著京西提刑以黨籍貶史學續世説朱光庭公琰秋河陽而對神宗止再舉安南之師及治春不合出温公用為言官罷新法封論蔡確章惇知論蘇軾紹劉摯罷相還麻詞落職亳州聖追貶吕陶元鈞争眉州彭州𣙜茶舉制科論新法安石出之哲知元祐入臺去新法邪黨宗親政上䟽言恐有不正之言謂太仕斥逐田臣闕坐黨貶元符致張舜民芸叟西邠州論新法黨温公以為言官止夏封册以貶使遼豐稷相之翰林鄞宗神廟監察御史論王安禮為制誥哲殿中侍御史諌用明智徽廟御史中丞首論蔡京京貶論章惇惇黜論宣仁誣謗曽布再相黜知越州蔡京相貶睦州台州建州婺州安置卒七十五王覿明叟章泰州宗哲廟言官請罷章惇臨請釋鬼徽再論章惇坐勒停卒江温益禹弼劉泉州於陳瓘論其守潭時侵困鄒浩奉世遷謫之際附二蔡來之邵祖徳范開封乞為哲宗侍御劾蘇頌梁燾純仁用章惇安燾吕惠卿常安民希古祀蜀人宗紹聖御史論章蔡諌以劉妃從哲責其東漢君比朕入籍楊畏子安得洛陽温受知惠卿洛敬安石學為言官恐罪於公請祠歸吕大防劉摯為相助大防攻擊蘇頌為相復攻頌意欲蘇轍相也而范純仁相又攻純仁不報遂攻轍不可大用矣大宣仁而畏首背大防稱述熈豊政事安石學術防罷章惇相乃結惇惇與李清臣安燾敵復附安李惇遂出之以入元祐黨籍蔡京相畏因薛卭言之出籍政和方上書言封禪而疾卒上官均彦衡州邵武棄蘭砦地論青苗黨劾蔡確李清臣諌論蘇轍大防而排許將乞罷知廣徳朱紹聖為正言再黜蘇吕以章惇黜彭汝礪而用服均争之遂出徽宗為給事不從紹述之説遂入黨籍云董敦逸夢授大吉州轍劾程頥徽與黄慶基攻蘇軾為吕防蘇所逐廟時極言二蔡卒陳祐純益可用陵井監切論林希京論元祐人才以論事直出蔡因事編管之張商英天覺以蜀州薦兄唐英有史材時商英少學焉章惇仕神宗為御史嘗薦舒亶紹後亶知諌院繳奏其屬托彦哲宗立諌更法公聖為司諌始在元祐以文􅀶吕公著比周又祭司馬光稱其羙至是皆論其負國入至以宣仁比吕武崇寕左丞與京不合京以黨籍為相大雨雪没徽宗書商霖賜之務更蔡京事推自號無盡居士其進本熈豊而與京異論天下重云陳師道無已又字履常傅彭城人覺苦節勵志南豊竒其文蘇軾堯俞孫薦之為太學博士私至宋謁東坡被出又以進非科第罷論罷歸貧至累日不炊傅堯俞懐金餽之聼其議不敢出口高秦觀謂其非持刺伺候公卿門者下鄒浩稱為士文妙絶當世行義稱焉居都逾年不一至貴人門國章子厚求見不得挺之綿襖凍死靖元年諸經有訓傳不著趙文師南豊詩宗山谷是又其餘事其或與米芾等列之文藝傳非倫鄒浩諌立劉后除名見徽宗章楶守涇屬見神宗朋黨洛黨程正叔賈易朱光庭川黨蘇軾吕陶朔黨劉摯錫王岩叟趙君梁燾劉安世王韓川曽朱光庭易孫升覿肇賈趙楊康國盛安鼎龔張舜民槩田子諒人葉挺之挺之陶原劉凡三十哲宗初羣賢畢集専以忠厚為治然賢者亦不免以類相從至章惇為相盡合之為元祐黨儒學程顥程頥見神宗龔原深父合處州嫡絶立庶議秦悼王議郊不當合祭貶乞為哲宗三年䘮安與陳瓘善坐以經術尊敬王石文藝廖正一東坡試館職士竒其對䇿四東坡每以宻雲龍茶飲之故名亦得亞於學士亦入黨籍李之儀端叔辟姑孰人宣武置幕下東坡稱其得發遣三昧帥作范純仁遺表世所傳誦亦入黨籍李格非文叔陽受知東坡論為太學官作洛名園記洛陽盛衰李公麟伯時及舒城人好古識竒字陸佃薦為刪定官陸愽學識秦璽畵比顧元符問病脾致仕肆意泉石文清婉米芾文務竒險不蹈前人軌轍故善書畵好古郎每出入宣仁聖烈皇后潘氏芾得補校書禮部員外郎大觀二年罷知淮陽軍卒賀鑄方囬中以孝惠皇后族孫授右班殿首元祐易文判泗州又判太平卒劉涇巨濟多荆公薦其才除經義所檢討躓凡知四州務竒怪多為人排斥屢不伸元符末卒蔡肇天啓術師荆公長歌詩刑徽宗時以學反覆出為兩浙獄周邦彦美成正錢塘人時獻神宗汴都賦自諸生為大學徽宗提舉大晟樂府能文章世特傳其詞古今紀要卷十九
