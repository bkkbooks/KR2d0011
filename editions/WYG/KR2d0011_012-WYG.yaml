body:
  text: 古今紀要卷十二宋黄震撰唐四代宗宦者程元振用事藩鎮切齒吐蕃入冦元振皆不以聞及冦武功上幸陜諸道忌元振無至者獨子儀自咸陽歸長安虜遁去右致變事僕固懐恩既平史朝義奏以降將韓嵩田承嗣李懷仙等分帥河北遂世襲不稟朝廷之命吐蕃入大震闗盡取河西隴右自鳯翔西邠州北皆左衽右削弱事稅青苖錢始以畆定稅又苗方青而征之廢人事而奉佛政刑日紊第五琦稅畿内麥韓滉奏瑞鹽魚朝恩專權上令元載誅之載横愈甚右弊政劉晏財賦吐蕃入懐恩引回紇入回紇吐蕃合兵入皆子儀定之郭子儀復兩京事已見肅宗留代宗立程元振譖之子儀表解元帥節度京將使討朝義于洛元振朝恩沮之鎮懐恩誘回紇吐蕃廹京師始起為闗内副元帥咸陽時部曲離散才數十騎倉上幸陜子儀收拾兵卒威震闗中吐蕃聞之潰卒之變賴復安元振請都洛子儀極諌鎮河中將士聞之曰吾輩從懐恩為不義何面目見汾陽王以盗平復聚兵耗百姓請罷節鎮自河中始懐以靈武初復百姓凋耗請以路嗣恭鎮朔方恩誘回紇吐蕃黨項十萬入冦聞子儀而遁還拜尚書令辭軍懐恩又誘三十萬深入京師大震急召屯涇陽纔萬人子儀單騎見回紇回紇下馬拜而吐蕃遁因追敗其十萬于雲臺還河中勸耕足食周智光叛華州聞子儀軍起其下殺智光對敗吐蕃於靈州强吐蕃冦靈武詔屯邠州入延英語吐蕃方慷慨流涕上書言簡練十徳宗召為山陵使號尚父盡罷所領使卒年八五時方多虞握兵處外無纎芥顧望故元振朝恩䜛間不行人以家僮數十赴朝恩約謂臣不能禁士殘之墓田承嗣西望拜泣初過汴州李靈曜衛送出境府麾下宿將數十皆王侯貴重頥旨若部曲幕六十餘人後皆將相二歳俸二十萬緡家人三千八以身為天下安危十年中書二十四考子七壻諸孫數十忌子孫多以功名顯疑史贊稱權傾天下而朝不功葢一世而上不窮奢極欲而議者不之貶曜子儀征伐曜留治家少長無間言復居䘮以禮疾不茹葱薤上四朝所賜徳宗賜之悉散諸弟晞從征伐復兩京戰㝡力之朱泚欲汙以官佯瘖賊兵脅不動曖尚主泚不受朱官奔奉天李光弼平安史事已見肅宗禍朝恩元振中傷之不吐蕃犯京詔入援畏不敢行幸陜亦至相元載天寳詔舉明莊老列文四子學入髙第女度支占奏敏給肅宗異之李輔國娶載族遂並相委度支如故盗輔國益稱之以度支繁浩損威寵之劉晏殺輔國載與其謀結中人伺宻㫖揣上意必諧契第誅朝恩益矜肆賄别敕授官經圖宮殺築私諸子闗通貨室宇奢廣名姝異技禁中不逮上垂戒之傲然不悛控上積怒妻子盡賜死胡椒八百斛城原州扼吐蕃之議為田神功所沮裴遵慶元年冬與苗晉卿同罷由是元載權益盛詳見肅宗苗晉卿練達而畏謹比疏廣詳見肅宗劉晏八歳獻頌號神童可調夏令未嘗督賦而輸無逋期所至惠利紀守餘杭有備永王璘不敢略而走鉄尹京兆總大體不苛致代宗以為轉運租庸鹽使通江淮漕渠嵗四十萬斛闗中雖水旱物不貴知上謂朕鄼侯㝡與第五琦分歛天下金穀又吏部三銓殿分明僕射領使使補署數百盡當時之選士權貴干請者厚廩不視事檢劾出納一委人吏惟奉行文書不所任者雖數千里外奉教令如目前頻伸諧戱敢隠代第五琦㩁鹽益宻初歳收六十萬緡末乃千一百萬𣙜居大半湖募駛足置驛知四方物價以權萬貨輕重以嶠所出貨輕儲江淮間質銅鑄錢平馬上鞭筭質明視事荒事即日剖儲諸州常米三百萬斛州縣歉民未及困奏報已行多飲食儉狹室無媵婢之勢軋宰相要官華使出其門江淮珍甘貢常先諸府者媚怨由是益多固饋四方名士盛利啖有口舌人議其任數恩與楊炎氣不相下炎譛殺之十簿其家惟雜書兩乗米麥數斛吏贊拏兵數年歛不及民唐中衰而振晏有勞焉李峴繼裴苗相政相肅宗疾李輔國始相代宗不附要近初事堂不接賔元載置榻待中人至峴相去之要近譖罷之詳諌盡誅陳希烈等請以六等定罪見肅宗王縉因祿山亂屢更節鎮朝曲附元載佐恃才狎侮載亦疾之節鎮來必使出財營作奉佛不茹葷肉宗妻死以第為佛祠場與元載盛陳福業報應代始重佛創内道夷狄入冦誦䕶國仁王經下謂祿山懐恩敗非人事政造盂蘭盆設髙相以位置人事不修大歴刑日壊皆縉與元載鴻漸倡之諸與載俱敗殆貪若市賈代辛京雲鎮河東誅將悍戾者盡軍府始安杜鴻漸為肅宗定討至靈武勸進鹵守荆州棄城遁復出諫凶荒後婚塟給簿相代宗畏怯無逺略晚溺浮圖道獻崔旴亂蜀使徃鎮撫因與旴厚善而歸薦之寳器復輔政將死削髮為塔以塟裴冕綱目謂元載以其老病易制故舉為相受命蹈舞仆地未幾卒詳見肅宗楊綰沈靖詞左圖右史凝塵滿席制論著未始示人舉藻宏麗科加詩賦舉加詩賦始此充宗請復古孝弟力田等科未幾以無實罷之吏部品載清允元載忌之以為國子祭酒載罷綰相士相賀之以官號重複罷團練守提使减觀察判官員半採訪不得擅停刺史均州府官月廩太釐補穿弊維綰是恃嘆天不使朕致平儉約不問生事薨帝不清談及榮利毁欲干以私者聞其言媿止十始執政中丞崔寛池觀京兆黎幹損騶從之九子儀撤音樂五之四勝聞風靡然自化者不可紀裳衮奏朝恩不當判國子監請却諸道誕日進奉請備留京回紇之縱請省佛老之費易芻粟減貧民賦請宦者劉忠翼權震中外涇原馬璘為帝寵任干皆拒卻元載死與綰同相綰長厚通可衮苛細以清儉自賢上惟信愛綰死當國與度支韓滉増百官俸多騁私崇怨綰奏罷内厨賜宰相家食懲讓堂封官塞政事堂過舍人院之北門示尊元載賣非文詞者皆擯不用政世謂濌伯以濌濌無賢不肖之辨儀性剛急為苛細不合衆心以散官為相子為言加官封換奏貶河南少尹崔祐甫徳宗怒使與祐甫秩楊炎起為福州觀察始興閩學諸臣顔真卿祿山亂起義兵論盧杞奸邪斥元載朝廷豈堪公再壊杞䧟之使希烈不屈死詳見肅宗李栖筠李峴按汙贓羣臣栖筠為推原所以輕重以情譽一旦出大盗後亡選簿判南曹號神明相毁鄭白渠磑百所嵗得租二百萬學魁然有宰望元載出之常州浚渠溉田興行化誅宿賊里無吠狗身執經逺近趍慕浙西平許杲表宿儒為學官帝惡元載欲得剛鯁大臣自助見栖筠敷奏明卞不阿附使代張延賞為御史大夫制麻自中出朝廷莫知劾載所厚徐浩杜濟薛邕帝不决奏月蝕修刑不以任國風憲不赴曲江賜晏遂為法上憚載敢相而進用宻訪多所補助人攻已短見帝依違不斷憤卒公喜奬善而樂天下士歸重號贊皇子吉甫相憲宗韋夏卿與弟正卿皆䇿賢良髙等人毁懐却從弟執誼干請之全曰與爾賴先遺徳致位及此顧當是哉多好古有逺韻洞所辟至相稱知人署其居曰大隠撫孤姪踰己子張萬福三世明經止縣令州佐乃學騎射其禽奪送租盗并得先掠妻女財畜萬計還家代宗召見拜和州平許杲事止節度韋元甫厚賞士曰官徒坐仰衣食無所一小煩之不足過賞諸將請代元甫去之敢徳宗謂江淮草木知爾威名李正己反漕不踰渦口使守濠州駐馬發舡賊倚岸不敢動延泗州載米百車饟魏州饑鄉里陽城伏閣爭齡大言揖城曰國有直臣天下無慮矣皆祿食七十年九州惠愛裴諝父寛徒為思明所獲全活宗室數百人䟽賊虚實步挟考功南曹印從幸陜上欲用為中丞元載沮之出為鹽鐡使未當旱入見不對𣙜酤曰臣涉河東三百里穀菽種不軫念元元訪疾苦而乃責臣以利别徳宗時發子儀家奴宰羊事以明無黨附諫置三司獄擊登聞鼓獄官箴諷法吏舞文治五世為河南人視事不當正處為寛易不鞫贓歸崇敬治禮家學可對代宗生人疲弊儉化天下則國富而兵用請罷百官朝朔望服袴褶栗言東都太廟不當置木主禮虞主用桑練主用作樂主則瘞桑主是不當有二况此廟武后建以祀諸武者請非四季月郊祀之說面釋奠夫子北面揖太重如武王受丹書行東禮使新羅風濤不易小舟亂不貿易惟衣衾東夷傳清徳遣祀衡山不以還皇太子臨學行齒胄禮請以國子監為辟麻祭酒為太師氏及置博士定帖經課試等法不行順宗時與子登父子侍讀徐浩己見肅宗惑代宗使鎮嶺南嗜財典選於所嬖貶明州元結己見肅宗融管經略守道州績皆有治李明叔東都平後為洛陽令招徠遺民見尹京兆百姓歌之後在蜀貪詳徳宗蕭昕奉誥冊詣靈武䇿從幸陜業祭酒請崇太學於是詔羣臣及神子弟肄補生貟使囘紇折以納懐恩引吐蕃杜八十餘嵗從徳宗奉天薦張鎬來瑱黄裳髙郢裴垍獨孤及児時志立身揚名語三代宗以左拾遺召疏上命丞相裴冕等十人備顧問及因上陳政首言聼諌後言時事之弊與天變乞求賢黜貪下哀痛之詔言甚切又言天下已無盗而兵不解乞減以贍國用鑒歴濠舒二州嵗旱獨安惡常州甘露降廷喜㧞後進為文彰明善長於議論欲晩嗜琴眼疾不治聽之專黎幹善星緯神沾沾喜議論謂薛頎歸崇敬議以景皇帝代堯配郊天且禘者祭天於圎丘幹上十詰十難駁禘非郊鄭元釋禘自有三說背馳景皇帝不當配天尹京開漕渠入苑便運薪因宻具舟作水嬉媚帝而渠不就從者費數十萬以交朝恩黜每朝恩視學勞再尹土龍禱旱自與巫覡對舞又禱孔子帝笑毁寵而雨白渠復秦漢故道溉田廢碾磑八十餘所開鄭貪暴宫左道惑上之與宦者幾危東徳宗立流市人羣譟投礫韓滉判度支不敢欺廉勤精於簿領作賦歛出入之法吏值連稔邉境無事自是倉庫始充秋雨害稼恐蠲貸言不損徳霖雨壊鹽池奏有瑞鹽詳見宗第五琦已見肅宗理大歴元年與劉晏分天下財賦崔縱終元載世不求聞達詳見徳宗段秀實六嵗母疾七日不食號孝童以肅宗在靈武責梁宰追留安西兵亂獨恩信為士卒所服羅拜不敢害凡佐三府益知名中幸陜白孝徳度支不能制軍剽掠得秀實而軍畏戢請為邠州都虞候斬郭晞横卒而以老躄持馬造門責晞邠由是安為營田官賣馬代農償焦令諶租令諶自恨死而涇州王童謀聞警鼓作亂使遲鼓節又謀救火亂使火發不救馬璘為吐蕃所隔悉鋭兵示賊璘得歸非璘死攝鎮軍不得變吐蕃數年不敢犯寨公㑹不舉酒賔佐議軍政不及私對入朝帝問所以安邉畫地以見徳宗李抱玉本安重璋元宗以戰功改名恥同賊姓改姓善養馬騎射為光弼禆將從戰河陽差功第一盡平之上幸陜盗徧南山五谷東拒虢西抵岐讓司徒讓僕射凡兼三節度三副元帥又讓之求專事闗隴人在鎮十餘年雖無破虜功而禁暴安為將臣之良李承楚州置常豐堰禦海潮溉屯田收十倍代李希烈表計梁崇義知其後不可制單騎希烈鎮襄漢迫脅不屈腹輯綏撫安闔境完復結希烈心謀殺希烈王翃賊乆據容州經略皆橋治翃為經畧百餘戰復之為子儀留後誅凌正尹京兆饔敗肉腐激涇原兵叛獨東畿有備守東都屯田練兵吳少誠叛善盧杞助之殺崔寧沮懐光嚴武挺之子肆八嵗殺父妾闕在蜀放一言之恱闕掊虜亦不敢近白慢房琯為最厚杜數欲殺之李蜀道難房杜危崔寧鎮蜀十餘年恃强恣横杜鴻漸受其賄益委之詳見徳宗李忠臣本董秦蕃肅宗時禦安史平東都有功在代宗時吐犯京師召兵獨先至曰君父難可擇日救患乎將敗李靈曜李走田恱衆妹壻張惠光父子為牙殘克横肆希烈因怒如故隠逸張志和己見肅宗卿觀察陳少游禮遇之謁真湖州徃來苕霅陸羽見肅宗循吏羅珦江西荆襄鎮軍亂誅首惡環棘俾投所刼物一日滿吐廬州疾不服藥禱滛祀修學政簡易請杜佑上治狀子尹京滅平糶半讓焚婢劵歸其母文藝杜甫少貧客吳越趙齊間宫舉進士不中困長安言天寳十三年獻太清饗廟及郊三賦自先臣恕預以來十一世守儒官臣七嵗屬辭且四十年揚雄枚臯可企及有臣如此陛下忍棄之避亂三州欲歸肅宗為賊所得鄜走鳯翔上疏救房琯帝自是不甚省録家寓懦弱至餓死為華州司户年饑輙棄官去度客桑州採薪栗武流落劔南結廬成都依節嚴武嘗醉登牀視曰嚴梃之乃有此皃以其好殺崔一日武出欲殺甫冠鈎于簾三母奔救得止旴等亂徃夔梓間陽大歴間出瞿塘下江陵溯沅湘登衡山客耒游岳祠大水至旬不得食令遺牛炙白酒大醉一夕卒五十九嘗與李白髙適過汴酒酣登吹臺慷慨懐古數冦亂挺節無所汙詩史偉氣節髙于邵邑州僚亂薄城勵兵拒戰梓賊降儒服出賊拜乃引去李抱玉以聞遷州不拜知制誥大典冊必出其手潔孝弟有行晚益修大厯十才子盧綸錢起吉中孚夏侯審韓翃苖發司空曙耿諱崔洞李端宦官魚朝恩高宗時事見前下代宗東避吐蕃悉軍迎於華隂更號天觀軍容等使忌子儀功與元振譖之謂子儀再安京師甚慚勸徙洛貴講五經作文章才兼文武判國子監怙誕辭惟相里造李衎不屈為以水旱不時饋運困竭欲易宰相衎折以軍容之宰相行文書而已釋菜講覆餗北造章敬寺為太后薦福事發子儀先冡置獄軍人號地牢謂天下有不由我乎儀養息乞金紫上滋不恱召上倚元載圖之子亦言不早圖變且大入使周皓縊殺之程元振與李輙因討難故代宗使盡總禁兵不踰嵗權震天下在輔國右而凶决過之薦王仲昇始以將軍兼御史大夫天貶裴冕士殺來瑱常䜛光弼吐蕃黨項内侵下無一奔命𫝊栁抗乞斬元振馳告天下乃盡削其官流秦州死駱奉先數用征代蕃監懐恩軍恃恩而貪懐恩懼譛遂叛吐犯京師為城鄠使悉毁縣外廬舍籓鎮安史亂天下至代宗𤓰分河北授叛將訖唐亡不為王土史取擅興若世嗣者為藩鎮傳田宏正張孝忠等暴忠納誠以屏王室自為别傳魏愽田承嗣世事盧龍𨽻祿山與張忠志為祿山前驅陷河洛以頴川降子儀俄復叛慶緒奔鄴合兵助之慶緒復振代又為思明前驅朝義敗降懐恩懐恩白之宗剙天雄節度處之其有魏愽具滄瀛五州治魏州詔詔子尚主以結心愈不遜取相衛磁三州罷兵不奉命請詔以諸鎮兵討之僅得瀛州李朝廷從李正己遣使許入朝不至復以兵助靈曜反兵敗上書請罪詔復官爵有州土田恱承嗣族子承勇冠中軍節大歴十四年嗣死使知度使代宗因命之類招賢禮士外示恭順年餘見徳宗及藩鎮總此鎮代宗廣徳元初置鎮冀李寳臣本奚入冐姓名張忠志祿為祿山射生將從朝出入禁中山反遁歸為假子于朝為慶緒守恒州思明渡河復叛九節度圍相州懼歸命不肯事朝義以恒趙深易定五州獻代宗建成徳軍節度處之與増領冀州治恒州賜姓名雄冠山東承嗣交惡帝因使與諸鎮討之承嗣懼嗣中人馬希倩恚抵其縑乃用王武俊謀隂交承以子惟岳弱殺良將二十餘人衆心乃二岳信妖人符瑞徳宗初為其所殺遺表求以子惟嗣餘見徳宗及藩鎮總類宗此鎮寳應元年代初置盧龍李懐仙栁城胡以世事契丹懐祿山禆將慮斬朝義首幽州降恩奏使鎮龍年有幽平􅀈擅燕營遼洛鄭州治幽州王大歴三朱希彩泚滔殺之族其家詔宰相縉代縉見不可制閱旬還希彩領鎮朱希彩自立驁恣滔七年李瑗因衆怨殺之為倡共推泚朱泚代之三年滔紿使入朝而奪領之類泚事見逆臣朱滔見徳宗防此鎮開元元年置號幽州禦大使五年為平盧軍開元末為范陽莭度淄青李正己本名懐玉青髙麗人薦為營州副將從侯希逸入州希逸之從討朝義己後軍士逐希逸而奉之代宗詔代鎮有淄青齊海登萊沂宻徳𨽻十州賜名正與承嗣等攻李靈曜復分取曹濮徐兖鄆五州惟㝡强大徙治鄆徳宗初約田恱梁崇義李兵反河南騷然肅㑹死子納祕䘮進兵宗此鎮宗至徳元年置號青見徳齊叛臣僕固懷恩安史之亂與郭李戮力王室約詳已見前肅宗末漸難制代宗立尚回紇副元帥雍王討史朝義平河北賊子儀以其有平河朔功以河北元帥讓之恐平衰寵請裂河北分大鎮授薛嵩張孝忠李懐仙田承嗣以為黨援唐失河北始此䕶回紇歸太原辛雲京疑襲已閉門不敢犒軍與監軍駱奉先表其反綱目載李抱玉與雲京表其異志上表陳情詔宰相裴遵度徃諭因察之原懐恩欲入朝范至誠止之因遣子僕固瑒攻太真卿請以子儀代之必相率歸懐子儀至河中其軍斬㻛以獻入懐恩母持刀逐恩遂走靈武誘吐蕃十萬冦子儀出鎮奉天遂退入又冦邠州不克詔又誘回紇吐蕃雜虜二十萬冦中國大震下親征而懐恩死始懐恩立功門内死王事者四十六人申及拒命士不㢮甲者三年帝亦未嘗下詔其反周智光附見徳宗徳宗罷貢獻生日貢獻却不受左李正已田恱各獻三萬縑悉歸藏代租賦罷梨園樂罷𣙜酒却祥瑞出宫人淄青投戈相顧日引朝集使二人訪逺人疾苦宦官邵光超受李希烈贈遺杖而流之以李正已獻錢賜淄青將士天下謂太平可望因楊炎言財賦盡歸左藏右初年好處即位以崔祐甫為相專以道徳導主意故建中初綱紀張設赫然有正觀風及盧杞繼相諷帝以刑名䋲天下亂敗踵及林甫傳而終身不知其奸裴延齡妄言糞中得銀三十萬兩疋段雜貨百萬餘陸贄極論之待延齡益厚而䞇貶自贄貶宰相充位所信惟延齡李齊運王紹李實韋執誼韋渠年皆權傾人主竇文場霍仙鳴為神䇿中尉宦官分典禁旅右用人失處初疎斥宦官親任朝士而張涉儒學薛邕文雅以贓敗上心始疑謂蕭復輕已姜公輔賣直陸贄論諫多不從令除改勿任諸司論事勿對趙憬官無大小必自選中書行文書而已右猜忌處兩稅楊炎括商韋都實陳京増稅錢鹽錢淮南陳少游請毎千増二百詔他道皆増又詔鹽每斗増百錢而加少游同平章事括僦櫃質錢杜佑間架陌錢趙贊瓊林大盈庫行宫廡下奉天歸益聚歛稅茶張滂月進江西李兼日進西川韋臯裴肅始以刺史進奉自常州遷浙西觀察嚴綬始以幕僚進奉自宣歙判官召為刑部貟外郎元友直句檢税外物嵗輸百萬李泌始議諸道訴上罷之宫市右聚歛李方榮逐節度劉士寧竟以為留後宣武擇行軍司馬為儲帥山南節度于頔專恣凡奏貶一一從之李長榮罷遣中使就軍士所附者授之昭義藩右姑息鎮事黜陟使洪經綸罷田恱兵四萬為農恱激怒軍士以怨朝廷恱又為李寳臣子惟岳請繼襲不許遂拒命上討之王武俊不受詔執使者送朱滔滔武俊及李納並稱王而滔主盟李希烈亦稱天下兵馬元帥圍襄陽上發涇原兵救之涇原兵至以無犒賜鼓噪立朱泚上幸奉天泚攻奉天李懐光李晟赴難懐光為盧杞所間與泚聮兵上幸梁州李晟收復京城泚走死馬燧討平懐光於河中右奉天梁州之難相崔祐甫沔子剛禮法聞家攝祿山亂冐矢石負木主逃直不回省事數與宰相常衮争之衮賀猫乳䑕獨曰此法吏不觸邪疆吏不扞敵證衮欲為代宗斬衰三年祐甫爭如遺詔二十七日用徳宗即位出衮而相之踰矯衮惟以文辭及第人之弊薦舉惟其人未年除吏幾八百莫不諧允才安敢與官李絳嘗言之曰非臣親舊孰知其召王駕鶴語移時代者已入軍以淄青李正已所獻錢就賜將士妻䧟朱泚緘鐍所得獻之朝廷相纔一年卒以弟子植為後相穆宗楊炎世以孝間門樹六闕古所未有除文藻蔚然豪爽尚氣常衮同知制誥衮長書炎著徳音號常楊洛元載親重載死亦貶自徳宗在東宫常諷玩其碑即位佑甫又薦即道州司馬相之琦易崔寧鎮朔方而以李晟破吐蕃南詔庫第五度支患豪將求取悉左藏賦入大盈内至炎奏出歸有司者作兩稅法夏稅盡六月秋稅盡十一月俗不便三之賦不加歛而増入版籍不造而得虛實權始歸朝廷而天下亦利之之罷度支轉運使既而財穀無所統復以韓洄為中外翕然屬望為賢相祐甫始變其政人始不恱州開陵陽渠民騷然徳元載欲報之復議城原段秀實以妨農事乞少緩怒之卒不能城於以劉晏劾載誣殺之朝野側耳而使人自解諸鎮上始銜之六薄杞不與㑹食李杞請如舊制中書舍人分押曹不從諌以希烈討康崇義杞因希烈不進軍譖罷炎異立私廟於曲江臨幸處杞譖有志殺之喬琳粗率喜談諧無他長辭張涉薦相之聞者驚愕數月即罷奉天力去臣朱泚見叛臣傳盧杞父弈見忠臣傳色惡衣菲食杞有口才豕體陋甚鬼貌藍守虢諫徙於同州上以宰相才期之賊召為中丞不閱旬為相遂不任楊炎既得志險浸露未半嵗逐楊炎出張鎰流嚴郢李貶杜佑州陷顔真卿李揆揆使西域卒于行沮洧以徐降引裴延齡為集賢學士之用趙賛括富商間架陌錢之召怨挺亂皆杞為上幸奉天誣崔寧反殺間李懐光不使朝激其叛史帝始貶之新州然念之不衰趙未幾授饒州刺給事中袁髙執不草詔諌臣需裴佶盧景亮張薦宇文􆀍極言之朱遂遷灃州别駕死在奉天百口保泚張鎰欲直盧樅之獄慮貶為母憂母使執正之術惟與楊綰崔祐甫游濠州政條清簡延經士教生徒明經者四千人分代炎為相度遇兩河用兵减堂食錢百官奉三之一助用子儀壻趙樅為奴所告鎰爭之杖殺奴之盧杞惡之紿上使鎮風翔代朱泚李楚琳殺而降泚儒緩好修飾邉幅不習軍事闗播縣政異等人遣招撫湖南盗賊辭行答為政在求有道賢又答求賢而又遣使舉薦此止可得求名文辭士焉得有道賢人肯奉牒丐選舉以士人易諸司申庫令史盧杞以其韋柔可制薦為相政事一决於杞何欲有所言杞目禁之責曰以君寡言故至此奈欲開口用李元平守汝州討希烈希烈禽之嫚罵曰盲宰相使汝當我何待我淺幸奉天尚執政議者不平罷為尚書韋倫等泣諸朝曰尚可尚書耶李元平好論兵鄙天下士大夫無可者烈播以其有將相才數請用之被禽見希遺矢于地蕭復嵩孫士新昌公主所生雖處貴盛常垢弊力學非名宿儒不與游以清操顯嵗飢不肯鬻先世墅與時相王縉者發觀察儲粟賑飢杞諫如鳯翔既相諫以宦監軍言楊炎盧亂政乞變更睿志臣當竭力使依阿茍免則臣不能奏事斥杞上以輕已出使宣撫江淮陸贄奏乞留之上疑復所使勉自江淮還乞以韋臯代陳少游而諫帝不令李盧翰聞知之說帝不恱辭疾歸方性孝友貶礪名節未為相臨事嚴坐晏然口嘗言姜公輔母老賴祿求京兆户曹養有髙才敷奏詳亮上器之請誅朱泚毋虎貽害涇亂又請馳騎捕之綱目作召使從行舍諌走鳯翔内盧杞保泚不反使諸道兵距城一公輔請悉諸軍泚兵果至遂相之相諫厚塟公主及為造塔以賣直售名罷陸贄數求官贄謂竇丞相屢擬公上輙不恱懼請為道士李晟年十八事王忠嗣一矢殪吐蕃悍酋稱萬人敵代宗時李抱玉授兵五千辭之以千人屠吐蕃定秦堡吐蕃解靈州圍之馬璘與吐蕃戰敗於鹽倉晟以游騎㧞璘璘忌歸之朝徳宗初吐蕃冦劔南蜀大震以神䇿軍踰大度河虜斬之水魏愽田恱反與河東馬燧昭義李抱真敗之洹解朱滔王武俊圍康日知于趙約燧趍定州而圍赴難奉天樵蘇無犯朔方李懐光軍請與聮壘屯咸陽晟毎戰錦裘綉㡌自表漢懐光與泚通晟請假禆將為洋利劒三州通蜀衿喉帝狩梁州始悔不用其言結陣趍東渭橋横當賊鋒防二盗之合假張彧京兆少尹不淹旬芻米具望諸將雪泣聽命懐光奔河中請帝駐梁係天下家為賊質涕下曰陛下安在而欲恤家泚遣人報家無恙斬之殘移壁薄都城大破賊入光泰門禽馘殆盡泚以卒萬人西走秋毫無擾分慰居人京師復市不易肆誅用事于賊者表著莭不屈者擇文武攝臺省官清道迎帝歸陳懐光五不可赦請以五千兵十日糧破之上方以委馬燧渾瑊不許請制西戎遂鎮鳯翔隴右涇原吐蕃大懼尚結贊謀間晟可晟屢敗之益懼詭求盟於馬燧張延賞言晟不久持兵而薦劉元李抱真俾立功間晟果刼盟於平凉晟入拜中書令爭之不可吐蕃厮養小善必記慕魏徵進對蹇蹇有大臣節歳治家嚴子姓非昬晨不見言未嘗及公事正却崔氏女歸寧十五子聞者愿憲愬聽向管見謂非特良將乃賢相乃使閒處七年而死使陪侍廟堂參斷國事有益於國可勝數哉李勉宗室諫靈武劾大將管崇嗣肅宗歎有勉朝廷尊殺闗東俘歸者日至帝欲柄用不肯下李輔國見出暴尹京獨不餉朝恩千鎮嶺南討叛五嶺平不征夷舶至者嵗四餘柁召歸盡捜家人犀珍投江中章鎮滑亳八年不威而治鎮汴宋徳宗就加平為諸道都統為李希烈所敗不歸相内媿不敢有所與見言盧杞奸邪陛下獨知此所以為奸邪遂益踈逆旅塟友不取其金表俸賜遺親磬鯁亮廉介為宗臣之響泉韻琴張延賞嘉貞子四在河南淮南西川皆變凋耗為完實更鎮民頌其愛奪李晟所帶成都倡婚延賞入相晟盛表其惡蕃帝為平其憾州晟請延賞不許罷晟兵吐果刼盟省縣貟収廩料中外始怨功臣解體是年除吏千五百當省者千李泌一切奏復當國飾情復怨去齊映稱代宗擢為御史欲收元載權李少良劾載延賞疾不敢鞠李栖筠傳子宏靖號三相張家劉滋洪州振職畏為相無設施㢘抑謹而已崔造與韓㑹盧東美張正則友善好言當世事自謂王佐才號曰䕫朱泚亂檄比州兵待命上以敢言能立事自給事中不次相之史疾錢穀諸使罔上自私請兩稅委本道觀察刺停諸道水陸轉運使度支巡江院江淮轉運使韓度支還尚書省六曹宰相分領時方之用滉用事所請悉罷憂憤卒齊映舉愽學宏詞鎰說令狐莭納節歸諸子京師奉與齊抗勸張先事誅李楚琳楚琳亂奔天為梁道險澁為帝御馬否言音鴻爽前馬傳詔相端重寡言事可一讓于造綱目謂在諸相中頗稱敢言映吐蕃冦闗輔力諫勿避幸官張延賞舊善遇映為相不答延賞為所親求歛延賞復相劾非宰相器貶之初在江西桂管掊貢獻求復用銀瓶至髙八尺籓鎮貢止五尺李廉為江西始六尺桞渾十嵗以相夭賤使為浮屠曰去聖教為異術不如速死學益篤朱泚亂步走奉天料李元平必為希烈所禽擇為相帝擇畿宰曰陛下當擇臣以輔聖徳代尹令非陛下所宜玉工誤毁帯銙争請如律杖之計田伯强請賣宅募兵助討吐蕃曰討賊自有國豈容不肖子毁門徼幸責韓滉省中榜吏時滉方為上所親信他相充位而已渾由滉薦而能正色責之白志貞除浙西觀察爭以小吏不當超劇職㑹念士千里干祿皆與之擬官知渾瑊平凉之吐蕃必敗盟語張延賞頭可斷舌不可禁勉卒為所擠清儉曠然無出意李泌貟叔九嵗升坐因薦舅子泌相類童元宗召之七嵗對張說言棊方員動靜號竒非九齡善蕭誠軟媚見謂小友宗長愽學慕神仙術官賦詩譏國忠見斥見肅靈武議國事授固辭羣諫帝以宿嫌掘焚林甫因請迎太上皇二又為臣通奏請歸就養答破賊之期不出年因請詔光弼守太原出井陘子儀取馮翊入河東則史思明張忠志不敢離范陽常山安守忠不敢離長安然後以所徵之兵取范陽求隠衡山取樛松隠背曰養和李輔國疾之代宗召之為娶妻强之食肉忌元載惡之出為江西判官之載誅召還常衮之出為楚州刺史辭帝留衮又授以澧州徙杭州皆有風績蕃徳宗召之奉天諫赦懐光諫以安西北庭償吐助誅朱泚之約防陜虢觀察鑿山開道至三門便運害擊殺淮西秋逃兵四千人拜相與上約勿功臣上令分主軍旅儲糧事泌謂天下事當咸共平章為復張延賞所减吏貟而省冗官請以元友直諸道句勘兩稅錢帛使留悉輸留州京師外内停西城使者四千人廩給分𨽻神䇿軍請増官俸給時京官俸薄以自方鎮入八座謂罷權遷臺閣者不赴募戍卒屯京西時戍者十七萬人時粟二百四萬省拾遺補缺力請與回紇和親以制吐蕃徙請安太子上欲立姪舒王請張建封鎮徐泗命言盧杞奸邪致建中之禍言王相造命不當言言命則不復賞善罰惡矣上謂卿雖有逆耳之言而氣色和順無陵傲好勝之志使朕中懐已盡而屈服上以貢獻五十萬不足於用泌請勿受私獻而歳供宫中錢百萬日請以二月朔為中和節祭勾芒祈年與上已九為三令節疾月食東壁卒有出入禁中事四君數為權倖所常以智免謀略然常持黄老鬼神說為人所譏始薦陽城薦竇參泌徳宗因桑道茂奉天之言騐尚日時拘忌而又尚之桞玭稱兩京復泌謀居多功大於魯連范蠡侯子繁才警無行下獄將死求發紙筆著鄴家傳竇參按獄揚州責陳少游偃蹇不郊迎故免鄧珽賦中丞舉劾無迴避不以宰相徳宗數與决大議宰相與相駁異無以傷之遂無所憚惡以己嘗為司直多其俸惡詹事李昇抑其班人其專孟不進兩首豕誣不為陳少游子襲封薦辨將軍華李建玉之人始屬望李泌老參通敏可兼度支董晉方正可處門下疾甚復薦上始相之剛果峭刻無學術多權數既為相入對嘗以奏度支事為言獨留以專大政晉具位而已引親黨要地洞察四方淄青李納厚賂之而宻間于帝上除吏多訪族子申申招賄漏宻語人目為喜鵲戒參不悛申恐陸贄進用與吳元通謗贄上知之貶之賜死上欲殺参與申贄皆爭之毁吳凑言其風痺不良趋走凑傳董晉守華州朱泚攻之走行在出說懐光勿助朱泚韓滉勢振朝廷排元琇之晉見宰相誦其非罪姪為相當竇參得君循謹無所駁異薦其為侍郎上怒問參過失晉不敢隠為參參罷晉亦懼辭惟代李萬榮鎮宣武鄧惟恭不迎騶兼直造委政恭莫測其謀衆服有體謙愿簡儉安言於上前者未嘗泄曰欲知宰相賢否視天下危謀議上前者不足道也為相五年無所異管見謂直大言以葢循嘿耳陸長源上以晉在宣武懦愞使為司馬佐之吝持法峭刻數裁正晉偷㢮留後嚴而儉自謂不效河北賊錢買節鉞不賜軍人亂死乗清白自將去汝州車二乗曰吾祖罷魏州車一而圖書半吾愧不及矣趙憬李泌薦之占奏明辨至副闗播使回紇獨不市馬規利考功請如徳嵗終課殿最薦韋証以貪敗自請降考同劉兹以憬知過更以考升竇參罷始與陸贄輔政贄於裁决少所讓不平稱疾常贄極言延齡奸而憬不助懇贄罷而憬當國以選賢節用薄賦寛刑懇言之審官六議要一相臣閑二庶官三闕官謂官缺多官員多乞隨能試事歳四攷課宜責限任要重者加爵秩屬五遺滯譽多者先用非大故勿去六籓府官謂能否已試引置之朝清約産第室童獲不改儒先失稟入先建家廟之不營令狐峘崔儆暴憬於朝為相皆擢陸贄張鎰請為忘年交尉餉錢百萬止受茶一串等書判㧞萃補渭南徳宗遣黜陟使庾何十一人說以五術省風俗八計聽吏治五三科登雋乂四賦經財實六徳保罷察要簡官事服馬燧討河北賊乆不决而李希烈冦㐮城贄請逺莫若修近幽燕恒魏之勢可緩而汝洛榮汴之勢急闗請居重馭輕以朔方太原兵屯山東神䇿軍戍外不足則竭内以益之又請停京師稅間架榨酒油貫貸商㸃召餘涇師急變言皆效從狩奉天報機務沛然有諫尊號諫委興衰于天林上謂今日之禍推誠之弊請推誠納諌諌瓊大盈諌疑請復上疑論賊勢者張皇因諫推誠授獻𤓰果者官既見懐光勸許李晟移軍見諫梁州回諫取李楚琳勸李楚琳使淮西兵諫疑姜公輔求官號河中平答上請罷諫以内外從官盡定難功臣京師平諫訪奔亡内人相天下屬望為相與竇參不平罷學士參出始請臺閣長官薦其屬或謂所引皆親黨招賄上停之部諫用延齡度支不從大水請遣使宣撫吏選嵗計缺集人請減江淮運未令京兆鎮邉和糴者陳調河南兵西北防秋六失請募壯士願屯邉給所輸資糧耕種然後擇人為朔方隴右河東三元帥賦諌論事功對趙憬答上令受鞭靴均節財六條一兩稅之弊以布帛為額限三兩稅請三長吏以増户加為課績四稅廹切五茶將置倉備水旱罷六兼并之家當減租價得皆不行延齡延齡譛之賴陽城等貶忠州諫用順宗召之卒感始入翰林為内相驚奉天制書武人悍卒無不動山南相失上泣詔得贄千金輔政剴切上疏曰上不負天子下不負所學集既放闔户人不識面避謗不著書苦瘴癘為驗方帝論諫數百皆本仁義言東坡謂才本王佐學為師論深切於事情不離於道徳智如子房而文則過辨如賈誼而術不疏刻上以格君心之非下以廸天下之志徳宗苛勸以忠厚徳宗猜忌勸以推誠兵徳宗好聚財勸以散財徳宗好用兵勸以銷用人聽言之法治邉馬習之方除罪己以收人心以改過以憲天道云去小人以民患惜名器待有功晦翁奏議極好議論事理委曲說盡更無滲漏雖至小事處置亦無不盡論二稅弊極佳管見謂自李泌相後不復論諫比嫌爭能耳稱社稷臣盧邁諫議數條當世利病誓以不滿嵗辭上考夫元旦攝祠以私忌不聽御史劾之邁按大士將祭於公既視濯而父母死猶奉祭禮散祭有大功䘮致齋有朞䘮齋有疾病聽還舍不奉䘮無忌白不受誓者雖令忌日與告且春秋不以家事辭王事為相贄憬專大政邁居中治身循法無它過問時為宰相自尊五服皆不過從弔邁徃哭從父弟議者重之賈耽汾州七年政有異績中徳宗急詔使人代之内詔于懐飲如故軍不平諭安之守東都館李納軍于城中毎獵徃徃入納境納畏其徳不敢謀為相十三年雖安危大事無所發明而檢身勵行乃其所長義嘗謂方鎮缺帥當自天子命之故除李元素鎮城順宗王叔文干政屢移疾乞去寸讀書老益勤今悉地理道隴右别錄華夷圖為百里古郡國縣四夷述今州縣以朱垣圖問其邦人咸得其真錄隂陽術數罔不通其器恢然貞元十道世謂淳徳有常者不對客未嘗少倦家人見其喜愠崔損延齡嘗薦之延齡死以為相不中書虚位十日用之中外悵失齪齪自將出一言及天下事建中後宰相無乆任者便柔持祿獨留八年沒歴二省至宰相母殯不塟亦不展殯女兄為尼亦不臨䘮趙宗儒自肅宗至徳後考績失實内外悉攷中上宗儒黜陟詳當無所回憚入中上者纔五十相二嵗罷戍二千人屏居謹静奉朝請者鎮荆南散冗食太常卿不敢禁宦用五方師子樂以懦不職罷已文宗訪政理曰堯舜之化慈儉而以治身𤨏碎失名鄭餘慶末年相之奏對多傳經義相善于頔後漏賑禁衛議貶憲宗復之詳見齊抗吏事閑敏逺有文雅用鹽鐡使元琇薦斡鹽利無謀大畧心至精滋彰苛刻髙郢九歳著語嘿賦諸儒稱之營祿山至京師解衣請代父死白衣諫代宗章敬寺勸懐光西迎乗輿不從又脅諭其子琟將間道歸國謀洩抗詞無愧懐光慙赦之哭孔巢父屍禮部侍郎絶請謁專行藝時務朋㳺馳逐聲名郢凡宗掌貢部三嵗進幽獨抑浮華流俗翕然丕變徳末與鄭珣瑜同相叔文用事珣瑜憂甚爭不得稱疾不出郢未有建白順宗即位與珣瑜同免故議者賢珣瑜州華州政仁靜而奏罷良原戍之餉駱元光以華戍軍入神䇿餉如舊恭謹不與人交私家制誥無留藁曰王言不可藏不治産曰祿雖薄在我有餘鄭珣瑜值亂遂耕養母髙劉晏張獻誠表補皆不應諷諫主文科第徳宗擇十省郎治畿赤遂為奉先令言為河南尹未入境不獻徳宗生日馬嚴重少人不敢謁以私清靜惠下賤歛貴發取餉韓全義伐蔡百姓不知僦運張非詔而别檄者掛壁不酬至數百封治比延賞而重厚堅正過之尚進平章詰京兆尹李實進奉順宗時為吏部書見韋執誼輟中書㑹食與王叔文飯遂喟然歸卧不出宗子覃文宗時良相孫裔綽事宣諸臣段秀實肅代宗事詳已見前入楊炎城原州秀實請湏農隙炎怨召之炎朱泚軍責以忠義泚遣銳師三千疾趋奉天偽迎天子秀實急倒用司農印追還之翌日奪源休笏奮擊泚而死戒家人勿受泄遺言禁軍寡弱簡約威恵孔巢父孔子卅七世孫君奉天累上破賊方畧恱宣慰魏博開曉以臣大義利害逆順衆得為王人田緒殺恱宣宣慰河中懐光素服待命衆謂太尉無官矣方詔譟而合遂遇害從子戣戡戢蕭定瑀曽孫姓清挺張歴六州治第一變名為誕不汙朱泚袁髙恕己子十力諫用盧杞刺史牛不滿五畆者二户共給一崔邠三世一㸑治家者推其法名温裕簡儉憲宗器之疏延齡奸鯁亮知裴垍薦可宰相為太常卿始視事如故事大閱四部樂邠自第去㡌導母輿蔣乂吳競生主該綜羣籍有史才借吉尚補凌烟剥壁贊諫張茂宗母亡答神䇿軍建置本末遂父予為集賢學士非中興與晉惠帝安帝同因祧廟論中宗反正剛正刺救誅李錡諫連坐王叔文宰相議不决必咨所疏延齡罪惡至拒學至老不厭以貴近介介不顯官革尤明前世沿子神相宣懿權徳輿請遣使慰撫闗東河南浙西水災省上疏斥延齡以常賦為羡罔上獨直南上書謂恐四方以朝廷乏士上曰非不知卿勞但擇如卿者未得其人知貢舉甄品詳諦所得士相繼為卿相逋取明經不限貟歛大旱上陳缺政請蠲租賦宿逺貸否亦無可之理又請運粟入京約太倉一嵗計斥其餘以糶于民則價不踴藏者出相憲宗事見後崔縱方鎮兵未至勸李懐光奔命追懐光兵疲不進先度河以金帛誘之梁州扈不及上知必來定諫兵未息未可停减冗官兵後尹河南簡易蠲畧細苛嵗旱樽郊禮洛戍邉者道由儲餼取于民縱始令官辦不求聞達母事父嬖妾終元載世元暐曽孫張萬福平許杲延通渦口漕賊不敢動代陽城争相齡賀國有直臣見宗鄭絪諫白麻拜竇文場中尉餘見相憲宗時顧少連登封簿移文岳神虎不為害命中書舍人十年以謹宻稱嘗徙先兆帝中人䕶塟與延齡㑹田鎬第挺笏曰段秀實擊賊臣吾今擊奸臣將擊元友直解之京兆寛簡均租賦東都表禁苑閑田募耕以便民閱武利仗號良吏歸登熊執易論延齡願竄名曰雷霆之下君難獨處同列有所諫正輙聮名無回諱補缺十五年僚類進多得顯官惟登與拾遺蔣武退然逺權勢憲宗問政所先勸順納諫諍時傳為讜言温恕不家僮折馬足象服金石藥幾死皆為愠慕陸先世亦許之許孟容為張建封諭李納罷兵風不許公主子求崇文生宦者覆視好畤雹害稼孟容謂紊紀綱宜擇御史參騐還浙東判官暴歛以獻求擢刺史孟容為給事封其制袁髙争盧杞後十八年門下無議可否者孟容數駁論四方浩然想見丰采大旱請以户部錢代京兆賦及省察流移孟容本為坐延齡流斥者言故上不恱丞憲宗時尹京捕神䇿軍豪右大震請起裴中輔政提方勁有禮學之好掖士清議尚段平仲磊落有氣節使嗜酒敢言大謂上聰明但臣下畏怯循嚜我得見宜有開納及對帝雜以他語錯誤不得言乃謬稱名帝叱之蒼黄向幄後由是坐廢七年然名自顯憲宗以為諫議乞斬承璀尚書右丞推朝廷得失未嘗不論奏世敢直杜佑判户部度支南軍興專决餽餉見盧杞出之鎮嶺鎮淮南詳憲宗韓愈論宫市貶詳見憲宗李藩相憲宗崔衍父倫陷祿山不汙間表賊事母倫使吐蕃六年不屈歸陳虜情偽險易後弊衣謂衍不給父將鞭之不自解饑嵗為後母子償負不勝計故官刺史妻子僅免寒治虢賦倍入力請减賦竭宣歙觀察簡靜百姓所懐革時以進奉州藏耗衍嗇用十年府庫充衍去舊貢金錫十八品故穆贊代之得以四十萬假民賦旱不流捐儉約畏法卒不藏䘮盧景亮勸徳宗罪已不至則感人不深回志義激發與穆質問在諌諍地鯁毅無所李以劾其漏上語引善在己三廢斥廿年天憲宗召為中書舍人有經國志足記兵食下士作答問言輓運其陳西戎利害指切當世公卿伏達古今直諫知名嚴郢守太廟祿山亂藏神主泰從左道之獄貶代宗江陵判官執方士申尹京兆嚴明疾惡撫窮訟與楊炎爭開陵陽渠無益炎以不附己劾繫之寃日數千人旱請蠲利炎以不實罷之趙盧杞引為御史逐炎及炎所善惠伯後逢惠伯柩殯内慚卒韋倫募匠代齊人鼓鑄宗幸蜀清儉自將營宮室閱實工省費從代第五琦薦為荆襄租庸使擊康楚元收租庸一百萬緍貶鎮山南不謁李輔國罷守秦州兵寡不敵虜招州討宦者呂太一以反間貶闕徳宗兩使使吐蕃書立朝數論時政得失盧杞闗播罷為尚倫流涕曰宰相無具使天下至此不失為尚書吐苦諫再用盧杞諫與李楚琳李忠誠官謂蕃不可信薛珏為令以清白聞俸守楚州州有營田宰相領之田官數百刺史及它給百餘萬皆條去之徳宗命使分察李承言其簡趙贊言其廉盧翰言其肅時舉堪刺史縣令者宰相欲校以文辭珏曰求良吏不可責以文學茹禁鬻賣民苦之剛嚴京兆尹以供三宫畜治身勤而苛察王仲舒與陽城交章沮延齡作相罪奏議詳雅省中伏其能少與楊憑游憑斥獨屢薦之婺州旱疫人幾空居五年閭里増完期蘇州堤松江為路變屋瓦絶火災賦調與民穆宗以其文宜為誥詔為中書舍人不樂與新進少年同列求外江西罷酤錢九十萬吏失官息錢五十萬為焚簿書屋水旱出錢二千萬代民賦置為佛老法興浮屠者驅出境所居急民廢初若煩宻久皆稱便馮伉持節弔李抱真不受其帛農上以其清用為醴泉令俗嚚猾著䝉書勸務進學鄉卿授之相教伊慎字寡悔希通春秋戰國䇿多先鋒討哥舒晃受以兵屬烈討梁崇義功希烈署之不數饋遺欲縻止之卒以計免希烈反恐其為曹王臯所用反間之大破賊兵大破賊將杜少誠蘄口漕運得通隨進圍安州下之賊甥以八千兵來援禽之下州吳少誠反當一面斬首數千賂憲宗即位入朝以錢三千萬宦者求帥河中事覺貶韋綬貫之兄不對䇿將為進士舉首以友楊凝母老譲之翰林學士參逮宻政院中方寢帝以貴妃纈袍覆之菊母老乞解出入八年謹畏小心疾還第和帝黄歌上謂為文不已豈頥養張薦請以希烈妻祖母贖真卿盧杞持之校與陳京趙寫極言杞奸惡不當再用兵亂為太常參綴典儀建與闗播送公主于回紇絶延齡用事中傷俊良白無不當帝意三使域占對詳辨道病卒吐蕃歸其䘮徳自拾遺至侍郎二十年常兼史館修撰定昭后廟樂遷獻懿二祖大儀位號大臣祔廟鼓哭法莫不參裁諸儒謂愽而詳薛戎尹河南不迎承崔附見憲宗沈既濟楊炎薦良史才辨國史不當立則天紀當追書太后不當稱上毎嵗首當書皇帝在房陵太后行某事改某制錢徳宗待詔官三十員諫毋官外置官又諫制取息且言天下皆兵資官俸它費十不當一議楊炎貶亦貶選舉子𫝊師清正宗事敬姚南仲諌代宗近城為獨孤陵朝夕臨望之鎮義成盧坦謂姚大夫外柔中剛監軍侵必不受軍府禍始此去之所監軍薛盈珍果毁之不徳宗勞之答曰盈珍輩在有之雖羊杜復生能成愷悌之化正師律也上黙然李紓言武成王廟不宜與文宣王等譔樂易喜接後進雖貴游縱自如論甚多徐岱帝誕日嵗詔佛老者大論麟徳殿并召岱及趙需許孟容韋梁牟講說始若矛盾卒同歸于善上大恱兩宫恩遇無比辨論明銳座人常屈世農家不於學無不通篤謹談人短婚嫁宗族之孤者譏吝嗇自持管鑰世之李叔明副漢中王瑀使回紇讓回紇倨慢之東都平洛陽令招徠遺民尹京兆民歌徳宗幸興元出家貲助軍悉衣幣獻宫掖川二十年華裔遂安足病賜錦輦盗後守東惡道佛上言定僧寺為三等上等留廿一人觀為二等上等留十四人餘還為民上下其議彭偃請僧道嵗輸絹四尼半之裴垍請僧道限六十四以上以在蜀殖財廣田産歿後數年子孫驕縱皆盡世為多蔵鑒樊澤舉賢良次潼闗困雨淖同旅熊執易哀之輟馬頃楮以濟執易自罷舉徳宗嘆其論兵與我合射獵諸將憚其才武以數禽希烈將賊氣沮縮取唐隋州山南軍亂威惠著襄漢使鎮之王緯在路嗣恭幕䕶解李泌泌語上報之以其忠而清為浙西觀察韓滉時罰錢十八萬府史請進奉上疏願蠲與民費延齡以諸道負錢四百萬獻羡奏以為諸州經然好用刻深吏條約苛細吳湊皇后弟亂畏太盛求檢校賔客汴滑持節裁處軍中驩附敏鋭而謙畏計收元載福建清勤美譽四騰所尹京兆彊力劬儉上下愛向言宫市謂宫中需貴臣可辦言雜役太繁一有疑獄者毎俟出遮决幸其蒼卒可欺湊叩案視指摘盡中其弊僚吏非大過不榜責廷詰之而相勉無稽事以塟太子公主廢農事極争之曰上憂勞四海不愛所鍾疲民以逞顧左右鉗噤自安耳幸一聽之則民受賜不少未病不問醫巫曰起田畆位顯仕年七十尚何求嘗以罪過罷為外戚表云劉晏掌河南山南江淮嶺南財賦而韓滉分掌闗内河東劍南之賦徳宗惡滉掊克皆以晏領之誣與楊炎不相下之晏為元載炎坐貶及炎為相晏動揺社稷貶又使庾凖誣與朱泚通賜死代詳見宗韓滉至徳軍興賦稅無藝滉檢制深文鈎刺親肅徳宗立惡其掊克出之鎮海節度境内稱治奉天時獻縑十萬鎮兵三萬助討賊十討李希烈漕路無便禁屠牛鄰伍坐死者數百人雖握强兵遷延不進而糧帛濟朝廷當時頼之徳衣裘十年一易居庇風雨田無改作傷吾儉不為資産彊善書畫與宗人斡埒穀苛慘肆孫洄掌徳宗錢韓洄劉晏薦之費晏死錢穀莫總其任洄判度支商以轉運之多于本請罷江淮七監請鑿州山取銅置十爐米請天下銅鐡冶𨽻鹽鐡使耗省冗胥二千積長安毎年各數十萬視豐發歛班宏論李維岳不受其遺計竇參為相代韓滉度支徳宗以宏熟天下使為尚書而副參參許以使與之而食言宏以欺已遂有隙恊參譲于宏而以張滂分鹽鐡之權宏滂又不相於是用劉晏韓滉故事分掌天下財賊宏宏清㓗勤力晨入夕出吏不堪勞而已益恭初欲傾參毎營建必極瓌麗以媚權嬖王紹少為顔真卿所器間為包佶租庸鹽鐡使判官奉天之難督輕貨道走洋州供春服五十萬由是紓難多判度支嘗謹宻漏眷待殊厚出主計八年政闗方未一語王叔文之鎮武寧自張意後兵驕難治紹蒐輯軍政出家貲賞士舉軍安賴包佶劉晏汴東兩稅使揚繼晏掌鹽鐡有名掌東南財賦于州陳少游脅奪之裴延齡陸贄薦李巽判度支上許之而用延齡幸素不善財計領度支取宿奸老吏謀固帝言左藏嵗入不貲請列别舍校虚盈但多其薄㝡吏貟以詭帝于財用無加妄言咸陽陂􅀢儲數百頃數妄言本分錢修浴堂殿棟三妄奏同州大谷木千妄言掊糞土得銀十萬他貨百萬贄韋少華劾其妄延陸贄極論其奸上愈厚之罷相大旱民饑齡言贄激怒衆士贄遂貶蘇弁為奉上簿徳宗狩止官屬走徳宗至儲侍畢給繼裴延齡副度支平賦緩役人賴其寛副度支自弁始聚書二萬與袐府埒譏度支時以州縣積逋米乞貸貧民時皆其罔李齊運宗室中走於李翰辱代宗貶翰尹京餉晟軍頗有助懐光反奔河捽殺萬年丞御史聮章劾之訴為朋黨暗蝗旱不能救韓洄代帝與參决大事無學於大體甘言阿合而已州薦李錡浙西受賂數十萬家薦李詞潮人告其賊病卧除吏即咨逮嚴綬為宣歙判官掌留務竭府庫進奉召為刑部員外郎幕僚進奉自綬始詳見憲宗杜兼正倫後厭浮險豪侈修張建封置幕府才濠州知徳宗兵重代易武募兵帝以為遂恣横至欲殺令狐楚李藩未善杜佑終始倚為助鬻所大殺戮裒財極欲嘗敗署書未成墜杜羔兄兼為澤潞判官鞠獄得其母舍佛祠觀柱間知父墓京尹責賦繫於縣吏謁宰相請移散官杜亞上書靈武論當世事相遷諫議以不得衡柄悒悒不悦以李栖筠當結納之與劉晏治元載罷徳宗召意必任台宰倍道進帝不恱又奏疏濶鎮淮南通漕渠然用度無藝雅意丞弼不親事猶競渡髹船底營綉飄固府庫竭流風痺且廢奏墾苑中為田以􅃂民至亡王諤善刺軍中情偽曹王臯委腹心諤入城約降慎争功稱疾避之伊慎圍安州天寳末朝貢酋長西北校吏亂旡所歸者仰稟鴻臚諤奏罷之李泌以𨽻神䇿歳省五十萬緡容管八年谿落安之之財嶺南𣙜利為時進納京師權家無不富諤子稷留京師視勢賄河東承范希朝後補完嗇費兵强用豐謗回鶻入朝示威受其禮上嘉之拜相懼多財得助錢二千萬李絳諫嘗讀春秋自稱儒者舡仕數持下偽焚無名書碎瑣無遺懐􅀢付昉緘答燕享賣其餘韋渠牟工詩李白異之岱為道士為僧復冠韓滉進用徳宗誕日徐許孟容及佛老二師麟徳殿質問大趣渠牟有口辨問答鋒生帝聽意動驟用之對延英至五六刻上懽甚挑躁浮淺書争出其門勢㷔可炙深自陸贄免宰相惟行文守宰亦自惟蕳然處宫倚信者延齡齊運王紹李實執誼渠牟延齡實奸虐紹無建明渠牟後出望㝡輕張恩勢以動天下張涉東宫侍讀親重無比即位召入禁中事皆咨之薦喬琳為相不稱職遂疎李元素按獄明令狐運刼輸絹之寃由是天下重之御史大夫自真元後難其人不補徳宗初以夙望拜之中外想望而容容持祿内望作宰相妻許溺姻侍免官吳元通以東宫舊恩兄弟相繼翰林學士贄又並知制誥與䞇同位贄驟擢頗媢恨欲斥逐之建言翰林院工藝之冗至徳以來集賢學士草詔待進止於翰林院因以名官今制書冝歸中書舍人請罷學士元通愈怨賜與竇參謗贄貢舉求賄帝怒逐參元通死李實宗室法山東刻薄軍費幾見殺旱尹京怙􅃂愎而不旱飢聚歛對上雖不害有秋峻青租調人窮無告王優人為俳語諷帝奏賤工故國殺之與御史播争道奏播為三元令延奪之忍私薦士廹徳輿用懐毎奏科目公詣刼請殘順宗貶之市人瓦石邀擊夜遁鎮將馬燧祿山陷洛說范陽守賈循傾其根本具肅宗末回紇還國所過剽傷為李抱玉典辦無敢譁者隴啟抱玉先備懐恩畢守鄭懐二州督農勸化州障吐蕃路八日代宗時汴將李靈曜反田恱助之燧擊走恱平汴州為鎮河東教厮養數月成精騎造甲為長短三等戰車威震北方將田恱輸穀時已料必反及徳宗時恱叛擊斬其楊朝光深入魏城大破之進平章事封北平王泚軍既薄魏與李抱真平兵進留功竟不成月朱亂赴難詔與渾瑊討懐光於河中不閱平平渾瑊遜不及吐藩結贊求盟燧盛言宜詣遂至凉刼盟吐蕃歸燧兄子弇以報徳帝怒奪兵貲甲天下先子暢益豐後為濠幸侵牟諸子至室廬自托為當世戒渾瑊年十一善騎射北後二嵗從破賀魯部勇冠軍從光弼定河從子儀復兩京為子儀邀擊吐蕃盡奪所掠退率家從狩奉天晟朱泚兵薄奉天血戰譙門賊進平章事李自東渭橋破賊瑊以西軍收咸陽朝廷待之與晟鈞禮司副馬燧平懐光為平凉㑹盟使僅以自免慕馬迁自叙著行記辭不一矜磾功髙而志益下拜賜如在上前方金日帝終始信待張孝忠本奚種餘史朝義敗以兵歸李寳臣阿統制易州十年威惠流聞田承嗣謂勞在焉冀未可啚立寳臣晚節殺戮諸將召之果不敢殺惟岳擅詔朱滔討之滔忌孝忠先説之歸國遂同破惟岳叛以定州置義武軍孝忠鎮之助後朱滔王武俊介二鎮聞感厲自守遣兵李晟收京師為嵗饑同粗淡此為將佐所感襲蔚州以擅興兵有司所劾只一失子茂昭能世其美見憲宗韋皋隴州偽作泚詔斬其將牛靈光西代張延賞鎮西川招雲南約束蠻以制吐蕃山等八國入朝進平章事五鎮蜀二十一年凡破吐蕃四十八萬牛羊二十萬器械六百三十萬帝製紀功碑即善討士婚嫁皆厚資之牋属官雖顯不使還朝署屬州刺史自蜀上暴叔文伾之奸是嵗暴卒鑱蜀人徳之見遺像必拜見刻石著皋名皆之侈横務蓋藏故劉闢階此以叛張建封少慷慨尚氣自許功名諭禍福一日降數千人代宗討蘇常盜前令狐彰辟置以不朝覲非彰用從馬燧伐靈曜多所諏訪州燧表其能楊炎欲盧杞出之希烈反為夀刺史斬賫偽赦之使堅柵拒之賊不得東趣江都以進濠夀廬觀察四鄙悦附常沮衂希烈李泌徐地重兵勁若帥又賢則淄青震矣薦鎮徐州由是徐為雄鎮來朝帝不待日召見使赴大夫班示殊寵之獻朝天行言官市蠲荅殘逋積負決無可歛蠲百姓無益帝矜問民逋故云帝賦詩餞還鎮當時所無年又賜以所持鞭曰卿節誼嵗寒弗渝治徐十一軍大治善容人過然徤黠亦未嘗曲法假之在忠臣感激下皆畏悦士往如歸許孟容韓愈其幕府病屢表請代建封子愔自知府事嚴震農家子團出貲助邊得為長史南嚴武以才署之興鳳練興利除害治行山第一治鳳十四年號稱清嚴逺近咨美馬斬朱泚使上遣張用誠以兵迎帝用誠幾反賴勛禽之入駱谷賴山南兵免懐光追襲間宰相請幸成都定䇿駐梁與李晟表合梁漢經安史流散震勸課有法民不煩擾而行在供億具改梁為興元命尹之王栖曜謹厚曹州善騎射浙一矢殞禄山將邢超遂破袁晁亂東生禽之收州縣十六李靈曜反犄角河南淮努士入遂不敢東希烈至寧安將襲宋驚江賊騎環合見其射的引去劉昌史朝義圍宋州説李岑屑麯以守得諫李僧惠應靈耀僧惠悟討賊故賊失助不逞希烈陷襄邑江淮大震昌守寧陵四十餘日賊敗去杜牧以比巡逺守陴斬生出五原斬逗留淮事者三百人日刧盟後城平凉二百里瘞刼盟骸七城二堡旬就在邊十五年三年而食美兵械鋭新劉昌裔䇿説邊將不售檄入蜀説楊惠琳順命上至陳許軍為曲環李納剴曉大誼留官説拒吳少誠賞縑認應賊者以功為陳州來韓全義討蔡兵敗投之使舍城外無恐少誠吏犯者縛送自治范希朝為邠寧將治軍嚴整韓游􅅛畏其才欲殺之後以代游􅅛曰非所以安反側固讓鎮振武虜人憚服曰必張光晟紿姓名來也討獨不納邊州駝馬之獻入朝獨不以事述職承宗老病不能成大功至善將或比趙充國鎮抬仯陀萬衆後用戰所有功突厥别部討無功李抱真從兄抱玉見代宗恩陷懐恩挺歸京師請以子儀領朔方兵懐果敗代宗鎮澤路練集民兵遂雄山東馬昭義步軍為諸軍冠抱真兼領之徳宗時與燧敗田悦於臨洛上幸奉天希烈陷汴李納反鄆懐光反河中抱真獨以數州横絶潰叛中為羣盜所憚馳入王武俊壁流涕説之大破朱滔喜士服孫季長丹求仙卒哥舒曜翰子汝光弼討河北請行因為之副希擊希烈收州斬周晃屯襄城苦戰破烈兵希烈自圍之甚急㑹帝幸奉天襄城陷拙統御鋭殺戮子七人以儒聞皆推第李景略直張光殺妻之獄若有女厲致謝門勸懐光殺朱泚䇿杖詣行在不聴慟哭出守豐州折回紇使梅錄將軍自此回紇使皆拜於庭威名顯聞對徳宗論奏衎有大臣風梅錄争坐大原聞景畧叱聲驚拜曰非李豐州耶約回紇南冦復拜豐州受降西城窮塞苦寒節用已糧械畢具聲雄北疆天下惜用其才不盡馮河清上幸奉天東向慟哭相勵以忠義使發鎧仗輸行在披堅勒兵軍聲大振上鎮涇原妄朱泚遣謙誅之斬以徇遂涇人𫝊將以叛卒拏與吐蕃遇害李元諒數日募兵萬餘屯昭應賊不得踰渭南泚使劉忠孝召還討希烈兵元諒斬之兵不得入闗故華州獨完盟與李晟收京師讓功於晟退避近郊平凉之與李觀密表裏以備虜騎乃解瑊得免修鎮隴右治良原墾田備涇隴以安韓游瓌子儀使破禄山所誘蕃兵五十萬天赴難詔屯渭橋遇泚歸衛奉天泚兵攻奉殊死戰火其戰棚諸將推赴難功第一懐光再書誘之上疑㳺瓌失兵馳入邠州斬張昕以聞與渾瑊分扼京西要險破泚於咸陽論功與瑊等皆第一元與瑊燧并力敗懐光圍蒲城懐光縊死與李諒取鹽州虜求盟既而刼盟於平凉又以勁騎備破吐蕃大回原杜希全子儀裨將砭切政病鎮朔方盟赴奉天州體要八章平凉背復城鹽二旬畢虜憚不入邢君牙從李晟討田悦功為最渭橋軍中便宜獨得豫倍道赴奉天君屯晟行邊常以牙守耕晟入朝代為鳳翔勸講戰吐蕃不能侵郝玼説馬璘城臨涇或言城之則邊防固無以䝉恩幸璘遂止段佑代復説之卒詔城之為行原州而玼為刺史自是虜不敢過臨涇金在邊二十年討賊不持糧虜道其名節啼鬼鑄玼募得玼者償之王䖍休澤潞李抱真以幣招不抱真卒正色語衆曰帥亡當稟命天子衆敢亂鎮昭義軍中大治増俸稟遣守宰就部中節用本殁後帑廩可支數嵗獻繼天誕聖樂後和樂此十子皆補大學李承代希烈鎮襄陽詳迫辱不屈謀殺希烈見代宗韓全義興卒伍佞事竇文場擢鎮銀夏詔以長武兵赴屯貪懦靳狎軍噪亂高崇文為定之吳文場監軍全義統十七鎮兵討少誠敗於五樓宦者匿之崔寧為利州賊遁去拓嚴武鎮劍南賂張獻誠求之以為漢州刺史吐蕃數百里郭英乂代武與寧相攻敗死劒南大擾代宗詔宰相杜鴻漸討之鴻漸受繒錦數萬入成都委以政而薦之寧因痛誅歛以結權貴上楊炎恐其難制因其入朝易鎮朔方赴奉天言聰明為盧杞所惑至此為之潜然殺杞誣與朱泚通之于頔鎮山南漢屢勝慕誠暴横有吞南志詳見憲宗忠義蔡廷玉與朱泚同里相狎餘幽州嘗勸泚獻馬禮士朝貢泚囚之歳曰悔乎曰勉公以義何悔朱復縶之滿嵗曰能省過乎曰殺我吾得名入與體㣲同為泚腹心常勸朝事㑹滔紿泚朝隨泚至京常折滔不順之請十滔表貶之廷玉既行曰我為天子不血刃下幽一城而敗於將成吾不可辱國自投於河符令竒田承嗣引為右職吾馬燧討田悦令竒使其子璘降燧曰兒行死不朽不行吾死尸疊逆地璘與父齧臂别降燧刑悦讓之罵曰吾教子以順何悔臨色不變劉迺少闇誦六經炎善文詞國語朱昱銓事遷草郭尚父冊楊盧杞當兵部五嵗不朱泚亂强召之稱疾篤佯瘖炙無完膚聞幸梁投床呼天不食死孟華責王武俊援田悦授稱病闔門謝客武俊僣王官嘔血死張伾守臨洛田悦攻之固守累月費糧盡無捄命女拜部將願賣之為衆士一日士皆哭無不一當百周曽為希烈將希與王玢姚儋韋清相善號四公子曽密以烈友計告李勉玢在許州曽引兵至汝州相應而儋清謀取希烈於内事覺皆見殺清亦迯張名振懐光侰受鐵券名振大言見賊不擊使到不迎將反耶朱泚入京城懐光引軍入咸陽又曰不反來此何耶見殺石演芬西域胡懐光假子以與朱泚連和謀告行在答懐光公負天子我何不負公胡人無慧惟知一事人懐光臠食之吳溆章敬后弟曉循循禮讓重朝廷知朱泚反盧杞欲求持節之者獨請行曰吾死無益而決見賊者人臣食其祿死難所也徃被害高沐李師道叛率其僚郭助郭航陳成敗屢諫之師道斥之濮州密表京師見殺助使航間道請李愿竒兵自海航後恐累助亦自殺卓行陽城求為集賢吏處讀書六年無所不通不以娶則間外姓雖共而益疏與三弟終身娶慕其行來學者接跡奴争訟者詣決亦避盜樹者受與弟負醉奴歸都兒化其徳方介饑不人食不受遺縑以與里人鄭淑塟親召李泌薦召之城封還詔泌為相又薦之徳宗拜右諫議常與二弟延客劇飲居八年莫窺其際死及延齡逐陸贄乃守延英閣上疏極論贄得不上欲相延齡又欲壊白麻哭於廷延齡得不相斥下廷國子司業遣諸生省親三年不歸者之出為道州在太學諸生何蕃等二百人闕下留之不得達州治民如家不以簿書介意俸餘炊米煮魚置道上使人共食罷貢侏儒州人以陽名子州當上考功自書撫字心勞觀察遣判官督賦自囚於獄府復遣官中道迯去何蕃太學嵗一歸父母不許二嵗一歸亦不許留凡五嵗慨然以親老而歸諸生共狀蕃文行之汙朱泚之變蕃正色不聴從亂故六館無受者居學二十年死𦵏無歸者皆為治喪孝友林攢為尉母老未及迎而病棄官歸詔作二闕母墓前表其閭隠逸孔述兄弟皆篤孝即既孤皆隠嵩山歸劉晏薦之代宗每一遷至朝謝而辭疾徳宗召為諫議賜第宅固辭不許集次地理志本末最詳退讓不忤物親朋燕嚴嘿終日令狐峘與同職抵侮不校時稱長者儒學韋彤治禮昭請省大廟朔望進食天寳所増陵􅃦火議遷寢山下皆不從陳京奉天聞叚秀實被害七日不朝宰相諫京非之還京以盧杞為饒州率趙雷等死争杞遂廢為大常愽士議祔獻懿二祖主於興聖廟而以太祖正東向位二十年始決議遷昭陵􅃦上待以宰相器欲用之㑹病狂易力討希烈財用屈與趙賛請税民屋架籍賈人貲以率代之其後李吉甫對憲宗召亂由此憲宗恨惋謂真賊臣暢當議太子為皇后服文學孫逖元宋時掌制誥知名子成兄病請告不待報即行户信州旱發倉賤售再朞増五千時不易縗接客時成兄宿代宗成孫簡憲宗三世掌制誥簡武宗時論班位劉太真晏曲江擇文人四十一人賡和上自第之太真李紓為上鮑防于邵次之在陳少游幕擬為桓文近禮部取士多貴子弟邵説陷史思明郊朝義敗歸子儀愛其才留幕府徳請建徽號赦褒徳録賢擢吏部自陳於宗劇在職以才顯乃或言將執政裴儆謂其事賊為官宥死不愧附權倖欲相邦其能久乎文藝于公異為李晟作平朱泚露布之與陸贄有隙不能事後母贄奏賜孝經罷李益揆族子賂詩名與宗人賀相埒下每一篇成樂工争以求征人早行篇天為盡圖防妻妾苛嚴世謂妬為李益族宗召之負才凌轢衆不能堪不得調怨語姓憲時在朝有同名者故世稱文章李益以别之徳韓翃善詩亦有同姓名徳宗使典制誥宰相問宗曰詩人韓翃盧綸進士不第元載以文進韋渠牟表其才見禁中與王縉善不得調帝使賡詩從渾瑊河中召之已卒四大厯十才子文憲宗訪其文文宗愛其詩子皆擢進士宗時在臺閣錢起與郎士元齊名時語曰前有沈宋後有錢郎司空曙從韋皋於劍南歐陽詹泉州人進常衮為宰相始勸閩越人仕進崔閩人第士自詹始與韓愈李觀李絳羣王涯馮宿等聨第號龍虎榜辭孝友信義文章切深韓愈為哀李賀宗室七嵗韓愈皇甫湜過之作高軒過嘔毎旦騎弱馬小奚背古錦囊投所得母謂出心乃已昌黎作辨樂勸舉進士終不肯辭尚竒詭絶去翰墨畦徑府皆合之絃歌為拹律郎卒年廾七李觀文不旁沿前人理時謂與韓愈相上下陸希聲謂觀辭勝理愈勝辭愈雖窮老不能加觀之辭觀雖後死不能逮愈之質華從子吳武陵吳少陽招不就度擒元濟之法遺書勸元濟歸朝六啓裴望黄白氣知元濟十日必亡諫竇易直置和糴貯備使言别置使之弊與為崔郾誦阿房賦牧得異等韶州以贓貶栁宗元俱謫寓永州書請裴度使人代宗元於栁州使優游又遺孟簡宗元斥十二年殆半世矣方技桑道茂善太乙遁甲乞相州圍中知九節度敗状以奉天有王氣高垣堞先求李晟凖赦之判後得貸死居豫言年號元和冦盜翦滅云所居柏甚茂曰人而木蕃者去之李泌傳初肅宗重隂陽巫祝用王璵執改興造輒牽禁忌黎幹以佐道位京兆為乘輿物焚之以為禳禬至徳宗罷内道場除巫祝修宣政廊不避魁罔使靈駕直午及道茂奉天之言驗始尚日時拘忌而李泌又好鬼神之説宦官竇文場霍仙鳴朝恩死宦人不復典兵禁衛盡委白志貞志貞納冨人金補軍收其庸而身不在軍及涇師亂召近衛無一人山惟文場等率宦官及親王左右從至奉天自南還詔二人分總神䇿軍權震朝廷宦官復盛矣藩鎮魏愽田悦承嗣以諸子弱使繼鎮部激怒洪經綸所罷兵出家貲紿之使還魏人徳悦李正已説之同叛因與梁崇義阻兵馬為李惟岳李納求節度不從合謀同叛屢敗於燧求救朱滔自稱魏王上㑹上幸奉天燧還兵罷已滔約舉兵南向不從遣孔巢父宣勞之時衆厭兵莫不欣然悦弟緒手殺田緒承嗣第六子凡詔為節度人尚主猜忌殺兄弟數暴卒子季安嗣田季安公主薨始自恣前後見代憲宗鎮冀李惟岳求襲位田悦為請亦不許遂與悦正己拒命詔朱滔張孝忠討之屢敗困甚之欲歸京師懦不能決為悦所持京王武俊縊殺惟岳之叛弟惟簡奉母鄭奔師上幸奉天母鄭督惟簡赴行在從上討賊有功圖形凌煙王武俊本契丹部不與張孝忠齊名𨽻宗敗帳燧既殺惟岳怨得節度與朱滔叛馬討田悦之師紇自稱趙王復李抱真使賈林説降之滔結回將趍洛林説武俊與抱真相結遂大破走滔軍瑊上賜徳𨽻二州子弟襁褓皆官之沒如渾故事謚忠烈以子士真襲王士真息兵善守魏嵗數十萬緡北燕為恭盧龍朱滔與張孝忠討惟岳取深州怨不得深州與武俊同叛救田悦衆不肯従殺之而南堪與悦武俊相王而自稱冀王盟主武俊等不能背之大敗於李抱真上書待罪歸鎮邑邑病死劉怦滔病已委之滔死軍中推之纔三月死子齊襲鎮淄青李納袐父喪以兵㑹田悦烈為馬燧所破畧盡納欵不聴遂與希武俊等連和稱齊王命帝下罪已詔遂歸破希烈於陳州李師古納子徳代鎮與武俊相攻宗諭平之欲乘徳宗喪攻掠州縣聞順宗立乃止憲宗初卒横海程日華張孝忠絶李惟岳使諭滄州朱滄州軍殺刺史李固烈而迎立之滔武俊招之不從横用李寧之言歸朝廷徳宗子即滄州為海軍詔嵗饋義武錢糧懐直權知留事上因授之荒請析滄州置景州升為節度使鎮之入朝獵不返帳下程懐信因衆怒拒之不得返遂入朝程懐信詔因鎮之年子權襲正軍名初置於開元十三至徳宗元三年為鎮宣武劉元佐本劉洽州少犯法幾死亡命宗襲取李靈耀宋李勉表為刺史徳以為宋毫穎節度李破李納攻徐州李洧之兵通東南漕運數困希烈走希烈取汴州加汴宋節度有州四治汴母賜名戒豪縦輕財故汴彌驕自李忠臣已然賢常盡臣節施金帛相國寺為倡而籍之謀飾女子與李納得其隂嬖妾酖之劉士寧元佐子尊上從軍中所欲以吳凌為節度未幾軍中士寧留後上命授之滛酷下厭苦大將李萬榮寛厚得士心因其獵閉門拒之奔京師李萬榮藉驕兵防秋當戍者怨韓惟清等作亂以故衆不安萬榮以為士寧所教上為斥之郴州而使萬榮代鎮代㑹病死鄧惟恭執其子送京師杖殺之而董晉鎮此鎮初置於徳宗建中二年四凡傳世彰義吳少誠度梁崇義必叛李希烈為表之烈希烈叛為盡死力陳仙竒既殺希代鎮淮西少誠又殺仙竒代之詔因授申蔡光節度子有州三治蔡申蔡自希烈習暴掠恬戰鬬騾軍尤悍鋭乘曲環死圍許州上怒以十六道兵討之宦人監軍未交而潰韓全義復討又退敗於五樓年韋皋請討上遂赦少誠末此鎮本肅宗乾元元所置淮西節度使代宗號淮寧尋改為申蔡光徳宗正元十四年號彰義叛臣周智光騎射從軍朝恩薦之恣鎮同華廷破吐蕃回紇十餘萬於奉天因殺掠朝召不至陜州監軍責之斬監軍刼留天下貢漕侯代宗授左僕射恚不得平章事欲挾天子令諸詔子儀密圖之聞子儀來其衆大攜既降為帳下所殺梁崇義業槩量與力能舒鈞輔事來瑱衆推之代鎮襄陽田承嗣等車相依明法禮士以自振頗或諷入朝對以來公有大功見旌遣希烈請討懼徳宗流郭昔上變遣李舟又盧翰諭之又拜平章封妻子又遣張著召之皆不納詔希烈討之勢窮赴井死李懐光為朔方部將積勞至開府其子儀以紀綱委之徳宗罷子儀副元帥分所部故懐光得為寧慶晉絳慈隰節度平扼吐蕃不南侵方楊炎使亷帥涇原城原州劉文喜遂鎮朔而領邠寧泚奉詔助討田悦急赴奉天奮厲軍士倍道進敗軍泚圍奉天方解去盧杞沮之不使見帝詔屯便橋遇恚恨不出戰遂叛至河中首上使孔巢父召之害馬燧渾瑊討之部將斬以獻上念其功立嗣禮𦵏陳少游習老莊諸儒推為都講辟長權變賄賂幸得致遷不樂逺從李抱玉謁宦者董秀請為嵗輸錢五千萬先具其半入之節又先賄元載之子故内外更薦之遂累遷淮南度厚賄元載宦者久其任載失勢隂疏其短代宗以為忠百以朝廷經費不足請増本道税錢二百鹽斗加錢度支因行之諸道李納拒命出師收徐海復棄之徳宗幸奉天刼包佶取揚州財賦八百萬希烈䧟汴送欵希烈表又結李納後得其歸順希烈羞悸死李錡賂李齊運得浙西觀察諸道鹽鐡轉運積竒寳獻徳宗恃恩驕恣專天下酒漕國計日耗崔善正上書言之械而瘞之雜胡號蕃落徤兒稱錡假父募善射號挽硬募為鎮海節度益踞暴素憲宗不假借方鎮三請覲詔以李元代遂反張子良等送京師腰斬李忠臣本董秦蕃肅宗時禦安史平東都有功靈代宗時吐犯京師召兵獨先至敗李曜徳走田悦言李希烈逐之釋逃歸京師奉朝請驢宗納其减張涉贓罪辛京杲死罪對耳大龍耳小喜其野而誠泚然失兵拂欝朱泚次奉天為居守賊見斬逆臣李希烈遼西人忠從李忠臣於淮西軍中高其才乘衆怒逐臣代宗命専留後事徳宗就拜節度名其軍為淮寧密治蔡州取平梁崇義功多欲得其地李納叛約納計汴又約宋滔田悦武俊相王而自稱建興王天下都元帥五賊株連半天下南陷襄城北取汴州遂僣號州劉洽將髙彦昭大敗之寧陵醫洽又敗之取汴遁歸蔡州其將陳仙竒令毒殺之竇艮女薦仙竒與共圖之上即拜仙竒節度少誠殺仙竒代之矣朱泚外寛中狼與弟摩下故得衆心滔並李懐仙將入戰所得分鎮盧龍滔紿朝奪之代李抱玉鎮鳳翔復代段秀實兼鎮涇原令滔約叛書為馬燧所獲召還京師中人監之姚言率涇原兵救哥舒曜希烈圍之襄城過闗兵變擁泚僣號逼奉天渾瑊韓游大敗之泚回京城李晟復京城走走涇州不納走寧州亦不納彭原其下斬之順宗以疾即位王叔文王伓李忠言等用事於内韓泰栁宗元劉禹錫等來聴於外汲汲如狂道路以目大抵叔文依伾伾依宦者李忠言忠言依牛昭容韋皋等上表極言叔文等姦惡上亦惡之遂傳太子史臣謂在東宫二十年天下隂受其賜惜乎寢疾而又能傳政元良賢哉亦赦逋負罷宫市五方小兒月進在位凡二十月賈耽叔文干政移疾去鄭珣瑜中書㑹食韋執誼輟食與王叔文同飯喟曰吾可復居此乎取馬歸卧不出范氏謂二人引去為知恥方之杜佑高郢有間並詳見徳宗韋執誼以便媚幸於徳宗與延齡等等帝誕日太子獻畵浮屠使賛誣韋成季朋比逐之叔文擢相順宗時異論示非黨叔文怨之南憲宗貶崖州知禍及聞足聲輙驚悸畏見嶺圖始令史官撰日厯王伾杭人以書待詔文太子宫侍書為闒茸貌陋上襲寵之不如叔任氣好言帝所禮出入無間勝叔文門叔文入止翰林伾至翰林院見牛昭容等若沸羮尤通賕謝貶死王叔文山隂人以棋待詔某侍東宫時言言然故重之肆言某可將可相欲速進者争附上病牛昭容宦人李忠言侍伾因忠言薦之昭容遂自蘇州司功為翰林學士伾傳受叔文裁可授中書執誼作詔施行宗元禹錫等倡譽以為伊周􅍀謂天下無人用杜佑領鹽鐵自副之而専其政權宦人俱文珍罷其學士遂衰憲宗監國貶誅劉禹錫交叔文與宗元皆議禁中號二王劉栁竹竇羣劾其挾邪亂政憲宗立貶朗州作枝詞罷宰相哀其才欲用㑹程異起刺逺州任武元衡之作問大鈞謫九年等賦久之召南省郎以𤣥都觀桃詩譏忿出播州裴度以母老為言遷連州徙䕫州因學校廢言州縣學丁祭始許敬宗今天下嵗費四千萬徒資獻官飾衣服貽妻子於學無補請以其半𨽻州修學其半歸太學由和州為主客郎復作𤣥都觀詩快權近人益薄之為集賢直學士裴度罷亦出蘇州以政最賜金紫豪恃才性褊晩益偃蹇寡合詩晩尤精居易推詩其詩在處神物䕶持武宗時卒病中為子劉子𫝊自解稱叔文王猛後有逺祖風實工言治道宫掖事泌建桓立順功歸貴臣由是及貶栁宗元祖奭得罪武后卓父鎮觸竇參貶欲宗元少精敏絶倫文章偉精緻叔文大用之文憲宗貶永州司馬自放山澤㮒厄感鬰一寓諸倣離騷與蕭悗許孟容書倣任安書衆畏其才髙懲乂復進無用力者和久泪文益深著貞符禹不得召作懲咎賦元十年徙桞州刺史而錫得播州念禹錫母老欲與相易士為栁人贖男女資錢過期沒為奴婢者南方走數千里從游指授為文辭功十四年卒世號栁栁州四十七少時嗜進謂名可立就名蓋一時韓愈評其文雄渾雅徤似司馬子長池栁人托言降於州之堂廟於羅陸質本名淳憲盡傳趙啖二家春秋學解執誼㧞進之侍讀宗於東宫執誼使伺意釋上輒怒曰陛下命先生為寡人講學何他及通叔文未敗已病故免禍門人以能文聖人書後世謚文通先生李景儉時為二王死友者執誼宗質韓曅韓泰陳諫元呂温禹錫而凌準程異出入之温亦以出使免禍見憲宗者世號八司馬者指質以下八人然敗而貶司馬伾曅泰諫宗元異衛次公與鄭絪定立順宗虢叔文弄權多所持正萬貢學斥華取實州蠲横租錢嵗三百罷李勣徐有功孫負不得調即優補遣進時數請討蔡兵憲宗將相之而徤至善琴微李齊運求授其子拒之因終身不鼔操尚終始完潔楊於陵節操堅明詳見憲宗李建客荆州鄉人争鬬不詣府而詣建順吏部當補校書者八人獨不藉貴勢以請宗時知制誥宰相有竄定槀詔者亟請解職屋叔文欲更李師古詔不可通顯不治垣清儉稱宦官劉貞亮忠疆立平凉刼盟被執逃歸等與叔文争論勸太子監國召鄭絪草制監高崇文討劉闢斬東川節度以専悍見訾寵憲宗不寵假宦官貞亮雖有功終身無所假藩鎮同代宗古今紀要卷十二
