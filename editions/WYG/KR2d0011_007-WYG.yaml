body:
  text: 古今紀要卷七宋黄震撰北朝魏自劉元海首禍五胡亂華百有餘年徃徃迭興迭亡不過一二世而止至拓㧞氏承慕容之衰取幽并明元大武繼之東兼青兖南包荆豫北踰大漢𫝊之子孫百有七十一載與晉宋齊梁陳並立而爲南北而史籍行於中國焉今觀其史徃徃自陋其所出而過爲文餙之辭若曰黄帝子昌意少子封大鮮卑山因以爲號黄帝土徳北俗謂土托謂后跋故以爲氏其裔仕尭逐女􅔨於弱水積六七十代有成帝毛者統國三十六歴宣獻至聖武帝有神獸引居匃奴地帝名詰汾㑹天女生神元名力㣲依竇控弦二十萬遷定襄與三國之魏和親思帝名弗政者没而國分爲三居定襄者與晉分界名穆帝猗盧復一統其國助劉琨破白部大人及鐵弗劉武晉懐帝以爲代公愍帝進爲代王平文帝欝律者立大破劉武於朔方絶劉曜晉元帝使韓暢加爵亦不受子昭成帝什翼犍者立符堅大破之避隂山北髙車雜種四面冦抄復度漢至雲中其孫珪立爲道武道武珪即代正位徙居定襄之盛樂務農息民國人悅之尋改稱魏登國元年晉孝武大元十年叛後燕慕容垂侵通附塞諸郡燕來伐珪擊破之十年自晉陽開道趨中山攻燕垂子寳常山以東皆附焉後攻燕信都亦降攻中山又破之皇始元年晉二十一年始建天子旌旗取并州建臺省置刺史郡守尚書郎以下官悉用儒生爲之皇始元年遷都平城始營宫室建宗廟社稷三年命鄧淵立官制協音建董謐制禮儀王徳定律令晁崇考天象崔宏摠而裁之二年珪即帝位始倣古制定郊廟朝饗禮樂天興元年晉隆安二年也置五經博士増國子太學生三千人大索書籍元年置六謁官凖古六卿又官名多倣上古龍官鳥官元年帝爲次子紹所殺天錫元年即晉義熈五年三十九明帝嗣聞劉裕伐秦欲将兵直擣彭城夀春崔浩謂屈丐柔然窺伺國隙不如靜待因欲論王猛慕容恪劉裕爲人及屈丐必亡之状帝大悅泰常元年晉義熈十三年泰常元年南朝爲宋下河南青兖諸郡七年宋永初五年攻宋洛陽㧞之兖豫皆平八年柔然冦邉築長城二千里備之八年宋景平元年云大武燾即佛狸也伐統萬夏衆大潰赫連昌奔上邽後擒始光四年四宋文元嘉年大破柔然蠕蠕也徙柔然髙車降附於漠南竟三千里討凉州自雲中濟河阻渠牧使降宋到彦之取河南帝以洛陽虎牢等四鎮兵少歛戍而退既而復定河南宋王元謨圍滑臺魏破之進攻彭城不克引兵南下直至淮上起行宫於𤓰歩山凡破南兖徐豫青冀六州掠居民焚廬舍而去太平真君十一年宋永嘉一十七年爲常侍宗愛所弑始舉逸民盧𤣥崔綽李靈髙允等崔浩更定律令降四嵗五嵗等刑又置登聞鼓既克凉州用凉人索弊隂異等敞爲博士誨道多成立又常爽置館教授儒風始振除田禁以賦百姓髙允請命崔浩綜吏職髙允張偉參與著作太子總百揆勸課農桑於是墾田大闢存合祀典者五十七所餘悉罷亡從崔浩請悉誅天下沙門毁經像魏境廟塔無孑遺浩不好荘老而信道士冦謙之上書賛明爲起天師道場羣臣請増京城宫室帝謂在徳不在儉又以射者軍國之本不可輕廢帝知人明賞罰公将帥違其節度者多敗然性殘忍果殺往往復悔以崔浩脩國史暴楊國惡誅之太子晃好經史及監國使百姓有牛家以大牛相貿又禁飲酒稱戯棄本沽販者於是墾田大増年二十四卒文成濬復興佛教親爲沙門下髪立爲道人統設酒禁郭善明説帝大起宫殿髙允諌而止以允爲郎二十七年不徙官拜尚書令制戰陣法有飛龍騰蛇之變初太武經四方國頗虚耗帝静鎮之懐集中外民心復安獻文𢎞年十二嗣位立馮太后臨朝宋朝太始元年開酒禁初立郡學髙允李所請太始歸政始親政賞罰嚴明㧞清黜貪牧守始有以廉㓗稱者魏制前政選吏以待後人今制守帥到官自舉人望圍宋東陽三年㧞之青冀之地盡入焉以民疲於賦役立三等輸租法上輸平城中他州下本州雜役悉罷之置僧祗户粟賑給貧民於是僧祗户粟及寺户遍於州鎮帝聰睿果斷而好佛老常有遺世之心乃傳位太子自建鹿野浮屠居之詔勸農桑守令能静盗者擢太守刺史延興以後不復有赦爲馮太后所鴆孝文宋延興元年受馮后既鴆獻文復稱制班百官得贓滿一匹者死外戚李洪首以贓敗於守宰死者四十餘人然吏民犯他罪者悉寛之樂非雅者除之焚圖䜟祕緯均田立鄰里黨三長定民户籍改課調法民始愁怨後以課調省費堦安之制五等公侯服帝初法服輦大􅆏開倉賑貸聽民出關就食罷無益之作出宫人罷尚方錦綉之工出御府内庫外府物班臣下及貧民詔李彪崔光修國書改編年為紀傳表志馮太后殂始得親政十四年更令律令於東明觀親决疑獄簡置樂官使脩其職命髙閭參定十五年祀明堂登靈臺觀雲物降居青陽左个布政自是每以爲常飬老乞言十六年歩騎三十萬南伐至洛陽羣臣稽顙馬前乃止遂定遷都之計定考課法三年一考分優劣三等親臨明堂黜陟百官皆面數其過而行之置牧場於河陽使宇文福掌之蓄馬蕃滋禁胡服十七年大舉伐齊以齊民自立也詔淮北人不得侵掠帝度淮至夀陽民皆安堵至鍾離爲蕭衍所破而還及文武百官盡遷都洛陽如魯祀孔子封其後詔斷北語求遺書立太子太學四門小學於洛陽定圓丘引諸儒議論遂祀之後一年又營方澤於河隂謂莫肯公言得失可歎始命鑄太和五鐵錢用之十九年改姓元姓重復者改選舉多取門品李冲等諌不改大旱三日不食雨二十年二十萬南討大破齊於沔北二十一年齊來伐帝自將擊敗之聞齊䘮班師二十二年齊陳顯逵攻䧟馬圈戍帝親破之收我資億計疾甚至榖塘殂年三十三性寛慈好學詔䇿皆自爲之好賢樂善精勤庻務制禮作樂欎然有太平之風武宣恪年十六不能親决趙邕髙肇等用事魏浸衰罷鹽池禁爲富強所專復收之營繕國學茂異孝亷愈衆好晏樂疎宗室復罷鹽池禁甄琛議元蟬盧昶有寵暉爲吏部尚書用官皆有定價謂之市曹梁蕭宏來伐中山英擊破之英進圍鍾離梁韋叡敗之尚釋氏於式乾殿講經逺近承風無不事佛比及延昌州郡共一萬三千餘寺孝明胡太后臨朝于忠専政太后作永闕寺土木之美前此未有梁天監十五年多竊冐軍闕請置勲簿復禁鹽池太師雍議張彛子請闕格羽林席貴相率焚其弟殺其父子大闕者知其将亂矣崔亮爲吏部尚書闕問賢愚専以停解日月爲斷選舉失人自此始元义劉騰作亂幽太后及帝遂專政梁普通元年故六韓棱陵叛六鎮盡附之初李崇請改鎮爲州以慰之不從至是詔改已盡叛矣朔方胡反源子雍平之胡太后再臨朝誅元义時元法僧反稱帝普通六年方事西北二荆西郢郡蠻反引梁将圍荆州七年葛榮反自號齊梁大通元年時征伐不息豫征六年租税人入市者稅一錢邸店皆稅胡后再臨朝以來嬖幸用事盗賊蜂起討城有功朝廷憚之三年時鄭儼徐紇得幸太后髙歡說榮誅之帝亦詔榮内向太后遂酖帝立臨洮王子釗榮與元天穆起兵沉后及少帝于河立壯帝孝荘子攸北海王顥以爾朱榮之亂奔梁至是梁送入洛帝北走避之榮攻敗顥帝還洛陽梁中大通元年帝勤政事數覧寃獄帝宻圍榮遂手刃之榮弟兆帥兵渡河立東海王􅁮爲帝遂入洛執帝殺之爾朱世隆又以東海王無人望廢之立節閔節閔恭立而髙歡起兵信都以誅爾朱爲名别立勃海太守元明爲帝帝遇弑廢帝朗髙歡既敗爾朱帝自以疎逺請遜大位而孝武立焉孝武修髙歡使斛斯椿求帝於田舍而立之帝畏髙歡之逼乃入關依宇文泰於是魏分東西都雍州孝武之在洛也令婦人詠等而從妺不嫁者三明月者其一也既入關宇文泰取明月殺之帝不悦遂爲泰所鴆文帝寳炬從孝武入關泰立之泰爲相酌便時者三十四條新制行之大統元年梁大同元年泰同蘓綽參機宻綽制文案程式朱出墨入計較户籍之法後多遵用泰同周恵逵唐瑾損益舊章禮樂稍備泰欲為經國富民之法蘓綽賛成之减官貟置二長幷置屯田以資軍國又為六條詔書奏行之初置六軍更權衡度量命蘓綽損益三十六條之制頒行之擇守令皆用新制數年間百姓便之泰欲革文章浮華之弊命蘓綽作大誥示羣臣令文章依此體置八柱國泰及元欣李弼李虎于謹等爲之始籍民之有才力者為府兵分二十四軍置十二大将軍統之右軍國之政泰率兵伐東魏大破髙歡于渭曲乘勝據有洛陽二年梁大同三年髙歡復攻取洛陽四年王思政舉韋孝寛鎮王壁髙歡攻之不克遁歸十一年歡死其司徒侯景據頴川率河南六州内附十二年戰右東西立事在位十七年殂子欽廢帝欽泰有圖江陵之志梁王詧立益重其貢二年不立年號泰作九命之典叙内外官爵改流外品爲九秩帝謀誅泰事泄見廢恭帝郭欽弟遣于謹宇文護楊忠伐梁執元帝以荆州立詧爲後梁元年泰依周禮建六官自餘並倣周禮泰死子覺爲周公護請禪于周梁敬帝太平元年東魏孝靜善見孝武既入關髙歡乃奉之遷鄴天平元年梁中大通六年西魏來伐失洛陽四年歡復取之大象元年歡死子澄代領其衆侯景據河南叛慕容紹宗擊敗之右用兵事歡子澄典吏部始改崔亮年勞之制銓擢賢能元年詔羣臣於麟趾閣議法爲麟趾格行之自東西分裂河南州郡鞠為茂草歡命諸州濵河及津梁皆置倉積榖以備供須又於幽瀛滄清四州煑鹽軍國粗給至是大稔山東之民稍息三年右軍國之政帝美儀容好文學從容沈雅時人以為有孝文風烈髙歡事之甚恭至澄倨慢帝謀誅之事泄為澄所幽蘭京殺澄弟洋代領其衆洋封齊王帝禪焉武定七年年西魏十五衛操事晉衛瓘歸魏桓帝任以國事劉庫仁媿外戚道武少依之子顯謀逆道武殺之奚斤世牧馬宋為道武典兵歴事明元大武督兵取青兖司豫州累破赫連燕鳯使符堅善對部道武㓜説符堅懿分劉庫仁鉄弗衛仁為二明元初與封入侍講論出議政事云崔宏曹魏司空林六世孫十事道武議國號稱魏制官儀音律遍署三六曹獨不受清河王紹布帛政明元初與長孫嵩等共聽時號八公約儉子浩上書道武救明元欲遷都飢浩論不可但簡民就食守知熒惑入秦姚興當亡料劉裕克秦必不能論王猛符堅之管仲慕容恪慕容暲之霍光劉裕司馬徳宗之曹操因熒惑出入知裕簒晉因災異請建儲諌伐宋䘮赫决䇿伐赫連昌擊連定遂平平京讃伐蠕蠕辨止伐宋請先請擊牧徤凉荆水草勸誅沙門武除羣小祀惟尫纎懦弱胷中所懷過甲兵太左右忌之疑議得召注易詩書論語寅論老子非􅆅所作上五元厯言古人多誤著論太初至秦漢過自比張良謂博學之詔研精經術練習制度凢朝廷制度禮儀軍國書無不關掌明識天文好觀星變酢鋌畫紙老大整流品明示族姓由是得罪於衆石不信佛而信冦謙之道術刻所撰國史於北人忿恚共譛誅之張衮道武創業以求謀見任好破蠕蠕劉顯賀訥等闔門執經士無倦弟恂參預宻謀白守廣平常山勸農桑建學禮儒訟清仁恕當時第一孫萇賜牛息長孫嵩與奚斤等號八公請立大武長孫道生掌道武機宻障泥數十年平赫連切邀檀道濟其皮比晏嬰責子弟毁宅長孫紹逺十一强記取浮圖鐸諧黄鐘始陳雅樂行之以八為數裴正欲用七紹逺争黄鍾不可廢于栗磾襲慕容寳向劉裕伐姚泓遺書假道有黒稍将軍所無前謙虛下士平刑聲于謹屏居稱台鼎之位須待時來釋單騎入西部鉄􅀈欵附者三萬自到榜下廣陽王之謗後從宇文泰勸泰都關中挾天子令諸侯事見周類王憲道武以王猛孫厚待之身本田齊化秦滅齊田氏因稱王家守上谷清率下風大行曾孫昕晞等皆風流醖藉世號王氏九龍封回守安州變父子賔旅同寢一室子之俗責鄭雲問安州治生隆之事五朝謹素軌回族叔自修潔措儒雅肇髙綽謂舉不如議明堂務不送迎髙回戒德謹訓遠佞防奸古弼明元賜名潔謹宻宫讀書不輟事平决池劉太武使與劉為東四輔參政敺摶樹必弱馬供獵受太武欲發牛車運鹿知筆公不與伐楊文德黄金文成殺之劉潔自專用信卜繫鼓却軍䜟止伐蠕蠕不而沮謀求圖夷三族伊馥拽牛却行讀議凉州水草與崔浩同浩謂何必書清約舉大綱薛彪子剛簡為與尉元平徐兖州為徐州刺史興屯田政惠愛兵民懷之魏孝文信其不與江南通子琡奏改崔亮停年格請三公薦賢補郡縣皆不行無操行尉元鎻統萬得夷人心帖威名夙振為討新附反側東南清晏遠近然請名孝文三老宋弁使齊知蕭氏不能貽謀之蕭子良王融謂蹇諤不及李彪而閑雅過銓量士族矜伐宋飜有操行為為洛陽令執王壻威振子京師及洛陽河南尹畏權勢世良守清河陽平移掩盗三千餘人無送十二餘皆放之盗奔他境郡一清徹底世軌為廷尉多雪南臺囚理死諸囚皆哭執伉紏刁癰晉刁協曾孫流以伯父達城縳劉裕奔姚興歸魏招散置營造號刁公城李冲議置與定民户籍改課調法貴更定律令服久處闕孝文情義無間舊戚臣莫不心謹宻㓂讃姚泓滅讃歸魏至在雍州十七年流人襁負無不甚得公私之譽毛脩之晉司馬從義真没於統萬大武戰獲之因云聞陳夀曾為武侯所撻故短武侯崔浩譏武侯李先對道武書籍可益神智為明元讀韓子兵法等對太武討姚興之計道武所親侯故明元令宿内備顧問㓂雋訪主還一絹親守梁州立學勸耕四部書以属四百口歸西魏清苦端集容止詳音韻明朗明帝前膝陸俟考為天下第一事持蓋呉二叔詐斬劉超歴趙武至文成陸馥守相州清平百假子發奸友待卜善詢政孝簡取位至貧抗言定文之陸凱在樞要十年以忠厚稱之守正平七年號良吏子暐恭號䨇璧酈道元為郡嚴猛盗避他境無在荆州以猛為蠻所訴免為御史中尉所討正聲望更損然亦能誅汝南王悦嬖近邱念而劾悦厲城陽主忌之使為關右大使蕭寶寅殺之叱賊聲而死注水經論然不能篤睦時薄之源賀秃髮傉䆄子宥招下鮮卑三萬餘落遂平凉州諫濫刑死刑戍北藩守冀州清簡寛裕為上第秋為十二陣圖殖請募勇禦邊省冬講武春種子思禮行北邊賑貧考殿最告元尼湏以今日故人明日公庭東萊謂此刻薄枉滯見申日百數事諫流逃吏蠕蠕亡遁司馬楚之晉子孫劉裕遣刺客不忍害失驢耳知蠕蠕至劉昶宋義陽王廢主疑之委母妻擕妾歸魏鎮徐州而内外奸雜魏奉之攻齊蕭寶寅齊明帝子梁興歸魏時年十六請伐梁勇冠諸軍大敗削爵尚宣武女屢破梁乞考課依周禮反西征秦州天生保全僕中大敗得罪遂又敗奔萬俟醜奴被禽賜死蕭大圜梁簡文子侯景亂歸梁元帝與之降魏閑放隋開皇年卒於西河守盧𤣥諫崔浩分民族昶使齊失節寛昫山大敗其在徐州和矜恕盧潜在淮南十三年陳人憚之盧辯注大戴魏制儀物在繼蘇綽成官制周官制其傳髙允嘗為沙門服擔笈千里月言漢五星聚東井之繆崔浩嘆知以前三聚雖明歴數而不推歩問游雅問灾異答以不如不知天下妙理至多何此答太武以一里為田三百七十畆百里三萬七千頃畆損三升為二百二十二萬斛遂除田禁授百姓崔浩固請以數十士起家守郡允知其不免之以閔湛等謟崔浩刋國史知難作景穆欲宥而對帝與浩同作以直得免又待為詔惟浩夷九族餘百一十八人免其族事文成之立有功不言諫景穆營利類災異諌宫室已論風俗五異七文成幸其第草屋布被鹽菜而為郎二十年不遷游雅謂四十年不見喜愠始長揖宗愛學文成呼令公時參大政請郡國立葺召公廟献文歎臯陶之後英六先亡英布猶有刑之餘釁厯事五弟帝出入三省五十餘年未嘗譴咎信佛從祐對孝文水旱乞旌賢佐政問盗乞選守宰守西兖風化大行昻字敖曹毎祐從子言男兒當横行天下誰能端坐讀書五刼掠鄉閭髙據信都起兵五百人敗爾朱羽生千人迎歡從之大破爾朱兆戰酹河神自稱地上之虎與宇文問死祠像傾裂盧曹髙歡令與敖曹為一曹恥之愠而入海乃力能抜樹蠕蠕㓂范陽投弓示之虜莫能挽去之崔伯謙守濟北皮鞭示恥囚鉅鹿十年獄無停崔楷死守殷州何崔公尚不惜百口我愛一身李孝伯初辟主簿月餘還家賊守趙郡令行禁止暢并州丁零不敢入還死鹿與宋張應對如流國太武謂孝伯足理天下重崔浩後軍謀謨咸出之朝野推李謐孝伯兄子著初事孔璠璠還請業舉明堂制度論徵拜作佐郎辭以授弟辟皆不就卒琴書為業誦愛樂山水悠然忘歸德年三十二璠等上書其學行表其門曰文里曰孝義子士謙博覽羣籍孤署擢皆不就至隋有天下畢志不仕少未嘗飲酒食肉貸粟饑年為糜盗飼犯木牛輪廻辟刈禾信佛辨游雅矜誕凌獵史輕髙允亦國史無所成䧟陳竒謂才業髙允之亞游明根牧羊雅贖之官太武歎其敬謹禮使宋孝武稱其長者五十年仁和讓太武五更髙閭少為車子送租崔浩竒之使為表由是知名髙允以問文章富逸舉自代由是献文委以機宻一詔令等皆其文歩上孝文為國五要請築長城月一夫可築三十萬人一月可城千里請給禄文諫襲柔然喪參定雅樂充與游明根李彪歡孝不必三年貪偏為二州亷謹宋繇户門傾覆衘膽自厲宋游道殺叔父奴剛直疾惡見人犯罪皆欲置之極法與臨淮王惑髙隆之忿兢卒為隆之所誣剛妓禁不肯脫枕謙自悔太戒諸子以柔和遜江式善蟲篆詁訓慎上表論字學甚悉以許説文為主王慧龍晉人愉之孫家為宋武所誅歸魏宋破王元謨守榮陽十年到彦之所憚文反間不行不捨刺客終身參吉事鄭義參元右軍事孫攻張超祖述父守兖州稱大鄭公小鄭公歴十二州郡皆有惠政當琴妙時薛聰間室矜莊孝御史不避彊禦文心膂薛孝通事節閔二職掌内外中推薦朱薦賀㧞岳與宇文泰人同鎮關而爾天光敗節閔遂不得入關為髙歡所幽坐止賀㧞岳不入朝已後孝通入朝歡知之引為客訪文典大事而奚康生彎弓十石弓破蠕蠕箭破齊將餘殺辛支工梁送八尺如笛之平挽有祈雨不應鞭石季龍像取西門豹舌欲殺元义為其所殺楊大眼􅀈捷善走善繋三丈䋲走䋲直如矢六軍妻騎射攻戰常戎裝齊鏕勇冠隨中山王英敗廢為兵虎宣武再用觀者如市字止兒啼守荆州斬蠻不敢為㓂不多識崔廷伯取車輪為橋破折莫天生虜梁將趙祖悅而死敗於萬俟醜奴裴駿率鄉豪破薛永宗崔浩號三河領袖裴俠七歳不能言指烏而信北神教葬供從孝武入闗沙苑䧟陳守河罷魚獵郡者曰吾不以口腹役人君宇文奉號獨立韓麒麟守齊州劉普勸斬殺吉云當以卿應之乞禁珍玩立凶禮清貧韓顯宗才學之名剛直望言朝廷但舉名望何假孝秀夫門是祖父之遺何益皇家益於時者賢才而已止奸不在嚴刑李彪剛直為御史孝文名汲黯齊乞豊年積粟㓙年直與六使江南主重之楊侃良田何憂晩歳之蕭寶圜反侃令降者舉烽無烽之村則㓕長安遂平請鑄五銖楊愔四世同居不爭柰不為葛菜偽官季父暐别室銅盤食之典選似貧士市𤓰王肅仕齊亡兄弟並為齊代所殺氏危帝圖南之規轉鋭奔事光文言蕭破齊將裴叔業孝禽李献日走蕭懿能督淮南諸軍懷附如市文文器遇隆衆莫間興禮樂變華風威儀物多肅所定矜亷約然䕶庇伐劉芳楚元王交之後振貧為僧傭寫經筆迹稱善卷直二縑頼以頗精經義尤長音訓答王肅男子亦笄儀號劉召經事論大學國學制郊定律令正朝吉㓙大皆咨之論五去城里數靈星周公祀不當𨽻太常青更定公孫崇笄所定樂論社稷當樹松守州儒緩不能止奸盗然亷清證撰詩禮等音訓義常爽不事王侯逮閑靜年京師教授七百餘人克苦嚴君講二十號儒林先生子景紹郭祚為吏部重惜官位量才稱職賚定考格萬以師旅諫營明堂國學宣武賞多踰百達於政事斷决多為改事以進趨不息信欲出於忠為其所殺與劉芳文學見親於孝文張彛善篤察廵察必在選争廵陜東河南有聲奉守隴右肅靜與髙肇尚主見廢清身法肇求其過無所得得崔光表朝列中惟彛及李韶遂復用停廢時風疾自强不息愛好知己輕蔑下流瑀愛奬人物南北多之之大起宅第子仲抑武人致焚燬劫役禍邢蠻曹魏邢真之後山定漢中獲郡十四力請定蜀宣武不從中王英放鍾離因力求還英果敗以初至漢中有禮惠後掠人奴婢元暉欲發之蠻竒危二十人與之而止後自平豫州平宿豫志行修潔不復以財賄為懷野軍實戎資絲毫無犯才兼文武朝瞻望邢邵專事山水遊宴常霖雨讀漢書五日即徧記當倦方尋經史五行俱下請建國學明堂時文人皆出其下男不修威儀不得奉使守西兖有善政復生兩賞簡素内行修謹事關典故援筆立成好雕蟲獨歩京師紙貴談賞李崇馳鎮上洛止將數十騎置還齊所操南人感德無復烽燧守兖州村鼓樓以止盗遣髙平北斬陸納淮守梁州平氐楊靈珍樊安都督南以死扞夀春之水平荆州蠻决茍泰失子之訟有將畧决解慶賔詐稱他户為弟之訟年深沉寛厚善御衆養壯士在州十所向携破將梁武反間無所不至宣武親待無比奮擊降梁趙祖悦且討蠕蠕戎衣武飾志氣揚叛請改六鎮為州兵民户不從六鎮復遣討之好財貨負絹傷腰李平守長樂清靜畫尹河南權戚憚之客相州勸農興舉履虎尾踐薄冰於館李諧李搔過元义門下稱見神人三使梁因瘦舉頥因跛緩步因謇徐言善用短六指崔光晝耕夜誦黄河東注傭書養親瓊孝文稱其才浩浩如慕胡廣黄之為人氣槩者少之鶖或獻四足四翼雞后大極殿生菌公宫皆能表諫靈太好射幸王第獲秃登浮圖幸佛寺亦皆表諫裴植之死不能正救乞收拾石經郭祚時人比之光禹崔鴻建議考格之弊乞甄别武帝不從慕博綜經史撰十六國春秋劉石慕容儁林容垂姚慕容德赫連張李雄邑乞伏秃髮李暠沮渠馮然多遺失不録江左崔亮曹魏崔琰後季父光令依李冲云安能看人眉睫冲迎館之薦之為孝文創革選制垂十年為為度支嵗省億計彛修蔡汴二渠令渭水立柱橋羽扶新害張後靈太后武官依資入選應選者多亮乃奏為停年格甥劉景安規之亮謂權立此格甄深等踵而行之失才自此始内亷謹明决情清貧顯仕妻亦舂簸故外雖方正亦不候時記妻劉氏事劉騰致隆顯崔光韶遜官與弟光伯學抗言不可從元顥愽好議論傅永以火記水深處誤南兵之夜劫日平隨王肅破裴叔業上馬擊賊下馬露布義陽守𢎞農云馬援兖國竟何人哉吾獨白首見物大八十猶騎射馬御琕射洞其左股出箭復入破之九諱老常稱六十御人非其所長張普惠精三禮春秋懼諫太后父太上之號馬斥袁飜速召不諫任城王登功衰射辨元妃之義免綿麻之徵論所生祖母服廟以調愊長廣乞論孝明崇佛郊事委有司與靈太后論時政望詩送蠕蠕王還國東夙荷存城王恩其死也朔除禫風雨亦赴守豫十三郡無盗惟不營財任城王謂喜諌議得君袁飜議明堂九室三雍異所之非降議選邉戍云邊任當罪舉主蠕蠕二主並乞分地處之使捍髙車位俱重乞為蕭寶寅關西敗亡將士舉哀求名守陽平非其意在齊州無政績進待御後進聿脩為信州刺史即其本鄉時人榮之十為政清靖不言而化皆得其懽心尚書郎年不受升酒之遺云陽尼幽州守不與齊州中正有千秋各舉其子孝文云今二奚賈思伯論明堂惟五室祖瑩聖小兒即彭城王勰使王肅詠悲平城誤語云彭城瑩為詠之辯玉印云晉大康中于闐所獻承與袁飜齊名樂謂文章當自出機軸長孫業造金石雅西以貨賄事除名與爽狹有節氣珽瑩子貪滛詞藻遒勁叵無所不能呼無行竊銅疊金羅文宣為賊數被笞廢稱後為尚書左僕射官人光稱職内外美續謡言譛殺斛律爾朱榮世為酋帥居爾朱川帝明帝時兵起技肆州署其叔羽生守之殂入朝廷立莊帝既而遷之河橋立沈靈太后及少帝殺百官王公二千餘人欲自以金鐫已像不成復立莊帝而已還晉陽以元天穆録尚書事京爾朱以棒擊敗之禦元顥葛榮號百萬向遥制朝廷動靜必申妻莊帝勤政欲與李慎雋正紀綱至榮又討平韓万侯醜奴蕭中寅等關中平奏帝不喜榮入欲移都帝手斬之與其子菩提反元天穆内外喜科聲滿京城賀拔允與髙歡深相緯又魏孝武忌歡以允弟岳據關中深委之岳委其弟勝或謂允引弓擬歡歡餓殺之賀勝初兄弟三人委質事爾朱榮隆勝從榮入榮死田怡欲攻官門勝止之隨世夜走至河橋以為臣無仇君之義勒所部還都後爾朱度律數而將斬之答曰天柱被戮以君誅臣寧負王不負朝廷之乗勝追髙歡刄垂及之死日猶以為恨射飛鳥賀岳初為太學生爾驍果絶人元從爾朱榮入諫其勿稱帝為朱破葛榮顥万侯醜奴在關中孝武刺心血寄之使圖髙歡歡使侯莫陳説誘殺之髙恭之字道穆以字行利人之事必奏為御史不避權豪彈益國乞錢文載年號爾朱世隆失儀復棒破夀陽公主車置司直髙謙之恭之兄邑諱涉陳河隂令政體多為故事史乞復神令面得失之制為鑄錢長乞鑄三銖錢齊髙歡字賀六渾聞羽林焚張彛宅而朝廷不問自是有澄清之志從杜洛周反欲圖之不果遂奔葛榮爾朱榮為剪馬説起兵討鄭儼徐紇榮以歡為前鋒魏明孝昌四年孝莊既擊榮爾朱榮以葛榮部衆流入并泗者二十餘萬悉委歡統之禁侵掠百姓歸心乃詐為書言爾朱兆將以六鎮人配契胡激怒之起兵討爾朱氏廢魏節閔立安定王又廢之立孝武魏普泰元年孝武遁入關乃立孝靜為東魏餘見東魏門歡性深宻機權若神馭軍嚴肅聽斷明察儉素好士人樂為用歡卒子澄領其衆為厨人所殺東魏武定七年弟洋領其衆遂代東魏號文宣追謚歡為神武澄為文襄文宣帝者貌若不足宿將皆輕之推誠接下羣情始服初立勵精為治簡卒備邊始立九等户富者稅其錢貧者役其力伐庫莫奚連年出塞軍士一委唐邕邕練習軍書靡不諳悉以辛術典選取士必以才氣循名責實新舊參舉管庫必擢門閥不遺最為折𠂻併省州郡縣鎮帝之初立留心政術務存簡靖内外肅然軍國機䇿獨决懷抱常致克㨗六七年後以功業自矜嗜酒滛虐然能委政楊愔百度脩勑立十年九大保初當梁簡文太保年末年當梁敬帝廢帝殷洋之子常山王演居東館奏事皆先咨决楊愔心忌之演乃與長廣王殺之演又以太后令廢帝自立乾明元年陳文帝天加元年昭帝演紹封功臣禮賜耆老延訪直言自少居臺閣明習吏事即位尤勤勵出畋墜馬殂召長廣王洪嗣武成帝湛昭歡第九子帝母弟和士開説以國事盡付之自是三四日一視朝書數字而已文宣時周人常懼齊兵至是齊反備周文宣刋定魏隣趾格為齊律至是成文定租調法祖􅓨和謟士開觀傳位太子驕滛賦重民苦之後主祖珽勢傾朝野丞相斛律光惡之珽譛殺周開光死大赦武平元年陳大建二年陳呉明徹來伐尉被胡等與戰大敗明徹䧟夀陽帝頗憂之穆提婆等勸以人生如寄唯當行樂何用憂為帝大善酣飲鼓舞武平四年陳大建五年帝寵陸令萱韓長鸞等姦謟蠧政民不聊生六年周來伐平陽晉陽皆為所克斛律孝卿請帝勞將士為之撰辭帝出不復記所受言遂大笑將士皆無戰志隆化元年陳八年周師趣鄴帝乃禪其子名幼主時年八嵗周師至太上皇東走幼主禪於任城王湝令孝卿送璽紱孝卿以送於周太上皇幼主奔青州周人追及之後賜死崔㥄偉麗善容止廢冀部豪傑争名捉髙昻結為師友贊髙懽節閔自矜為天子賊以魏收輕薄不使修起居注髙澄黄領小兒遂見惡門閥自矜皆寡言美謂一門婚嫁衣冠族吉㓙儀範當時所稱貪驕子瞻神彩凝然舍才學風流後來之秀陳人見而心醉事髙洋之父子並詩人冠冕珍議太子納妃禮責魏收笑簡傲御史臺羞獨食同臺裴姓者自携匕筯徃恣噉之吏好讀書藉酒後清言聞者傾耳天保后重事謂藴者為潦倒而瞻終不改許惇清敏達於從政詔在魏號入鉄主簿學守陽平政為天下第一圖形頒天下無術欣笑滿堂惇杜口隠几而睡不為勝流所重長鬚文宣截之號齊鬚氏少純直晩更浮動李元忠母多病故能醫賊貸不求利鄉人敬之歡路梗言元忠所遣舍避載筝酒迎髙慷慨流涕進縱横之䇿寧守光州乞振貸得萬石以為少出十五萬石無食不可無酒以多酒有音樂求為太常善弹跌夣執炬入墓李幼亷幼不受金故亷名文髙歡部分冀部六州凡事應機立成事襄所在稱職髙楫和士閔英祖廷閭求紫石與二兩李槩事文襄丈倨傲周紱上名列魏傳達生人集以髙浟八歳折韓毅學書不如論才滄州定州惟盗如神慕容紹宗恪之後士爾朱榮北從舅子衆不許榮殺洛中人携榮妻子及餘歸歡侯景反聞紹榮至大懼而敗死與西魏戰風徹䌫斷赴水獨孤永業有威信河善招撫守洛州洛恩之鯁直不交權勢辨馬槽走周師兩鮮于世榮周兵下鄴獨不降被勢不屈見殺傅伏周以其子招之不屈齊滅歸周孫騰歡倚腹心置於魏朝非貪滛恣與髙岳髙隆之司馬子如為四貴法專騰為尤甚髙隆之見信髙歡焚舊輕文宣卒㓕其冢而發冢骸骨投之漳水司馬子如結髙歡不少不合者即曵之加刃於頸滑稽檢後在冀州能自改厲叚榮賛歡起兵叚韶榮子射歡腹心而賀勝受刃垂及歡韶斃其馬死歡遺托於走陳覇於廣陵斬東方白額於宿豫服破周軍大和谷又破其桓谷城大破之秦城有宰相風齊代罕及閨門雍睦望傾朝野斛律金善騎射行兵殆望塵知馬歩多少字沙苑之役洋金歡幾質直不識文初名敦以不能署改猶以為難比一門一皇后二太子妃三公主尊寵莫常以為憂子光字明月落鵰律居家嚴肅殺簡儉為門無賔客周從戎未嘗失未嘗妄人争死大破尉遲逈等賜破宇文傑又屢破之光怒祖珽及栁穆提婆之周將韋孝資乃行百升飛上天之謡祖穆力譛誅之若周武為赦境内後入鄴曰此人在朕豈得至政孫搴為髙歡草檄立就飲當煩劇學淺行薄劇醉死陳元康代孫搴掌機宻遍颯上運筆筆不及凍號便僻貨負交易於州郡髙歡馬上令九十餘條皆能記憶死侯景反請用慕容紹討之兩䕶崔暹之禦厨人殺髙洋死杜弼長筆札令為政清靜夾言在位貪其又請先除外賊歡弓矢刀梢道使弼出間乃戰慄謝伏獅談佛學勸上老子注升子坐髙歡受禪房謨房公馬與兖州刺史廣布恩信合境欣悦髙歡常以謨廣平羊敦廣宗竇瑗平原許惇清能為諸州勸贍攝南汾胡夷來歸西魏增戍家産富不假官俸是以出稱其清白張曜文宣夜還湏少方開門讀春秋一月一遍王絃十三以孝經在上不驕戒郭元貞勸文宣謂酒太樂曰亦有大苦諫伐江南以自治唐邕軍吏以上效勞由緒古對如響宣簡閱唱名不執文簿耳聽口處手書文以為金城酌事宜改敕機諌醉中殺范洪遇嚴酷漸公事甚理典執兵莫不諳知被意氣髙官錢違限杖朝士皆大駭物望元文遥十餘歳一覽而誦為善宣敕聲韻髙朗者請縣宰用士流士人縣始此有侵田與之卒相讓為閑田清與趙彦深和士開被任遇雖無彦深謹亦無士開貪縱趙彦深名隱以字行相為司馬子如供書寫子如薦之髙歡齊善始終惟彦深温柔謹慎侍然以子叔堅為中書郎時語云穢鳯池郎基受呉明徹圍削木剪紙為兵判御史不憚權威守穎川積年留滯數日剖嘗云官所木枕亦不湏作唯頗寫書潘子義云亦是風流罪過茂基子為見隋文帝言周武象經非人主事因自結納耆衛國令審釋繫四百餘人時部人兄弟不睦使舊教諭卒相友弟開皇蘇威立條章毎嵗責人間五品不遜及為餘糧簿擬有無相贍茂皆以繁紆奏罷撰州郡圖經長於政理謇明習世事然無諤之節魏收少隨父在邊好騎射鄭伯調之折節讀書禪所坐床板鋭減以文章顯為節閔草封書立就作南巡賦譏異飾而三臺成獻賦為最世為髙洋五十餘檄不日就與邢劭分黨稱大邢小魏婢輕薄號驚蝴蝶無使梁買呉婢於館部中有買者皆通之妻子文宣又賜二婢史位既不遂求脩國史崔暹薦之文宣楊詔撰魏謂何物小子敢與魏收作色謂休之無以謝德當作佳𫝊史納金傳爾朱衆訴者百餘收無以對然坐謗有至死者口喧然號穢史意投牒者相次皆楊諳髙德正抑之褊北史論其在實録好發隂私故起謗議性提奬後輩以名行為先好聲樂與諸優為獼猴嵗枕中篇戒飭子弟以作史見憾於人齊亡之冢即見發魏長賢收族叔書父彦著晉書未成長賢欲成之上譏刺時政大忤權幸或責之復書言志屢辭疾去職降齊不仕周武辟亦不出魏澹族弟言仕隋笑注庾集撰苑號􅀶物史帝令别成魏辛術有理思與髙隆之營鄴宫為守清河父老誑闕請立碑與宋道游李繪髙洋士客東徐州燒侯景稱數百萬隨術渡淮北者三千餘家傳部内犯法先斷後聞欵附者二千餘州得國璽為遷鄴后典寡却名者四髙洋袁叔德楊愔惟術最清儉欲軍旅不釋卷定淮南一毫無犯唯大收典籍人名畫法書不入王府還朝以饋貴要以此少之楊愔字彦遵全兒時風度深敏皆期以貴逼杜洛周䧟中山家囚縶復没於葛榮榮以官偽嘔血不受防禁送都隱嵩山昻又見執於楊寛用相州守逃依髙歸髙歡方見念家禍所食惟鹽米萬韓陵之戰毎陣先登帝還葬儀衛二十里㑹者人或恐以歡欲送所偽為溺水易姓名入嵩山又東入田横島講誦人稱為劉先生歡來得之驟致顯用典選二十餘年識多以言貌取人武謂其如貧人市𤓰神聦記强半面不忘為相總機衡千端萬緒無滯用私天保後頼其正救神儀秀發百寮聳動難明無交賞賜散親族架中惟書頻遭迍一食之恩必報廣仁厚州以常山長廣二王親逼奏出長刺并二王遂殺之省中二人亦列魏史周宇文泰字黒獺卑代人鮮種從葛榮榮㓕從爾朱榮征伐後以别將從賀㧞岳討北海王顥岳以為司馬事皆决焉往觀髙歡知其逆謀岳以泰為夏州刺史岳為陳悦所害泰即馳赴平凉魏帝因令統岳軍既斬陳悦關隴平髙歡遣書結納泰以聞故魏帝深仗之惡髙歡之逼輕騎入關泰迎之都長安為西魏泰既􅀈孝武立文帝用蘇綽為富國强兵之法詳見西魏門泰能駕御英雄質重明達崇儒好古施設皆放三代泰卒以事屬宇文護紀綱内外人心遂安子覺嗣位為周公代西魏有其國是為孝閔帝追稱泰為文帝孝閔帝性剛果惡宇文䕶之專謀誅之事泄見弑明帝毓立䕶歸政軍旅猶總之憚帝明敏遂進毒帝覺遺詔立弟邕武成二年陳天加元年武帝邕享太廟班太祖所述六宫保定元年陳天加二年幸太學于謹為三老始親政頗事威刑骨肉無所貸禁佛道悉還俗并滛祀悉除之謀代齊韋孝寛陳三䇿滅齊後梁明帝入朝詔山東諸軍各舉明經幹治者二人以齊傳伏守節令宿衛又以李德林為内史自是誥詔及用山東人物並委之毁徹彫斵並賜貧民庶人以上聽衣綢綿絲布餘悉禁之外官不過十餘人陳呉明徹來伐王軌敗執之帝撫士有恩而明斷嚴峻將士畏威而樂死帝崩年三十六長子贇立宣帝始立即逞奢欲惡人規諌鄭譯用事譛殺王軌傳立太子自稱天元立五后帝不豫劉昉鄭譯栁裘等引楊堅輔政靜帝立楊堅革宣帝苛酷作刑書行之尉遲逈謂堅將不利於周謀討為韋孝寛所敗自殺進堅爵為隋王遂禪焉宇文護泰以為類已死以天下托之發嗣子幼冲强㓂在邊衆心恃之而定徴非其書不行節兵衞盛於宫闕弑乙弗鳯等謀圖之護遂并弑閔立明帝又之武帝以其暴慢因入朝殺之人與于謹克江陵泰寛和親闇於大體圖所任非諸子殘暴初和突厥謀共齊上以毋還護故護勉强與突厥東征無功宇文孝伯武帝時出入卧内時政皆預政委信莫比盡心竭力無所回避時得失外間細事皆以聞付請選正人輔太子帝以孝伯與尉遲運輔之后事宣帝追憾杖痕運懼孝伯曰堂上有老母地下有武帝為人為子知欲何之諌而不入將焉逃死頻諌不從卒賜死不肯圖齊王惡深孝伯父其獲齊將竇泰破泰至沙苑知渡河必敗大之宇文憲泰子歡年十六治益州蜀人立頌德碑之賛伐髙為先鋒大敗之歡圍晉州破而后食思屢破齊師齊人聞風憚其勇畧重潜屏退宣帝忌其望重縊殺之威名日目光如炬謀事母孝撫善兵長於御測守汾州禮送東魏之抄竊者宇文貴善騎射將帥材愷有巧思造建仁夀宫檢校將作大匠觀風行殿推移倐忽圖明堂議侯莫陳崇騎勇善馳射擒䧟陣擒万侯醜奴史歸王誼欲擊朝士不恭者司廬墓難平稽胡妻宣帝憚其剛正出之平馬消隋文以女格蘇威減功臣田給人户乏劾諫隋文幸岐州后子死踰年乞公主除服楊素之恩禮稍薄以胡僧告之賜死獨孤信為孝武帝定荆州東魏遣髙敖曹至奔梁三年周文以為大都督百姓懷之聲振隣國效周文以其信著遐邇賜名之前後増封回授諸子獵歸㡌側詰旦皆女為隋文后子陁事猫鬼竊物竇熾射殿前鴨清河橋之敗以善射獨與兩騎抗敵涇州政靜所遊泉人懷之辭造第周武年長欲勸護歸政勸元老素望參議大事伐齊年老欲行進隋文不肯署牋賀蘭祥再為荆州有惠政境内觀政得失夷至者日千數清盛夏息發冡之俗素贈遣一無所受堰蕭詧贈竹屏經史谷亦付有司脩富平開渠注洛平吐渾史寧嘗與賀㧞勝幸梁損鎮凉州戎夏服其威惠在荆州奢縱名子雄從獵無虚發權景運守南陽免發人防守敵競百姓立碑頌德恃與東魏爭豫州因留鎮荆州威行南服寵貪驕敗王羆守荆以死禦梁圍三年跣南秦數叛走之韓軌入華州襲之羆徒逐之因大破齊齊遣河橋之敗開門論戰士任其去留使餅食客𤓰皮吏不營産撤臺安貧王思政勸魏孝武入關門樗蒲自誓死鎮宏農開解衣而卧河橋䧟陣幾掘得金送朝廷襄竭力守頴川齊文十萬攻下之尉遲逈為周文取蜀鎮之梁武陵王紀據蜀隋文將篡逈不從舉兵敗自殺王軌從武帝平并鄴好呉明徹㓂吕梁敗之清口捋武帝鬚曰老公但後嗣弱忠恕樂運孝諌直諌數赦言太子中人失諫宣帝公除即吉輿櫬陳帝八帝亦感悟鄭譯左遷之為兩縣有聲著以訐直不得諌官發憤諌苑蘇綽周惠達與謀事薦之周文制周文觀漁與語竟不設網歸而前席達旦文案朱出墨入計帳户籍之法詔併力擒竇泰謀與周文合教减官屯田六條書一守宰先盡心二敦化三盡地利四推賢良五恤刑獄六均賦役勞作大誥革文弊不營産以天下為己任積成疾卒韋孝寛名叔裕以字行野弱冠請為前驅平蕭寶寅守浙陽與新與獨孤信號連璧遷南兖間牛道恒崤渑遂清代守王璧髙歡百計攻之苦戰六旬遁死種槐堠間知齊事計日城齊要處釁二屯田縱間誅明月帝平齊三䇿齊一有三修好武用其言平伐陳平淮南令破殺尉遲逈不好文史年患眼猶人讀之俸入私房末兄夐蕭然自逸時號居士號逍遥公不應聘繰明帝贈詩日給河東酒一升武帝賜惟取一疋乘舊馬譏宇文護峻宇雕墻靜陳使者求見虛柳蚪棄官退耕過論史官當明書於朝孜常弊衣蔬食曰衣不適體食不過充饑孜營求徒勞思慮云耳柳慶年十三三遍誦千餘言移蘇綽謂竹賀白鹿表革浮靡曰枳橘猶自可况木子也在雍州貴戚歛手王茂之死察盗金沙門其誘胡家賊自首無爭抗直揚寛囚故吏求其罪終所得達奚武夜入齊軍若警夜者伺敵情常河橋之戰斬髙敖曹㣲時奢侈及貴行車馬書常掩扉曰不可頓忘疇昔庫祀革島帶獨登峯貪吝取中釘金赫連達賀㧞岳死賛迎周文厨取私帛酬胡人饋羊曰不可羊入我而物出官庫蔡祐為周文斬元進射如父子與河橋之戰下馬鐵歩闘敵圍十重却之髙歡戰芒山號猛獸能不言功賤少與李穆齊名言安久處貧言訖各大哭耿豪沙苑之戰甲裳盡赤芒山之戰大呼獨入髙琳母得浮磬之精拒河橋之役勇冠諸軍與呉明徹晝夜戰十旬明徹退走泉仚年十二宜陽鄉人請為縣令丁母憂請起復無守上洛走蕭寶寅刺東雍懲楊羊皮豪右敢犯官清約顔在州五年自鄉里運米自給執毎除一憂見色再守上洛為髙敖曹所戒二子勿以我故虧臣節州二子討賊元禮戰没仲遵復刺洛頗得時譽李遷哲世為山南豪族蠻為周文討平洋直州陳與田宏討信州諸畏威鎮襄陽大破兵於江陵十知巴州納降之詐漢鎮白帝食葛根相男女六九人華侈縁十餘里第宅次往鳴笳來唐瑾文雅雄偉頼瑾獲濟于謹結為兄弟旬江陵衣冠仕族載書兩車十遷四職迅雷風烈晏寢亦起好施所遺田惟墝堆韓椎在邊四十五載陳東魏憚之子禽擒叔寶賀若敦彎三石弓文湘州禦侯填聚士覆米士人餉填宇護逼令自殺刺弼舌戒慎口申徽河橋之敗獨在左右滯𤓰州五稔邊人安之楊案牘皆親覽事無稽襄州俗通餉遺畫震於寢室誦題詩清水亭傳手迹陸通父政孝感泉魚共通沙苑力戰而處機宻恭謹禄賜與親故謂人患貧不貴不患貴而不貧耳楊檦行建州事威名大震敗鎮東境十年常勝以輕敵而降齊韓褒守雍州訪盗皆豪右為之而陽不知厚加禮界乃召傑黠少年為鄉里患者置為主師分地有盗發不獲者以故縱論所被署者皆首伏徒侣皆列姓名或亡匿者亦言在褒乃藏其簿大榜州門曰可急來首盡今月不首者顯戮其身富以其妻子賞首者旬日悉首盡西梁州均貧枌州縱齊俘劉璠事蕭曄獨奉其喪還都力事蕭脩不從武陵王紀之召及為周文所獲全蕭脩為郡善撫御不營貲産衣妻子隨俗食麥皮柳遐仕梁導蕭詧稱帝辭去讀書疽詧殂行服始仕周人務先以德吮母無喜愠好施子靖歴二郡人畏愛庭隋文踐位召之不至閉户自守足不歴園十載子孫有過自責鄉里亦化之方之王烈儒林劉獻之謂離騷狂謂謂名法小不謂立身德兩行為首多聞􅀶學過士龍乞張吾貴别造户牖好詣劉蘭三旬便能講春秋講説不屈王侯劉蘭二十餘始入小學且耕且學三年通五經棑毁公羊又非董仲舒鬼求辨而卒徐遵明事王聰張吾貴田猛畧輒去之而師心講學二十餘年海内宗仰誤書八寸䇿為八十宗因曲為之説李業興師徐遵明辯鮮于靈馥而遵明學徒大盛戱上戊子元歴髙隆之脩樂器衣服及百請與共事儒使梁與梁武朱异辨難躁隘乏者風子崇祖亦儒學該􅀶巧思李鉉師徐遵明燕用心精苦三秋冬不畜枕游生徒恒數百人趙間言經者多出其門京師讀未見書字辨馮偉閉門三十年餘固辭而還齊趙郡王强以禮起之嵗凡禮饋束脩一毫不受邢峙太子食邪蒿曰此菜有不正之名非殿下所宜食劉晝以宋世良家有書五千卷求其為子慱士非六合賦魏收邢峦皆不取之上書切直而世要終不見采令死之後附語得為縣矜大張景仁工草𨽻致通顯史謂蒼頡以來八體取進一人而已權㑹明易詩書禮角恬靜不肯為諸王師却貴游多就學明風𤣥象而不言誦易恠畏馬樂遜擾攘之中志道不倦寡交忠信為本黎景熈家傳楷篆素無愧色不事生産早同列車服華盛貧勤著述上封事又言風俗奢侈耳文苑温子昇嶠之後辭常切教諸奴子書昇射䇿八百人為最人負才遺行惟子邢子才王元景有德素文襄疑之餓死李廣愽學過驚夢有人出身中云君用心苦非精神所堪今辭去樊遜貌醜趍書見賢思齊字自勸校或譏其靜嘿不時作客誨以自廣定群書王襃儉曽孫元七歳属文燕位望隆重愈自謙抑言與梁帝降周歌妙盡塞北寒苦之江南競和至此方驗常周文謂之舅氏政與庾信才名最髙遊宴侍有器局識體庾信父肩吾在梁與徐摛號徐庾體留侯景作亂信以衆先退為元帝使西魏因長安陳請之周武帝惜不遣以雖位望通顯作哀江南賦致意顔之推年十二遇梁湘東王講老莊虛談非其所好還習禮傳慱覽好酒不脩邊幅為周軍所獲尺遇河水暴長奔齊文宣引之内館辯工牘應對館中文書皆其封署才周兵䧟晉陽勸帝奔陳不從訓齊亡入周在隋為太子文學家二十篇孝行王崇孝感風雹獨不及表門閭秦族終喪二十年蔬食不入房室張元六歳不肯露體祖還鄰杏禮拜開盲節義于什門為魏明元使馮䟦二十四年不屈汲固為兖州從事匿刺史李式滿月子憲朱長生于提並為魏孝文使髙車髙車分徙之三歳不屈李几十世共居同財一百九十八口長幼濟濟風禮著聞郭世雋七世同居犬豕同乳同鳥鵲巢蓋雋六世同居石文德五世同居孫道登宗女㳫龍超並賊執使諭城中早降及登城告城中努力俟救皆見殺循吏明亮辭武勇將軍之號有除陽平汲二郡清白惠杜纂儉約有恩降於葛榮張華原事髙歡不為宇文所屈期為兖州有恩信㓂盗寢息縱囚如至六駁食虎孟業不受同僚盗絹麥五穗禾九穗贈送無所受其東郡寛惠侈無升降容子結婚驕知而不禁聲望頗貶蘇瓊守南清河奸盗止息鄰境富人寄貲境内以避盗以盗為左右盡知外事沙門無計徴債歸焚債劵異受𤓰置梁上住兄弟争田者諭以兄弟難得分十年遂還同吏曹為學生屋斷滛祀曰貸粟活饑枉或議其數雪反逆所雪者寃不放反逆酷吏于洛侯為秦州刺史酷暴處王元夀等反魏孝文詔於州常刑斬以謝百姓李洪之守河内秦益頗有威惠而刻害之聲聞於朝野孝文令自盡娶二妻兩宅别居張赦提清約賄後縱妻與僧尼通貪虐賜死崔暹以貪累敗何單騎問村婦崔瀛州如何曰百姓罪得如此癩鬼刺史隱逸睦夸崔浩少為莫逆交言不及世利浩毎欲屈之竟不能發言投之詔書繆以輸租者竊去馮亮隠嵩山造宣武擇其形勝處閑居寺藝術晁崇道武時造渾儀將月暈左角知角虫死信都芳祖暅授之法歴術益精天河内葭灰應節飛著四術周髀宗云渾覆觀以靈憲為文蓋天仰觀以髀為法歴難李業興新歴五闕靈憲未成陸法和戒行如沙門麾詣湘東乞征侯景運江陵神同行羽扇風豫請守巫峽石横鎻殄武陵王紀與自稱司徒縁欲襲襄陽入武關梁元帝止之曰王上有因欲救之耳夀王寺獨不及難坐戒毒虫猛獸入齊散奴婢錢物䋲床而終空棺附庸諸國夏赫連氏鐵弗劉氏鐵弗也胡呼母世領部落傳務栢至衛辰潜通符堅後專事魏堅討擒之劉庫仁亦堅所分立復㓂魏為所敗而死焉其弟三子屈丐本名勃勃魏明元改名屈丐北方言甲下也道武末僣號大夏天王恥姓鐵弗改曰赫連徽赫通天禽劉裕子義貝於長安僣大號於灞上定都統萬城堅可磨刀斧髙十刃既死而諸子争其子昌者為魏大武所克燕慕容氏慕容廆自遼東遷徙河之青山子晃稱燕王女為昭成之后城和龍而都焉子儁僣大號自薊都鄴子暐為符堅所㓕堅敗暐叔父晃第五子垂叛堅攻符丕於鄴復號燕盡有幽冀平之地遣子寶㓂魏敗於道武寶立敗死垂之弟德立子超嗣晉劉裕禽之廣固送建康斬之後秦姚萇南安亦亭燒當之後父戈仲晉永嘉之亂東徙榆眉劉曜以為平西將軍子襄代屯譙城慕容雋以為豫州刺史屯淮南自稱大將軍大單于萬年秦王衆十餘萬與慕容仲連和進屯北地至萇執殺符堅僣大號稱秦子興嗣與道武大戰其弟平死焉子泓為劉裕禽送建康斬之北燕馮跋兄弟中最恭謹飲酒一石不亂為慕容熈衛中將軍因熈殘虐入龍城誅之而立雲雲為人所殺跋自立為燕王留明元使者明元征之不克跋病弟宏立殺跋之子男百餘人太武屢征之不降境土日削奔髙麗卒見殺西秦乞伏國仁父司繁為符堅鎮西將軍鎮勇士川國仁叔歩頽叛隴右符堅使國仁討之歩頽因迎而推之號年置官属都勇士城弟乾歸立姚興破降之既而背姚興稱秦王于苑川子熾盤立滅秃髪而自附於太武子慕末立暴虐部内離叛赫連定滅之北凉大沮渠䝉遜困葬叔父羅仇乞伏乾歸敗殺之與兄男成推建康太守叚業稱凉王業忌䝉遜䝉遜遂䧟業殺男成因激怒衆而殺業自稱河西王朝貢于魏稱籓于晉宋子牧犍立妹為太武昭儀而娶太武女太武征之力窮出降後賜死後梁蕭氏梁帝蕭詧昭明太子第三子領㑹稽太守以不得嗣懷不平招客數千除雍州都督五州諸軍詧以襄陽形勝務脩政刑張纉構詧與譽於梁元帝譽詧之兄湘為州帝伐譽詧聞之怒及梁元督諸州援建業譽之司馬劉方貴與梁元謀襲詧詧攻斬方貴於樊城乃遣蔡大寶求附庸於西魏助魏于謹平江陵周文命詧主梁資以江陵一州其襄陽所統盡入於周而詧稱皇帝初江陵平尹德毅勸伏兵斃于謹而濟江踐極詧不忍後卒誨之四夷髙句麗其先夫餘王嘗得河伯女感日影而生朱蒙自謂日子河伯外孫逃紇升骨城居焉號髙句麗因以髙氏姑述之未必然也漢武滅朝鮮置𤣥莬郡以髙句麗而属之隋文封髙麗王朝貢不絶及隋平陳湯大懼為拒守計子元立率靺鞨萬餘騎㓂遼西帝命漢王諒為元帥討之王師不振而元亦謝罪於是罷兵待之如初煬帝親度遼水攻之不克再攻之楊𤣥感作亂而還十年又發天下兵而盗賊起髙麗亦困弊乞降而元竟不至帝更圖後舉而喪亂不復行林邑其國袤延數千里多香木金寶隋文遣劉芳擊之不利芳掘小坑覆以草象䧟而敗其王梵志棄城走獲其廟主十八板皆金鑄自是朝貢不絶吐谷渾鮮卑徒河渉歸長子也次曰若洛廆是為慕容吐谷渾長子吐延之死以子葉延語大將絶㧞渥速去保蘭遂因以吐谷渾氏焉阿豺立兼氐羗地數千里通宋獻方物臨死以折箭喻兄弟勠力慕立禽赫連定魏太武拜為西秦王夸吕立始自號可汙居伏俟城青海西十五里冬冰合後毎置良牝馬青海中小山至春得駒號龍種得波斯馬放入海生騘駒日千里號青海騘西域自班超後域道幾絶太武時龜兹等九國始來而董琬使之自漢武時五十餘國今為十六國分四域葱嶺以東流沙以西為一以葱嶺以西海曲以東為一者舌南月氏以北為一内兩海之間水澤以南為一諸小渠長以數百其出西域本二道今為四自玉門度流沙西行二千里至鄯善為一自玉門度流沙北行二千二百里至車師為一倍從莎車西百里至葱嶺又西一千三百里至伽為一自莎車西南五百里葱嶺西南一千三百里至波路為一東西魏至齊周中國方擾隋煬帝乃遣韋節林行滿使之至罽賔國得馬瑙盃王舍城得佛經史國得舞女師子皮火鼠尾復令裴矩引致之來者四十餘國置西戎校尉鄯善古樓蘭比魏太武詔萬度歸平之賦役其人之郡縣此即白龍堆路且末鄯善西預西北有流沙數百里氊夏熱風老駞埋口鼻沙中人亦將擁蔽髙昌車師前王故地鹽或云漢兵之困者居之中國羊刺生蜜赤白鹽色如玉為枕献龜兹尉犂西北白山之南服東即輪臺落西北山有如膏者流成川之齒髪已更生波斯古條支國槖都飛利城髙出馬驢象獅有鳥如駞甚不食草肉噉火大月氏都賸監氏城曠石為五色西瑠琉者大武令其商採鎛之美於方來小月氏都樓沙丈東有塔名百佛圖鉢和在渴槃陀西土銀穴處大雪山望若峯然波知鉢和西南王龍婦三地龍龍子安國漢安息國色隋使至得五鹽漕國葱嶺北前罽賔國也通葱嶺有順天神祠有魚􅆃骨馬騎出入蠕蠕神元掠騎得一奴髪始齊肩忘本姓名其主字之曰木骨間首秃也聲與郁久閭相近因氏焉子車鹿㑹始有部衆號柔然太武以其類於蟲號蠕蠕道武時社崘學中國戰陣屢犯邊明元討敗之大檀立犯邊大武五道征之宋文之伐河南也大武又大討之去平城三千七百餘里度燕然山又東至瀚海西至張掖水東西五千餘里大檀因發病死子呉提立吐賀真嗣大武又渡漠大討之子予成立獻文又大破之刋石頌功後天保三年阿那瓌為突厥所破菴羅辰庫提竝等奔齊餘衆立鐵伐齊文宣討突厥而立菴羅辰既累為突厥所破以西魏恭帝二年率衆奔關中突厥請之西魏斬之突厥匈奴别種居西海之右隣國滅之一兒且十嵗斷足臂棄草中牝狼以肉飼之彼王欲併殺之若有神物投之髙昌國西北山洞宂狼生十男阿史那最賢為君長門建狼頭纛示不忘本或云本平凉雜胡大武滅沮渠阿史那奔蠕蠕居金山號兠鍪突厥山形似之土門始盛與周通邀擊鐵勒求婚於蠕蠕不許絶之與西魏婚科羅至俟斤是為木杆可汗其地東自遼海以西至西海萬里南自沙漠以北至北海六千里後與魏伐齊至并州隋亂中國人歸亡者無數遂太强盛迎蕭后置定襄薛舉竇建德王世充劉武周梁師都李軌髙開道之徒雖僣尊號皆臣之古今紀要卷七
