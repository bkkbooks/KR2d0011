body:
  text: 古今紀要别史類提要臣等謹按古今紀要十九卷宋黄震撰震字東發慈谿人官至浙東提舉事蹟詳宋史儒林傳是書撮舉諸史括其綱要上自三皇下迄哲宗元符每載一帝之事則以一帝之臣附之其僣竊割據亦随時附見詞約事該頗有條貫非曽先之十八史畧之類粗具梗槩傷於疎漏者比所叙前代諸臣各分品目惟北宋諸臣事蹟較厯代稍詳而無忠佞標題盖不敢論定之意也朱子作通鑑綱目始遵習鑿齒漢晉春秋之例黜魏帝蜀同時張栻作經史紀年蕭常作續後漢書持論並同震傳朱子之學故是書亦用綱目之例其謂論昭烈者毎以族屬疏逺為疑使昭烈果非漢子孫曹操盖世姦豪豈不能聲其罪而誅其偽今反去之千百載下而創疑其譜牒耶其所發眀可謂簡而盡矣乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cf6d5bd0c1e86ef52f20f30fa668fcec049760a7022a9294417a3a5df1eab6fb
