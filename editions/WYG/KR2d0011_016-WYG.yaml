body:
  text: 古今紀要卷十六宋黄震撰五代梁稱帝凡十七年朱温從黄巢為賊王重榮破之同州以華州降賜名全忠拜汴州宣武軍節度救趙犫敗巢軍秦宗權使張晊攻汴甚急朱瑾朱宣救之眰敗去忌瑾宣即誣而攻之克用復京師邀至汴置酒而攻之自此爭河朔諸州相攻迭有勝負惟三興師向淮南皆敗績時溥鎮徐州攻取之以龎師古守執朱宣取鄆州以朱友裕守襲朱瑾取兖州以葛從周守説韓建降華州殺魏博牙軍取魏博攻趙匡凝取襄陽楊師厚攻趙匡時取江陵楊師厚圍鳳翔刼帝遷洛李茂貞王建李繼徽興師討之王師範亦結淮南合平廬兵討之遂弑帝絶人望而簒之是號太祖太祖更名晃以敬翔為崇政院使改唐樞宻為之軍民一以委之與晉戰屢敗鬱鬱多躁子友珪弑之元年圍晉潞州築夾塞守之大敗屯四年襲鎮州晉救之敗于栢郡之乾元初楊師厚邢州趙晉伐幽州太祖自將救又大敗病歸末帝疎忌宗室專任趙巖張漢鼎漢傑依勢擅權敬翔李振雖執政而不用其言欲以段凝代王彦章招討將士憤怨晉兵入自殺敬翔作牋刺語俚俗故全忠喜之戰答春秋戰爭兵法不可用於今益喜與蔡謀居多故動靜輙以問之馬簒弑之請翔為多剛用兵三十年細大必關惟上得休息全忠暴惟翔能承其意妻劉氏有寵于全忠權勢侔于翔李友珪弑逆奪其崇政院使鬱鬱不得志梁亡振歸唐翔自縊死朱珍少與龎師古從全忠為盗皆善治軍敗得降兵皆以屬之選將五十人可用黄巢破宗權并兖鄆皆勇出諸將等威振河朔魏博殺樂彦貞與李唐賔威名畧攻掠四方常與俱而唐賔驍勇過之全與唐賔交惡殺唐賔忠殺之龐師古將騎兵走朱宣攻孫儒于揚州不克違取時溥不攻揚州營清口不敢全忠命肯就髙為棚水至不能戰見殺葛從周巢敗始降梁義全忠攻蔡墜馬賴其扶得脱晉攻張全敗之潞河與丁會取魏宿州朱鑿闇門敗晉兵晉兵復勝而失其子落落擒宣走朱瑾與師古各道攻揚州大敗五日下洛邢磁三州監救魏出兵閉門復戰大破燕兵攻滄州不用軍言大敗燕兵于老鵶堤又還敗晉兵于青山劉鄩兖州招降之從攻鎮州王鎔乞監全忠即位以疾致仕張存敬同敗晉兵悦河州與從周敗燕兵老鵶堤嬴同攻王鎔入鎮取馬十萬攻幽州取莫邢果攻攻定州敗王處直王珂下晉絳冦彦卿為羅紹威畫計殺牙軍卿動作皆如全忠㫖全忠嘗謂敬翔劉捍彦皆為我主賜愛馬一丈烏遷圍鳳翔全忠稱神將逼昭宗洛駈徙長安居人劉捍改鎮州王鎔求和攻定州王處直降皆以一騎入城諭意圍鳯翔亦入城見茂貞計事攻淮南為浮橋全忠攻夀州回亦為浮橋劉知俊執送茂貞斬之康懐英乗朱瑾出以兖州降行取趙州匡疑鄧州攻鳳翔為先鋒楊宻攻宿州撃走之丁會以潞州降晉懐英築夾城圍之亡大將三百劉知俊降岐朱友恭降晉討之皆大敗劉鄩事王師範曰有機畧即奪葛從周兖州苦守之力屈不降吾主降以城還師範降遂素服歸梁以為元從都押衙居諸將上居之自如入劉知俊長安降岐討而鎮之魏降晉莊宗魏鄩乗虛襲太原不克乃爭魏積粟末帝道與晉戰大敗河朔皆入晉復兖州殺張方進討朱友謙尹皓陵凝譖酖之皆妾入明帝宫故二子遂凝遂雍被恩寵牛存節木強忠謹宿破張晊救張全義攻魏攻鄆皆有功守州料淮南必攻徐兵先朱瑾至朱夾城之敗急救澤州鑿守同州茂貞友謙東西圍之禱而井水皆甘張歸霸巢敗降州拔箭反射擊賊張晊營伏兵擊張晊蔡急擊蕭顥全忠將㧞去攻兖鄆弟晉人攻魏擒克用子落落時内黄破劉仁恭歸厚敗張晊赤崗射溥將陳璠攻鄆體被十箭梁亡家皆族王師重善運槊入自秦宗權歸威䝉氊沃入水冒大率兵濮州青州惠劉捍搆殺之楊師厚李罕之選入獻晉走自晉奔梁攻攻王師範永棣州攻襄陽趙匡凝進荆南走匡明擊劉知俊陷長安奇兵入其西門克之勁從全忠趙攻燕皆敗留屯魏州悉領梁之兵全忠死逐節度復牙軍銀鎗號稍難制其末帝召誅友珪事無巨細皆諮心益忌畏之死也末帝受賀降自是欲分魏相為二而魏博晉梁自此失河北王景仁初名茂章將行宻驍將之救王師範殺朱友寧全忠自二十萬攻亦敗戰酣召諸將飲酒全忠望之璞息梁繼楊渥守宣州渥攻之奔錢鏐全忠召之歸攻趙晉人大敗之栢鄉亦攻廬夀敗賀環朱宣使救兖州全忠疾馳禽之侍賔館吏招朱瑾不下全忠盡殺同降者獨不殺環感全忠誓以身報末帝時河北皆入于晉使與謝彦章屯行臺與彦章有隙殺之軍敗還卒馬嗣勲攻鳯翔時説降韓建軍練輿載兵入魏為羅紹威殺牙八千人謝彦章葛從周養為子以錢置盤中教陣法益時賀環善用步卒而彦章善將騎兵多而辨好禮儒士在軍中亦儒服雨臨敵御衆肅然有將帥威左右馳驟疾若風晉人望行陣齊整知彦章在此之賀環忌而殺唐稱帝凡十四年初朱耶赤心討龎勛賜姓名李國昌遂據雲中與子克用殺監軍撃寧武岢嵐李琢討之敗走韃靼巢賊亂以韃靼諸部赴難復長安功第一追巢賊于汴朱全忠襲之克用請討全忠不許軍皆黒衣賊憚之號鵶軍全忠乞討克用宰相張濬以自任濬敗走王行瑜率三鎮兵犯闕殺宰相克用討誅行瑜欲并討二鎮不許常與全忠相圖全忠簒位而克用卒長子存朂十一從攻戰克用之終也賜之三矢曰梁吾之仇燕王吾所立契丹與吾約為兄弟而背吾歸梁此三者吾遺恨存朂凡用兵則告廟取矢盛以錦囊負而前驅繋燕父子劉仁恭劉守光函梁君臣之首還矢先王而告成功遂代梁有天下是為莊宗莊宗以周徳威為平章境内大治連年出征政事一委張承業餉饋不乏郭崇韜決䇿滅梁平蜀然内畏劉皇后外惑宦官伶人克敵後志意驕滿沈湎聲色明宗兵至為伶人郭從謙流矢所中殂鷹坊人善友歛樂器覆屍焚之明宗本夷狄無姓氏為克用養子名嗣源莊宗使討魏州趙在禮至鄴軍變返洛即位斬租庸使孔謙罷其苛法罷監軍相任圜朝綱粗立置端明學士馮道趙鳳為之明宗不通文字使重誨讀章疏亦不通故置慮囚均稅刋九經自即位每夕焚香祝天願早生聖人為生民主内無聲色外無遊畋不任宦官廢内藏庫賞亷治貪年穀屢登甲兵罕用于五代為小康使輔相得人當尤有足稱愍帝明宗第五子潞王從珂廢弑之而自立石敬塘舉兵從珂自殺號廢帝郭崇韜孟知祥薦代中門使其職參管機要彦決䇿圍鎮州不可以契丹入冦退梁王章取徳勝圍楊劉決䇿敗之䇿既失徳勝梁兵日至唐欲棄鄆畫河自守獨決襲汴八日滅梁未嘗居戰陣徒以謀議居佐命第一功怨天下為己任遇事無回為宦官馬紹宏所乃請立劉后言天下利害非事五而求出鎮莊宗不許仍為樞宻使莊宗欲起樓避暑乞當如河上則慎暑坐變清涼宦官因間之宦官伶人譛河南令羅貫崇韜力爭益不合思立大功自安乃求征蜀監軍李從襲誣有異志宦官馬彦珪矯詔殺之破以唐威徳諷諭南詔語蠻獻所藏助南郊而蜀以所獲少被讒惠哭汾陽墓獨不拜僧誠安重誨明敏謹恪功為明宗中門使決大計決明宗立功佐命處機宻事無大小皆參勢傾天下盡惠勞心時有輔益而恃功矜寵無賢人君子之助卒至臣主俱傷斬殿直馬延矯詔殺宰相任圜右作威福處馬却河南嘉禾却夏州白鷹却宿州白兔諌以瘠斃殺田令方諌以不給侯三馬殺醴泉令右盡忠處去信韓玫而絶錢鏐徒陷楊彦温于死而不能潞王以李嚴監軍知祥叛誨以李仁矩鎮閬董璋叛𢎞遣石敬塘討董昌重自督粮運蜀人恐動朱昭又表其怨望召還致仕宦者翟光業檛殺之周徳威望塵知敵數威周楊五之勇聞天下疑梁築夾城圍潞徳盡總重兵在外莊宗召之即還遂從莊宗大破梁師之梁王景仁擊趙至栢鄉徳威退屯鄗誘之大敗擊劉守光破幽州敵與梁劉鄩爭臨清積粟據銄道之莊宗鋭於見徳威老將相務持重莊宗迫戰父子皆死於胡栁陂光禽梁將陳野又禽守驍將單廷珪符存審犯法臨刑主將愛歌召使歌得不死齊從李罕之歸晉為將有機畧與周徳威名小大百餘戰未嘗敗攻破居庸關擊王行瑜破龍泉寨攻汾州執李塘潞州降丁㑹攻夾城皆有功取契丹圍幽州獨決計擊走之徳勝築河南北兩城名夾寨從戰胡栁陂復劉鄩攻同州大敗之州破趙張文禮梁扶病徃禦契丹幽假不得與威病篤彦卿史進塘從破黄巢同被圍于梁驛擊梁人常戒避史先鋒栢郷之勝周徳威左進塘擊右梁主自將擊趙而晉方攻燕進塘捕梁芻牧者縱之使言晉軍至而夜擊梁兵敗之全忠病遂劇而晉得專力收燕時符存審同厄梁兵為先鋒討張文禮中流矢卒子匡翰沈毅有謀接下以禮喜與部曲語未嘗不名好讀書尤春秋關澈醉罵慰勉之王建及先登陷陣土栢郷之戰奪守河橋環胡栁陂之戰奪梁山遂大敗之焚賀攻徳勝夾寨戰艦典監軍韋令圖言其不可兵怏怏卒元行欽為留守先攻其父囚之又為害其兄弟明與明宗八戰八克明宗七中之行欽以中宗股救敗降明宗養為子絶莊宗賜姓名李紹榮禮馳莊宗于潘張數寵諸將討魏州趙在無功明宗軍變行欽以反聞而殺其子從璟明宗罵我兒何負爾行欽曰先帝何負爾遂死安金全驍果工騎射能擒生踏伏為病居大原力疾破梁王擅然莊宗不以能不録其功西方鄴明宗自魏反兵汴州孔循北門迎明宗西門迎莊宗鄴責其負國又欲殺石敬塘以堅人心明宗壻而循藏之宗明宗至汴鄴西迎莊宗莊宗遇弑鄴請死明馬前明年討髙季興獨有功取三州烏震與符習為趙王鎔報仇張文禮不文禮執其母妻招之不顧文禮乃㫁其手鼻誅而縱之震為一慟而率晉軍攻破鎮州以功拜刺史歐陽公謂大不孝符習本王鎔軍校亦乞歸討文禮報寃不勝遇還求一鎮自攻取無效又乞討趙在禮明宗兵變歸明宗孔謙勤敏傾巧調少為吏知聚歛事晉晉梁相距河上十餘年發供饋未嘗缺成之業與為多然民亦不勝苦得屢求租庸使郭崇韜抑不與山伶官景進為求之違詔督天下已除賦塞谷徑路禁止行人以征筭天下怨苦二明宗斬之罷使分鹽鉄度支戸部為張延朗孔謙既誅乞三司置使就使為之塘明宗常召食曰三司專任無暇知石敬有異志財貨在太原者悉調取之敬塘入京師殺之李嚴使蜀陳唐功徳之盛辭㫖清亮蜀人竦動宋光嗣應對蜀益竒之還言蜀可取狀與莊宗怒市蜀物少大怒伐蜀後蜀王衍願嚴來即降嚴馳入見衍即日蜀降孟知祥在蜀倔疆嚴求為西川兵馬都監其母曰今行以死報蜀矣至蜀知祥斬之而叛李仁矩明宗南郊使趣東川助禮錢將驕恣不赴董璋酒而與娼妓自飲璋牽出斬之拜伏乃免之還言其必反安重誨使鎮閬州以制至蜀日伺其動靜以聞璋攻之敗死朱𢎞昭與安重誨有隙故常使于外督副董璋東川不自安求歸鎮鳳翔重誨軍過鳳翔表其怨望及其回閉門拒之𢎞樞宻使范延光等知禍將興辭去而昭馮贇代馮贇明宗病與漢孟瓊王叔妃𢎞昭四人掌機務及立愍帝益自以為功以潞王從珂代敬塘從珂反愍帝召𢎞昭計事𢎞昭投井死安從進亦殺贇劉廷朗從珂之起鳳翔與共事者韓昭𦙍延朗等五人愍帝迫從珂代敬塘昭𦙍等勸從珂反而張濛又以太白山神語贊之留廷朗調城中民財助軍敬塘來乾延朗等請之不從罷敬塘總管延朗言不可不從暠敬塘反延朗勸親征敬塘入京師見殺與房掌機宻而專任事州納賂多者得善積錢三十萬康義誠事莊宗榮從討趙在禮勸明宗即位榮宻結秦王從而入白明宗言其反從敗閲其家貲之請將禁兵討從珂至則降從珂夷其族豆盧革相莊宗而雖名族而無學問黙薦韋説為相以佐已説亦無學術黙無所為唯諾崇韜而已崇韜號盡忠亦無學術遺大水民殍死帝責之不能對各以其子為拾人議其父子同省又各以為學士之為山陵使復入朝安重誨詬遂貶任圜明敏善談辨守人愛其容止聞議論益悚動討勸李嗣昭堅潞城為嗣昭辨讒嗣昭張文禮戰殁代將諭城中早降托後留守鎮州有惠愛郭崇韜鎮成徳與相善以鎮州事多為張彭所賣遂有隙歸崇韜忌之伐蜀辟與俱給崇韜死代將自蜀相選才俊抑僥倖公私足天下便之罵豆盧革韋説罷議相安重誨薦用崔協圜力爭協没字碑始與重誨交惡爭事上前厲聲色上不悦誨不與重誨歌妓益相惡退居磁重誣其反殺之趙鳳髠為僧以避為兵父好直言牋性剛強没極言劉皇后拜全義為不為草諌藉張全義養子貲鳳安重誨不知書始置端明殿學士于上左右以與馮道為之善任圜圜之死獨號哭責重誨責諌召用相士周𤣥豹碎明宗堅欲幸鄴獨手疏安重誨而罷幸斧佛牙邉彦温誣重誨反鳳啟明宗族彦温言獨數言其盡忠遂以朋黨出重誨得罪莫敢為節鎮禄分將校賔客常初于嶠亦訐直敢言與鳳俱在翰林鳳既貴嶠訾詆之鳳以告明宗而流之天下寃之李襲吉博學多知虎為書諭梁辭甚辨䴡全忠歎使吾得之傅以翼敬翔答之書辭不工書多傳于世皆恬淡弼文辭自娛昭宗未卒其後制冊盧汝為之而文辭不及張憲沈靜寡欲宗有文辭為鞠塲莊怒毁壇精吏事與諌以即位壇以細鎧明宗伐契丹又怒宦上庫簿有錢三萬又怒善崇韜薦其可相伶人官幽之太原趙在禮待其家而招之斬其使進明宗入洛不肯拘存覇以待變傳不肯奉表勸歐公以出奔且殺不列死節蕭希甫機辯矯激名走鎮州不樂為巡官棄母妻于梁變姓又不樂王鎔亡為僧莊宗求隠逸士率紹宏薦之希答内宴儀樞宻使不可坐宦官切齒豆盧革等意排斥之梁滅後宣慰青齊人譏以老母終堂生妻去室為匭函使乞惟自即位以後明宗欲用為諌議豆盧革韋説沮之宰希安重誨㫖誣貶革説死罵相見兩省官不起貶劉贊就學時父衣以青布衫食以蔬守官以法權豪不可干以私力學舉進士秦王從榮驕横官屬皆浮薄諛諂贊獨率以正道秦王敗馮道為力爭得免死晉稱帝凡十二年石敬塘出西夷明宗妻以女鎮太原廢帝徙敬塘天平不受命求援契丹契丹耶律徳光立為晉皇帝以之南下敬塘割幽薊等十六州與契丹是為晉髙祖髙祖父事契丹吐谷渾來奔契丹遣使讓帝憂悒病殂然能用桑維翰中國稍安又能樂聞其言懲法外稅民廢樞宻院委宰相分判出帝立景延廣用事告即位于契丹稱孫不稱臣又激契丹使者謂要戰則來契丹入冦帝自將擊敗之􅀈勝驕侈契丹耶律徳光大入執帝以歸桑維翰身短面長常自竒七尺身不如一尺面慨以姓桑喪同音不得舉進士或勸他求仕然著日出扶桑賦親又鑄鐵硯卒舉進士與劉知逺贊敬塘舉兵往説耶律徳光入援滅唐興晉維翰之力説諌絶契丹而出帝用景延廣絶契丹隂使人帝出延廣已為樞宻事無巨細一任之數月之間百廢浸理韜復置端明學士悉用親舊遺賂巨萬李彦馮王讒之出尹京兆彦契丹兵至嘆晉始于維翰敗于延廣之帝遣張澤以兵入府維翰安坐不動厲聲語彦澤股粟不敢再往乃以帝命召下獄縊之而給契丹以自縊景延廣父教以射不入鐵不如不發横教出帝不稱臣契丹謂契丹使喬塋有磨大劒十萬口要戰則來契丹益怒數帝置酒其第豆相賜予極侈而是嵗餓死者十萬契丹兵至猶恃功恣横十兵入京師先馳騎取延廣鎻之數罪付夀使執自扼吭死吳巒契丹入援時守雲州契丹圍之七月不下人出帝絶契丹牙將邵珂召契丹入攻貝州晉使巒守之珂開引契丹入巒投井死漢稱帝凡四年劉知逺其先沙陀人與石敬塘俱事唐明宗後與桑維翰贊敬塘有天下及契丹虜出帝歸王峻言契丹必不能有中國乃自即帝位未幾契丹果遁以李從益知南朝事知逺殺之而改國號漢是為髙祖髙祖初在河東富強冠諸鎮坐視契丹之滅晉安行入洛而有之大抵多史𢎞肇之力張璉助杜重威反許以不死及降殺之而以重威為太尉中書令隠帝驕縱狎愛後贊郭允明等郭威平三叛鎮河東李守真永興趙思綰鳳翔王景崇不敢專賞請賜在朝宰相以下帝自即位楊邠擅機政郭威主征伐史𢎞肇典宿衛王章掌財賦國以粗立李業聶文進等殺邠章𢎞肇反謀殺郭威國遂亡蘇逢吉精神爽秀詐獨得入侍逺納文等簿中伺色進之貪無行知生日使理獄祈福無曲直盡殺之報曰獄靜矣徳朝廷大事皆出之而無學故漢尤無法度不施政民莫稱焉與蘇禹珪同被倚信逢吉尤納貨市權償玉帶錢奪李菘田宅誣而族之使李求吉詔捕盗并鄰保皆族使母死不喪妻死使百官州鎮輸練絹為喪服酒辱郭威欲罷威又與史𢎞肇相惡繳李業殺𢎞肇郭威兵至自殺史𢎞肇走及奔馬犯初為禁兵蘇為將嚴毅寡言所至秋毫無與楊邠逢吉同受顧命慘酷關西用兵民相驚者無大小皆殺之直太白晝見仰觀者即腰斬謂安朝廷定禍亂須長搶大劒毛錐子安足用王章言無毛錐子軍賦何從集不喜賔客隠帝與李業等嬉遊無度太后親族請托皆裁抑之子使自民抵罪者但以三報示之即腰斬故人求軍職輙斬之欲歐蘓逢吉李業郭允明用事以𢎞肇威權震上殺之楊邠本魏州掌藉吏故不喜文士已長吏事不知大體謂國家帑廩實甲兵完而禮樂文物皆虚器聲為相行事旬日人情不擾而止與謂陛下但禁有臣在帝所欲為皆抑不從𢎞肇王章同日見殺稍儉靜客得賂以獻于帝晩節通賔課吏寫史傳王章知逺使掌三司剥下民甚苦之關西用兵供饋未嘗乏絶然民租一石舊以二升為雀鼠耗章増二斗名省耗田緡錢出入舊以八十為陌章減出者三錢訴者必括其隠田謂文士一把筭子不知顛倒何益于國死擡估官俸犯鹽礬酒麯者皆劉銖慘酷合知逺以勇斷類已特信之為鎮平盧隨年杖歡杖増民賦畆出此錢公用隠帝患其剛暴召之威喜李業能殺𢎞肇等謂威君可謂僂儸兒郭兵至盡殺威等家屬殺銖而赦其家李業知逺后弟帝隠帝時以母舅用事无顧憚宫時灾怪百出方與業等庾語相誚放紙鳶中又楊邠𢎞肇皆以為不可故怨之而僣殺邠等而遣詔殺郭威威反兵至取内庫金寳懐之奔為人所殺聶文進本軍卒善書算見親信外居中用事謀殺楊邠等作詔書制置中㸃閲兵藉指麾殺戮害周兵逼城謂臣在此百郭威何飲酒歌呼明旦同日見殺周稱帝凡八年郭威為漢樞宻以一頭子易置節度白文珂代王守恩西京及平三鎮請徧賞將相藩鎮以結人心以樞宻使鎮鄴帝信李業遣使誅之威召魏仁􅄎謀倒用留守印矯誅將校激怒士心討契丹至澶州衆擁之還兵滅漢是為太祖太祖用李穀為相王峻謀軍旅李質守法度罷貢獻禁越訴除牛租誅贜吏臨終命王溥相漢髙祖弟劉崇稱帝江東號北漢世宗郭榮祖本姓柴㓜從姑養髙家因以為子在位僅五年而外事征伐内修法度誅樊何以肅軍政簡士卒以汰羸老南平江淮西克秦鳳北開關塞廢佛寺三千三百三十六而造僧帳毁佛像而鑄貨泉均田租定刑統考雅樂設科目神武雄畧虚心聴政應機決䇿出人意表攻城對敵矢石落其左右畧不動容閒暇則召儒者讀前史商確大義雖用法太嚴素有才幹聲名者無所聞有尋亦悔之真一代英主也恭帝幼嗣位我太祖北征衆軍推戴帝遂禪位天下為宋王朴知漢必亂去楊邠東歸知後從周世宗于澶州獻平邉䇿觀失之由平之䇿輕兵克吳風得吳則桂廣可臣岷可召後吳蜀平則幽可望而至惟并必死之冦稔之可以平邉時惟陶穀竇儀楊昭儉言與朴合合世宗見其議論偉然益竒之與計天下事無不征進守東京再征淮留守京師明敏多材智隂陽律厯亦莫不通為欽天厯正雅樂至本朝用之剛果而得君凡所為無敢難者而亦莫能加我留守時廣城治道壯偉宏闊我宋亦多仆之才宋削平諸國先後皆如其言斗門疾作而仆視汴口欲作年五十四鄭仁誨唐將陳紹光醉拔劒欲殺之仁誨植立不動還鄉事母以孝聞與周太祖同在劉知逺帳下太祖每事質問仁誨所對不阿益竒之親太祖討河中李守貞機晝多所參決其卒世宗臨之世㣲時常為大祖謀畫及居大位無所聞而太祖宗皆親重之謙徳好禮不自矜伐為士大夫所稱扈載為文以辭多自喜已運源賦厯代碧鮮賦竹世宗録觀之拜翰林病不能謝未幾卒初王朴薦之李穀穀不用曰命薄恐不能勝等時人主禮重文士載與張昭竇儼陶穀徐合符俱被進用及穀文劣而無行特能進諛取合載雖不昭儼之議論粲然而不為穀之諛死節王彦章事梁晉驍勇其王鐵鎗待梁晉爭天下為勍敵人得妻口厚而招之斬其使以自絶之末帝信讒不時破晉取鄆州事急敬翔激帝用約三日敵果夾寨之南城憤梁日削嫉趙巖等所為巖等匿其捷書劾之中莊宗攻兖州末帝以新募五百騎與之兵少戰都被禽能莊宗欲全之曰臣受梁恩非死不報豈有朝事梁而暮事晉遂見殺裴約事晉李嗣昭守澤州泣嗣昭𦙍子繼韜以澤路叛歸梁約召州人曰即君背違君親吾死于此不能歸梁與州人拒守城破殺劉仁贍事南唐李景鎮驍勇周世宗伐淮壽州守袁黄所至稱治下世宗攻之百端不請出戰不得憤惋成疾之景既割地奉表獨堅守不下其子謀出行斬于是士卒皆感泣死守日垂死不知人副使始以城降是卒世宗名夀州為忠正軍死事十五人卿内馬彦超附朱守殷傳取朱令詢李遐張彦鄭昭業見本紀歐公王清彦超張徳源從李罕之叛晉降梁東為劉鄩守具州備魏晉已盡有河北山數十州獨具州堅守踰年不下城中食盡殺之以降晉人盡殺降者夏魯竒自梁奔晉圍拔莊宗莊宗為劉鄩所圍魯竒力戰決戰中都擒王彦章鎮河陽有惠愛徙宣武遮留不得行父老詣京乞留董璋反攻遂州拒守食盡無救自刎姚洪初從董璋後事晉戍閬州李璋反招之投璋書厠中被執罵曰老賊為七郎奴掃馬糞得一臠殘炙感恩不已今天子用爾為節度何苦反耶璋刲其肉食之至死大罵王思同劉仁恭甥戰奔晉守善騎射好為詩陳禮士未嘗有功秦五年畫山川利害明宗始知其才非從珂之反遣伶奴通意執以獻之京師被執曰不知從之而得生恐終死不能見先帝于地下張敬達以騎射事莊宗太原敬塘遂反明宗疑敬塘使敬達代鎮敬達攻太原契丹圍之救兵不進力窮楊光逺逼之降曰諸公何不殺我而降光逺斬之契丹哀其忠葬之翟進宗張方迪守晉登州進宗守晉淄州楊光逺反脅取二州惟進宗不屈見殺沈斌為石晉守祁州契丹過祁趙延夀招之斌登城罵其父子䧟腥羶城陷自盡王清事石晉有戰陽城先杜重威奪中渡橋開路重威二志同行宋彦鈞亦退獨力戰死史彦超事周左周圍漢太原契丹救之彦超勇憤俱發右馳擊解而復合者數四殁于陣孫晟好學尤長于詩之為道士居廬山繪賈島事之道士以為妖逐儒服謁唐莊宗安重誨惡之書像購之世奔吳相李昇父子二十餘年地富驕肉臺盤宗攻淮急使晟奉表稱臣割世宗厚待之問江南事終于不對刑臨刑神色怡然正衣冠南望拜乃就一行𫝊處山林二人鄭遨唐昭宗時欲隠妻不從棄妻子入少室山為道士欲求松脂徙華山與李道殷羅隠交號號三道士生唐晉召皆不起賜逍遥先詩章為人貴重張薦明遨同時道少儒學因為道士唐髙祖召講徳經鼓聲論守一去就不違義一人石昻家書數千四方士多從學問者不求仕符習召為臨淄令楊彦朗諱石贊改為右昻責彦朗奈何以私害公解官歸求父不喜佛柩前誦尚書云所欲聞石晉髙祖孝悌之士上其義行召為宗正丞疾諌出帝不從稱歸以忠獲罪至死不言一人程福贇晉出帝親禦契丹軍士縱火欲亂福贇救火被傷恐動揺人聼因匿不言李殷誣與亂通殺之終不自辨孝弟一人李自倫六世同居義石晉敕所居飛鳬鄉為孝鄉旌表門閭唐六臣歐公曰朱全忠以客將張廷範為太常卿裴樞不可是嵗彗星出栁粲殺樞等白馬驛以應之不附梁者皆死朝廷一空明年張文蔚等奉冊寳于全忠使樞等不死雖未必能存唐亦必不亡唐而獨存唐之亡也賢人君子既與之共盡其餘在者皆庸懦不肖之徒耳作唐六臣傳張文蔚文行知名多制詔守大體梁栁粲殺樞等力解朝士賴以全為冊禮使遂相之裁梁初制度皆所定居家亦孝弟楊涉祖收不唐名家世守禮法梁拜相與家人對泣曰吾能脱此網羅為傳國寳使遂相之事子凝式有文辭善筆札厯五代常以心疾致仕張䇿年十三知黄初元年二月鼎鉻之妄為僧巢賊至返初服奉父母避亂好浮屠克用攻行瑜與婢輿母歸使全忠薦于朝為梁傳寳副遂相之趙光逢文行知名棄官杜門方直温潤稱玉界尺押以世亂善栁璨復仕為梁金寳使遂相之帝又相末薛貽矩為韓全誨作畫像贊還全忠薦之朝為哀帝遣勞軍稱臣拜舞趣帝遜位梁押金寳使遂相之蘇循諛巧無恥使全忠敗于行宻倡議歸受禪惡為梁冊禮副自以附㑹當首見用敬翔其無行勒歸田里從朱友謙降晉拜州廨㕔事謂之拜殿入見舞蹈呼萬嵗稱臣義兒后唐以養兒成功亡亦由之可紀者九人其一為明宗李嗣昭本姓韓謹膽勇過人兵太祖戒其飲終身不飲以厚常從用河中敗王珙又敗梁救兵禮取澤州卒奪潞州韜戰功最多攻鎮州張文中流矢子繼降梁莊宗斬之嗣本姓張劉從破行瑜攻羅𢎞信破潞州夾城擊鄩下洛磁蔚州與契丹戰没嗣恩姓駱存信姓張存孝既取潞州被譛附梁晉擊而車裂之存進姓孫昭從破巢賊戰栢鄉繼嗣攻張文禮戰没存璋與張承業受顧命立莊宗法䋲軍士境内肅清皆夾城栢鄉魏博之戰從存賢姓王善角觚中援朱友謙于河食少或謂河中人欲殺子歸梁答曰死吾志也復何恨卒敗梁兵伶官莊宗好俳優知音能度曲自為王至天子常與倡優雜戯為劉叟賣藥以謔劉后周匝胡栁之戰失之滅梁復得使如其請以梁教坊使陳俊為景州内園栽接儲徳源為憲州刺史崇韜諌不聴敬新磨擒諌獵縣令光批李天下頰無殺敬新磨則同無尤善俳而它過景進史彦瓊郭從謙三人敗政亂國之最女進參決國政乞採美殺皇弟存義從誣友謙并其將皆族之為彦瓊致趙在禮翔謙優名門髙拜崇韜叔父為存義養子流涕稱二人寃明莊宗稱其為黨而戲之遂激怒軍士因宗兵至作亂宦官張承業唐昭宗時監太原軍宗崔𦙍誅宦官時克用匿之克用死以莊屬之莊宗在魏與梁戰河上十餘年軍國皆委之積財治兵課農以成莊宗之業莊宗將即位勸為天下除大惡然後求唐後立之不聴仰天大哭肩輿歸太原不食卒張居翰唐昭宗時監范陽軍州誅宦官時劉仁恭匿之從克用攻梁㒈莊宗滅梁而驕宦官用事崇韜専政黙黙茍免朱宻改誅蜀王衍詔一行為一家免死千餘人全忠之誅宦官在外者多為諸鎮所匿時時方鎮悉以宦官給事吳越尤多至莊宗訪唐宦官尚得數百人遂復用事有馬紹宏者尤見信用誣殺大臣黷貨専賦莊宗疑明宗有異志使伺之反以告明宗故明宗之二心紹宏實啟之崇韜之死宦者為之故明宗入洛無西顧之憂明宗盡誅宦官流血盈庭而孟漢瓊依王淑妃用事白秦王反西迎廢帝雜傳王鎔已見唐昭宗藩鎮類生初和于梁後附晉從攻戰任宦者求長張文禮滅其族羅紹威已見唐昭宗藩鎮類嗣引朱全忠盡誅牙軍遂衰子周翰楊師厚逐之王處直父宗富擬王侯賊宗之子處存鎮定州感激流涕入關討巢收城擊賊克用第一勤王倡義處存第一既死亂軍推處直晉梁圍之絶晉事梁梁攻王鎔復絶梁事晉與梁戰河上十餘年未嘗不從養妖人李應之所獲小兒劉雲郎為子而更其名為都莊宗討張文禮處直以鎮亡則定不獨存招契丹爭國入冦以牽晉兵取都囚處直盡殺王氏莊宗使都襲鎮以繼岌其女為明宗惡之都反招契丹援兵敗自焚死劉守光父仁恭能穴地攻城盧為幽州軍校奔晉晉王取幽州表為節度龍晉求兵攻羅𢎞信守光執使者以叛大敗晉王兵三使子守文取滄景徳州邀鎮横海兩鎮共號十萬擊魏屠吳梁遣兵敗之自是連嵗為梁所敗復附于晉守驕侈子守光以罪被逐自稱節度囚仁恭文誘契丹入攻之又擒而囚之遂驕大晉庸愚而慘刻梁晉栢鄉之戰欲合鎮定兵襲諷諸鎮尊己年以梁晉不尊我為帝械之自稱大燕皇帝明晉周徳威㑹鎮定兵禽其父子刺仁恭心血祭先王而斬之李茂貞鎮鳳翔三稱兵犯闕忠唐昭宗封岐王而韓全誨刼昭宗依之全圍而奪之唐亡茂貞亦困寛全忠篡位諸鎮皆稱帝獨茂貞不能止稱岐王仁愛物民頗安之莊宗入洛始遣子入朝稱臣子從儼繼鎮有田千頃竹千畆懼侵民利未嘗省理鳳翔人愛之見唐昭宗韓建唐僖宗以為華州刺史從盡除昭宗諸王及殿後軍謀廢立降全忠攻鳳翔從遷昭宗歸洛全昭宗宴全忠躡足使出之相忠出鎮許州亂軍誅温韜鎮義勝賂發唐諸陵昭陵獨固乾陵風雨不可發唐劉后莊宗厚待之明宗誅之盧光稠與譚全播為盗潮全播讓光稠為師而取䖍韶州攻王潮取州劉岩攻䖍州全播大敗之而推功諸將杜光稠病予之符邙不受七光稠死軍屢亂稱疾門州人強起之治䖍年有善政并吳楊隆演之雷滿武陵人麾自置士團軍諸蠻從之推為帥縣髙駢召𨽻下據朗州上下江陵攻刼州襲成汭荆南焚掠之鍾傳據洪州趙匡凝據荆襄並詳見唐末朱宣鄆州朱瑾兖州而後奔淮南為吳除徐温死詳見唐昭宗王師範唐青州節度詳欲為唐誅朱全忠不克見唐昭宗李罕之據河陽歸梁詳後歸晉據潞州以歸梁見唐昭宗孟方立為唐昭義節度見五州皆為晉所并詳唐僖宗王珂李克用表襲重榮鎮河中全梁圍之晉援絶梁求援李茂貞不報出降忠殺之瓚仕無功兵末帝使尹京莊宗至開門迎降趙犨守陳拒黄巢珝隂結全忠陳弟昶襲為昶卒珝襲全忠使鎮同州歸卒陳人之罷市子犨次巖趙岩為梁末帝租庸使與張漢傑等居中用事中外切齒啓末帝召楊師厚討友珪師厚據魏州復置牙軍帝患之失又啟分相魏為兩鎮牙兵亂降于晉梁由是盡河北劉鄩方戰澶魏間勸末帝郊天善晉兵入汴啟末帝勿下樓末帝卒死樓上岩温韜走依之韜斬之又善段凝凝請族其家馮行襲據金川朱全忠輸貢唐後附詳見僖宗氏叔琮從全忠攻戰敢爭綘州時大敗晉兵于蒲縣晉不追為全忠弑昭宗關寳朱瑾敗降全忠宗魏博降晉寳亦降胡栁之戰莊欲退寳決戰敗梁康延孝末帝使與段凝軍河上棄梁歸晉獻取梁䇿後如其言自鄆取汴先鋒降蜀窮追王衍以待繼岌遂怒董璋功劣而見親禮又見崇韜死積疑叛繼岌孟知祥夾攻禽殺之張全義與李罕之同事諸葛爽民據洛陽之襲罕之河陽以歸梁勸耕息梁興賴梁亡事晉諌遣明宗討趙在禮憂卒詳見唐昭宗朱友謙為盗殺璠事王珙於陜州河與李璠殺珙而又全忠養為子鎮中闕之反附晉宦官伶人求賂不得因其之子令同從討蜀誣與崇韜反族袁象先在梁無戰功為末帝誅友珪賂鎮宋州十餘年誅歛厚積梁亡以其資唐將相伶官宦人劉后内外翕然稱之故莊宗改宣武為歸徳以寵之段凝全忠使守懐饋食甚豐大悦城監兵河上李振請罷之王彦章破徳勝南趙岩等匿之歸功于凝遂代彦章盡總精兵見故莊宗至汴而汴無以戰降唐賂劉后甚親愛明宗誅之周知裕幽州亂歸梁催白晉降梁者悉𨽻之州河上相拒十餘年堅陷陣為最革安不近惡病之俗陸思鐸鏤姓名箭筶中莊宗鞍陳州有善政死令葬之趙在禮自劉守光奔晉宗從莊宗至貝州軍反攻取魏莊宗使明討之明宗軍與在禮合反兵南向之所厯鎮邸店羅列債貲巨萬宋人尤苦謂眼中拔釘後再至歛拔釘錢霍彦威少仕梁勸鎮邠寧段觀明宗以兵南向其與安重誨進捕凝温韜欲報仇客有淳于晏故彦威得少過失房知温明宗自魏反兵首馳赴之千魏軍驕知温誅之于盧臺戍凡九指揮三餘家皆誅之漳水將厚歛游戲貲子獻其物得沂州吏得其餘者皆為富家王晏球梁亡降晉皆大敗之定州王都反招契丹秃餒惕隠中國威振契丹由晏球始李彦威全忠養為子名朱友恭而全忠恐昭宗奔他鎮使與叔琮弑帝殺之以自解李振抱真孫範宦官謀廢昭宗勸全忠仗義立功梟説王師歸梁每至朝廷必有貶降號鴟馬與彦威等謀弑而勸全忠殺之塞天下口驛之誅殺勸投濁流代敬翔崇政院使白梁滅伏誅裴迪全忠用兵四方留汴謂兵賦王後全忠以兵事自處而貨財獄訟一任之師範謀襲汴迪宻探虛實使朱友寧巡鄆兖故師範事不得成孔循流落汴州使預弑昭宗謀自又弑何后殺栁粲等莊宗守汴明宗魏反兵北門迎明宗西門迎莊宗曰先生老入之子族犯麴者明宗㢮禁紿安重誨不可妻皇而自求之孫徳昭父惟最率義兵攻巢賊于咸陽保朱玫亂長安惟最亦率兵擊之京師民賴全昭宗被幽與孫承誨董從實應募斬劉季述以功號三使相昭宗幸鳳翔獨歸全忠王敬蕘善用鎗重三十斤饋守穎州秦宗權獨不能下全忠攻淮南兵甚厚龎師古攻吳敗歸燎薪作粥餔之劉知俊背時溥降全忠丹廷鄜坊四州不俟命擊邠州楊崇本取見全忠無罪殺王重師叛歸李茂貞茂為茂貞攻靈武敗梁康懐英兵攻興元取鳳翔貞奪其兵奔王建反攻茂貞取秦鳳階成殺王建忌而之丁㑹善挽歌敗李罕之召晉兵圍河陽㑹大敗之與葛從周羅𢎞信于内黄取時漙宿州敗朱瑾于金鄉疾罕之以潞降梁㑹因取澤州素畏全忠雄衛稱累年全忠弑逆與三軍縞發哀遂降于晉賀徳倫梁末帝因楊師厚死分魏博貝為天雄軍以徳倫鎮張彦知朝廷忌軍府強盛而設法殘破之遂作亂迫徳倫降晉業莊宗入魏斬彦徳倫麾下多奔張承懼為變斬之安重霸狡譎代棄蜀勸宦者王承休鎮秦州降魏王蜀紿王承休出師奪其鎮以王建立明宗自魏反兵建立殺當山軍及其守兵以全明宗家屬子守思為漢西京守貪鄙之郭威怒其肩輿出迎以頭子命白文珂代隠帝慰之曰陛下睡覺矣郭延魯父饒驍勇事晉守沁九年有惠政亷延魯善槊遷復州不敢忘先君之志益以平自勵功復滿攀號獨時武夫為刺史者皆恃縱下為害延魯父子以善政著聞華温琪從黄巢敗投河自經皆不死後為梁唐節鎮為梁守棣移州避河患萇從簡世屠宰暴奪梁軍大旗遣鑿髀取箭言笑自若剛捕食小兒卒夜殺富人取玉帶張筠世以貲為商守背時漙以宿州降梁繼從唐伐蜀筠弟籛京兆明宗兵反魏而岌平蜀歸籛拒之繼岌自殺陵筠掠康懐英家貲掘唐故宫得金玉奪温韜發物籛取繼岌行槖取蜀王衍蜀中珎寳色筠好施而籛貪鄙籛死筠盡有其貲聲自娛者十餘年人謂地仙李周救盧嶽嶽勸事晉憂梁攻楊劉急莊宗謂周為我守何四鎮多善政劉處讓字徳謙光為張萬進截耳軍門求晉救莊招降范延樞宻使梁易宦者以文臣宗易武臣處石晉用桑維翰等處讓不平書奪為之讓死遂廢其職而以印付中張希崇陷契丹奔明宗使鎮靈武勸耕足食回鶻入貢石晉復鎮之月掩畢口星知死相里金率諸州皆武人多以部曲主場務私其利金獨禁部曲不與事首應從珂之檄張廷藴劉皇后從莊宗在魏縱下不法廷藴斬之破與明宗討潞州元行欽廷藴先一日登城之得所識僅數字而平生重文士破鄆趙鳳薦之厯七州家無餘貲皇甫遇石晉時契丹助青州楊光逺反遇擊敗之等契丹使趙延夀圍鎮州杜重威不出戰遇戰退之兵重威奉表降契丹逼使書名以降敬契丹使引先入京師遂絶吭而死歐公謂翔佐梁簒唐遇不能攘臂殺重威雖死不足貴故不得列于死事盧文進自幽降晉中莊宗以屬其弟存矩殺存矩奔契丹教以國織絍工作契丹由此益強以掠為唐患十餘年禮歸唐而敬塘父事契丹奔南唐謙謹晦迹接文士惟談臺閣故事楊思權佐秦王將䇿鎮河東啟其逆謀兵討潞王從珂于鳳翔首擁軍降故諸鎮皆潰王𢎞贄潞王反愍帝奔遇敬塘奉謀之𢎞贄殺帝從兵𢎞贄奉帝州廨從珂命酖之劉審交石晉合三司為一而審交為使為不肯檢田益租民賴不擾以河北耕器範教陳州哭汝州有能名其死州人聚乞留葬使得嵗時祠祭王周厯四鎮有善政重定州橋壊覆民租車為償粟而治橋杜威降契丹家人逼之亦降髙行周父思繼兄弟以武勇雄北邉用克用欲取幽州先招思繼而後敢討克以劉仁恭為憂恐思繼為燕後患殺之從行周為明宗乘雨襲鄆州不肯拒敬塘入京師安叔千厯四鎮貌堂堂而不識字號没字碑飯契丹勞之曰是安没字否當予爾一喫處翟光鄴周祖使守永興沈將死戒無乆留以煩軍府州人乞留葬嘿多謀事繼母孝不營財産假官舍以居蕭然僅蔽風雨粗衣糲食處之泰如聚書為樂臨政務寛靜體息馮暉靈武自明宗後嵗費六千萬轉輸供給民至流亡暉鎮之屯田省運部族懐惠管内大給招其豪拓㧞彦超居城中凡晉忌而徙之大靈武亂復鎮之殺彦超十餘年恩信著皇甫暉為魏卒戍堯橋關守刼趙在禮作亂焚貝州以入魏終唐世陳州奔江南畜兵唐景思史𢎞肇喜告許景思奴告之景思請索家有錢十千為受外賂有甲一屬為私留兵王進走及馬奔符彦超招之麾下以敬塘鎮河中使往返京師止五六日徒善走秉旄節常思無戰功以幸㑹敬塘秉麾節而周太祖少孤又嘗依之故富貴終其身王峻以善歌遇周史𢎞肇使人殺峻及郭威遂舉兵犯京相兼修國史以兖州慕容彦超將反諌親征劉是保恃佐命功不遜峻既走劉是破彦超遂求諸州薦太祖大駭求解職堅起之益加優容之積不能忍殺劉詞事楊師厚勇得知名以房州為政才苛忘暇日按甲枕戈而卧曰此取富貴豈可之王環為孟昶鎮鳳州禽世宗下秦成皆降獨鳳堅守不降既拜驍衛以勸事君者朱守殷莊宗厮養以言人隂私結知裏守徳勝為王彦章所破與伶人景進表驕恣誣殺朱友謙使伺明宗動靜因啟明宗以逆寳召救郭從謙亂不動莊宗既死掠宫中嬪御貨鎮汴州聞明宗至遂疑而反范延光討之自殺董璋本富人家僮鎮郭崇韜善之與伐蜀以蜀平使與孟知祥分東西川安重誨薦制知祥故益横鎭不貢助郊物欲殺李仁矩族重誨遣仁矩等分之遂與知祥反璋家見疑知祥賣已攻之大敗走死范延光楊劉為梁所獲被囚掠終不言晉事樞勸明宗速攻朱守殷平汴與趙延夀並宻使病言國馬三萬五千一馬之費可養五卒人情洶洶或請以嚴制曰制動當以靜明宗知潞王之變先辭去職反于鄴既而即降因術士贊其蛇入腹之夢遂初秘瓊殺董温琪取其貲延夀殺瓊而取之而終以貲為楊光逺所殺光逺亦不免安重榮以箭卜叛歸敬塘鎮成徳塘謂天子寧有種兵強馬壯者為之僨敬與契丹為父子數請敬塘大吐渾叛契丹重榮納之名遂反射播竿龍口以卜有天下討契丹為杜重威禽之漆首送契丹安從進率百官迎從珂徙鎮山南襄州天與重榮表裏反兵敗自焚敬塘自媿取下不順姑息藩鎮故在位七年反者六起從進最後反楊光逺與契丹戰折臂契長吏事厯四州以治稱契諌唐以萴刺還丹鎮中山敗降契丹丹勉之事敬塘叛鎮汴敬塘親信之天後益驕横召契丹入冦以兵敗猶言當作子以災豈有秃瘡天子跛足皇后召其子囚之以降三漢劉知逺為立碑雷擊之夷狄為中國禍十年杜重威妻敬塘妹契破范延光門破安重榮守鎮鎮州聚歛丹殺掠閉不出留鄴降契丹軍士解甲大哭不與契丹入汴降市人詬罵降漢使鎮歸徳受命反而復被誅李守貞破楊光逺所詔契丹趙驕貪所至草木皆盡請與杜重威北應延夀之歸而同降契丹遂漢興降漢景僧總倫謂有非常相又射中畫虎與鳳翔王崇京兆趙思綰反郭威討之自焚死繼二鎮亦平張彦澤目黄夜有光如猛獸條暴虐人殺張式周奏其不法二十六及誣殘蔽狀王逆風敗契丹陽城俟與重威降契丹為先鋒入汴驅帝出開封府以契丹恃功酣飲殺掠契丹怒剖其心以祭死者市人爭臠之王景崇監石晉左藏庫劉知逺起太原取庫金迎之自詣鄴獻攻鄴之䇿始竒其才使圖鳳翔李益不忍殺益逃歸譛之火景崇以鳳翔反趙暉討敗之明年起自焚趙思綰王景崇與之西擊蜀齊藏珍勸殺之景崇不聴從李益至永興刼城以叛食盡以人為食每宴犒殺人數百壯郭威禽之臨刑謂釘磔之醜夫所恥慕容彦超漢祖同産弟速副髙行周討杜重威而凌行周獨欲攻重威大敗周兵至謂當陽吏歸營又謂隠帝明日出觀臣戰大敗反既臣周又謀反大括民財殺崔周度嘗諌勿鎮星犯角亢塑像禳之征被圍欲以鐵胎銀犒軍周祖親投井死馮道字可道喪退耕由張承業事莊宗忽刻苦儉約田居相明宗言患生所誦聶夷中家詩又言聖人大寳曰位明宗不能曉之相十餘年潞王反出迎相之石晉滅唐又相厯三公契丹滅晉責事晉無狀自稱無才無徳癡頑老子又為契丹太傅周滅晉又事之事四姓十君以舊徳自處當世亦仰為元老喜為稱譽自對契丹佛出救不得喪君亡國未嘗屑意號長樂老著書陳四姓契丹所得官爵為榮自謂忠孝事九君未嘗諌獨諌世宗伐劉旻而世宗卒敗旻李歐公論其無恥因叙疑妻氏貞㓗晦翁真稱鄉原李琪與兄珙俱以文章顯趙為梁征伐書詔下筆輙得全忠意為相結岩等自助大水應詔類千言謾然無足取莊宗獨重之琪請明宗無改唐國號明宗羣臣五日一入謂非唐故事乞復朔望入閤而不能明入閤正衙之禮真安重誨殺其臺門殿直不敢言誤以定州為定罰俸勸文章自負以牙板刻前鄉貢進士淇成納堅壁不出少持重不知進退梁救杜珽從而敗遣曹州素劇十餘刺史皆坐事至珽獨以治聞代許州馮行襲行襲感泣解邙曹州禽賊雍答内黄外黄丘下黄陳留鄭玨纂諸孫以莊宗兵入汴欲以傳國璽與之緩兵又曰但恐不易了李愚不拜梁衡王友諒賔從伐蜀請崇韜急擊然為相不治宅第借延館以居敗氈弊席蕭四壁請與馮道迎從珂復相舉時方多事欲依古制理頒唐六典使百司各其職州縣貢士作鄉飲禮粥從珂目之為飯僧盧導馮道李愚迎從珂使草勸進牋終于不肯李愚曰吾輩罪人盧舍人言是也司空題張彦欲草奏詆梁君臣判官王言不能下筆題至揮筆成文言甚鄙淺遂見用劉昫代王玫判三司盡除民間積欠吏沮怨而民歡然與馮道親家李愚惡道為人詬罷之盧文紀為中丞受臺吏拜從以于鄴與其父同名參上不納鄴忿死珂擇相皆言文紀姚顗有人望從珂書姓名納琉璃瓶中挾而相之下多事從珂責之請廢五日起居復開延英天從珂被虜謂曰輿議謂卿相可致太平今使吾至此馮𦙍孫不通世務學韓愈為文所相廢帝口邙門三不開自洛朝河陽無言惟獻綾三百匹集初效昌黎闢佛既為石晉所罷反學佛撰法喜佛國記行時謂佞清秦不徹乃求佞佛死後家婢有為𦙍孫語者崔協之相昭宗亦然時人嘲之曰生不能言死而後語姚顗少憃惟司空圖奇之妻以女相仁恕而不知錢陌銖兩御家無法與馮𦙍孫齪齪無所為馮道合三銓為一顗文紀復分之増損舊格選人不便往往喧訴劉岳政魯八代孫馮好學敏文辭冊請明宗百官皆賜告身笑道遺下兔園道本田家狀兒質野俗明宗以鄭餘慶書儀有起復之制非所以厚風詔岳删定而鄙俚轉失其本後益訛謬馬縞謂明宗立魏廟宗劉岳増損書儀皆取決是縞言嫂叔無服太時小功今給假九月非劉昫等請喪服皆依開元禮自始具五服附于令盧文紀以其迂鄙待即遷祭酒崔居儉自後魏為甲族子孫専以門望自髙為世所嫉拙于為生居顯官衣乏死無以葬崔梲好學不遊里巷居滑十餘年人罕識面能専于文學不能涖事桑維翰使知貢舉果不舉職取孔英朝晉髙祖使與竇貞固吕竒張允復文武二舞及㑹禮樂其聲悲離聞者悲憤明年髙祖崩梲亦卒陶穀奏廢二舞流契丹入晉以太常樂迎之聞者涕李懌張文寳以覆試多黜請下學士院作詩賦格懌笑謂余登科偶然爾安能為准格和凝胡栁之戰獨從賀環而救之環知其必貴因妻之知舉放榜撤棘開門士皆肅然唐亡相晉進晉祖幸鄴請為宣敕十餘授鄭王留京備安從之反飾車服文章以多為留白板行于世質以第五人及第為相及知逺選范為第五而亦至相官皆與凝同馮玉姊為晉出帝后不知書而知制語契為相權賄契丹兵盡掠其貲猶獻奉國璽丹求恩盧質議為唐哀帝立廟號明宗亦知不可召從珂入立欠犒軍錢與王玫配率民財怨吕琦料敬塘必引契丹為患建議和親廢帝不從河澤好學善詩事洛陽令伏草間諌莊宗獵而數上書明宗言㐲閣諌幸鄴然外直内實奸邪馮時多以割叚避賦役因奏罷蠲紙課州縣出紙割股蠲賦役符號蠲紙干趙鳳求給諌鳳授以他職未拜命先書新衘之投軌請立秦王以希進遂成秦王禍史圭為縣有善政人立碑備顧問令升殿侍立安重誨不知書倚直學士升殿始此龍敏由馮道事張承業王事祖父孝契敬塘結契丹以叛敏請送東丹入西樓則丹且有内顧憂東丹王本徳光長子以不得立奔唐得封吳西樓在契丹上京又請千馬破殺趙鈞使越不拜李松魏王繼岌既殺崇韜松請急作黄紙詔書以定人心契丹入冩門松薦敬塘鎮太原敬塘謝之曰為浮屠者必合其尖又信用杜重威晉遂以亡為相信趙延夀之歸與契丹俱北漢以其宅賜蘇逢吉之後歸逢吉誣殺李鏻自稱掌書記謁王處直不過易緑袍為緋謁李𢎞規不學無知常求為相買緯長史學年唐自武宗後史職廢無實録緯采𫝊聞為唐補録六十五卷雖天下多故事多缺誤而喪亂之際事迹僅存亦有補于史氏徐次石晉及漢祖實録惡桑維翰謂有銀八千錠合符非之王日厯多言大臣過失峻怒之遂貶死段希堯沂州軍擁敬塘請斬為首者吾敬塘反又謂不可使吳越遇風濤曰平生不欺張允駮赦論謂有罪見舍則無罪者衘寃此致災之道小人見天災則喜是教人為惡首髙祖大喜王松相石晉劉知逺入洛使百官受偽命者焚之松自誚為二十四考中書令裴皞自晉魏為名族相端秀剛直馬在後唐陳闕失斥權臣石晉之告老𦙍孫引門生見之喜曰門生門下見門生桑公見我于私第門生也維翰過之不送迎曰二人皆皞禮部所取王仁裕蜀平歸唐從珂檄詔皆其所為校石晉定樂大宴聞奏黄鍾知有爭者兩軍鬬夢以西江水滌腸胃文益進皆詩萬餘首號西江集得二十五始就學與和凝以文章名知貢舉王溥與凝得范質同王延崔協子頎舉進士盧文紀恨協言之延曰趙人善泅生子而浮之水上可乎延卒擢頎甲科人稱其公稱友愛五代之際其家法馬重績明太一五紀等術遇莊宗征伐占必中之敬塘起兵廢帝使卜同人卦以宣明氣朔崇𤣥之五星為石晉作調元厯然不數嵗即差依古畫夜百刻為刻漏趙延義父温珪等術數事蜀不中輙被詰責死戒子孫幼以佗道仕進而延義亦以此仕蜀答周太祖漢祚短促白漢法深酷刑罰枉濫此所以亡周祖因赦蘇逢吉劉銖二族十國世家吳楊行宻據廬州又據宣州末斬孫儒據揚州詳見唐子渥為宣州觀察行宻病徐温召之入立惡王茂章代守宣殺之陳取岳州温執鍾匡時徐温典牙兵召腹心璠入衛殺之渥渥由是失政可憤未能發温又殺温之客嚴求立行宻次子隆演徐温専政危全諷攻洪州嚴可求以周本禽之殺温領昇州誥留子知訓秉政而遥制之朱瑾知訓而知秉政督以隆演為吳王相都隆演不得意卒而温大丞温立􅄎􅄎行審第四子温迫之僣號齊温知誥専政襲鎮金陵封王􅄎遜位與之有淮南二十八州治廣陵傳五十年徐温販鹽為盗英行宻所與起事劉威陶雅之徒號三十六雄獨温無戰功用嚴可求謀赦行宻殺朱延夀始得預謀議在外守戰故得立渥而竊其權行宻病舊將皆與張顥弑渥而殺顥旅殺宣州李通渥之心腹祥在金陵遥制大人政軍問嚴可求國用問駱知以知詐得吳心南唐李昇行宻攻濠州得之竒其狀貌養為子而諸子不容養于徐温為徐知誥温厚有謀好學禮儒勤儉寛仁知聞朱瑾殺知訓自潤州入秉政引宋齊丘駱祥王令謀為客吳人皆歸心五徐温死襲鎮金陵遂受吳禪復姓李自謂憲宗世孫立唐宗廟旌表孝弟陳氏七百口同居賙通好吳越申其火災景破妖賊張遇賢勝乘閩建亂遣查文徽攻之乘取建汀泉漳置劒州而陳覺擅發兵攻李仁達于福州故契丹陷中原而景疲兵東南不暇顧楚亂來附取其潭州分置筠州鐘與契丹聘問又援李守貞故周師征之景用謨䇿表盡獻江北齊丘陳覺沮之正世宗親征復請獻江北去帝號奉朔留子煜于金陵而遷都洪州煜景死煜立建隆二年年太祖召之不至開寳八王師禽之封違命侯據州三十五治金陵傳二十九年宋齊丘為昇謀簒最有力事成隠入九華山屢招乃出陳覺魏岑等邪佞用事人謂五鬼皆齊丘所引用陽罷相不得意歸九華山封九華先生青公坐陳覺黨賜死韓熙載煜以盡忠能直言欲相之而妓妾私進賔客熙載斥妓煜欲用而妓復歸前蜀王建號賊王八代為卒迎僖宗為田令孜飬子韋昭度陳敬瑄鎮西川而不入留符節予之遂取成都殺敬瑄并并東川殺顔彦暉南降黔南攻興元李繼業山南得道攻荆取䕫施忠方又取歸州遂并三峽詐唐封蜀王故唐亡因龜龍麟鳳之瑞乃僣號多智善待士所用皆名臣世族而人士亦多依以避亂而晚年内寵宦官與政子元噟殺建嬖臣唐襲建死衍最幼以母寵得立荒能為浮艶之辭光母徐氏以教令賣官衍滛委政宦官宋嗣起上清宫塑王子晉尊為聖祖至道玉宸皇帝歸莊宗使李嚴聘之見其人物富盛而衍驕滛遂獻䇿伐蜀而郭崇韜聘之據州治成都傳三十五年後蜀孟知祥叔父遷據荆洛磁降梁中門使舉郭崇韜自代知祥為晉王崇韜平蜀以知祥鎮西川監明宗立始隂有王蜀志分安重誨疑之使李嚴其軍知祥斬嚴重誨以其管内州除守將以備之遂與董璋同叛宗攻殺璋并東川明宗開心懐之終不服明崩知祥僣號子昶好走馬方術秦將相大臣驕蹇貪横殺之殆盡何建以成階降盡得王衍地鋭意關中援趙思綰淮世宗伐之昶聘南唐東漢以張形勢周既取南髙保融招昶同歸不從君臣奢侈至為七寳溺器王我宋下荆南昶懼欲約東漢撓中國太祖詔全武取之而先為昶治第京師以待草王昭逺兵敗李昊表降有州凡四十一年南漢劉隠代父謙守封州禮遭世多故父子數有功嶺南隠又好賢士唐名臣世家依之者多獲禮用唐末惟南海最後亂梁封南平王弟龑稱帝殺禮用趙光𦙍嗜為玉堂珠殿叛遣蘇章破楚兵龍夏州交州龑音儼義取飛在天子玢不能任事荒滛晟殺兄自立恐衆不服峻刑威衆滿盡殺諸弟及大臣攻下楚連宜等六州志益宦者林延遇宫人盧瓊仙内外専恣殺戮子鋹委政宦者龔澄樞陳延夀胡滛戲不省事奉女巫樊子于宫中太邵廷㻆言真主已出不為備則通好鋹瞢然祖詔李煜諭之稱臣怒囚使者太祖遣潘美降之盡有嶺表治廣州凡六十七年楚馬殷本孫儒將吕繼劉建鋒據潭州詳見唐末梁封楚王師周自吳逃之使攻嶺南取昭賀等州諸蠻來附廷初與行宻成汭劉龑為敵國髙郁勸以内奉朝外誇鄰國退修兵農故梁亡又事唐惟謹貢茶因獲茶利季又教鑄鐵錢令民造茶而地大力完荆南髙昌患髙郁強楚反間之大殷子希聲殺郁殷哭明年薨希聲居喪不哭慕朱全忠食雞日烹五十希範好學善詩希因溪州彭士然叛遂南通桂林象郡西接牁牂範立銅柱為表西南諸夷皆附作九龍殿沈殷時廖光圖等十八學士獨拓䀦常厚長者每切諌不從扼喉殞希廣希蕚自武陵奔喪希廣以兵止之希蕚怒送欵李景攻殺希廣希蕚希崇希蕚當中原大亂臣於李景而希崇囚之衡山洪景使邉鎬盡遷馬氏於金陵封希蕚楚王居州希崇鎮舒而居揚州七宋興景崇率兄弟十人歸朝皆為美官據潭州有州二十三凡五十七年劉言王進逵進逵為希蕚先鋒陷長沙已而逃歸武陵迎言為師既而不相下襲言殺之叔世宗征淮使進逵攻鄂過岳州罵潘嗣叔嗣襲武陵殺進逵周行逢為進逵當䇿殺劉言進進逵據武陵而行逢據潭州叔嗣殺逵迎行逢入武陵而行逢召殺叔嗣民過無大小皆死儉約氏繩下以法一境畏服妻嚴諌不從去歸田野曰禍起易逃歸將死使子保權朝廷保權張文表叛遂舉族歸朝吳越錢鏐豫章術者見錢塘氣干斗牛求而相之過與勁卒二十人殺黄巢先鋒急引兵破董昌團杭州諸縣兵為八都以為都指揮使常斬劉漢宏乃奏以昌鎮越而已守杭取蘇吳董昌反攻執之兼鎮兩浙召昭宗封越王再封王徐綰反閉城拒鏐而因頵兵顧全武亟請元璙質于行宻以援頵兵頵亦取鏐錢百萬而質元瓘梁又加以淮南節度好玉帶名馬朱全忠謂真英雄曰所居鄉為衣錦鄉舊營為衣錦軍幼所戲大木衣錦將軍以鎮海等節度與元瓘而自為吳越國王更所居名宫殿府曰朝官屬稱臣封拜海中新羅渤海等諸國卒年八十一元瓘遣將攻建州王廷政大敗士善撫將士好儒喜詩置擇能院選文録用之奢僣好治宫室狂大火燒其宫室因疾卒子佐立年十三諸將少之初優容後諸將稍有法黜大將章徳安等國中畏恐景使張筠救李仁達遣將誓軍號令齊肅大敗李兵取福州而還年二十卒思弟琮立胡進殺之俶倧弟括船四百水軍七千至通州㑹周師自唐宋貢朝廷皆泛海入至周平淮始由陸譏太平三年詔來朝舉族歸京師歐公其歛民太重據州十三治杭州傳八十四年閩王審知與兄潮取泉福建而繼之為福建觀察治福州有善政封閩王註見唐昭宗延翰審知子十妻妬而多納妾其妻一嵗殺八四人弟廷鈞弑之鏻即延鈞令求尚書不獲絶唐朝真帝信左道用道士陳守元説立寳皇宫居之即皇位地狹不足為國薛文傑藉富人以佐用文傑殺吳英軍士怒傑鵬閩人臠食又更檻車制立十年子繼弑之繼鵬作道士譚紫簫止一先生陳守元天師事皆資寳皇語而後行起三清臺日焚諸香數斤日夜作樂臺下以求大還丹子又以神言殺審知諸子審知少延羲殺之延羲改名曦余延英有罪獻錢千萬怒無皇后土貢復獻千萬中嫁女笞朝士之不賀陳匡範増筭商法稱人寳相滛虐重與弟延政攻連遇弑之延政封富沙王以建州建者國王氏子孫在福州連重遇皆殺之而推朱大進昌亂稍定延政以子繼昌守福州李仁達殺繼送款李景景破建州遷其族金陵越仁達以福州降吳據閩嶺州五治福州傳六十一年南平髙季興即髙季昌遣汴人富家童出全忠攻岐款還決䇿馬景誘岐兵大破之鎮荆南撫綏流亡梁衰為自固計宗朝莊宗于洛崇韜勸遣歸鎮莊宗悔之知莊不能久莊宗難作因邀蜀貢殺使者遂據忠䕫方歸峽州明宗攻取其三州臣吳子從誨進贖罪銀三千兩于明宗隂復封南平王求修戰船備討具蜀敬塘大喜然通安重進郢州不得至漢興奉表勸進而求之又不得遂攻郢而敗髙邀掠南漢閩楚貢道又所向稱臣利其賜予號賴子保融助世宗征淮勸李景稱臣宋嵗入貢三迂緩無能事皆委弟保朂興一嵗入貢保朂子繼冲王師使慕容延釗假道討周保權亂將張文表孫光憲勸以貞主受命當封府庫以待歸繼冲迎延釗降率放朝據荆統三州凡五十七年東漢劉旻劉知逺母弟無賴嘗黥為卒事知逺河東與郭威不叶謀舉兵而威立旻子贇繼漢故旻罷兵祖贇被弑旻僣號舉結契丹攻周連嵗敗績周崩求契丹兵大又大敗于髙平世宗進圍太原三月不克旻亦憂死爾旻嘗謂張元徽吾以髙祖之業贇之寃不得不顧我是何天子爾是何節度故雖廟僣號而不改元不立宗承鈞旻子丹改元立廟契助攻上黨無所得顒地狹産薄又奉契丹國用日削賴五臺山僧繼以足用宋興昭義李筠叛我太祖責之曰家世非叛者區區守此懼漢氏之不血食也太祖哀其言不加兵繼恩知逺甥承鈞養為子侯霸榮殺之繼元承鈞養子未盡殺劉氏子孫太祖征之降興國四年降據州十一治太原傳二十八年四夷契丹分八部而推大人統之安巴堅耕為大人乗劉守光之暴掠州縣居之率漢人種為城郭廛市如幽州漢人安之梁盡滅諸部擊梁而背之稱臣于約梁滅晉與李克用約克用恨之死以屬莊宗而取晉新州莊宗使周徳威討之為其所圍親征後解所用多漢人王處直召之空國入冦莊宗敗之然自此有窺中國心子欲擊女真恐中國乘虛乃通好莊宗僣號耶律徳光救定州王都為王晏球所敗喪托諾䇿稜哈瑪爾等名將遂西徙冦雲朔間明宗以石敬塘禦之門敬塘事徳光為父徳光立敬塘為帝號盡有鴈以北遂合十六州以幽州為燕京國大遼臣晉嵗輸絹三十萬供獻相屬于道汴出帝不稱數敗契丹契丹卒誘趙延夀與入虜出帝改晉為遼死漢興所在殺其守將應漢徳光懼自汴北歸道鹽為帝羓初徳光許延夀滅晉則帝之已而不與巴東丹王元欲鎖延夀自立于鎮州囚舒嚕安堅妻欲入冦舎音殺之徳光子舒嚕立夜飲晝睡號睡王瓦世宗北伐取三關於口關益洋關置雄州橋關置霸州及瀛莫州兵不血刄之庖人因其醉殺奚匃奴别種居幽州西南分五部為契丹虐之附于劉守光始分東西奚東奚後契丹所并吐渾居青海上或曰乞伏乾歸之裔以大姓有慕容拓拔赫連等族在晉獻鴈門北遂屬契丹國若契丹荨盧安重榮招之入處中劉知逺圍之殺其族籍其貲達靼靺鞨遺種居奚契丹東北朱契丹攻之部族分散其居隂山號達靼從耶討龎勛克用破黄巢由是入居雲代君其他諸族散處沿邉甚衆無國地長可紀云突厥唐末為諸夷所侵五代雖朝貢㣲甚吐蕃㣲弱惟回鶻黨項諸夷分其地甘涼𤓰少通中國回鶻嘗妻唐女呼中國為舅吐為黠戞斯所侵石雄張仲武所破故後屬蕃五代始入貢于闐去京萬里與婆羅門鄰河入貢石晉色河源至于闐分為三三産玉各異髙麗唐末國主姓髙世明宗時國主王建五其繼立必請命中國宗市其銅鑄錢貢萬斤又進其國之書南詔僖宗在蜀約妻之而食言昭崇韜破蜀諭以威徳不納朝貢明宗為逺報之不得達占城居西南海上地方千里北抵驩州入俗與大食同通中國自周顯徳五年貢始古今紀要卷十六
