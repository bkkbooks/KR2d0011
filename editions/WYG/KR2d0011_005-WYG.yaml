body:
  text: 古今紀要卷五宋黄震撰晉司馬懿事曹操魏文與曹爽同受明帝顧命誅爽而擅其權盡錄諸王公置鄴長子師繼世專政魏謀以夏侯𤣥代之師夷𤣥與張緝等三族帝與李豐語師築殺之廢帝為邵陵厲公毌丘儉文欽奉義兵師與十萬衆誅之師弟昭誅諸葛誕殺其君曹髦是為髙貴鄉公滅蜀漢因此以為功而簒魏矣子炎竟即位追尊懿曰宣帝師曰景帝昭曰文帝武帝炎懲魏氏孤立大封同姓御牛青絲靷以青麻代初置諫官立太子不赦容皇甫陶讜言焚雉頭裘劉毅裴楷質直見容嵇紹許竒仇讎不棄有天下無窮之諺右好處羊祜鎮襄陽軍有十年之積以伐呉宜藉上流表王濬為益州治水兵大艦祜務修徳以懷呉人與呉將陸抗使命常通彼此以計相顧祜請伐呉朝議以秦涼為憂唯杜預張華贊之祜以疾求入面陳伐呉曰取呉不必臣但既平呉當勞聖慮山濤亦云釋呉為外懼太康元年命王渾王濬杜預伐呉以賈充為大都督充諫伐呉者也幸充不材不撓成筭杜預克江陵指授羣帥徑造建業王濬自武昌順流而下入石頭呉主降鮮卑攻䧟涼州馬隆自薦討之募三千五百人自至武庫選仗給三年糧遂平涼州右混一事帝寵賈充充與荀顗荀朂馮紞為朋充為都督將之鎮顗等勸納氏太子乃復居舊仕太始七年詔選公卿以下女權禁天下嫁娶九年初滅呉納其宫女五千太子昏愚不堪為嗣衛瓘撫床而言以皇孫明慧無廢意咸寧四年詔悉去州郡兵大郡置武吏百人小郡五十陶横山濤諫不聼及永寧後盜賊羣起州郡無備天下大亂太康元年郭欽請徙内郡雜胡於邊地不聴元年帝既平呉事遊宴三楊用事山濤諷不改二年荀朂馮紞譖出張華都督幽州三年齊王攸徳望日隆荀朂馮紞等間之以都督青州王駿曹至諫不聴攸憤死四年帝疾篤楊后奏以楊駿輔政永熈元年誤右伐呉後驕事傅元請舉有禮之臣以崇風節退虛鄙之士以懲不恪不能用太始元年賈充任愷皆有寵朝士各黨附帝知而不責愈無憚充譖愷廢於家朋黨如此王衍嘗詣羊祜陳辭辭甚清辯祜曰敗俗傷化必此人也浮誑如此王渾王濬平呉争功濬或忿憤徑出不辭太初元年三楊駿珧濟用事勢傾内外劉毅謂帝桓靈云賣官錢入私門貪墨如此羊琇王愷石崇以奢相髙帝毎助愷劉毅論九品中正謂上品無寒門下品無勢族劉寔作崇讓論學者以莊老為宗而黜六經談者以虛蕩為辯而賤名檢行者以放濁為通而狹節信進仕者以茍得為真而鄙居正當官者以望空為髙而笑勤恪千寳論壊右風俗敗處惠帝楊駿輔政賈后使孟觀李肇誅駿廢太后徙金墉城殺之賈后專政任親黨賈涉等用張華裴頠輔政朝野安静華等功也賈后廢太子殺之趙王倫廢賈后殺之及華頠淮南王允討倫不克死倫簒位遷帝金墉齊王冏誅倫迎帝復位齊王得志驕奢河間王顒表請長沙王義誅之顒與大將軍穎誅長沙王廢太子覃立穎為皇太弟穎僭侈東海王越奉帝討之不克帝入鄴為安北將軍王浚所攻走洛陽河間王顒迎之廢穎立熾為皇太弟都長安顒之將張方主之東海王越起兵入長安奉帝還洛陽賜穎死右羣小作亂事王衍樂聲音善清談宅心事外衍弟澄及阮咸阮修胡毋輔之等皆以放為達何晏等祖老莊以無為為本由是士大夫皆廢職業裴頠著崇有論江統以戎狄亂華宜蚤絶其原作徙戎論賈郭恣橫貨賂公行魯褒作錢神論劉頌作九班之制賈郭用權仕者不得速竟不行穎表左賢王劉淵為冠軍將軍又拜北單于劉宣右賢王遂上淵大單于之號有衆十五萬穎奉帝還洛陽劉淵即漢王位因號漢時李雄據蜀稱帝號大成熾即位為懷帝劉淵克平陽即帝位淵死聦繼䧟洛陽遷帝平陽青衣行酒荀組奉􅉖帝即位長安劉曜䧟長安降之使洗爵執葢王祥孝感三老海沂之康門無雜弔覽悌興先嘗祥饌之奕世江左吉後何曽責阮籍放誕日食萬錢石苞鎮淮南威惠崇望塵拜廣城君趙王愷競奢秀求綠珠不得王倫誅之孫羊祜九世清徳襄蔡邕外孫每將滅呉督荆州計呉石城守去陽七百里為邊害祜以詭令呉罷守減戍進墾田要始至無一日之粮季年有十年之積據險開建五城收膏腴地奪呉人之資石城以西盡為晉有乃增修徳信以懷逺人與呉將陸抗使命常通力勸取呉謂呉平則秦涼自定以又謂既平之後當勞聖慮不知王衍敗俗嘗軍法將斬王戎焚草營置滅墮淚碑范憂在滅呉而乃勇於呉不若文子逺矣留賈充杜預定律令七奏立籍田萬常平倉武河橋滅欹器在内年損益機號庫呉身不跨馬體不穿札每大事輒居將帥之列立功後耽思經籍既平呉不忘戰裴秀制朝貢賈后親屬進雅望素隆四海儀範不謂以親戚著崇有論楷玉山得一以别宅與衍知人之鑒韋忠言張華華而不實裴頠慾而無厭不就其辟衛瓘請改九品立鄉舉里選所撫床諷易太子為賈后誅恒字巨山文草書序古玠玉人有妻父樂廣氷玉非終身不見喜愠遣云人不及可以情恕意相干可以理張華强記草時人比之子産虐贊伐呉而儀禮詔誥皆所定惠帝昏暗后在上海内晏然華之功也物趙王倫孫秀廢賈后因害好人無餘財博物荀朂賈充女為后朂之謀尚邪謟與馮紞一凰盛稱大子自中書守書令云奪我鳯池賈充弑髙貴鄉公鎮晉初有天下任愷庾純等剛正共疾之出充闗中以荀朂納女之計遂留皆羊祜宻留之謐充外孫姓韓海其父韓夀偷香者也謐既為充後内輻湊石崇歐陽建諸潘岳虞葛詮陸機王粹陸雲杜育繆徴鄒㨗杜斌左思摯崔基猛劉瓌納和郁輿周恢琨索秀附陳眕二郭彰許劉劉劉皆謐號十四友楊駿后父逞與弟珧濟號三楊黨賈后患其專不得使孟觀誅駿親皆夷三族魏舒少養外家寗氏九成此宅相重為郎官襆被而出祿賜散族有威三公辭榮劉寔著崇讓論石諸子不遵如崇厠郭舒止王澄杖宗廞西諌王敦奪武昌城地王渾伐呉先破皓中軍甚媿恨之奏濬罪既而王濬破石頭降孫皓鎮夀陽前後著稱居台輔减聲望濟金溝馬割王愷牛譏伐和嶠李癖孫皓其無禮王濬守巴全産育數千去三刀降益州修艦順流東下大筏去錐火炬鏁遂呉為王渾所抑忿憤唐彬與王濬平呉遲留不競警持節幽州邊無犬吠之山濤好莊老備交嵇阮散居選職十餘年絲啓事至諫去武祿賜親故閣袁毅飲八斗子簡年幾三十不為家父所知不鎮襄陽髙陽池所載社稷傾作樂王戎籍少二十年與之交嶠以禮而哀毁不踰居䘮不居禮而毁悴和與時畧舒好利無極李鑚核王衍戎從弟談山濤知其誤蒼生不盛才美貌手麈一色老莊口中雌黄言錢居宰輔為自全之計向以澄為荆州敦為青州號三窟可排牆之夕曰若不祖尚浮虛戮力以匡天下不至今日澄諫衍妻郭氏貪幾為所杖解王敦謝鯤庾敳阮修號四友將之鎮衣探鵲侮王敦為所殺樂廣約言析理衛披雲霧覩青天為岳筆廣㫖名客盃蛇影愈玠病與王衍風流首教内樂地鄭袤泰始以袤為司空固辭至十數謂國坦曰魏以徐景山為司空吾為侍中喻旨徐公謂某曰三公當上應天心茍非其人實傷和氣不敢以垂死之年累辱朝廷也終不就遵大雅君子之跡可不務乎固辭久之見許劉毅轉司𨽻京師肅然去謂晉武賣官錢入私門殆不如桓靈請九品散齋奏加妻罪劉暾以郭彰不救火而自衛正色詰之石惠帝愎險暾為左丞正色立朝三臺肅然勒殺之和嶠鄙荀朂為人専車而坐朝武陔弟韶茂皆清正於野任愷以社稷為己任充與庾純張華向秀和嶠等善出賈西鎮不行遂成朋黨崔洪實之後然薦卻詵代已為左丞詵糾之洪云援弩自射重之口不言貨不執琉璃鍾劉頌守廷尉六年比張釋之虞哭張華比嫁女陳矯矯本劉氏以舜後姚陳田為未然傅𤣥謂魏武好法術而天下貴刑名魏文慕通達而守節為賤上疏言儒學者王教之首峻急臺閣生風存誦學著述顯貴不廢重儒教子咸有大節之疾惡推賢言奢侈費甚於天災酒色殺人甚於作直為司𨽻京都肅然閻纘訟愍懷太子寃有哭張華比賈誼大節阮籍酣飲為常為求為東平相壞屏障望風土旬日而還求步兵校尉為酒青白眼禮豈為我設塲登廣武戰咸與族父籍為竹林㳺咸七月七日南阮犢鼻武帝以耽酒浮虛逺不用子瞻二孚瞻善琴掾王戎稱之三語無鬼論孚金貂換酒蠟屐修咸從子錢杖頭錢王敦歛為婚裕孚族弟人羲之謂不驚寵辱裕稱不須廣學正應以禮讓為先車焚不借之嵇康叔夜賢與阮籍山濤向秀劉伶阮咸王戎為竹林七戎與處二十年無喜愠服石髓遇王烈安山濤舉自代云一行作吏此事便廢所東平吕千里命駕鍜大樹下不禮鍾會為譖司馬昭誅之廣陵散向秀注莊安郭象述之作共嵇康鍜吕灌聞笛思舊賦劉伶荷鍤拳祝酒徳雞肋尊酒頌謝鯤折齒敦諷議卒歳議王衍四友與王澄為友言如屑醉方庾亮為周顗子謙之字呼父畢卓盜比舍郎釀一拍浮酒船中足了生矣羊曼䵬伯達八伯之數裁阮放宏伯朗郄鑒方伯誕輔之伯卞壼伯蔡謨伯阮孚伯委劉綏伯弟聃江泉能食穀伯𤨏史疇肥笨伯凶張嶷猾伯聃伯以擬四光逸輔之謝鯤阮放畢卓羊曼桓彛阮孚祼飲逸脫衣露頭大呌狗竇遂呼入號八達庾敳意賦衍東海王越換錢謂王卿自用卿法郭象寵於東海王越向秀莊為已住熏灼内外至行簿篇竊自注秋水樂二庾純為儒宗貴行酒怒賈充問髙鄉公何在皇甫謐年餘二十母教之梁貧者士之常不餞城陽太守栁書淫摯虞撰姓譜談以餒卒筆太叔廣摯虞束晢疎廣後改姓得雨歌數汲郡不凖發魏襄王或云安釐王冢竹書十車晢為分釋摯虞言徐肇三月三日亡三女因洗袚晢曰周公洛邑流水汎盃故逸詩羽觴隨波又秦昭王三日置酒河曲見金人奉水心之劍曰令君制有西夏知廣陵竹簡補詩郤詵對策第一桂枝崑玉自云嚴明阮种對策第一簡相平原政惠華譚秀孝對策戴劉頌云不悟郷里乃有此才若思毁之官途不至袁甫惟欲宰縣不為臺閣職陸機抗之子呉不從文章冠世穎服膺儒術王顧榮勸還為成都王將長沙義奉天子與機戰於鹿苑大敗遊牽秀等證於穎譏謂機有異志見害好權門進趍獲雲六歳能文持論過機機笑疾害為浚儀令冢獲殺夫者與共被宿王弼喜作言道訪論古今厯覽等古書夏侯湛與潘岳為連璧喪生侈服食遺令薄潘岳安仁拜與石崇等謟事賈謐族望塵而石崇之禍併夷三尼静退張載劔閣銘協傅𤣥延譽之號見世亂無仕進意弟亢皆有文三張擬二陸江統静黙有逺志五從戎論誅太子事孫楚為參軍傲石苞石與王濟言枕流潄統鄞令餘姚令綽鄙山濤隠吏非吏非隠許與許詢一時名流台支遁問何如許一咏一吟將北面矣作天山賦謂習鑿齒瓦石粃鑿齒謂綽為糠為文士冠張輔論班不如馬馬隆自薦平涼州其作匾箱車千地廣則鹿角車營狹則直木屋上轉戰里涼遂平居十餘年於威信振隴周處射虎搏蛟糾從陸雲學氐對王渾以魏滅於前入洛劾不避人齊萬年反戰没周訪以女妻陶侃子結友敦為中興名將未嘗論功切齒王敦終訪之世不敢為非討華軼杜弢解系二弟結育皆精潔得譽趙荀朂欲交之不得討氐羗表請殺孫秀遂為王倫所殺云我水中見蟹且惡之索靖知天下將亂嘆銅駝荆棘河與衛瓘俱以草書名作草書狀與間王顒戰綝與父皆有逸羣之量服靖云州郡吏不足汙吾兒劉破劉聦華夷向為左僕射隨􅉖帝降聰見殺茍晞平汲枽吕節千里牛致饋都督青兖諸軍於㫁決如流純屠伯小茍酷大茍弟名劉喬止齊王冏不迎嵇紹王裒父儀為司馬昭所殺辟未嘗西向而坐三徴七不就許孜負土建墓鹿犯松而死庾衮兄毗疫獨不去投植籬跪授作筥養母女兄箕嵇紹不為齊王冏撫琴難惠帝之奔獨死其辛勉劉聰賫藥酒逼之不屈月致酒米亦不受鄧攸伯道乃棄兒買妾其甥呉隠之賦貪泉廣州在州常食菜及乾魚左思太冲賦三都張翰秋風思蓴鱸翰去而冏敗羅含夢彩鳥封置新淦之賂羊琇以下外戚豪侈無制孫登隠士好讀易嵇七絃琴三投諸水不怒多阮籍與語不應康從之年臨别云才識寡夏統字仲御女洛中在船曝藥唱賈充問之為歌慕歌禹河之章曹娥小海伍大風至潄天門魯褒嫉時貪鄙著錢神論莫知所終宋纎教授酒泉之南山三千人太守楊宣馬岌皆不得見戴逵武陵王晞召之不為黄門伶人東晉元帝名睿見王室亂求出鎮至建鄴以王導為謀主導說睿引顧榮賀循已結人心又諫謙以接士儉以足用江東歸心焉西晉懷帝永嘉元年從戴邈之議立太學建武元年命課督勸功長史以入穀多少為殿最愍帝遇害帝始即位改元初欲慰恱人心孝亷不試七年乃試立郊丘於建康帝性簡儉冲素容納直言諫布帳施於宸極之殿右渡江招撫節儉事陳頵勸抑浮競導不能從參佐多避事自逸陳頵請皆免官睿不從祖逖請恢復睿素無北伐之意以逖為豫州刺史給千人廩不給鎧仗使自募寵任刁恊劉隗二人欲矯時弊每崇上抑下故為王氏所疾以戴若思代祖逖憂憤死王氏强盛帝惡之乃引刁恊劉隗為腹心損抑王氏遂與劉刁搆隙聞逖死益無所憚王敦舉兵於武昌入㨿石頭帝命刁劉戴淵攻之不克乃以敦為丞相敦竟不朝而還帝恭儉之徳有餘而雄武之量不足故大業未復而禍亂内作矣明帝王敦錢鳯謀逆温嶠告帝先為之備又與庾亮畫策討帝意遂決敦將舉兵内伺帝微察其營壘敦追之帝僅獲免帝命王導温嶠庾亮卞壼等討敦帝屯于中堂導聞敦疾篤率子弟發喪衆咸奮敦將王含敗敦尋死餘黨悉平成帝㓜冲庾太后臨朝王導庾亮卞壷輔政大要皆決於亮亮召蘇峻守厯陽導皆以為不可峻遂約祖約反温嶠欲下衛建康亮不從孔坦請急㫁阜陵守江西當利諸口先往逼其城亮不從峻䧟姑孰峻至蔣陵陶囘請從小丹陽伏兵邀之亮不從峻遂䧟臺城亮奔尋陽温嶠庾亮推陶侃為盟主共討峻王導亦宻詔三呉起兵嶠貸振於侃侃怒欲還師嶠責之乃止温嶠劉􅉙等斬峻峻弟逸復城守斬之嶠等欲遷都王導不可嶠以荒殘蓄資用而後還武昌亮陳發禍之罪優詔以為豫州刺史湘州刺史卞敦不赴國難導召為少府郭黙襲殺劉𦙍導即以黙代之江州陶侃請討之斬黙王導寛厚諸將不奉法庾亮與郗鑒牋欲共廢導鑒不從時俗尚浮虛李充著學箴導薨以何充為䕶軍將軍庾冰為中書監輔政康帝成帝弟委政於庾氷何充時石勒殺劉曜弟虎殺子熈平秦隴而勒稱帝子洪立穆帝㑹稽王昱輔政昱即簡文帝昱用桓温鎮荆楚上流劉惔諫不從昱召温皓為揚州刺史曰足下去就即時廢興乃就職桓温滅蜀威名大振昱引殷浩以抗温由是疑貳王羲之勸浩不冝與温搆隙不從温聞石虎死遣諸將經營北方褚裒表伐趙部將王龕攻於代陂裒退廣陵温忿朝廷仗殷浩抗已舉兵順流而下至武昌昱致書乃還殷浩北伐無功再敗桑山温疏廢之權一歸温温伐秦三輔皆降至灞上乏食歸温自江陵北伐姚襄克洛陽表謝尚鎮之哀帝燕攻洛陽温請都洛王述謂温欲以虛名威朝廷但從之果不行洛為燕所克海西公桓温破燕慕容垂於林渚至枋頭秦救燕温大敗初畜不臣之心至是威名頓挫郗超乃勸温廢帝立昱簡文帝昱温威震内外帝常懼廢黙遣詔以太子幼令温居攝王坦之毁詔改之後太后令温居攝王彪之不奉令乃止符健入長安國號秦燕王雋稱帝符健死生暴虐符堅殺之用王猛治國雋死温以慕容恪在憂方大耳秦滅燕孝武幼弱謝安王坦之輔政卒安晉室温求九錫安坦之緩其事温卒弟冲代盡忠安靖崇徳太后臨朝與王彪之共掌政事安緫中書朞䘮不廢絲竹遂以成俗坦之諫不從安舉兄子元充鎮御北方之任元治兵精銳時號北府兵敵人畏之秦屢入冦安每鎮以和静時人比之王導而謂文雅過之符堅大入以謝石謝元禦謝安出遊圍棋桓冲深憂之元囚朱序說擊前鋒破之石等水陸繼進陣淝水符融麾之少却秦遂大敗石等還得秦樂宗廟始備金石王國寳安壻安不用毁安於㑹稽王道子道子專權安出新城避之帝溺於酒色委事道子又崇尚浮屠道子驕恣帝不平乃以王恭鎮京口殷仲堪鎮江陵安帝不慧國寳依道子參朝權王恭殷仲堪舉兵討之道子委事世子元顯元顯殺王恭桓元等上疏申理朝廷深憚之孫恩作亂三呉八郡皆應之元顯戰不利劉牢之引兵渡江恩乃遁入海桓元䟦扈元顯討之元䧟城都殺道子元顯等元簒位逐帝於尋陽劉裕劉毅何無忌孟昶起兵討元元敗裕入建康斬元乗輿反正止於江陵裕伐南燕慕容紹降平之伐秦姚泓降裕以幼子義真守長安乃東還謀簒長安為夏勃所取裕弑帝立恭帝裕封宋王遂有天下時姚萇叛秦起兵於北地自稱秦慕容冲稱帝號西燕後秦姚萇殺符堅乞伏國仁稱帝號西秦慕容垂據中山號後燕為馮䟦所簒北魏拓㧞珪稱王秦吕光稱三河王號大涼珪稱帝慕容徳號大燕劉琨初失身於賈謐匹刺幽州與鮮卑段匹磾結婚共討石勒後與磾有隙見害少負才與祖逖友聞逖用日枕戈待旦志梟逆虜常恐祖生先我着鞭在晉陽乗月登樓長嘯却胡祖逖聞雞蹴琨起河以自請文帝北伐中流擊楫而誓由是黄南盡為晉土石勒不敢窺兵河南修逖母墓代方當推鋒越河掃清冀朔而晉以戴若思憤病卒王敦亦肆志納王隠諫以禹惜寸隂不聞數棊因舉隠修史史之立自納始與梅陶謀月評隠云三載考神槌邵續去勒歸國園不顧其子為勒所得害誓盡忠節灌鬻萊以給竟亦遇王導覽之孫禮知天下已亂傾心元帝潛為興復徙建康勸顧榮賀循江東歸心焉去鼓葢請從導始克桓彜謂管夷吾庠周顗新亭對泣當戮力王室復神州勸修序劉隗用漸見疏澹如也亮敦反帝以導忠不問都受詔輔明帝曽復與庾受詔輔成帝止遷售練布何聞蔡克兒謨元規塵汙人三餘見前成帝事王寛厚容衆喜通戾介相世終始一心衍澄問不免俗累止能彌縫一時之缺勸無百年長久之計其志欲偷安江左陳頵抑浮競不能從王敦殺周戴不能救王劉隗沮祖逖不能言庾亮召蘇峻不能止敦不赴國難不能僇不郭黙害劉嗣不能問疫諸將如賈寜等不奉法能懲勒㓂襄陽大死大半斃不能乗葛陂淫雨三月不止困不能襲子恱有髙名民色養之争棊有旬桓温委伏獻中書令瓜葛稱孫王以軍務王大令小令劉宏督荆州以命陶侃皮初破張昌可表皮祁守襄陽朝廷其壻夏侯陟宏不曰十郡安得十壻三峴方二澤聴民捕魚萬酒不得分三品投醪與軍同厚薄以米三斛給益州給流人十餘萬田種糧食隨才擢用事不肯以大樂避亂人作樂羊冉說以從横之斬之一帋書賢十部從事陶侃荆州刺史楚平杜弢杜宏分運甓參督荆州雍益梁諸軍郢相慶惜隂佐酒器博具投之江此竹頭木屑陵斬蘇峻在戲王導蘇武節似不如移鎮巴武昌軍四十一年自南陵迄白帝數千里不拾遺其雄毅明㫁論飲不過限夢翼決指晦庵辨誣述呉解謂夢寐與志人安得知蘇峻之誅庾亮恥為屈故誣之甚於以閨房難明事汙人温嶠為劉琨將命至江左見王導乃歡然曰江左自有夷吾絶裾離母明帝立侍中參機宻鎮武昌有惠政土削王敦畫像燃要陶侃平蘇峻告皇天后涕流覆面犀照牛渚郗鑒儒雅著名空不應趙王倫辟位至司誓師討蘇峻與王導受顧命含飯救其甥周翼及兄子邁孫超桓温入幕之賔不超死愔見其書哭顧榮與機雲號三俊王㗖執炙者後趙王倫敗得其救免仕齊冏懼誅常醉為元帝常侍紀瞻顧榮謂太極者混沌之時言其理無復外兼文武瞻言極盡之稱明帝謂社稷臣賀循童齒不羣議令武康禁不葬宗張闓廷尉聞之毁私門廟制當世儒疑滯皆咨之劉隗善求人主意與元帝任之勒攻子王敦不克妻子奔石疇吹笳出塞入塞之聲而致胡去刁恊中興制度皆稟於恊剛悍使酒然志在正救殺王敦疏恊罪帝令隗恊自為計恊為人所戴若思刼陸機機與定交薦之趙王倫答王敦見形者謂之逆體誠者謂之忠吕猗勸敦殺之周顗盛名對畧無醒日脅三日僕射下能飲一石過江無一客腐死火攻策謂導足以容卿數百軰不王敦見之面熱導王敦之反申救王導而言故敦誅顗而不救卞壼成帝之立與王導俱受顧命多斥王導虧法從私鍾雅阿撓王典貴游慕王謝壼厲色於朝聞者莫不折節赴巖巖撫伐蘇峻力戰死二子同難母之劉超書迹類元帝宿絶不與人交書為清苦所成帝初統其衆衛號君子營蘇峻害鍾雅蘇峻之難與劉超俱侍衛為賊所害孫惠為東海王越記室有文郭璞賦為冠之得郭公青囊書九卷東趙載竊讀未畢火焚筮河東先擾避地南活趙固死馬散豆買主人婢尋王導引參軍事𦵏龍耳致明帝在厠銜刀桓見之璞死王敦彛死蘇峻葛洪稚川從不知碁局號木訥得祖𤣥呉時仙翁好學博涉期於必以其煉丹秘術授鄭隠令洪學隠盡得之聞交趾出丹砂求勾漏止羅浮山枹朴子尸解庾亮元帝聘其妹為太子妃王侍講東宫帝諌以申韓刻薄不足留心與導俱受明遺詔陶侃祖約疑亮刪遺詔欲亮修石頭城備之蘇峻反亮求侃率衆黜導翼亮弟杜乂殷浩才名冠世翼弗之重曰冝束之髙閣蜀桓溫緫角便期以逺畧雅有大志以滅胡平為己任代亮鎮武昌康疏北伐石季龍次襄陽帝崩還桓彛蘇峻之亂義在死國五子温冲有傳冲最淹識或質羊時代温盡忠王室勸除望不從求外出處之澹然安都督江荆等七州累破符堅委謝内相而自任鎮杆王湛兄子濟歎家有名士三十年而不知子承重譽第一為中興承子述不答王導米價移鎮不隨衆贊美子不為遜推諌庾翼以妖怪桓温求婚於坦之述置膝下令宛陵頗受贈遺云足自當止躋後居州郡祿賜皆散親故性急踏雞子既重位柔克為用謝奕罵之面壁而己坦之著廢莊論簡文遺詔温居攝坦之特入毁之與謝安共輔幼主諫謝安妓樂應與殷康子論公謙之義終與沙門竺厚常論報竺死坦之亦卒臨與謝安桓冲書幼惟憂國家子忱與范寗舅甥縱張𤣥束帯造之始為賔主飲連月不醒祼體而遊范汪依外家庾氏燃薪讀書寗謂王弼何晏罪深桀紂疾守豫章以興學抵罪目劉惔清逺丹陽芒屩養母老尹清整好莊張憑判王濛清談之劉惔延上坐薦韓伯康伯舅火在斗中柄熱不須揮殷浩稱出羣之器王允之偽醉得其從父敦逆謀峻與其父舒告王導啓晉討蘇有功王彪之皆導之從弟公年二十鬚鬢白司止簡文郊赦廢海西簡文崩云大馬何容得異終謝安稱大事諮平公彪之世不營宫室陸玩遷司空人有呪柱者為玩曰以我為三公是天下無人納斗酒柈肉待桓温茶果待謝安何充王敦稱兄含作廬江答以所聞異此議王導庾亮薦緫錄朝政庾氷立康帝充不合阮裕戲其志大欲作佛蔡謨恐為後代所笑不遷司徒諸葛恢王導期以黑頭公一守會稽比闗中政第殷浩父羡字洪喬不為致書郵起浩好易老為風流宗王濛謝尚云深源不當如蒼生何石季龍死朝廷欲蕩平闗河以浩督軍大敗山桑温桓温廢為庶人少收温竹馬咄咄書空後欲以為尚書令浩竟達空函而絶蔡裔聲若雷震以一呼盜隕浩委軍鋒孔愉印龜左顧不蘇峻反朝服守宗廟於諫王導用趙􅉙從棄官營草室終山隂孔坦料蘇峻必破臺城必不攻白石壘安諫元帝拜王導妻忤導庾氷省之責不問國寧家孔奕以一甖非酒以手有輕重也孔羣不視匡術不蘓峻黨也七百石秫了麴糵謝尚焉别顔囘舞王導以比王戎呼小安豐鴝鵒制石磬鯤之子謝安雖處衡門自然有公輔望文不出如蒼生何晉四十餘年方從桓温仕帝崩温入將移室呼安與坦之欲害之安從容坐間何須壁後置人比王導文雅過之圍棊别墅兒輩破賊游集東山之志始末不渝妙代桓温十六年卒波晦庵云王謝皆不得老子處然安勝導只隨逐流安却有心中原但亦為清虛絆了做不得混黨劉毅誅奕安之兄温逼桓温飲入云失一老兵得一老兵𤣥幻度安答叔父安芝蘭玉樹欲生庭階舉以鎮禦郗超歎其履屐間亦得其任鶴八萬破符堅百萬孫斬符融射中符堅風聲戾以為晉師至靈運萬安弟云羲之薦之桓温後來一器絢舅袁湛世無渭陽王羲之郗鑒求壻坦腹羲蘭亭直換鵝書几以人精藝則易掩其善之忠髙潔今惟書名争諫殷浩北伐減會稽内史開倉賑饑荒扇上疏呉會賦役乞監盜官米者罪六角與王述少齊名而輕之仕述顯羲之恥下之誓不徽之子猷羲之第三子卓犖不羈桓沖問何曹朝遇雨入冲車謂當相料理以手版拄頰云西山來致有爽氣耳好竹稱此君雪夜訪戴其行放誕好聲色時人穢坐獻之靈床彈琴獻之羲之幼子詣與徽之操之謝安寒温而已安喜吉人辭寡筆火發神怡然令偷兒置青氊草𨽻丹青誤牸牛安以韋仲將事諷題太極殿不可許邁與羲之游者所别妻餌术莫測終桓伊肥水與徽之三弄怨奴吹笛伊撫筝歌朱伺諸人以舌擊賊之兩敵共對惟當忍毛寳破蘇峻白邾城敗死龜朱序鎮襄陽築符丕來攻母韓領百餘婢并城中丁女城西北角丕引過城名夫人城陳夀父䘮有病使婢丸藥作三國志丁儀丁􅘙有盛名覔米千斛不與不立傳父隨馬謖生髠作傳短諸葛亮王長文著通𤣥經祿為親屈虞溥鄱陽内史行修庠序處招學徒禮無常虞預餘姚風俗盡有朋黨之雅好經史論阮籍祼袒比伊州被髪孫盛對殷浩談理食冷復煖者數四至暮忘餐著晉陽秋温大怒干寳父婢十餘年伏棺如生死見天地鬼神事寳遂作搜神記劉惔云鬼之董狐習鑿齒桓温主簿脚救星人誤死堅釋道安佳對以疾廢䧟符復歸顧和周顗遇之捫蝨不動使王導遣之部還獨不言得失云寧網漏吞舟袁崧歌行路難挽與羊曇唱樂桓伊歌為三絶江逌火熱雞破姚襄車𦙍武子集囊螢之謝安游輒待王雅孝武宴集雅末至不先舉觴王恭斥㑹稽王道子為委巷之歌春斥虞珧子婦裴為失行濯濯如月栁劉牢之應謝元之募窮百戰百勝海號北府兵討孫恩於殷仲堪父患聦謂蟻動牛鬭桓𦵏流棺作州飯粒落席拾取之𤣥逼令自殺劉毅與劉裕何無忌討桓𤣥劉自討盧循而敗留文武萬餘不遣裕討其貳而死何無忌劉牢之甥於家無擔石一擲百萬死起義兵敗盧循取蘇武節而李𤣥盛廣十六世孫温據河右二十四年武號涼武昭王毅有惠政兼文周札周處子李王敦黨百以一門五侯為敦所忌道士脫號八謀逆敦倂害之周彪訪之曾孫嘆為符堅所得詈以犬羊相聚潔謀襲堅堅曰周孟威不屈於前丁彦逺已於後吉祖冲不食而死皆忠臣也顔含簡而有恩羣疾篤懐問降禮王導清無勞蓍龜江左士稱周伯仁鄧伯道苦之節劉殷梦得粟劉事祖母孝後於聦仕焉王延忌日至旬啼之終得魚人認其犢與不取易雄賁王敦願作忠鬼羅企生為殷仲堪史願死之不見桓𤣥見害范蔚有書七千卷常來讀者為辯食百人徐邈為孝武掌綸詔太或疑歳辰此之左則彼之右何俱忌答以歳是遊神如日出時向東皆逆范宣傷乎改容一覽莊子王勸妻焚書求嫁王沈釋時論袁宏作賦答謝安奉楊仁風也羅含夢烏左秀桓温謂江蘭菊叢生顧愷之千巖萬壑畫漸入佳境才絶絶癡絶褚裒桓彜稱皮裏陽秋備謝安云裒雖不言四時之體矣后父王濛王文開生此兒也劉惔齊名温潤市帽恬和范喬劉楊優劣論謂向定一代之書非雄所及取柴與父母相歡娯耳陶潛五栁先生傳乃公田盡種秫郡遣督郵至卧吏白束帯見之賦歸去來夏月虛閒髙北窻之下清風䬃至自謂羲皇上人無弦琴王敦字處仲頭造王愷不恤行酒美人導歎其剛忍據石以誅劉隗為名沈充錢鳯謀主既死懸首曰初詣石崇如厠脱故着新意色無作羣婢相謂此客必能作賊驅婢妾數十人桓温彛之子常以温嶠竒之故名陣圖為山蛇勢降李勢面七星破符健識八老婢以其似劉琨而多恨得見所種栁十圍流涕升登平乗樓嘆王夷甫不不任其咎似劉景大牛況袁宏謝覬覦而比丘尼浴九為慕容垂所敗乃廢立安見還拜求錫不得而卒𤣥吞流星生篡位八旬孟嘉褚裒不見酒得於庾亮坐上如桓温座落帽漸答温未得中趣耳絲不竹竹不如肉近使然殷仲文桓𤣥姊夫中𤣥敗歸義何無忌傷之誅蘇峻糾合南渡遂討敦有功祼有異志窮肆忿言庾亮召之與祖約反剝士女極兇殘孫恩五斗米道恩叔父泰師杜子恭秘術凝會稽王道子誅之逃海攻上虞殺會稽王之八郡皆應臨海劉牢之討之二十萬入海數為裕所敗冦太守辛景破之赴海自沈妹夫盧循起杜豐慶攻之亦赴水死五胡亂華當時僭號者十六國世姑取其鼎盛者名之劉石符姚慕容交亂一百三十六年前趙匈奴後和以惠帝永興元年興七以成帝咸四年滅三世二十年劉淵史稱其字元海好學善射成都王頴表監五部軍事誑頴歸據離石稱漢僭大號以其祖漢甥故冒之立六年卒聦立寵六劉為劉氏起䳨儀殿陳元達諫將殺之劉氏諫止流星為肉劉産蛇獸而死後宫亂矣既而立三后殺士十八人陳元達自殺聦立九年凡執晉懐愍二帝聦死粲立靳凖作亂盡滅之族子曜復立改號趙立十年專與嬖臣飲博諫者斬為石勒所殺後趙羯五以成帝咸和三年僭立十穆帝永和年滅二主四子凡二三年石勒年十四倚嘯上東門王衍知其為天下患并州饑刺史執賣為奴託於汲桑共起兵桑始命以今姓名桑敗歸劉淵冦鉅鹿常山衆至十餘萬以張賔為謀主刁膺為股肱孔萇為爪牙劉聦授并州刺史勒殺王弥并其衆聦怒猶加鎮東大將軍以慰其心曜立以勒為趙王乃滅前趙僭尊號自謂在二劉之間不效曹晉狐媚取天下勒死立十五年宏立虎奪之虎字季龍初虎為勒專征所向無前勒敬事佛圖澄及虎奉之尤謹國人化之多慕佛虎據十州金帛不可勝紀猶發前代陵以取之發民女十三萬奪人婦九千又用沙門呉進言苦役晉人築華林死者數萬自謂非天崩地䧟當復何愁在位十五年虎死導廢世立三十三日閔殺之鑒立殺胡羯二十萬髙鼻濫死者半閔竟滅石氏閔本姓冉為虎養孫及是自立國號魏為慕容雋所滅前燕鮮卑暐即東胡和廆以武帝太康元年稱公至四世太五年滅凡八十五年慕容廆莫獲䟦好步揺冠音訛為慕容張華器異之謂大棘城顓頊之墟居焉教以農桑刑政修明流亡多歸之廆舉其英俊隨方授任路有頌聲元帝拜為大單于成帝加侍中皝乎廣反僭號燕王與石虎戰敗之帝加征北大將軍皝尚經學興學校然忌其兄翰殺之儁立有文武才進攻幽薊鄴始僭大號遷鄴立十一年卒夢石虎齧其臂鞭其尸棄之儁死召慕容恪輔政暐立庸弱皆委於恪根欲為逆恪誅之恪因水旱辭位未幾卒評輔政無逺略而貪鄙以垂嘗破桓温有功欲殺之垂奔符堅堅使王猛伐之堅復至禽暐後燕以太元十二年僭立二以安帝義熈二年滅四世十四年慕容垂皝第五子也恪嘗謂暐曰呉王垂也將相之才十倍於臣臣死後願委之復以評忌之奔符堅為冠軍將軍堅伐晉慕容楷及紹說以中興及堅敗垂軍獨全子寳勸滅堅垂不忍負以兵授堅未幾以農之說請至鄴而定都中山以復燕魏王珪叛垂垂遣其子寳伐之髙湖諫不聴敗而還垂自出其不意直指雲中珪欲走而垂以疾還寳立為魏所攻遁死為蘭汗所弑盛殺汗自立盛汗之壻三年為慕容國等所弑熈立熈寵其后符氏而虐其下雲弑之南燕以安帝隆安四年立十以義熈六年滅至起凡一年慕容徳皝少子也暐敗符堅以守張掖堅敗乃從垂如鄴寳敗德遂入廣因自立博學而喜諫以超為子超以鍾為青州段宏為徐州而公孫五樓内參鍾宏俱不平與慕容說俱叛而晉劉裕伐之不利用河間𤣥文之言塞五龍城中患脚弱而降昔趙攻曹薿望氣者謂澠水帶城不可以塞五龍口而降恪之圍段龕亦然前秦氏元符健年晉稱永和七年立太十九滅共四十四年符健父洪稱三秦健僭大號四年卒生立無道謂虎狼助殺太白入井為渇忠良殺之略盡符法符堅殺之堅者洪子雄之子也有文在其背曰草付臣又土洪故改蒲姓苻而名以堅博學有大志而王猛吕婆樓佐之至是僭號以兄法弟融王猛權翼薛讃並掌機政猛日親幸用事樊世與猛争斬之仇騰席寳譖猛黜之猛與中丞鄧羌恊數旬間貴豪死者二十餘人於是路不拾遺風化大行猛自中書侍郎遷中書令又兼元州重任又為丞相猛剛明清肅黜尸素㧞幽滯勸農練軍官當才刑當罪國富兵强戰無不克而堅又舉異才修廢職課農桑恤困窮禮百神立學校旌節義繼絶世命牧伯守宰各舉孝悌亷直文學政事察其所舉行賞罰官悉稱職田疇闢倉庫充盜賊屏息歳旱開山澤之利息兵養民卒不為災自長安至諸州夾路樹槐栁二十里一亭四十里一驛百姓歌之而又去珠簾却千里馬增崇儒教禁老莊圖䜟之學一時治效煥然著耳目間矣桓温伐燕猛勸救之破温於譙燕許割地背約猛免鄧羌起滅之初慕容垂來奔猛請除之堅以為冠軍將軍猛治慕容之子表言其叛垂懼走堅待之如初張孟因星變言之陽平公融亦以為言堅不從及猛臨終言勿以晉為圖鮮卑西羌我之仇敵宜除之既而堅大舉伐晉權翼符融等諫用慕容垂之言而決大敗於淝水慕容垂泓冲等各叛冲自阿房城入長安堅奔五將山為姚萇所縊立二十七年子丕立二年敗子登為姚萇子興所敗見殺九年自健至登五世登子崇奔涇中自立後秦羌十三世凡三二年姚萇父弋仲臣虎滅梁犢兄襄破冉閔石氏滅歸晉與殷浩不恊襄北引將圖闗中符生遣符堅要殺之萇者弋仲第二十四子襄死而降堅及討慕容泓敗而奔馬牧西州推戴之殺堅自立八年夢堅而卒興立伐秦執符登殺之繹經事佛者十九矣平朔門校尉王滿聦夜距門而自朝門入賞滿聦立二十二年卒佐命滅秦者尹繹至泓降劉裕蜀李氏帝此在五胡之外共本號漢年以穆永和三年滅四十六李特麋君之苗裔秦以為黔中郡漢以為巴郡漢末是漢中隨流人入蜀自稱益州牧二年為刺史羅尚所斬子雄僭尊號三十年寛厚簡刑時海内大亂而蜀獨無事百姓富實閭門不閉相之者楊褒班嗣位而越殺之一年而期立政刑紊亂李夀襲之自立三年卒勢長七尺九寸腰帶十四圍立五年桓温伐之降後涼氏人吕氏以孝武太元十五年僭立年安帝元興三年滅自光至隆九十三吕光長八尺四寸目重瞳苻堅臣婆樓之子王猛竒之薦令美陽夷夏愛服堅既平燕以光討西域破龜兹降者三十餘國鳩摩羅什勸之東而苻堅敗乃自稱三河王孝武僭即天王位立十年纂初紹遜之不受既而奪之殺其弟宏三年吕超刺之自立而讓於隆隆立姚興兵至姑臧超戰敗隆降後為興所誅北燕馮氏至太元二十年僭立年自䟦宏二世凡二十八馮䟦畢萬後畢子孫有食采馮鄉者為慕容寳中衛將軍熈立欲誅之遂亡及雲見殺衆推䟦為主僭大號于昌黎即國曰燕課百姓桑柘弟素弗為輔立十一年元熈元年也此后事入於宋至元嘉七年死䟦死弟宏殺䟦子翼自立魏伐之奔髙麗見殺南涼鮮卑以烏孤以安帝隆安元年僭立年傉檀安帝十年滅三世凡十九秃髪烏孤其祖夀闐母寢而産被中鮮卑謂被秃髪因氏焉八世祖匹孤遷河西傳夀闐至樹幾能據涼州至烏孤嗣位務農修好吕光署為大將軍隆安元年自稱西平王更稱武威王太初後徙樂都用楊統乗虛圖吕光醉墜馬死弟利鹿孤稱河西王再伐吕隆然猶臣姚興用史暠之言建學立三十三年弟傉檀嗣神爽命世權吕氏取姑臧其後受制於姚興伐沮渠䝉遜伐赫連勃勃皆為所敗姚興遣韋宗來觀釁嘆謂一代偉人未可圖也攻之果不克後䝉遜取其姑藏獨保樂都之西征乙弗為乞伏熾盤所襲歸之歳餘被鴆諸子奔䝉遜後歸魏傉檀燕宣徳堂而嘆孟禕曰此堂百歳更十二主北涼臨松盧水胡二世凡三十九年沮渠䝉遜其先為匈奴左沮渠䝉遜以官為氏伯父羅仇及麯粥為吕光所殺䝉遜奉其臣段業起兵又譖殺馬權男成而斬業自立姚興遣使封西海侯攻克秃髪姑臧號西河王三十三年茂安立六年魏滅之西涼李暠為北涼敦煌太愔守自稱涼公暠子煌北涼滅之弟奔敦北涼又屠之魏冉閔内黄人石季龍養孫殺石鑒自立戰勝石祗焚其首三年與燕大戰為慕容恪所擒送慕容儁斬之龍城七里草木枯五月不雨雋祀之諡曰武悼涼張軌涼州年牧軌子茂元帝即位自稱􅉖帝建興五𫝊駿重華祚𤣥靚天錫凡八主前秦滅之夏匈奴後自勃勃至定凡二十六年赫連勃勃劉淵之族也姚興寵異之使助没奕于鎮髙平又使鎮朔方因襲殺奕于而并其衆義熈二年稱天王以雲騎風馳使姚興疲於奔命又大敗秃髪傉檀自以匈奴夏后氏後稱大夏使叱干阿利發夷夏十萬人築朔方北黑水南為統萬城又造兵尤精詔與天連改姓赫連非正統者姓鐡伐劉裕裕留義真鎮長安而還勃勃遂取長安僭大號還都統萬刻石頌功㐫暴好殺人無生頼諫者先截其舌而後斬之在位十三年以宋元嘉三年死子昌立為魏所擒弟定僭號於平涼魏滅之古今紀要卷五
