body:
  text: 古今紀要卷十五宋黄震撰唐七僖宗中人立之年十二専事遊戲國用耗盡自謂擊毬狀元父呼田令孜除官及緋紫皆不關白百度廢㢮即位元年王仙芝起濮州乾符明年黄巢起曹州應之仙芝亂五年曾元裕平之巢䧟長安帝走成都鄭畋合諸道兵討賊軍聲大振賊不敢窺京西而四夷諸道貢獻亦集李克用以沙陀萬柴十騎破巢復長安巢亂凡十一年克用還至汴巢降將朱全忠因宴攻之克用入表請討不從由是藩鎮惟力是視無所復畏王重榮李克用表誅田令孜進逼京城令孜刼帝走鳳翔至興元凡三年朱玫立襄王熅王重榮殺之秦宗權附巢賊繼亂凡六年昭宗時朱全忠斬之孫儒為宗權將又後四年亡昭帝時楊行宻斬之帝在位十四年而仙芝之亂相繼凡十九年相蕭倣華之孫經給事中封還宣宗除李璲節度詔門劾李琢畧安南鎮嶺南南方珍賄不入市稿梅還厨諫懿宗事佛築堤徙滑州河流以鯁直見忌子廩亦及第繕倣在南海書廩以薏苡諫止賤估太倉賑貧乞禁夜行以備賊課尹京殺田令孜養子裴坦知制誥故事初詣省囬丞相送之裴休勃然索肩輿正省吏駭謂唐興無此辱相不數月卒玉簡儉之子娶楊收女齎具多金命徹回亂我家法世清其槩崔彦昭吏治精明所至課最相河東威惠境内大治耆老叩闕願留為與蕭倣革楊收之失百職修舉察不至苛人退朝侍母順色柔聲逐伶李可及鄭畋白敏中令狐綯怨徳裕十年不調機劉瞻為相入翰林詔書紛委粲然無不切要瞻諌迕懿宗賜罷畋以草制有褒辭罷禁僖宗袒之導者止百步舊聨數坊訶止行人百官僕吏不得擅至宰相府之使韋荷廣州煑鹽取直糴䖍吉米瞻安南舊取嶺北五道王師甫自嶺南獻錢二十萬畋罷之髙星變求去攜巢賊求鎮天平改予之盧攜方仕駢不可又欲以駢請以公主嫁南蠻畋力爭至詬罵上俱罷之破鎮鳳翔帝幸梁畋檄諸道兵討賊又先諸將黄巢于鳳翔巢不敢西賴以復國退時王命不出劍門畋𫝊檄天下逺近咸聳賊辭疾去復相不從田令孜干請鄴不許陳敬瑄居宰相上賊以讓斜谷功乞免孫賍罪乞賞陳秋兒拒不廢耕遷授依故事裏行至大夫比月校書郎以上二嵗賊平上將還又引疾去盧攜姿陋語不正激為相欲髙駢立功固諌以天平與黄巢又巢使戰以敗王鐸以薦驩復相南内挾田令孜外倚髙駢天貨賂公行入賊破淮天下咎之始詔巢鎮平而賊已潼關斵仰藥死巢棺磔户李蔚諌懿宗飯僧禁中自為贊頌至太原惠政為人所懐使鎮河東定亂三日卒王鐸播弟子衡禮部取士多實才遂韋保衡由之得相保將大斥不附己者乞去鎮宣武當國練制度智慮周宻天下跂其復相駢鄭畋又薦之遂相自任討賊鎮荆南无功髙代鎮幸蜀召相忼慨討賊號令殷然士氣皆起巢賊日蹙田令孜欲功出北司譛罷之雖功垂成而見奪然卒因其勢困賊訓京師復動第一在徙鎮義昌華車服妾樂從刼之綱目謂相位不明是非用盧攜而沮鄭畋信裴渥而庇宋威一年之間使賊火熾為都統不能遏黄巢更生劉漢宏一冦崔沆鉉子巢宣麻大霧百僚修慶大風雷雨雹賊浸盛請裁遏多為盧攜沮折豆盧瑑與沆同麻相鄴无他才推附盧攜賊京師䧟與沆同匿人家兒殺于鄭從讜懿宗時吏部銓次明允其鎮河東宣武皆善最鎮嶺南募士豪署酋右職使相捍禦交廣晏然一相僖宗李國昌據雲州出鎮河東自擇參佐皆時選號小朝廷貌温氣勁好謀善斷奄凶佼惕伏讜部兵出討巢賊李克用以沙陀兵入乘之從登城諭使立功報天子辭窮再拜去既而大敗其兵過朝廷赦沙陀使擊賊自贖兵不敢道太原克用城下辭而後入賊平克用代鎮復秉政不矜滿沈毅從帝興元乞骸訖進止有禮法兄處晦没于鎮代不奏樂放陸扆兩用張彦球相時鄭畋以宰相鎮鳳翔多檄討賊人以忠義維賊憚之號二鄭祖餘慶事憲宗王徽不啃尚注浩然歸重拾遺書二十餘上言无回忌公議為考功初以墨注考簿繼盧攜相是日巢入京師討追僖宗不及賊執之脅以刃不動奔河中奉詔賊功居多修葺京師請帝東還終權幸乘勢治第侵民者一平以法遂被譛罷僖宗世屢召皆辭疾昭宗召見進對詳洽師手籍銓選遂無奸滯鳳有雅望而京亂故設施無可道閣王氏相一日位臺省牧守者三十餘人裴澈令孜聞巢入關奏貶盧攜而薦澈澈相之孔緯劾其與蕭遘鄭昌圖相襄王烜皆殺蕭遘貞子臣字得聖反朱玫迎帝鳳翔而玫廢立之召復以濟亂為所汙而死然有拒朱玫言有罪狀令孜之奏不譔為冊棄官歸永樂則與裴鄭身相者有間獨不下田令孜資大節王佐自任初當國風采峭整之史稱為相五年行完而材王鐸主貢舉取後同相位扶其踣斥播州道三岐白帝呵之韋昭度僖宗相之于蜀共再狩遇李昌符亂質家族于禁軍誓討賊相昭宗見後孔緯戣孫吏為懿宗中丞方雅疾惡中外聞風輙肅為部權要私謁盈几不省幸蜀時奉詔還趣召百官皆辭疾曰吾妻子死且不顧使度朱玫必反請幸梁遂相昭宗以太學焚殘兼祭酒請郊見中人無助祭衣冠緯以國典中人不朝服以所兼官為之服李順節為使相當班見緯判天武徤兒據堂受禮乎為獨贊張濬討克用濬敗以𫝊會貶全忠與善請屏居華隂復召以病歸杜讓能審權孫帝守蜀奔謁為翰林號令行下處事無遺筭倚重之出鳳翔走寳雞皆獨徒步從驕諭王重榮輸貢行在可昭帝亦倚相之逼茂貞慢上決討之苦諌未軍敗茂貞稱兵帝殺之本傳謂欲奪茂貞鳳翔故稱兵張濬西狩軍乏食教漢隂令獻粮餌士至厭給上因召之説平盧王敬武共討賊再狩相之相昭宗事見後諸臣侯昌業上疏諌遊戲及宦官無上社稷將危賜死董禹諌遊畋上賜金帛楊李侃求贈之假父官語侵宦官恭復訴貶孟昭圖帝在鳳翔極論不當外宰相與中人謀議令孜沈之墓頥津常濬言姑息藩鎮太甚令孜役之殷盈孫還京斟酌再創廟制補昭帝郊議中人攝官服喪亂後追容典皆折𠂻焉周寳擊毬進巢鎮涇原務耕聚粮號良將能和裕喜接士賊據宣歙徙鎮浙西亂不制兵叛奔常州錢鏐迎殺之而取常潤王處存定州聞賊䧟京號哭累日入援涕約王重榮進屯渭橋國難未平語輙流軍中多其義為之用破曉克用共平京師㑹勤王舉義處存第一收城賊克用第一復諸軍勦賊泰山諌討王重榮民鎮河中臨事便宜有大將風善修鄰懽撫下士無能侵軼卒於鎮劉巨容龐勛反自拔歸于為明州鎮遏使平王郢賊鎮山南大破巢荆南不肯乘勝追斬故復熾不能拒秦宗權奔成都夷匿化黄金申屠生令孜恨之族顧彦朗往鎮東川陳敬瑄奪其節不得入詔和之助王建攻敬瑄詔又和之彦暉自為留後自王建攻其八州詔和之兵不解殺建自以華洪鎮東川忠義黄碣吳鐐張遜碣諌董昌反昌夷之召㑹稽令吳鐐問䇿鐐又斥之昌又夷之又召山隂令張遜遜又忤之亦見害宦官楊復光佐曽元裕擊仙芝約降而宋威間之仙芝復叛使段彦謩擊殺荆南宋浩周岌附賊因夜宴感之岌流涕斬賊使與入蔡州諭宗權遣兵從復荆襄敗朱温將王重榮定關中知克用非忍禍者兵必來字諭朱温以同州降軍慷慨喜忠義賜功臣號八御下有恩其死中慟哭為麾下多立功者諸子將帥者數十田令孜知書能處事故帝一委以政以帝西依敬瑄殺孟昭圖巢賊至東都賊平自謂係王室輕重益恣令奪王重榮鹽池重榮表其罪克用亦請誅令孜孜自將討之大敗走焚坊市夜刼帝至興元羣臣莫知却昭宗流之自為劒南監軍依敬瑄召王建而之建入成都因之與敬瑄同見殺養子李茂貞藩鎮魏博韓君雄賜名中允簡君雄子河上在蜀恃強覬望非常攻陽略邢洺攻鄆禎還攻河陽敗死十樂彦代之凡兩世二年樂彦禎貴儒術驕見王室㣲頗滿不軌王城魏周八十里一月畢人怨其殘刼鐸取其家又聚亡命軍中益怨子從訓軍亂皆見殺留後推羅𢎞信起凡七年鎮冀王景崇子鎔十嵗為留後以富強自立四面豪傑并起獨克用攻巢賊再饋粟皆僖宗自蜀還獻馬牛萬戎械萬計克用三攻之求救於幽州李國威國威為弟所逐來奔作亂死盧龍李可舉遣李全忠攻王處存大敗全忠懼罪反攻之自焚死李全忠衆推之匡威全忠子恃燕薊勁兵處軒然有雄天下意濬與克用爭雲代朱全忠亦願討克用故張因請用兵弟匡籌逐之依王鎔竊據趙犨陳州人先巢賊亂州人請為刺史圍料賊敗關中必東備賊果至與秦宗權城三百日大小數百戰卒破賊巢宗權畧地數千里屠州二十餘惟陳獨全方圍急賴全忠捄復振又知其必成大事故委輸調發助全忠常先它鎮將老軍事付弟昶昶陳州同破賊時言方鎮忠於吏治者為犨昶犨子珝繼珝雄殺喜書善騎射濟巢賊之難激厲約死政簡一家三節度相繼二十餘年陳人德之后移鎮同州王重榮與兄重盈毅武冠軍兵多權詭雖主帥莫不下之巢賊䧟京師畧河中因逐其帥李都黄朝廷遣代亦逐之自主留后斬大敗賊將朱温鄴温以同州降楊復光欲之重榮更請表鎮同華賊復與復光掎角大敗巢賊徙又與謀結克用軍京令孜怒其據鹽池鎮兖海師表劾令孜令孜使宋玖討之玖敗潰軍大掠京上走鳳翔與全忠謀定王室獻縑十萬願討玖自贖長安復平瑶性悍酷部將常行儒攻殺瑶昭宗之時子珂珙爭鎮克用薦珂繼鎮珙與王行瑜李茂貞連兵犯闕十全忠取河中殺珂自興至亡凡年馮行襲治擊郷豪孫喜據均州鳳平長山賊通襄漢貢道搤谷口通秦蜀翔攻金州茂貞養子所據韓楊守亮將襲京師行襲逆戰破之之附主忠殺全誨督江淮兵中人王建攻走孟方立邢州軍卒路人怨之據路州因鎮昭義歸徙軍于邢李克修攻之澤路晉自以邢磁名為鎮遂有兩昭義彼克用攻邢州之人殆盡勢窮自殺弟迁繼之攻亦闕迁姪孟知詳見五代諸葛爽傳易縣五百之逃從龐勛已而自歸鎮銀夏巢賊至降使鎮河陽間道奉表襲朱温于同州敗歸河陽法令登臺醮愁咨劉漢宏從大將擊仙芝刼輜重以叛輸王鐸降之以為浙東觀察僖宗在蜀貢踵繹帝以為節度既有七州志遂侈大綱攻杭州董昌使錢鏐屢破之又破于越斬之目載王鐸討黄巢留漢宏守江陵大掠比歸為盗而不載鐸降之之事本傳謂乾符末焚掠江陵而王鐸用之守江陵時正在乾符末當以綱目為正髙仁厚事敬瑄西川賊與敬瑄將黄頭軍投京師閑子會卭州畧諸縣涪州峽中皆反仁厚還定之成擒阡能攻敬瑄表代楊師立鎮東川師立反攻都仁厚殺之既詔鎮東川遂據梓州絶敬瑄敬瑄攻殺之黄巢募衆應仙芝轉冦河南十五州仙蘄州裴渥慰撫之而朝廷獨官仙芝巢怒激芝不受命刼州乒分其衆掠齊魯河入鄆南䧟沂餘圍亳淮仙芝餘黨推為王驅南山民十萬掠南為取濮掠州縣欲窺東都為巢兵之分掠江西者髙駢所破襄城陽翟者崔安潜所破浙者為裴壉所破大懼求降閩未幾轉冦浙東桂踰江西破吉饒信趍建入諸州皆沒䧟管冦廣州求鎮天平盧攜田令孜執不可又求安南都䕶于琮不可命王鐸討之比還破潭州鐸奔襄陽走杭據江陵劉巨容敗走之敗轉掠江西再入饒信衆二十萬臨安董昌之還殘宣歙十五州京自采石侵揚州髙駢不出決渡淮䧟東都兖陷師僣號稱大齊李克用戰遂東走徐數十州貶大饑俘人而食日數千甥克用躬追屢之走保太山刎首與其林言秦宗權蔡州薛能遣蒐兵因據州甚巢走出關與合兵圍東州趙犨巢亡張有吞四海意二弟冦荆冦襄所破東都關陜畧江南亂岳卾至蕩為荆棘又使人冦淮肥自關中薄青齊南繚荆郢北亘衛滑惟趙犨保陳全忠保卞僅自完未嘗持粮指鄉聚啖其人為飽尤慘于巢全忠屢敗之昭宗初伏誅孫儒為秦宗權攻東都焚宫闕屠宫人宻取河東亦焚屠之鈔淮南背宗權奪楊行揚州欲先定江南乃北爭天下焚揚州南攻宣州取常潤蘇兵號五十萬自廣徳圍行宻于宣州行宻敗之廣徳斬之董昌臨安人漢拒刺史自領州事綱目作錢鏐取越州破劉宏兵益強始治亷平人安之天下不輸賦獨昌賦外獻常三倍旬一遣朝廷賴其入得拜平章詔書予以縑與當制官意足浸侈大稱託神詭衆改立祠自神節斬狂悖責昭宗時自聖人建國元鎮海度錢鏐以義不聴鏐表之朝悉兵入越斬之反臣朱玫邠州斬巢賊將以兵討賊上賊平拜平章榮令孜以兵屬之討王重榮幸鳳翔重克用請誅令孜蕭通召玫迎帝王令孜挾帝走陳倉玫遂刼奉嗣襄王煴為帝行瑜斬之京師大亂髙駢崇文孫黨與諸儒硜硜談治道殺落鵰侍御入懿宗討項乆無功獨能以竒獲南詔冦為安南都䕶引南詔掠成都徙西川先開門出民復其業虜聞去突將因咸廪為變盡夷之始以磚城成都西荆南窮仙芝餘黨賊走嶺表仙芝餘黨掠浙徙鎮浙西徙淮南檄天下討巢賊威振一時天子倚重専功罷諸鎮兵巢氣勝渡江巢懼偽歸命駢欲又欲留賊為己計聴賊趍河南上上冀其立功屢促不行移檄出兵東塘而還以王鐸掌其兵而賊又平遂悵恨求仙于諸葛殷而以鎮事屬吕用之至用之狂恣畢師鐸攻走之因駢楊行宻兵秦彦虜駢内應殺駢又行宻至揚州孫儒攻走之昭宗僖宗弟楊復恭輔立尊禮大臣夢想賢豪踐祚之初中外欣欣然事多謀之大臣而所用張濬朱朴輩非其人以李茂貞驕横討之茂貞與王行瑜舉兵犯闕殺杜讓能從李克用請以王珂鎮河中王行瑜李茂貞韓建三鎮兵犯闕殺韋昭度李磎克用討三鎮王行約李繼鵬作亂刼上幸鳳翔上如石門克用誅行瑜表請還京欲并討二鎮詔止之明年茂貞兵又犯闕韓建邀帝幸華州脅帝囚八王盡散其所領兵及殿後四軍於是天子之爪牙盡矣初上在石門諸王統兵十三萬宿衛劉季述憂帝崔𦙍討之復帝位崔𦙍字昌遐謀誅宦官召全忠兵韓全誨亦召茂貞兵刼帝幸鳳翔全忠圍帝鳳翔急茂貞盡殺宦官納全忠全忠遷帝洛陽弑之立哀帝盡殺朝士裴樞等投之黄河而簒之相張濬相僖宗恭怨之初依楊復恭進後更依田令孜故復自比謝安裴度多言其有方畧昭宗以與復恭不叶復委信啣克用聞其相謂其虚談無實用必變亂天下故克用請強兵請從全忠請自任討克用軍敗上書言朝用濬則暮以兵見全忠表復用克用既致仕劉季述之亂徒步入洛謀靖王室之難全忠屠其家杜讓能茂貞逼上殺之孔緯楊復恭肩輿至太極殿在上前面指為反賊不許李順節班見百僚全忠求領鹽鉄曰此職非典兵不可詳並見相僖宗崔昭緯見奸臣類鄭延昌巢冦亂鄭畋在鳳翔倚調兵食諭尉諸軍為相無他功崔𦙍見奸臣類韋昭度相僖宗事見前定昭宗使代敬瑄鎮西川不納王建給之歸山東而建攻敬瑄囚之自為留後令之請復相不許王行瑜求尚書行瑜茂貞聨兵闕下殺之鄭綮寠甚丐補廬州終檄黄巢不犯州藏州庫它盗至不犯鄭使君錢贏錢千緡為給事中還杜𢎞徽中書舍人制不報移病去以其兄讓能輔政為散騎常侍條摘失政衆讙𫝊之詩誦諷中人昭宗遂相之然搔首嘆歇後鄭五作宰相時事可知辭不得品無復故態二月以疾乞骸調善詩故為俳諧落世號鄭五歇後體李磎鄘孫之巢賊亂挾尚書八印走河陽偽賊劉允章索不與苦諌髙駢受嗣襄王官崔昭緯諷劉崇魯掠其拜相麻哭言其懐奸與中人昵磎十表論其拜令孜勸昭朱玖上以文字器遇之決意復用學茂貞等又詆之與王行瑜擁兵闕下殺之好著文解書甚多書至萬卷世號李書樓陸希聲相四月王摶明達有度時稱良相全南北司相軋請俟難平以道漸消𦙍使忠表殺之𦙍始専政朱朴諌以品官兩月俸助軍興有請都襄鄧上木強無他能道士許巖士言經濟才見自謂太平月餘可致遂相人人大驚逺軍旅財賦一委之令四方近者出甲士簡餉者上羡餘巖士誅亦貶孫偓與林同相已通簡不矯飭對嘗謂士不必以己長形彼短清彰彼濁客奴童詬曳仆前不責日持怒心即自撓仆家第桂生槐枝既而秉政與同貶陸扆贄族孫創翰林中書屬辭敏若注射主自學士院為相光院錢五十萬諌以嗣覃伐鳳翔上疑之韓偓為解衣諌大赦不及李茂貞驛栁璨為全忠謀去冠有望者殺之白馬崔逺風致峻整揺飣坐梨見文宗崔珙類貶朱全忠殺崔𦙍與栁璨同相璨忌之死裴贄坦從子友帝疑其外風檢暱帷薄故韓偓為言其雍合疏屬以號藏獲猥衆致謗王溥上䝉難與崔𦙍殺劉季述反正遂相之無所禆益罷朱温侵逼與裴樞等投尸于河裴樞遵慶曽孫相素結全忠故能諭江川使貢獻不絶昭宗悦之鎮清海全忠言經世才不宜棄外復相常譏全忠用牙將張廷範為太李振勸投之濁流盧光啟上幸鳳翔宰相不能從故相之韋貽範蘇檢皆自貶所歸行在繼光啟相恃茂貞薦恣驁不恭數月卒貽範檢以貽範薦于茂貞範女為景王妃固恩喪還京流檢賜光啟死貽受賂許入官而以罷日為債家所噪茂貞為起復相之諸臣栁玭副髙湜鎮昭義三疏申理湜之貶御鎮嶺南食橘納賈于官巢賊陷交廣逃歸史大夫清直有父風述上欲相之中官譛止家訓戒子孫楊涉楊收弟子然端重有禮法禍為相受命與家人泣以謙靖終免子凝式韓偓與崔𦙍䇿誅劉季述宦與𦙍及李繼昭皆以功進號三使相請擇官忠厚可任者自剪其黨帝謂終始屬卿全晦召茂貞偓諌謂無兵則家與國安𦙍曰全忠亦諌不草宰相韋貽範起復麻疏器之檢帝反正厲精政事偓處事機宻率與帝合蘇為經營入相曰以此汙我帝欲相之𦙍使全忠貶之帝泣我左右無人矣挈族依王審知楊守亮色如鉄其從仙芝為盗養僖宗時楊復光平江西得兄弟五代恭孜作復為假子京師平昔以功為節鎮興元依之舉兵拒命昭宗時楊復恭得罪走茂貞等表其納叛討之閬走閬州王建破州走太原伏誅忠義遜揆罵李克用死狗奴鋸人當以板束卓行司空圖奔避黄巢其奴陷賊中招之不肯璨奔從僖宗拜官多不受陽墮笏避栁歸隠中條山王官谷美圖唐興節士又人名亭曰休休作文見志曰休也休而美也不受王重榮饋遺人自目為耐辱居士乃冦盗獨不入王官谷土依以避難全忠不往哀帝被弑不食卒文藝吳融山隂人十昭宗反正稱賀先至而帝指授叠許稿融範作詔少選成宦官嚴遵美類比司供奉官胯衫給事今執笏過矣恭樞宻使無聴事今堂狀帖黄決事此楊復奪宰相權之失青從昭宗遷鳳翔求致仕隠城山年八十楊復恭監諸鎮討龎勛在令孜専威福時惟復恭屢爭得失僖宗興元制置經略多出其手江立昭宗漸恣横史忌王瓌六后使人覆其舟于諸子為州刺養子百監諸道軍天下權勢舉歸其門復帝忌之寵其假子賜姓名李順節以亢復恭恭走興元楊守亮舉兵拒朝廷攻鳳翔李茂貞邠州王行瑜自取興元斬之茂貞始強劉季述崔𦙍殺景務修宋道弼亦季述王仲先代為左右中尉疾𦙍尤甚結全忠囚昭帝承欲盡誅百官乃殺之萬𦙍使周誨斬仲先季述死挺下韓全誨張彦𢎞𦙍既誅季述欲與宰相自分堂左右軍李繼昭以為不可乃以全誨彦𢎞為左右中尉兵全誨諷茂貞選兵四千宿衛𦙍亦諷全忠以三千居南司全誨與外兵合勢恣暴又奪三司𨽻神䇿交通謀亂茂𦙍急召全忠兵全誨焚宫城刼帝幸鳳翔依貞全忠圍鳳翔急茂貞盡殺全誨等帝入全忠軍回京師全忠又盡殺在京中人諸道監軍卒弑帝王唐藩鎮魏博羅𢎞信全忠討巢賊餉粟三百馬二百五代史云攻晉乞米不與有隙故攻之五戰皆勝𢎞信求和顧絶晉田全忠嘗卑辭厚禮事之故取河北無後自承嗣至此已二百年子紹威幽州劉仁恭掠之賴全忠大敗之軍故事全忠愈固時語長安天子魏府牙言其勢強也紹威引全忠盡殺牙軍勢遂孤為供全忠攻滄州兵數十萬益困勸全忠墓營宫室為招降劉守光隠又為造舟漕穀與羅通譜鎮冀王鎔常賴李匡威禦李克用萬匡威死克用攻之納幣五十萬粮二十求盟全忠攻之鎔使周式求和質子視全忠竊位又攻之故鎔又附克用而晉益強諸鎮獨安樂驕侈求長生廷軍亂滅其宗自湊起凡百年盧龍李匡威匡籌之逐匡威劉仁恭奔太原李克用厚待倚以敗匡籌匡籌奔京師道為盧彦威所殺恭幽州地歸克用以仁守之劉仁恭克用召擊王行瑜士召攻魏州皆不答盡囚太原之在燕者召敕朱瑄克用自將擊之喪師過半州為子邀節鉞獻馘于朱全忠紹取滄景徳三以兵十萬畧魏威求救于全忠大敗之仁恭遂衰復求救于克用學長生子守光囚之而奪鎮竊據趙徳諲為秦宗權敗走劉巨容復宗權以為山南留後攻取荆南收貨貲失之舉地附全忠子匡疑字光儀忠繼鎮山南以威惠聞盟謀與諸鎮攻全下克反為所攻懼乞獨嵗貢賦天子全忠止之流涕曰吾為國屏翰詎敢有他志因絶全忠全忠攻之敗奔揚州初上欲都襄陽依以自全時溥徐州節度支詳遣討黄巢兵亂逐詳而推之巢圍陳州溥討之戰輙克尾巢至莱蕪大破之得其首以獻故破賊功溥第一燕與全忠爭功構隙全忠威略徐泂溥益困子樓自焚楊行宻合肥人盧少為盗彦秦宗權隊長揚逃淮南髙駢表州秦殺駢攻彦取州昭宗初孫儒奪揚州國表襲勸還盧州潤襲奪趙鍠宣州朝廷以為寧軍殺之取常儒屢困之圍之宣州斬儒長駈入揚州言凡戰七年定八州揚州生人已空從髙朂務農休息勤儉足用幾復承平號詔鎮淮南來奔者推赤心不疑故兵強天下兵墨雲都取楚泗濠昇寛易善遇下得士死力翔南攻錢鏐北攻全忠清口帝自鳳告難督兵花粮盡還敗全忠全忠刼帝東遷憤恥得疾室史稱仁恕節儉惜不能倡四方興王哀帝末子渥嗣渥襲走王茂章執洪州鍾匡時三張顥制之殺其腹心人王師範父敬武奪平盧鎮之忠師範襲鎮不受代喜儒術用法無私全圍昭宗鳳翔聞有詔召兵泣曰兵所以藩屏天子天子危辱而諸鎮反自衛吾雖力不足當成敗以之結行宻潜兵入河南同日並發敗又伏兵于海欲刼全忠皆不克全忠還攻之降卒族之㑹族置酒少長以次就戮者二百人劉建鋒馬殷與孫儒同事秦宗權殷又為儒將昭宗初儒死殷以殘卒推建鋒畧江西取潭州鎮之天嗜酒荒滛陳贍殺之衆推殷代髙郁勸殷歸子職貢遂結全忠請于朝為湖南留後數十萬郁又教鑄鉛鉄錢使民得自採茶嵗入取邵衡永道郴連昭賀梧象栁宜䝉州及容管為宻詔與行宻攻汴畏全忠訖不出五代時楚凡秦宗權黨時皆名蔡賊郭禹本成汭王入蔡賊為假子更姓名荆南帥建肇據之襲據歸州昭宗初逐知吏治詳治獄數詔刻石頌功皆辭殆兵後荆南惟十七家撫集彫殘通商務農晩年萬户時華州韓建亦以治顯號北韓南郭行初任賀隠故少過晩任妻父至殺諸子絶嗣宻奉詔圍鄂杜洪禹為全忠掎角救之為李神福所敗没江死韓建從楊復光攻黄巢蜀至興元逐牛叢復光死無所屬迎僖宗于上還以為華州大兵後督耕植號南郭北韓與張濬討克用後與行瑜連兵犯闕殺宰相邀幸華逼上散殿軍殺諸主謀廢立使降全忠為上宴全忠躡足出後全忠相王建無賴號賊王八等為楊復光都頭田迎僖宗于順上喜與韓建號隨駕五都屬令孜令孜養為子都楊復恭出建壁州而攻取閬利州擊令孜自成召之建大喜復悔止之建大怒取漢州攻陳敬瑄出兵逆之皆敗自此取兩州據之詳見五代李茂貞博野卒擊攻朱玫有功賜姓名節鎮興扈僖宗東歸敗李昌符遂鎮鳳翔擅兵殺興元楊復恭父子與徙山南不奉詔昭宗討之遂犯闕殺杜讓能克用爭立王珂率三鎮犯闕殺韋昭度等又克用請討不許王將之茂貞犯闕上走華州昭宗募兵以諸韓全誨刼上幸鳳翔全忠圍之渝年遂殺宦者與全忠盟于方盛時有州二十至梁末惟七州而已稱臣唐既死子從􅀈代鎮李罕之為僧無賴去乞食諸乞食不得為盜依巢賊歸髙駢又歸葛爽尹河南為孫儒所破分克用自上源敗回迎謁甚謹為與張全義擊儒取河陽克用表鎮之麤暴全義所襲摩克用以為澤州鈔略懐孟數百里無舍煙攻殺雲山居民號李摩雲李讜攻之急克用救之鎮克用討王行瑜表自副歸望一不得甚悵悵據路叛全忠張全義即張言全忠又名為宗奭洛初從巢賊繼事諸葛爽與李罕之分據陽附于全忠撫民勸農遂成殷富之罕之誅求不已遂有隙全義襲取其河陽罕奔克用求救全義乞兵全忠敗之晉為全忠營宫闕備全忠既簒事之益謹梁與戰數敗亡常蒐以補之在河南幾三十年為全忠助甚多梁亡事唐朱宣朱瑾曹存實據鄆州敗死宣收殘卒固守軍中推留後弟瑾勇冠三軍亦隂有爭天下之志求婚于兖州齊克讓因奪其鎮全兄弟雄張山東宗權攻全忠急宣瑾救之忠忌之求隙數攻之大敗幾不得脱乃謀持乆嵗一再擾之苦戰曹濮門十餘年全忠十興師四敗績而宣卒見殺徐瑾奔淮南事楊行宻甚力為具殺知訓而知誥族之王緒王審邽王審知僖宗時夀州屠者王緒合羣盗據夀州潮主廩士推其信從緒附秦宗權二弟至南安縳緒宗權貢賦急緒南走潮與列二劒祝之至審知劒躍審知議潮為將而已副迎潮出令交廣入巴蜀以幹王室泉州人牛酒勞審知監從弟彦復取福州汀建齊歸流昭宗以福州為威武軍使鎮作四門義學還亡定賦勸農人安之潮卒審知襲公事全忠依審邽喜儒術善吏治守泉州中原卿多來之審知亦儉約禮士仕宦者亦多依之見全忠封為閩王餘五代劉知謙避亂封州節度韋宙妻之托子孫然黄巢亂據封州撫流亡嗇用養士境内肅子隠繼之攻䖍州盧光稠敗走南賂朱全忠自固五代時為漢杜洪逐岳州刺史居之又據鄂遣僖宗拜節度推附全忠絶東南貢路昭宗使東岀皆殺之行宻將李神福圍之宻朱全忠救之兵亦敗行斬之鍾𫝊洪州人衆盗推為表鎮仙芝掠撫州不能守因據之取洪州撫州南城民危全諷間𫝊去之據撫州里廣明後不鄉貢惟𫝊嵗貢士行鄉飲士不逺千至少射獵與虎鬭既貴悔之晚節重歛商人至棄貨去昭宗末子匡時繼匡時弟匡範擊江州歸淮南搆之楊渥圍洪州執之全諷謀大舉向淮南蒐衆十萬王茂章謂不足當揚州下等并梁末為楊氏所田頵行宻同里約為兄弟行事行宻奪廬州謀居多攻宣州禽趙錦宻攻取皆其力表鎮寧國行宻行宻左右求貲不已頵求池歙不得遂怨李神福勸行宻早圖之陷其殺良將康儒反攻錢鏐于杭鏐為犒軍質子于絶行宻通全忠攻昇州行宻將吳䝉敗之死亂兵寛厚善治愛民朱延夀事行宻戰功居多春夀州髙彦濕歸全忠攻救之全忠屯夀擊去之取黄蘄光三州用昭宗詔圍蔡以破全忠斬夀州開門待全忠宻軍常以寡鬬衆還者盡與田頵謀絶行誘行宻詐以代鎮至揚州殺之張雄武寧將為懼時溥乃合兵渡江壁白下取蘇州治臺城府有戰艦千餘善馭衆其死人為立廟馮𢎞鐸代為刺史田善騎射大侃侃若儒者其納好行宻襲頵于宣敗行宻恐入海復振迎歸自副奸臣崔𦙍慎由子全險譎相崔昭緯薦得相醜昭緯誅亦出結忠還逐陸扆昭宗其行罷之渏扆復相四鎮清海又托全忠還相殺王摶誅中尉號崔入欲誅劉季述召全忠兵全誨刼帝幸鳳翔全忠圍之相𦙍盡誅宦官分斥近臣知全忠簒則奪已宰募兵為備全忠殺之遷𦙍死十日全忠遷帝于洛稷移百姓啼號罵國賊賣社崔昭緯險刻委内結忠臣外連強藩制天子固其權上杜讓能調兵食召茂貞行瑜稱兵殺之復又導三鎮兵殺韋昭度等條行瑜誅亦罷請全忠薦已又賂諸王詔其罪殺之栁璨公綽族孫文貧薦諸栁不齒帝非史通作析㣲昭宗好或代李蹊宻拜為相繼崔𦙍長起布衣至相不四年人挾全忠帝結宿衛冊因星見殺大臣三十餘脅哀遜位為禮使悔全忠流而斬之死臨刑自曰負國賊栁璨宜叛臣王行瑜朱玫列校討斬玫遂鎮邠寧從與茂貞韓建弟行實求山南楊守亮不自擊取之李克用欲以王重榮子珂繼鎮河中行瑜不可陳兵闕下殺韋昭度欲廢天子克用問罪敗走為下所殺陳敬瑄弟田令孜使擊毬得第一鎮西川在僖宗幸奉天號慟迎帝繕治行宫奉行百官吏無敢乏鵶駕東供億豐餘閑黄頭軍奴敗巢賊賊戒無與兒鬭殺京師子數千不肖剽閭里者出令孜得罪亦被流黄會昭宗立不奉詔令孜自監西川軍亦使募頭軍自擊又召王建激之亂為敬瑄計圍建乞討之詔三發兵稱大疫時罷兵建不奉詔之二年敗之建自留後斬敬瑄黔盡有兩川中地李巨川逢吉曽孫興王重榮討巢賊書檄報發神安思敏貶元楊守亮用之韓建禽守亮建用之建畫䇿脅昭宗囚八王盡散其殿後軍殺日夜導不臣全忠攻潼關建使納欵全忠之四夷唐蠻夷抗衡者四突厥吐蕃回鶻雲南是也時羣臣獻議劉貺以為嚴尤辯而未詳班固詳而未盡周得上䇿秦得中漢無䇿叛不勞師降不上釋備故曰周得秦築長城限中外後魏亦人築一歩方千里役三十萬人不旬朔而獲乆逸故曰秦得中漢以魯元不能止趙王之逆而冒頓手弑其親乃冀其不與外祖爭武帝時胡冦益希宜疏絶而連兵昭宣時匈奴逺遁猶給西北嵗二億士十萬魏晉資奉踰昔絲粟散數萬里外中國為羌胡殺且千載故曰無䇿嚴尤謂古無上䇿不能臣妾之也誠能之而不用耳秦无䇿攘狄而亡國也秦亡非攘狄也漢得下䇿謂伐胡而人病既病又役人奉之無䇿也故曰辯而未詳班固謂禮遜非所以接禽獸夷狄而漢飽豺狼以粟肉故曰詳而未盡杜佑謂周畆百步秦以二百四十步而一夫百畆又誘三晉之人耕使秦人應敵于外非農與戰不得入官大率百人兵農各半故國富兵強今百人才十人為農餘皆他伎又秦浚鄭渠溉四萬頃白渠溉四千五百頃永徽中兩渠溉不過萬頃大厯減至六千畆畆朘一斛嵗少四五百萬斛欲富強不可也障漢長安北七百里即匃奴侵畧不息晁錯備塞而北邉安今潼關之西隴山之東鄜坊之南終南之北十餘州數十萬家誠能復兩渠趣耕屯蓄河隴可復豈惟自守而已佑孫牧亦曰天下無事大臣榮逸戰士離落雜然盗發則疾駈以戰此不蒐練之過其敗一也百人荷戈仰食縣官則狹千夫之名大將小禆採其餘嬴以勇壯為幸執兵者常少縻食者常多此不貴實之過其敗二也小勝則張皇邀賞爵命極矣田宅廣矣金繒益矣子孫官矣肯外死勤于我哉此賞重之過其敗三也罰輕之過其敗四也不専任之過其敗五也元和團兵數十云以誅蔡四嵗然後取五敗不却也長慶初盗來走命未幾而燕趙亂五敗益甚二杜之論如此代宗徳宗時吐蕃再入常以南詔為前鋒自度不能留輙引去蜀人語曰西戎尚可南蠻殘我至韋皋鑿青谿道以和羣蠻使道蜀入貢使子弟習書筭于成都業成而去習知山川文宗時大入成都自越巂以北八百里民畜一空又敢率貧民因縁殺掠羣蠻常有屠蜀之心孫樵謂宜詔嚴道沈黎越嶲三州度要害募卒以守兵籍于州則易役卒出于邉則習險春夏耕蚕以資衣食秋冬嚴堅壁以俟冦戎此其備禦之可施行凡突厥吐蕃回鶻以盛衰先後為次東夷西域又次之迹用兵之輕重也終以南蠻記唐所由亡云元宗置十節度經略使筭安西節度撫西域治龜兹城河北庭節度制騎施堅昆治比庭都䕶府西節度㫁隔吐蕃突厥治涼州朔朔方節度捍禦突厥治靈州河東節度與方掎角禦突厥治太原府鎮范陽節度臨制奚契丹治幽州度平盧節度撫室韋靺鞨治營州隴右節備禦吐蕃治鄯州嶺劒南節度西抗吐蕃南撫蠻獠治益州南五府經畧綏靜夷獠治廣州突厥阿史那氏古匃奴北部隋末始畢克汗最強髙祖與連和定楊可汗與劉武周宋金剛屢冦河東秦王擊殺之頡利可汗士馬雄盛有憑陵中國之意太宗禽之以置州縣冦汾隂賂之許以和親王劉黒闥復誘入冦定州復入冦秦責之受盟而去遣復入冦至便橋太宗自出禦之請盟而退為卒李靖禽之俘告太廟國亡以頡利所統六州突利所統為四州左置定襄右置雲中二都督府統之時降者十餘萬咸請内兖豫閑處而空漠北温彦博請置河南如武帝留五原塞為扞蔽魏徵言是養虎遺患不如遣還河北帝主彦博議亦突利嘗自結於太宗入廟拜右衛將軍以思摩頡利族及諸部納欵思摩獨留被禽帝為忠而立之願吠守北門居三年不得衆復歸朝從伐遼死左賢王亦入侍車鼻可汗自立突厥部人遂頡利既敗畏薛延陁不敢自立薛延陁立強髙宗初禽之于是突厥盡為封彊臣唐書謂三十年無戎馬警年未幾單于都䕶府突厥反裴行儉討平之明骨咄禄反髙宗時骨咄禄招散亡據黒沙城以叛冦并州薛仁貴免胄示之引去又冦蔚州武后時冦朔州黙啜立益強骨咄禄弟涼降武后又冦州與從其請以六州突厥數千帳井穀種雜綵數萬之由是益強據地萬里有兵四十萬諸夷皆附有輕中國心敢屢入冦畋張仁愿築三受降城于河北自是不度山牧元宗初遣其子同我圍北庭都䕶郭䖍瓘斬之擊牧曳固侍勝為其所斬毗伽可汗盡有黙啜之衆掠涼州求敗河西節度由是大振盡有黙啜之衆和元宗東封張説徴其大臣從封其不肯與吐蕃入冦所上聴互市戎馬為下殺骨咄葉䕶立遂衰提毗伽子自立諸部又攻殺之自此互相爭奪遂衰回紇攻殺其白眉可汗獻之元宗而北逐晏然突厥始國於後魏至是遂滅後或朝貢皆舊部九姓其地盡入回紇始其族分國於西者曰西突厥西突厥與突厥分有烏孫故地曷薩那朝隋被留國人立射匱浸盛與突厥亢統葉䕶繼之遂覇西域射匱弟廷督諸國賦貢入朝用封倫説許婚賀魯髙宗時入冦薛定方禽之獻俘昭陵阿史那都支與吐蕃連和侵安西髙宗遣裴行儉禽之自是遂衰武后時别部烏質勒方強解瑟羅畏之率其部人内遷長安死未幾突騎施又起自相殘滅元宗時突厥亡烏質勒突騎施皆西突厥别部吐蕃西羌屬在吐谷渾西南未嘗通中國唐初浸強王族皆曰論官族皆曰尚君曰普贊棄宗弄讚入貢求婚太宗未許帥卄萬冦松州求婚侯君集敗之復求婚許之論欽陵秉政國益強欽陵與弟贊婆悉多于勃論皆有才畧三弟將兵于外鄰國畏之陷西域十八州髙宗以薛仁貴討之敗績李敬討之亦敗吐普贊死欲圖之裴行儉諌欽陵為政不可時蕃之境東接松涼南至天竺西陷龜兹北抵突厥方萬餘里諸胡之盛莫比數入冦婁師徳破之河源八戰八克武后遣韋待價擊之大敗求唐休璟破取其四鎮置安西都䕶于龜兹遣使四鎮十姓地郭元振答之論欽陵見忌自殺之遂不振器弩悉弄漸長謀殺之故自殺璟贊婆及欽陵子以所統士千帳來降部唐休又大破之于洪源道遣使求和諸皆叛棄𨽻蹜贊立又數敗立方七嵗武元宗初入冦薛訥大敗之街又入冦王君㚟敗之青悔雨節信安王禕拔其石堡城拓地千餘里更命朔方度為振武軍數敗懼入貢萬求詩書復趙惠琮矯詔襲之朝貢復絶以四十入冦舉國守據石堡城毎麥熟來獲王忠嗣敗之堡哥舒翰復取石城徳宗時婆悉立復常為邉患賴李晟屢敗之嵗平涼刼盟涇隴邠之民幾盡嵗入冦賴韋皋屢破之回紇南詔背之始弱初常挾雲南入冦雲然亦無嵗不入寇歸唐吐蕃始弱紇南詔皆為中國擊敗其師宗憲宗時亦盟常入冦穆時入冦求文宗時達磨普贊滛虐國益衰武宗時論恐熱強攻尚婢婢時冦河東宣宗掠河西懿宗時拓抜懐光斬論恐熱傳首京師吐蕃自是衰絶初太宗平薛仁杲得隴虜李軌得涼破吐谷渾髙昌開回鎮𤣥宗收黄河磧石宛秀等軍中國無警幾四十年乾元後隴右劒南西山三州七闗軍鎮監牧三百所皆失之憲宗思復河湟未暇宣宗復之後為回鶻所并吐谷渾髙祖使擊涼李軌太宗時冦闕州李靖司破之請頒厯遣子入侍地畏吐蕃髙祖為徙之靈州故皆入吐蕃回鶻本回紇徳宗時改其先匃奴突厥亡惟回紇為彊并薛延陀有其地獻欵太宗請吏置燕然都䕶府統之六都督七州皆屬髙宗時犯邉薛仁貴敗之天山九契苾何力為鉄勒道安撫姓遂定天寳間裴羅立攻殺突厥盡得突厥地禄山反徴其兵入援葛勒可汗與子儀會討禄山遂掠東都至代宗初始歸國入冦長安代宗幸陜又與吐蕃懐恩大入皆子儀擊走之自是嵗擾邉徳宗初入貢求和親乞改號回鶻之為唐擊吐蕃許穆宗時求婚許之請以兵佐裴度伐幽鎮議者懲艾不聴武宗時諸部皆逆款為黠戛所破求内附田牟欲乗此擊之徳裕不可末幾入冦詔諸道禦之劉沔大破之奪公主歸宣宗時入貢薛延陀先與薛種雜居復滅延陀部有之故名夷男求婚於太宗元齡勸許之世乗太宗東封攻突厥思摩李勣破之絶其婚子拔灼立回紇諸部據其地李勣滅其國回紇鉄勒諸部請吏為州縣沙陀西突厥别部沙陀處月之别種姓朱邪沙陀其大磧名睿宗時入貢後吐蕃疑其貳于回鶻欲遷之可汗朱邪軌宜復歸唐懿宗時朱邪赤心助平龐勛僖宗時李克用收復京師北狄契丹大賀氏本東部落居鮮卑山至元魏立今號太宗時内屬置松漢都䕶府武后時叛孫萬榮據营州叛陷冀州狄仁傑禦之之貢後李楷固卒平遂附突厥𤣥宗初方強屢敗中國之師薛訥討之敗烈郭英傑討之敗死大張守珪斬其王屈安禄山討之又敗自至徳後藩鎮擅地亦鮮入冦懿宗時安巴堅有其國大賀氏遂亡渤海本靺鞨附髙麗武后時仲象者度遼自固詔封震國公睿宗拜渤海郡王子武藝斥大土宇欽茂徙上京寳應初詔以渤海為國有五京十五府六十二州距京師八千里朝貢史無傳焉東夷髙麗本扶餘别種居平壤城有鴨渌水髙祖受其稱臣温彦博以其本箕子國魏晉時故封國勸受其稱臣太宗時葢蘇文殺其王建武而立藏自為莫支離帝嗣拜藏為遼東郡王葢蘇文伐新羅帝親征之拔葢年城為葢州遼東城為遼州於是髙麗北部髙延壽及靺鞨十五萬來援帝合圍之延夀舉衆降固號所幸山為駐蹕山勒石紀功髙宗初蘇定方大破泉男建自為莫支離而討其先男生男生告急李勣討降之禽其王髙臧凡五部百一十六城六十九萬户為九都督四十二州置安東都䕶于平壤以統之新羅居漢樂浪地王真平遣使入朝髙祖拜新羅王太宗却其女樂真平無子女善徳嗣善徳死妹真嗣髙宗時納髙麗叛衆據百濟地劉仁軌大破之武后賜吉凶禮興光襲立子弟入太學元宗使邢璹弟承慶文宗時張保皋使鄭年平其國之亂㑹昌後朝貢不至百濟髙麗之南髙祖時數朝貢封王時髙麗數侵新羅髙宗遣蘇定方禽其王平其國得三十七郡二百城七十六户以劉仁願守百濟城其王之從子圍仁願劉仁軌大撃降之分武后時其地為新羅靺鞨勃海所百濟遂絶髙昌麴氏漢車師前王廷也貞觀初其王文泰來朝乆之與西突厥通壅掠西域之朝貢詔侯君集滅之為西昌州麴氏傳國九世百三十四年而亡龜兹一曰丘兹距京師七千里姓白氏貞觀初獻馬後臣西突厥乃以阿史那社尒討之以四海寜一為其樂使許敬宗譔西域圖志武氏即其地為都䕶府都䕶以政稱者曰田揚名郭元振張孝嵩杜暹云疏勒姓裴氏正觀九年獻馬又四年獻方物開元中冊為疏勒王罽賔居葱嶺南距京師萬二千里正觀中獻馬天寳初冊其子襲王南蠻南詔謂詔為王本烏蠻别種髙宗時遣使至開元冊為雲南王楊國忠以鮮于仲通鎮嶺南閣羅鳳遂反大破中國之師徳宗時異牟尋上表請棄吐蕃歸唐擊破吐蕃来獻捷王貞元中冊為南詔文宗時杜元頴鎮西川冦成都入其郛自此常為南方患宣宗以髙駢為安南都䕶平之未幾中國貪刻又叛懿宗時僣號僖宗時求和款附驃古朱波也徳宗朝遣使詣韋臯獻樂於是皋作南詔奉聖樂西原蠻有黄氏穆宗長慶初嚴公素請討之韓僉諌太和中董昌為經畧夷其種古今紀要卷十五
