  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0011_WYG_001-1a, image: WYG0384/WYG0384-0002c.png}
body:
  text: 古今紀要卷一宋黃震撰包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始畫八卦以通神明之德以類萬物之情作結繩而為網罟以佃以漁蓋取諸離神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤上古神聖繼天立極為萬世開太平者經見止此至夫子定書為萬世訓則斷自唐虞以下今當一以典謨為正凡史遷之所録皆夫子所已棄儒者不必復云堯舜事見於書者此不重出三代放此夏凡十七君四百三十二年舜授禹啓賢能繼禹之道太康失邦少康中興桀為不道湯放之太康之失邦也先儒皆稱羿立其弟仲康仲康沒子相立羿篡之寒浞殺羿夏氏滅審如是則仲康之世權皆在羿嗣征一篇乃羿假王命攻異己者不當為經薛常州士龍考以地理謂羿拒太康據其都太康不知所終仲康乃之洛地自立今拱州太康縣是也仲康既在五弟之數不為羿所立明矣是仲康别立於河南而羿之據夏舊邦自在河北二者初未相併嗣征之書實出王命仲康死帝相立寒浞始殺羿居其位别使其子澆侵帝相於河南相遷于帝丘後竟滅之相妻后緍方身逃歸有仍氏生少康有遺臣靡自有鬲氏迎立之夏乃中興今存其説商二十君六百二十八年號自契封商至盤庚遷殷始殷湯外丙仲壬趙臺卿本孟子説謂太丁湯之太子未立而死外丙立二年仲壬立四年程氏謂方二嵗四嵗未可立皇極經世亦徑以太甲接成湯按孟子彼云未立則此云二年四年者立之年也當以孟子為正太甲太戊中宗盤庚自仲丁河亶甲祖乙并湯與盤庚號五遷武丁髙宗祖甲祖甲賢武丁欲廢其兄祖庚而立之遂逃為民即無逸稱享國三十三年者是也先儒見史記國語皆稱祖甲淫亂遂改無逸之祖甲為太甲不信經而信史惑矣史遷不見屋壁之書周西三百五十二年并東周八百六十七年后稷封邰子不窋失其官竄戎狄間不窋孫公劉復修后稷之業遷豳商末太王避狄遷岐傳王季為西伯文王繼之五十年武王立十三年伐紂泰誓云十有三年春大會于孟津是也而書序乃以為十一年史記亦稱十一年伐紂二年訪箕子與洪範十三祀之數合世因疑泰誓經文為誤漢儒又創言文王受命九年武王二年伐商通十一年歐陽公著泰誓論定為即位之十一年蓋因二年後方訪箕子也按經文皆稱十三年而武成釋箕子即伐紂之嵗不在伐紂二年之後當以經文十三年為正武王成王康王昭王南征不返穆王徐戎稱偃王共王懿王孝王封非子為秦夷王下堂見諸侯厲王奔彘共和厲王居彘二相共治宣王中興幽王寵褒姒為犬戎所弒平王東遷四十九年即魯隱元年春秋作焉自春秋以後分國以記而統於周平王春秋始此又雅降為風所謂詩亡然後春秋作三年崩共五十一年桓王伐鄭傷敗魯不朝周反使南季宰渠伯紏家父仍叔之子來聘求賻求車隱三年即位桓十五年崩在位凡三十三年莊王春秋莊元年書王使榮叔來錫桓公命啖助曰不稱天王寵篡弒以瀆三綱也六年書王人子突救衛嘉之也以莊十二年崩在位十五年僖王齊始伯立五年以莊十七年崩立三年而齊伯惠王二年子頽亂王奔溫四年鄭虢納之二十五年崩當僖八年子頺事不書襄王二年叔帶亂奔齊十六年叔帶狄人作亂王出居鄭明年晉文公納之賜晉弓矢為伯二十年狩河陽三十三年崩當文八年頃王元年毛伯來求金六年崩當文十四年匡王六年崩當宣二年定王元年楚問鼎莊始伯九年使王季子聘魯王靈益不振矣自此雖聘亦不書宣公十七十七年王師敗績于茅戎成五年崩立草一年簡王十四年崩襄元年靈王二十七年崩襄二十八年景王鑄無射鐘二十五年崩昭十二年子朝作亂劉子單子立猛既卒敬王立子朝入王居于狄泉四年入于成周自是謂王城為西周成周為東周十六年子朝之徒作亂十七年晉定公復納王于成周三十九年當魯哀十四年春秋終四十一年夫子卒四十二年崩據此以下史記元王八年貞定王二十八年哀王立三月思王桓殺之思王立五月考王政殺之考王十五年定三王皆王子威烈王二十四年崩初考王封其弟於河南為襲公以續周公之官職傳威公惠公乃封其少子於鞏以奉王號東周惠公安王二十六年烈王十年顯王立四十八年四十四年秦惠王稱王其後諸侯皆稱王慎靚王六年赧王時東西周分治赧王徙都西周五十九年秦取韓陽城負黍西周恐與諸侯攻秦秦昭王怒攻之西周君奔秦盡獻其邑三十六秦受之歸其君王赧卒周民遂東秦遷西周公於􅓆狐後七嵗秦莊襄王滅東西周魯姬世侯起周公後順自伯禽至隱公十四周公至公凡三十四世隱立十一年魚不朝王許邾觀入祊會戎取郜伐衛宋取祊桓立十八年仲子所生本隱公庶弟而弒隱自立薑璧假許田取郜鼎而立宋華督不能防文而死於齊莊立三十二年年不能防母丹忘親釋怨與齊狩于禚三如齊納聘三十六又楹刻桷以誇太青初弟長慶父決叔牙次季友慶父首主兵伐餘邱公三桓始此慶父殺子般立閔公二年季友立僖初成風屬僖公焉季友忠賢生而賜氏俾世其卿私門遂強僖立三十三年齊會邾復敗邾會桓伐楚伐鄭穀與會葵邱能如齊會公及夫人薑氏會齊侯於陽許翰謂不以禮齊而肆于寵樂公孫敖帥師與諸大夫救徐安中國之志怠矣楚師救齊春秋善之新作南門西宫災伐邾來獻宋捷勞與邾戰升陘王以楚師伐齊河踐土之會天王晉侯公朝于所天王狩陽公朝于王不會王人諸侯于翟泉近在洛陽王城而不朝設諱書公天王使宰周公來聘公子遂如京師遂如晉既不朝王使大夫乂以二事大不恭卜取濟西田取之曹也雖故地譏其以亂易亂四郊不從乃免牲猶三望春再伐邾凡詩所頌秋不書文公十八年無閠不告不視雨不閔朔會同不與修廟壞不宣公襄仲殺適而立之書即位著其自立即位之月逆女于齊以自固襄仲即公子遂亦生而賜氏年十四年公孫歸父會齊侯而禮自大夫出矣明仲孫蔑會齊髙固大夫與大夫會亦不自諸侯出矣甲初稅畝譏廢助而用稅也初者變之始其後作邱用田賦皆此啓之十八年卒成元年作邱甲古四邱為一甸共六十四井出甲士三人今一邱出一甲比舊增三之一立十八年卒襄十一年作三軍三家各私其一也三十一年卒昭年十九猶有童心舍中軍蓋四分公室而季氏有其二矣而不用子家羈之謀欲伐季氏遂孫于齊處鄆四年鄆潰卒於乾侯立三十二年定立不書正氏十年會夾谷成齊歸侵疆司叔孫隳郈季隳費圍孟氏孔子為寇在十二年十五年卒哀用田賦二猶不足故以田賦以春秋終於十四年至二十七年欲伐三桓卒于有山氏而悼公立悼元穆共康景平文傾二十四年楚考烈王滅書傾公亡為家人卒于柯齊薑公侯年太公十三世至僖九當魯隱元年僖魯桓十四年卒襄殺魯桓通其夫人為弟無知所殺桓自莒入當莊九年北杏之會莊十三年以諸侯主盟會始此盟明年盟于幽在莊二十七年於是得衆救邢封衛江黃于貫以斷楚臂在僖二年五伐楚盟于召陵在四年陽盟于首止以定太子在年葵邱之盟九年榖之會伯業始怠十一年一緩於救徐伯業遂衰十五年四時桓公在位四十年矣以僖公十七年卒凡立十三年會方楚未服而齊以為憂也致勤於鄭振中夏之威于陽谷篤逺國之信按兵于陘修文告之辭退舍召陵結盟會之禮楚方會盟志巴驕溢陳大夫轅濤塗謀不協執其身而伐其國與魯僖夫人會于陽穀楚滅黃不救狄侵衛侵鄭救城三國城邢救患也城楚邱救衛也諸侯城緣陵杞也初桓公屬孝公於宋襄及卒五公子爭立易牙立無詭宋伐之而立孝公孝以僖十八年立於二十年楚始與盟齊之時主盟者宋侵二十三年伐宋時宋與楚戰而伐殘中夏也魯魯以楚師伐之以僖二十七年卒昭時晉文公伯而與會鮮矣自踐土會盟溫之會翟泉之會僖三十年狄侵之文三十年狄又侵之所十四年為商臣弒懿商臣也弒君自立伯昭公魯甥也睦於魯懿執單而侵魯文十八年為邴歜閻職所弒惠魯宣篡立結齊自固齊取濟西田齊它無盟會惟與魯親宣十年還其田而卒頃伐莒伐晉鞍之戰先滅此而後朝食卒敗於晉以成九年卒靈滅萊伐魯五魯以晉伐之卒以襄十九年莊伐衛伐晉崔襲莒之襄二十五年杼弒景晏子言陳氏厚施將得國惟禮可以己之不能用年夾谷之會歸魯疆立五十八年哀五卒悼景公命立荼陳乞弒之而立焉弒歸歡及鄆春秋善其改過辭吳師而見春秋以卒書在哀十年簡獲麟年為田恆所弒平田恆為封邑大於齊事見春秋後又二世至康公十九年田常曽孫田和始為諸侯遷康公海濱二十六年卒田氏卒有齊國田齊威王朝周烹阿封即墨稱以人為寶臏伐魏救趙自王最強用孫三十六年卒宣王用孫子救韓破魏皆喜文學遊説之士鄒衍淳于髠田駢賜第十九年卒湣王三十六年與秦稱東西帝以蘇代之説而去之遂伐宋南割楚西侵三晉欲并周泗上諸侯皆稱臣四十年燕秦楚三晉共伐之燕將樂毅遂入臨淄楚使淖齒救齊遂殺湣王而與燕共分齊地齊士臣求其子法章立之為襄王襄王保莒成襄五年田單以即墨破燕迎王入臨淄故地盡復年十九卒王建秦攻趙不救入朝秦韓趙魏楚燕既滅四十四年秦擊齊遂降遷之共晉姬鄂侯十初封唐燮友改曰晉自唐叔至侯三世鄂侯二年當隱元年鄂初穆侯長子仇為文侯次子成師為桓叔文侯之子昭侯封桓叔於曲沃大於翼翼晉都也潘父弒昭侯昭侯迎桓叔不克晉人立孝侯歷鄂侯哀侯小子侯緡大亂五世桓叔卒莊伯代莊伯卒武公卒滅晉有之為後晉當魯莊十五年武請周列為諸侯獻伐戎得驪姬生奚齊卒亂國春秋不書至僖二年始書滅夏陽五年書生共世子申生未闌與盟會以僖九年卒荀息立奚齊及卓里克皆殺之夷吾自秦入為惠公惠許賂秦入而背之於晉飢秦輸粟秦飢晉閉糴秦穆伐之獲韓復而卒懷公立懷時重耳在外十九年至僖二十四年秦納之為文公文始入教其民二年欲用之子犯曰未知義於是納襄王將用之曰未知信於是伐原示信將用之曰未知禮於是大搜一戰而伯敗楚于城濮僖二十八年為踐土之盟天王狩于河陽僖三十二年卒襄敗秦于殽再敗之彭衙連兵屢年以文六年卒靈厚斂而彈人殺宰夫患趙盾諫欲殺之盾奔未出境弟穿弒君春秋歸罪于盾當宣二年成亦世主夏盟楚宣七年盟黑壤伐秦救陳陳屬又伐陳宣九年卒景救鄭大敗於楚莊後勝齊於鞍十滅赤狄成主夏盟九年以十年卒厲敗楚于鄢陵之欲盡去羣大夫欒書弒在成十八年悼自周迎立之逐不臣者七人修政復伯之會至誠待人鄭不復叛者二十五年蕭魚又謀於魏絳而息民訪於祈奚而舉賢聽於知武子而不與楚戰三駕而楚不能與爭襄十五年卒平十四年吳季札來説趙文子韓宣子魏獻子曰晉其萃於三族乎二十六年卒在昭十年昭將尋盟齊不可叔向為平歃之盟以威之甲車四千乘方是時楚人強在宋之盟爭晉先及號之不仍讀舊書晉不自強而欲示威故春秋以公不與會為幸時昭十三年也子産亦云何國之為以昭十六年卒頃立六卿范氏智氏中行氏趙氏魏氏韓氏十二年殺祈氏羊舌氏分其地為十縣各使其子為大夫六卿益強同方鑄刑鼎仲尼曰晉其亡乎又明年卒在昭三十年定立三十七年卒當哀二十一年在春秋之后出十七年智伯與趙韓魏共分范中行地出公怒四卿攻之奔齊道死哀智伯所立政皆決於智伯智伯求地韓趙魏共殺之并其地幽獨有絳曲沃餘皆入三晉十八年盜殺之烈魏文侯所立十九年威烈王命韓趙魏為諸侯二十七年烈公卒孝十七年靜二年魏武侯韓哀侯趙敬侯滅晉而分其地靜公遷為家人三晉韓韓之先周同姓國后裔仕晉封原曰韓武子三世有韓厥佐景公宣子伐之與趙魏共分十縣傳貞子簡子莊子康子康子滅智伯傳武子景侯為諸侯列文哀懿昭宣惠王大敗於秦質子以和襄王與齊魏擊秦秦與之河外釐王牽周攻魏秦為所敗伯惠王失上黨王安為秦所虜以其地為穎川郡太史公云韓厥感晉景公紹趙孤天下隂德也同按史所載存趙事與左傳不趙趙之先與秦共祖造父為周穆王御封趙城為氏趙夙為晉獻公將生衰事文公衰生盾事襄公至景公盾生朔滅族朔之妻成公姊走匿公宫有遺腹子程嬰匿之杵臼與他兒代死後趙孤復立為趙武復得晉政武生景叔叔生鞅為簡子簡子生無恤為襄子滅智氏生獻侯烈侯始為諸侯武公成侯肅侯武靈胡服惠文王用趙奢破秦孝成受韓之上黨用趙括大敗於秦平原君請魏解秦圍悼襄幽繆李牧誅趙忽代將以王降秦魏畢公髙周同姓及絶封為庶人畢萬仕晉獻公封於魏數世有魏絳至晉悼公終生嬴嬴生獻子事昭公為晉卿生侈與趙勒共攻范中行氏侈孫桓子滅智氏桓子孫文侯文侯內師卜子夏友田子方假干木外用吳起西門豹李悝盡力耕戰以誠信交鄰民不知兵武侯稍侵暴鄰國惠王結怨韓趙齊乘其弊殺龎涓太子申秦人因之遂取西河魏由此徙大梁襄王哀秦使樗里子代取曲沃走犀首昭子秦河東地秦又拔城大小六十一安承信陵救趙景湣王假秦灌大梁遂滅魏以為郡縣宋子公公年微子十四世至穆八當隱公元年穆隱三年卒立其弟殤公殤十年十一戰華督弒之莊莊二年卒閔大水罪已南宫萬弒之桓僖九年卒襄以目夷為左師於是宋治奉齊桓既沒遂主夏盟然其伐齊之喪少奪長一罪也一會虐二國之君二罪也曹不服不省德而圍之三罪也泓之戰不重傷不禽二毛敗於楚而卒當僖二十三年成文七年卒昭無道見弒春秋書宋人弒其君見文十六年文成二年卒華元樂舉棄君於惡共華元合晉楚之成元共公卒蕩澤弱公室殺子肥華討之魚石奔平楚內魚石于彭城信寺人栁殺太子痤逐華合比宋災伯姬死焉昭六年卒元無信多私而惡華亥向寧君臣交質而國亂晉率諸侯救之而平其魯季孫意如之逐昭公也元公實意如外舅不恤私求內昭公而卒於曲棘景定六年晉范鞅執其行人樂祈犂以公子地之馬與桓魋二弟出奔見定十一年明年入蕭以叛伐哀八年滅曹書入曹自取之執小邾子鄭其卒在春秋之後偃史記云襄公十數世至君偃自立為王東敗齊取五城南敗楚取三百里西敗魏乃與魏齊為敵國射天諫者輒射之天下皆曰桀宋立四十七年齊魏楚伐宋滅之而三分其地衛姬二侯至武王母弟康叔所封十世桓公十三年入春秋桓初莊公嬖庶子州吁遂弒桓公宣淫亂殺伋夀立朔惠即朔也左公子泄右公子職立黔牟惠公奔齊後復入懿好鶴狄滅之宋桓逆戴公處漕邑齊桓攘狄而封之文徙居楚邱衣大布之衣大帛之冠務財訓農通商惠工元年三百乘末年三千乘然忘齊之德而伐齊桓之卒僖十八年也狄救齊伐衛名二十五年滅邢春秋之未幾卒成為晉文所伐與楚晉未幾復晉以元咺復執歸于京師始歸而殺武叔再歸而及公子瑕春秋罪之狄圍之又遷於帝邱穆宣九年立十四年殺其大夫孔達成二年與齊戰敗績是年卒定初從楚盟于蜀皆貶而書人也七年救鄭同盟于馬陵病楚自後復從晉獻成孫文子寧惠子食而弗召孫子為亂公奔齊遂立殤公然獻公有世叔以守母弟鱄以出遂得還國殤為寧喜所弒獻公卒襄公立僖二十九年襄昭七年卒靈不能正家蒯瞶奔靈公卒晉納蒯瞶為莊公莊時蒯聵之子輒已立父子爭立輒曰出公出實當國哀公十四年蒯瞶困孔悝始得立事在春秋後子晉伐衛莊公出奔衛人立班師齊伐衛更立公起石曼逐起輒自齊復歸立二十一年卒又十餘世君角立君角秦并天下二世廢君角為庶人衛絶鄭姬幽伯公宣王弟及封鄭為桓公犬戎殺王死之武公生莊公始入春秋莊克假射王突厲公忽昭公子亹子儀此為公子五爭祭仲立突忽奔衛突殺祭仲不克而奔蔡祭忽復入髙渠彌弒忽立亹儀齊人殺亹而髙渠彌仲等立子儀傳瑕殺子復納突凡五文逃盟即楚齊桓伐之晉文亦以其無禮伐之穆靈襄悼成僖無嵗不被晉楚之兵肉袒逆楚莊者襄也為晉景所執者成也簡時晉悼推誠為蕭魚之會鄭不叛晉者二十四年蕭魚會襄十一年也有初襄八年鄭子耳子國侵蔡獲公子燮無文德而武功子産懼之子駟子展之為政惟晉楚之來者則與之襄三十年子皮授子産政都鄙有章上下有服廬井有伍賂伯石殺子晳環壞晉館晉有鄉校不禳火不祭龍不與宣子不受使幣有諸侯之事則問四國之為於子羽且使多為辭令與禆諶適野謀可否告馮簡子斷之授子太叔行之渾擇能而使以禮自固晉楚不敢加焉自然作邱賦罕譏之鑄刑書叔向責之僑亦謂不能及子孫皆將死屬子太叔以猛遺僑死而鄭不振矣鄭人哭之孔子亦曰古之愛也事簡定二君公以昭二十年卒當國二十二年時史記謂鄭聲五年卒聲公乃在春秋末哀公當考定昭二十八年卒獻與城成周也同晉侵楚滅許九魯亦侵鄭定六年八年晉侵之年卒聲伐宋五敗於晉宋伐之者四年卒在春秋後君乙二十二年韓哀侯滅之曹姫世伯桓武王母弟振鐸始封十二至公三十五年入春秋桓莊僖昭共嘗與齊威之盟及宋不服而宋圍之遂昵于楚晉文公執之以致楚師後以賄復春秋名之責不用僖負羈文宣皆受晉盟殺宣卒于師負芻太子自立成負芻也晉悼執之歸于京師天王釋之武皆受晉盟平悼聲隱靖皆不振伯陽好田弋聽鄙人公孫強叛晉姦宋宋滅之當哀八年陳媯十舜後周時虞遏父為陶正封陳胡公五世至威公二十三年入春秋桓既卒陳他殺太子免自立踰年蔡人殺之厲莊穆共靈夏徵舒弒之成楚莊伐而縣之以申叔時之言復其國哀棄晉即楚鄬之盟逃歸楚靈滅之五年平王復其國惠懷閔世役於楚楚惠滅之楚白公之亂陳伐楚陳滅而田恆得政於齊即陳後也邾曹晏子曹顓頊後陸終第五子為姓封鄢陵為邾邾儀父桓十五年邾人來朝始入春秋十七年書邾儀父傳云魯附庸故書字儀父名克其子稱邾子瑣稱自文公以下子文公當僖公二十一年滅須句太皥之後也魯僖伐之自井陘之戰交惡不已嘗執鄫子用之定公戕鄫子宣公為晉所執悼復與魯交兵孫庶其來奔臧紇奔焉莊公隱公為魯哀滅其國以歸既而還之又來奔桓太子華事在春秋後并孟子序邾為楚所又曰為魯所并小邾曹子僖七年來朝襄七年來朝自此與會盟征伐而不知其世諡云蔡姫宣蔡仲十世至侯入春秋宣桓哀為荆所虜再入其國穆齊桓伐楚以其服于楚先伐之莊文欲事晉畏楚不能景卒從楚靈弒景侯自立其後楚子虔誘而殺於申平楚滅之平王復其國悼卒於楚昭倍楚從吳遷于州來為盜所殺成齊侯楚惠滅之杞姒得侯樓武王求禹後東公封之杞武公十一年入春秋二桓二年書侯貶莊二十七年書伯僖十三年書子用夷禮凡歷桓孝文平悼隱僖哀八年卒惠四傳至簡公楚滅之於其後勾踐興越皆禹後云北燕召公後九僻小不通諸夏者二十世南燕姞姓簡公始入春秋三戰國之世亦以耕戰自守昭年奔晉六年齊伐之文公二十八年蘇秦始結從約噲以國讓子之大亂齊伐之昭用樂毅大破齊惠以騎劫代樂毅齊田單大破之數世至王喜太子丹用荆軻刺秦秦滅之許薑莊隱十一年魯齊鄭入許莊公奔衛自此世諡始見穆僖昭靈悼許元鄧滅之莒已子祝融陸終第一弓樊封鹿吾莒子隱二年書不知其諡紀公渠邱公黎比公著邱公郊公共公滕祖出文王滕侯隱七年書滕侯卒不知其名諡宣隱十一年朝魯昭文成悼頃隱哀十年卒薛任封奚仲後所在周前夏薛侯隱十二年來朝不知世諡獻哀君定惠虞姬至出太王二自虞仲虞公十世虞公為晉所滅吳姫夢子入自太伯十九世至夀始春秋當成七年夀夢春秋以其僣號而狄之少時中國無伯鍾離之會齊晉亦俯首而聽之子季札賢欲立之不可諸樊餘祭餘昧以次立欲致國於札札逃之諸樊餘祭餘昧皆夀夢子餘昧一名夷末傳君僚君僚諸樊之子闔閭弒之而自立闔閭初吳楚之女爭桑相攻而楚亡臣伍子胥自楚來奔闔閭舉為行人破楚入郢及檇李之戰敗於越而卒夫差報越讎棲句踐於會稽黃池之會方主夏盟而越入之哀十三年後四年為越所滅吳越終春秋不書人越姒世子允夏少康庶子封會稽二十餘至常伐吳昭六年始見春秋勾踐聞吳王夫差將報讎先伐之而敗乃令大夫種行成於吳保會稽卧薪嘗膽以國政委大夫種以甲兵委范蠡十年生聚十年教訓遂以沼吳至復渡淮與齊晉諸侯會徐州尊周伯天下六世無疆無疆伐齊楚故周顯王四十六年楚威王大敗越盡取吳地至浙江殺無疆諸族子爭立或為王或為君濱於江南海上朝服於楚後七世至閩君搖搖佐諸侯平秦為漢髙帝復以搖越王奉越後東越閩君皆其後楚芈遷子號祝融之後熊繹成王封楚自西周為患及東僣自鬻熊至武王熊通十七世嘗伐隨子文王熊資始入春秋郢始文王其先居丹陽都文王魯莊十年書荆敗蔡十四年入蔡十六年伐鄭皆以州舉惡其猾夏絶之也二十三年來聘書荆人以慕義進之也成按文王以莊十九年卒來聘乃王頵堵敖成市德結好地方千里十僖元年書人襄十六年齊桓伐之當僖四年三三年執辱宋當僖二十一年三十九年子玉敗於城濮當僖二十八年年四十六年太子商臣弒之自立是為穆王當文元春秋以楚人與盟自僖十九年齊之盟始首初齊桓之在楚雖書人而未嘗與盟桓公沒鄭伯朝于楚及今遂為此盟故春秋人陳蔡而以鄭列楚下深惡之也成王頵終始桓文之世穆晉襄伐之以救江六楚卒滅江滅六書文九年伐鄭楚子使椒來聘胡氏傳曰至是其君爵其臣書名是以中國禮待之也蓋吳楚皆聖賢後而以變於夷故春秋內雖不使與中國同外亦不使與夷狄等按僖二十一年執宋公已書楚子矣二史記云十年卒莊三年不號令史記云宣八年伐陸渾戎觀兵周郊問鼎當三年十六年伐陳縣之以申叔時之言復陳在宣十一年敗明年圍鄭鄭襄肉袒去之三十里平而晉師至大晉師不為京觀私宋語平之二十年圍宋華元與子反二十三年卒當宣十八年共十六年救鄭敗於鄢陵晉射中共王目在成十六年庸成二年嘗主蜀之盟春秋皆人之十七年滅舒襄九年伐鄭自此與晉爭魚明年書楚救鄭罪諸侯陵鄭也一又明年晉有蕭之會而楚不能較矣立三十年卒康即位當在襄十四年十八年伐鄭伐二十四年伐吳伐鄭明年滅舒鳩明年鄭二十八年卒凡立十五年郟敖初康王寵弟子公子圍三年圍為令尹弒郟敖自立春秋昭元年書楚麋卒胡氏曰圍弒君自立大合諸侯於申與會者十三國其臣舉六王二公之事其君用桓公召陵之禮而宋向戌鄭子産皆一時之良也皆有獻焉夫子痛之故不書弒靈昭三年會於申亦靈王之三年六年伐吳明年又伐之陳八年使公子棄疾滅陳十年誘蔡侯殺之棄疾為蔡公十一年親伐徐以恐吳次乾溪樂焉初申之會僇越大夫常夀過殺蔡大夫觀起起子在吳因勸伐之常夀過矯棄疾命召公子比於晉入弒靈王太子祿而立之靈王餓死而楚未知也比恐自殺棄疾即位平以昭十三年立二十六年卒在位十年及吳戰於長岸則昭十七年胡傳曰楚地五千里本非吳敵也惟費無極以讒勝囊瓦以貨行而竒才䇿士為戰國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔王殺伍奢召二子尚歸死胥奔吳昭初費無極讒太子建殺伍奢至是令尹子常誅無極以説衆十年吳王闔閭伍子胥伐楚戰柏舉大敗吳遂入郢辱平王之墓申包胥請救於秦敗吳於稷昭王歸楚二十七年救陳伐吳卒於軍不移過股肱疾不禱河惠二年子西召太子建之子勝為白公亂楚自立月餘葉公救之十七年卒簡聲悼肅宣六年秦始強而三晉益大威懷秦使張儀紿之使絶齊因結齊大敗之又紿與盟留之不遣卒於秦頃襄畏秦以五十里為讐人殺為弋鴈者激怒之方連縱伐秦而敗秦又拔郢燒先王墓考烈春申君用事二十二年共伐秦不利徙夀春命曰郢幽十年卒哀庶兄負芻之徒弒之負芻五年秦王剪破楚禽之楚為郡初楚莊討陳圍鄭及宋皆足以自取而不取而秦之劫楚乃如此父老憐之曰楚雖三户亡秦必楚卒之滅秦者皆楚人秦嬴孝伯主據史記顓頊後伯益之苗裔犬非子為周王馬始為附庸邑於秦襄公平戎為諸侯自非子十五世至穆公始見春秋當僖公十五年穆秦晉連兵始於僖三十一年圍鄭之役始悔過有誓孔子録之文三年焚舟之役伯康文七年有令狐之戰之文十二年有河曲戰共宣二年伐晉桓宣八年晉以白狄伐之成十三年與晉厲為令狐之盟又召狄與楚欲伐晉晉絶秦諸侯直晉而秦敗先是成九年秦亦以白狄伐晉景襄十年晉伐秦明年秦伐晉哀救楚伐吳楚昭復國定五年春秋不書救楚事惠定九年立哀三年卒悼其卒在春秋後自哀惠以來春秋書其卒葬而已厲共躁懷自殺靈簡惠十三年伐蜀取南鄭獻孝公生周太史儋曰周秦别五百嵗復合合七十七嵗霸王出孝公用商鞅置徙咸陽為開阡陌縣初賦惠文誅鞅滅司馬錯蜀取漢中置郡張儀遊説武王初置丞相與孟説舉鼎死昭襄留楚懷王相穰侯魏冉為白起坑趙鼎攻西周取其三十六邑九入秦諸侯朝孝文除喪三日卒莊襄滅東周君子政立始皇文信侯免相十年逐客李斯上書用其謀兼并天下十七年滅韓十八年滅趙滅草二年滅魏滅楚燕草六年滅齊春秋諸臣周臣春秋前者亦附見太子晉宣王太子川穀洛鬪諫壅王子虎盟諸侯於王庭要言曰皆奬王室會翟泉見左傳王孫滿秦襲鄭知其必敗德定王使勞楚楚問鼎對曰在德不在鼎周未衰鼎未可問見左傳王孫説勸簡王勿賜晉使僑如之諂而賜其介仲孫蔑之讓祭公謀父諫穆王征犬戎不聽自此荒服者不至密康公三女奔之母令獻之不聽恭王果滅密芮良夫厲王悅榮夷公諌其專利召穆公諫厲王監謗譬以防川代彘之亂宣王匿其家虎以其子死之仲山甫食采於樊諸諡穆仲睦諌宣王越立魯武公少子不聽侯始不諫料民不聽宣王欲得國子訓諸侯者薦魯孝公虢文公諫宣王不籍千畝史伯幽王時知周將衰教鄭桓公寄孥虢檜知晉楚齊秦將興伯陽父幽王二年三川震知亡不十年內史過惠王十五年神降于莘知虢必亡錫晉惠公不敬知其無後內史興錫晉文公命知其必霸富辰諫襄王以翟伐鄭曰雖閲不敗親諫以翟女為后王黜后翟來寇辰死之勸召王子帶單襄公朝晉聘晉假道於陳陳道茀不治知其必亡謂郤錡語犯郤犫語迂郤至語伐必不免齊國子好盡言亦及為晉周事襄公能敬歸而立是晉悼公單靖公襄公孫享叔向儉而敬單穆公靖公曾孫重諫景王鑄大錢謂輕重相權廢輕作民失其資諫鑄大鍾不過動聲大不出鈞重不過石劉康公聘魯見季文子孟獻子儉曰其長處魯乎叔孫東門侈曰其亡乎侈不恤匱憂必及之成子受脤不敬曰民受天地之中以生所謂命也動作威儀之則以定命也能者養之以致福召桓公郤至自晉告楚捷於周王叔簡公譽諸朝召公謂郤至在七人之下而欲上之不可久也雖王叔未能違難後皆然伶州鳩謂景王大鍾不和又對七律為武王功伐作樂萇宏言蔡凶楚果執蔡靈侯殺之乎晉屠蒯如周請祀山川宏曰客容猛其伐戎果滅陸渾事劉文公與城成周衛彪徯謂其必速及後與晉范氏之亂趙鞅以為討周人殺宏又見左傳宰周孔名孔公葵邱之會賜齊侯胙謂齊不務德止晉獻勿會諸晉公輕行亦將死以上見國語辛有東遷之初過伊川見被髮而祭者曰不及百年此其戎乎以下見左傳宰咺歸魯惠公仲子之賵皆惠公已葬仲子未薨贈之非禮祭伯來聘魯隱非王命周桓公黑肩軍王不禮鄭請善鄭以勸來者將左禦鄭以陳人無鬪心而敗周公閲聘魯辭昌歜與形鹽之饗凡伯戎朝周發幣凡伯弗賔來聘魯遂為戎所伐內史叔服能相人謂公孫敖二子穀也食子難也收子穀豐下有後文十四年星孛北斗曰不出七年宋齊晉之君皆將亂死欺晉既平戎於王劉康公欲伐之叔服曰背盟大國必敗春秋魯臣羽父即公子翬滕先會齊鄭伐宋公滕薛爭長公使之請薛長請隱公殺桓將求太宰公弗許反譛公於桓公而弒之三桓孟孫氏慶父私於哀薑弒閔自立奔莒季友賂得之乃縊穆伯公孫敖慶父子救徐爭請內史叔服相二子莒文公使聘齊子與弟襄仲娶如京師不至復奔私娶之次惠叔為請歸至齊卒文伯孟孫穀奔得立敖長子惠父請立弟叔孟獻子仲孫蔑穀子朾聘周有禮先齊伐我使蔑以賂求平於楚蟄會虛成公薨歸相襄公朝晉稽首謂啓而郊今既耕宜三卜不從尤謂鄭師競已甚三大夫有災盜果殺之宋向戌其室之美云我在晉吾兄為之孔子既禫不樂比御不入謂其加於人一等莊子仲孫速侯蔑次子避勇聞諸齊師畏速塞其海陸伐邾孝伯仲孫羯而立之速庶子命越其兄秩侵齊諸侯城杞僖子仲孫貜之蔑子聘齊楚伐莒答盟邾鄭伯勞不能相及不能郊勞從昭公如楚反自楚乃講學屬其子於孔子使學禮懿子仲孫何忌即學禮孔子者圍城成周盟邾圍鄆侵衛郈討侯犯之叛受墮三都時用公斂處父謀獨不墮郈邾人田皆不知禮之大者武伯泄於戰清襲成相哀公會齊不稽首孟公綽知崔杼有大志必速歸為齊辭師於吳子服惠伯孟椒示蔑子筮勸昭公如楚落章華臺成南蒯以吉答曰易不卜叛謂滕公惰而涕將死杼晉以邾之訴執季平子惠伯辨而歸之晉取崔賂使叔向為請於諸侯公使對曰君舍有罪以紓小國君之惠也南宫敬叔説災懿子弟怒文伯鱉小出桓僖廟衆皆顧府獨命周人御書子服昭伯回卿椒之子侈謂季平子晉六強而驕公室將卑子服景伯何索徑勇有謀王桓僖廟災命出其書季吳百牢辭先未之有而豫之諫康子伐邾曰伐小不仁吳果救邾曰來斯與戰吳不肯為城下之盟吳一夕三徙乃盟黃池之會欲以公見晉爭止之齊吳執之以宗祀脫歸人使子貢説吳舍衛侯使子貢為介嘗戒宰陷於恭閔馬父笑其滿叔孫氏叔牙莊公以愛欲立般叔牙欲立慶父為季友所鴆莊叔得臣如獲長狄僑以名其子宣伯僑如穆子叔孫豹齊兄宣伯僑如謀去季孟不遂奔齊豹亦嘗奔使晉拜嘉子叔聲伯使待晉師于鄭郊非其意衛孫文子君登亦登戒其少安晉作三軍聘晉告齊侵云朝不及夕對范宣子以臧孫辰既沒而立言為不朽桃謂齊慶封車美必以惡終相公如楚祓殯先以茢諌立昭公季氏不從魯始衰是為晉所執守節不以貨免善惡季氏指楹曰雖惡其可去乎季札謂其好而不擇人不得死果因妖夢嬖竪牛以餓死二子孟丙仲壬皆見殺昭子叔婼以仲叔子不竪牛立己為功殺之日食平子不用幣伐鼓知其有異志居武城人掩邾邾訴於晉昭子被執不屈卒以禮歸晉館一日必葺昭晉館吏求犬不與殺與食從公孫于齊祈死武叔州仇毁仲尼初公若不欲其立殺公若墮郈伐邾從齊伐吳艾陵叔仲昭伯帶卒襄公聞楚康欲還諫之季孫氏季友字成季有文在手魯殺其兄慶父叔牙立閔公僖公相敗莒封費季孫行父友之孫諡文子聘晉求遭喪之禮以行告晉以齊難出莒僕敗齊師謂楚非族毋二晉仲僑如讒其君於晉晉執季孫使聲伯請得免以襄立宣公欲殺其子歸父臧宣叔止之為宣公以賂請會于齊遂失濟西田歸父謀去三桓故逐之私室強妾不帛小廉季武子名宿代行父為卿作三軍三分公室室取卞邑哀公懼欲不歸舍中軍四分公取其二乃以辭晉加籩為禮季平子名意如武子孫父悼子叔伐莒用人於社蒯不禮南蒯蒯交惡之於孫欲去季孫南懼不克以費叛如齊用冶區夫之計以柔費人平莒訴於晉執意如因鬪雞郈氏怨之率衆怨伐子孟氏叔孫黨之殺郈氏公遂孫於齊諸侯謀納公季氏賂止之公薨不容歸葬溝之季桓子名斯為陽虎所囚死救火藏象魏受齊女樂孔子行乃囑用之季康子父命用孔子用公之魚言而用冉子敗齊於艾陵益修守備用田賦使冉子吊宋稱彌甥越欲妻公康子懼賂太宰嚭而止季冶初季武子取卞使冶告卞叛冶愧之不仕臧僖伯彄聽諫隱公觀魚不稱疾不從哀伯達桓僖伯子鼎諫公取郜臧孫辰哀伯孫宋弔宋大水欲年飢請以玉告糴于齊譏襄以人從諫焚巫尫諫公卑邾楚使展喜止齊師祀乞楚師伐齊宋不如晉分曹滅六歎臯陶不其言立三仁下展禽祀廢六關居妾織蒲衛三不智作虛器縱逆祀爰勸贖侯於晉不受賂宣叔許止歸父欲去三桓季文子欲治其侈許之備齊定晉衛聘使之位臧武仲紇俟短小多智武敗於狐駘國人始髽城防請冬謂季子銘魯功非禮為季武子舍公鉏而立悼子於是孟孫惡之斬關奔邾以防求為後孟椒以斬關之罪盟之遂奔齊譏齊君似鼠齊不與田東門氏襄仲遂乎秦使善辭命曰不有君子其能國受其玉謂齊侯偷殺惡及視而立宣公殺惠伯埋馬矢哀薑哭殺適立庶公孫歸父襄仲子遂謀去三桓不奔齊書曰還自晉喜也子家羈懿伯謀桓公孫氏之而不泄昭公時知伐季請釋季平子不聽氏從昭公薨于外季欲仕之而逃叔氏叔肹宣公子弟叔聲伯肹子叔宣伯僑如之亂聲伯使孫豹逆晉師戒師至而食聲伯四日不食以待之夢涉洹水而泣瓊三年不敢言言莫卒衆仲知衛州吁將自焚請齊來告戌三國公使衆仲對羽父諡與族公問衆仲展禽栁下惠夏譏臧文仲祀爰居譏父弗忌躋僖公展喜栁下惠弟犒齊師御孫諫莊公刻桷曰儉德之共譏宗婦用幣申繻對桓公名子之問謂名有五信義象假類公與薑氏如齊曰女有家男有室無相瀆桓鄭內蛇外蛇鬪曰妖由人興申豐答季武子大雹曰古者藏氷出氷季子逐昭公齊將納之豐與女賈賂齊而止豐季氏家臣故為季氏申須星孛大辰謂諸侯有大災仲由嘗冠雄雞佩猳豚陵暴孔子後儒服請為弟子定公時為季氏宰謀墮三都小邾射以句繹來奔求一言為信辭曰彼不臣而濟其言是義之也去魯適衛齊使過衛勸與魯平出公立已十二年父蒯瞶不得入孔悝迎立之子路請殺悝不聽欲焚臺見殺結纓端木賜觀邾子執玉髙定公受玉卑孔子謂其不幸言而中辭吳之尋盟説吳太宰使歸衛侯業田常欲為亂先伐魯説之使伐吳以免魯常謂既加魯因説吳救魯而齊伐吳吳防越又説越從吳而待其弊知吳必勝又説晉使防吳吳晉爭強越遂乘間滅吳家纍千金冉求季桓子屬其子康子用孔子康子舍之而以求為宰與齊戰用矛於齊師獲甲盾八十求請從之三季孫弗許公斂處父子路將墮三都叔孫先墮郈公山不狃叔孫輒既敗季氏亦墮費孟孫將墮成處父勸孟孫偽不知而處父據成不墮魯圍之不克事遂寢冶區夫南蒯以費叛平子命見費人必執冶區夫勸恤費人費叛南氏曹劌謂肉食者鄙自請為莊公敗齊于長勺待齊人三鼓乃進望其旗靡而逐之執匕首劫齊桓公還地五十里諫如齊觀社不從陽虎事季平子得囚季桓子之盟定公與三桓武欲去三桓不志者皆因作亂劫公與叔以伐孟氏公斂處父攻敗之奔竊寶玉大弓入歡陽關以叛奔齊奔宋晉趙鞅厚遇之晉師宵迷令右河而南晉欲伐宋為筮易而止公山不狃費宰不得志於費氏因陽虎欲去三桓遂作亂定八年季氏之墮費不狃欲乘之伐三桓遂襲魯敗而奔齊定十年遠後吳欲伐魯曰君子不以所惡廢鄉故由險以為魯齊臣仲孫湫省魯莊薨謂不去慶父魯難未已謂魯秉周禮不可取為戎難致諸侯之戍於周管仲輔公子紏奔魯輕小白先入仲射中其帶鈎鮑叔薦為相設重魚鹽之利連五家之兵制國為二十一鄉附不背曹沫之盟歸亡地於魯諸侯皆信齊而欲救燕使修召公之政復貢周諸侯聞之皆從齊私憾動諸侯因伐楚公以蔡姬故伐蔡仲嫌其鄭伯逃首止之盟因郤鄭太子欲去三族之請鄭請盟珍既會葵丘公意驕欲封禪諫不從説以得逺方怪物乃封禪遂止辭上卿禮仲病薦隰朋不用諌用竪刁易牙開方公反用之死齊亂初仲薦隰朋為行人寧戚為大司徒田成父為大司馬賔胥無大司理東郭牙大諌管子載公初立欲修兵革諌明年繕兵諫果敗於宋三年諫伐魯果敗四年興兵十萬圍魯諫魯請盟諫果劫盟五年諫伐宋以救杞公始用其謀而城緣陵以封杞狄伐邢則城夷儀以封邢狄伐衛則城楚邱以封衛恩結四夷無爭兵矣乃寬關市征輕諸侯幣賞其國以及諸侯之國乃譸隰朋為東國賓胥無為西士遊公子開方於衛遊季友於魯遊蒙孫於楚以親附四方狄不量德而伐齊於是請救於諸侯獨北州之令支不來則稱兵伐之而恩威四達於天下乃教諸侯足民食兵備正君臣父子然後兵車之會六乘車之會三夷狄服中國安蓋自東遷諸侯未有出兵爭之外者至管子始一切反之以弭其爭晏嬰崔杼弒莊公嬰入哭三踴謂景公與慶氏邑辭曰非惡富也恐失富也叔向齊其為陳氏矣之公欲更其宅辭曰於臣侈矣及嬰聘晉公為更既拜而毁之如舊欒髙陳鮑四族之亂召無所往言公疾欲祝嬰曰豈能勝億兆之詛公乃寬政和與同異謂民歸陳氏惟禮可已之薦御為大夫政出越石父為上客未嘗得諷議時有所益晏弱城東陽以備萊鮑叔牙知齊將亂奉小白奔莒而納之薦管仲於魯使相齊鮑莊子牽言叔牙孫慶克淫亂聲孟子讒刖之仲尼謂其智不如葵鮑國牽弟令相齊侯賦蓼蕭叔向晉君拜使晏平仲言晉以臣執君晉歸衛侯以既刖牽召國為鮑氏後初相施孝叔忠稱國莊子聘魯自郊勞至贈賄禮成而加之以敏臧文仲言於僖公曰魯猶有禮君其朝之國武子佐背鞍之敗使賂晉晉不可佐曰請合餘燼城借一戰齊乃盟于袁婁鞍去齊五百里袁婁去齊五十里復疾慶惠淫亂殺克以穀叛齊侯與盟於徐關而之單襄公謂其盡言於亂必不免國勝佐子晉齊欲殺佐先使勝告髙弱之難於使之出外既殺佐使清人殺勝國弱景子奔勝弟魯國書艾陵之戰為吳所獲髙國鞍之敗國桀石投人有乘其車繫桑本以徇齊壘曰欲勇者賈豫餘勇髙厚晉宴諸侯厚歌詩不類盟之厚逃歸圍臧紇于防髙無咎因慶封之父慶克亂于宫聲孟子讒之靈公遂奔莒髙弱無咎子廬父奔莒以叛公孫竈子雅子與子尾皆惠公孫名二惠子尾欲復盧嫳雅謂其髮短而心甚長放之北燕其卒晏子曰又弱一個薑其危哉子旗欒施欲子雅子而子尾死子旗併其室逐其屬陳桓子和之如初強與惠氏髙氏皆嗜酒陳桓子伐之與髙奔魯陳鮑分其室陳敬仲公子完自陳奔齊其辭卿為工正氏飲桓公酒命繼火曰未卜夜初陳懿卜妻敬仲曰八世其昌至田常遂篡齊州綽齊莊稱殖綽郭最之旌綽曰平隂之役臣先二子鳴犁彌伐晉夷儀隨東郭書先登而讓賞會夾谷勸以萊人劫魯侯為孔子所却夙沙衛奄人襄二年齊伐萊衛取其賂馬牛皆百四乃還殖綽郭最言衛奄人殿則辱國衛塞其道使二子為晉獲茲無還會夾谷孔子使揖對齊盟後頓歸汶陽田逄丑父鞍之役代頃公執于晉崔杼亂臣又齊惠公寵之公卒髙國逐之遂奔衛髙靈公使為大夫靈公卒迎立莊公殺厚而併其室嗣娶棠薑而莊公通之弒莊公太史書之杼殺之書而死者二人二子崔強崔成為亂杼怒而出慶封滅崔氏杼至無所歸乃縊慶封亂臣舍始附崔氏蒲終滅蒍氏既當國而付其子慶舍眤盧癸與王何二人殺舍慶封奔吳居朱方又富其楚靈王伐吳遂執封滅族晉臣六卿范氏士蒍獻公時惡桓公族逼盡殺遊氏之族太驕虢使易晉而滅之勸申生為吳伯不為申生夷吾築城謹賦一國三公士會蒍子季諡武子亦稱隨季范城濮之戰幼而與謀侵晉使迎公子雍於秦而晉背之乃奔秦為秦晉晉使魏夀餘履其足於朝而歸之繞朝贈䇿滅先趙孟以諌靈公邲之役令退師不用而敗赤狄將中軍且為太傳而晉盜奔秦燮平王室問殽蒸歸而講禮治晉子將老屬其子曰爾從二三子惟敬杖擊郤曰爾童子而三掩衆於朝晉亡無日矣魴會次子彘恭子悼公使將新軍士燮會子文子諡勝齊後入父武子喜之聘魯請伐郯魯賂之不受與釋楚囚鍾儀厲公多欲三郤驕燮知難作不欲楚戰曰外寧必有內憂士丐請戰執戈逐之既戰立馬前請君戒之歸使祝宗祈死六月死冬果難作士丐燮子弓諡宣子聽不欲與楚爭陳輿聘魯拜彤之賦王叔陳生與伯之訟曰天子所右亦右之吳使將中軍讓於荀偃而佐之故其下皆讓數之不德數戎子駒支駒支善辭遂與之會盡假齊羽毛不歸齊二而伐之殺欒盈之族范鞅丐子獻子諡與欒針馳秦師針死而鞅返欒黶欲殺之遂奔秦也秦伯以其知言請於晉復之宣子之逐欒盈鞅實啓之其入而敗亦鞅之力項莒人之訴諫執魯君魯季孫之出其君也晉公欲納之鞅受賂而亡中行氏荀林父諡桓子行文公作三行以將中行故號中止先蔑之迎公子雍先蔑既逃歸其孥不將伐宋伐齊皆取其賂而還救鄭欲還先縠可而敗請死將許之以士伯諌得復位景公賞滅潞之功亦賞士伯荀庚林父子荀偃庚子伐諡獻子秦還與欒書同弒厲公夢公擊之首墜伐齊將還病頭瘍卒荀吳偃子敗諡穆子大群狄不受鼓人之叛鼓告力竭而後取之不戮一人既獻而反之鼓再叛襲滅之滅陸渾既滅鼓人與之田使其臣夙沙釐相之荀寅吳子吉諡文子氏勸勿伐楚伐與范射伐趙荀躒奉公之范氏中行氏出奔而趙鞅歸晉荀賔有力悼公以為戎右知氏荀罃諡武子之父莊子荀首即荀林父之季弟邲役囚於楚父荀首請於楚而復之立鄭賈人嘗欲出諸楚罃善視之如實出已迎悼公修政施德晉以復霸辭魯哀稽首丐鄭與楚平而伐之及盟不強其必服必荀偃士欲伐逼陽不許二子伐之不克欲退使取之歸再避楚師求己不責人藥不疾鄭之楚而鄭終服不禱而疾自間趙氏趙夙為晉戎御以功封耿生共孟共孟生衰趙衰諡成子於深智逺謀獨歸重耳勸奔狄適齊重耳安齊與舅犯謀適楚受楚客禮為適秦相公子禮以既歸勸入定襄王乃薦郤縠元帥命為卿讓欒枝先軫胥臣作新上軍使將之趙有新軍始此國孟明再敗知秦師又至守原文公反及霸多其謀趙盾衰子雍制事行諸晉為常法秦以靈公少欲迎立公子於秦既而拒之敗於令狐秦取其羇馬槐又敗之於河曲討驟諫而公欲殺之麑觸趙穿弒君不反使之迎立成公鉏初陽處父超易其位而賈季殺之及季在狄使其仇吏駢送帑此隂謀可為趙穿弒君之證趙朔盾子趙屠岸賈治靈公之賊誅趙氏殺趙朔趙同趙括嬰齊皆滅其族韓厥許朔以不絶趙嗣趙武朔子程母成公姊匿公宫遺腹生為賈索之急賴嬰杵臼以免韓厥立之卿相悼公諸薄諸侯之幣而重其禮之取侵邑還齊魯衛侯以是睦晉過鄭享七穆賦詩與絳縣老人田禮虢之盟守信而不戒楚之詐言受鄭止一獻之劉定公河雒思禹武耄而偷善視蔭取舉管庫頌不欒氏邑趙成武子鞅父趙鞅諡簡子父後改名志子相頃公九年受賂享遇之納王帝鑄刑鼎而陽虎來奔簡夢至所七日寤他日有人當道為釋夢范夢射熊與熊者當滅二卿也其後因殺趙午而中行氏伐之鞅奔晉陽既入而滅范中行氏矜夢帝屬一翟犬者子無恤翟婢所出也伐鄭自其功太子王良亦各自矜黃池之會爭長卒長吳聞周舍直諫舍死憂不諤諤韓氏韓厥其先封韓原從封姓禮存趙祀役大敗齊師能執臣於齊君鞍之鄢陵之役逐鄭伯不敢速厚水深卒立趙氏晉遷新田用其謀曰土悼公初立為政救宋韓起厥子魯諡宣子春聘周辭不失情雅許宋弭兵聘觀易象秋聘齊見子子尾之子謂皆非保家惟晏子信之戚受欒氏邑愧違初約以易宋田反孫林父之田於衛反閻田頴俘於周能聘鄭而諸大夫賦之於使趙鞅納王謀國反田而謀已則易田宋求玉於鄭無忌亦厥之子悼公以其鎮靜立為公族大夫魏氏魏犫諡武子為幼有材力平從晉文公亡歸而次功戎右犫不之違命爇僖負羈傷胸尚距踴三百曲踴三百公乃舍之魏絳諡莊子公犫長子名錡求為族而不得邲之役怒楚以敗晉老人結草以亢杜回次子魏顆嫁武子之妾見惟絳賢有功絳事悼公為司馬戮公弟楊干之僕公將殺之及讀其書禮之使佐新軍勸從諸戎之和因及后羿以諫獵侯勸悼公修政息民三駕而諸平九合諸侯勸君思其終魏舒絳之孫去諡獻子車用卒以勝翟人六卿誅祈氏羊舌氏取其邑為十縣舒舉十縣大夫一舉賈辛不以貌以鬷蔑為比獄因饋食取屬饜之諷乃辭梗陽人之賂而平其將城成周未復命而田范獻子去其柏槨令狐文子魏顆之子悼公以顆使佐新軍狐突重耳外祖事唐叔之後在戎狄者為狐氏獻公娶戎突乃晉勸申生逃不聽而杜門及惠公立突見申生於下國云得請於帝以晉與秦突止之乃敗於韓子毛偃從重耳在秦懷公執突使召三子辭曰不敢教之二也遂伏劔狐偃子犯從重耳亡故謂舅犯野人與塊犯曰天賜入公子安於齊犯醉而遣之求犯曰堅植在始喜亂不可里克告公子使及秦納公子及河而辭公子與之誓乃入韓教文公勤王教教文公退舍避楚為賞首伐教公以信以大搜示禮而出穀戍釋宋圍一戰而霸犯之力也及河辭蓋示之以有所不取故能始終狐夜姑偃子軍字季他食邑於賈故曰賈季其賈季將中而趙盾佐之怨陽處父易位殺處父奔狄夜姑左傳作射姑謂趙襄冬日趙盾夏日荀息假道伐虢而滅虞取其璧與馬歸君君立奚齊見殺又立卓子亦見殺遂死之此從於邪不可言忠里克輔申生驪姬使優施間之遂中立而不助申生及奚齊卓子繼立皆殺之惠公立乃殺克慶鄭勸惠公豫秦糴不從陷之敗于韓公歸自韓殺慶鄭而後入瑕吕飴甥惠公執於秦甥教以感動國人之辭會秦伯於王城説之使歸惠公冀芮從夷吾之梁謀使夷吾賂秦求入是為惠公文公入芮燒公宫殺公秦繆公誘殺之郤缺冀芮子文臼季過冀見其夫耕婦饁相敬如賔薦於公曰敬德之聚也用之獲白狄虎勸趙盾歸衛地政救鄭敗楚伐蔡於伐趙盾為京祖叔求成赤狄常翟郤克缺子於諡獻子與以跛為齊婦人所笑敗齊鞍克范叔欒伯三帥讓功郤至有才辨自許太過人不堪之敢與郤犨郤錡稱三郤下嘗與周爭田卒畏義不楚享之金奏作其辭而后就曰此亂之道也贊克楚獻捷於周三逐楚平王見王必下王當曰至為使有禮謀事有智臨戎有文危不叛君死不為怨至之釁以敗楚功多欒書疾之耳初難作郤錡欲攻公至曰君實有臣而殺之待命而已此可見三郤之賢否然同譛殺伯宗先軫以下軍之佐封先縠超將中軍犯城濮之戰子玉請復衛而曹臣亦釋宋子怒其無禮軫曰楚一言而定三國我一言而亡之我則無禮不如私許復曹衛以携之執宛春以怒楚其謀精於子犯故勝楚皆其功嬴襄公之初決䇿敗秦於殽獲其三帥公以文之請釋三帥不顧唾及伐敵因自討而死焉伯宗孫伯紏之子景事君知無不言行兵行師必以義楚伐宋公欲伐楚伯宗諫雖鞭之長不及馬腹師勸滅潞信晉故在其郊殺鄷舒殺戒勿襲衛曰衛惟三郤譛之韓獻子知郤其不免犂妻知其直言必及難得畢陽以芘伯州難作畢陽送州犂於楚事見楚司馬女叔齊魯嘗侵杞悼夫人杞出也使治魯田而不盡歸曰何必瘠魯以肥杞楚求諸侯勸勿與爭陳誼甚偉卒謂魯昭公知儀而非知禮戒范丐爭田既叔向見其子而泣曰昔者其父始之我終之我始之夫子終之祈奚悼公問中軍佐稱解狐其讎也狐卒又問曰臣之子午也可免叔向之囚不見叔向而歸叔向亦不見伯瑕號文伯其將火世為理官因姓士氏對鄭鑄刑書知日食知魯衛惡之日月之會為辰與相中行穆子齊侯投壺士彌牟文伯子之號景伯於納王責宋不輸粟王城成周責宋之不受功陽處父性剛直孟文公使傅太子師報楚請平遂相通追明不及與楚夾汦宣言楚遁中伐楚救江怨易趙盾將軍而賈季之遂見殺苖賁皇楚鬪椒之子楚滅鬪氏遂奔晉明晉相之多敗楚鄢陵之戰秣馬蓐食禱日復戰乃逸楚囚楚聞之夜遁羊舌肸字叔向齊博識多文囚能以禮信為國亦以城烏知師遁被知祈奚必救己不謝楚歸衛侯之勸趙孟讓楚先盟公子木不能對曰無以當不可與爭料楚子圍速斃晉執送女之陳無宇勸歸書介聘於楚楚欲傲以所不知而不能鄭鑄刑責子産開端勸逆楚公子棄疾云無效辟羔知子干不濟而棄疾當有楚國衛人饋之受反錦治兵而斾之諸侯畏之同盟於平邱見使羊舌鮒歸季孫之治罪不私其親并尸叔魚謂遺直初叔向弟叔虎之母美叔向母曰必禍汝及叔虎見殺叔向亦囚將及叔向娶申公巫臣之女母曰甚美必有甚惡大敗已而生羊食我母聞聲曰豺狼之聲也非是莫喪羊舌氏後助祈盈為亂遂滅秦后子千乘楚子五乘貧均祿賀韓起職聰敏悼公使佐元尉介推文公與子犯盟笑之船中之祿不及謂二三子貪天之功從者為龍蛇章書宫門逃綿上山中間文公封為介山按左傳注文公微臣解揚晉使如宋使無降楚楚楚執而厚賂之使反君命卒致君命欲殺之既而歸之師曠因衛靈公無道見出警悼公使受代樂知齊師遁南風不競知楚無功烏鳥聲侍齊景鼓琴之笑叔向言齊相由臣力石不能言謂叔向與子員不心競而力爭知絳縣年史墨龍見于絳因言舜有豢龍氏曰董父夏有豢龍氏曰劉纍少皥有四叔重為勾芒該為蓐收修及熙為元冥凡三祀二顓頊之子黎為祝融共工之子勾龍為后土凡祀此為五祀后土為社田正為稷稷夏以上烈山氏之子柱為稷氏商以後周棄為趙鞅荀寅鑄刑鼎墨曰范中行氏其亡乎趙孟與焉有日食知吳入郢終亦不克知不及四十年越吳昭公之出謂魯失民之久史蘇諫獻公伐驪戎既伐克之曰晉以男戎勝戎戎以女戎勝晉寺人披為獻公伐重耳芮重耳入告以吕甥郤之變欒賔靖侯庶孫公成師初封曲沃號桓欒賔為相欒共子名成初晉武公伐翼殺哀侯共子戰死之欒枝成之子趙襄讓之為竭曰貞慎欒書鄢之役曰不可當吾世而失諸侯欲待楚師退擊之郤至即擊之遂惡郤至於厲公而殺三郤又弒厲公使知武子彘恭子迎立悼公欒黶書之子果敢為公族大夫欒糾和于政為悼公戎御欒盈黶之子好施多士士丐畏之使城著而逐之奔楚居三年晝入為盜於絳不克遂滅欒氏吕甥史記作吕省於與郤芮同事夷吾館夷吾立為惠公惠公辱秦秦以甥之言改惠公文公之入謀作亂秦誘而殺之又見前瑕吕飴甥吕錡邲之役佐知武子獲楚公子穀臣與連尹襄老以免子羽鄢之役射共王中目楚使養由基射死吕相錡之子諡宣子絶秦悼公使佐下軍臼季胥臣多晉文公學讀書於季三日曰行未能咫聞則矣文公謀使陽處父傅太子薦郤缺之敬丕鄭荀息欲輔奚齊鄭曰事君從其義不阿其惑除非里克之中立為惠公如秦謝緩賂且謀吕甥郤芮遂為郤芮所殺丕豹鄭之子與奔秦勸秦多晉粟舟之僑知虢將亡以族適晉顛城濮之役與顛頡違命爇僖負羈文公殺頡以之僑為戎右及濟河又先歸遂斬以徇張老趙文子冠而謁諸大夫以諸大夫之語告張老老謂三郤亡人之言而知武子荀罃勉以成宣之忠為善文悼公使為司馬謁又立為卿以讓魏絳見趙子為室礱斫不而歸責其忘義張君吕老之子軍為晉悼公中司馬箕鄭文公問民飢對以信少周室為車右聞牛談有力與戲不勝致右焉簡子使為宰宋臣公子目夷字子曽夷不可襄公庶兄司公為太子時讓目公立用為馬言用鄫子之非盡諌圍曹之諫求諸侯於楚楚未濟勸擊公皆不用故敗友目夷子為左師向戍號合左師子諸侯滅逼陽以豫之辭而歸諸公尤孟獻之美其室惡太子座誤救者使遲而座自殺子痤死而佐立成受其母之玉善趙文子及令尹木遂謀弭兵求賞而子罕責之知楚靈王之後十年而後棄向寧戌之子樂喜字子罕火子蕩專戮而逐之子蕩射其門善之如初政鄭師慧譏朝無人而歸之辭獻玉曰我以不貪為寶曰築室妨收諫不聽抶謳者之怨責向戍弭兵驕則生亂誰能去兵戍乃辭邑不陽門之介夫死而哭之晉覘之敢伐守法而無怨者華元羊不及其御羊斟為其敗於鄭道謳者譏其棄甲曰口衆我寡以楚使不假而殺之為楚所圍夜入楚師求成肥文公厚葬不能救合晉楚之成蕩澤殺公子遂逐蕩氏而用宋戍等靖國人華閲元之子為右師以閔之弟弱閔之子國人逐偰狗懼而奔陳華費遂為大司馬僚生華貙華多僚華登皆為亂於費遂欲逐貙多反劫費遂以叛華登又求師吳以助之齊有厨人濮者戍於宋謀先伐之遂敗吳師又以裳褁首而走曰得華登矣遂敗華氏楚救之華氏奔楚公孫固勸襄公禮重耳衛臣石碏州吁有寵碏諫莊公陳州吁弒相公如陳碏之子厚從之碏使告於而執之衛殺州吁碏亦使人殺厚大義滅親石稷碏四世孫曰禦齊欲還戒孫良夫衆懼盡石祈子徑正父勸衛歸宋之賊猛獲曰天下之惡一也浴初其駘仲卒無適子有庶子六人為後曰沭衣冠則兆獨祈子不可曰孰有執親喪而沐浴佩玉者乎祈子兆孔達伐晉而敗衛執達以悅之晉以為良歸之又叛晉而晉責之乃自縊曰利社稷然實自取孔悝孔文子子莊蒯瞶甥之出輒立蒯瞶是為公公德銘於鼎孫良夫違衆伐齊而敗仲叔于奚救其巫再乞師于晉敗齊孫林父良夫子定亂臣公惡之奔晉叛晉復之晉逐獻公立殤公而寧喜伐之遂以戚歸晉私林父反為以而執君北宫他諡文子禮括之子公相公過鄭謂鄭有知楚子圍異志寧速莊子禮立衛文公聽伐邢興師而雨衛不重耳諫不後果伐衛寧俞武子襄莊子子而國人欲説晉出成公俞從之居牛盟入以安國人前驅誤殺居攝之叔武諸侯又執公以歸于周失國皆俞之力遷帝邱不祀相公再出而不聘魯不受湛露彤弓之賦寧殖俞之孫相之子之與孫林父謀出獻公既而悔屬其子謀復寧喜以父命謀復獻公遂伐林父弒殤公而既納獻公而專為免余所殺免余辭邑辭卿薦太叔儀祝他有口才辨召陵之會將長蔡他之乃長衛侯蘧伯玉瑗潔以世亂不危言髙論休然有容而內實髙孫林父出獻公及公返皆從近關入而不預鄭臣七穆公子去疾字子良其後因號良氏良以國讓襄公公欲去群穆而舍子良子不可楚伐鄭曰與來者鄭鄭敗楚獨憂之鄭伯肉袒迎楚時以子良質楚以其有禮召伐許相成公如晉良子展惡之廢子而立子太叔公孫輒子耳盟子良之子空侵蔡戲為司盜殺之良霄伯有襄子耳之子于為行人見執於楚奔會宋草九年盟伯有氏三十年許見殺良止伯有之子子産立之公子喜子罕宋氏又略晉侵宵軍伐許年侵楚襄二當國公孫舍之子展從子罕之子專盟戲因侵宋去兩與晉楚而堅於晉子孔權欲楚以諸大夫子展與子西殺子孔其襄十九年當國怨陳與子産伐陳入公宫立子産為卿罕虎子皮子展之子襄初子展如晉叔向曰後亡者也儉而一子皮二十九年立外寬內明好善而能擇晏子曰能用善人民之主也以子展之命餼國人粟户一鍾故得民授子産政皆聽之而行有欲害子産者常抑之罕嬰齊子十六子皮之子昭年餞韓起罕達子姚又曰武子賸子罌之子伐宋宋戰鐵哀十六年取師外有公孫鉏亦子罕之子哀三十一年為馬師罕朔鉏之子昭十年奔晉罕魋罕虎之子昭七年為罕朔所殺公子騑子駟十駟氏質以成公之德楚不敢從晉嘗以成年為於晉以僖公殺諫者而賊之改立簡公不與楚平與侵晉以晉伐之與盟趍進盟曰鄭惟有禮強可庇民者是從亦如之為楚伐之又與楚平僖殺群公子多襄十年當相盜所殺春秋書公卒或謂殺衆因僖公之卒於外而誣其賊殺耳公孫夏子西盜子駟之子如襄八年攻十五年晉十七年聽政陳二十五年伐駟帶子上伯有子西之子外攻盟閨門之駟偃子遊韓子上之子鄭享起賦風雨駟乞子瑕年子遊叔父昭十九繼子遊立駟歂子然叔子瑕之子鄧定八年繼子太為政殺析用竹刑駟宏子般之子子然戰鐡曹救外有公孫黑子晳君駟之族伐伯有爭室矯位子産討殺之印子晢之子駟絲子遊之子昭十九年以弱廢不立公子發子國聘魯國氏勝成五年見執於是為司馬侵蔡之子産憂子國怒盜殺之公孫僑子産字曰子美令子國之子自襄八年見傳多記善辭慈愛而徑正盜殺子國僑詰盜盡死書子孔為載書欲誅衆僑焚之曰衆怒難犯寓范宣子使輕諸侯之幣獻陳捷於晉晉不能詰陳問政然明對以視民如子而政如農功賞入之功辭邑楚伐鄭使逞歸邑相公如晉舍而不壇三伯有死禭之石曰無欲實難伯石郤遂惡之賂伯為政一年輿人誦之曰孰殺子産吾其豫之三年又誦之曰子産而死誰其嗣之壞晉館垣不毁鄉校罪子皮欲使尹何為邑譬以製錦三鄭人相驚為伯有置後而定數公孫黑戒子皮弔晉喪不用幣韓除葬道不毁室駘之問對宣子黃熊之問對叔向實沈臺與晉爭承止以男爵給貢鬪韓宣子求玉環不豫乎不用玉鄭亦不再火龍不祭子産為鄭凛不以禮法假人臨死戒子太叔為政其次莫如猛向惟作邱甲渾罕譏之國人怨以蠆尾鑄刑書叔譏之又魯季友越國送陳大夫原仲葬春秋譏之簡公乃以人君弔趙武亦子産行之孔子稱遺愛國參子思周子産之子城救魯公子偃子遊晉遊氏成相鄭伯如請于晉公孫蠆子蟜戲子遊之子盟為司馬伐秦遊昄子明二子蟜之子襄草年見殺遊吉子太叔子明之弟言晉侯城杞之非勸子産治遊楚之罪盜送晉少薑之葬歎非禮代子産為政寬而多止之以猛對趙簡子問禮送晉葬晉不能詰遊速太叔子滅許會安甫遊良子明之子子展廢之公孫野子南放子太叔之叔於吳公子子豐見襄七年公孫段伯石子豐子賜州田豐施子旗伯石子歸州田公子子印子班殺之公孫黑肱子張代子良于楚伐齊印假子石會趙孟如周印癸子栁賦籜兮穆公十一年子然事子孔子孔三族亡子羽不為卿燭之武縋城夜出説秦釋兵叔詹勸禮重耳不從勸殺之晉伐鄭詹請行將烹以號免祭仲亂臣名足勸莊公害弟取周禾麥射王中肩出忽立突忽入髙渠儀殺之又立子儀吳臣季札吳至其父夀夢始大以夀夢以其賢欲立之不可兄諸樊餘祭餘昧次相傳欲使之立又不可兄餘昧之子王僚嗣位諸樊之子光曰吾父所以弟相傳者欲致位季札也季子不受即吾當立乃弒僚吳之亂始此鄭觀周樂適齊説晏平仲適説子産適晉説三家挂劔徐君之冡木返救陳與楚子期相平而嬴博之葬合禮申公巫臣楚人強説夀夢教戰陳使楚罷於奔命功吳之於中國自巫臣始夀夢思其以其子孤庸為相又見楚臣伍員字子胥又奔鄭父兄見殺於楚建謀亂鄭見殺奔宋尋太子建辭員奔吳漁父劎事疾而乞食為事公子光子薦專諸於光成其弒光既立闔閭乃用胥伐楚五戰及郢越鞭平王尸差申包胥乞秦師救楚諫闔閭敗於而死夫立而報越赦勾踐員不聽太宰嚭受越賂而讒員革賜劒死令抉吾眼縣吳東門王怒盛以鴟夷浮之江吳人祠之胥山孫武齊人教著書不仕卒吳王闔閭見其書而悅之宫人戰以為將破楚入郢掩餘燭庸皆王僚弟代楚闔閭弒僚窮之奔楚夫槩王闔閭弟自立氏奔楚為堂溪越臣范蠡師計然用勾踐初不用其謀輕伐吳而敗棲會稽乃其謀行成於吳讓大夫種為政而已治兵齊七年而勾踐欲報吳不可功二十年而聞吳勝誅伍子胥乃伐吳而沼成浮海自號鴟夷子家置産數千萬皆齊用為相下復去之陶致富稱陶朱公三徙成名於天中子犯楚法欲遣少子救之長子請行遂敗事大夫種行成治國不去見殺楚臣公子側字子反不邲之戰敗晉不鄭取許田曲在鄭聽其訟能決子囊肯背晉盟子反違之致兵又以醉敗共王中目子玉勸殺重耳治兵城濮晉退三舍子玉不出遂敗鬬伯比羸師誘隨隨用季梁而不伐伐隨寵少師再伐之既獲少師乃盟莫敖羅舉趾髙知必敗鬭穀於莬伯比子棄若敖孫乳是為令尹子文生而夢中虎之楚謂乳穀謂虎於莬伐以楚多故毁家紓國使滅絃必伐隨賞得臣陳之功族于法者廷理刑之令尹四十年家無一月積必王為設脯糗而逃之知其弟子良之子越椒滅族曰若敖氏之鬼不其餒而針尹克黃子文之子於越椒之亂使齊聞難歸而自拘司敗王曰子文無後何以勸善使復其所越椒子文兄子子文欲殺之果滅族蒍賈字伯嬴以幼而知子玉必敗獨不賀往楚飢庸率群蠻叛謀徙阪髙賈獨曰我能寇亦能往決䇿伐庸滅之越救鄭蒍與子越譛殺子楊子又殺賈孫叔敖蒍賈子賈見殺隱民間犯令尹虞邱子薦之為相虞邱子之族法孫叔敖執而殺之虞邱子喜之言請復如故王以幣輕欲以小為大以市令王欲髙車請使閭里髙其梱而車自髙皆不教而民從激父老鹿衣白冠者來弔拜受其言身益恭儉湘水為雲夢大澤使民漁獵地戒其子受不利之十世不絶薳子馮孫叔敖從子氷床鮮食以辭令尹既相楚懲子南寵觀起之患去其所寵者八人叛皆用申叔豫之謀以信服舒鳩終其世不薳掩子馮子曰為司馬公子圍申無宇善人國之主也薳啓疆嬖於王子圍折楚子欲辱晉之問章華之臺得魯侯落敗鵲岸申叔時事莊王君臣皆賢楚是以強計以蹊田之喻請復封陳以築室反耕之服宋子反不用其言背晉而敗曰教子亹以傳太子之説子申叔婼沈尹戍莊王曽孫已言城州來必敗師言囊瓦城郢之非曰守小矣言以舟略吳必亡邑其驚囊瓦信費無極之讒遂殺無極於囊瓦不用言而惑史皇遂敗於吳敗吳師雍筮而傷吳勾卑褁其首沈諸梁戍之子孔諡子髙西即葉公也戒事必問子子召白公勝之不從子西死猶慙之何不葉公聞勝之亂入而不胄或曰望君如慈父若胄乃胄或曰望君如望嵗幾見君面乃免胄與國人攻白公白公奔縊國既安乃以子西之子寧為令尹而老於葉魯陽文子子期之子封之梁辭曰懼子孫恃險而乏祀公孫歸生號聲子與字子家聲子伍舉友其父子朝與伍參友舉奔鄭聲子如晉班荆而別楚子木問晉大夫與楚孰賢聲子因舉人之奔晉者忠子木而選舉伍舉其父參欲伐晉孫叔敖曰參之肉足食乎師敗參死求諸侯於晉問會禮於向戍子産諫楚子示諸侯以侈釋諫戮慶封曰無瑕者可以戮人賴子面縳伍奢舉子之傅太子建王少傅費無極讒太子奢為明無極使執奢招其二子尚員併殺之吳奢知尚來員必亡初舉奔晉蔡聲伍貟奔事見吳臣類子請子木復之申無宇忠正多逺慮人靈王立而求諸侯無宇曰禍之首也閽亡入章華宫執之王曰取而臣以往疾楚滅蔡用隱太子無宇曰不祥子楚使公子棄為蔡公無宇曰五大不在邊由亥以二女殉靈王觀射父昭王問重黎對民神不雜王孫圉誇晉為寶善訓辭然丹子革靈王欲求周鼎對曰豫哉問諸侯畏我乎曰畏哉誦祈招之詩而王懼立平王息民五年而後用師左史倚相舉衛武公以徹子亹止子期以妾為妻子囊公子貞之諡乃莊王子秦諫共王伐晉將師為秦援晉班師還與伐宋共王自諡靈厲子囊諡之以共伐將死遺戒城郢六知晉不可敵然猶圍陳宋執鄭良霄師凡出囊瓦子囊孫費字子常讒欲立子西子西不可乃立昭王信無極之殺郤宛又滅無極之族以説國人吳求蔡侯佩求唐侯馬皆止之三年伍員伯嚭在遂與唐蔡同伐楚將戰又用史皇之言欲專功而敗伐吳謂楚瓦不仁其臣莫有固志先之五戰及郢奔鄭子西公子申之諡怒平王庶兄止平王薨令尹子常欲立之子西其不忠乃楚欲害吳子西諫不聽楚始病獲楚敗及郢子西收散卒以敗吳及秦救至楚子歸郢近郢于鄀改紀其政以定楚國王吳克越楚皆懼子西曰先自敗安能敗我昭薨立惠王惠王九年伐吳及桐汭召太子建之子勝封為白公西白公作亂殺子西葉公定變使子子寧為令尹屈建字子木蒍父屈到嗜芰不以薦楚康王時滅舒鳩用掩修政既成而用之是以興𠂻甲欲害政而不能以與叔向語無以對曰楚無當之申公巫臣屈巫也如諡子靈諫圍蕭雪甚勸莊王巡軍三軍挾纊莊王及子反勿納夏姬乃自挾之而奔晉之楚子反盡殺其族巫臣乃説吳王夀夢教罷楚餘見吳臣由于柏舉之役代昭王受戈擊於雲中既斬以王奔隨稱人各有能不能伯州犂晉伯宗子而右公子圍州犂立囚上下其手圍與穿封戍爭功非子木𠂻甲圍聘鄭而鄭惡之州犂為之對又垂槖而入州圍將為逆又教圍先除公子黑肱圍立而殺犂吳太宰嚭即其孫鬪且子嘗問畜具且知其必亡秦臣百里傒晉獻公滅虞而得之羖媵於秦楚執之秦穆以五皮贖之亡秦走宛薦蹇叔二老同諫襲鄭傒之薦曰臣欲事齊無知欲事諫周王子頽欲事虞君蹇叔止臣孟明視傒之子於襲鄭敗于殽拘於晉文嬴請之歸又敗彭衙濟清焚舟乃霸其視孟明違父誤君再敗秦師焚舟之役晉善謀而不與戰爾孟明何功秦之霸繆公賢也晉亂告秦孟明薦公孫縶弔重耳覘可否縶之反命請立不仁之夷吾則孟明所薦非人李斯書言繆公西取由余東得百里奚迎蹇叔於宋求丕豹公孫支於晉并國二十遂霸西戎止言五子不及孟明也公孫枝勸秦與晉粟惠勸繆公勿殺晉丕豹見晉戰國諸臣儒生荀卿趙人年五十始遊學於齊之楚春申君以為蘭陵令三為祭酒刑逃讒當時士趍名者事變詐言道德者事空虛宗老氏言王道者惟孟荀荀雖學識不及孟之醇亦守道不變天下士魯仲連齊人竒偉俶儻好持髙節不肯仕官任職方秦白起破趙魏不敢救使新垣衍使趙帝秦仲連在趙爭之曰秦棄禮義權使其士虜使其民彼即為帝連有蹈東海而死耳且秦而帝且變易諸侯大臣魏王安得晏然將軍又何以得故寵衍起拜稱先生天下士秦將聞之却五十里平原君以千金為夀連笑曰即有取是商賈之事也去終身不復見田單攻聊城幾嵗餘士卒多死而城不下連為書射城中略曰不如全車甲歸燕不亦捐燕歸齊裂地定封時燕將已有隙於燕泣三日自殺田單遂屠聊城歸而欲爵連連隱海上曰吾寧貧賤輕世肆志焉愚按天下士之稱雖出新垣衍而超然戰國遊士之上真可言天下士第射城事恐未然四公子齊孟嘗君田文一父嬰齊威王子與田忌再伐魏相齊十年封薛文以五月五日生嬰欲不舉母私舉之長而見之以辨得親首譏父嬰不好客無益於齊致食客數千人犀請魏以文相魏秦説趙燕救魏鳴嬰卒文代立於薛人齊使文入以客狗盜雞得脫歸過趙趙衆觀笑其眇小文擊殺數百人求或告文反俄甲甲却湣王王疑文遂謝病歸薛秦伐齊再相魏為魏出齊文魏又為魏合秦趙燕歸伐齊湣王死焉文卒齊共滅薛文絶按田文殘其國滅其家又壞薛之俗暴桀者數萬國之亂臣家之敗子世猶以其養客而譽之誤矣王荆公譏其養雞鳴狗盜此客所以不至愚謂文特逋逃藪耳戰國惡習可概見亦何客之可至客有馮歡者為孟嘗君焚劵棄責孟嘗廢又為説秦迎之以説齊復其位趙平原君武靈王子名勝客數千人合斬笑躄者美人秦圍邯鄲急用毛遂楚之盟又用李同計均勞散財兼請救於魏公子無忌遂復存趙然秦之圍實始於勝受上黨致長平之敗死者四十五萬人進圍邯鄲幾至亡國功不贖過拒燕不用亷頗趙奢而借田單亦非楚春申君黃歇楚人遊學博聞秦與楚太子質於秦使太子逃歸而身當身亦以善説歸楚為太子立是為考烈王歇為相陵歇城吳故墟自都邑滅魯以荀卿為蘭令客三千餘人有客躡珠履見趙使王以李園女弟為妾身進楚王生楚幽李園殺歇滅口魏信陵君公子無忌魏昭王子食客三千人諸侯以其賢不敢加兵知舉烽為趙田獵自是魏王畏之不任以政兵以救趙急因留趙用侯生朱亥殺晉鄙奪魏又用毛公薛公計歸救魏率五國大破秦兵威振天下史秦救晉鄙客毁無忌因謝病飲酒卒蘇子古曰無忌之名發於侯生而全於毛薛侯生之竒毛薛之正廢一不可而正之所全者多矣愚按四公子惟無忌為豪傑士亦有益當世餘非其比云縱橫六國相蘇秦雒人秦出遊困歸得周書隂符學揣摩侯説周顯王惠王趙肅侯皆不用説燕文與趙親因以説趙韓魏齊侯身為從長并相六國儀方説燕趙而秦犀首攻魏恐秦兵至趙激怒張入秦雖救一時終有遺患蘇趙肅侯十六年縱約成十八年齊魏攻趙趙讓秦蘇秦去趙從約皆解其蘇秦至齊俯賀仰吊齊還燕十城燕復官自燕走齊欲弊齊為爭寵者所殺代秦之弟秦死代説燕謀齊燕以子質齊弟厲因以見齊亂燕相子之與代為婚代乃説燕讓國子之燕歸齊燕怨之過魏見執齊為出之交在宋齊伐宋又説燕謀齊因與昭王謀齊趙之入齊謬為齊將將以拒燕再敗齊師及樂毅以五國兵破齊湣王出走皆墮伐許諫燕王入秦復重於燕燕使約諸侯從親如蘇秦時厲亦秦之弟因燕質子見齊留為齊臣代説燕讓國燕亂而代厲皆歸齊初蘇秦從約雖解而諸侯時宗其䇿秦人病之兵不敢大出者十五年及代厲相繼名顯諸侯秦相張儀與蘇秦俱學鬼谷秦楚相亡璧笞儀數百妻誚之口舌尚在蘇激使入秦與司馬錯爭代不便而錯之説勝説勸秦助魏拒楚得魏西河之外使公子質魏魏獻上郡少梁取陜相魏四嵗使魏事秦不從隂使秦伐之魏乃倍從約事秦為秦相楚以離齊楚之交許楚六百里而背之間楚欲得儀儀請行以鄭袖免齊相魏相楚既隂其從約聞蘇秦死乃説楚韓趙為橫盡破從約秦惠王卒武王立脫身相魏卒陳軫與張儀俱事秦為儀所讒而奔楚乘使秦過梁教犀首兼相燕趙魏復歸秦勸韓魏之弊聽秦伐魏軫勸齊合三晉又初在楚諫勿張儀絶齊儀既負楚諫楚勿伐秦公孫衍號犀首魏人儀為秦説齊魏攻趙首破蘇秦從約與張不善而去秦與田需不善而去魏説説魏相田嬰而身相韓入張儀相魏衍不便之韓公叔得相魏張儀魏而衍歸秦秦欲相之為甘茂所間復之魏趙臣亷頗大破齊取晉陽以勇氣聞諸侯又攻齊幾拔之攻魏拔防陵安陽大破燕軍於鄗趙孝成王卒悼襄王使樂乘代將頗奔魏自是趙數困思復得頗頗飯斗米肉十斤被甲上馬示可用為郭開所間不召兩初藺相如暴貴位尊頗欲辱之相如謂虎不私鬪頗肉袒謝稱亷藺藺相如全璧歸趙秦王擊築會澠池秦請趙王鼓瑟相如請信威敵國亷頗欲辱之相如先國家之急引車避匿亷頗謝之遂定為刎頸交趙奢為田部吏殺平原君家用事者九人奢秦代韓君於閼與亷頗樂乘皆謂道狹難救曰猶兩鼠鬪冗中將勇者勝乃堅壁留二十八日乃卷甲趍之用許歷計先據北山大破秦軍子括徒能讀父書趙聽秦之間用代亷頗大敗長平李牧常居代鴈門避胸奴謹烽火牧保不戰者數嵗趙怒使人代之每戰多亡失牧再至守故約復數嵗邊士皆願一戰於是大破胸奴十餘萬騎滅襜襤破東胡滅林胡後十餘嵗胸奴不敢近亷頗既亡復用牧大破燕大破秦軍秦賂郭開殺牧牧死趙滅虞卿躡蹻簷簦説趙為上卿敗長平之戰卿請出重寶以附楚魏趙不用遂趙郝樓緩説趙割六城事秦卿力辨之而樓緩遁與勸趙許魏合從棄相印救魏齊布衣之交相之魏依信陵君士困於大梁不得志著虞氏春秋落愚按戰國之多詭詐反覆惟趙諸臣磊磊落有烈丈夫氣諸臣之用不用趙之存亡係焉虞卿雖遊士亦忠於一君初趙有大戊午相成侯伐衛取七十三邑諫肅侯出遊曰耕事方急於趙豹諌受上黨左師觸龍勸太后質子皆忠趙者又有肥義諫胡服不從公子成亦諌胡服後與李兊平公子章之亂并圍主父共立惠文王而專其政又後至嬖臣郭開受秦間金棄亷頗殺李收而趙亡魏臣卜子夏田子方假干木文侯受業三人為師過其閭必式太子擊遇田子方下車而趍子方坐如故趙倉唐傳太子擊於中山倉唐以晨鳬放犬上謁擊得復召李克文侯問相出而翟璜詢之克曰魏成璜本薦克者辨之克曰子言克豈比周求為大官哉翟璜進西河守進西門豹樂羊子克屈侯鮒五人李克言其安得與魏成比再拜願卒為弟子魏成薦卜子夏田子方假干木相食祿千鍾十九在外十一在內文侯西門豹為鄴令鄴俗苦為河伯娶婦豹呼所嫁河伯者視之曰是女子不好煩大巫嫗為入報河伯即投之河有頃曰何久也復以弟子一人投之河曰何久也復投一人凡三投弟子豹曰巫嫗弟不能白事煩三老入白之復投三老河中欲復投廷椽與豪長者衆叩頭流血吏民大驚患遂絶鑿十二渠引河灌田敢傳曰西門豹治鄴民不欺李悝作盡地力之教及平糴之法雖遇水旱糴不貴民不散魏以富強吳起衛人殺謗己者三十餘人而去衛嘗師曽子母死不歸曽子絶之殺妻求為魯將以攻齊魯君疑之在事魏文侯拔秦五城守吮疽甚對武侯在德不險廣平得士心西河有聲與田文論功自知不逮北公叔忌之如楚為相養戰士破縱橫南平百越并陳蔡却三晉西伐秦害楚之貴戚之射死之齊臣司馬穰苴田宗苖裔使晏嬰薦其文能附衆武能威敵景公捍燕晉之師監軍莊賈後期斬以徇使者持節來救賈馳軍中又斬其僕以徇燕晉聞之皆去齊髙國害之發疾死田乞田豹作亂滅髙國後田和遂奪齊為田齊至威王追論作司馬兵法史記載如此戰國䇿稱司馬穰苴執政者也湣王殺之故大臣不附嘗古史據左傳景公時無燕晉伐齊之事意穰苴為湣王却燕晉而戰國雜説妄言景公時為刪穰苴傳田忌為齊救韓伐魏大敗之桂陵初騶忌惡田忌諫勿救韓公孫閲教騶忌薦之欲其無功及功成公孫閲又教騶忌詐為田忌求卜舉大事田忌遂奔王知田忌為騶忌所買召之復其位又大敗魏於馬陵殺龎涓虜太子申時以孫臏為師田單燕破齊單教宗人車軸為鐵籠得免師即墨人謂其智立為將軍拒燕單偽為神誤燕人掘齊墓以怒齊人又為約降而夜為火牛衝燕軍大破盡復齊七十餘城解裘衣涉者飲謗己者貂勃酒齊有幸臣九人欲害單賴貂勃免攻翟不下受教魯連厲氣乃下為趙將王孫賈年十五以母命呼市殺湣王之淖齒王蠋屢諫湣王不聽退而耕縊燕之破齊欲封之萬家辭曰忠臣不事二君乃死齊之士大夫聞而感之求法章立之是為襄王初齊威自誇檀子守南城盼子守髙唐黔夫守徐州種首備盜賊四臣者將照千里楚臣申包胥伍員奔吳胥與班荆曰必復楚楚員伐楚入郢胥乞秦師飲勺不入口復不受賞慎子項襄王自質歸立嘗許東地伍百里慎子請群臣謀子良請與之昭常請守之景鯉請乞秦師慎子兼用之子良獻地昭常守地齊不得而爭則景鯉所請之秦師至矣不戰而東地全莊辛秦之未舉郢也辛告頃襄王曰王左州侯右夏侯從鄢陵君夀陵君淫侈郢必危臣請避趙五月而秦舉郢王召辛於趙辛曰見兔而顧犬未為晚亡羊而補牢未為遲湯武以百里昌桀紂以天下亡楚猶數千里豈特百里哉王方憂懼乃封辛陽陵侯明年復收東地得兵十餘萬西收秦所拔我江旁十五邑以距秦又五年助三晉伐燕復與秦平黃歇侍太子為質蓋楚再振者十五年楚宗臣有景翠救宜陽景鯉求秦師昭陽攻齊昭睢勸勿入秦聞者惟屈原屈原楚同姓名平為懷王左徒博聞強志明於治亂入圖國事出應諸侯王甚任之上官大夫忌之王使原造憲令欲奪之不與因譛之王疏平諫張儀詐楚原請殺之不聽秦昭王誘招懷王原勿往又不聽懷王稚子蘭勸王入秦不返原憂思作離騷子蘭上官大夫遂短原於頃襄王王怒而遷之原憔悴江濱作漁父問作懷沙賦投汨羅死楚日削數十年秦滅之楚有宋玉唐勒景差之徒皆祖原賦然莫直諌韓臣申不害學本刑名而飾以黃老士嘗相韓昭侯十五年國治兵強雖非處而與老莊同傳韓非韓諸公子俱事荀卿喜刑名法術學本老子林與李斯作孤憤五蠧內外儲説説難為韓使秦上書李斯害而殺之燕將樂毅魏樂羊後人適魏羊封中山之靈夀中山入趙為趙使燕為燕并護趙楚魏韓之兵伐齊報寃下七十餘城皆郡縣之盡取齊寶財物祭器輸之燕唯莒即墨未服燕昭死惠王聽齊反間使騎劫代將毅歸趙七十城皆復為齊王遺毅書毅報書不歸燕燕用其子樂間惠樂間居燕三十年燕伐趙大敗間嘗諫遂奔趙趙樂乘者間之宗在燕為趙所擒二人卒留趙為圍燕趙使乘代亷頗而趙滅漢封毅之孫樂叔樂有瑕公臣公皆好黃老秦臣相商鞅衛公族公事魏公叔痤痤薦之梁惠王不用入秦説孝以帝王道不入説以伯變法先徙木示信伐太子犯法刑其師傅取行之十年道不拾遺魏誘殺魏公子卭西河之外相秦十年宗室貴戚多怨者趙良勸以少安之䇿不從五月而孝公卒太子立車裂之初秦自穆公用由余伐戎始伯至孝公用鞅始并諸侯舉地千里至惠文殺鞅相張儀散六國之從使皆事秦武王逐儀而相樗里子甘茂樗里子秦惠文弟公孫疾走號智囊立伐晉趙楚有功張儀讒之出武王張儀走樗里子為右相所説而去昭襄立樗里子益重知戍蒲為胡衍合魏攻楚葬渭南後有天子宫夾我及漢興長樂在其東未央在西甘茂惠文君時張儀欲以漢中與楚茂諫止之盟蜀侯輝相莊反茂定蜀歸為左相與武王於息壤拔韓宜陽向勸昭襄王伐楚救韓蘇勸以武遂之地歸韓為夀公孫奭所讒奔齊代説齊使為上卿雎為齊使楚歸秦求之為范所沮不得秦甘羅茂之孫吕不韋使張卿相燕不肯行羅年十二能使之行又為先報趙使割五城羅遂為上卿茂後樓緩相樓緩趙人於相秦昭襄王齊韓魏求出楚懷王緩請問計公子池割地和韓魏以免嘗自秦如趙説趙割地不勝虞卿之辨而亡趙不利緩使仇液説秦相魏冉而緩免魏冉稱穰侯冉為政秦昭王母舅白立昭王太后自治而凡五相秦舉起大破韓魏又拔楚之郢以冉三攻魏每大勝客卿竈説冉使伐齊取剛夀自益所封之陶邑於是魏人范雎乘之攘其位門冉富於王室出車千乘餘范雎字叔事魏之須賈使齊齊賜金須疑之歸告魏齊魏齊鞭之折脅溺之厠中徉死得出魏人鄭安平匿之因秦王稽入秦后改姓名張祿至秦上昭王書見之離宫離間太穰侯廢太后逐穰侯及王弟髙陵君華陽君涇陽君於關外衣雎遂為相封應號應侯須賈入秦雎徉以布見須賜之綈𫀆雎以此免死遂伐魏取魏齊頭其殺白起用鄭安平王稽敗事而蔡澤又乘間攘位雎不過取富貴快恩仇益於秦惟逺交近攻一語蔡澤干遊甚衆不遇秦聞范雎任鄭安平王稽首負罪雎內慙因入説雎以功成者退而攘其位事相數月或惡之歸相印號綱成君居秦十餘年昭王孝文王莊襄王卒事始皇為之使燕三年而太子丹入質吕不韋陽翟大賈陽結秦質子楚於趙而為之捐金遊秦説華夫人子之楚立為莊襄王楚又嘗求不韋舞姬已有身者生子政是為始皇相莊襄王以不韋為相封文信侯始皇尊不韋為國號稱仲父八家僮萬人招食客三千人使人人著所文集為覽六論十二紀二十餘萬言以為備天地萬物古今之事號吕氏春秋徙不韋進嫪毒於太后毒謀反事連不韋免相蜀飲鴆死將司馬錯取蜀渠伐趙取中都西陽再伐韓取石章伐取義二十三城蜀亂定蜀取軹及鄧之因蜀攻楚拔黔中攻魏河內得安邑攻桓河雍決橋取歷事孝公文武昭白起事昭王取攻韓魏於伊闕斬二十四萬拔五城攻魏垣攻楚取宛攻趙取代光狠城城攻楚取鄢鄧將攻楚取郢為南郡南伐魏取兩攻韓斬五拔九城攻韓取陽大破趙於長平坑降四十萬欲乘勝取趙蘇代説范雎罷之昭王復欲伐趙起辭不可再強之曰寧受重誅而死不忍為辱軍之將乃賜死自悔殺降起於秦可謂凶德參會魏章攻楚置漢中郡庶長奐攻楚取八城芉戒攻楚取新市蒙武伐齊取河東為九縣蒙驁仕韓得地置三川郡攻趙定太原攻魏拔髙都汲攻趙取三十七城尉斯離與三晉伐齊走湣王胡傷攻魏取卷蔡陽長社張唐拔鄭拔新中五大夫賁取地十城王齕伐趙取武安皮牢代五大夫陵攻邯鄲不克蓋白起罷後與楚戰數不利者也將軍摎攻韓取陽城負黍斬四萬攻趙取二十餘縣虜九萬攻西周君周盡獻其邑三十六口三萬戰國視春秋士習又一變春秋諸臣各忠於其國至戰國則朝秦暮楚于其利而已惟荀卿談王道不變故首列之仲連志在天下故次之四豪養士又次之而後次以列國之臣惟處士橫議無補一時而反流弊後世故列最後處士橫議列子鄭人名禦寇宗黃老自言師壺邱子林而友伯昏無人辭鄭子陽粟莊子多祖其言莊子蒙人名周為漆園吏威著書皆寓言畏儀辭楚之聘淳于髠齊人初見梁惠王不言曰王志在馳逐再見又不言曰王志在聲音終身不仕騶忌以鼓琴干齊王嘗受相印淳于髠等不能屈騶衍深觀隂陽消息作怪迂之變始終大聖之篇閎大不經必先驗小初推而至無垠先敘今以推至天地未生先列中國以推至海外人所不覩名神州赤縣禹所敘九州乃八十一分之一適梁趙皆郊迎師事騶奭奭最後頗采鄒衍之術為書齊人頌曰談天衍雕龍奭三騶皆齊人田駢接子皆齊人慎到趙人環淵楚人皆學黃老到著十二論淵著上下篇公孫龍堅白異同之辨為鄒衍所屈尸子楚人吁子阿人不傳楊朱之沛遇老子其反也舍者爭席桀謂人生無幾不必名賢遇同盡清節誤人紂樂其身墨翟昌黎謂其尚同兼愛尚賢明鬼同孔子然謂天子所是皆是之所非皆非之謂法父母與君皆不仁惟當法天謂惟賢為尚親戚則不可使貴謂聖王明天鬼所欲避天鬼所憎皆非是按周初諸侯千八百國爵姓見於春秋者猶二百二十四國爵姓者四十七一有爵無姓者一十七有姓無爵者十八爵姓皆亡百六十三已附庸者九合一百二十四而與盟者三十二而齊盟者十四君而已五伯之外晉平晉悼楚靈楚康楚平楚昭吳夫差闔閭勾踐是也其間稱伯者五人齊桓周僖時始伯楚晉文宋襄秦穆皆周襄時莊周定王時始伯太史公為十二諸侯表周蔡魯曹齊鄭晉燕秦吳楚吳宋伯衛數陳以晚不實則并周為十四起周宣止敬王四百四十四年又次為六國表周魏秦韓趙秦楚世燕年齊五共八起周元盡二三百十一年秦既并一而封建遂廢五帝三王之子孫盡矣悲夫右周遷四十九年而為春秋春秋二百四十二年而為戰國戰國二百二十四年而秦并周然天下猶戰國也當是時天王雖不存而東周君社稷無恙至秦莊襄元年而周盡滅矣然天下則猶戰國也始皇二十六年六國盡滅而天下始為秦計其間天下無共主者三十五年記事於千百載之下而強為之置其共主可乎故周赧亡後諸侯亦分國以紀而附焉始皇二十六年之後始不得已而屬之秦史記秦紀自襄公至二世六百一十嵗通鑑以昭襄五十二年繼周秦始皇二十六年初并天下兼號皇帝命為制令為詔除諡法期二世三世以至萬世以十月為嵗首色尚黑數用六分天下為三十六郡收天下兵銷之徙天下豪傑咸陽二十八年封禪立石頌功德求不死藥三十二年伐胸奴築長城三十四年焚詩書三十五年坑諸生三十七年遊沙邱崩李斯趙髙矯詔立胡亥賜扶蘇蒙恬死二世元年趙髙勸嚴刻盡殺先帝故臣作阿房宫自始皇時發閭左戍漁陽陳勝吳廣以失期起兵劉項等皆應二年以盜起責李斯斯請行督責三年髙譛殺斯髙為相盡決焉指鹿為馬隂誅不附者關東盡畔髙懼誅殺二世立子嬰子嬰刺殺髙沛公入關降項羽入見殺蒙恬伐胸奴直築長城除道王翦滅楚子賁滅齊李斯兼并矯罷侯亥焚書立胡趙髙勸嚴刻殺李斯勸深居殺二世按秦自孝公用商鞅富強之術而關中之力雄自惠文用張儀離橫之謀而諸侯之勢弱自昭襄用范雎遠交近取之䇿而規取天下之計得至李斯兼并之説用而天下皆秦矣然為臣者功成而身滅為君者業成而國亡其強也斯所以為弱其智也斯所以為愚嗚呼悲夫古今紀要卷一
