body:
  text: 古今紀要卷六宋黃震撰南朝宋武帝劉氏諱裕初為劉牢之參軍擊孫恩以功守下邳既而滅桓元復晉室克譙縱蜀梟盧循番禺滅燕慕容超伐秦姚泓所句無前中原震動三秦父老垂泣以請稱舍此欲何之帝以劉穆之死慮有他變急歸以成纂事留幼子義真鎮長安王鎮惡沈田子素有相圖之志而使之並守長安遂為赫連氏所取中原非帝可得而南北分矣即位三年崩以徐羡之傅亮謝晦檀道濟同受顧命遺戒母后不得臨朝帝清簡寡欲嚴整有法度被服居處儉於布素財帛皆在外府內無私藏少帝無道徐羡之等與檀道濟廢為營陽王迎立文帝文帝立王華等以羡之等弒逆激怒帝詔討羡之傅亮謝晦而謝靈運顔延之慧林道人進用皆羡之所廢者靈運後以遊遨誅彭城王義康總內外之務劉湛説義康召檀道濟誅之魏聞之喜義康權愈盛劉湛愈推尊之無復人臣禮殷景仁乃言於帝誅湛出義康元嘉十七年二十八年賜死庾炳之遂見寵任後以選用不公免以王僧綽侍中朝政皆參預焉時宰相無常官凡委以機密者皆宰相也始則王華王曇首殷景仁謝宏微劉湛時號五臣次則范曄沈演之庾炳之范曄以二十二年與孔熙先謀廢立誅最後則江湛徐湛之何瑀之及王僧綽凡十三人右用人始末詔錢樂之更鑄渾儀昏明中星與天相應使何尚之立元學何承天史學謝元文學雷次宗儒學何承天撰元嘉新厯行之初江左郊無樂是嵗始登歌比一年南郊帝仁厚恭儉勤於為政守法而不峻容物而不施百官久其職守宰六期為斷三十年間海內晏然出租供徭上以嵗賦士崇操尚卿恥輕薄江左風俗於斯為美後之言治稱元嘉焉右元嘉之政帝有規恢之志告魏以河南宋之舊土每聞王元謨所陳有封狼居胥意然謝晦武帝入關十䇿居九檀道濟萬似之長城既誅而用到彥之潼關之舉魏委四鎮以鎮我也彥之不察愧戍復來無功而還王元謨滑臺之役一見魏軍驚走反延敵入境故司兖既平王仲德獨憂之謨進言沈慶之稱與白面書生謀事何由濟况其出師授以成律交戰亦待中詔自是魏兵南下春燕巢林而元嘉之政衰矣右用兵事太子劭與始興王濬巫蠱事覺帝欲廢之謀泄被弒沈慶之討逆立孝武帝孝武帝多變易文帝之政郡縣以三周為滿宋之善政於是乎衰初晉之南以揚州為京畿穀帛皆出焉以荆江為重鎮甲兵皆在焉帝惡其強分浙東五郡為東揚州豫州之八郡置郢州荆揚遂耗奢淫多興造顔竣諌不悅不欲權在臣下分吏部尚書置二人又有五兵尚書凡遷授誅賞皆與戴法興巢尚之參謀內外雜事委戴明寶三人權重一時廢帝立法興尚之等專制而帝凶悖日北丙外不保朝夕忌諸父囚之殿內又欲殺晉安王子勛及湘東王彧彧等弒之而彧立為明帝文帝第十一子也子勛稱帝於尋陽四方貢計皆歸之朝廷所保惟丹陽淮南數郡後子勛敗斬之薛安都及梁益兖豫等刺史乞降上將甲士五萬迎之懼而降魏遂失淮北泗州及豫淮西地魏圍東陽克之遂失青冀之地猜忌諸弟皆賜死惟休範以凡劣僅存蕭道成鎮淮南召入朝多勸弗就道成曰骨肉相殘禍難將作方與卿勸力耳蒼梧王史稱後廢帝休範反蕭道成討平之道成謀廢立隂結楊王夫等弒帝而立順帝袁粲與王藴劉秉謀誅道成不克而死道成遂有其國而宋侯王皆幽死矣劉穆之武帝初破恆玄入建康大處分􅊖委穆之斟酌時宜隨方矯正不盈旬日風俗頓改劉毅不欲帝入穆之勸帝入輔及言揚州不可假人幕中畫策小大必白書百函應對不廢內總朝政外供軍旅決斷如流事無壅滯賔客輻湊求訴百端內外咨稟盈階滿室目覽詞訟手答箋書耳行聽受口並酬應又言談賞笑彌日亘時披覽篇章校定墳籍常設十人饌云此無一毫負公孫瑀云安能長居戶限之上徐羡之副劉穆之又代之義不學廢沈密寡言有宰臣望被顧命廢真少帝文帝誅之孫從湛之劉湛事連公主出武帝布納得免侈縱為兖州刺史威惠並行傅亮喻武帝言還都立以其廢立誅召帝入輔受命五文帝幼郗超知之四嵗時檀道濟從武帝平京城中北伐為前鋒帝所至望風降皆釋而遣之原咸悅文使討謝晦未陳而擒戰到彥之復失河南魏剋滑臺道濟與之三十餘多捷唱籌量沙全軍而返名大振氣進司空鎮夀陽劉左右並經百戰諸子又有才朝廷疑畏之湛召入義康矯收廷尉目光如炬引飲一斛脫幘投地曰乃壞汝萬里長城繼魏自此有飲馬長江之志文帝問殷景仁誰可答曰餘未任曰魏軍至瓜步文帝登石頭城嘆若道濟在豈至此王鎮惡王猛孫與百舸收劉毅於江陵帝取關中守馮翊義真沈田子爭功武私謂田子曰吾輩十餘人何懼王鎮惡田子求屏人因斬之王修又執田子以専戮斬焉朱齡石從平京城真平盧循帥代義督關中伐蜀為元敗見殺超石腳陳破魏剋蒲坂毛修之入夏後夏滅入魏得還朱修之戍滑臺為魏所囚將妻以宗室女嘉其節以為泛海歸王元謨每陳北伐文帝謂使人有封狼居胥意餘及北伐以元謨受蕭斌節制圍滑臺二百日多殺而自用之營利以一匹布責八百梨及佛狸救至遂遁在雍州訛言其反孝武顧命以嚴直不弟容元邈不隨齊髙帝用後髙帝以其懷忠之劉敬宣會武帝平京口懼知劉毅取禍常禍劉粹族兄毅二於武帝而粹盡心伯龍為鬼所笑胡藩從伐燕取臨朐勸殺劉毅破登岸破司馬休之從伐關中率十二人魏五六百不盈五千破數萬蕭思話外戚琴書臧燾外戚𬞞食臧質守盱眙貽書魏太武帝送死太武作鐡床才待之質又寫魏軍書購斬太武木桶盛人截其銄車血戰三月死者與城平太武解去謝晦從征關洛玉內外要務悉委之運受顧命誅三與混為兩人瞻喜霽詩靈寫混誅名絶謝裕幼為從祖安所知武不造元顯嬖人張法順之門勸帝矜嚴整潔弟子眺文章清麗子聲好奬人應親寫孔闓讓表牙謂王圭曰士名未立共奬成無惜齒餘論謝方明暗室無惰容不從兄混嵗節朝拜而已造劉穆之惠連靈運忽夢見惠連即得池塘生春草之句謝靈運玄之孫世文章與顔延之江左苐一諸車殷解麗稱謝康樂守永嘉遍歷縣輒為詠詩荀雍會稽幽居屐四友水弟惠連海何長瑜羊璿之伐開徑臨守王琇譜子鳯山賊凰子超宗鳳毛才劉道隆誤觸其父名恃使酒多所陵忽佛出無如何幾卿清術愧後謝何必前謝謝密萬之曽孫衣有子如此足矣物所繼遺財一不關預烏之遊異不傷同不害正言約要理子莊七嵗屬文地藍田生玉袁分左傳隨國立篇製理木圖淑見鸚鵡賦謂江東無我卿當獨秀朏十嵗屬文表陳求賢之義有口辨出勑與謝超宗入鳳莊門朏不入為不肯為齊王長史雜齊受禪不肯解璽作郡不省事後仕梁王弘導曽孫所為宋武諷求九錫加彈謝靈桂興事人望宗造次存禮將爵於人先呵責相無以為惠者美眄接曽孫融畫漢武北伐圖開張齊武北伐之議與魏使論馬三十內望公輔曇首分財惟取圖書宋昌子僧綽為文帝綽之子儉説髙齊位二十八僕射如自况謝安大事斷決流家無餘用僧虔僧綽弟衣甲放不居憲臺烏王氏微減僧虔位御史中丞曰烏衣諸郎坐處作掘筆書見容論書孫恭棗栗當自得刻燭賦詩僧虔幼子志宣城內史盜息爭田之遣囚還家虔篤實門下客車幰待如初僧孫筠讀沈約郊居賦至雌霓延的連蜷約日常恐人呼為霓五兮反寢小七策名德王彧謂明帝垂綸者清不獲貪餌王銓王錫玉昆金友錫魏使願見王𢎞之拂衣嘉遁石釣上虞江三頭韶之三日絶糧執卷不輟常自耕晉陽秋王淮之青箱之學丞預討盧循淮自彪之至淮之四世御史中郭璞云流竭王氏滅應於陳亡之年王懿字仲德以字行鬼與兄睿同起義兵容垂青衣小與食棄翟遼走敗於慕猛炬導行伐廣因為前驅二十戰皆克州入關攻万同色到彥之北伐魏棄河南司兖三仲德獨有憂德三臨徐州威著於彭城到彥之制督北伐自焚舟步走彭城其府藏為空餘初以執糞給何敬容謂孫溉尚有臭垣常祖魏攻夀春垣常祖立􅀈弱其軍張興世初名世明帝益興字水出上流破南賊劉胡沔生洲袁湛為從外祖謝安所知子以從征至太尉猶淑元凶劭行逆殺淑諫不從見袁顗明帝時自立子勛見殺弟粲妙德先生傳陽杖䇿悠然狂泉事尹丹不肯二姓齊殺之昻粲子事梁武起兵獨拒境後梁蹇諤孫憲十四䇿試終不能屈父君正日豈能用錢為兒買弟僕兄樞先為左僕射至是憲為右僕射稱大射小僕射孔靖勸武帝待桓玄篡於京口圖之從平關洛遷右僕射左僕射皆讓開府儀同亦纍年不受孫琇之十嵗兒偷稻付獄為吳令時守臨海清約曽孫奐為濟晉陵守清白號神君孔琳之請用錢順桓玄又欲復肉刑皆不旨弟之孫覬二十九日醉勝人二十九日醒殷景仁與王華王曇首劉湛並文帝侍中風力局幹冠冕一時誅劉湛禇彥回魏軍逼瓜步十父湛之尹丹陽使子弟芒屩習行彥回餘嵗有慙色不顧墮井牛美父卒推財與弟不不就山隂公主逼粲郤袖金儀貌有風裁莫延首目送與袁同受明帝顧命譏後事齊世頗以名節之從弟照非彥回事二姓蔡廓字子度咨謨曽孫傳亮而後行為御史中丞百僚震肅子不為徐于木署紙尾興宗孝武獨不敢侵媟之立前廢帝時獨免陵曳帝勸沈慶之王元謨廢二人皆不從受明顧命何尚之傾朝廷别父叔度曰此送吏部郎耳非關何户德也昔殷浩作豫章送甚衆徙東陽無相窺來南學作議鑄當兩錢非一去而復袁叔真隱傳逺權無薦舉點尚之弟子孝隱曰不娶臣持梁武鬚乃欲老子胤守建安放囚還家弟奉佛歸隱會稽點昌宇亦尚之弟子者遙遙華胄笑姓閔清白敬容昌宇子為守吳政第一相不學而貪問客姓吉者與丙吉逺近對以如公與蕭何張裕有吏能龍子號五鏡顔延之鄰居聞其言不復酣叫裕族永鑿鐘去滓岱去官赴養族裕緒一生不稱作諾似齊武帝曰此楊栁風流可愛張緒當年時充三十而杖節率十二至十六作詩二千首有虞訥詆之更為託云沈約句句嗟稱壯哉雀鼠邵宋武善其臨事得大臣節以贓敗禕代飲晉琅邪王鴆而死暢滑臺與魏季孝伯對語融陸修靜贈白鷺羽麈尾扇古海賦顧顗云惜不道鹽恨二王無臣法恨人不見我陸處無屋舟居無水玉文章不寄籬下海集范泰議建學博學請鑄五銖事佛子曅自校書丞左遷宣城太守不得志作後漢書肥黑禿眉鬚􅀈上歌既畢曅亦止彈琵琶和香序比類朝士瀕年三十始學問獄中自序孔熙先以博戲因謝綜結曅熙先善天文謂義康當立有異志徐湛之告狀遂伏誅文帝時年四十八嵗盛服玩妓妾而母與弟皆單寒自誇作史往往不減過秦論非但不愧班氏徐廣家貧好學妻與之離車服儀注撰晉紀宋武使撰答禮問何法盛竊郤紹晉申興書行之鄭鮮之外甥劉毅朝野歸慕鮮之獨盡心於武帝答帝入咸陽歎秦渭濵歎吕之對目直裴松之注三國志晉紀子駰注史子記昭明議婚禮太子用王壁武皮歷郡清勤若不事産業彼云一身之外亦復何須子孫不才我聚散若能自立不如一經子野孝感法諸暨不行鞭家撰宋略茅仕齊為文古俸給外中表屋何承天母徐廣姊聰明博學移逺就近浚城隍上宋文安邉論四事纂牛車計丁課杖定元嘉厯次孫遜八嵗能詩均仕梁武帝後失意帝云吳不均何遜不遜顔延之三十未昏先見不往妹適劉穆之子穆之將仕之欲才學推服當時每犯權要性𥚹激有酒過肆意直言刑文帝引薏琳升獨榻延之醉諌曰三台座豈可餘人居之竣既貴盛曰吾平生不見要人今不幸見汝子竣輔宋孝武専斷衆務鑄諌沈慶之議散鑄諌二銖後鵝眼綖環不行明帝用古錢如其議孝武以切諫忿對誅之沈懷文不飲酒不好戲子常以切諌忤意直孝武以異己誅之三峻沖琛皆為司腰鼓兄弟周顒顗七世孫蓼事佛長蔬獨處初答王儉赤米白鹽緑葵紫答文惠太子春早韭秋末晚菘韻四聲切子捨相梁武簡雅量不及徐勉而清過之弟子𢎞正𢎞讓𢎞直三周若蜂腰劉湛不尚浮華禁自比管葛正鎮夀陽贓吏百錢以上殺之義真膳色責其酒車螯輔文帝為侍中生疑殷景仁間已結義康傾之丁所母憂伏甲侍上謀泄伏誅庾悅亮曽孫炙劉毅貧時習射使其讓東堂又求其殘皆不答後毅表解其都督顧琛和曽孫馬琅邪王廞亂吳悉以女人為官以琛母為司孫恩亂後母孔氏賑活里邑生子皆以孔名馬為吳郡立白廟顧覬之治山隂孫晝日垂簾吾不交戴法與毗有言劉不過使不為三公耳曰辛孫憲之為建康令謂解牛任其所之盜伏罪之酒醇號顧建康其清美改衡陽洗骨俗吏部庭木稅論牛埭羊欣王獻之書裙新不為元顯書扇生桓元輔政稱疾自免守安十三年曰人仕宦至二千石斯可矣沈演之吳興人文家世為將而演之好學贊帝伐林邑兄子顗慕叔度孺子為人江湛不受餉稱上召遇浣衣疾江揔與陳後主為艷詩者曽孫秉之守新安臨海妻子常飢寒食祿之家豈可與農夫爭利留書案一枚庫沈慶之四十未知名沔檀道濟白文帝謂忠謹曉兵破緣馮諸北山蠻諫北伐鄙白靣書生王元謨果敗諸孝武使討逆曰蕭斌婦人不足數顔竣請代鎮斥以黃頭小兒旬日整辨皆謂神兵在白首之年誅竟陵王誕據廣陵者富厚眼識字口占賦詩顔師伯代書栁元景鳴笳候之插杖而耘諫使攸之賜死文叔能死廢帝惡其文季能報攸之從兄子貴收劉胡不犯毫芥馬後以富擬王者養戰士鐵誅宗慤願乘長風破萬里浪惟攻破林邑而象奔一毫無犯被梳枕刷製獅子形破竟陵王誕栁元景統衆北伐向薛安都瞑目橫槊單騎突陳惟著綘衫所無前如是數四率方平以步卒與安都騎犄角相戒以不進者斬魏大潰武元景釋面縛者會王元謨敗詔班師魯夾向牢元景再伐之退不孝武復使討元凶宗慤安都等十三軍𨽻焉營産業園人賣萊錢三萬怒曰供家人喫耳乃奪百姓利耶弟廢帝召誅之下車受戮容色恰然子世隆獨修布衣之業一身之外亦復何須子孫不才將為爭府如其才也不如一經馬矟第一請談第二彈琴第三子惔舉漢中應梁武弟憚梁武常與賦詩慶逺元景弟子景世隆夢元賜褥席逺後夢與慶殷孝祖明帝初四方叛惟保丹陽一郡孝祖自兖州入赴人情大安受詩葛鐵帽戰死劉勔戰無不捷受明帝顧命戰死子悛齊武布衣交文議五銖錢自漢至宋不可易孝綽勔孫母十四代父繪草制後仕梁為廷尉攜子妾而留私宅辭藻為進所宗時兄弟姪群從七十人皆能文三妹亦有才學負才凌忽薛安都河東強族三千家自愧來求北還構扇河陕歸襄陽隨栁景元克關陕單騎斬曹爽人比之關羽斬顔良宗越隨栁元景伐魏明善立營陳謀前廢帝凶暴以為爪牙帝不能容作亂誅吳喜在威武世寬厚人並懷之百明帝立四方叛喜請三百人來討姓望風降散齊高帝蕭氏諱道成仕宋文帝為偏將軍明帝時平晉安王子勛蒼梧王時平鄱陽王休範蒼梧王欲殺之乃殺帝立順帝大權一歸之王儉倡議加黃鉞為太傅封齊王遂求禪問政劉􅀈謂政在孝經請鑒宋所亡帝嘆儒者之言可寶萬世問羣臣得失劉善明請除宋苛政崔祖思請開文武二學進清修之士聞喜公子良請停臺史督責郡縣劉思效請革奢侈皆褒賞命奏行之自晉以來建康外城惟竹籬帝命改立都墻帝深沈有大度性清儉曰使我治天下當使黃金與土同價常謂武帝曰宋氏非骨肉相殘他族豈能乘其弊哉女宜戒之武帝以宋末官以三年為小滿又不能守詔自今一以小滿為限有司請應天變帝謂應天以實不以文帝弟長沙王昱犯法帝思高帝言而宥之詔於王儉宅開學士館儉十日一選學試諸生儉明習故事上深委仗之以穀帛至賤用李與議出上庫及諸州錢糴買帝留心政事務總大體嚴明有斷郡縣皆久於其職故永明之世百姓豐樂然頗好遊宴華靡之事時中書舍人各任一省謂之四户以茹法亮吕文顯等為之勢傾朝廷守宰遷換餉遺數百萬王儉極言之不能改帝疾亟王融欲矯詔立景陵王子良乃以朝事委西昌侯鸞廢帝鬱林王昭聖立帝太孫也鸞任知朝政恩信兩行天下欣然帝以宦官徐龍駒為後閣舍人代帝畫䇿居含章殿帝狂縱日甚蕭湛蕭􅀈之乃勸鸞廢帝立海陵王昭文鸞謀繼大統多引名士殺桂陽王鑠等五人遂廢帝自立凡弒二君明帝鸞也魏以其廢立大舉入寇蕭衍等破之殺河東王鉉等十王髙武諸子盡矣信道術用計數簡出入將南則詭言西立三年卒東昏侯寶卷明帝次子也明帝初戒之曰作事不可在人後故數與近習謀誅大臣蕭頴胃起兵荆州蕭衍立南康王寶融于江陵是為和帝引兵東下攻之東昏為張穆等所殺和帝尋遜梁頴胃先起兵用席闡文之説與蕭衍合取長沙等黃龍以充軍王敬則歸誠髙帝識書善斷殿內竊發盡平敬則力也韓不與王儉同拜三公老子非同傳明帝將殺之反十日敗陳顯達平桂陽城有功髙帝以刺廣州加都督遷官常愧懼督催慧景北伐敗東昏時懼禍反誅崔慧景每罷州獻數百萬髙帝嘉之時鬱林時密與魏勸進明帝東昏叛誅李安人髙帝密事惟安人議論曰署事有卿名我便不細覽結王檢為武帝左僕射桓康武帝起為郡所執康擔穆后及文惠太子景陵王走與門客破獄取武帝好殺怖小兒愈瘧魏破周盤龍父子兩騎縈攬數萬人蟬大破魏軍子名奉叔答武帝貂從兜鍪生荀伯玉髙帝初鎮淮隂宋明召之以伯玉謀免崇密啓髙帝幾危太子以王敬則免與垣祖破誣誅之崔祖思聞風自結髙帝儉以讖勸封齊米諫九錫見踈勸武帝節云宋武桃花飯又論刑律咸樂虞悰以武帝布衣之交至侍中酒家富善滋味大官不及上醉不快獻醒鯖鮓一方而已陸澄博學文談王儉所遺數百千條儉讀易三年不解義欲撰宋書不成戲以書厨陸慧曉世為侍中有名行鄙與張融並宅其間有池劉璡酌之曰飲此吝之萌盡矣歷輔五政立身清肅賤起送僚佐曰不容不以禮處人不以卿呼人曰者乃可卿三子僚任倕號三陸倕一遍必誦次孫厥平頭上尾螽腰鶴膝號永明體人與沈約論文體諸陸皆吳郡陸杲勇張融有髙名肩時稱無對日下惟舅與甥中丞彈虞斥黃睦之不畏強禦庾杲之為王儉長史蕭緬謂泛緑水依芙蓉時以入儉府為蓮花池也王摛以博記為王儉所賞陵令清直請謂不行𨽻事奪何憲簟扇上秣永明中天黃王融金天頌摛曰非金天所謂榮光問無不對孔圭好文草上律文八斗萊不剪解星文吹飲七蛙鳴鼓不如劉懷珍報蕭公馬百匹峻八嵗為人所略劉寶贖之教以書書淫類苑梁武䇿錦被事見惡懷慰守齊郡懷墾田灌溉廷著亷吏論吏明帝曰劉慰若在朝不憂無清杳傳綜羣書為沈約任昉以下遺忘皆訪之地謂約古樽刋木鳥獸鑿項背以出內酒引魏中所得齊大夫齊景公犧樽證酒榐酒字當作楉程答沈約張仲師長頸王事有千日醉桂陽卿千里酒至家而醉所著紫荷囊出張安世傳委至僧孺撰譜訪血脈因徐勉以臺閣文議之歊不要不仕孝弟訏張稷辟之挂檄於樹日而食無喜愠色併劉瓛五嵗聞舅孔熙先讀管寧傳慕之答髙帝政在孝經明僧紹百里奚子孟明後以名為姓隱者庾易不交外物子黔婁仕齊為編令虎出境肩吾能詩劉虬抗節好學隱須得祿便之遴八嵗屬文折臂太守之亨代之遴守南郡人懷之郡號大南中南郡梁武帝蕭氏諱衍在齊明帝時屢立戰功魏文帝十萬奄至衍力戰得全東昏時始安王遙光徐孝嗣江祐蕭坦之江祀劉暄六貴爭權衍遂密修戰備東昏數誅大臣衍兄懿亦見殺衍舉兵奉和帝自雍州既而即帝稱梁右取天下事録用齊宗屬十六人二函求直言擢縣令邱仲孚何逺為郡亷能莫不知勸欲釐正雅樂自制四器名通制十二笛寫通聲依古鍾玉律不差好儒術置五經博士廣開館宇又詔州郡立學詔定百官班品凡一百九號髙肇請依周禮造樂器詔尚書五都職參政要可革用士流乃以劉納劉顯等為之置孤獨園收養窮民上為人孝慈恭儉博學能文隂陽卜筮騎射聲律無不精妙冬月四更即起親九族優惜朝士右勤儉仁惠等事上大舉伐魏以臨川王宏為都督北人謂軍容數百年所未有魏攻梁城宏遁魏進圍鍾離上命曹景宗韋睿救之為火攻魏大潰魏北海王皓來奔後上使陳慶之送皓北還自發銍縣至洛陽三十二城四十七戰所向皆克皓驕恣又猜慶之皓兵敗走慶之乃收老騎結陳而還右北伐事朝士有犯罪者屈法申之百姓則按之有老人遮車言肖宏洛口敗又奢僣因事免不數月拜司牧晚年専精佛戒或謀反亦泣宥之由是王侯益橫右弛刑事詔宗廟用牲有纍冥道皆以麵代上幸同泰寺設無遮大會持法衣行清淨大捨為四部大衆涅槃經題中大通六年幸同泰寺講三慧經是夜浮屠災詔起十二層浮屠中大通元年士大夫競談元理不習武事陶𢎞景以詩諷帝凡三捨身羣臣以錢一億萬奉贖右奉佛事賀琛陳牧守貪殘風俗侈靡奔競求進省事息費四事上大怒口授敕書責之朱異善伺候阿諛用事三十年死尤痛惜之侯景自東魏叛歸西魏未幾求內附上以朱異言封河南王景與東魏戰敗求貶上以為豫州牧肖介諫不聼東魏求通好傅岐以高澄求和是設間使侯景疑朱異固執宜和景果反景致書臨賀王正德奉為主遂反夀陽羊侃請據采石襲夀陽朱異以景無渡江之志議遂寢正德密以大船濟景渡江遂入宣陽門陷城上為景制憂憤成疾餓死右术年用捨倒置至亡國事簡文帝立陳霸先謀封侯景受湘東王繹即元帝節度乃進軍南康大寶元年湘東不從太寶之號下令大討景景敗欲登位乃逼帝禪豫章王棟尋弒之而篡元帝即繹誅景即位江陵侯景之亂州郡大半入魏詔令之行千里而近侯景之亂梁王察附西魏與帝不相下乃乞兵來伐帝為所執魏殺之江陵九十九州敬帝元帝子也王僧辨陳霸先定議立之而魏送蕭明來主梁僧辨納之霸先乃襲殺僧辨黜蕭明而奏帝時大權盡歸霸先即篡之為陳蕭景武帝從弟神令求寧為百城最議刺兖州畏敬如軍國大事皆與決蕭宏武帝令侵魏章魏遺巾幗愚錢三億餘喜豫王綜著錢論昭明太子統五嵗遍五經著數行並下水便省萬機天下稱仁文選山有清音王茂與武帝結兄弟起義前驅東下功第一諌留潘玉兒東昏妃也莫見惰容獄無滯囚清曹景宗從武帝起兵有功水聚斂殘橫神伐魏魏不敢逼大敗魏於淮亦蔣帝之功去時兒女悲歸來笳鼓競借問來路人何如霍去病造字云我騎快馬如龍弦作劈靂聲箭如餓鴟呌覺耳後生風鼻頭出火今揚州作遺人閉置軍中如三日新婦夏侯詳梁武起兵蕭頴胄慮其不肯抑忱妻其子以女而從湘川城南峻峯起樓臺亶守吳興為人圖象城南豫州與湛僧智降魏五十二衣率于鎮簾為夏侯妓夔在豫州七年歌有前兄後弟布政優優之妓妾百數賔客常滿吉士瞻梁武起蕭頴胄使士瞻討不從者皮逾四十不得志後一年得大都夢鹿十一蔡道恭守司州克魏攻不鄧元起克益州李膺諫元起勿檢巴西二郡為薄馮道振守南梁魏怯防勇戰曲為韋睿前驅斷魏連橋敗傑御部不言功儉素絢堰淮聞役一十萬人怪長九里名堰決數萬人死聲三百里水不可勝欲灌夀陽而自損昌義之守鍾離破魏力所識不過十字之寬厚得人死居藩吏人安張𢎞䇿謀與武帝合知無不為起兵預為圖隨才薦拔庾域魏圍南鄭封空倉以安衆心鄭紹叔守江州善督江湖糧無乏必稱君吕僧珍梁武沉竹木於檀溪雅僧珍預備櫓金敗東昏將李居士宋季十萬買鄰錢一千賀生子僧珍大遂陳其才頭痛骨沈約勸梁武早定大業撰晉宋齊梁史聚書至二萬卷神四聲譜自謂入范雲預讀秦望山石刻盡鬼言有主有相佐命誠范鎮從劉獻如布衣在貴遊間無愧有不信因果之謂人生樹花同發因風而墮茵席糞溷異賣形神論云捨刀無利使論取官已至令僕矣韋睿率衆赴梁武督䇿皆見用即守江夏遷領歷陽擊魏走之衆伐魏大勝於是豫州於合肥元勤恤下眼無所私援救鍾離之圍大戰魏主王英楊大於邵陽馬仙琕於安陸拜表致仕諸恂恂未嘗忤視從慕方石陸賈為人所老猶課兒以學天下釋獨不從風而靡居必有政績仁愛士家裴邃比還南又征邵陽大破魏魏開屯田二匹僧明以義州入攻平之千絹受北伐一日九戰大勝開玉宇深沉略地至汝頴寬明得士心不死當大居身方正江淹少隨宋建平王景素守南兖州虧廣陵令辭連淹受金獄中上書言虧名為辱形次之即得出鵝齊高帝輔政召之陳齊高五勝沈攸之五敗酒盡文亦辦章表皆其製置使官並為王儉所駁中書侍郎九十三篇竟無次序得卿年三十五中丞獨步年十三貂蟬於樵所求仕梁郭夢張景陽還錦璞求還莑任昉孝友梁八嵗能文守文才見重當時飢為王儉主簿武記室義興出俸米活民三千禁不舉子遺守新安尤清潔一徒行就路決訟卒無以斂言不許以新安物還都無宅室為平生好交四子流離莫收恤者劉孝窮標著廣絶交論交勢交賄交談交量交王僧孺幼聞孝經言忠孝願嘗讀守不先嘗李舶傭書養母寫畢諷誦亦了南海不貪物道答金元起砭石定引騶清感鬻布時改百家譜傅昭咸七世孫門袁覬來讀書自若封安成郡府鬼去餧側去檻穽不密岩却栗下綃家學府埋子婦牛肉孔休源范雲食其赤飯蒸魚沈約虛襟引接曰纍佐名藩甚得人譽晉安王别設一榻孔長史坐插定立晉安王公卿珥貂筆奏決於休源江革不為魏人執筆岸後還行會稽事其百城震恐西陵取石十餘片實舸徐勉事梁武止文積客滿聞應對如流八手不停筆斥虞皓談風月九品為十班自是貪冒者進遺焚藁以撰五禮為俸祿分親戚子孫清白書戒子許懋十日授詩晚覆講聼者數十百人會撰風雅比興十五卷經史笥諫封禪稽遂停陳伯之叛入魏還梁舊為劫盜陳慶之送豫章王擊破魏兵六千相降魏豫州刺史李憲據其城渦陽與魏持數十百戰大勝之置西徐州城送元皓比還自銍縣至洛陽十四旬平三十二四十七戰皆克元皓不道而敗慶之為沙門間行歸素開緣淮田善撫士儉賀瑒撰五經義人教授三千琛碩學移受賕賂參禮儀帝與語常晷啓時政被敇責朱異多藝年沈約戲其不亷武居權要三十納降誤國見帝事中顧協和六世孫或三十五嵗帝嘆其老嚴蔬食布衣冬寒欲解襦與之憚其清不敢徐摛為文不拘舊體觀外兄周捨薦其文行不應對明敏辭義可侯景之變獨侍立動徐陵天上石麒麟將除中丞朝廷肅然俸論濫官舉吳明徹為克淮南數十州與親族王僧辨學涉該慱明平侯景帝平湘賊陸納納貞陽侯陳武霸先襲殺之羊侃自魏南歸人以力聞用二十石弓馬上下石執大十圍石相擊折樹梢長二丈四禦侯景可義不顧子挂寬厚客延燒七十餘艘金帛不數計侃不意家豪侈女樂甚盛江子一統七世孫子未嘗造姑夫朱異之門之侯景亂一及弟子四子五皆死胡僧祐入北又歸梁任援王僧辨謂子玘開朱白二門禽約景遂遁鼓吹自娛隂鏗終日酣飲而執爵者不知味非人情也侯景之亂行觸救之得先王琳討侯景功與杜龕皆第一之陳武受禪琳以野豬艦起義吳明徹攻殺忠義誠信張彪用王僧辨同立貞陽侯不克若陳霸先敗之會稽惟與一大黃倉入耶山見殺後梁宣帝蕭察也乞兵西魏以代元帝乃即位江陵魏資以荆州之地為附庸大序元年即梁敬帝紹泰元年安於儉素雖多猜忌而撫將士有恩以封疆逼隘干戈日用不得志而殂八年即陳大嘉三年明帝入朝周主于鄴天保十二年即陳宣大建九年隋納帝女為晉王妃由是罷江陵總管帝始得專制其國天保十七年陳大建十四年帝孝慈儉約境內安之終二十三年莒人琮立廣運六年陳侈生至德四年隋召父朝廢其國為莒公二年後主禎明元年陳武帝陳氏諱霸先與王僧辨討侯景平之梁江陵不守僧辨迎立蕭淵明霸先襲殺僧辨立敬帝北齊任約渡江據姑孰霸先襲破之又遣蕭軌等來伐霸先攻破之獲軌等受梁禪永定元年時政事皆由中書省置二十餘局總國機要尚書聽受而已大莊嚴寺捨身立三年上臨戎制勝英謀獨運而政寬簡性儉素文帝明察儉約每夜刺閨取外事分判者前後相續敕更籖投階上令有聲崇尚儒術愛悅大義恭儉行已勤勞濟物制度𢎞逺有前哲之風至於臨下明察有永平之政矣廢帝臨海王立二年宣帝廢之宣帝謀伐齊惟吳明徹決策請行乃以明徹為都督攻夀陽克之禽王琳等詔以夀陽復為豫州帝聞周滅齊欲爭徐兖詔吳明徹都督伐之兵敗為周所執及將士皆不反十年吕梁之敗明年周將梁士彥剋夀陽又剋霍州南北兖晉三州及旴台等九郡民自拔向建鄴周又克譙北徐二州自是淮南盡歸于周一十三年隋文帝立明年帝崩帝德不逮文智不及武志大不已江左日蹙贊云後主叔寶起臨春結綺望仙三閣窮極耳目以官人袁大捨等為女學士江總為宰總不親政務與孔範王瑳等十人號狎客與八婦人賦詩罰酒有玉樹後庭花臨春樂等曲上惡聞過失每有惡事孔範必曲為文飾稱美沈客卿以府庫空奏不問士庶並責關市之征所入過常格數十倍孔範言諸將匹夫敵耳有過即奪其兵分配文吏由是文武解體隋來伐江濵鎮戍繼聞施文慶沈客卿並抑而不言及臨江上曰王氣在此彼何為者耶孔範亦謂長江天塹古以為限隔南北縱酒奏妓賦詩不絶隋軍據姑孰帝醉不知隋軍入城帝入井以避見執及孔張二貴人隋文帝曰此敗將作詩工夫何如思安時事杜僧明事盧安興與兄天合起兵殺蕭映入陳武禽之以為主帥征交趾討元景仲援建康侯景遷斬蘭裕景破蔡路養走李平侯援荆州周文育與杜僧明同起平僧明之戰文育同之害又破徐嗣徽蕭勃為熊曇朗所侯瑱本事王僧辨帝陳氏立瑱據中流甚強未肯入朝文即位敗王琳於蕪湖侯安都從陳武帝攻蔡路養李遷仕侯景帝禦北齊為王琳所囚得脫立文歐陽顧為蕭勃前軍周文育禽之九武帝以鎮嶺南盡有越地督交廣十州有聲南士淳于量外交王琳而遣使陳武吳明徹北侵量讃之章昭逹平王琳廣定閩陳寶應定歐陽約吳明徹決䇿北征同鼓禽王琳鎖及周滅齊陳宣詔令北侵竪木以鐵貫車輪過斷船路明徹降以憂卒於長安傳縡施文慶等譛之下獄縡上書極諫賜後主問能改否曰臣靣可改心不可改遂死獄中章華吳興布衣日上書極諌後主即斬之顧野王無所不通褒為賔客宣城王為揚州野王及二王野王畫古賢褒書贊稱絶姚察六嵗誦書萬餘言不好戲弄循吏傳吉翰欲活罪囚翰入關呈其事之即命左右收典籖付獄代杜慧度守交州私斬盧循威惠祿振給傅琰山隂破雞見粟及鞭團絲見鐵屑治縣譜王沉居祿日貧邱寂之吳興西曺夜不為刺史王彧開門沈巑之丹徒令奉以清獲罪云無以赤衣諸賢傅翽琰子酒劉玄明謂曰作縣家食一升飯而莫飲冬至放死囚還如期而反虞願謂宋明湘宫寺是百姓賣兒貼婦佛若有知當悲哭又言棊堯以教丹朱非人主宜好守晉安見越王石沈瑀建德令非種桑柿梨棗栗南餘姚令大姓虞氏千餘家訟無所通縣豪族老者為石顯倉監立縣吏侈靡令芒屩粗布侍終日嘗鬻瓦器齊孫謙齊初錢唐令縣不受遺在後事梁平生歷二五郡所亷潔梁何逺所食乾魚武清公天下第一至得一妄語謝卿一縑為康令太守王彬換水而已送之斗酒隻雞與自縣守近畿宣城俸居官所過若營家貴賤書抗禮如一代貧者租郭祖深與親上封事二十九條諌帝溺情內教授守南津令行禁止威振逺近長江削清儒林傳宋伏曼容非何晏疑易九事上封事勸齊封禪與袁粲為一臺二妙子􅀈孫挺三世教齊何佟之少好三禮十國家禮多取決性好潔日數洗滌名水淫梁嚴真之兼五經博士至登講五館諸生千餘人畢主修凶禮司馬筠克明三禮崔靈恩自魏歸梁合尤精三禮三傳渾蓋鄭灼禮學授疏食講賀德基世傳禮學婦遊都下貧巾白馬寺逢人贈白綸文學傳宋丘靈鞠文名甚盛不入齊頗減矣蓬髮弛縱詩王儉謂仕宦進才亦退子遲能丘仲孚少好學以中宵鍾為限神拒王敬則有功山隂號明檀超著史與王儉忤熊襄著史稱河洛金匱吳邁逺自誇曹子建何足道卞彬上虞令脫情投太守孟顗去賦忤髙帝不得仕進著蚤虱蝦蟇等指斥祖沖之本宋人古稽古有機思沖元嘉中何承天所製厯比十一家為密之以為蕭踈更造新法水指南車運欹器里效木牛流馬造一器不因風施械自千船自行子桓之亦有巧思詣微時雷霆不能入悎志莭慷慨有文武才侯景亂死之劉昭注范曄後漢書鍾嶸諌齊明親細務周興嗣善屬文字次羲之書千為文梁劉協撰文心雕龍五十篇負之沈約車前以自達紀少瑜夢陸倕授青鏤管茟何思澄父敬叔長成令夏節受餉得米二千斛他物稱是以代租思澄盧山詩華林遍略孝義傳宋郭世通會稽人里至孝原還誤錢墓改獨楓為孝行子平貴買前田齊邱冠先能殺我者蠕蠕也不能以天子使拜夷狄者我也子雄不受錢布梁吉朌欲代父死囚梁武勑蔡法度脅誘皆不動辱丹陽令王志欲薦之曰因父買名一何甚殷不害事母養小弟勤劇無所不至母十七為梁廷尉平政事飾儒術賜蔡錦裙隱逸傳陶潛侃曽孫職而歸五栁先生傳自况去州祭酒不堪吏檀道濟餽梁肉麾之為彭澤令送一人力紿其子郵公田盡種秫妻子請以五十畝種粳郡遣督至縣吏白束帶見曰不為五斗米折腰賦歸去來至顔延之留二萬錢悉送酒家菊叢坐久王𢎞酒素琴我醉欲眠葛巾漉酒復肯仕自以晉世宰輔家卑屈後代自宋興不義熙以前文章明書晉年永初以後惟甲子耕書成子云羲皇上人及兄弟之生義夫妻鋤躍志趣亦同世號靖節先宋宗少文宋武辟不就令山水忘歸金石弄欲衆山皆響孔淳之人外逰逃祿周續之五經潛晚事慧逺與陶名三隱雷次宗事慧逺昭隱館顧歡倚壁所書夷夕燃松節著夏論戴顒受琴於父逵為新聲變曲逵善為佛像顒亦參焉陶𢎞景青雲白日不覺為逺年中茅山立館號華陽陶隱居以永明十挂冠神武門永元初更築三層樓自處其上算特受松風二梁武每咨之山中宰相渾天象漢厯後天日十一刻剃隱居四十年歷宋齊梁禍有僧寶志雖髮而嘗冠衣納袍知人福附傳後齊馬樞覽二萬卷暗隱茅山能視中物恩幸傳宋戴法興戴顒子三兒敵陳戴三千萬後孝武時與巢尚之戴明寶門如市賜死阮佃夫諸暨人主明帝時與王道隆楊運夫皆權亞人廢帝時權任轉重後賜死齊茹法亮與吕元度吕元顯並以姦諂事武帝大納賄賂勢傾天下吕臨海人茹法珍東昏時左右應敕捉刀之徒並専國命號刀勑梁武悉誅之號諸鬼梁陸驗徐驎事武帝並苛刻與朱異名三蠧司馬申事元帝好譛殺武帝解體以覆滅盡寢烏啄其口流血陳孔範後主時與江總號狎客不五言詩曲為文飾隋兵至奏能飛度夷貊傳海南獅子國獻玉像林邑國古越裳界漢曰南郡象材縣也伏波銅柱在焉金山吉具樹沉香中天竺即身毒恆臨大江名新陶源出崑崙分五總名水水有真鹽出犀象火齊天竺迦毗黎國事佛沙門慧琳突文使參權要孔顗謂黑衣宰相東夷髙勾麗在遼東千里百濟三韓國馬韓五十四國百濟其一後并其餘馬韓便韓辨韓新羅倭扶桑東二萬里葉似桑仞如笋實如梨皮為布為錦西戎河南王鮮卑種青海龍古今紀要卷六
