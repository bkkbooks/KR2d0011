  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2d0011_WYG_002-1a, image: WYG0384/WYG0384-0035a.png}
body:
  text: 古今紀要卷二宋黃震撰西漢髙祖寬大長者扶義而西約法三章秋毫無擾此得天下根本處始入關受懷王命還定三秦如懷王約出關以東則為義帝討賊此取天下有名處初破嶢關聽張良計啖以利復攻之入關留止秦宫聽張良樊噲諫還灞上羽奪關中欲攻羽聽蕭何諫收用巴蜀初入巴蜀聽張良計燒棧道示無東意既入聽蕭何説拜韓信大將軍聽韓信計還定三秦既還定聽董公説東伐楚伐而敗欲立六國聽張良計銷印入關收兵欲復東用轅生説南出武關堅壁勿戰楚既拔成臯欲捐之用酈生説謀收敖倉韓信請為假王用張良諫拜真王既分鴻溝欲西歸用張良計追滅羽婁敬説都長安未從聽張良説即日西駕此規取天下曲折處亦其知人能聽處初入關盡除苛法過魯祠孔子此於秦後再造人極處偽遊雲夢叛者九起得天下後第一失處溺冠騎項四皓兩生不屑用叔孫通雜就秦儀終漢不見帝王之盛大封同姓致七國之變械繫蕭何終漢不體貌大臣誅醢信越終漢少恩婁敬諫伐胸奴不聽卒不免聽其和親終漢困於胸奴凡皆不學未知所以維持天下處蕭何佐命功臣本漢相最優不正與髙祖合不學而性明達刀筆吏而刻漢大抵以法令為師自何始根收圖書諫攻羽甚鎮撫關中薦韓信關中天下本髙帝疑何最方帝距京索間非用鮑生計遣子弟詣軍何幾族及自將邯鄲非用召平計悉家財佐軍何幾族其後自將擊黥布非用説客計買田宅自汙何幾族稍帝出關東而關中動息必窺之何常設詐免死請死則械係已及蓋惟恐何得人心張良本戰國䇿土資質達一時最優房嘗學禮報秦之仇非髙祖明不能用子非子房髙祖豁達中有失一分明子房用髙祖嶢保身是其餘事所謀無事不關成敗破關諫止宫會鴻門項燒棧道東遺羽書越諫立六國封王韓信追羽捐關於信布都關中雍齒定太子章然皆智巧警敏之事初至不殺子嬰係約法三不受牛酒入關之氣象一新關天命人心向背處皆帝發之良不及此隂前輩言緣圯上人頗聞道緒餘愚意兵法只是謀之書未必聞道但良天資髙善用之傑士也韓信登壇言楚漢得失規模已定京天下皆其所取漢王彭城敗還賴信擊楚索間楚不能西趙還定三秦根本立齊破魏龍破伐夏説背水破下燕囊沙破斬且楚氣索矣用兵後世莫及説無反心假報漂母等志願已足不武涉蒯通力不動王取禍又固陵之期至帝姑少忍以濟事楚滅即奪齊董公遮説數語非良平所及關涉最大隱漢緣此可取天下功第一髙帝後不用必士不肯為漢用立但乘時為名教一言匠班氏合傳一時謀臣中都料也曹參苦戰七十餘有天下方定逺相齊國故不見疑亦未必非帝心逺之得盍公清淨之説治齊後相漢亦只相齊規模不蕭規曹隨清淨畫一雖非開濟之道不作聰明求勝前人最為賢德亦隱然之功彭越專主燒楚積聚又得十餘萬斛給漢楚食盡而敗是分幹取羽之一事徹頭扈輒欲反越不聽太僕誣告之吕氏又誣之可哀黥布以少擊衆常為楚先鋒隨楚擊齊不往江彭城破不救羽怨之遂與何歸漢得九會陔下足專是勇所智不為薛公料樊噲諫留秦宫斬直入漢帳下行排闥髙帝命立之請兵橫見斥吕氏親壯士灌嬰為吕氏將兵榮陽而與絳侯同謀壯知義初誅項王定具定淮北亦士夏侯嬰號滕公髙釋韓信世護惠帝自至文四驂乘酈啇定七十三縣祿令其子給吕蒯通一言喪三雋驕烹食其敗田橫韓信盧綰以舊恩封説以狐疑叛於王燕共攻陳豨因趙勝之令范齊二豨叛入胸奴吳芮番陽令甚得江湖間人心世率百越助入關王衡山漢徙王長沙傳五享國最久酈食其擇主而事能説陳留攻下敖倉如知形勢立六國不利韓信齊不情理陸賈造新語欣南粵叔孫通采秦儀制禮易立原廟事進大猾只諫太子一正婁敬説都長安和説冒頓休兵親朱建初辭辟陽侯後受其金葬母為之掉舌死傅寬以魏五大夫從至霸上定三秦破齊擊陳豨皆從周緤戰有利不利無離上心靳歙以中涓從攻濟陽陵戰藍田豨略梁地下邯鄲定江擊陳皆從周昌諫易太子故令相趙嵗吕氏殺趙王後謝病三卒趙堯因機奪昌御史大夫季布與丁公事同賴朱家言滕公免辨廷折樊噲以諾聞俠曹邱生得逞其文帝不用欒布義士越哭彭田叔孟舒髠鉗隨趙王出舒守雲中免叔言舒知士卒罷弊不忍言爭死敵文帝復使守雲中相叔案梁勸景帝無以梁事為問魯相魯王好獵常暴坐故不失出相魯卒官以百金祠少子仁不入曰義不揚先人名陳平姦詐小人勢劉項之爭只間疏楚君臣一事無然是時楚已蹙范增素非諫行言聽者初補成敗徒間疏于漢君臣吕天下甫定教髙祖偽逰叛者九起髙帝既崩阿后王諸吕幾亡漢端居深念時亦自無䇿賴陸賈傳會將相周勃為將誅諸吕平為相亦與竊安漢之名不知漢之有此不安者皆平之罪語對文帝言宰相之職乃以大言勝周勃平於此無毫髮之實尤見其姦誤漢極多漢初罪魁漢初自立者附見陳勝吳廣秦發閭左戍漁陽勝廣皆為屯長失期法斬以等死自王廣為假王監擊榮陽田臧等矯殺之勝之御莊賈亦殺勝凡王六月而所遣侯王將相卒滅秦初勝故人傭耕者發舒妄言勝誅之故無親勝者項羽救趙入關楚漢雌雄已決救趙以力坑降卒二十萬入關以德約法三章但欲伯天下念慮未嘗到一統天下之事既滅咸陽而都彭城既復彭城而割榮陽既分鴻溝而東歸羽皆自謂按甲休兵之時不知漢王必欲得天下而後已一時人才棄楚歸漢者皆知天下所歸范增亦知之而必欲殺漢王其愚可笑魏魏人共立咎為秦所圍咎為民約降而自殺豹復立叛楚歸漢復畔去韓信擊虜之齊田儋王齊章邯擊殺之田榮攻殺項王所立齊及濟北膠東三齊而自立羽怒攻之榮為平原民所殺田橫復立榮子廣為漢所滅橫走海島漢召之與客五百人皆自殺韓韓王信擊楚所立鄭臣漢因王之後以信壯武徙備胡數與胸奴和解漢疑其二責之信降胸奴後為漢所殺趙張耳陳餘耳餘初為刎頸交陳涉起相與謁之同武臣略趙即畔涉而立臣臣見殺復立趙歇秦攻趙巨鹿餘在外不敢救耳讓之由此隙項氏王耳常山餘敗之耳歸漢與韓信擊斬餘初武臣為燕所虜有厮養説燕以耳餘各欲自王利武臣之死燕遂歸之是厮養知其心勢利之交耳為趙王敖其子也惠帝元年吕后殺趙王以戚姬為人彘帝由是成疾日飲酒為淫樂不聽政曹參為相一遵何約束帝築復道叔孫通諫帝懼通請為原廟四年未幾崩吕太后稱制用平勃計王吕氏四人産為相國祿為將軍劉氏子孫殺之殆盡八年太后崩諸吕欲為亂陸賈交歡平勃與劉章誅之迎立代王是為文帝王陵太后欲王諸吕陵對以非約陵廷爭不見容杜門十年薨可謂社稷臣初母伏劒使專意事漢周勃重厚少文氏入北軍誅諸吕安劉迎立文帝陸賈太后王諸吕因以病免以誅之亷耻忠赤諸吕謀亂傳會將相功極大東萊曽議其分財諸子為敗風俗此時賈避吕氏不仕當取此處况三代後首説詩書功尤大劉章齊王肥之子謀吕后之存獨憚之其手誅諸吕初立其兄故文帝薄賞文帝盡除收孥相坐律令明習國家事問決獄錢榖數吳公治平第一召為廷尉元年開藉田除誹謗妖言之罪賜民田租之半二年除盜鑄錢令五年賜民田租之半賜三老孝弟力田亷吏帛以户口率置三老孝弟力田常員與胸奴和親十二年除肉刑除田租十三年詔民食不足令博議後元年勞軍細柳拜亞夫中尉後六年上躬修元默而將相皆舊功臣議論務在寬厚告訐之俗易風流篤厚禁網踈闊斷獄數百有刑錯之風即位二十三年宫室車服無所增益有不便輒弛以利民欲作露臺直百金乃止身衣弋綈尉他稱帝以德懷之吳王不朝賜以几杖張武受賂更加賞賜專務以德化民右節儉寬厚用人等事日食舉直言賈山直言嘉之袁盎却慎夫人坐上説上每朝未嘗不止輦受言二年張釋之諫賞嗇夫稱善犯蹕者欲誅之奏罰金盜廟環者欲族之奏棄市皆從之二年賈誼陳治安䇿自是養臣下有節五年胸奴數為邊患朝錯請募馬徙塞下從之十一年又用其言入粟拜爵十一年上思頗牧馮唐因言魏尚以上功差六級削爵即日赦尚復雲中十四年詔郡國舉賢良上親䇿之十五年右納諫等事薄昭殺漢使令自殺人告周勃反下廷尉太后言不反復爵邑右嚴處新垣平詐獻玉杯十六年賈誼請改制度易服色定官名興禮樂以立漢制更秦法帝謝未遑六年遺詔短喪右失處蚤建太子欲預正名分夜拜宋昌只合用漢人有疑大臣心故周勃見囚薄朱虛功有恩怨心興居所以叛除祕柷為民心切新垣平故乘間不可以此病之以亞夫囑後人知人張蒼先帝舊功臣别無長短律自秦時為柱下史漢興專令主計漢家言者本之以十月為嵗首色上黑公孫臣言漢土德其符黃龍見蒼罷之其後黃龍見蒼自絀申屠嘉剛正術困鄧通學不足周亞夫重厚似勃執正過之重細栁之軍文帝動容拜中尉付以寄屬後人焉賈誼資質好學未純未初欲興禮樂是鋭氣是緣去長沙方知天下是治安治安䇿皆為後世慮奴痛哭者一謂侯王過制者流涕者二謂嵗奉胸及試為屬國長太息六今在者三定經制教太子審取舍禮大臣共為一教言多施行分齊為六淮南為三諸侯王事太子但文帝用朝錯失人耳殺審取舍則帝尚德願禮大臣自是大臣有罪自又請立梁王疏舉淮南地以益淮陽割淮陽北邊二三城及東郡以益梁梁足以扞齊趙淮南足以禁吳楚景帝時卒籍以破七國報又諫立淮南王疏云淮南四子分王必有白公仇之事後四齊果反四齊者膠東西災川齊南也者正朔服色誼以漢土德數五色黃班固言其疏以漢火德也自髙帝尚赤至光武終用之仁三表五餌贊言其疏注云愛人之狀好人之技道也信為犬操常義也愛好有實已諾可明十死一生彼將必至此三表也賜之車服以壞其目珍味以壞其口音樂以壞其耳堂宇倉庫奴婢以壞其腹來降者上召之相娛樂以壞其心此五餌也劉向謂伊管未過伊以道德維持誼以智謀防患大不同管慮不及後誼皆為後慮青於藍張釋之長者環守官太諫用嗇夫馬南山石椁王犯蹕盜劾子不下司門復用生計免尉識大體漢廷第一賈山不能為醇儒言其不專一經非議其行已又至言專欲文帝禮士與之講學此意最好諫放騎給事穎隂侯為末嘗為騎馮唐魏尚唐論文帝不能用亷頗尚得復守雲中初尚之守雲中軍士租米盡給士卒出私養錢五日一饗賔客軍吏胸奴逺避去衛綰戲車之士文帝以其長者屬景帝為相三年然初官至相終無可言直不疑償金以無兄受謗不自明大景帝時擊吳楚功為御史夫周仁以醫見所弱袴上景帝時常入卧內終無言賜及賂遺不受石奮孝謹最事文景少自髙帝為中涓武長子建孝謹子慶相九年皆帝張叔亦以長者處官泣獄事可却却之不可涕而封之袁盎却坐屠攬轡馳峻坂謁申嘉愧其不禮下趙談以其害己正後殺錯挾術托朝錯言兵事三邊得地形卒服習器用利有當世急務二守備塞勸農力本又請才者什伍教之以賢良䇿無理而諂君言三道之要以國家大體五帝明之臣不及人事終始三王明之臣主俱賢侯直言極諫以五伯明之不及其臣又言削諸更法令三篇文帝雖不盡用然竒其才守令教太子文帝致富却從入粟來然徙民邊只是利誘勢脅申商之流景帝刻深不與七制詔嵗不登民乏食議徙寬大地文帝時除肉刑定笞律人多死乃令減笞五百者三百笞三百者二百元年和親二年夏旱禁右中三四年詔讞獄中五年更減笞三百曰二百二百曰一百然刑輕易犯中六年詔讞獄不當者不為失令先務寬後元年以嵗不登禁內郡食馬粟後二年詔郡國務農禁采金珠玉後三年等右重農恤民事朝錯為內史數請間言事寵幸傾九卿二年錯請削諸侯地吳楚七國皆反初錯更令三十章諸侯喧譁至是以誅錯為名三年廢薄后六年始兩漢廢后此周亞夫下獄死後元年失右忌刻之周亞夫堅卧不動為以梁委敵違詔成功皇帝廢立太子亞夫相國爭之不得欲王后兄王信王降虜徐靈等五人皆爭之不得謝病免帝言怏怏者非少主臣也卒殺之申屠嘉朝錯穿廟堧嘉請誅之不果發憤死自後劉舍陶情輩宰相備位而已朝錯教景帝刻薄以更法令反用袁盎計錯為説削七國自七國錯父先殺鄒陽吳王反諫不從去之梁等梁羊勝公孫詭等隂謀陽不合幾見誅勝敗梁王賴陽免枚乘諫吳兩書明白過於陽不聽去之梁吳既反復切諫之景帝召拜宏農都尉不樂復之梁武帝蒲輪召之道病卒父皆有䇿士之風仕驕國不陷於惡弒與君亦不從武帝雄才大略仁內多欲而外施義舉賢良仲舒第一議立明堂召申公建元元年初有年號置五經博士建元五年令郡國舉孝亷元光元年議不舉孝亷者罰元朔元年用主父偃計分封諸侯五子弟二年命禮官勸學興禮為天下先乃為博士置弟子五十人第其髙下補郎中文學掌故自此公卿大夫士吏彬彬多文學之士五年正歷元年建寅為首改服色定官名協音律定宗廟百官之儀太初元年謁者行天下賜三老孝悌力田鰥寡等帛及米元狩五年山東水災虛倉廪以賑吏民能假貸者以名聞徙貧民關西衣食仰縣官元狩二年江南水患以巴蜀粟致江陵吏民賑救者舉以聞元鼎二年因田千秋言罷方士下詔陳既往之悔征和四年命金日磾霍光輔幼主後元元年處右武帝好仲舒對策為江都相建元元年申公以力行對罷就邸元年招選文學材智之士多上書自鬻莊助最先進其後朱買臣吾邱夀王相如東方朔枚臯終軍並進用三年公孫宏對䇿擢為第一宏容悅多詐一嵗中遷至左內史時轅固九十餘亦以賢良徴罷歸元光五年主父偃嚴安徐樂上書皆拜郎中偃一嵗四遷為中大夫元朔元年宏封平津侯丞相封侯自宏始宏嫉仲舒遷膠西相徙汲黯右內史五年經費乏令民買爵六年卜式輸財至御史大夫元狩四年以黯守淮陽請出入禁闥不從五年千秋數月取宰相封侯征和三年處右用人失南夷開於唐蒙西夷發於相如兩粵起嚴助朱買臣朝鮮由涉何遭世富盛動能成功然已勞矣擊胸奴則王恢始議其後衛霍連年出塞二人並為大司馬自是胸奴遠遁然漢亦士馬物故海內虛耗西域則張騫始通凡三十六國後分為五十六國兵衆分弱無所統一命曰斷胸奴右臂實不能與胸奴相進退萬里相奉徒勞費云又以汗血馬故伐二師右窮兵處張湯趙禹作見知故縱監臨部主之法顔異不入言有腹誹法東方盜起作沈法巫蠱獄起太子不免焉右濫刑處算啇車造皮幣造白金算緡錢𣙜酒酤置平凖鹽鐵武功爵級十七萬直三十餘萬告緡楊可酎金株送入財補郎所忠之謀株送者世家富人鬪雞走狗盡以為罪入財即為郎右橫斂處起上林苑夀王奏年建元三柏梁露盤神明通天之臺千門萬户之宫右土木之侈獲白麟得寶鼎得神馬瓠子歌芝房歌赤鴈歌少翁封文成欒大封五利皆不驗誅右祥瑞之失相如遺書勸封禪兒寬贊成之東巡海上自遼西歷北邊九原元封元年幸雍北出蕭關自代幸河東四年南巡江漢遂增封泰山五年如泰山望祀蓬萊太初元年東巡海上三年幸泰山修封還祀常山天漢三年東巡琅琊浮海還太始三年東巡四年右封禪巡遊之失董仲舒潛心大業非禮不行數上諫爭所居而治兩相驕主正身率下推明孔氏抑黜百家立學校舉茂材孝亷皆自仲舒發之産初為慱士三年不窺園及去位歸終不問家業劉向謂伊吕無以加公歆謂淵源未及遊夏班固意蓋主之仲舒治羊歆主左氏故有此言若受命之符引經文尚書白魚入舟及求雨隂陽縱閉等却從公羊中來或聞知或見知不可專以淵源論立三䇿大要化首篇禮樂教化心太學更二篇舜文勞逸任德光正髙明大求賢在養士性嵗貢賢度三篇承天意以順命明教化以成正法以防欲道原出於天合用夏之忠曰士大夫言財利務按武帝三䇿不再䇿之子大夫或道世而未濟考之今而難行是不以初對為然未三䇿之曰文采未加豈惑乎當世之務及條貫寬統紀未終是不以再對為然對對畢天子以為江都相是又不以三對為然江都易王泄庸鍾蠡為越三仁之問云仁人正其誼不謀其利明其道不計其功與孟子對梁惠同純儒汲黯近世社稷之臣多矯制發倉湯揖田蚡責揖大將軍責武帝欲責張紛更孫洪阿諛闕諫迎昆邪冠東海淮陽皆大治遺補武帝不不見淮南寢謀志在拾學黃老盎好任俠慕袁正直諫事轅固斥公孫宏謂黃老家人言耳申公勸帝力行之二人皆守道儒司馬遷史談六家指要而隂陽衆忌諱然敘四時之犬順儒者博寡要勞而少功然敘君臣父子云云分墨者儉然強本節用失法家少恩然正上下之名家使人儉而善真然正名實道家精神專一動合無形因隂陽之大順采儒墨之善撮名法之要談道家者流耳妄論以不得從封憤卒穴遷十嵗誦古文二十而南遊江淮上會稽探禹窺九疑浮沅湘涉汶泗講業齊魯之都欲奉使征巴蜀以南談且卒而遷適反泣告以所論著於是絶賔客忘室家紬石匱金室之書十年而遭李陵之禍喟然卒成之起黃帝至麟止作十二紀十表八書三十世家七十列傳几百三十篇藏之名山孫楊惲始述其書行焉副在京師云宣帝時外十篇闕注元成間禇先生補缺作武帝紀三王世家龜䇿日者傳言辭鄙陋按東萊辨十篇非皆無書其一景紀具在張晏稱後人取班書補之此紀所載間有班書所無者去取詳略可見其二武紀獨此篇亡衛宏謂武帝削去兩紀景紀復出者武帝特毁其副者耳武紀必指切尤甚雖民間亦不敢藏其三漢興以來將相年表其書具在但前缺敘後自大始元年以下禇先生所續其四禮書敘具在自禮與人起以下草具未成音之起以下草具未成其五樂書敘具在自凡其六律書敘具在自書曰七政以下未成乃其七三王世家書雖亡略敘所自出未可知贊真太史公語其八傅靳蒯成傳其篇具在張晏謂禇所補非每其九日者傳自余志而著之以上皆本書歐公製作必取此讀數過末乃禇所補晏并疑之非耳其十龜䇿傳敘具在自禇先生曰以下乃所補班贊云遷據左氏國語采世本戰國䇿述楚漢春秋接其後事訖于大漢其言秦漢詳矣至於采經接傳分散數家之事甚多疏略或有抵捂亦其涉獵者廣溥貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗謬於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也然自劉向楊雄慱極羣書皆稱遷有良史之材服其善敘事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録遷學從黃老來為被刑言多激切與經不合緣不見古文尚書周禮左傳霍光漢社稷臣帝出入禁闥二十餘年未嘗有過受遺詔擁昭每出入下殿門進止不失尺寸訖十三年百姓充實四夷賔服二及廢昌邑立宣帝歸政焉上謙不受前後秉政十年然昧於盛滿之戒不知勇退上內實嚴憚之身死而赤族矣金日磾著忠孝節而識過於光兒光小妻隂謀不忍發覆其宗日磾殺弄全其宗光以女為后而武帝欲納日磾女後宫不肯光武帝遺詔封光慱陸侯日磾秺侯日磾不受而受之王忽果飛語云安得遺詔群兒自相貴耳薨不以夷人先中國不為群臣所忌輔政嵗餘子孫七世內侍蘇武父名建虜三從大將軍出塞連勸大將軍招士武使會虞常反虜中事其副張勝併欲降武武自刎復生之衛律劫之武大罵帝徙武牧羝北海上李陵説武以死誓聞武崩哭嘔血朝夕臨留十九嵗因常惠得還為明年武子元以逆誅武賴霍光免宣帝時復典屬國八十餘卒圖形麒麟閣子通國李廣文帝時擊胡有惜不逄時之嘆武景帝時擊吳楚以梁授廣將軍印還不賞帝時屢從大將軍無功失青承上意以廣數竒不令當胸奴出東道回遠期自殺廣歷七郡四十年賞賜分戲下飲食與士卒共寬緩不苛士樂為用善射無雙虜號飛將軍然終不封侯蓋自悔殺降云三子當户椒敢皆以勇取敗陵當户子當武帝專令隨二師轉陵欲自一隊以步兵五千戰二千里無救而降歸有李緒者教胸奴漢以為陵而族其家陵遂不霍光遺任立政招之云丈夫不能再辱説按陵以漢殺其母為辭然陵海上蘇武時陵母固未誅程不識治軍至明軍不得自使古人以師出以律言之公孫𢎞對䇿稱任賢則職治去無用言則事情得不作無用則賦省不妨民百姓富有德進朝廷尊有功上羣臣進罰當則姦止賞賢則勸八者治民之本仁愛義宜禮履智衛四者治之本道之用桀其逄迎處言人主病不廣大尚竊遲之旱之餘烈西南夷不聽自是不廷爭湯諫置朔方見難謝以不知其便若是內其險害處陷殺主父偃徙董仲舒遷汲黯史皆欲之死地無餘財好處母給故人賔客孝後開東閣兒寬為內史勸農桑緩刑罰理獄訟循坐殿當罷大家牛車小家擔負以留之亦吏之流曲學成封禪大明堂上夀可罪張湯杜周湯治陳后巫蠱獄及治淮南衡山江都反獄皆窮其根定律令務深文造白金五銖錢皆籠天下鹽鐵懷排啇賈周出告緡令尉天下事決於湯以詐誅為張湯廷史內深次骨專以人主意為獄所二千石係者百餘人詔獄至六七萬人吏增加十餘萬逐捕宏羊衛皇后弟吏刻深遷御史大夫家巨萬周酷湯不止酷吏衛青霍去病青衛后弟去去病青娣少兒之子七青大將軍病驃騎將軍青凡擊胸奴斬捕五萬餘級百一與單于戰收河南置朔方郡封九萬六千三户去病六擊胸奴斬十一萬餘級降渾邪王開河西酒泉地封萬七千七百户青小心不敢薦士蘇建當斬歸之於上方去病夸誕胸奴未滅何家為帝令學孫吳云顧略如何安用古兵法青所當單于去病當右地士青擊其全勝不撫優劣可見去病乘其已衰病去病又武帝好大故去寵過青去兩將軍之出塞封去病而不及青病方顯去病日益貴而青日衰青已侯而青之禆將如李息公孫敖等將去病之禆將如趙破奴皆碌碌無功二人所兵力盛亦皆未見智勇過人處衍其出塞也青至填顔者去病封狼居胥禪姑然馬十四萬匹入塞不滿三萬自是不復擊胸奴矣惟青之衰不背青者任安東方朔紿侏儒持正論詆舍人用割肉客皆滑稽處生實以不見著設難非有先論傳稱二篇最善之諫起上林且却董偃侈化民有道對乞燔甲乙帳却走馬曰上淫如此而使民不奢凡皆徑切卓出一時張騫使月氏為胸奴所留十餘嵗給大宛得還夏歸言在大夏時見卭竹蜀布云得之身毒大去漢萬二千里身毒又數千里此其去蜀不逺乃復事西南夷終莫得通後以軍大期廢復説漢結烏孫斷胸奴右臂遂通西北國為昆明殺奪雖擊斬昆明數萬後遣使竟不得通自騫以開外國通尊貴妄言無行者轉相效李廣利李夫人兄也兵期至二師取馬故名二師將軍不利益發天下騷動宛貴人殺王與馬還封海西侯為後十一嵗伐胸奴兵敗降單于所殺卜式式輸財而富民莫應其弊告緍言式願死邊而諸侯莫應其弊酎金後以鹽鐵船算竇嬰魏其侯兄竇太后從子田蚡武安侯帝王后弟武舅灌夫父張孟事灌嬰故冒姓嬰執仇陷吳軍性狠使酒先貴待蚡厚屢蚡貴而嬰失勢欲奪嬰田不灌夫尚俠而右嬰犯蚡蚡告上族之嬰爭之得亦棄而蚡以禍卒私許淮南王按蚡驕多罪嬰諫傳梁王嬰賜金不入家蚡優劣可知但嬰失於交灌夫夫凶狠使酒激成其禍韓安國長者終困與王恢爭和親便漢所以在武帝時初為梁擊吳又使解梁僣擬之罪左仕漢至御史大夫去及為相墮車病免後遷屯漁陽言胸奴胸奴入坐遷北平卒司馬相如素行不謹意諭蜀為上飾非稽開西南夷賦大人蓋指帝誕謾無賊其君勸封禪逄君之惡死猶未已里古以尸諫彼以尸誤國使縣令負弩誇耀鄉小人不足道枚臯與相如皆以材幸能自愧其俳倡王褒為衛刺史作頌得薦及頌聖主得賢臣文數從獵所幸宫館輒歌頌娛侍太子以為嬖幸者耳神祀金馬碧雞道卒嚴助武帝置私臣以辨詘大臣罷助最先進復初誥田蚡而身救東甌會閩越兵閩越攻南越會閩越降使助友南越人淮南諫伐閩越助復諭淮南相結為壻富所辱請守會稽無聞復侍中作賦頌淮南事發誅朱買臣嚴助薦進湯以東越反覆守會稽破東越怨張陵折告湯隂事買臣亦誅吾邱夀王盜起為東郡都尉不稱復侍中難公孫𢎞無得挾弓弩言汾隂鼎非周鼎坐事誅主父偃上書言九載亦八律令一諫伐胸奴推恩分者侯三子弟長説上徙豪民茂陵及置朔方郡燕大臣皆畏其口賂遺纍千金齊始遊燕趙發王定國隂事趙王乘其相出關亦發偃隂事誅及齊王懼偃而自殺偃遂公孫𢎞主之云徐樂傳止載一書傾大略似而駁謂吳楚齊趙為瓦解而秦為土使天下無土傾而已故雖有強國徑兵陛下遊燕縱欲而天下無宿憂嚴安止一書文云齊晉所以亡六卿大盛也秦所以滅刑嚴刻欲大無窮也今郡守非特六卿地幾千里非特閭巷甲兵器械非特棘矜以逄萬世之變不可勝諱也甚中武帝病後為騎馬令終軍棄繻當鋭進還繻者帛邊出入關為符信棄之者示乘車請纓以鋭進殺身請長纓必羈南越王越相吕嘉殺之木對白麟竒木迎合數以白麟并角為同本以竒衆支內附為無外月越及胸奴各王有降者疆論徐偃刻薄者偃矯制使膠東鼓鑄鹽鐵云出顓之軍言王無外何云出鹽鐵何安社稷偃竟伏罷公孫賀賀妻衛后姊由是寵朱為相不受印綬世子敬聲驕奢下獄賀捕安世兾贖之安告賀隂事父子俱死劉屈氂為相與戾太子戰死者數萬人氂子妻二師女共禱祀欲令昌邑為帝屈腰斬石慶相九年已醇謹而車千秋訟太子寃旬月取宰相封侯十二年終不肯有所言鄭當時置驛超四豪之餘風臧咸陽孔僅洪羊皆所鼠薦和承意不斥否議魏其武安首雋不疑勸暴勝之威行施之以恩名薦刺青州㨁劉澤懼京尹辨方遂之詐重朝廷辭霍氏婚桑宏羊均輸東郭咸陽孔僅鹽鐵趙禹與張湯定律令羲縱王溫舒尹齊楊僕皆酷吏能上以為李少君祀竈繆忌祠太乙少翁帛書飯牛遊水發根置夀富神君欒大入海師求其正錦寶鼎公孫卿封禪勇之粵祠公王帶黃帝明堂圖昭帝遣使問民疾苦始元元年除田租二年賢良議鹽鐵𣙜酤均輸秋罷𣙜酤六年胸奴請和親六年免口賦勿收更賦逋元鳯四年勿斂今年馬口錢二年減口賦錢什三元平元年年十四知上官桀詐曰光忠臣先帝屬以輔朕毁者坐之後桀等反誅元鳯元年帝崩立昌邑王賀無道乃立宣帝元平元年傅介子誘斬樓蘭小夫生事霍光擁昭立宣世中興漢室進任張安杜延年王欣楊敞蔡義皆相昭帝不足言張安世同輔昭宣而宣帝內親安世夀謂薦賢豈有私謝太盛辭祿子延讓户邑杜延年光持刑嚴延年輔之以寬議啓光修孝文時政示以寬儉舉賢良鹽鐵不當父位宣帝自任雜伯大持刑深類景帝好夸祥瑞類武帝詔二千石謹牧養民本始元年假郡國貧民田地節元年始親政事厲精為治樞機周密品式備具拜刺史守相輒親見問二千石有治理效以璽書勉勵增秩賜金公卿缺則遷次用之二年池籞未御幸者假貧民流民遠歸者假公田貸種食路溫舒言治獄之弊置廷尉平四人每秋季讞三年減鹽價令郡國嵗上係囚課殿最渤海守龔遂入為水衡都尉北海朱邑為大司農並四年東海尹翁歸髙第為扶風二千石察官屬用法不平者元康元年頴川黃霸為太子太傅東郡韓延夀為馮翊神爵四年五年減口錢五鳯三年置常平倉四年減民算三十圖功臣麒麟閣甘露三年講五經同異立梁邱易大小夏侯書穀梁春秋博士三年詔公卿大夫務行寬大詔舉亷吏欲真黃龍元年處右重牧守好胸奴為下令烏桓烏孫三國所攻滋欲和親本始三年充國以威信下先零神爵元年西羌降置金城屬國二年鄭古破車師降日逐都護西域三十六國二年五單于屠耆車黎烏籍呼韓耶等相攻呼韓邪入朝於是烏孫以西咸尊漢矣甘露三年處右胸奴賔服王成偽增户口賞俗吏多為虛名地節二年霍氏以所親子弟領羽林及兩宫衛將屯兵三年後霍氏族趙蓋韓楊死非其罪外戚許史王氏貴寵王吉上疏諫以迂闊歸太子言上持刑深謂奈何純任德教吉歸神爵元年元太子言甘露年以恭顯典樞機宦官之禍始以許史握兵柄外戚之禍始右失處魏相去副封堂奏行便宜隂奏水旱盜賊主奏采易隂陽明月令選知陽者四人各一時諌伐胸奴言義兵應兵忿兵貪兵驕兵最好因族霍氏復怨未通嚴毅稱上非和羹之意許氏進下正致元帝終言任許史丙吉保祐宣帝絶口不道前恩車代魏相為相知上寬大好禮讓馭吏醉嘔上不忍斥後虜入雲中代郡見謂憂邊馭吏力也年或言其不薦馭吏牛喘臨薨薦杜延年陳萬于定國上稱吉知人非然萬年以媚得薦二人比趙充國以全取勝至不貪小利方先零與諸羌解仇共反充國金城圖上略以威信招降罕开二執奏再三主謂明主可忠言明年屯田便宜十事魏相其議卒從之奏羌可五萬今未服不過四千罷兵奏可其秋四千人降得之屯田失之置屬國常惠初隨蘇武俱不降擊後持節護烏孫擊胸奴封長羅侯便道龜兹斬前殺漢使者鄭吉屯田渠黎因攻車師護鄯善以西南道壘迎日逐并護車師以西北道中西域治烏安逺侯于定國位九卿迎師執弟子禮刑廷尉十八年不遷代黃霸相宣帝持深不能正明習政事王吉純儒除輔昌邑以道角上書宣帝請車服貴賤有節任子令及去抵減樂府省尚方公卿務在簿書期會未有建萬世之長䇿舉明主於三代之隆上謂迂闊謝病歸元帝召道病卒出處合道崇子駿為京兆有能名與王遵王章稱三王孫有能名世清亷赴官不過衣裳去位家居布衣疏食韋賢為相在霍光時備位自元帝時復相而失爵作詩自劾復爵作詩著知有爵已張安世漢賢相人過失忠謹不避權勢薦賢許來謝匿名迹之掩矯霍氏弊疏廣許伯使其弟監太子家廣言師友必於天下英俊魏相謝不及與兄子受俱見幾去陳萬年中二千石問病丙吉萬年獨留昏夜歸吉薦為御史大夫子咸放嚴延年而亷不如見罪憂死夏侯勝質朴廟樂天隂諫昌邑偶中上議武帝不置立授黃霸經出道語堯言布天下趙廣漢守穎川為銗筒伺微旨斬其關守京兆善鈎距遂霍光死疑蘇賢訐其客案賢疑榮畜教賢父訟罪又殺畜民事發又脅持丞相望之劾奏腰斬吏號泣萬數韓延夀繼廣漢守穎川教以禮讓黃伯因其迹大治學守東郡三嵗上禮義行教化聘賢內諫修治宫春秋鄉射陳鍾鼓管絃盛升降揖遜都試講武又置正長率以孝弟令行禁止斷獄大減為天下最以守馮翊傷昆弟訟田移病自責二十四縣莫涕敢訟言望之劾其僣上棄市百姓莫不流尹翁歸以文武兼備自薦於田延年守守東都于定國不敢干以私東海大治扶風大治盜賊課常最三輔病清潔無謙讓甚得名譽數嵗卒家餘財張敞諫昌邑請忤霍光自光死請罷霍氏三將軍膠東盜起治之盜平諌膠東太后獵治京兆略循廣漢以經術自輔郡坐楊惲免帝兾有賊起為刺史盜平守太原清諫宣斥遠方士見郊祀志鄭昌能吏持刑弟宏尚寬異循吏無卓之迹蓋寬饒劾張安世居位無補人舉刺無所回避意為人剛直然深刻喜陷以不得遷失王生子書戒之不納以奏稱以刑餘為周誅召法律為詩書官傳賢功成者退故楊惲楊敞子伐太史公外孫義然其治行以敗好交英俊告輕財好初戴長樂惲罪免為庶人怨後以報孫會宗書望腰斬王成相膠東治甚有聲朱邑未嘗笞辱人公自北海遷司農篤厚正亷節黃霸力行教化而後誅伐頴川八年百姓興行凡治道去泰甚一守治常為天下第龔遂事昌邑極諌教化渤海以儉約民皆富厚王生歸功聖主因薦之召信臣視民如子第南陽躬勸農桑號召父千遷河南治當一為少府奏省費嵗數萬路溫舒帝即位初上書秦失尚存乞寬刑罰習遷廣陽私府非納言試功之道自幼獄田延年酷吏萬盜三千嚴延年劾霍光守守涿郡郡中震栗河南號屠伯尹賞守長安令為虎穴誅守江夏為右輔都尉所甚多馮奉世莎車殺漢使劫南道叛漢奉世持節送大宛諸客至伊修城諭諸國殺之諸國悉平蕭望之謂其生事不封居隴西羌彡妲反請討之爵關內侯瓜牙官前後十年元帝昏懦召用貢禹虛己問政用其言省食穀馬食肉獸省苑囿罷角抵建章甘泉宫衛卒就農蕭望之周湛劉向金敞並拾遺田獵因薛廣德諫即日還匡衡以日食地震上書為光祿大夫用韋元成等議罷郡國廟京房作考課法上意向之右節儉好儒等事史髙領尚書事宏恭石顯典樞機蕭望之請罷中書宦官不悟恭顯陷望之自殺亦不罪恭顯用石顯譛左遷周堪張猛猛自殺京房引幽厲事曉上請退石顯不能後房竟棄市右優遊不斷貢禹鄙夫患失而言節儉非元帝所少可恭顯用事不言言此為恭顯用大責薛廣德諫射獵而諫御船見小沽激韋元成相元帝重厚不及父賢而文采過之周堪與望之劉向共謀恭顯望之死後再用而卒張猛與周堪同堪卒而猛見殺京房攻石顯下獄死顯以為魏郡太守房懼屢上封事焦延夀知其亡身災異考課劉向初以鑄金事宣帝見罷用蕭望之周堪引之以攻恭顯得罪地震復又以外親上書見罷餘望之見殺堪猛用向再上封事堪猛死向廢十年成帝即位顯等誅又以王鳯擅政再上封事卒不用於沒十三年而王氏代漢學博而不純始困恭顯終困於王氏直諒多聞翼奉災異請遷都不交匪人陳湯呼韓既朝郅支叛湯副甘延夀使西域矯制擊斬之石顯康衡持不封成帝立衡竟劾罷之因言假會宗圍解竒中為中郎後以罪徙邊甘延夀以材力幸支為都護成與陳湯共擊郅封義侯賈捐之賈誼曾孫道諫伐朱崖計備言堯舜之代待夷狄之用楊興偽薦石顯見殺辛慶忌辛武賢子合為世仇事元成儉武賢與充國羌議不慶忌恭所至著威執金吾諸葛豐收許章堪上收其節直舉刺無回避書言周張猛上不之免為庶人上康衡以史髙舉相元帝畏石顯不敢言子殺人免復以盜土免為庶人後王尊劾事元宣成馮野王以治行髙為馮翊稱其威信宣在位多舉為相以後宫屬不果事元成蕭望之宣帝舊臣光元帝之師也見初不聽露索霍光不用之死言霍氏遂用劾廣漢死不劾韓延夀死吉劾張敞不得為三公本劾陳湯得封輕丙非耿夀昌雅意朝不守平原萬為左馮翊引病刻多使守吏買賣私所附益十三千平生忌害人之賢元帝之世與恭顯忤自殺成帝荒淫權外戚專以王鳯為大司馬領尚書事封王崇及談商立根同日為侯劉向作五行傳上心知為鳯兄弟起此論不能奪其權王章奏鳯專權欲以馮野王代章死獄中王莾為新都侯吏民上書譏切王氏上以問張禹由此不疑大司馬王商死王根代王根後薦王莾代微行悅趙飛燕劉輔諫為鬼薪王章忠臣本以言王鳯死王鳯所舉劉輔諫立趙飛燕罪梅福以任王鳯上書莾專政棄妻子去朱雲請斬張禹張禹罪魁賣國孔光阿意事皆王氏羽翼成哀平杜欽谷永王鳯腹心王尊守安定威震郡中兆守益州蠻夷歸信者為司𨽻劾康衡守京盜賊清坐遇使無禮免吏民訟之堤遷東郡請身填金水却王商亦外戚擁佑力以肅敬稱議成帝為太子有王鳯專商論不平止訛史丹宣帝皇考外家意成帝為太子時丹護之掩惡揚善甚有功上向定陶王丹伏青蒲諫成帝得立年丹位後將軍十六極聲色滋味翟方進司直旬嵗免兩司𨽻尤徙京兆尹京師畏之為相九年中傷多熒惑守心罷假會宗都護西域敬其威信輯西域上書願得復為都護諸國郊迎安烏孫遣誅畨邱手劔殺之數千騎圍之會宗為言號泣而去安輯昆彌死烏孫中諸國發喪立祠哀帝昏愎寵誅大臣董賢封舅丁明后父傳宴為侯丞相王嘉下獄死封傅商董賢為侯董賢為大司馬師丹限民名田不行平當丞相辭封彭宣御史大夫取乞骸皆小亷名馬宫代孔光大師持祿何武仁厚武好進士不為相號煩碎而經術正直王莾從求舉武從哀帝崩舉朝皆薦莾武獨與公孫祿謀成哀比世無嗣不宜異姓持權遂互舉莾劾免之後見殺嘗為刺史二千石有罪應時舉奏其餘賢不肖敬之如一其行部先即學宫見諸生試問然後入傳舍出記問田穀已乃見二千石王嘉諫封董賢誅師丹以舊傳居三公帝拜丁傅并多變更切諫廢歸後莾封之息夫躬由哀帝后父傳晏進罷與孫寵誣奏東平王雲封侯既以祀盜誅滅李尋甘忠可詐造天官厯包元太平經夏賀良私以相教尋亦好之帝疾從賀良等議以建平二年為太初元年號陳聖劉太平皇帝漏百二十刻不驗皆誅毋將隆奏徵定陶王竟立為太子賢貴傅太后賤買宫婢哀帝即位王董隆皆言之莾願交隆不甚附免官徙合浦何並為長安令道不拾遺靜名次黃霸清亷徙頴川郡中清妻子不至官舍傅喜傅太后從弟傅太后與政喜諫見罷尊何武薦拜大司馬丁嫉之不順太后求號䇿免薛宣事成哀相賞罰明用法平煩多仁恕利愛代張禹然官屬譏其碎能吏朱博刀筆吏晏所至操持逆折其下劾傅后求尊號傅結之為宰相彭宣之自殺杜鄴交歡王音王商時為商腹心邪立丁傅於哀帝論正心鄭崇哀帝所云尚書履聲者貴諫封傅太后從弟商又諫董賢寵死獄董賢二十二為三公崩權與人主侔云欲法堯禪舜哀帝太后因衆怒去之平帝幼主器擁虛太后臨朝元帝后王氏召王莾為大司馬號安漢公號宰衡加九錫弒帝立孺子莾稱假皇帝翟義起兵擊之不勝莾即真篡位孫寶孔光以黃龍遊江稱莾功德家寶言周召猶不相悅坐免終於龔勝哀帝時諫官言董賢逆旨罷不莾秉政乞骸骨莾篡位加以印綬推不受飲食十四日卒天有臨弔父老譏其不終年此下號清節之士龔舍以龔勝薦為諫議大夫再以病免王莾居攝卒鮑宣哀帝時丁傅並進董賢貴幸上書切諫王莾秉政係獄自殺郭欽哀帝時丞相司直嘗奏董賢蔣詡兖州刺史政亷直著名莾秉皆病免嚴君平賣卜因勢道之以善雄依老莊之指著十餘萬言楊嘗從之學鄭子真耕於谷口出王鳯聘之不薛方莾安車迎之引巢由自免郇相郇越越散資千萬志節尤髙相為莾太子四友矣栗融禽慶蘇章曹竟皆儒生於去官不仕莾紀逡唐林唐尊皆仕莾封侯不可比清節之士而林最貪孔休初莾罷就國休為新都相莾進王具寶劒不受莾還京師欲見休稱疾不見後莾秉權休去官歸家杜門自絶莾篡位聘幣請為國師遂嘔血託病知莾之姦最早處之最善惜班氏不立一傳以冠清節之士新莾篡位十八年漢誅之嚴尤智數能言三䇿而攻降劉聖為莾大司馬十餘日敗尤死劉歆自楚元王辟疆德向世為宗英附歆為莾國師自覆其宗初歆與甄豐王舜莾加安漢宰衡之號豐及莾用劉慶謝嚻田終術欲稱攝舜憂死故與並父子誅東萊謂三子不欲莾居攝荀彧不欲操加九錫猶培其根而惡其實也揚雄初慕相如太又騷言賦甘泉河東校獵長楊既而悔之草元法自比孟子王音召為門下史宦成帝時與王莾劉歆並秦哀帝時初與董賢同卒為王莾大夫劇美新為萬世羞按漢習委靡張禹孔光賣國為姦餘紛紛附莾者不可勝數惟劉歆世為宗英揚雄自號儒者而亦為之罪莫大於此歆見莾居攝而內懼大雄直為其大夫罪尤古今紀要卷二
