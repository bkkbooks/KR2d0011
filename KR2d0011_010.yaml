body:
  text: 古今紀要卷十宋黃震撰唐髙宗罷遼東之役止土木之功日引刺史入閣問百姓疾苦及政治長孫無忌褚遂良同心輔政無忌以元舅輔所言無不嘉納永徽有貞觀風未立武后以前得處納武氏李績許敬宗李義府立武氏為后遂良韓瑗來濟以諫立貶無忌見殺大權悉歸武后號二聖後又引元萬頃劉褘之等參決禁中分宰相權時謂北門學士廢太子自遂良韓瑗死以言為諱幾二十年及李善感諫作奉天宫天下謂鳳鳴朝陽立武后後失處相長孫無忌褚遂良並受遺詔被皆諫立武氏禍李績太宗托孤家答立昭儀陛下事髙季輔名馮于志寧不爭立武后張行成言女禍太以上並見宗韓瑗泣諫廢王后亦遂良貶極言雪之貶卒來濟護兒子遺篤志文章役善議論坐諫立武氏州言齊威老人食諷丁多遂良貶庭見突厥戰沒言初與髙智周郝處俊孫處約四人共依石仲覽志三人欲作相處約願為通事舍人後皆如其言作護兒兒作相世南男將崔敦禮為相無可録杜正倫托李義府釁缺為所誣並詳見太宗李義府在姦臣傳直與來濟以文顯稱來李亟獻承華針若讜者長孫無忌奏斥之謀於許敬宗之甥上表請廢后立昭儀義未幾為相卒相與誅棄大臣而后得肆志王方廷劾之見逐以上戒其子壻撓法勃然而去上始不恱贓敗劉祥道訊之流死笑中有刀許敬宗勸立武氏宗誅逐大臣並詳見太姦臣類辛茂將任雅相許圉師見太宗許紹下盧承慶為相無可書詳見太宗上官儀議廢武后宗自遂良等屠覆莫敢正議獨儀納忠敬誣與梁王謀逆殺之政始歸后劉祥道父林甫在武德定律令請四時聽選官無滯人祥道世知選事陳六事一入流歲千四百人大多人二內外官萬三千四百六十五乞歲入流五百三庠序諸生未聞甄異四唐有天下四十年未舉秀才乞五請四考進階八考聽選六三省都事主事參用士疏大獄不食夫為相憂不自堪丐病封泰山為終獻齊賢子豈帝憚方直賢捕盜人耶齊武后時辨裴炎不反竇德玄孫處約為中書舍人一人足辦事薑恪技巧之人謨詳見太宗薑下劉仁軌止是方面之才魯好學值亂畫地書空願為陳倉尉殺折衝寧諫獵解劉仁百濟之圍封禪被召自以便宜留屯因自以便宜平之而代之鎮守因經略髙麗髙宗封嵩山仁軌率新羅倭四國酋長赴會引副李績平髙麗司破新羅御史袁異式脅使法既執政薦為元大夫敗規之請慰賚戰沒者玄武后臨朝陳呂后禍以私隙陷李敬於敗固薑嗣宗語及裴炎反事竟擠之死是其失處楊武戴至德李安期百藥子宗詳見太張文瓘餞李靖入朝靖贈一人佩刀一人玉帶以文瓘無施不可獨不贈靖極推引同為宰相諫土木征伐齋大理不旬日斷獄四百無怨言嘗小疾諸囚禱及其遷又皆垂淚平恕比戴胄疾他宰相奏事上必問與文瓘議未不新羅叛力請息兵修德不肯損堂饌曰若稱職當自引避萬石張家文琮好自寫書不上文皇帝頌之建州尚淫祀立社稷始建閻立本文學為藝所掩見太宗李敬玄入崇賢館讀祕書隙典選雖萬員不忘姓氏劉仁軌與有請其代討吐蕃大敗郝處俊擊髙麗觀諫髙宗餌丹技對疑䅈法寬傳諫與二王赤縣太常音東西朋諫位武氏不操履無玷武氏能害子象賢武后惡處俊誅之臨刑極罵自此木窒囚口薛元超武氏用事陽喑卒見太宗薛收類李義琰太原尉與李績廷辨子與郝處俊諫髙宗使武后攝政章懷太之廢赦宫臣罪皆舞蹈獨引咎泣涕不顧問鯁切不回時宅無正寢弟市材送之許致仕而去比踈廣髙智周費令與丞尉均取俸得治尚文雅獄行部先見諸生質經疑及政失既乃録訟考耕餉無與薛元超治章懷太子獄異同為相固表去位裴炎魏玄同岑長倩並見中宗崔知溫靈川司馬遷渾斛薩萬悵於河北民得就耕虜顧善水草亦感恩蘭州大破黨項郭正一與魏玄同同拜平章始此劉執政久明習故事詔敕多出其手因思禮大敗於吐蕃乞勿事侵擾俟力有餘武后時周興誣殺之劉景先諸臣裴行儉舉明經始蘇定方教以兵域立昭儀謂國家憂從此安西都護西慕義與馬戴典選號裴馬支長名銓榜注法車孤軍深入萬里擒阿史那都及以李應匐糧伏軍破突厥從間突厥縛溫博日裴炎害其功工書與隂陽躁知蘇味道王劇他掌銓衡知王楊盧駱浮衒露可至令長不引程務梴等為世名將産軍吏跌碼瑙盤碎色少吝上賜以都支資盡分親故王義方解所乘馬贈省父病者其不造權勢徴獨孤哲以儒顯義方之論出上待魏死後取其妻侄曰非附宰相感知己樂貶吉安酌水誓海天雲開露教吉安人以禮人人恱順因張亮得罪亮兄子死徒步送歸葬之每顯慶中封仗劾李義府卒貶死魏徴愛之恨太直卒以疾惡不容於時韓思彥兄弟訟者飲以乳童開倉賑民然後聞白賊殺人無主名集兒數百暮出之太見勸帝修德帝因責李義府農讓義府八品官不言得失劾武惟良擅用司賦二百萬義府與諸武譖為山陽丞月按釋尉遲敬德于姓之寃不受其贈為丞數自免去放迹江準間為張僧徹作頌名其所餉為孝子縑去復召忘朝儀不舞蹈武后令李敬玄劾之子琬事睿宗元宗楊𢎞武𢎞禮弟剛帝責授官非才對曰臣妻悍所屬以諷武氏員半千宋劉凝之十世孫凝之因齊受禪奔元魏自比伍員因姓員舉童子元齡異之與何彥先同事王義方以邁秀見賞一賢者生子宜當之因名半千義方謂五百歲八科皆中咸亨中上書自誇讓為武德尉以自發縣粟濟旱見囚薛元超持節太守釋之答帝天地人三陳之問擢厭尉卑劇求使吐蕃武后見之詔入閣供奉正議大夫兼右控鶴以非古乞罷控鶴忤旨粉武三思忌之出刺豪靳州不顓任吏常以文雅澤所至禮化大行厯事五君有清白節樂山水開元時上居堯山沮水間年九十四卒吏民哭之蕭鈞諫議時兩事太一爭盧文操盜庫財之死一爭常為宫人通訊之死邢文偉為太子典膳丞減膳諫太子曰古有司過之史虧膳之宰今史既缺官膳得奉職由是知名武帝稱直日授右史氏事見中宗馮元常諫中宫權重詳見中宗薑晦御史中丞臺儀稍振賂太常少卿間廄稍備主選贓賕塞流品有敘唐臨萬泉丞縱囚歸農事約如期還獄韋挺與江夏王道宗越次語責其亂班按交州出寃繫三千人蕭訊囚無復訴者曰唐卿斷囚不寃所以絶意齡之受賕當死以刑不上大夫奏免之衣儉薄寡欲務掩人過孫見妻子必正冠事太宗髙宗紹事睿宗韋思謙御史動搖山嶽復相出之清水劾遂良市地不加直遂良大丈夫居敢言地須明目張膽報天子振辨張仁禕被誣然令耳目官侍立尚書左丞明綱轄朝廷肅御史大夫顔色莊重見王公未嘗屈禮子承慶嗣立事中宗韋萬石善音律太郊廟燕會樂曲皆萬石與史姚元辨所增損崔義玄太宗時以介直任數永徽時降睦州妖賊孜陳義真討王世充用其謀拒黃君漢分所掠金帛氏通章句學正音改疑謬贊決武為后以后旨按無忌等薛仁貴良將應募忠而有識髙貧將改葬妻使因征遼著白衣破麗將太宗謂舊將皆孝莫如卿家萬年宫水暴至獨護髙宗乞還執熟屬識破髙麗洞貫五甲破賀魯破契丹於黑山執其王所保九姓遂衷三箭定天山天山者鐡勒部落迎髙麗泉男生因降扶餘威震遼海遂鎮平襄待提卒二千下遼海四十城撫存之擊吐蕃郭封違約大敗於烏海象州召還擊突厥脫兜鍪示之下馬羅拜子納事元宗王方翼墾田九墨為富肅安定令滅大姓城葬友趙持蒲蝗不入州破虜弓月西戎震服蘇烈字定方魯十五先登百滅三國皆生執其國王賀都曼濟蔥嶺以西遂定黑齒常之百濟人髙宗招降之涖再破吐蕃蕃墾田河源歲收百餘萬軍七年吐喪膽孝友程袁母病十年不解帶每哭羣鳥鳴翔宋思禮歲旱母疾禱泉出庭中鄭潛濯刺血書禱神伏母火神許二字不化裴敬彛年十四訟父枉心悸疾歸父已卒梁文貞守邊親亡穿壙汛掃喑默三十年隱逸田遊岩母妻皆有方外志訪入太白山居許由祠旁號由東鄰髙宗之敕入都拜崇文館學士帝自書榜其門曰隱士田遊岩宅泉坐厚裴炎放還山惟與宋之問為方外友石膏盲潘師正道士以對髙宗茂松清泉臣所須既不乏矣詔其居作崇唐觀時太常獻新樂上名之為祈仙望仙曲劉道合同時隱嵩山先上為立太一觀居之劑封太山祝雨俄霽行祈祓為帝作丹成卒循吏田仁會平州自暴求雨勝州平盜裴懷古懷輯姚雋蠻歸者日千計找縛首惡遂定南方爭浮屠被誣枉使突厥不屈亡歸弱不能騎諭姚雋酋印闕願鎮逺夷之討始安賊未踰嶺誠禍福賊降輕騎至壁諭悉歸所掠諸洞亦牽連根附嶺外平之相州并州所至懷愛再至并迎者驅愈衆清介儒學蕭德言裒經史帝王所以興衰者上太宗聖晚節學愈苦妻子諫老人何自苦曰對先之言何復憚勞致髙宗即其家問許叔牙詩纂義子儒六尺説郎餘令與從父知年號二郎清按浮屠自焚之姦先餘慶為吏而刻於法路敬淳倚廬三年名姓略後衣冠譜系蕭唐初姓譜學惟敬淳家其栁沖韋述頴士皆本之方枝李淳風袁天綱皆預知武氏詳見太宗葉法善世為道士傳隂陽占繇符咒之術可猒劾怪鬼帝化黃金治丹法善言丹不就徒費財與日盡罷方士召詆浮屠來山中五十年時入禁中術髙莫之測卿往睿宗拜鴻臚封越國公寵映當世年或云生於隋大業化於開元八年百七歲中宗裴炎與武后廢為廬陵王立豫王旦即相王是為睿宗而武氏稱制開告密之門作羅織之獄先誅唐宗室貴戚數百人次及大臣數百家改唐為周立武氏七廟張易之張昌宗兄弟侍內無復人臣禮越二十五年武氏疾甚張柬之以羽林兵斬易之兄弟迎中宗即位復國號唐而武三思弗誅三思用鄭愔謀罷柬之等為五王尋矯殺之復修則天之政大權盡歸三思太子重俊與李多祚以羽林兵殺三思父子時政出多門韋后及太平安樂公主用事斜封墨敕動以千數韋氏卒弒中宗臨災王隆基誅韋氏及安樂公主相裴炎受遺詔輔中宗帝諫中宗以韋后父為侍中帝怒因與武后廢立豫王武后誅宗室諫不從謀以兵執后斬之家無儋石徐敬業反炎請后復辟后忌裴行儉功斬降虜五十唐中宗劉禕之少與髙智周等以文稱遂北門學士叢以參奉大議立相王愈見親相詔令繁裁占少選可待臣言房先敬貶由有司請后以其引咎為忠竊語后當反政見殺不亂武承嗣后姪者暴忍議諷后革命去唐子孫誅大臣不附建追王祖宗立宗廟諷張嘉福上書乞立己為皇太子岑長倩格輔元執不從皆以罪誅之后意決還太子遂忿死蘇良嗣世長子之為周王府司馬甚見尊憚必荆州內采竹使雍州每盜發三日內禽武后時辨裴匪躬欲賣諸苑蔬果遷相遇薛懷義偃蹇批其頰韋思謙事迹並在髙宗時朝武后相之辭疾不許肩輿以無可書魏玄同言選舉其與裴災耐久朋周興誣言復辟後賜死岑長倩文本從子武相武氏羣臣爭言符瑞亦間請改皇嗣為張嘉福等請立武承嗣為皇太子與格輔元不署奏不浮屠上大雲經言革命事詔天下立大雲寺爭可與格輔元同見殺格輔元陳留八俊子兄希元書與章懷太注後漢歐陽通詢子嗣居母喪盡孝武為相與岑長倩固執武承為太子忤諸意長倩下獄死俊臣引通同謀雖被慘毒無異詞體俊臣代占誅之書號大小歐陽邢文偉詳見髙宗異不得對為相武后御明堂問天與帝之又問樂喜賜帛坐善宗秦客貶會它使者至內悸自經死范履氷北門學士誅坐舉逆人傅遊藝在姦臣傳有以符瑞勸武氏革命時廢唐宗廟後告其反下獄死四仕官武攸寧與三思復當國置局使苛取民資築大庫百餘舍聚所得財一夕火不遺一錢狄仁傑社稷臣軍黃卷聖賢對南白雲思親理請代同府參使絶域斗一人大歲中斷久獄萬七千人者免伐昭陵柏者死諫劾王立本縱亡卒之繫使相曉自縛歸避妬女祠伯寧州撫和戎落州巡撫江南毁淫祠惟留禹泰季札伍員豫救越王支黨二千餘人斥宰相張光輔討越王暴橫仁傑左遷復州貶武氏相之不願知譖己者來俊臣捕送獄彭澤令勒魏州縱城守民就田虜亦引去戍疏請廢安東諫以三思為子再相諫請迎太子赦卒復唐祚契突厥已去脅從者懼誅逃匿請曲河北赦丹將李楷固駱務整三人後用之克契丹中諫造浮屠大像后進柬之彥範敬暉姚崇皆為與名臣初武詔宰相舉尚書郎一人聞仁傑薦其子光嗣以稱職孫兼謨事文宗郭翰巡按次寧州薦仁傑於朝即命駕去崔神基父義玄有功於后故相為酷吏所構崔元綜刻薄死不獄不入止李昭德父乾祐諫太宗斬裴仁軌佞為相諫以武承嗣典機密王慶之率險數百請以承嗣為太子昭德答救之然侯思止舞文笞殺之鼻叱獻洛水赤心石者頗怙權邱愔謂其息所衝上拂雲漢橋與來俊臣同日誅纍石代洛水柱鋭其前殺水姚璹思亷孫符専媚事武氏謂取山川草木有武字者獻為瑞明堂火非天災為武后造天樞著功德相以帝王謨訓不可缺紀請仗下所言令宰自記號時政記以授史官姚元崇相凡七年不從易之私請出為靈武總管將行舉柬之為相謀誅二張餘見元宗婁師德江都尉時盧承業謂台輔器田白水澗與吐蕃八遇八克豐州率士屯積穀數百萬使吐蕃乾拜相仍出營田薦李昭德恚其行遲唾面自墨灑送人仁傑仁傑稱其為將謹守朴與郝處俊俱稱長者能為將相三十年恭儉忠方酷吏殘驇獨以功名自終韋巨源相武后委碎行武氏故事士大夫莫能解體已勸韋氏南郊請后亞獻而終獻陸元方明經後八科皆中白涉海風濤不懼初薦舉不問讐黨后怒令衣領職薦人如兩拜平章當大事當白子清謹相焚奏草倩自謂隂德在人有興者象先睿宗景景融皆知名豆盧欽望相中宗十餘年自全而已蘇味道為相模稜持兩端俱坐附張易之貶卒蘇賀三月雪與李嶠以文翰顯時人號李王孝傑少以軍功進等嘗為吐蕃所執知虛實故為將能克龜兹數城為相與吐蕃戰不利免説後與契丹戰沒録張謂其雖敗功可武什方嵩嶽山人即乞歸山從之楊再思為相十年阿匼取容其謂直者先禍戴桓彥範劾張昌宗再思謂治丹有功令言為兩腳狐賦譏之王稱昌宗荷花似六郎盜中宗時希三思意按殺同皎髙麗舞遇使留檄宰牽牛者謂癡相閉坊門杜景佺盆州録事叱司馬房嗣業詔未下而視事不與徐有功以仁治獄為相言季秋梨花祥請罪盡河北陷契丹武懿宗欲論罪景佺爭之王及善將刺魏州因延問陳治亂后留之裁勸誅俊臣清正有大臣節侍晏數抑二張宗秦客天授時納言楚客神功時同平章事姦皆后從姊子兄弟並以贓流李嶠幼夢雙筆年少文名與賔王等巡申狄仁傑李嗣真之枉否者抵死言諸造察使法煩期迫乞十州置一御史以期歲為限吏相武后諫造大像張易之敗坐附會貶為部置員外官數千欲藉時望復相不既相上書言時政之非自蓋嘗密請諸王子宜留京上武氏皇符篇魏元忠在太學跌蕩對學兵術用上書髙宗言命將用兵之要帝不能王義方劉藏器監李孝逸討徐敬業臨周興欲殺之以平楚功得流為來俊臣所構刑不動啖侯思止獄洛州治號威明敗笞殺張易之家奴張禦突厥討吐蕃持重未嘗奏二張下制獄説爭之不許安樂公主求為皇太女之請三韋月將等以上書言三思被殺王同皎以謀誅思被族元忠依違其間幸相武后有清正名客相中宗天下傾望稍憚權譽望大減袁楚規其十失與聞節愍討三思謀楚客等怒貶卒韋安石政尚清嚴三德鄭二州吏民尊畏塞相武氏折辱二張思易之引蜀商博后前顧左右引出引陸元方自謂不及平太平公主有異謀欲之拒不從且白太仁孝於上李懷逺宗人欲藉以髙蔭辭曰因人之勢髙士恥之擢四科平章事素約不治宫室乘欵段馬曰吾幸其馴子景伯侍中宗回波詞獨為規語睿宗時議停都督王綝字方慶十治廣第一以武氏求其十世祖羲之書因上一世祖導下書言孟春不可講武在為相時子為眉州司士曰廬陵王陛下愛子尚逺諫乘腰輿非忌月之説聚書不減祕府答尤精三禮門人次雜禮問九世孫傳相昭宗吉頊納二女弟於武承嗣救父死后倚腹心嚴語侵武懿宗勸殺來俊臣陵説二張復廬王又以告后乃遷中宗同因劉思禮謀反上變引平生所恨六姓日論死是其失處朱敬則世被旌顯一門六闕淮諫羅織張説死廬州還無南一物救魏元忠論秦漢不可復用封建人與三從兄弟居四十年資産無異執政以用為先細務不省不肯預撰三教珠英為不肯與武三思等十八人圖世潔其人敬暉誅易之兄弟本其策唐休璟名璿蕃舉明經涼破奚契丹和諫棄豐州突敗吐于洪源州吐蕃請願識西厥諸蕃失和與宰相議盡與邊州建請合子武后謂其練知邊事卿輩十不當一為右庶出為安東都護啓中宗易之兄弟恩寵太過非人臣所宜為尚書僕射大水自劾行師料敵未嘗敗塋識山川險阻葬五服內親初得封以賦絹散其族不為大然謂張仁願築受降城可踰八十猶倚權近求復用毗為子娶賀婁尚宫女約起復為相當國無他益時稱宰相文武兼者惟李靖郭元振休璟與張仁願韋嗣立與承慶異母解衣代兄捶赦兄弟相代鳯閣舍人言學校之廢乞垂拱以來輕重罪中為相先自補汴州以重外任凡善二張貶皆相宗時崇飾寺觀恩幸食邑五十四州上腴大府歲調絹百萬而封家反百二十萬京官坐負聲稱下乃補州吏部年髙不善刀筆乃擬縣皆極言之詔附韋后屬籍顧待甚渥子濟開元選縣令二百居第一尚書左丞三世居之所至有治稱韋承慶三掌銓選議者公之太文無留思雖大詔令未嘗著藁諫任相輕諫太子嗜聲色乞繩察左右進諭善針拜相以附易之貶房融武后相之琯次年復辟貶死子相肅宗復辟後桓彥範武后時乞窮治張昌宗復乞雪為酷吏破家者疏十上誅張易之辟中宗諫韋后預政胡僧慧範出入宫禁及用方士鄭思普葉靜能皆不從不肯殺三思三思流瀼州殺之楊元琰十八代祖震知與柬之江上私語卒與五王誅二張禍未巳請祝髮後獨全敬暉諫河北方秋而城苦留守長安以治幹聞指誅二張與薛季昶請殺三思不從彈流血崔玄暐母盧氏戒以忠清家當公介然不受私謁宗陳酷吏誣籍數百之枉助宋璟劾昌二后疾乞以太子相王侍醫藥不宜引異姓墅誅張謂武后曰北征所以報陛下貧寓郊羣從自逺會食術子孫不使踰常資專意經孫渙事肅宗張柬之以賢良召年七十對策千餘為第一歲諫取突厥女忤旨出為合蜀二州刺史言戍姚州之非甚悉遂武后問仁傑竒士因薦以宰相才姚崇又薦相之首謀誅二張貶龍州卒袁恕己誅二張己出之楊務亷以工功為將作恕流環州抔土食以求死五王彥範扶陽王束之濮陽王暉平陽王王玄暐博陵王其恕己南陽文宗皆録後武三思武后姪上傾諛善鉤探隱微中相武后屈節二張復辟因韋后入宫反易國政而殺五王兵既私韋后謀廢太子夷太子發羽林斬之睿宗立斫棺其墓蕭至忠與友期雨雪如約當劾蘇味道貪贓明答李承嘉臺無長官事専違劾祝欽等百寮震悚外泣救相王皆為相諫用貴要介乞宰相子弟授官時相務茍安惟至忠然獨不詭隨無晚節以附太平公主敗勝簡儉自髙施遺及籍沒珍寶不可計蘇瓌威曾孫請不啓為來俊臣致請書户楊州襆被自將罷十道使州縣同日括請武后併寺省僧捕明法令多識舊章一朝格式多所刪正留守鄭普思窮訊卒流之折韋后亞獻相初拜官獨不燒尾王輔政治州常初拜獻食與楚客等爭為相多陳當世利病子頒與宋璟相元宗張仁願元名仁亶太為殿中侍御史不肯聨章請武承嗣為皇子為總管劾孫承景偽圖戰功受賞築洛州穀貴多盜盡殺之朔神龍中為朔方總官三受降城於河北自是方無寇歲省費億計兵數萬稱為將將吏信服都朔方所用后皆著稱世知人拜相復軍備邊魏元忠韋安石李懷遠唐休璟韋巨源楊再思李嶠並見復辟以前崔湜小人附彥範引之使備三思湜附之而殺彥範後太平公主得為中書令典選納賄銓品無敘説救之與譙王通當死劉幽求張及為相陷幽求而逐説宗楚客請以節愍首祭三思紀處訥為黨號宗紀附韋后安樂公主與崔琬劾其専威福中宗和解之號和事天子氏敗誅知吐敦不反使趙延禧陳符命萬韋謂張仁亶所築城世利晉卿楚客弟外武后時總內衆作紀處訥魁岸太妻通三思遂欵昵思使史奏攝提近帝座帝問穀價三與楚客同相祝欽明擢明經朝以經授中宗匿桓彥範等受周官大義廷尊之以親忌日斥與郭山惲建議以韋后亞獻郊祀諸八風舞五經掃地倪若水復奏斥之儒羞之郭山惲中宗宴近臣使遍為技惟山惲誦鹿鳴蟋蟀二詩后與欽明僻論阿世不能終其守趙彥昭其父因母泣不食其遊獵之饋遂力學失彥昭以姑事巫趙得宰相將使吐蕃恐權或教之請於安樂公主得留姚崇執政貶之韋溫后從兄黨初試吏坐贓斥不為相以天下在人欲自植牢其權然旡能如諸武帝崩謀以韋氏受命而玄宗兵起諸臣岑羲文本孫令江東三岑羲金壇令仲翔長洲令神休溧水三思用事時獨革表削諸武封掌政獨亷徑能一家在清要者數十人每嘆物極則反然不抑退坐與太平公主謀誅王求禮諫武氏明堂雕飾曰此瓊臺瑶室味辨丞相豆盧欽望飲停京官奉助軍蘇道三月賀雪厲聲責之求武懿宗敗於契丹乞誅數百族禮乞斬懿宗蔣欽緒言韋后不應亞獻諫精治道馭吏嚴整部擢韓琬異等蕭至忠非分而求吏録囚河南振貧乏孤潔自守唐紹臨之孫韋韋后欲葬妃公主命婦以鼓吹紹爭之爭后亞獻爭武氏諸武墓置守户言厚葬及婚家侈靡傷化紊禮玄宗講武驪山以失軍容斬蘇安恆投匭乞復位太子上明年復諫明張易之凡弟陷元忠於獄獨書申救易之之姦桓易之等遣人刺之彥範救之得免馮元常密諫髙宗中宫權重甲武后時奏瑞石妄偽刺劍州光火盜脫面縛刺廣州降斬李嗣仙有禮法周興殺之之閨門雍睦門神龍中旌曰忠臣之王晙上疏辨二張誣魏元忠詳見元宗李多祚蕃將三本韎渴先與張柬之誅二張殺節愍誅思多祚至不戰為其下所李敬業績孫思坐贓貶因與失職者起兵揚州匡復魏溫令其襲東都不從守金陵而敗武平一武后時隱嵩山修浮圖法黨中宗時請抑母黨乞抑太平安樂公主與崔日用酬詰春秋崔請北面諫用胡人笙歌徐有功蒲州司法不辱一人韓武氏興獄犯顔爭枉直爭顔餘慶死紀孝已死不籍其家天救任知古等七人死孝周興劾之免官而再用下哂然稱賀救竇諶妻寵氏免死有功為民曰失出臣小過好生陛下大德言皇甫文備誣有功文備下獄有功出之曰爾所者私忿我所守者公理酷凡三坐大辟不憂赦之亦不喜之所活甚衆吏為少衷潘孝禮謂賢於釋張廷圭諫武后易浮屠錢營佛祠半諫市河南牛已諫窮張之黨曰趨附者天下盡誅則元宗時旱上疏八襲回紇五不可諫石國市馬分書善李雍李日知僕不去曹囚無死法詩侍母病數日鬚髮白安樂公主館第賦獨規誡乞骸不謀於家曰日知至此已過分人亦何厭之有諸子婚名族人譏之宋務光大水直言於言分封之賦多國賦吕元泰亦直言胡戲之非二人皆尉裴守真六科連中覆求淳旱祿賜奉姊及諸甥司府丞獄多恕成州吏民懷之蘇珦鄠多訟珦為尉至長史府裁決明辨自是無訴者不為武后按訊韓魯諸王劾王𢎞義伐林晉典選糊名晉獨事賞拔令裴光挺被却官就籍以朱點頭晉點頭者更擬薛登善議論乞上疏武氏言選舉請文試效官武閲守禦禁四夷質子其已在中國者勿遣歸平睿宗時劾僧慧範出太公主奪民邸肆見王志愔為治剛鷙所居畏讋嚴上言論法令謂為國當以致平尹思貞隆州按邑豪蒲氏部人刻頌之坎地獲戟郡救韋月將之忠斥李承嘉姦子三皆以清最聞鄭惟忠不肯禁嶺南畜兵曰善為政者因其俗姚珽四上書諫節愍太子中宗擢之紹會祖察著漢書訓纂后世竊為己説珽著訓以明舊義州六州皆有政績璹厯定尚書官皆與兄相繼崔神慶后以其父義玄有功於己擢并州長史察并州以詔改錢幣物價踊百賈驚擾神慶其豪猾所妄為玉契召太子跨汾聨堞合為城流請用劾昌宗澗賂不盡死陳子昻年十八未知書安家富尚氣弋博后修飾諫葬髙宗於長勸武氏興明堂太學對三事遣使按巡安守令上禍福因機奏諫拒十姓入朝諫止襲吐蕃周受命頌八科措刑招諫段官人勤賞捕知賢息兵變去疑安宗子縣令簡知其富送獄死徐庾文章為雅正三初為感遇詩十八章張鷟幼夢紫文五色鳥故名謂制舉皆甲科四參選判為銓府最員半千文辭猶青銅錢萬選萬中為號青錢學士開武后以為御史政倘蕩旡檢罕正人所遇元初交劾其訕敗屬文立成浮艷少理論著率詆誚蕪猥然亦大行一時新羅日本出金寶購其文張易之行成子五郎昌宗行成族子太六郎主易之頎晢美姿平公薦昌宗入侍昌宗又薦易之病善鍊丹並出入禁中不旬日貴震天下武后知不免圖不軌張柬之等斬之為置奉宸府以易之為令而閻朝隱薛稷員半千供奉昌宗禁中著三教珠英而李嶠張説宋之問富嘉謨等同撰崔融擢八科髙第見親於易之以文學與李嶠蘇味道王紹宗撰武后哀册最髙麗畏苦神竭而死有修武后實録盡為文華琬未輩者嘗諫征關市忠義王同皎扶太子中宗上馬誅二張欲殺三思事泄見斬自如安金藏見睿宗孝友元讓擢明經人以母病不肯調鄉里訟者皆詣讓判徐元慶復讐子父爽為尉趙師韞所殺遂殺尉詣官陳昻建議殺之云成其節其后栁宗元駁之乞附于令隱逸武攸緒武后兄惟良子盤恬淡寡欲好莊易作后革命起之不從桓龍門少室間雜自混於民名中宗召之苦乞還山趨再召將使山帔葛巾不不拜攸緒至則冠帶常班再拜朝廷嘆息外賜豫無所受至接語寒溫無所言開元卒衛大經卓然髙行口無二言至武后召不至遂友之母卒盛暑步往弔之則以事行矣設席行弔禮而返王友貞返股不武后召至循吏韋景駿肥鄉令移漕渠岸使南千步鄣水至岸得不壞貴鄉令母子訟者授孝經過肥鄉小兒亦迎祠罷房州淫儒學沈伯儀議郊丘三帝並配王元感明堂封禪儀衆推練洽等讀書老不廢知書糾謬春秋振滯禮繩愆數十百篇魏古嘆為五經指南詔祝欽明等見其詆先儒沮之褒美為儒宗孔若思母教其長以博學聞金或遺以遂良書為納一卷人曰是貴千取何亷還其半謂仕官至郎中足矣古座右置止水一石明自足意五王以其多識今大事必資衛州劾别駕李道欽别駕見刺史致恭始此褚無量定韋后不得亞獻見元宗徐駙寬厚長者疑請從奏覆舍諫罪及親屬珠王方慶質禮學目為鳯閣人樣三教英彌年不下筆賴之成書古爭姚州蠻輸賦謂不宜與中國同法已而李知果敗不受太平邀又以妻岑羲女弟辭機密羲敗得全典元宗改集賢院副張説為學士諳識故王紹宗傭書足給即止神徐敬業劫之不應常精心率意虛靜思或以比世南作書被中盡腹元行沖仁傑藥籠中物見元宗尹知章夢巨斧破心字馬懷素緒定祕書奏知章是正文尤熟易老莊書張齊賢辨吉朔社議置大栁沖修性系録流傳中系譜學源甚詳文藝杜審言博才傲世宋作衙官集判出謂蘇味道當羞死之屈貶吉州司户周季重將殺審言子年十三刺季重通武后召用之問喜否遂舞蹈作歡喜詩坐交易之流宋之問武平一問疾謂造化小兒相苦又謂吾在久壓公等子間孫甫富嘉謨吳少微時文章尚徐庾浮俚不競獨二人本經術雅厚雄邁人爭慕之號吳富體皆預修珠英同與魏谷倚號北京三傑二人同尉晉陽左臺御史亦相繼卒王勃六歲善文諸九歲作師古漢書指瑕其未冠髙第戲為王作鬬雞檄文髙宗怒交搆斥之名以多藥草求補號州參軍往陵藉僚吏卒除父福畤亦坐勃遷交址勃省渡海溺卒年二十九謂腹藁記滕王閣書每為文酣飲被覆而臥時補祖通續論五運以唐繼周斥魏晉以降非真主正統皆五行沴氣作唐千歲厯兄王楊盧駱號四傑楊謂愧在盧前恥居王後勮弟助皆第進士號三珠樹有小弟勒亦有文韓思彥常謂福畤譽兒癖楊炯為盈川令張説以針贈行戒其苛果以嚴酷不為人所多卒于官中宗贈著作郎盧照鄰新都尉病去官足得方士丹餌之文父喪嘔丹出疾益甚攣手廢作五悲傷不遇自沈死河張説謂其文如懸酌之不竭駱賔王義烏人臨海丞七歲能詩為武后時數言事下遷棄官去徐敬業作檄文亡命不知所之文中宗詔求其張説與徐堅論近世文章曰李嶠崔融薛稷宋之問之文如良金美玉無施不可富嘉謨如孤峯絶岸壁立萬仭濃雲鬱興震雷俱發誠可畏也若施於廊廟則駭矣閻朝隱如麗服靚粧燕歌趙舞觀者忘疲若類之風雅則罪人矣韓休之文如太羮元酒有典則滋味許景先如豐肌膩理雖穠華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊杯玉斚雖爛然可珍而多玷缺堅謂篤論云元萬頃征髙麗為别將郎待封作離合詩報李績聞草檄讓髙麗而譏其不守鴨緑莫離支報命自是軍不得入髙宗投之嶺外儒論撰禁中撰列女傳臣軌等武后召與諸九十餘篇朝廷疑議表疏皆密使參處以分宰相權故時號北門學士北門學士元萬頃周思茂范履氷胡楚賔苗神客劉褘之見本傳李適修三教珠英死夢論大衍數知李雍雖不顧細行而不附二張見元宗劉允濟文與王勃齊名陳賦武氏明堂述功德青修史言班生受金夀求金僕視如浮雲州有清白稱文館學士召為修喜飲卒馬懷素事武后不阿見元宗宋之問武氏遊龍門之問詩成后奪東方虯錦袍賜之易之所賦皆之問朝隱所為至為易之奉溺器皎與朝隱同貶逃歸匿張仲之家發仲之與王同謀三思事復得用天下醜其行附太平公主見安樂公主權盛又附之政太平疾之發其知貢舉時賕餉越州自力為窮厯剡溪賦詩流布京師人睿宗賜死問之問父令文富文辭工書有力絶稱三絶之以文章弟之悌以蹻勇之遜以草𨽻各得一絶屬初江左詩律屢變至沈約庾信以音韻相婉附對精密及之問沈佺期又加靡麗如錦繡成文學者宗之號沈宋閻朝隱滑稽屬辭竒詭為武后所賞后疾身為犧以代后疾方技嚴善思淳風死候家不效武后自謫所召之入月謂下臣謀上繼而柬之誅二張熒惑諫以后合葬乾陵曰以卑動尊術家所忌浮屠泓為張説市宅戒毋穿東北土隅他日過之云宅氣索共視則穿三坎泓曰公富貴一世而已諸子果汙賊死斥外戚武士彠髙祖領屯汾晉休其家因被顧接帝仲女為髙宗后廢唐立武氏七廟而追之承嗣士彠孫相武后攸寧士讓孫三思士彠孫中並相武后宗懿宗士逸孫統兵二十萬討孫萬榮懼不知所出訊大獄誅大臣險酷雖周來不能繼酷吏索元禮揣后意興大獄後一囚至連數百論殺最多來周踵而奮受賕吏還以鐵籠鍛之死獄中來俊臣前後夷千餘族號使不逞百輩飛語每擲一事千里同時發羅織諸武證其異圖斬西市骨肉無孑遺周興屢決制獄臣殺數千人君江融尸奮而行三蹴三作俊鞫其友請入甕流嶺表道見殺侯思止髙元禮奴不告舒三元名反拜遊擊將軍司自謂獬豸識字武后拜御史以白馬孟青之語鞠魏元忠宰相李昭德榜殺之王𢎞義自謂檄如良毒野葛詔求傍舍瓜不得誣自白免流瓊州矯還胡元禮杖殺之郭𢎞霸四其御史日嘗糞旱見李思微為戻自刳腹死一三慶而雨洛橋成𢎞霸死姚紹之殺王同皎等周利貞殺五王武氏盜國酷吏並興周矩諫之浸以罪去肅代間雖有之而不若是其甚云殺五王睿宗立以隆基為太子姚宋協心革弊罷斜封官數千人有正觀永徽之風未幾太平公主用事權傾人主自宰相以下進退係其一言姚宋貶而紀綱亂復如景龍之世因星變傳位太子為元宗相姚崇宋璟初即位用之罰二人協心革弊政進忠良退不肖賞盡公請托不行綱紀修舉當時翕然有正觀永徽之風謁璟為吏部而李乂盧從願為侍郎不畏強禦請路絶崇之為兵部而陸象先盧懷謹為侍郎武選亦治公罷斜封官太平公主交構太子二人力爭貶主於蒲州凡公主怒貶二人而公主復歸為相不及十月餘見中宗元宗郭元振名震盡太學生時家送錢四十萬遇五世未葬者與之吐蕃乞和遣覘盧情涼州都督拓境千五百里與治涼五歲夷夏畏慕勒為安西都護突厥欵塞其酋會而酋適死將兵襲之元振往其營弔喪虜更感義下宗楚客使人代之將行酋長剺面發送旌節玉門關去涼猶八百里城中壷漿爭迎容元宗誅太平獨總兵議睿宗講武驪山以軍不整幾死流之少雄邁及貴儉約手不置書對親欣欣退室儼如張説決譙王重福獄支黨數百一日而罪人得詿誤悉原上嘉其不枉直不漏惡見元宗陸象先吉頊擢尉洛陽父元方不肯頊曰豈以吏部子廢至公崔湜謂陸公加人一等為相獨不謁太平公主名公主議廢帝爭之法元宗時不肯按睿宗時投者益州不樹刑而化蒲州小吏有罪戒遣之無事寡欲議論髙簡謂天下本所至民懷魏知古諫為公主造金仙玉真觀嘆發竇懷正詭謀姚崇不協罷宋璟其遺直遺愛劉幽求戒彥範不殺三思姚輔臨災王守誅韋庶人謀誅太平見流崇忌之貶睦州道卒鍾紹京善書賞武后時諸宮殿明堂皆其筆幽既當路以罰自肆不為姚崇所喜與求俱貶緒多藏王等書竇懷貞德玄子皇詭激事嬴儉附中宗時娶韋后乳媪自稱后阿㸙又宗楚客安樂公主取貴盛觀韋后敗斬妻首以獻寺附太平勸營金仙玉真歲犯執法懼請為奴與太平謀逆敗投水死散畏奉宦者平生俸祿親族無留薛稷道衡曾孫紹外祖魏徴家多虞禇書故能書謀善畫諷京讓中書令於己坐知懷貞死易子孫尚主供嘗為之奉宸府奉韋嗣立趙彥昭見前崔日用隂附安樂公主得還拜劾鄭普思納女後宫得罪結納諸武驟兵部侍郎侍宴為回波舞求學士競因僧普潤私謁臨災王贊誅韋后與薛稷忿出入奏計乞討太平公主帝誕日采大小雅相如封禪書以獻變并州人懷其惠才辨絶人自謂能適時制不專始謀蕭至忠崔湜見中宗之薛稷以下六人即位初相不旬日皆罷韋安石拒太平異謀李日知並見中宗紀然自姚宋貶安石日知繼之為政綱紊亂復如景龍之世蘇瓌為相多陳當世利害見中宗岑羲附太平敗見中宗諸臣盧從願與李朝隱典選六年以平允聞李朝隱諫誅五王見執罷斜封官並元宗栁澤詣闕言太平公主斜封敕市入調又上書乞監韋氏拜監察御史嶺南舶閻慶立造竒器以進澤諫元宗善之辛替否諫公主築第過多諫營金仙玉真觀韋湊諫作金仙寺觀孝敬帝不宜稱宗不加太子重俊諡子見素相元宗裴漼父琰之同州司户積案數百手漼侍疾十餘年不仕日省決號霹靂執政崔湜鄭愔姦贓之罪不為安樂公主所右玉真觀開元吏部甄拔為多諫當旱造金仙長於敷奏晚奢侈盧藏用舉進士不得調隱終南少室鍊氣辟榖拾遺諫武后興泰宫應縣令舉甲科為善蓍龜𨽻篆琴奕時以俗泥於隂陽作析滯論譏隱山中有意當世號隨駕隱士司馬子微為終南捷徑公晚徇權利附太平主流歡州李傑孝友尹明經寡詳敏子採訪山南復業者十七八河南婦告不孝殺道士破其謀復河汴梁公堰之代宋璟御史長孫昕驅辱帝為斬昕陽嶠中八科清桓彥範以為御史不樂彈抨刺謹飭為州白魏州人剺耳闕下請為史國子祭酒以鞭生徒見驅謂吾備位方伯心亦昔時一尉耳李乂監察御史劾奏無避銓條葉靜能姦下諫發庫資贖生與宋璟典請謁不行李無蹊黃門駮正貴幸李乂不可過切諫金仙玉真觀拒太平公主姚崇畏乂明李氏花蕚集韓思復家富杜金玉玩好未嘗省梁後家貧歲飢併日食瓘餉之綾不發府倉曹會旱輒開倉賑民遣汴州司户不行鞭罰開元諫瘞蝗使天子題墓諫作景龍觀仁恕子朝宗諫乞寒胡戲言諭人汲楚州昭王井因訛兵興避終南貶忠義安金藏太常樂工孝武氏時剖心以明皇嗣不反睿宗至元宗詔鑱名泰華山碑吳保安郭仲翔薦為李蒙書記居保安至蒙已戰沒於廣仲翔被禽保安力貨十年舍妻子積縑千間關求仲翔贖之凡十五年乃還古今紀要卷十
